  if (totalKills > 0) {
    cx.fillStyle = 'rgba(230,207,160,0.4)';
    cx.font = '10px "Geist Mono", ui-monospace, monospace';
    cx.textAlign = 'right';
    cx.fillText(totalKills + ' outlaws down', W - 12, 18);
    cx.textAlign = 'center';
  }
  // cylinder + store buttons
  const hdrBtn = (label, x, fn) => {
    cx.strokeStyle = 'rgba(230,207,160,0.5)';
    cx.lineWidth = 1.5;
    cx.strokeRect(x, 132, 104, 28);
    cx.fillStyle = 'rgba(230,207,160,0.8)';
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.fillText(label, x + 52, 146);
    uiZones.push({ x, y: 132, w: 104, h: 28, fn });
  };
  hdrBtn('CYLINDER', W / 2 - 112, () => { selChamber = -1; state = 'loadout'; });
  hdrBtn('STORE', W / 2 + 8, () => { state = 'store'; });

  if (state === 'draft') { drawDraft(); return; }
  if (state === 'loadout') { drawLoadout(); return; }
  if (state === 'store') { drawStore(); return; }

  let pw = Math.min(150, (W - 60) / 2 - 10);
  const cols = clamp((W - 40) / (pw + 18) | 0, 2, 4);
  const rows = Math.ceil(N_LEVELS / cols);
  const y0 = 176;
  let ph = Math.min(pw * 1.25, (H - y0 - 96) / rows - 22);
  pw = ph / 1.25;
  const gridW = cols * (pw + 18) - 18;
  const x0 = W / 2 - gridW / 2;
  LEVELS.forEach((def, i) => {
    const cxi = i % cols, ryi = (i / cols) | 0;
    let x = x0 + cxi * (pw + 18), y = y0 + ryi * (ph + 22);
    const locked = i > claimed;
    const hover = !locked && !isTouch && mouseX > x && mouseX < x + pw && mouseY > y && mouseY < y + ph;
    cx.save();
    if (locked) cx.globalAlpha = 0.45;
    if (hover) {
      cx.translate(x + pw / 2, y + ph / 2);
      cx.scale(1.04, 1.04);
      cx.rotate(0.01);
      cx.translate(-(x + pw / 2), -(y + ph / 2));
    }
    drawPoster(x, y, pw, ph, def, i < claimed);
    cx.restore();
    if (locked) {
      cx.fillStyle = 'rgba(30,14,26,0.75)';
      cx.font = `bold ${pw * 0.085}px "Geist Mono", ui-monospace, monospace`;
      cx.fillText('CLAIM THE', x + pw / 2, y + ph / 2 - pw * 0.06);
      cx.fillText('PREVIOUS', x + pw / 2, y + ph / 2 + pw * 0.06);
    } else {
      uiZones.push({ x, y, w: pw, h: ph, fn: () => iris(() => startLevel(def)) });
    }
  });

  // EL DORADO — the endless trail
  const ey = y0 + rows * (ph + 22) + 6;
  const ew = Math.min(W - 50, 420), eh = 52;
  const ex = W / 2 - ew / 2;
  const open = claimed >= ENDLESS_UNLOCK;
  cx.save();
  if (!open) cx.globalAlpha = 0.4;
  cx.fillStyle = '#2a1f2e';
  cx.fillRect(ex, ey, ew, eh);
  cx.strokeStyle = C.gold;
  cx.lineWidth = 2;
  cx.strokeRect(ex, ey, ew, eh);
  cx.fillStyle = C.gold;
  cx.font = 'bold 17px "Geist Mono", ui-monospace, monospace';
  cx.fillText('EL DORADO', W / 2, ey + 18);
  cx.fillStyle = 'rgba(230,207,160,0.75)';
  cx.font = '11px "Geist Mono", ui-monospace, monospace';
  cx.fillText(
    open ? (bestRun > 0 ? `the endless trail · best run $${bestRun}` : 'the endless trail — ride till you drop')
         : `claim ${ENDLESS_UNLOCK} bounties to unlock`,
    W / 2, ey + 37);
  cx.restore();
  if (open) uiZones.push({ x: ex, y: ey, w: ew, h: eh, fn: () => iris(() => startLevel(ENDLESS)) });

  cx.fillStyle = 'rgba(230,207,160,0.5)';
  cx.font = '12px "Geist Mono", ui-monospace, monospace';
  cx.fillText(isTouch ? 'tap a poster to ride out' : 'click a poster to ride out · M mute', W / 2, Math.min(ey + eh + 24, H - 14));
}

function drawDraft() {
  const d = pendingDraft;
  if (!d) { state = 'board'; return; }
  cx.fillStyle = C.paper;
  cx.font = 'bold 20px "Geist Mono", ui-monospace, monospace';
  cx.fillText(d.picked ? 'LOAD IT IN A CHAMBER' : 'DRAFT A SPELL-BULLET', W / 2, 170);
  uiZones = [];

  if (!d.picked) {
    const cw = Math.min(150, (W - 70) / 3), ch = cw * 1.35;
    const x0 = W / 2 - (cw * 3 + 40) / 2;
    d.offer.forEach((id, i) => {
      const spell = SPELLS[id];
      const x = x0 + i * (cw + 20), y = 200;
      const hover = !isTouch && mouseX > x && mouseX < x + cw && mouseY > y && mouseY < y + ch;
      cx.save();
      if (hover) { cx.translate(x + cw / 2, y + ch / 2); cx.scale(1.05, 1.05); cx.translate(-(x + cw / 2), -(y + ch / 2)); }
      cx.fillStyle = '#2a1f2e';
      cx.fillRect(x, y, cw, ch);
      cx.strokeStyle = spell.color;
      cx.lineWidth = 2.5;
      cx.strokeRect(x, y, cw, ch);
      cx.fillStyle = spell.color;
      cx.beginPath(); cx.arc(x + cw / 2, y + ch * 0.28, cw * 0.16, 0, TAU); cx.fill();
      cx.font = `bold ${cw * 0.1}px "Geist Mono", ui-monospace, monospace`;
      cx.fillText(spell.name, x + cw / 2, y + ch * 0.52);
      cx.fillStyle = 'rgba(245,240,230,0.7)';
      cx.font = `${Math.max(8, cw * 0.066)}px "Geist Mono", ui-monospace, monospace`;
      wrapText(spell.desc, x + cw / 2, y + ch * 0.68, cw - 16, cw * 0.09);
      cx.restore();
      uiZones.push({ x, y, w: cw, h: ch, fn: () => { d.picked = id; } });
    });
    // reroll the offer if you can pay the gunsmith
    const canReroll = cash >= 100;
    const ch2 = Math.min(150, (W - 70) / 3) * 1.35;
    const bw = 160, bh = 34, bx = W / 2 - bw / 2, by = 200 + ch2 + 26;
    cx.globalAlpha = canReroll ? 1 : 0.35;
    cx.strokeStyle = 'rgba(230,207,160,0.7)';
    cx.lineWidth = 1.5;
    cx.strokeRect(bx, by, bw, bh);
    cx.fillStyle = 'rgba(230,207,160,0.9)';
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.fillText('REROLL · $100', W / 2, by + bh / 2);
    cx.globalAlpha = 1;
    if (canReroll) {
      uiZones.push({
        x: bx, y: by, w: bw, h: bh,
        fn: () => {
          cash -= 100;
          localStorage.setItem('hexslinger.cash', cash);
          const pool = DRAFT_POOL.slice();
          d.offer = [];
          for (let i = 0; i < 3; i++) d.offer.push(pool.splice((Math.random() * pool.length) | 0, 1)[0]);
          SFX.spin();
        },
      });
    }
  } else {
    const R = 74, ccx = W / 2, ccy = Math.min(320, H * 0.45);
    cx.fillStyle = 'rgba(30,14,26,0.4)';
    cx.beginPath(); cx.arc(ccx, ccy, R + 30, 0, TAU); cx.fill();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU - Math.PI / 2;
      const px = ccx + Math.cos(a) * R, py = ccy + Math.sin(a) * R;
      const spell = SPELLS[loadout[i]];
      cx.fillStyle = spell.color;
      cx.beginPath(); cx.arc(px, py, 17, 0, TAU); cx.fill();
      cx.fillStyle = '#1c1018';
      cx.font = 'bold 9px "Geist Mono", ui-monospace, monospace';
      cx.fillText(loadout[i] === 'bolt' ? '·' : spell.name[0], px, py);
      uiZones.push({
        x: px - 22, y: py - 22, w: 44, h: 44,
        fn: () => {
          loadout[i] = d.picked;
          saveLoadout();
          pendingDraft = null;
          SFX.reload();
          state = 'board';
        },
      });
    }
    const spell = SPELLS[d.picked];
    cx.fillStyle = spell.color;
    cx.font = 'bold 15px "Geist Mono", ui-monospace, monospace';
    cx.fillText(spell.name + ' — pick its chamber', W / 2, ccy + R + 60);
  }
}

function drawLoadout() {
  cx.fillStyle = C.paper;
  cx.font = 'bold 20px "Geist Mono", ui-monospace, monospace';
  cx.fillText('YOUR CYLINDER', W / 2, 170);
  cx.fillStyle = 'rgba(230,207,160,0.6)';
  cx.font = '12px "Geist Mono", ui-monospace, monospace';
  cx.fillText('shots fire in order · tap two chambers to swap', W / 2, 196);
  uiZones = [];

  const R = 80, ccx = W / 2, ccy = Math.min(330, H * 0.42);
  cx.fillStyle = 'rgba(30,14,26,0.4)';
  cx.beginPath(); cx.arc(ccx, ccy, R + 34, 0, TAU); cx.fill();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * TAU - Math.PI / 2;
    const px = ccx + Math.cos(a) * R, py = ccy + Math.sin(a) * R;
    const spell = SPELLS[loadout[i]];
    if (selChamber === i) {
      cx.strokeStyle = '#fff';
      cx.lineWidth = 3;
      cx.beginPath(); cx.arc(px, py, 24, 0, TAU); cx.stroke();
    }
    cx.fillStyle = spell.color;
    cx.beginPath(); cx.arc(px, py, 19, 0, TAU); cx.fill();
    cx.fillStyle = '#1c1018';
    cx.font = 'bold 10px "Geist Mono", ui-monospace, monospace';
    cx.fillText(loadout[i] === 'bolt' ? '·' : spell.name[0], px, py);
    cx.fillStyle = 'rgba(230,207,160,0.5)';
    cx.font = '9px "Geist Mono", ui-monospace, monospace';
    cx.fillText(String(i + 1), ccx + Math.cos(a) * (R + 26), ccy + Math.sin(a) * (R + 26));
    uiZones.push({
      x: px - 24, y: py - 24, w: 48, h: 48,
      fn: () => {
        if (selChamber === -1) { selChamber = i; SFX.hit(); }
        else if (selChamber === i) { selChamber = -1; }
        else {
          const tmp = loadout[selChamber];
          loadout[selChamber] = loadout[i];
          loadout[i] = tmp;
          saveLoadout();
          selChamber = -1;
          SFX.reload();
        }
      },
    });
  }

  // legend
  let ly = ccy + R + 56;
  const inCyl = [...new Set(loadout)];
  cx.textAlign = 'center';
  for (const id of inCyl) {
    const s = SPELLS[id];
    cx.fillStyle = s.color;
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.fillText(s.name + ' — ' + s.desc, W / 2, ly);
    ly += 20;
    if (ly > H - 80) break;
  }

  const bw = 140, bh = 40, bx = W / 2 - bw / 2, by = Math.min(H - 60, ly + 16);
  cx.strokeStyle = C.gold;
  cx.lineWidth = 2;
  cx.strokeRect(bx, by, bw, bh);
  cx.fillStyle = C.gold;
  cx.font = 'bold 14px "Geist Mono", ui-monospace, monospace';
  cx.fillText('DONE', W / 2, by + bh / 2);
  uiZones.push({ x: bx, y: by, w: bw, h: bh, fn: () => { selChamber = -1; state = 'board'; } });
}

function drawStore() {
  cx.fillStyle = C.paper;
  cx.font = 'bold 20px "Geist Mono", ui-monospace, monospace';
  cx.fillText('GENERAL STORE', W / 2, 200);
  cx.fillStyle = 'rgba(230,207,160,0.6)';
  cx.font = '12px "Geist Mono", ui-monospace, monospace';
  cx.fillText('permanent gear for a wandering hexslinger', W / 2, 224);
  uiZones = [];

  const rw = Math.min(W - 40, 380), rh = 66;
  const rx = W / 2 - rw / 2;
  let y = 250;
  for (const key of Object.keys(UPGRADE_DEFS)) {
    const u = UPGRADE_DEFS[key];
    const lvl = upgrades[key];
    const maxed = lvl >= u.costs.length;
    const price = maxed ? 0 : u.costs[lvl];
    const afford = !maxed && cash >= price;
    cx.fillStyle = '#2a1f2e';
    cx.fillRect(rx, y, rw, rh);
    cx.strokeStyle = maxed ? C.gold : afford ? 'rgba(230,207,160,0.8)' : 'rgba(230,207,160,0.25)';
    cx.lineWidth = 2;
    cx.strokeRect(rx, y, rw, rh);
    cx.textAlign = 'left';
    cx.fillStyle = '#f5f0e6';
    cx.font = 'bold 13px "Geist Mono", ui-monospace, monospace';
    cx.fillText(u.name, rx + 14, y + 19);
    cx.fillStyle = 'rgba(245,240,230,0.6)';
    cx.font = '11px "Geist Mono", ui-monospace, monospace';
    cx.fillText(u.desc, rx + 14, y + 38);
    for (let i = 0; i < u.costs.length; i++) {
      cx.fillStyle = i < lvl ? C.gold : 'rgba(255,255,255,0.2)';
      cx.beginPath(); cx.arc(rx + 18 + i * 16, y + 53, 4, 0, TAU); cx.fill();
    }
    cx.textAlign = 'right';
    cx.fillStyle = maxed || afford ? C.gold : 'rgba(255,255,255,0.35)';
    cx.font = 'bold 14px "Geist Mono", ui-monospace, monospace';
    cx.fillText(maxed ? 'MAXED' : '$' + price, rx + rw - 14, y + rh / 2);
    cx.textAlign = 'center';
    if (afford) {
      const kk = key, pp = price;
      uiZones.push({
        x: rx, y, w: rw, h: rh,
        fn: () => {
          cash -= pp;
          localStorage.setItem('hexslinger.cash', cash);
          upgrades[kk] += 1;
          saveUpgrades();
          SFX.claim();
        },
      });
    }
    y += rh + 14;
  }

  const bw = 140, bh = 40, bx = W / 2 - bw / 2, by = Math.min(H - 58, y + 6);
  cx.strokeStyle = C.gold;
  cx.lineWidth = 2;
  cx.strokeRect(bx, by, bw, bh);
  cx.fillStyle = C.gold;
  cx.font = 'bold 14px "Geist Mono", ui-monospace, monospace';
  cx.fillText('DONE', W / 2, by + bh / 2);
  uiZones.push({ x: bx, y: by, w: bw, h: bh, fn: () => { state = 'board'; } });
}

function wrapText(txt, x, y, maxW, lh) {
  const words = txt.split(' ');
  let line = '', yy = y;
  for (const w2 of words) {
    const test = line ? line + ' ' + w2 : w2;
    if (cx.measureText(test).width > maxW && line) {
      cx.fillText(line, x, yy); line = w2; yy += lh;
    } else line = test;
  }
  if (line) cx.fillText(line, x, yy);
}

// ============================================================ main loop

let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  if (W !== window.innerWidth || H !== window.innerHeight) resize();
  let dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;
  if (state !== 'play') time += dt * (state === 'duel' ? 1 : 0.25);

  if (transition) {
    transition.t += dt;
    if (transition.phase === 'out' && transition.t >= transition.dur) {
      transition.cb();
      transition.phase = 'in';
      transition.t = 0;
    } else if (transition.phase === 'in' && transition.t >= transition.dur) {
      transition = null;
    }
  }

  if (state === 'play' || state === 'over') {
    let scale = 1;
    if (freezeT > 0) { freezeT -= dt; scale = 0.05; }
    if (deathSlow > 0) { deathSlow -= dt; scale = Math.min(scale, 0.18); }
    const sdt = dt * scale;
    if (state === 'play') update(sdt);
    else { overT += dt; updateFx(sdt); }
  } else if (state === 'duel') {
    updateDuel(dt);
    updateFx(dt);
  } else if (state === 'claimed') {
    overT += dt;
    updateFx(dt);
  }
  if (claimPending && (state === 'play' || state === 'duel')) {
    claimPending = false;
    claimBounty();
  }
  draw();
}
requestAnimationFrame(frame);
</script>
