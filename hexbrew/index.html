<!doctype html>
<!-- HEXBREW — hex-37 match-3 collect puzzle with simultaneity forging (forked from whorl/lab2) -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Hexbrew</title>
<meta name="description" content="Match, brew, collect — a hex match-3 puzzle where simultaneous matches forge new colours." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- top HUD ---------- */
/* goal chips: centered on their own row, prime real estate */
.chips{ position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:60px; right:58px; z-index:4;
  display:none; flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:none; }
.chip{ display:flex; align-items:center; gap:6px; background:var(--paper2); border:2.5px solid var(--ink);
  border-radius:999px; box-shadow:0 3px 0 var(--shadow); padding:4px 11px 4px 6px; font-family:var(--font-d);
  font-weight:600; font-size:16px; transition:transform .12s var(--pop); }
.chip.pulse{ transform:scale(1.18); }
.chip.done{ opacity:.55; }
.chip .dot{ width:16px; height:16px; border-radius:50%; border:2px solid var(--ink); flex:none; }
.chip.done .num::after{ content:"✓"; }
.chip.done .num{ font-size:13px; }
/* moves: bare ink numeral, top-right, no container */
.moves{ position:fixed; top:calc(env(safe-area-inset-top) + 6px); right:14px; z-index:4;
  display:none; text-align:center; pointer-events:none; }
.moves b{ font-family:var(--font-d); font-weight:700; font-size:34px; line-height:.95; display:block; color:var(--ink); }
.moves small{ font-family:var(--font-u); font-weight:800; font-size:9px; letter-spacing:.12em; color:var(--ink-soft); text-transform:uppercase; }
.moves.low b{ color:#ef4a5a; animation:mpulse 1.1s ease-in-out infinite; }
@keyframes mpulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.13); } }

/* ---------- overlays ---------- */
.screen{ position:fixed; inset:0; z-index:9; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:24px; background:rgba(240,230,207,.86); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .25s var(--calm); }
.screen.show{ opacity:1; pointer-events:auto; }
.logo{ font-family:var(--font-d); font-weight:700; font-size:52px; letter-spacing:.5px; color:var(--ink);
  text-shadow:0 4px 0 var(--shadow); }
.logo .b{ color:#f2913d; }
.tag{ font-family:var(--font-d); font-weight:600; font-size:16px; color:var(--ink-soft); margin-top:-6px; letter-spacing:.6px; }
.big{ font-family:var(--font-d); font-weight:700; font-size:38px; text-shadow:0 3px 0 var(--shadow); }
.sub{ font-family:var(--font-u); font-weight:700; font-size:15px; color:var(--ink-soft); text-align:center; max-width:280px; }
.stars{ display:flex; gap:12px; font-size:44px; }
.stars .s{ opacity:.28; filter:grayscale(1); transition:transform .3s var(--pop); }
.stars .s.on{ opacity:1; filter:none; }
.btn{ font-family:var(--font-d); font-weight:700; font-size:20px; padding:13px 30px; cursor:pointer;
  color:var(--ink); background:var(--accent); border:3px solid var(--ink); border-radius:16px;
  box-shadow:0 5px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.btn:active{ transform:translateY(5px); box-shadow:0 0 0 var(--shadow); }
.btn.alt{ background:var(--card); font-size:16px; padding:10px 22px; box-shadow:0 4px 0 var(--shadow); }
.btn.alt:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
.btnrow{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.goalsline{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.gpill{ display:flex; align-items:center; gap:5px; background:var(--paper2); border:2.5px solid var(--ink);
  border-radius:999px; padding:4px 11px 4px 7px; font-family:var(--font-d); font-weight:600; font-size:15px; box-shadow:0 2px 0 var(--shadow); }
.gpill .dot{ width:15px; height:15px; border-radius:50%; border:2px solid var(--ink); }
/* level select */
.lvgrid{ display:grid; grid-template-columns:repeat(4,58px); gap:12px; }
.lv{ width:58px; height:58px; border-radius:16px; background:var(--card); border:3px solid var(--ink);
  box-shadow:0 4px 0 var(--shadow); font-family:var(--font-d); font-weight:700; font-size:22px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; touch-action:manipulation;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); }
.lv:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
.lv.locked{ opacity:.4; cursor:default; background:var(--paper2); }
.lv .ss{ font-size:9px; letter-spacing:1px; color:var(--accent); text-shadow:0 1px 0 var(--ink); height:10px; }
.lv.locked .ss{ color:var(--ink-soft); text-shadow:none; }
.backbtn{ position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:12px; z-index:6;
  width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-d); font-weight:700; font-size:24px; line-height:1; padding-bottom:3px; cursor:pointer;
  color:var(--ink); background:var(--card); border:2.5px solid var(--ink); box-shadow:0 3px 0 var(--shadow);
  opacity:0; pointer-events:none; transition:opacity .2s, transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.backbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.backbtn.show{ opacity:1; pointer-events:auto; }
.lvtitle{ font-family:var(--font-d); font-weight:700; font-size:30px; text-shadow:0 3px 0 var(--shadow); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="backbtn" id="backBtn">‹</div>
<div class="chips" id="chips"></div>
<div class="moves" id="movesBox"><b id="movesNum">0</b><small>moves</small></div>

<!-- start -->
<div class="screen show" id="scrStart">
  <div class="logo">Hex<span class="b">brew</span></div>
  <div class="tag">match · brew · collect</div>
  <button class="btn" id="btnPlay">Play</button>
</div>

<!-- level select -->
<div class="screen" id="scrSelect">
  <div class="lvtitle">Levels</div>
  <div class="lvgrid" id="lvGrid"></div>
</div>

<!-- win -->
<div class="screen" id="scrWin">
  <div class="big">brewed it!</div>
  <div class="stars" id="winStars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
  <div class="sub" id="winSub"></div>
  <div class="btnrow">
    <button class="btn alt" id="btnWinSelect">Levels</button>
    <button class="btn" id="btnNext">Next ›</button>
  </div>
</div>

<!-- lose -->
<div class="screen" id="scrLose">
  <div class="big">out of moves</div>
  <div class="goalsline" id="loseGoals"></div>
  <div class="sub">so close — the brew needs a few more moves.</div>
  <div class="btnrow">
    <button class="btn alt" id="btnLoseSelect">Levels</button>
    <button class="btn" id="btnRetry">Retry</button>
  </div>
</div>

<script>
"use strict";
(function(){
// ================= constants =================
const PRIMS = ['R','Y','B'];
const SECS  = ['O','G','P'];
const HEX = { R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6' };
const WHITEC='#faf6ec', BOMBC='#2c2733';
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const DECOMP = { R:['R'], Y:['Y'], B:['B'], O:['R','Y'], G:['Y','B'], P:['R','B'] };
const MIX = { RY:'O', YR:'O', RB:'P', BR:'P', YB:'G', BY:'G' };
const NAME = { R:'red', Y:'yellow', B:'blue', O:'orange', G:'green', P:'purple', W:'white' };
function isSec(c){ return c==='O'||c==='G'||c==='P'; }
function colOf(c){ return c==='W'?WHITEC:(c==='K'?BOMBC:HEX[c]); }
const FORGE_COUNT=2;      // secondaries per double step
const BOMB_MIN=7;         // connected pop-group size that spawns a bomb
const MIN_MATCH=3;

// ---------- hexagon radius 3 (flat-top cells → vertical columns for gravity) ----------
const RAD=3;
const CELLS_QR=[]; { for(let q=-RAD;q<=RAD;q++){ const r1=Math.max(-RAD,-q-RAD), r2=Math.min(RAD,-q+RAD);
  for(let r=r1;r<=r2;r++) CELLS_QR.push([q,r]); } }               // 37 cells
const N = CELLS_QR.length;
const KEY = (q,r)=>q+','+r;
const IDX = {}; CELLS_QR.forEach(([q,r],i)=>IDX[KEY(q,r)]=i);
const NDELTA=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const NEIGH = CELLS_QR.map(([q,r])=> NDELTA.map(([dq,dr])=>IDX[KEY(q+dq,r+dr)]).filter(v=>v!==undefined));
const CUBE = CELLS_QR.map(([q,r])=>({x:q,z:r,y:-q-r}));
function hexDist(i,j){ const a=CUBE[i],b=CUBE[j]; return (Math.abs(a.x-b.x)+Math.abs(a.y-b.y)+Math.abs(a.z-b.z))/2; }
const COLUMNS = (()=>{ const m={}; CELLS_QR.forEach(([q,r],i)=>(m[q]=m[q]||[]).push(i));
  return Object.keys(m).map(q=>+q).sort((a,b)=>a-b).map(q=>m[q].sort((i,j)=>CELLS_QR[i][1]-CELLS_QR[j][1])); })();
const LINES = (()=>{ function build(keyf,ordf){ const m={};
    for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i]; const k=keyf(q,r); (m[k]=m[k]||[]).push([ordf(q,r),i]); }
    return Object.values(m).map(a=>a.sort((x,y)=>x[0]-y[0]).map(x=>x[1])).filter(l=>l.length>=3); }
  return { A:build((q)=>q,(q,r)=>r), B:build((q,r)=>r,(q)=>q), C:build((q,r)=>q+r,(q)=>q) }; })();
const ALL_LINES = [...LINES.A,...LINES.B,...LINES.C];
const CELL_LINES=(()=>{ const m=Array.from({length:N},()=>[]);
  for(const l of ALL_LINES) for(const ci of l) m[ci].push(l); return m; })();

// ================= levels =================
// goals: [{c, need}], moves: limit. Star thresholds derived from moves.
const LEVELS = [
  { goals:[{c:'R',need:15}], moves:20 },
  { goals:[{c:'B',need:15}], moves:20 },
  { goals:[{c:'R',need:12},{c:'Y',need:12}], moves:22 },
  { goals:[{c:'R',need:12},{c:'Y',need:12},{c:'B',need:12}], moves:26 },
  { goals:[{c:'O',need:6}], moves:22 },
  { goals:[{c:'G',need:6}], moves:22 },
  { goals:[{c:'P',need:6}], moves:22 },
  { goals:[{c:'O',need:5},{c:'G',need:5}], moves:26 },
  { goals:[{c:'R',need:20},{c:'O',need:6}], moves:26 },
  { goals:[{c:'O',need:6},{c:'G',need:6},{c:'P',need:6}], moves:30 },
  { goals:[{c:'W',need:1}], moves:22 },
  { goals:[{c:'O',need:8},{c:'W',need:1}], moves:28 },
  { goals:[{c:'O',need:5},{c:'G',need:5},{c:'P',need:5}], moves:28 },
  { goals:[{c:'G',need:6},{c:'W',need:2}], moves:30 },
  { goals:[{c:'O',need:8},{c:'G',need:8},{c:'P',need:8}], moves:32 },
  { goals:[{c:'O',need:6},{c:'G',need:6},{c:'P',need:6},{c:'W',need:2}], moves:34 },
];
function starThresholds(moves){ return { s3:Math.max(2,Math.round(moves*0.35)), s2:Math.max(1,Math.round(moves*0.15)) }; }

// ================= persistence =================
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function loadProgress(){ try{ const p=JSON.parse(lsGet('hb_progress','')); if(p&&p.unlocked) return p; }catch(e){}
  return { unlocked:1, stars:{} }; }
function saveProgress(){ lsSet('hb_progress', JSON.stringify(progress)); }
let progress = loadProgress();

// ================= canvas / layout =================
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W=390,H=800,DPR=1;
let size=26, ballRad=20, COL_DX=39, ROW_DY=45, latCX=195, latCY=440, topY=300;
function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const safeTop=0;
  const topHUD=96+safeTop, botPad=30, margin=14;
  const availH=H-topHUD-botPad, availW=W-2*margin;
  const sizeW=availW/10.7, sizeH=availH/12.1;
  size=Math.max(15,Math.min(30,Math.min(sizeW,sizeH)));
  ballRad=size*0.78;
  COL_DX=1.5*size; ROW_DY=Math.sqrt(3)*size;
  const boardH=6*ROW_DY+2*ballRad;
  latCX=W/2;
  const boardTop=topHUD+Math.max(0,(availH-boardH)/2);
  latCY=boardTop+ballRad+3*ROW_DY;
  topY=latCY-3*ROW_DY-ballRad;
  for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i];
    cells[i].x=latCX+COL_DX*q; cells[i].y=latCY+ROW_DY*(r+q/2); }
}
window.addEventListener('resize', ()=>{ layout(); });

// offscreen metaball for pop squish
const off=document.createElement('canvas'), octx=off.getContext('2d');
function sizeOff(){ off.width=Math.round(W*0.55); off.height=Math.round(H*0.55); }

// ================= state =================
// cell: {q,r,x,y,c, oy, shake, born, forgeFx, bombBorn, fresh}
const cells = CELLS_QR.map(([q,r])=>({q,r,x:0,y:0,c:'R',oy:0,shake:0,born:0,forgeFx:0,bombBorn:0,fresh:false}));
let state='start';            // start|select|play|win|lose
let level=1;                  // 1-based
let goals=[];                 // [{c,need,disp,chipEl}]
let collect={R:0,Y:0,B:0,O:0,G:0,P:0,W:0};
let movesLeft=0;
let resolver=null;
let lastResolve=null;
let selIdx=-1;
let puffs=[], sparks=[], flyers=[], shocks=[], popGoo=[];
let remixFx=null, chainLabel=null, brewLabel=null, flashFx=null;
let stats={ matches:0, maxChain:0, forges:0, whites:0, bombs:0, swaps:0, cascades:0, remixes:0 };
let winInfo=null;

function randPrim(){ return PRIMS[(Math.random()*3)|0]; }

// ================= match finding (white = wildcard) =================
function matchesColour(c,col){ return c===col || c==='W'; }
function findMatches(){
  const out=[];
  const COLOURS=['R','Y','B','O','G','P'];
  for(const line of ALL_LINES){
    for(const col of COLOURS){
      let k=0;
      while(k<line.length){
        if(matchesColour(cells[line[k]].c,col)){
          let j=k+1; while(j<line.length && matchesColour(cells[line[j]].c,col)) j++;
          const seg=line.slice(k,j);
          if(seg.length>=MIN_MATCH && seg.some(ci=>cells[ci].c===col)) out.push({cells:seg,colour:col,len:seg.length});
          k=j;
        } else k++;
      }
    }
  }
  return out;
}
function hasInstantMatch(){ return findMatches().length>0; }
function hasMatchingMove(){
  for(let a=0;a<N;a++){
    for(const b of NEIGH[a]){
      if(b<=a) continue;
      const ca=cells[a].c, cb=cells[b].c;
      if(ca==null||cb==null||ca==='K'||cb==='K'||ca===cb) continue;
      cells[a].c=cb; cells[b].c=ca;
      const hit=findMatches().some(m=>m.cells.includes(a)||m.cells.includes(b));
      cells[a].c=ca; cells[b].c=cb;
      if(hit) return true;
    }
  }
  return false;
}

// ================= board generation =================
function genNoMatch(){
  for(const cell of cells){ cell.c=randPrim(); cell.oy=0; cell.shake=0; cell.forgeFx=0; cell.bombBorn=0; cell.fresh=false; }
  let guard=0;
  while(guard++<400 && hasInstantMatch()){
    for(const m of findMatches()) for(const ci of m.cells) cells[ci].c=randPrim();
  }
}

// ================= remix (deadlock rescue) — free =================
function remixArrange(){
  const bag=cells.map(c=>c.c);
  for(let attempt=0; attempt<60; attempt++){
    for(let i=bag.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
    for(let i=0;i<N;i++) cells[i].c=bag[i];
    let g=0;
    while(g++<400 && hasInstantMatch()){
      const m=findMatches()[0]; const ci=m.cells[(Math.random()*m.cells.length)|0];
      let dj=-1; for(let t=0;t<60;t++){ const j=(Math.random()*N)|0; if(cells[j].c!==cells[ci].c && cells[j].c!=='K'){ dj=j; break; } }
      if(dj<0) break; const tmp=cells[ci].c; cells[ci].c=cells[dj].c; cells[dj].c=tmp;
    }
    if(!hasInstantMatch() && hasMatchingMove()) return true;
    for(let i=0;i<N;i++) bag[i]=cells[i].c;
  }
  return false;
}
function remix(force){
  if(!force && hasMatchingMove()) return false;
  if(cells.some(c=>c.c==='K'||c.c==null)) return false; // don't remix mid-cascade artefacts
  const before=cells.map(c=>c.c);
  const ok=remixArrange();
  if(!ok){ let g=0; do{ genNoMatch(); }while(!hasMatchingMove() && ++g<400); }
  remixFx={ t0:performance.now(), dur:700, from:before.map((c,i)=>({x:cells[i].x,y:cells[i].y,c})) };
  chainLabel={ n:-1, life:1.1, text:'remixed!' };
  for(let i=0;i<N;i++){ cells[i].born=performance.now(); cells[i].oy=0; }
  stats.remixes++;
  return true;
}
function ensurePlayable(){ if(hasMatchingMove()) return false; remix(true); return true; }

// ================= collection =================
function goalFor(c){ return goals.find(g=>g.c===c); }
function remainingOf(g){ return Math.max(0, g.need-collect[g.c]); }
function collectWhite(x,y){
  let best=null, bd=-1;
  for(const g of goals){ const rem=remainingOf(g); if(rem>bd && rem>0){ bd=rem; best=g; } }
  if(!best){ // no unmet goal — no effect, just sparkle
    for(let k=0;k<8;k++) sparks.push(mkSpark(x,y,WHITEC)); return; }
  collect[best.c]=Math.min(best.need, collect[best.c]+1);
  spawnFlyer(x,y,'W',best);
  for(let k=0;k<8;k++) sparks.push(mkSpark(x,y,WHITEC));
}
function collectBall(ci,c){
  const x=cells[ci].x, y=cells[ci].y+cells[ci].oy;
  spawnClearPuffs(x,y,c);
  if(c==='W'){ collectWhite(x,y); return; }
  if(collect[c]!==undefined) collect[c]++;
  const g=goalFor(c); if(g) spawnFlyer(x,y,c,g);
}

// ================= paced resolution =================
const SQUISH_DUR=0.22, FALL_MIN=0.18, FALL_MAX=0.30, BEAT_DUR=0.12, REFILL_DROP=0.26;

function createsMatchAt(ci){ for(const line of CELL_LINES[ci]){
    const pos=line.indexOf(ci); const c=cells[ci].c; if(c==null) return false;
    let n=1; for(let k=pos-1;k>=0&&matchesColour(cells[line[k]].c,c)&&cells[line[k]].c!=='K';k--)n++;
    for(let k=pos+1;k<line.length&&matchesColour(cells[line[k]].c,c)&&cells[line[k]].c!=='K';k++)n++;
    if(n>=MIN_MATCH) return true; } return false; }
function pickRefillColour(ci){
  const ok=[];
  for(const c of PRIMS){ cells[ci].c=c; if(!createsMatchAt(ci)) ok.push(c); }
  if(ok.length){ cells[ci].c=ok[(Math.random()*ok.length)|0]; return {c:cells[ci].c, biased:true}; }
  cells[ci].c=randPrim(); return {c:cells[ci].c, biased:false};
}
function centroidCells(arr){ let sx=0,sy=0; for(const i of arr){ sx+=cells[i].x; sy+=cells[i].y; }
  const n=Math.max(1,arr.length); return {x:sx/n,y:sy/n}; }
function findBombCentroids(clearSet){
  const arr=[...clearSet]; const inSet=new Set(arr); const seen=new Set(); const bombs=[];
  for(const start of arr){ if(seen.has(start))continue; const comp=[]; const st=[start]; seen.add(start);
    while(st.length){ const u=st.pop(); comp.push(u); for(const v of NEIGH[u]){ if(inSet.has(v)&&!seen.has(v)){ seen.add(v); st.push(v); } } }
    if(comp.length>=BOMB_MIN){ const o=centroidCells(comp);
      let best=comp[0],bd=1e9; for(const c of comp){ const d=(cells[c].x-o.x)**2+(cells[c].y-o.y)**2; if(d<bd){bd=d;best=c;} }
      bombs.push(best); } }
  return bombs;
}
function spawnPopGoo(match){ const col=colOf(match.colour); const o=centroidCells(match.cells);
  for(const ci of match.cells) popGoo.push({x:cells[ci].x,y:cells[ci].y,tx:o.x,ty:o.y,r:ballRad*0.85,col,t:0,dur:0.26}); }

// one resolution step: find distinct colours, decide forge, spawn bombs, clear+collect
function clearRound(matches, depth){
  stats.cascades++;
  const clearSet=new Set();
  for(const m of matches){ stats.matches++; spawnPopGoo(m); for(const ci of m.cells) clearSet.add(ci); }
  // forge decision (per step)
  const distinct=[...new Set(matches.map(m=>m.colour))];
  let order=null;
  if(distinct.length>=3){ order={type:'white',count:1}; }
  else if(distinct.length===2 && distinct.every(c=>PRIMS.includes(c))){
    const mix=MIX[distinct[0]+distinct[1]]; if(mix) order={type:'sec',colour:mix,count:FORGE_COUNT}; }
  if(order && resolver){ resolver.pendingForge.push(order);
    if(order.type==='white') brewFlash('white!', WHITEC); else brewFlash('brewed!', HEX[order.colour]); }
  // bombs from big connected groups
  const bombCells=findBombCentroids(clearSet);
  const bombSet=new Set(bombCells);
  // clear + collect
  for(const ci of clearSet){ const c=cells[ci].c; if(c==null||c==='K') continue;
    collectBall(ci,c); cells[ci].c=null; cells[ci].fresh=false; }
  // place bombs
  for(const bc of bombCells){ cells[bc].c='K'; cells[bc].bombBorn=performance.now(); cells[bc].oy=0; stats.bombs++;
    for(let k=0;k<8;k++) sparks.push(mkSpark(cells[bc].x,cells[bc].y,ACCENT)); }

  stats.maxChain=Math.max(stats.maxChain, depth);
}
function startResolve(){
  const matches=findMatches();
  if(!matches.length) return false;
  lastResolve=null;
  resolver={ phase:'squish', t:SQUISH_DUR, depth:1, pendingForge:[] };
  clearRound(matches,1);
  return true;
}
function compactColumns(){
  let maxDrop=1;
  for(const col of COLUMNS){
    const surv=[];
    for(let k=0;k<col.length;k++){ const ci=col[k]; if(cells[ci].c!=null) surv.push({c:cells[ci].c,fresh:cells[ci].fresh,bombBorn:cells[ci].bombBorn||0,fromK:k}); }
    const nEmpty=col.length-surv.length;
    for(let k=0;k<col.length;k++){ const ci=col[k];
      if(k<nEmpty){ cells[ci].c=null; cells[ci].fresh=false; cells[ci].bombBorn=0; cells[ci].oy=0; cells[ci].vy=0; }
      else { const s=surv[k-nEmpty]; cells[ci].c=s.c; cells[ci].fresh=s.fresh; cells[ci].bombBorn=s.bombBorn;
        cells[ci].oy=(s.fromK-k)*ROW_DY; cells[ci].vy=0; maxDrop=Math.max(maxDrop,k-s.fromK); } }
  }
  return maxDrop;
}
function refillEmpties(orders){
  const newSlots=cells.map((c,i)=>c.c==null?i:-1).filter(i=>i>=0);
  const byTop=newSlots.slice().sort((i,j)=>cells[i].y-cells[j].y);
  const used=new Set(); let idx=0;
  for(const o of orders){ for(let k=0;k<o.count && idx<byTop.length;k++){
      const ci=byTop[idx++]; used.add(ci);
      cells[ci].c=(o.type==='white')?'W':o.colour; cells[ci].fresh=false; cells[ci].forgeFx=performance.now();
      if(o.type==='white'){ stats.whites++; for(let s=0;s<10;s++) sparks.push(mkSpark(cells[ci].x,cells[ci].y,WHITEC)); }
      else stats.forges++;
    } }
  for(const ci of newSlots){ if(used.has(ci)) continue; const pick=pickRefillColour(ci); cells[ci].fresh=pick.biased; }
  for(const ci of newSlots) cells[ci].born=performance.now();
  let maxRows=1;
  for(const col of COLUMNS){ const empt=col.filter(ci=>newSlots.includes(ci));
    empt.forEach((ci,k)=>{ cells[ci].oy=-((empt.length-k)*ROW_DY+ROW_DY+18); cells[ci].vy=0;
      maxRows=Math.max(maxRows, empt.length-k+1.4); }); }
  return maxRows;
}
function detonateBombs(){
  const start=[]; for(let i=0;i<N;i++) if(cells[i].c==='K') start.push(i);
  const queue=start.slice(), done=new Set();
  while(queue.length){ const bi=queue.shift(); if(done.has(bi)) continue; done.add(bi);
    shocks.push({x:cells[bi].x,y:cells[bi].y,r:0,maxr:ROW_DY*3.4,t0:performance.now(),dur:520});
    for(let k=0;k<14;k++){ const p=mkPuff(cells[bi].x,cells[bi].y,ACCENT); p.life+=0.2; puffs.push(p); }
    cells[bi].c=null; cells[bi].bombBorn=0;
    for(let ci=0;ci<N;ci++){ if(ci===bi) continue; if(hexDist(ci,bi)<=1){ const c=cells[ci].c; if(c==null) continue;
      if(c==='K'){ if(!done.has(ci)) queue.push(ci); }
      else { collectBall(ci,c); cells[ci].c=null; cells[ci].fresh=false; } } }
  }

}
function stepResolver(dt){
  if(!resolver) return;
  resolver.t-=dt; if(resolver.t>0) return;
  if(resolver.phase==='squish'){
    const maxDrop=compactColumns();
    resolver.phase='fall'; resolver.t=0.10+Math.sqrt(maxDrop)*0.2;
  } else if(resolver.phase==='fall'){
    for(const c of cells){ c.oy=0; c.vy=0; }
    resolver.phase='beat'; resolver.t=BEAT_DUR;
  } else {
    let matches=findMatches();
    let guard=0;
    while(guard++<8 && matches.some(m=>m.cells.some(ci=>cells[ci].fresh))){
      for(const m of matches) for(const ci of m.cells){ if(cells[ci].fresh){ const p=pickRefillColour(ci); if(!p.biased) cells[ci].fresh=false; } }
      matches=findMatches();
    }
    if(matches.length){ resolver.depth++; clearRound(matches,resolver.depth); resolver.phase='squish'; resolver.t=SQUISH_DUR; }
    else if(cells.some(c=>c.c==null)){ const rows=refillEmpties(resolver.pendingForge); resolver.pendingForge=[]; resolver.phase='fall'; resolver.t=0.10+Math.sqrt(rows)*0.2; }
    else if(cells.some(c=>c.c==='K')){ detonateBombs(); resolver.phase='squish'; resolver.t=SQUISH_DUR; }
    else { for(const c of cells) c.fresh=false; lastResolve={depth:resolver.depth}; resolver=null; onSettle(); }
  }
}

// ================= swap =================
function adjacent(a,b){ return NEIGH[a].includes(b); }
function swapCore(a,b){
  if(state!=='play') return {type:'blocked',reason:'state'};
  if(resolver) { refuse(a,b); return {type:'blocked',reason:'resolving'}; }
  if(movesLeft<=0) return {type:'blocked',reason:'nomoves'};
  if(a===b||a<0||b<0||a>=N||b>=N) return {type:'blocked',reason:'bad'};
  if(!adjacent(a,b)){ return {type:'blocked',reason:'nonadjacent'}; }
  const ca=cells[a].c, cb=cells[b].c;
  if(ca==null||cb==null||ca==='K'||cb==='K') return {type:'blocked',reason:'empty'};
  if(ca===cb){ refuse(a,b); return {type:'blocked',reason:'same'}; }
  cells[a].c=cb; cells[b].c=ca; animSwap(a,b);
  const trig=findMatches().filter(m=>m.cells.includes(a)||m.cells.includes(b));
  movesLeft--; stats.swaps++; vibrate(20);
  if(trig.length>0){ startResolve(); return {type:'match'}; }
  // positional swap — legal, no bounce-back, costs the move
  ensurePlayable(); onSettle();
  return {type:'positional'};
}
function animSwap(a,b){ cells[a].shake=Math.max(cells[a].shake,0.3); cells[b].shake=Math.max(cells[b].shake,0.3);
  cells[a].born=performance.now(); cells[b].born=performance.now(); }
function refuse(a,b){ if(cells[a])cells[a].shake=0.5; if(cells[b])cells[b].shake=0.5; }

function onSettle(){
  if(state!=='play') return;
  ensurePlayable();
  if(goals.length && goals.every(g=>collect[g.c]>=g.need)){ winLevel(); }
  else if(movesLeft<=0){ loseLevel(); }
}

// ================= level flow =================
function loadLevel(n){
  n=Math.max(1,Math.min(LEVELS.length,n)); level=n;
  const L=LEVELS[n-1];
  goals=L.goals.map(g=>({c:g.c, need:g.need, disp:g.need, chipEl:null}));
  collect={R:0,Y:0,B:0,O:0,G:0,P:0,W:0};
  movesLeft=L.moves;
  resolver=null; lastResolve=null; selIdx=-1; winInfo=null;
  puffs=[]; sparks=[]; flyers=[]; shocks=[]; popGoo=[]; remixFx=null; chainLabel=null; brewLabel=null; flashFx=null;
  stats={ matches:0, maxChain:0, forges:0, whites:0, bombs:0, swaps:0, cascades:0, remixes:0 };
  layout();
  genNoMatch(); ensurePlayable();
  buildChips();
  setState('play');
  updateHUD();
}
function winLevel(){
  const th=starThresholds(LEVELS[level-1].moves);
  const st = movesLeft>=th.s3?3 : movesLeft>=th.s2?2 : 1;
  winInfo={ stars:st, moves:movesLeft };
  if(!progress.stars[level] || progress.stars[level]<st) progress.stars[level]=st;
  if(level+1>progress.unlocked && level<LEVELS.length) progress.unlocked=level+1;
  saveProgress();
  setState('win');
  showWinScreen();
}
function loseLevel(){ setState('lose'); showLoseScreen(); }

// ================= particles =================
function mkPuff(x,y,col){ const a=Math.random()*6.28, sp=40+Math.random()*90;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:0.5+Math.random()*0.3,max:0.8,r:4+Math.random()*5,col}; }
function mkSpark(x,y,col){ const a=Math.random()*6.28, sp=60+Math.random()*120;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6,max:0.6,r:3+Math.random()*3,col}; }
function spawnClearPuffs(x,y,c){ const col=colOf(c); for(let k=0;k<5;k++) puffs.push(mkPuff(x,y,col)); }
function spawnFlyer(x,y,c,g){ flyers.push({x,y,c,g,t:0,dur:0.5,started:performance.now()}); }
function brewFlash(text,col){ brewLabel={text,col,life:1.2,born:performance.now()}; flashFx={col,born:performance.now(),dur:420}; vibrate([10,20]); }
function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ================= update / render =================
let last=performance.now();
function tick(now){ let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now; update(dt,now); render(now); requestAnimationFrame(tick); }
function update(dt,now){
  stepResolver(dt);
  const FG=ROW_DY*55; // gravity: balls accelerate into holes instead of easing (a 1-row drop ≈ 190ms, visible)
  for(const cell of cells){
    if(cell.oy<0){ cell.vy=(cell.vy||0)+FG*dt; cell.oy+=cell.vy*dt;
      if(cell.oy>=0){ cell.oy=0; cell.vy=0; cell.land=performance.now(); } }
    else if(cell.oy!==0){ cell.oy=0; cell.vy=0; }
    cell.shake=Math.max(0,cell.shake-dt*2.4); }
  for(const g of popGoo){ g.t+=dt; g.x+=(g.tx-g.x)*Math.min(1,dt*13); g.y+=(g.ty-g.y)*Math.min(1,dt*13);
    g.r+=(ballRad*0.35-g.r)*Math.min(1,dt*8); }
  popGoo=popGoo.filter(g=>g.t<g.dur);
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs=puffs.filter(p=>p.life>0);
  for(const p of sparks){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.2,dt); p.vy*=Math.pow(0.2,dt); }
  sparks=sparks.filter(p=>p.life>0);
  // flyers → chip
  for(const f of flyers){ f.t+=dt; const tgt=chipCenter(f.g);
    const k=Math.min(1,f.t/f.dur); const e=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    f.cx=f.x+(tgt.x-f.x)*e; f.cy=f.y+(tgt.y-f.y)*e - Math.sin(k*Math.PI)*24;
    if(f.t>=f.dur && !f.landed){ f.landed=true; pulseChip(f.g); } }
  flyers=flyers.filter(f=>f.t<f.dur+0.02);
  shocks=shocks.filter(s=>now-s.t0<s.dur);
  if(remixFx && now-remixFx.t0>=remixFx.dur) remixFx=null;
  if(chainLabel){ chainLabel.life-=dt; if(chainLabel.life<=0) chainLabel=null; }
  if(brewLabel){ brewLabel.life-=dt; if(brewLabel.life<=0) brewLabel=null; }
  if(flashFx && now-flashFx.born>=flashFx.dur) flashFx=null;
  updateHUD();
}
function render(now){
  ctx.clearRect(0,0,W,H);
  if(state==='start'||state==='select'){ return; }  // overlays cover the board
  drawBoardBack();
  drawBalls(now);
  drawPopGoo();
  drawShocks(now);
  drawRemix(now);
  drawPuffs();
  drawFlyers(now);
  drawChain(now);
  drawBrew(now);
  drawFlash(now);
}
function drawBoardBack(){
  // no card/border — balls sit directly on the paper; only faint wells mark the cells
  ctx.save();
  for(let i=0;i<N;i++){ ctx.beginPath(); ctx.arc(cells[i].x,cells[i].y,ballRad*0.92,0,6.2832);
    ctx.fillStyle='rgba(44,39,51,.05)'; ctx.fill(); }
  ctx.restore();
}
function stickerCircle(x,y,r,fill,rim,lw){ ctx.save();
  ctx.shadowColor='rgba(44,39,51,.28)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent'; ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke(); ctx.restore(); }
function drawBalls(now){
  const remixing = remixFx && (now-remixFx.t0)<remixFx.dur;
  for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null) continue;
    let x=b.x, y=b.y+b.oy;
    if(b.shake>0) x+=Math.sin(now/26+i)*b.shake*5;
    if(remixing){ const f=ease((now-remixFx.t0)/remixFx.dur);
      const ang=(i*0.53)+(1-f)*5.0; const rr=(1-f)*(90+((i*13)%60));
      x=latCX+Math.cos(ang)*rr + (b.x-latCX)*f; y=latCY+Math.sin(ang)*rr*0.7 + (b.y-latCY)*f; }
    let r=ballRad + Math.sin(now/170+i)*0.6;
    const age=now-b.born; if(age<260){ const f=age/260; r*=0.62+0.38*f; }
    if(b.c==='K'){ drawBomb(x,y,r,now,i); continue; }
    let sq=0; if(b.land){ const la=now-b.land; if(la<140) sq=1-la/140; else b.land=0; }
    if(sq>0){ ctx.save(); ctx.translate(x,y); ctx.scale(1+0.16*sq,1-0.22*sq); ctx.translate(-x,-y); }
    const sel=(i===selIdx);
    stickerCircle(x,y,r,colOf(b.c),INK,sel?4:3);
    if(isSec(b.c)){ ctx.save(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(x,y,r-4,0,6.2832); ctx.stroke(); ctx.restore(); }
    if(b.c==='W'){ // prism sparkle
      ctx.save(); for(let k=0;k<3;k++){ const a=now/380+k*2.09; const rr=r*0.5;
        ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,2.4,0,6.28);
        ctx.fillStyle=[HEX.R,HEX.B,HEX.G][k]; ctx.globalAlpha=0.7; ctx.fill(); }
      ctx.restore(); }
    ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.34,r*0.24,0,6.28); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill();
    if(sq>0) ctx.restore();
    if(b.forgeFx && now-b.forgeFx<600){ const f=(now-b.forgeFx)/600; ctx.save(); ctx.globalAlpha=1-f;
      for(let k=0;k<4;k++){ const a=k*1.57+f*4; const rr=r+3+f*10;
        ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,2.2*(1-f)+1,0,6.28); ctx.fillStyle=ACCENT; ctx.fill(); }
      ctx.restore(); }
    if(sel){ ctx.beginPath(); ctx.arc(x,y,r+4,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=2.6; ctx.stroke();
      for(const ni of NEIGH[i]){ const nb=cells[ni]; if(nb.c==null) continue; ctx.beginPath(); ctx.arc(nb.x,nb.y+nb.oy,ballRad+2,0,6.28);
        ctx.strokeStyle='rgba(255,209,92,.4)'; ctx.lineWidth=2; ctx.stroke(); } }
  }
}
function drawBomb(x,y,r,now,i){

  ctx.beginPath(); ctx.arc(x-r*0.28,y-r*0.3,r*0.22,0,6.28); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();

  ctx.beginPath(); ctx.arc(x+r*0.7,y-r*1.15,1.8*fl,0,6.28); ctx.fillStyle='#fff6d8'; ctx.fill();
}
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function drawPopGoo(){

function drawShocks(now){ for(const s of shocks){ let f=(now-s.t0)/s.dur; if(f<0)f=0; if(f>=1)continue; const r=f*s.maxr;

function drawChain(now){ if(!chainLabel) return; const a=Math.max(0,chainLabel.life/1.1);
  const txt=chainLabel.text||('chain ×'+chainLabel.n);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 20px Fredoka, sans-serif';
  const y=topY-22-(1-a)*10;
  ctx.lineWidth=4; ctx.strokeStyle=PAPER; ctx.strokeText(txt,W/2,y); ctx.fillStyle=chainLabel.text?HEX.P:ACCENT; ctx.fillText(txt,W/2,y); ctx.restore(); }
function drawBrew(now){ if(!brewLabel) return; const a=Math.max(0,brewLabel.life/1.2);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 26px Fredoka, sans-serif';
  const y=latCY-(1-a)*30;
  ctx.lineWidth=5; ctx.strokeStyle=INK; ctx.strokeText(brewLabel.text,W/2,y);
  ctx.fillStyle=brewLabel.col; ctx.fillText(brewLabel.text,W/2,y); ctx.restore(); }
function drawFlash(now){ if(!flashFx) return; const f=(now-flashFx.born)/flashFx.dur; if(f<0||f>=1) return;
  ctx.save(); ctx.globalAlpha=(1-f)*0.16; ctx.fillStyle=flashFx.col; ctx.fillRect(0,0,W,H); ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function ease(t){ t=Math.max(0,Math.min(1,t)); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

// ================= HUD (DOM) =================
const chipsEl=document.getElementById('chips'), movesNum=document.getElementById('movesNum'), movesBox=document.getElementById('movesBox');
function buildChips(){
  chipsEl.innerHTML='';
  for(const g of goals){ const el=document.createElement('div'); el.className='chip';
    const dot=document.createElement('span'); dot.className='dot'; dot.style.background=colOf(g.c);
    if(g.c==='W') dot.style.background='conic-gradient('+HEX.R+','+HEX.Y+','+HEX.G+','+HEX.B+','+HEX.P+','+HEX.R+')';
    const num=document.createElement('span'); num.className='num';
    el.appendChild(dot); el.appendChild(num); chipsEl.appendChild(el); g.chipEl=el; g.numEl=num; }
}
function chipCenter(g){ if(!g||!g.chipEl) return {x:W/2,y:40}; const r=g.chipEl.getBoundingClientRect();
  return { x:r.left+r.width/2, y:r.top+r.height/2 }; }
function pulseChip(g){ if(!g||!g.chipEl) return; g.chipEl.classList.remove('pulse'); void g.chipEl.offsetWidth; g.chipEl.classList.add('pulse');
  setTimeout(()=>g.chipEl&&g.chipEl.classList.remove('pulse'),160); }
function updateHUD(){
  for(const g of goals){ if(!g.numEl) continue; const rem=remainingOf(g);
    if(rem<=0){ g.chipEl.classList.add('done'); g.numEl.textContent=''; }
    else { g.chipEl.classList.remove('done'); g.numEl.textContent=rem; } }
  movesNum.textContent=movesLeft;
  movesBox.classList.toggle('low', movesLeft<=5 && state==='play');
}

// ================= screens =================
const scr={ start:document.getElementById('scrStart'), select:document.getElementById('scrSelect'),
  win:document.getElementById('scrWin'), lose:document.getElementById('scrLose') };
const backBtn=document.getElementById('backBtn');
function setState(s){ state=s;
  for(const k in scr) scr[k].classList.toggle('show', s===k);
  const play=(s==='play');
  chipsEl.style.display=play?'flex':'none';
  movesBox.style.display=play?'block':'none';
  backBtn.classList.toggle('show', play);
}
function goSelect(){ buildLvGrid(); setState('select'); }
function buildLvGrid(){ const grid=document.getElementById('lvGrid'); grid.innerHTML='';
  for(let i=1;i<=LEVELS.length;i++){ const el=document.createElement('div'); el.className='lv';
    const unlocked=i<=progress.unlocked;
    if(!unlocked) el.classList.add('locked');
    const num=document.createElement('div'); num.textContent=unlocked?i:'🔒'; if(!unlocked) num.style.fontSize='20px';
    const ss=document.createElement('div'); ss.className='ss';
    const st=progress.stars[i]||0; ss.textContent=st?'★'.repeat(st):'';
    el.appendChild(num); el.appendChild(ss);
    if(unlocked) el.addEventListener('click', ()=>loadLevel(i));
    grid.appendChild(el); } }
function showWinScreen(){
  const stars=document.getElementById('winStars').children;
  for(let k=0;k<3;k++) stars[k].classList.toggle('on', k<winInfo.stars);
  document.getElementById('winSub').textContent = (level<LEVELS.length)
    ? `${winInfo.moves} move${winInfo.moves===1?'':'s'} to spare · ${winInfo.stars}★`
    : `you finished Hexbrew! ${winInfo.stars}★`;
  const nb=document.getElementById('btnNext'); nb.style.display=(level<LEVELS.length)?'':'none';
}
function showLoseScreen(){ const g=document.getElementById('loseGoals'); g.innerHTML='';
  for(const goal of goals){ const el=document.createElement('div'); el.className='gpill';
    const dot=document.createElement('span'); dot.className='dot'; dot.style.background=colOf(goal.c);
    if(goal.c==='W') dot.style.background='conic-gradient('+HEX.R+','+HEX.Y+','+HEX.B+','+HEX.R+')';
    const t=document.createElement('span'); t.textContent=Math.min(collect[goal.c],goal.need)+'/'+goal.need;
    el.appendChild(dot); el.appendChild(t); g.appendChild(el); } }

document.getElementById('btnPlay').addEventListener('click', goSelect);
document.getElementById('btnNext').addEventListener('click', ()=>loadLevel(level+1));
document.getElementById('btnRetry').addEventListener('click', ()=>loadLevel(level));
document.getElementById('btnWinSelect').addEventListener('click', goSelect);
document.getElementById('btnLoseSelect').addEventListener('click', goSelect);
backBtn.addEventListener('click', goSelect);

// ================= input =================
function getPos(ev){ const rect=canvas.getBoundingClientRect(); let cx,cy;
  if(ev.touches&&ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
  else if(ev.changedTouches&&ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top}; }
function ballAt(x,y){ let best=-1,bd=ballRad*1.3; for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null||b.c==='K') continue;
  const d=Math.hypot(x-b.x,y-b.y); if(d<bd){bd=d;best=i;} } return best; }
let dragStart=-1, downPos={x:0,y:0}, movedFar=false;
function onDown(ev){ if(state!=='play') return; const p=getPos(ev);
  const i=ballAt(p.x,p.y); if(i<0){ return; }
  ev.preventDefault(); dragStart=i; downPos=p; movedFar=false; }
function onMove(ev){ if(dragStart<0) return; const p=getPos(ev); ev.preventDefault();
  if(!movedFar && Math.hypot(p.x-downPos.x,p.y-downPos.y)>ballRad*0.5) movedFar=true; }
function onUp(ev){ if(dragStart<0) return; ev.preventDefault(); const p=getPos(ev);
  const start=dragStart; dragStart=-1;
  if(movedFar){ let best=-1,bd=1e9; for(const ni of NEIGH[start]){ const n=cells[ni]; const d=(n.x-p.x)**2+(n.y-p.y)**2; if(d<bd){bd=d;best=ni;} }
    if(best>=0){ swapCore(start,best); selIdx=-1; return; } }
  if(selIdx<0){ selIdx=start; }
  else if(selIdx===start){ selIdx=-1; }
  else if(adjacent(selIdx,start)){ swapCore(selIdx,start); selIdx=-1; }
  else { selIdx=start; }
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});

// ================= debug handle =================
window.HB = {
  get board(){ return cells.map((b,i)=>({i,q:b.q,r:b.r,c:b.c,x:b.x,y:b.y})); },
  get state(){ return state; },
  get level(){ return level; },
  get movesLeft(){ return movesLeft; },
  get goals(){ return goals.map(g=>({c:g.c,need:g.need,remaining:remainingOf(g)})); },
  get collect(){ return Object.assign({},collect); },
  get stats(){ return Object.assign({},stats); },
  get resolving(){ return !!resolver; },
  get pendingForge(){ return resolver?resolver.pendingForge.map(o=>Object.assign({},o)):[]; },
  get winState(){ return (state==='win')?'win':(state==='lose'?'lose':null); },
  get winInfo(){ return winInfo?Object.assign({},winInfo):null; },
  get progress(){ return JSON.parse(JSON.stringify(progress)); },
  colours(){ return cells.map(c=>c.c); },
  neighbors(i){ return NEIGH[i]?NEIGH[i].slice():[]; },
  lines(){ return ALL_LINES.map(l=>l.slice()); },
  hexDist(i,j){ return hexDist(i,j); },
  setBall(i,c){ if(cells[i]){ cells[i].c=c; cells[i].oy=0; cells[i].fresh=false; cells[i].bombBorn=(c==='K')?performance.now():0; } },
  setMoves(n){ movesLeft=Math.max(0,n|0); },
  sanitizeExcept(prot){ const P=new Set(prot); for(let i=0;i<N;i++){ if(!P.has(i)){ cells[i].c=randPrim(); cells[i].fresh=false; cells[i].bombBorn=0; } }
    let g=0; while(g++<800 && hasInstantMatch()){ const ms=findMatches();
      if(ms.every(m=>m.cells.every(ci=>P.has(ci)))) break;
      for(const m of ms) for(const ci of m.cells){ if(!P.has(ci)) cells[ci].c=randPrim(); } } },
  swap(a,b){ return swapCore(a,b); },
  triggerResolve(){ if(resolver) return false; return startResolve(); },
  findMatches(){ return findMatches().map(m=>({cells:m.cells.slice(),colour:m.colour,len:m.len})); },
  hasMatchingMove(){ return hasMatchingMove(); },
  hasInstantMatch(){ return hasInstantMatch(); },
  forceRemix(){ return remix(true); },
  loadLevel(n){ loadLevel(n); },
  goSelect(){ goSelect(); },
  step(ms){ let t=ms||16; while(t>0){ const d=Math.min(16,t)/1000; update(d,performance.now()); t-=16; } },
  settle(maxMs){ let t=maxMs||20000; while(resolver && t>0){ update(0.016,performance.now()); t-=16; } return !resolver; },
  levels(){ return LEVELS.map(l=>({goals:l.goals.map(g=>Object.assign({},g)),moves:l.moves})); },
  resetProgress(){ progress={unlocked:1,stars:{}}; saveProgress(); }
};

// ================= boot =================
layout();
genNoMatch();
setState('start');
requestAnimationFrame(tick);
})();
</script>
