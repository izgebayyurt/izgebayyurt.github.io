<!doctype html>
<!-- HEXBREW — hex-37 match-3 collect puzzle with simultaneity forging (forked from whorl/lab2) -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Hexbrew</title>
<meta name="description" content="Match, brew, collect — a hex match-3 puzzle where simultaneous matches forge new colours." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- top HUD ---------- */
/* goal chips: centered on their own row, prime real estate */
/* 84px gutters: back button (left) and the MOVES numeral (right) each keep clear air,
   even with 5 goal chips on a 360-428px screen */
.chips{ position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:84px; right:84px; z-index:4;
  display:none; flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:none; }
.chip{ display:flex; align-items:center; gap:6px; background:var(--paper2); border:2.5px solid var(--ink);
  border-radius:999px; box-shadow:0 3px 0 var(--shadow); padding:4px 11px 4px 6px; font-family:var(--font-d);
  font-weight:600; font-size:16px; transition:transform .12s var(--pop); }
.chip.pulse{ transform:scale(1.18); }
.chip.done{ opacity:.55; }
.dot{ display:inline-block; width:16px; height:16px; border-radius:50%; border:2px solid var(--ink); flex:none; }
.gicon{ display:inline-flex; align-items:center; gap:3px; }
.chip .gicon{ display:flex; font-size:14px; line-height:1; }
.dot.ink{ border-radius:50% 50% 50% 0; transform:rotate(-45deg); background:#2c2733; }
.dot.mini{ width:10px; height:10px; border-width:1.5px; margin-left:-1px; }
.chip.done .num::after{ content:"✓"; }
.chip.done .num{ font-size:13px; }
/* moves: bare ink numeral, top-right, no container */
.moves{ position:fixed; top:calc(env(safe-area-inset-top) + 6px); right:14px; z-index:4;
  display:none; text-align:center; pointer-events:none; }
.moves b{ font-family:var(--font-d); font-weight:700; font-size:34px; line-height:.95; display:block; color:var(--ink); }
.moves small{ font-family:var(--font-u); font-weight:800; font-size:9px; letter-spacing:.12em; color:var(--ink-soft); text-transform:uppercase; }
.moves.low b{ color:#ef4a5a; animation:mpulse 1.1s ease-in-out infinite; }
@keyframes mpulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.13); } }

/* ---------- overlays ---------- */
.screen{ position:fixed; inset:0; z-index:9; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:24px; background:rgba(240,230,207,.86); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .25s var(--calm); }
.screen.show{ opacity:1; pointer-events:auto; }
.logo{ font-family:var(--font-d); font-weight:700; font-size:52px; letter-spacing:.5px; color:var(--ink);
  text-shadow:0 4px 0 var(--shadow); }
.logo .b{ color:#f2913d; }
.tag{ font-family:var(--font-d); font-weight:600; font-size:16px; color:var(--ink-soft); margin-top:-6px; letter-spacing:.6px; }
.big{ font-family:var(--font-d); font-weight:700; font-size:38px; text-shadow:0 3px 0 var(--shadow); }
.sub{ font-family:var(--font-u); font-weight:700; font-size:15px; color:var(--ink-soft); text-align:center; max-width:280px; }
.stars{ display:flex; gap:12px; font-size:44px; }
.stars .s{ opacity:.28; filter:grayscale(1); transition:transform .3s var(--pop); }
.stars .s.on{ opacity:1; filter:none; }
.btn{ font-family:var(--font-d); font-weight:700; font-size:20px; padding:13px 30px; cursor:pointer;
  color:var(--ink); background:var(--accent); border:3px solid var(--ink); border-radius:16px;
  box-shadow:0 5px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.btn:active{ transform:translateY(5px); box-shadow:0 0 0 var(--shadow); }
.btn.alt{ background:var(--card); font-size:16px; padding:10px 22px; box-shadow:0 4px 0 var(--shadow); }
.btn.alt:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
.btnrow{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.goalsline{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.gpill{ display:flex; align-items:center; gap:5px; background:var(--paper2); border:2.5px solid var(--ink);
  border-radius:999px; padding:4px 11px 4px 7px; font-family:var(--font-d); font-weight:600; font-size:15px; box-shadow:0 2px 0 var(--shadow); }
.gpill .dot{ width:15px; height:15px; border-radius:50%; border:2px solid var(--ink); }
.gpill .gicon{ display:flex; align-items:center; gap:3px; font-size:13px; }
/* level select: named cards with goal icons */
.lvwrap{ max-height:72vh; overflow-y:auto; padding:4px 2px; width:100%; max-width:334px; }
.lvgrid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.lv{ width:100%; max-width:160px; min-height:58px; border-radius:14px; background:var(--card); border:3px solid var(--ink);
  box-shadow:0 4px 0 var(--shadow); font-family:var(--font-d); cursor:pointer; padding:7px 10px 8px;
  display:flex; flex-direction:column; align-items:flex-start; justify-content:center; gap:3px; touch-action:manipulation;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); }
.lv .nm{ font-size:13px; font-weight:700; line-height:1.15; display:flex; gap:5px; align-items:baseline; }
.lv .nm b{ color:var(--ink-soft); font-weight:600; font-size:11px; }
.lv .ic{ display:flex; gap:5px; align-items:center; font-size:12px; height:15px; }
.lv .ic .dot{ width:11px; height:11px; border-width:1.5px; }
.lv .ic .dot.mini{ width:8px; height:8px; }
.lv:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
.lv.locked{ opacity:.4; cursor:default; background:var(--paper2); }
.lv .ss{ font-size:10px; letter-spacing:1px; color:var(--accent); text-shadow:0 1px 0 var(--ink); margin-left:auto; }
.lv.locked .ss{ color:var(--ink-soft); text-shadow:none; }
.backbtn{ position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:12px; z-index:6;
  width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-d); font-weight:700; font-size:24px; line-height:1; padding-bottom:3px; cursor:pointer;
  color:var(--ink); background:var(--card); border:2.5px solid var(--ink); box-shadow:0 3px 0 var(--shadow);
  opacity:0; pointer-events:none; transition:opacity .2s, transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.backbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.backbtn.show{ opacity:1; pointer-events:auto; }
.mutebtn{ position:fixed; left:12px; bottom:calc(env(safe-area-inset-bottom) + 12px); z-index:10;
  width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:17px; cursor:pointer; background:var(--card); border:2.5px solid var(--ink); box-shadow:0 3px 0 var(--shadow);
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.mutebtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.lvtitle{ font-family:var(--font-d); font-weight:700; font-size:30px; text-shadow:0 3px 0 var(--shadow); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="backbtn" id="backBtn">‹</div>
<div class="mutebtn" id="muteBtn">🔊</div>
<div class="chips" id="chips"></div>
<div class="moves" id="movesBox"><b id="movesNum">0</b><small>moves</small></div>

<!-- start -->
<div class="screen show" id="scrStart">
  <div class="logo">Hex<span class="b">brew</span></div>
  <div class="tag">match · brew · collect</div>
  <button class="btn" id="btnPlay">Play</button>
</div>

<!-- level select -->
<div class="screen" id="scrSelect">
  <div class="lvtitle">Levels</div>
  <div class="lvwrap"><div class="lvgrid" id="lvGrid"></div></div>
</div>

<!-- win -->
<div class="screen" id="scrWin">
  <div class="big">brewed it!</div>
  <div class="stars" id="winStars"><span class="s">★</span><span class="s">★</span><span class="s">★</span></div>
  <div class="sub" id="winSub"></div>
  <div class="btnrow">
    <button class="btn alt" id="btnWinSelect">Levels</button>
    <button class="btn" id="btnNext">Next ›</button>
  </div>
</div>

<!-- lose -->
<div class="screen" id="scrLose">
  <div class="big">out of moves</div>
  <div class="goalsline" id="loseGoals"></div>
  <div class="sub">so close — the brew needs a few more moves.</div>
  <div class="btnrow">
    <button class="btn alt" id="btnLoseSelect">Levels</button>
    <button class="btn" id="btnRetry">Retry</button>
  </div>
</div>

<script>
"use strict";
(function(){
// ================= constants =================
const PRIMS = ['R','Y','B'];
const SECS  = ['O','G','P'];
const HEX = { R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6' };
const WHITEC='#faf6ec', BOMBC='#2c2733';
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const DECOMP = { R:['R'], Y:['Y'], B:['B'], O:['R','Y'], G:['Y','B'], P:['R','B'] };
const MIX = { RY:'O', YR:'O', RB:'P', BR:'P', YB:'G', BY:'G' };
const NAME = { R:'red', Y:'yellow', B:'blue', O:'orange', G:'green', P:'purple', W:'white' };
function isSec(c){ return c==='O'||c==='G'||c==='P'; }
function colOf(c){ return c==='W'?WHITEC:(c==='K'||c==='I'?BOMBC:HEX[c]); }   // 'I' = ink (flyer icon colour)
const FORGE_COUNT=2;      // secondaries per double step
const BOMB_MIN=7;         // connected pop-group size that spawns a bomb
const MIN_MATCH=3;

// ---------- hexagon radius 3 (flat-top cells → vertical columns for gravity) ----------
const RAD=3;
const CELLS_QR=[]; { for(let q=-RAD;q<=RAD;q++){ const r1=Math.max(-RAD,-q-RAD), r2=Math.min(RAD,-q+RAD);
  for(let r=r1;r<=r2;r++) CELLS_QR.push([q,r]); } }               // 37 cells
const N = CELLS_QR.length;
const KEY = (q,r)=>q+','+r;
const IDX = {}; CELLS_QR.forEach(([q,r],i)=>IDX[KEY(q,r)]=i);
const NDELTA=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const NEIGH = CELLS_QR.map(([q,r])=> NDELTA.map(([dq,dr])=>IDX[KEY(q+dq,r+dr)]).filter(v=>v!==undefined));
const CUBE = CELLS_QR.map(([q,r])=>({x:q,z:r,y:-q-r}));
function hexDist(i,j){ const a=CUBE[i],b=CUBE[j]; return (Math.abs(a.x-b.x)+Math.abs(a.y-b.y)+Math.abs(a.z-b.z))/2; }
const COLUMNS = (()=>{ const m={}; CELLS_QR.forEach(([q,r],i)=>(m[q]=m[q]||[]).push(i));
  return Object.keys(m).map(q=>+q).sort((a,b)=>a-b).map(q=>m[q].sort((i,j)=>CELLS_QR[i][1]-CELLS_QR[j][1])); })();
const LINES = (()=>{ function build(keyf,ordf){ const m={};
    for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i]; const k=keyf(q,r); (m[k]=m[k]||[]).push([ordf(q,r),i]); }
    return Object.values(m).map(a=>a.sort((x,y)=>x[0]-y[0]).map(x=>x[1])).filter(l=>l.length>=3); }
  return { A:build((q)=>q,(q,r)=>r), B:build((q,r)=>r,(q)=>q), C:build((q,r)=>q+r,(q)=>q) }; })();
const ALL_LINES = [...LINES.A,...LINES.B,...LINES.C];
const CELL_LINES=(()=>{ const m=Array.from({length:N},()=>[]);
  for(const l of ALL_LINES) for(const ci of l) m[ci].push(l); return m; })();

// ================= levels =================
// goal types: {t:'col',c,need} collect · {t:'ink',need} scrub all ink · {t:'brew',need,c?} forge secondaries
//             {t:'white',need} forge whites · {t:'boom',need} detonate bombs · {t:'chain',need} cascade depth ≥ N
// Level fields: name, goals, moves; optional palette (restrict spawned primaries),
//               ink [[q,r],..] (single-layer cell stains), seed [{q,r,c},..] (pre-placed balls/bombs).
const ringQR = rad => CELLS_QR.filter(([q,r])=>Math.max(Math.abs(q),Math.abs(r),Math.abs(-q-r))===rad);
const RING1=ringQR(1), RING2=ringQR(2);   // 6 and 12 cells
// Completability notes (construction/bot-verified, see suite):
//  No level requires bombs — seeded bombs (L4, L11) are free tools that detonate after any
//   matching swap's cascade settles, clearing/scrubbing their radius.
//  L5 O4: two deliberate R+Y doubles forge 4 orange; collecting 4 needs one O-line (3) + one more,
//   so ~3 doubles or a 4-line — the teaching beat is "engineer the double, then line the brew".
//  L7 seeded O/G near centre diversify cascade steps: a cascade round popping 3 distinct colours forges the white.
//  L13 Triple Distilled: one deliberate double of each pair (R+Y, Y+B, R+B) forges 2 of each secondary.
//  L14 chain ≥3 occurs naturally every handful of cascading swaps.
//  (boom goal type retained in code for future levels; palette path likewise, currently unused.)
const LEVELS = [
  { name:'Warm-up',        goals:[{t:'col',c:'R',need:36}], moves:21 },
  { name:'Two of a Kind',  goals:[{t:'col',c:'R',need:45},{t:'col',c:'B',need:45}], moves:22 },
  { name:'Triple Order',   goals:[{t:'col',c:'R',need:48},{t:'col',c:'Y',need:48},{t:'col',c:'B',need:48}], moves:24 },
  { name:'The Gift',       goals:[{t:'col',c:'R',need:50}], moves:20, seed:[{q:3,r:0,c:'K'}] },
  { name:'First Brew',     goals:[{t:'col',c:'O',need:4}], moves:22 },
  { name:'Green Thumb',    goals:[{t:'col',c:'G',need:5},{t:'col',c:'P',need:5}], moves:30 },
  { name:'White Lightning',goals:[{t:'white',need:1}], moves:24,
    seed:[{q:0,r:-1,c:'O'},{q:1,r:1,c:'O'},{q:-1,r:0,c:'O'},{q:1,r:-1,c:'G'},{q:-1,r:1,c:'G'},{q:0,r:2,c:'G'},{q:2,r:-1,c:'O'},{q:-2,r:1,c:'G'}] },
  { name:'Production Line',goals:[{t:'brew',need:6},{t:'col',c:'Y',need:52}], moves:26 },
  { name:'Ink Spill',      goals:[{t:'ink',need:7}], moves:20, ink:[[0,0],...RING1] },
  { name:'Deep Clean',     goals:[{t:'ink',need:10},{t:'col',c:'O',need:4}], moves:30, ink:[...RING1,[2,-1],[-2,1],[0,-2],[0,2]] },
  { name:'Powder Keg',     goals:[{t:'ink',need:12}], moves:26, ink:[...RING2], seed:[{q:1,r:-1,c:'K'}] },
  { name:'Spotless',       goals:[{t:'ink',need:14},{t:'white',need:1}], moves:32, ink:[...RING2,[0,0],[0,-1]] },
  { name:'Triple Distilled',goals:[{t:'brew',c:'O',need:2},{t:'brew',c:'G',need:2},{t:'brew',c:'P',need:2}], moves:8 },
  { name:'Chain Reaction', goals:[{t:'chain',need:3},{t:'col',c:'P',need:6}], moves:28 },
  { name:'Night Cap',      goals:[{t:'col',c:'G',need:8},{t:'ink',need:6}], moves:26, ink:[...RING1] },
  { name:'The Full Brew',  goals:[{t:'col',c:'O',need:5},{t:'col',c:'G',need:5},{t:'col',c:'P',need:5},{t:'white',need:1},{t:'ink',need:6}], moves:36, ink:[...RING1] },
];
function starThresholds(moves){ return { s3:Math.max(2,Math.round(moves*0.35)), s2:Math.max(1,Math.round(moves*0.15)) }; }

// ================= persistence =================
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function loadProgress(){ try{ const p=JSON.parse(lsGet('hb_progress',''));
    // v1 or v2 alike: never trust stored shape — clamp unlocked into [1, LEVELS.length]
    // (a corrupt {unlocked:-5} must not lock every level) and coerce stars to a plain object.
    if(p&&p.unlocked){
      const unlocked=Math.min(Math.max(1,p.unlocked|0),LEVELS.length);
      const stars=(p.stars&&typeof p.stars==='object'&&!Array.isArray(p.stars))?p.stars:{};
      return { v:2, unlocked, stars };
    }
  }catch(e){}
  return { v:2, unlocked:1, stars:{} }; }
function saveProgress(){ lsSet('hb_progress', JSON.stringify(progress)); }
let progress = loadProgress();

// ================= audio (fully synthesized, lazy init on first gesture) =================
const SFX=(()=>{
  let ac=null, master=null, ready=false, nbuf=null;
  let muted = lsGet('hb_mute','0')==='1';
  function init(){ if(ready) return; try{
      const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
      ac=new AC(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination); ready=true;
    }catch(e){ ac=null; ready=false; } }
  function on(){ if(!ready||muted||!ac) return false;
    try{ if(ac.state==='suspended') ac.resume(); }catch(e){} return true; }
  function tone(freq,opts){ if(!on()) return; try{
      const {type='sine',a=0.004,d=0.16,peak=0.22,delay=0,slide=0}=opts||{};
      const t0=ac.currentTime+delay;
      const o=ac.createOscillator(); o.type=type;
      o.frequency.setValueAtTime(Math.max(30,freq),t0);
      if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,slide),t0+a+d);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0);
      g.gain.linearRampToValueAtTime(peak,t0+a);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+a+d);
      o.connect(g); g.connect(master); o.start(t0); o.stop(t0+a+d+0.06);
    }catch(e){} }
  function noise(opts){ if(!on()) return; try{
      const {dur=0.25,peak=0.18,delay=0,f0=1200,f1=0,ftype='bandpass'}=opts||{};
      if(!nbuf){ nbuf=ac.createBuffer(1,(ac.sampleRate*0.5)|0,ac.sampleRate);
        const d=nbuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
      const t0=ac.currentTime+delay;
      const src=ac.createBufferSource(); src.buffer=nbuf; src.loop=true;
      const fl=ac.createBiquadFilter(); fl.type=ftype; fl.frequency.setValueAtTime(f0,t0);
      if(f1) fl.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0);
      g.gain.linearRampToValueAtTime(peak,t0+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
      src.connect(fl); fl.connect(g); g.connect(master);
      src.start(t0); src.stop(t0+dur+0.05);
    }catch(e){} }
  // major pentatonic climb from A4; cap 2 octaves
  const PENTA=[0,2,4,7,9];
  function pfreq(n){ n=Math.max(0,Math.min(10,n|0)); return 440*Math.pow(2,(((n/5)|0)*12+PENTA[n%5])/12); }
  const TICKF={R:660,Y:784,B:587,O:698,G:622,P:554,W:880,I:523,K:392};
  return {
    init, get ready(){ return ready; }, get muted(){ return muted; },
    setMuted(m){ muted=!!m; lsSet('hb_mute',muted?'1':'0'); },
    resume(){ try{ if(ac&&ac.state==='suspended') ac.resume(); }catch(e){} },
    pop(step){ tone(pfreq(step),{type:'triangle',d:0.13,peak:0.2}); },                 // pew — pitch climbs per ball
    swap(){ tone(120,{type:'sine',d:0.06,peak:0.24}); },                               // low soft thunk
    refuse(){ tone(90,{type:'square',d:0.05,peak:0.07}); tone(82,{type:'square',d:0.05,peak:0.07,delay:0.075}); },
    spring(){ tone(300,{type:'sine',d:0.1,peak:0.1,slide:170}); },                     // tiny boing
    brew(){ tone(659,{type:'triangle',d:0.22,peak:0.16}); tone(988,{type:'triangle',d:0.3,peak:0.14,delay:0.09}); },
    white(){ tone(659,{d:0.25,peak:0.14}); tone(831,{d:0.28,peak:0.13,delay:0.11}); tone(1047,{d:0.4,peak:0.13,delay:0.22}); },
    fuse(){ noise({dur:0.3,peak:0.08,f0:2800,ftype:'highpass'}); },                    // fuse hiss
    boom(){ tone(150,{type:'sine',a:0.008,d:0.5,peak:0.4,slide:50}); noise({dur:0.32,peak:0.22,f0:900,f1:120,ftype:'lowpass'}); },

// ================= canvas / layout =================
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W=390,H=800,DPR=1;
let size=26, ballRad=20, COL_DX=39, ROW_DY=45, latCX=195, latCY=440, topY=300;
function layout(){

// ================= state =================
// cell: {q,r,x,y,c, oy, shake, born, forgeFx, bombBorn, fresh}
const cells = CELLS_QR.map(([q,r])=>({q,r,x:0,y:0,c:'R',oy:0,vy:0,land:0,shake:0,born:0,forgeFx:0,bombBorn:0,fresh:false,
  fx:0,fy:0,fvx:0,fvy:0}));   // fx/fy: spring-back offset (drag release / post-commit hand-off)
let state='start';            // start|select|play|win|lose
let level=1;                  // 1-based
let goals=[];                 // [{c,need,disp,chipEl}]
let collect={R:0,Y:0,B:0,O:0,G:0,P:0,W:0};
let movesLeft=0;
let resolver=null;
let lastResolve=null;
let pendingWin=null;          // {t}: win earned, card held back until pops/flyers/goo drain (cap 700ms)
let selIdx=-1;
let puffs=[], sparks=[], flyers=[], shocks=[], popGoo=[];
let pops=[];   // ripple-pop queue: mechanics applied instantly, FX/audio fire per-ball with a spatial stagger
let remixFx=null, chainLabel=null, brewLabel=null, flashFx=null;
let stats={ matches:0, maxChain:0, forges:0, whites:0, bombs:0, swaps:0, cascades:0, remixes:0 };
let winInfo=null;
let PALETTE=PRIMS.slice();            // per-level spawn palette (refill + initial fill)
let ink=new Array(N).fill(0);         // single-layer ink stains, keyed by CELL (survive gravity/remix)
let inkFx=[];                         // scrub wipe animations {x,y,born,seed}

function randPrim(){ return PALETTE[(Math.random()*PALETTE.length)|0]; }
function inkGoal(){ return goals.find(g=>g.t==='ink'); }

// ================= match finding (white = SECONDARY-only wildcard) =================
// White joins O/G/P lines only — a brewed white can never be swept away by a random
// primary cascade; spending it is always a deliberate secondary match.
function matchesColour(c,col){ return c===col || (c==='W' && isSec(col)); }
function findMatches(){
  const out=[];
  const COLOURS=['R','Y','B','O','G','P'];
  for(const line of ALL_LINES){
    for(const col of COLOURS){
      let k=0;
      while(k<line.length){
        if(matchesColour(cells[line[k]].c,col)){
          let j=k+1; while(j<line.length && matchesColour(cells[line[j]].c,col)) j++;
          const seg=line.slice(k,j);
          if(seg.length>=MIN_MATCH && seg.some(ci=>cells[ci].c===col)) out.push({cells:seg,colour:col,len:seg.length});
          k=j;
        } else k++;
      }
    }
  }
  return out;
}
function hasInstantMatch(){ return findMatches().length>0; }
function hasMatchingMove(){
  for(let a=0;a<N;a++){
    for(const b of NEIGH[a]){
      if(b<=a) continue;
      const ca=cells[a].c, cb=cells[b].c;
      if(ca==null||cb==null||ca==='K'||cb==='K'||ca===cb) continue;
      cells[a].c=cb; cells[b].c=ca;
      const hit=findMatches().some(m=>m.cells.includes(a)||m.cells.includes(b));
      cells[a].c=ca; cells[b].c=cb;
      if(hit) return true;
    }
  }
  return false;
}

// ================= board generation =================
// fill non-protected cells with palette primaries, no instant match. The parity
// pattern (q+2r mod |palette|) is run-free on all three axes, so even 2-colour
// palettes always have a deterministic match-free fallback.
function fillNoMatch(prot){
  prot=prot||new Set();
  for(let i=0;i<N;i++){ if(prot.has(i)) continue; const cell=cells[i];
    cell.c=randPrim(); cell.oy=0; cell.shake=0; cell.forgeFx=0; cell.bombBorn=0; cell.fresh=false; }
  let guard=0;
  while(guard++<400 && hasInstantMatch()){
    let fixed=false;
    for(const m of findMatches()) for(const ci of m.cells){ if(!prot.has(ci)){ cells[ci].c=randPrim(); fixed=true; } }
    if(!fixed) break;   // every match lies inside protected cells — level-design invariant broken
  }
  if(hasInstantMatch()){
    for(let i=0;i<N;i++){ if(prot.has(i)) continue; const [q,r]=CELLS_QR[i];
      cells[i].c=PALETTE[(((q+2*r)%PALETTE.length)+PALETTE.length)%PALETTE.length]; }
    let g=0; while(g++<200 && hasInstantMatch()){ let f=false;
      for(const m of findMatches()) for(const ci of m.cells){ if(!prot.has(ci)){ cells[ci].c=randPrim(); f=true; } }
      if(!f) break; }
  }
}
function genNoMatch(){ fillNoMatch(null); }
function applySeeds(seedList){
  if(!seedList) return;
  const prot=new Set();
  for(const s of seedList){ const i=IDX[KEY(s.q,s.r)]; if(i===undefined) continue;
    cells[i].c=s.c; cells[i].fresh=false; cells[i].bombBorn=(s.c==='K')?performance.now():0; prot.add(i); }
  let g=0;   // repair any instant matches the seeds created, never touching the seeds
  while(g++<400 && hasInstantMatch()){ let f=false;
    for(const m of findMatches()) for(const ci of m.cells){ if(!prot.has(ci)){ cells[ci].c=randPrim(); f=true; } }
    if(!f) break; }
}

// ================= remix (deadlock rescue) — free =================
// bombs stay FIXED in place (and ink lives on cells, so it never moves either)
function remixArrange(){
  const idxs=[]; for(let i=0;i<N;i++) if(cells[i].c!=null && cells[i].c!=='K') idxs.push(i);
  const bag=idxs.map(i=>cells[i].c);
  for(let attempt=0; attempt<60; attempt++){
    for(let i=bag.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
    idxs.forEach((ci,k)=>cells[ci].c=bag[k]);
    let g=0;
    while(g++<400 && hasInstantMatch()){
      const m=findMatches()[0]; const ci=m.cells[(Math.random()*m.cells.length)|0];
      if(cells[ci].c==='K') break;
      let dj=-1; for(let t=0;t<60;t++){ const j=idxs[(Math.random()*idxs.length)|0]; if(cells[j].c!==cells[ci].c){ dj=j; break; } }
      if(dj<0) break; const tmp=cells[ci].c; cells[ci].c=cells[dj].c; cells[dj].c=tmp;
    }
    if(!hasInstantMatch() && hasMatchingMove()) return true;
    idxs.forEach((ci,k)=>bag[k]=cells[ci].c);
  }
  return false;
}
function remix(force){
  if(!force && hasMatchingMove()) return false;
  if(cells.some(c=>c.c==null)) return false; // don't remix mid-cascade
  const before=cells.map(c=>c.c);
  const ok=remixArrange();
  if(!ok){ const prot=new Set(); for(let i=0;i<N;i++) if(cells[i].c==='K') prot.add(i);
    let g=0; do{ fillNoMatch(prot); }while(!hasMatchingMove() && ++g<400); }
  remixFx={ t0:performance.now(), dur:700, from:before.map((c,i)=>({x:cells[i].x,y:cells[i].y,c})) };
  chainLabel={ n:-1, life:1.1, text:'remixed!' };
  for(let i=0;i<N;i++){ cells[i].born=performance.now(); cells[i].oy=0; }
  stats.remixes++;
  return true;
}
function ensurePlayable(){ if(hasMatchingMove()) return false; remix(true); return true; }

// ================= goals & collection =================
function goalFor(c){ return goals.find(g=>g.t==='col'&&g.c===c); }
function goalProgress(g){
  switch(g.t){
    case 'col':   return collect[g.c]||0;
    case 'ink':   return stats.inkScrubbed;
    case 'brew':  return g.c ? (stats.brewedBy[g.c]||0) : stats.forges;
    case 'white': return stats.whites;
    case 'boom':  return stats.boomsDet;
    case 'chain': return stats.maxChain>=g.need ? g.need : 0;
  } return 0;
}
function remainingOf(g){ return Math.max(0, g.need-goalProgress(g)); }
// collected whites boost whichever COLOUR goal is furthest from done
function whiteTargetGoal(){ let best=null, bd=-1;
  for(const g of goals){ if(g.t!=='col') continue; const rem=remainingOf(g); if(rem>bd && rem>0){ bd=rem; best=g; } } return best; }
// ink scrub mechanics (FX ride along with the pop/detonation)
function scrubInkAt(ci){ if(!ink[ci]) return false; ink[ci]=0; stats.inkScrubbed++; return true; }
function collectWhite(x,y){
  const best=whiteTargetGoal();
  if(!best){ // no unmet goal — no effect, just sparkle
    for(let k=0;k<8;k++) sparks.push(mkSpark(x,y,WHITEC)); return; }
  collect[best.c]=Math.min(best.need, collect[best.c]+1);
  spawnFlyer(x,y,'W',best);
  for(let k=0;k<8;k++) sparks.push(mkSpark(x,y,WHITEC));
}
function collectBall(ci,c){
  const x=cells[ci].x, y=cells[ci].y+cells[ci].oy;
  spawnClearPuffs(x,y,c);
  if(c==='W'){ collectWhite(x,y); return; }
  if(collect[c]!==undefined) collect[c]++;
  const g=goalFor(c); if(g) spawnFlyer(x,y,c,g);
}

// ================= paced resolution =================
const SQUISH_DUR=0.22, FALL_MIN=0.18, FALL_MAX=0.30, BEAT_DUR=0.12, REFILL_DROP=0.26;

function createsMatchAt(ci){ for(const line of CELL_LINES[ci]){
    const pos=line.indexOf(ci); const c=cells[ci].c; if(c==null) return false;
    let n=1; for(let k=pos-1;k>=0&&matchesColour(cells[line[k]].c,c)&&cells[line[k]].c!=='K';k--)n++;
    for(let k=pos+1;k<line.length&&matchesColour(cells[line[k]].c,c)&&cells[line[k]].c!=='K';k++)n++;
    if(n>=MIN_MATCH) return true; } return false; }
function pickRefillColour(ci){
  const ok=[];
  for(const c of PALETTE){ cells[ci].c=c; if(!createsMatchAt(ci)) ok.push(c); }
  if(ok.length){ cells[ci].c=ok[(Math.random()*ok.length)|0]; return {c:cells[ci].c, biased:true}; }
  cells[ci].c=randPrim(); return {c:cells[ci].c, biased:false};
}
function centroidCells(arr){ let sx=0,sy=0; for(const i of arr){ sx+=cells[i].x; sy+=cells[i].y; }
  const n=Math.max(1,arr.length); return {x:sx/n,y:sy/n}; }
function findBombCentroids(clearSet){
  const arr=[...clearSet]; const inSet=new Set(arr); const seen=new Set(); const bombs=[];
  for(const start of arr){ if(seen.has(start))continue; const comp=[]; const st=[start]; seen.add(start);
    while(st.length){ const u=st.pop(); comp.push(u); for(const v of NEIGH[u]){ if(inSet.has(v)&&!seen.has(v)){ seen.add(v); st.push(v); } } }
    if(comp.length>=BOMB_MIN){ const o=centroidCells(comp);
      let best=comp[0],bd=1e9; for(const c of comp){ const d=(cells[c].x-o.x)**2+(cells[c].y-o.y)**2; if(d<bd){bd=d;best=c;} }
      bombs.push(best); } }
  return bombs;
}
// one resolution step: find distinct colours, decide forge, spawn bombs, clear+collect.
// MECHANICS happen at once (one step: simultaneity forging, bomb groups, collection);
// the VISUALS+AUDIO ripple outward per-ball ("pew pew pew") via the pops queue.
const POP_STAGGER=0.05;
function clearRound(matches, depth){
  stats.cascades++;
  const clearSet=new Set(), gooTarget={};
  for(const m of matches){ stats.matches++;
    const o=centroidCells(m.cells);
    for(const ci of m.cells){ clearSet.add(ci); if(gooTarget[ci]===undefined) gooTarget[ci]=o; } }
  // forge decision (per step)
  const distinct=[...new Set(matches.map(m=>m.colour))];
  let order=null;
  if(distinct.length>=3){ order={type:'white',count:1}; }
  else if(distinct.length===2 && distinct.every(c=>PRIMS.includes(c))){
    const mix=MIX[distinct[0]+distinct[1]]; if(mix) order={type:'sec',colour:mix,count:FORGE_COUNT}; }
  if(order && resolver){ resolver.pendingForge.push(order);
    if(order.type==='white'){ brewFlash('white!', WHITEC); SFX.white(); }
    else { brewFlash('brewed!', HEX[order.colour]); SFX.brew(); } }
  // bombs from big connected groups
  const bombCells=findBombCentroids(clearSet);
  // ripple order: distance from the swap site (round 1) or the round centroid (cascades)
  const ref=(depth===1 && resolver && resolver.origin) ? resolver.origin : centroidCells([...clearSet]);
  const orderCells=[...clearSet].sort((a,b)=>
    ((cells[a].x-ref.x)**2+(cells[a].y-ref.y)**2)-((cells[b].x-ref.x)**2+(cells[b].y-ref.y)**2));
  // clear + collect NOW (one mechanical step); queue per-ball FX with delays
  let k=0;
  for(const ci of orderCells){ const c=cells[ci].c; if(c==null||c==='K') continue;
    let goalT=null;
    if(c==='W'){ goalT=whiteTargetGoal(); if(goalT) collect[goalT.c]=Math.min(goalT.need, collect[goalT.c]+1); }
    else { if(collect[c]!==undefined) collect[c]++; goalT=goalFor(c); }
    const scrub=scrubInkAt(ci);                     // popping ON an inked cell scrubs it
    const gt=gooTarget[ci]||{x:cells[ci].x,y:cells[ci].y};
    pops.push({ x:cells[ci].x, y:cells[ci].y+cells[ci].oy, tx:gt.x, ty:gt.y, c, goal:goalT,
                scrub, inkG:scrub?inkGoal():null,
                delay:k*POP_STAGGER, step:resolver?resolver.popStep++:k, fired:false });
    k++;
    cells[ci].c=null; cells[ci].fresh=false; }
  // extend the squish so compaction/refill start after the last pew
  if(resolver) resolver.t=SQUISH_DUR + k*POP_STAGGER;
  // place bombs
  for(const bc of bombCells){ cells[bc].c='K'; cells[bc].bombBorn=performance.now(); cells[bc].oy=0; stats.bombs++;
    SFX.fuse();
    for(let s=0;s<8;s++) sparks.push(mkSpark(cells[bc].x,cells[bc].y,ACCENT)); }
  if(depth>1) chainLabel={n:depth,life:1.0};
  stats.maxChain=Math.max(stats.maxChain, depth);
}
function startResolve(origin){
  const matches=findMatches();
  if(!matches.length) return false;
  lastResolve=null;
  resolver={ phase:'squish', t:SQUISH_DUR, depth:1, pendingForge:[], origin:origin||null, popStep:0 };
  clearRound(matches,1);
  return true;
}
function compactColumns(){
  let maxDrop=1;
  for(const col of COLUMNS){
    const surv=[];
    for(let k=0;k<col.length;k++){ const ci=col[k]; if(cells[ci].c!=null) surv.push({c:cells[ci].c,fresh:cells[ci].fresh,bombBorn:cells[ci].bombBorn||0,fromK:k}); }
    const nEmpty=col.length-surv.length;
    for(let k=0;k<col.length;k++){ const ci=col[k];
      if(k<nEmpty){ cells[ci].c=null; cells[ci].fresh=false; cells[ci].bombBorn=0; cells[ci].oy=0; cells[ci].vy=0; }
      else { const s=surv[k-nEmpty]; cells[ci].c=s.c; cells[ci].fresh=s.fresh; cells[ci].bombBorn=s.bombBorn;
        cells[ci].oy=(s.fromK-k)*ROW_DY; cells[ci].vy=0; maxDrop=Math.max(maxDrop,k-s.fromK); } }
  }
  return maxDrop;
}
function refillEmpties(orders){
  const newSlots=cells.map((c,i)=>c.c==null?i:-1).filter(i=>i>=0);
  const byTop=newSlots.slice().sort((i,j)=>cells[i].y-cells[j].y);
  const used=new Set(); let idx=0;
  for(const o of orders){ for(let k=0;k<o.count && idx<byTop.length;k++){
      const ci=byTop[idx++]; used.add(ci);
      cells[ci].c=(o.type==='white')?'W':o.colour; cells[ci].fresh=false; cells[ci].forgeFx=performance.now();
      if(o.type==='white'){ stats.whites++; for(let s=0;s<10;s++) sparks.push(mkSpark(cells[ci].x,cells[ci].y,WHITEC)); }
      else { stats.forges++; if(stats.brewedBy[o.colour]!==undefined) stats.brewedBy[o.colour]++; }
    } }
  for(const ci of newSlots){ if(used.has(ci)) continue; const pick=pickRefillColour(ci); cells[ci].fresh=pick.biased; }
  for(const ci of newSlots) cells[ci].born=performance.now();
  let maxRows=1;
  for(const col of COLUMNS){ const empt=col.filter(ci=>newSlots.includes(ci));
    empt.forEach((ci,k)=>{ cells[ci].oy=-((empt.length-k)*ROW_DY+ROW_DY+18); cells[ci].vy=0;
      maxRows=Math.max(maxRows, empt.length-k+1.4); }); }
  return maxRows;
}
function detonateBombs(){
  const start=[]; for(let i=0;i<N;i++) if(cells[i].c==='K') start.push(i);
  if(start.length) SFX.boom();
  const queue=start.slice(), done=new Set();
  let scrubbedAny=false;
  while(queue.length){ const bi=queue.shift(); if(done.has(bi)) continue; done.add(bi);
    stats.boomsDet++;
    shocks.push({x:cells[bi].x,y:cells[bi].y,r:0,maxr:ROW_DY*3.4,t0:performance.now(),dur:520});
    for(let k=0;k<14;k++){ const p=mkPuff(cells[bi].x,cells[bi].y,ACCENT); p.life+=0.2; puffs.push(p); }
    cells[bi].c=null; cells[bi].bombBorn=0;
    for(let ci=0;ci<N;ci++){ if(hexDist(ci,bi)<=1){
      // detonation scrubs EVERY cell in its radius, occupied or not
      if(scrubInkAt(ci)){ scrubbedAny=true; inkFx.push({x:cells[ci].x,y:cells[ci].y,born:performance.now(),seed:ci});
        const gi=inkGoal(); if(gi) spawnFlyer(cells[ci].x,cells[ci].y,'I',gi); }
      if(ci===bi) continue;
      const c=cells[ci].c; if(c==null) continue;
      if(c==='K'){ if(!done.has(ci)) queue.push(ci); }
      else { collectBall(ci,c); cells[ci].c=null; cells[ci].fresh=false; } } }
  }
  if(scrubbedAny) SFX.scrub();
  vibrate([18,26,18]);
}
function wetInkRepair(){
  // A settled ball may only ever STAY or POP — never change colour. Recolours happen
  // exclusively mid-air (oy<0, still falling). If a match's fresh balls are all
  // settled, drop their fresh flags and let the match stand: it pops as a normal
  // chain round. (Design note: this relaxes "no refill-fed chains" to "no
  // same-arrival chains" — a refill ball may join a LATER round's chain.)
  let guard=0;
  while(guard++<8){
    let rerolled=false;
    for(const m of findMatches()){
      const freshCells=m.cells.filter(ci=>cells[ci].fresh);
      if(!freshCells.length) continue;
      const midair=freshCells.filter(ci=>cells[ci].oy<0);
      if(midair.length){
        for(const ci of midair){ const p=pickRefillColour(ci); if(!p.biased) cells[ci].fresh=false;
          for(let k=0;k<3;k++) puffs.push(mkPuff(cells[ci].x,cells[ci].y+cells[ci].oy,colOf(cells[ci].c))); }
        rerolled=true;
      } else {
        for(const ci of freshCells) cells[ci].fresh=false;   // settled: the match stands
      }
    }
    if(!rerolled) break;
  }

function stepResolver(dt){
  if(!resolver) return;

  if(resolver.phase==='squish'){

    let rows=0; // refill immediately each round — wet-ink bias keeps new balls from matching on arrival
    if(cells.some(c=>c.c==null)){ rows=refillEmpties(resolver.pendingForge); resolver.pendingForge=[]; }
    wetInkRepair(); // recolour mid-air refills only; settled balls stay or pop, never flip
    resolver.phase='fall'; resolver.t=0.10+Math.sqrt(Math.max(maxDrop,rows))*0.2;
  } else if(resolver.phase==='fall'){
    for(const c of cells){ c.oy=0; c.vy=0; }
    resolver.phase='beat'; resolver.t=BEAT_DUR;
  } else {
    wetInkRepair(); // everything settled here: fresh-fed matches are legitimised and pop as chains
    let matches=findMatches();
    if(matches.length){ resolver.depth++; clearRound(matches,resolver.depth); resolver.phase='squish'; resolver.t=SQUISH_DUR; }
    else if(cells.some(c=>c.c==null)){ const rows=refillEmpties(resolver.pendingForge); resolver.pendingForge=[]; resolver.phase='fall'; resolver.t=0.10+Math.sqrt(rows)*0.2; }
    else if(cells.some(c=>c.c==='K')){ detonateBombs(); resolver.phase='squish'; resolver.t=SQUISH_DUR; }
    else { for(const c of cells) c.fresh=false; lastResolve={depth:resolver.depth}; resolver=null; onSettle(); }
  }
}

// ================= swap =================
function adjacent(a,b){ return NEIGH[a].includes(b); }
function swapCore(a,b){
  if(state!=='play') return {type:'blocked',reason:'state'};
  if(pendingWin) return {type:'blocked',reason:'won'};   // win earned — card is on its way
  if(resolver) { refuse(a,b); return {type:'blocked',reason:'resolving'}; }
  if(movesLeft<=0) return {type:'blocked',reason:'nomoves'};
  if(a===b||a<0||b<0||a>=N||b>=N) return {type:'blocked',reason:'bad'};
  if(!adjacent(a,b)){ return {type:'blocked',reason:'nonadjacent'}; }
  const ca=cells[a].c, cb=cells[b].c;
  if(ca==null||cb==null||ca==='K'||cb==='K') return {type:'blocked',reason:'empty'};
  if(ca===cb){ refuse(a,b); return {type:'blocked',reason:'same'}; }
  cells[a].c=cb; cells[b].c=ca; animSwap(a,b);
  const trig=findMatches().filter(m=>m.cells.includes(a)||m.cells.includes(b));
  movesLeft--; stats.swaps++; vibrate(20); SFX.swap();
  if(movesLeft>0 && movesLeft<=3) SFX.warn();
  if(trig.length>0){ startResolve({x:(cells[a].x+cells[b].x)/2, y:(cells[a].y+cells[b].y)/2}); return {type:'match'}; }
  // positional swap — legal, no bounce-back, costs the move
  ensurePlayable(); onSettle();
  return {type:'positional'};
}
function animSwap(a,b){ cells[a].shake=Math.max(cells[a].shake,0.3); cells[b].shake=Math.max(cells[b].shake,0.3);
  cells[a].born=performance.now(); cells[b].born=performance.now(); }
function refuse(a,b){ if(cells[a])cells[a].shake=0.5; if(cells[b])cells[b].shake=0.5; SFX.refuse(); }

function onSettle(){
  if(state!=='play') return;
  ensurePlayable();
  // win is EARNED here, but the card waits (update()) for the last flyer to land, the
  // chip to visibly complete and goalDone to ring — then the card shows with SFX.win.
  if(goals.length && goals.every(g=>remainingOf(g)<=0)){ if(!pendingWin) pendingWin={t:0}; }
  else if(movesLeft<=0){ loseLevel(); }   // lose stays immediate
}

// ================= level flow =================
function loadLevel(n){
  n=Math.max(1,Math.min(LEVELS.length,n)); level=n;
  const L=LEVELS[n-1];
  goals=L.goals.map(g=>({t:g.t||'col', c:g.c, need:g.need, chipEl:null, prev:undefined}));
  collect={R:0,Y:0,B:0,O:0,G:0,P:0,W:0};
  movesLeft=L.moves;
  PALETTE=(L.palette&&L.palette.length)?L.palette.slice():PRIMS.slice();
  ink=new Array(N).fill(0); inkFx=[];
  if(L.ink) for(const [q,r] of L.ink){ const i=IDX[KEY(q,r)]; if(i!==undefined) ink[i]=1; }
  resolver=null; lastResolve=null; pendingWin=null; selIdx=-1; winInfo=null;
  puffs=[]; sparks=[]; flyers=[]; shocks=[]; popGoo=[]; pops=[]; remixFx=null; chainLabel=null; brewLabel=null; flashFx=null;
  dragStart=-1; dragTgt=-1; dragOff={x:0,y:0}; dragLean={x:0,y:0};
  for(const c of cells){ c.oy=0; c.vy=0; c.land=0; c.fx=0; c.fy=0; c.fvx=0; c.fvy=0; }
  stats={ matches:0, maxChain:0, forges:0, whites:0, bombs:0, boomsDet:0, inkScrubbed:0,
          brewedBy:{O:0,G:0,P:0}, swaps:0, cascades:0, remixes:0 };
  layout();
  genNoMatch();
  applySeeds(L.seed);
  ensurePlayable();
  buildChips();
  setState('play');
  updateHUD();
}
function winLevel(){
  const th=starThresholds(LEVELS[level-1].moves);
  const st = movesLeft>=th.s3?3 : movesLeft>=th.s2?2 : 1;
  winInfo={ stars:st, moves:movesLeft };
  if(!progress.stars[level] || progress.stars[level]<st) progress.stars[level]=st;
  if(level+1>progress.unlocked && level<LEVELS.length) progress.unlocked=level+1;
  saveProgress();
  setState('win');
  showWinScreen();
  SFX.win();
}
function loseLevel(){ setState('lose'); showLoseScreen(); SFX.lose(); }

// ================= particles =================
function mkPuff(x,y,col){ const a=Math.random()*6.28, sp=40+Math.random()*90;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:0.5+Math.random()*0.3,max:0.8,r:4+Math.random()*5,col}; }
function mkSpark(x,y,col){ const a=Math.random()*6.28, sp=60+Math.random()*120;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6,max:0.6,r:3+Math.random()*3,col}; }
function spawnClearPuffs(x,y,c){ const col=colOf(c); for(let k=0;k<5;k++) puffs.push(mkPuff(x,y,col)); }
function spawnFlyer(x,y,c,g){ flyers.push({x,y,c,g,t:0,dur:0.5,started:performance.now()}); }
function brewFlash(text,col){ brewLabel={text,col,life:1.2,born:performance.now()}; flashFx={col,born:performance.now(),dur:420}; vibrate([10,20]); }
function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ================= update / render =================
// render-on-demand: the RAF loop stays alive (cheap early-out) but update()+render()
// only run while something is actually animating, plus ONE final frame after going
// idle so the last drawn frame is never stale. wake() forces a frame after events
// isAnimating can't see (tap-selection, state changes, resize, tab return).
let last=performance.now(), idleDrawn=false;
function wake(){ idleDrawn=false; }
function isAnimating(now){
  if(resolver||pendingWin) return true;
  if(pops.length||flyers.length||puffs.length||sparks.length||popGoo.length||shocks.length||inkFx.length) return true;
  if(dragStart>=0) return true;
  if(remixFx||chainLabel||brewLabel||flashFx) return true;
  if(state==='start'||state==='select') return false;   // canvas is a bare clear under the overlay
  for(const c of cells){
    if(c.oy!==0||c.vy!==0||c.shake>0||c.fx||c.fy||c.fvx||c.fvy) return true;
    if(c.land && now-c.land<140) return true;
    if(now-c.born<260) return true;
    if(c.forgeFx && now-c.forgeFx<600) return true;
    if(c.c==='K'||c.c==='W') return true;       // fuse flame / prism sparkle animate continuously
  }
  return false;
}
function tick(now){ let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now;
  const active=isAnimating(now);
  if(active||!idleDrawn){ update(dt,now); render(now); idleDrawn=!active; }
  requestAnimationFrame(tick); }
function update(dt,now){
  stepResolver(dt);
  const FG=ROW_DY*55; // gravity: balls accelerate into holes instead of easing (a 1-row drop ≈ 190ms, visible)
  for(const cell of cells){
    if(cell.oy<0){ cell.vy=(cell.vy||0)+FG*dt; cell.oy+=cell.vy*dt;
      if(cell.oy>=0){ cell.oy=0; cell.vy=0; cell.land=performance.now(); } }
    else if(cell.oy!==0){ cell.oy=0; cell.vy=0; }
    cell.shake=Math.max(0,cell.shake-dt*2.4);
    // spring-back offsets (drag release / swap hand-off) — underdamped for a small wobble
    if(cell.fx||cell.fy||cell.fvx||cell.fvy){
      cell.fvx+=(-900*cell.fx-16*cell.fvx)*dt; cell.fvy+=(-900*cell.fy-16*cell.fvy)*dt;
      cell.fx+=cell.fvx*dt; cell.fy+=cell.fvy*dt;
      if(Math.hypot(cell.fx,cell.fy)<0.4 && Math.hypot(cell.fvx,cell.fvy)<3){ cell.fx=cell.fy=0; cell.fvx=cell.fvy=0; } }
  }
  // ripple pops: fire each queued pop when its stagger delay elapses (pew pew pew)
  for(const p of pops){ if(p.fired) continue; p.delay-=dt;
    if(p.delay<=0){ p.fired=true;
      const gcol=colOf(p.c);
      popGoo.push({x:p.x,y:p.y,tx:p.tx,ty:p.ty,r:ballRad*0.85,col:gcol,rgb:hexToRgb(gcol),t:0,dur:0.26});
      spawnClearPuffs(p.x,p.y,p.c);
      if(p.c==='W') for(let s=0;s<8;s++) sparks.push(mkSpark(p.x,p.y,WHITEC));
      if(p.goal) spawnFlyer(p.x,p.y,p.c,p.goal);
      if(p.scrub){ inkFx.push({x:p.x,y:p.y,born:performance.now(),seed:(p.x*7+p.y)|0});
        SFX.scrub(); if(p.inkG) spawnFlyer(p.x,p.y,'I',p.inkG); }
      SFX.pop(p.step);
    } }
  pops=pops.filter(p=>!p.fired);
  for(const g of popGoo){ g.t+=dt; g.x+=(g.tx-g.x)*Math.min(1,dt*13); g.y+=(g.ty-g.y)*Math.min(1,dt*13);
    g.r+=(ballRad*0.35-g.r)*Math.min(1,dt*8); }
  popGoo=popGoo.filter(g=>g.t<g.dur);
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs=puffs.filter(p=>p.life>0);
  for(const p of sparks){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.2,dt); p.vy*=Math.pow(0.2,dt); }
  sparks=sparks.filter(p=>p.life>0);
  // flyers → chip
  for(const f of flyers){ f.t+=dt; const tgt=chipCenter(f.g);
    const k=Math.min(1,f.t/f.dur); const e=k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    f.cx=f.x+(tgt.x-f.x)*e; f.cy=f.y+(tgt.y-f.y)*e - Math.sin(k*Math.PI)*24;
    if(f.t>=f.dur && !f.landed){ f.landed=true; pulseChip(f.g); SFX.tick(f.c);
      if(f.g && dispRemaining(f.g)<=0) SFX.goalDone(); } }
  flyers=flyers.filter(f=>f.t<f.dur+0.02);
  shocks=shocks.filter(s=>now-s.t0<s.dur);
  if(remixFx && now-remixFx.t0>=remixFx.dur) remixFx=null;
  if(chainLabel){ chainLabel.life-=dt; if(chainLabel.life<=0) chainLabel=null; }
  if(brewLabel){ brewLabel.life-=dt; if(brewLabel.life<=0) brewLabel=null; }
  if(flashFx && now-flashFx.born>=flashFx.dur) flashFx=null;
  // defensive caps: drop the oldest if a pathological cascade floods a queue
  if(puffs.length>240) puffs.splice(0,puffs.length-240);
  if(sparks.length>200) sparks.splice(0,sparks.length-200);
  if(popGoo.length>80) popGoo.splice(0,popGoo.length-80);
  if(pops.length>80) pops.splice(0,pops.length-80);
  if(flyers.length>80) flyers.splice(0,flyers.length-80);
  // held-back win: give the celebration a beat to visibly land (last flyer → chip tick →
  // goalDone ring, chip pulse, goo tails) before the card + SFX.win. Hard cap 700ms.
  if(pendingWin && state==='play'){
    pendingWin.t+=dt;
    const drained = pops.length===0 && flyers.length===0 && popGoo.length===0;
    if((drained && pendingWin.t>=0.25) || pendingWin.t>=0.7){ pendingWin=null; winLevel(); }
  }
  updateHUD();
}
function render(now){
  ctx.clearRect(0,0,W,H);
  if(state==='start'||state==='select'){ return; }  // overlays cover the board
  drawBoardBack();
  drawInk(now);
  drawPops(now);
  drawBalls(now);
  drawPopGoo();
  drawShocks(now);
  drawRemix(now);
  drawPuffs();
  drawFlyers(now);
  drawChain(now);
  drawBrew(now);
  drawFlash(now);
}
function drawBoardBack(){
  // no card/border — balls sit directly on the paper; only faint wells mark the cells
  ctx.save();
  for(let i=0;i<N;i++){ ctx.beginPath(); ctx.arc(cells[i].x,cells[i].y,ballRad*0.92,0,6.2832);
    ctx.fillStyle='rgba(44,39,51,.05)'; ctx.fill(); }
  ctx.restore();
}
// ink-wash stains: dark splotches with papery (blobby) edges, drawn on the CELL under the ball
function drawSplot(x,y,a,seed){
  ctx.save(); ctx.fillStyle=INK;
  ctx.globalAlpha=0.55*a;                            // lobes peek out past the ball rim
  for(let k=0;k<7;k++){ const ang=(seed*2.399+k*0.983)%6.2832;
    const rr=ballRad*(0.34+(((seed*7+k*13)%10)/20));
    const ox=Math.cos(ang)*ballRad*0.80, oyy=Math.sin(ang)*ballRad*0.74;
    ctx.beginPath(); ctx.arc(x+ox,y+oyy,rr,0,6.2832); ctx.fill(); }
  ctx.globalAlpha=0.72*a;
  ctx.beginPath(); ctx.arc(x,y,ballRad*0.70,0,6.2832); ctx.fill();
  ctx.restore();
}
function drawInk(now){
  for(let i=0;i<N;i++){ if(ink[i]) drawSplot(cells[i].x,cells[i].y,1,i); }
  inkFx=inkFx.filter(f=>now-f.born<380);
  for(const f of inkFx){ const t=(now-f.born)/380;
    drawSplot(f.x,f.y,(1-t)*(1-t),f.seed);                       // stain fades out
    ctx.save(); ctx.globalAlpha=(1-t)*0.9; ctx.strokeStyle='#fffdf6'; ctx.lineCap='round';
    ctx.lineWidth=7*(1-t)+2;                                     // wipe swipe
    ctx.beginPath(); ctx.arc(f.x,f.y,ballRad*(0.35+t*0.75), -0.8+t*4.2, 0.9+t*4.2); ctx.stroke();
    ctx.restore(); }
}
function stickerCircle(x,y,r,fill,rim,lw){ ctx.save();
  ctx.shadowColor='rgba(44,39,51,.28)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent'; ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke(); ctx.restore(); }
function drawPops(now){
  // unfired ripple pops: the ball visually persists (ghost) until its pew moment
  for(const p of pops){ if(p.fired) continue;
    stickerCircle(p.x,p.y,ballRad,colOf(p.c),INK,3);
    ctx.beginPath(); ctx.arc(p.x-ballRad*0.3,p.y-ballRad*0.34,ballRad*0.24,0,6.28);
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill(); }
}
function drawBalls(now){
  const remixing = remixFx && (now-remixFx.t0)<remixFx.dur;
  const dragging = dragStart>=0;
  for(let i=0;i<N;i++){ if(dragging && i===dragStart) continue; drawOneBall(i,now,remixing); }
  if(dragging) drawOneBall(dragStart,now,remixing);   // dragged ball on top
}
function drawOneBall(i,now,remixing){
    const b=cells[i]; if(b.c==null) return;
    let x=b.x+b.fx, y=b.y+b.oy+b.fy, scale=1;
    if(i===dragStart){ x+=dragOff.x; y+=dragOff.y; scale=1.08; }
    else if(dragStart>=0 && i===dragTgt){ x+=dragLean.x; y+=dragLean.y; }
    if(b.shake>0) x+=Math.sin(now/26+i)*b.shake*5;
    if(remixing){ const f=ease((now-remixFx.t0)/remixFx.dur);
      const ang=(i*0.53)+(1-f)*5.0; const rr=(1-f)*(90+((i*13)%60));
      x=latCX+Math.cos(ang)*rr + (b.x-latCX)*f; y=latCY+Math.sin(ang)*rr*0.7 + (b.y-latCY)*f; }
    let r=(ballRad + Math.sin(now/170+i)*0.6)*scale;
    const age=now-b.born; if(age<260){ const f=age/260; r*=0.62+0.38*f; }
    if(b.c==='K'){ drawBomb(x,y,r,now,i); return; }
    let sq=0; if(b.land){ const la=now-b.land; if(la<140) sq=1-la/140; else b.land=0; }
    if(sq>0){ ctx.save(); ctx.translate(x,y); ctx.scale(1+0.16*sq,1-0.22*sq); ctx.translate(-x,-y); }
    const sel=(i===selIdx);
    stickerCircle(x,y,r,colOf(b.c),INK,sel?4:3);
    if(isSec(b.c)){ ctx.save(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(x,y,r-4,0,6.2832); ctx.stroke(); ctx.restore(); }
    if(b.c==='W'){ // prism sparkle
      ctx.save(); for(let k=0;k<3;k++){ const a=now/380+k*2.09; const rr=r*0.5;
        ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,2.4,0,6.28);
        ctx.fillStyle=[HEX.R,HEX.B,HEX.G][k]; ctx.globalAlpha=0.7; ctx.fill(); }
      ctx.restore(); }
    ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.34,r*0.24,0,6.28); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill();
    if(sq>0) ctx.restore();
    if(b.forgeFx && now-b.forgeFx<600){ const f=(now-b.forgeFx)/600; ctx.save(); ctx.globalAlpha=1-f;
      for(let k=0;k<4;k++){ const a=k*1.57+f*4; const rr=r+3+f*10;
        ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,2.2*(1-f)+1,0,6.28); ctx.fillStyle=ACCENT; ctx.fill(); }
      ctx.restore(); }
    if(sel){ ctx.beginPath(); ctx.arc(x,y,r+4,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=2.6; ctx.stroke();
      for(const ni of NEIGH[i]){ const nb=cells[ni]; if(nb.c==null) continue; ctx.beginPath(); ctx.arc(nb.x,nb.y+nb.oy,ballRad+2,0,6.28);
        ctx.strokeStyle='rgba(255,209,92,.4)'; ctx.lineWidth=2; ctx.stroke(); } }
}
function drawBomb(x,y,r,now,i){
  stickerCircle(x,y,r,BOMBC,INK,3);
  ctx.beginPath(); ctx.arc(x-r*0.28,y-r*0.3,r*0.22,0,6.28); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fill();
  // fuse
  ctx.save(); ctx.strokeStyle='#b98a4a'; ctx.lineWidth=2.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x+r*0.4,y-r*0.55); ctx.quadraticCurveTo(x+r*0.9,y-r*0.9,x+r*0.7,y-r*1.15); ctx.stroke(); ctx.restore();
  const fl=0.7+0.3*Math.sin(now/60+i);
  ctx.beginPath(); ctx.arc(x+r*0.7,y-r*1.15,3.2*fl+1.5,0,6.28); ctx.fillStyle=ACCENT; ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.7,y-r*1.15,1.8*fl,0,6.28); ctx.fillStyle='#fff6d8'; ctx.fill();
}
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
// goo blobs, drawn DIRECTLY on the main context — no offscreen render, no getImageData
// readback. The old metaball threshold produced a solid core out to ~1.3r with a short
// soft falloff to ~1.9r at 0.8 alpha; a radial gradient with a hard shoulder matches it.
function drawPopGoo(){
  if(popGoo.length===0) return;
  ctx.save(); ctx.globalAlpha=0.8;
  for(const g of popGoo){ const R=g.r*1.9;
    const [r,gr,bl]=g.rgb;
    const grd=ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,R);
    grd.addColorStop(0,g.col); grd.addColorStop(0.68,g.col);
    grd.addColorStop(1,`rgba(${r},${gr},${bl},0)`);
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(g.x,g.y,R,0,6.2832); ctx.fill(); }
  ctx.restore();
}
function drawShocks(now){ for(const s of shocks){ let f=(now-s.t0)/s.dur; if(f<0)f=0; if(f>=1)continue; const r=f*s.maxr;
  ctx.save(); ctx.globalAlpha=(1-f)*0.85;
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=14*(1-f)+2; ctx.stroke();
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle='rgba(44,39,51,.5)'; ctx.lineWidth=4*(1-f); ctx.stroke(); ctx.restore(); } }
function drawRemix(now){ if(!remixFx) return; const f=(now-remixFx.t0)/remixFx.dur; if(f<0||f>=1) return;
  ctx.save(); ctx.globalAlpha=(1-f)*0.5;
  for(const fp of remixFx.from){ const a=(1-f)*4; const rr=(1-f)*70;
    const x=latCX+(fp.x-latCX)*f+Math.cos(a)*rr, y=latCY+(fp.y-latCY)*f+Math.sin(a)*rr*0.7;
    ctx.beginPath(); ctx.arc(x,y,ballRad*0.4*(1-f)+2,0,6.28); ctx.fillStyle=colOf(fp.c); ctx.fill(); }
  ctx.globalAlpha=(1-f)*0.4; ctx.beginPath(); ctx.arc(latCX,latCY,(f*180)+10,0,6.28);
  ctx.strokeStyle='rgba(44,39,51,.4)'; ctx.lineWidth=3*(1-f); ctx.stroke(); ctx.restore(); }
function drawPuffs(){ for(const p of puffs){ const a=Math.max(0,p.life/p.max);
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; }
  for(const p of sparks){ const a=Math.max(0,p.life/p.max); ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28);
    ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; } }
function drawFlyers(now){ for(const f of flyers){ if(f.cx==null) continue;
  const rr=ballRad*0.62; stickerCircle(f.cx,f.cy,rr,colOf(f.c),INK,2.4);
  ctx.beginPath(); ctx.arc(f.cx-rr*0.3,f.cy-rr*0.3,rr*0.28,0,6.28); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill(); } }
function drawChain(now){ if(!chainLabel) return; const a=Math.max(0,chainLabel.life/1.1);
  const txt=chainLabel.text||('chain ×'+chainLabel.n);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 20px Fredoka, sans-serif';
  const y=topY-22-(1-a)*10;
  ctx.lineWidth=4; ctx.strokeStyle=PAPER; ctx.strokeText(txt,W/2,y); ctx.fillStyle=chainLabel.text?HEX.P:ACCENT; ctx.fillText(txt,W/2,y); ctx.restore(); }
function drawBrew(now){ if(!brewLabel) return; const a=Math.max(0,brewLabel.life/1.2);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 26px Fredoka, sans-serif';
  const y=latCY-(1-a)*30;
  ctx.lineWidth=5; ctx.strokeStyle=INK; ctx.strokeText(brewLabel.text,W/2,y);
  ctx.fillStyle=brewLabel.col; ctx.fillText(brewLabel.text,W/2,y); ctx.restore(); }
function drawFlash(now){ if(!flashFx) return; const f=(now-flashFx.born)/flashFx.dur; if(f<0||f>=1) return;
  ctx.save(); ctx.globalAlpha=(1-f)*0.16; ctx.fillStyle=flashFx.col; ctx.fillRect(0,0,W,H); ctx.restore(); }
function ease(t){ t=Math.max(0,Math.min(1,t)); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

// ================= HUD (DOM) =================
const chipsEl=document.getElementById('chips'), movesNum=document.getElementById('movesNum'), movesBox=document.getElementById('movesBox');
const CONIC='conic-gradient('+HEX.R+','+HEX.Y+','+HEX.G+','+HEX.B+','+HEX.P+','+HEX.R+')';
// legible icon per goal type, shared by chips, lose pills and level-select cards
function goalIconEl(g){
  const wrap=document.createElement('span'); wrap.className='gicon';
  function dot(bg,cls){ const d=document.createElement('span'); d.className='dot'+(cls?' '+cls:'');
    if(bg) d.style.background=bg; wrap.appendChild(d); return d; }
  switch(g.t){
    case 'col':   dot(g.c==='W'?CONIC:colOf(g.c)); break;
    case 'ink':   dot(null,'ink'); break;
    case 'brew':  wrap.appendChild(document.createTextNode('🧪')); if(g.c) dot(HEX[g.c],'mini'); break;
    case 'white': dot(CONIC); wrap.appendChild(document.createTextNode('✦')); break;
    case 'boom':  wrap.appendChild(document.createTextNode('💣')); break;
    case 'chain': wrap.appendChild(document.createTextNode('⚡')); break;
  }
  return wrap;
}
function buildChips(){
  chipsEl.innerHTML='';
  for(const g of goals){ const el=document.createElement('div'); el.className='chip';
    el.appendChild(goalIconEl(g));
    const num=document.createElement('span'); num.className='num';
    el.appendChild(num); chipsEl.appendChild(el); g.chipEl=el; g.numEl=num; }
  chipRectsDirty=true;
}
// chip rects are cached and re-measured only when layout could have moved them
// (build, resize, state toggle, chip text/done change) — never per flyer per frame.
// If the chip row is hidden (zero rect, e.g. the win card just showed), the last
// known centre is kept so in-flight flyers still land somewhere sensible.
let chipRectsDirty=true;
function chipCenter(g){
  if(chipRectsDirty){
    for(const gg of goals){ if(!gg.chipEl) continue; const r=gg.chipEl.getBoundingClientRect();
      if(r.width>0||r.height>0) gg.rect={ x:r.left+r.width/2, y:r.top+r.height/2 }; }
    chipRectsDirty=false; }
  return (g&&g.rect) || {x:W/2,y:40}; }
function pulseChip(g){ if(!g||!g.chipEl) return; g.chipEl.classList.remove('pulse'); void g.chipEl.offsetWidth; g.chipEl.classList.add('pulse');
  setTimeout(()=>g.chipEl&&g.chipEl.classList.remove('pulse'),160); }
// chip DISPLAY lags mechanics: contributions still queued (unfired pops) or in flight
// (flyers) don't count yet, so the number ticks down as each ball lands on the chip.
function inFlightTo(g){ let n=0;
  for(const p of pops) if(!p.fired && (p.goal===g || p.inkG===g)) n++;
  for(const f of flyers) if(!f.landed && f.g===g) n++;
  return n; }
function dispRemaining(g){ const shown=Math.max(0, goalProgress(g)-inFlightTo(g));
  return Math.max(0, g.need-shown); }
let hudMoves=null, hudLow=null;
function updateHUD(){
  for(const g of goals){ if(!g.numEl) continue; const rem=dispRemaining(g);
    if(rem===g.prev) continue;                    // cache: only touch the DOM on change
    if(rem<=0){ g.chipEl.classList.add('done'); g.numEl.textContent=''; }
    else { g.chipEl.classList.remove('done'); g.numEl.textContent=(g.t==='chain')?('×'+g.need):rem; }
    chipRectsDirty=true;                          // text/done change can shift the chip row
    // brew/white/boom/chain tick at the forge/detonation/chain moment (no flyers for these)
    if(g.prev!==undefined && rem<g.prev && (g.t==='brew'||g.t==='white'||g.t==='boom'||g.t==='chain')){
      pulseChip(g); SFX.tick(g.t==='boom'?'K':'W');
      if(rem<=0) SFX.goalDone(); }
    g.prev=rem; }
  if(hudMoves!==movesLeft){ hudMoves=movesLeft; movesNum.textContent=movesLeft; }
  const low = movesLeft<=5 && state==='play';
  if(hudLow!==low){ hudLow=low; movesBox.classList.toggle('low', low); }
}

// ================= screens =================
const scr={ start:document.getElementById('scrStart'), select:document.getElementById('scrSelect'),
  win:document.getElementById('scrWin'), lose:document.getElementById('scrLose') };
const backBtn=document.getElementById('backBtn');
function setState(s){ state=s;
  for(const k in scr) scr[k].classList.toggle('show', s===k);
  const play=(s==='play');
  chipsEl.style.display=play?'flex':'none';
  movesBox.style.display=play?'block':'none';
  backBtn.classList.toggle('show', play);
  chipRectsDirty=true; wake();
}
function goSelect(){ buildLvGrid(); setState('select'); }
function buildLvGrid(){ const grid=document.getElementById('lvGrid'); grid.innerHTML='';
  for(let i=1;i<=LEVELS.length;i++){ const L=LEVELS[i-1]; const el=document.createElement('div'); el.className='lv';
    const unlocked=i<=progress.unlocked;
    if(!unlocked) el.classList.add('locked');
    const nm=document.createElement('div'); nm.className='nm';
    const b=document.createElement('b'); b.textContent=unlocked?String(i):'🔒';
    const t=document.createElement('span'); t.textContent=L.name;
    nm.appendChild(b); nm.appendChild(t);
    const ic=document.createElement('div'); ic.className='ic';
    for(const g of L.goals) ic.appendChild(goalIconEl(g));
    const ss=document.createElement('span'); ss.className='ss';
    const st=progress.stars[i]||0; ss.textContent=st?'★'.repeat(st):'';
    ic.appendChild(ss);
    el.appendChild(nm); el.appendChild(ic);
    if(unlocked) el.addEventListener('click', ()=>loadLevel(i));
    grid.appendChild(el); } }
function showWinScreen(){
  const stars=document.getElementById('winStars').children;
  for(let k=0;k<3;k++) stars[k].classList.toggle('on', k<winInfo.stars);
  const nm=LEVELS[level-1].name;
  document.getElementById('winSub').textContent = (level<LEVELS.length)
    ? `“${nm}” cleared · ${winInfo.moves} move${winInfo.moves===1?'':'s'} to spare · ${winInfo.stars}★`
    : `“${nm}” cleared — you finished Hexbrew! ${winInfo.stars}★`;
  const nb=document.getElementById('btnNext'); nb.style.display=(level<LEVELS.length)?'':'none';
}
function showLoseScreen(){ const g=document.getElementById('loseGoals'); g.innerHTML='';
  for(const goal of goals){ const el=document.createElement('div'); el.className='gpill';
    el.appendChild(goalIconEl(goal));
    const t=document.createElement('span');
    t.textContent=Math.min(goalProgress(goal),goal.need)+'/'+goal.need;
    el.appendChild(t); g.appendChild(el); } }

document.getElementById('btnPlay').addEventListener('click', goSelect);
document.getElementById('btnNext').addEventListener('click', ()=>loadLevel(level+1));
document.getElementById('btnRetry').addEventListener('click', ()=>loadLevel(level));
document.getElementById('btnWinSelect').addEventListener('click', goSelect);
document.getElementById('btnLoseSelect').addEventListener('click', goSelect);
backBtn.addEventListener('click', goSelect);
const muteBtn=document.getElementById('muteBtn');
function muteIcon(){ muteBtn.textContent=SFX.muted?'🔇':'🔊'; }
muteBtn.addEventListener('click', ()=>{ try{ SFX.init(); }catch(e){} SFX.setMuted(!SFX.muted); muteIcon(); });
muteIcon();

// ================= input =================
// a drag is OWNED by the finger (touch identifier) that started it — extra fingers
// can neither steal the dragged ball nor cancel the drag by lifting.
let dragTouchId=null;
function findTouch(list,id){ if(list){ for(let k=0;k<list.length;k++){ if(list[k].identifier===id) return list[k]; } } return null; }
function getPos(ev){ const rect=canvas.getBoundingClientRect(); let cx,cy;
  if(ev.changedTouches){ // touch event: prefer the owning finger, else first changed/active
    const t=(dragTouchId!=null && (findTouch(ev.touches,dragTouchId)||findTouch(ev.changedTouches,dragTouchId)))
            || ev.changedTouches[0] || (ev.touches&&ev.touches[0]);
    cx=t.clientX; cy=t.clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top}; }
function ballAt(x,y){ let best=-1,bd=ballRad*1.3; for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null||b.c==='K') continue;
  const d=Math.hypot(x-b.x,y-b.y); if(d<bd){bd=d;best=i;} } return best; }
// drag feedback: A follows the pointer (clamped), B leans reciprocally. Dragging
// past ~45% of spacing commits the swap immediately (finger still down — release
// is just letting go); a short release springs back with a wobble.
const DRAG_CAP=0.55, DRAG_COMMIT=0.45, DRAG_PICK=0.15, LEAN=0.25;
let dragStart=-1, downPos={x:0,y:0}, movedFar=false;
let dragOff={x:0,y:0}, dragTgt=-1, dragLean={x:0,y:0};
function springTo(i,ox,oy){ const c=cells[i]; if(!c) return; c.fx=ox; c.fy=oy; c.fvx=0; c.fvy=0; }
function clearDrag(){ dragStart=-1; dragTouchId=null; dragTgt=-1; dragOff={x:0,y:0}; dragLean={x:0,y:0}; }
function onDown(ev){ wake(); if(state!=='play') return;
  if(dragStart>=0) return;                                   // a drag is live — ignore extra fingers
  const isTouch=!!ev.changedTouches;
  const p=getPos(ev);
  const i=ballAt(p.x,p.y); if(i<0){ return; }
  ev.preventDefault(); dragStart=i; downPos=p; movedFar=false;
  dragTouchId=(isTouch&&ev.changedTouches[0])?ev.changedTouches[0].identifier:null;
  dragOff={x:0,y:0}; dragTgt=-1; dragLean={x:0,y:0}; }
function onMove(ev){ if(dragStart<0) return;
  const isTouch=!!ev.changedTouches;
  if(isTouch!==(dragTouchId!=null)) return;                  // wrong input family for this drag
  if(isTouch && !findTouch(ev.touches,dragTouchId) && !findTouch(ev.changedTouches,dragTouchId)) return; // not our finger
  const p=getPos(ev); ev.preventDefault();
  if(!movedFar && Math.hypot(p.x-downPos.x,p.y-downPos.y)>ballRad*0.5) movedFar=true;
  const A=cells[dragStart];
  let vx=p.x-A.x, vy=p.y-A.y; const mag=Math.hypot(vx,vy);
  const cap=DRAG_CAP*ROW_DY;                       // clamp: never further than 55% of the way over
  if(mag>cap){ vx*=cap/mag; vy*=cap/mag; }
  dragOff={x:vx,y:vy};
  dragTgt=-1;
  if(mag>DRAG_PICK*ROW_DY){                        // direction clearly selects a neighbour
    let best=-1,bd=0.35;
    for(const ni of NEIGH[dragStart]){ const n=cells[ni]; if(n.c==null||n.c==='K') continue;
      const dx=n.x-A.x, dy=n.y-A.y, dl=Math.hypot(dx,dy)||1;
      const cos=(vx*dx+vy*dy)/((Math.hypot(vx,vy)||1)*dl);
      if(cos>bd){ bd=cos; best=ni; } }
    dragTgt=best; }
  if(dragTgt>=0){ const B=cells[dragTgt];
    const f=Math.min(1, Math.hypot(dragOff.x,dragOff.y)/cap);
    dragLean={x:(A.x-B.x)*LEAN*f, y:(A.y-B.y)*LEAN*f}; }
  else dragLean={x:0,y:0};
  // drag far enough and the swap just happens — no need to let go
  if(dragTgt>=0){ const B=cells[dragTgt];
    if(A.c!==B.c){
      const dx=B.x-A.x, dy=B.y-A.y, dl=Math.hypot(dx,dy)||1;
      const proj=(dragOff.x*dx+dragOff.y*dy)/dl;
      if(proj>=DRAG_COMMIT*ROW_DY){
        const start=dragStart, tgt=dragTgt, off={x:dragOff.x,y:dragOff.y}, lean={x:dragLean.x,y:dragLean.y};
        clearDrag();
        const res=swapCore(start,tgt);
        if(res.type==='match'||res.type==='positional'){
          springTo(tgt, (A.x+off.x)-B.x, (A.y+off.y)-B.y);
          springTo(start, (B.x+lean.x)-A.x, (B.y+lean.y)-A.y);
        } else { springTo(start, off.x, off.y); springTo(tgt, lean.x, lean.y); SFX.spring(); }
        selIdx=-1;
      } } }
}
function onUp(ev){ if(dragStart<0) return;
  const isTouch=!!ev.changedTouches;
  if(isTouch!==(dragTouchId!=null)) return;                  // wrong input family for this drag
  if(isTouch && !findTouch(ev.changedTouches,dragTouchId)) return; // another finger lifted — drag lives on
  ev.preventDefault(); wake(); const p=getPos(ev);
  const start=dragStart, tgt=dragTgt, off={x:dragOff.x,y:dragOff.y}, lean={x:dragLean.x,y:dragLean.y};
  clearDrag();
  if(movedFar){
    // commit happens mid-drag now — any release that gets here springs back
    springTo(start, off.x, off.y); if(tgt>=0) springTo(tgt, lean.x, lean.y);
    SFX.spring(); selIdx=-1; return;
  }
  // tap-tap path unchanged
  if(selIdx<0){ selIdx=start; }
  else if(selIdx===start){ selIdx=-1; }
  else if(adjacent(selIdx,start)){ swapCore(selIdx,start); selIdx=-1; }
  else { selIdx=start; }
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});
// returning to the tab: resume a suspended AudioContext and repaint the (possibly stale) frame
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ SFX.resume(); wake(); } });

// ================= debug handle =================
window.HB = {
  get board(){ return cells.map((b,i)=>({i,q:b.q,r:b.r,c:b.c,x:b.x,y:b.y})); },
  get state(){ return state; },
  get level(){ return level; },
  get movesLeft(){ return movesLeft; },
  get goals(){ return goals.map(g=>({t:g.t,c:g.c,need:g.need,progress:goalProgress(g),remaining:remainingOf(g)})); },
  get ink(){ return ink.slice(); },
  get inkRemaining(){ return ink.reduce((a,b)=>a+b,0); },
  get palette(){ return PALETTE.slice(); },
  setInk(i,v){ if(i>=0&&i<N) ink[i]=v?1:0; },
  setFresh(i,v){ if(cells[i]) cells[i].fresh=!!v; },
  fresh(){ return cells.map(c=>!!c.fresh); },
  setMaxChain(n){ stats.maxChain=Math.max(stats.maxChain,n|0); },
  get collect(){ return Object.assign({},collect); },
  get stats(){ return Object.assign({},stats); },
  get resolving(){ return !!resolver; },
  get resolverState(){ return resolver?{phase:resolver.phase,t:resolver.t,depth:resolver.depth}:null; },
  get pendingForge(){ return resolver?resolver.pendingForge.map(o=>Object.assign({},o)):[]; },
  get pendingPops(){ return pops.filter(p=>!p.fired).length; },
  get audio(){ return { ready:SFX.ready, muted:SFX.muted }; },
  setMuted(m){ SFX.setMuted(m); },
  get winState(){ return (state==='win')?'win':(state==='lose'?'lose':null); },
  get winPending(){ return !!pendingWin; },
  get flyersInFlight(){ return flyers.length; },
  get drag(){ return { start:dragStart, touch:dragTouchId }; },
  get winInfo(){ return winInfo?Object.assign({},winInfo):null; },
  get progress(){ return JSON.parse(JSON.stringify(progress)); },
  colours(){ return cells.map(c=>c.c); },
  neighbors(i){ return NEIGH[i]?NEIGH[i].slice():[]; },
  lines(){ return ALL_LINES.map(l=>l.slice()); },
  hexDist(i,j){ return hexDist(i,j); },
  setBall(i,c){ if(cells[i]){ cells[i].c=c; cells[i].oy=0; cells[i].fresh=false; cells[i].bombBorn=(c==='K')?performance.now():0; } },
  setMoves(n){ movesLeft=Math.max(0,n|0); },
  sanitizeExcept(prot){ const P=new Set(prot); for(let i=0;i<N;i++){ if(!P.has(i)){ cells[i].c=randPrim(); cells[i].fresh=false; cells[i].bombBorn=0; } }
    let g=0; while(g++<800 && hasInstantMatch()){ const ms=findMatches();
      if(ms.every(m=>m.cells.every(ci=>P.has(ci)))) break;
      for(const m of ms) for(const ci of m.cells){ if(!P.has(ci)) cells[ci].c=randPrim(); } } },
  swap(a,b){ return swapCore(a,b); },
  triggerResolve(){ if(resolver) return false; return startResolve(); },
  findMatches(){ return findMatches().map(m=>({cells:m.cells.slice(),colour:m.colour,len:m.len})); },
  hasMatchingMove(){ return hasMatchingMove(); },
  hasInstantMatch(){ return hasInstantMatch(); },
  forceRemix(){ return remix(true); },
  loadLevel(n){ loadLevel(n); },
  goSelect(){ goSelect(); },
  step(ms){ let t=ms||16; while(t>0){ const d=Math.min(16,t)/1000; update(d,performance.now()); t-=16; } },
  settle(maxMs){ let t=maxMs||20000; while((resolver||pendingWin) && t>0){ update(0.016,performance.now()); t-=16; } return !resolver; },
  levels(){ return LEVELS.map(l=>({name:l.name,goals:l.goals.map(g=>Object.assign({},g)),moves:l.moves,
    palette:l.palette?l.palette.slice():null, ink:l.ink?l.ink.length:0, seed:l.seed?l.seed.map(s=>Object.assign({},s)):null})); },
  resetProgress(){ progress={v:2,unlocked:1,stars:{}}; saveProgress(); }
};

// ================= boot =================
layout();
genNoMatch();
setState('start');
requestAnimationFrame(tick);
})();
</script>
