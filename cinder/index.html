<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Cinder</title>
<style>
  html,body{margin:0;height:100%;background:#07080d;overflow:hidden;
    font:14px/1.4 ui-rounded,"Segoe UI",system-ui,sans-serif;color:#eaf0ff;
    -webkit-user-select:none;user-select:none;touch-action:none;cursor:crosshair;}
  #c{position:fixed;inset:0;display:block;}
  #hud{position:fixed;top:10px;left:0;right:0;z-index:5;display:flex;justify-content:center;
    gap:18px;pointer-events:none;font-weight:700;text-shadow:0 0 8px rgba(0,0,0,.8);font-size:13px;}
  #hud .b{color:#9fb0d0;font-weight:600;}
  #hpwrap{position:fixed;top:34px;left:50%;transform:translateX(-50%);z-index:5;width:240px;
    height:9px;background:#1a1f30;border-radius:6px;overflow:hidden;border:1px solid #2a3350;pointer-events:none;}
  #hp{height:100%;width:100%;background:linear-gradient(90deg,#ff4d6d,#ff9a6c);transition:width .1s;}
  #xpwrap{position:fixed;top:0;left:0;right:0;height:4px;background:#101525;z-index:5;pointer-events:none;}
  #xp{height:100%;width:0;background:linear-gradient(90deg,#46e0ff,#7affd0);}
  .overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;background:rgba(7,8,13,.7);backdrop-filter:blur(3px);text-align:center;padding:24px;}
  .overlay h1{margin:0;font-size:40px;letter-spacing:.14em;
    background:linear-gradient(90deg,#ff8a3b,#46e0ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .overlay h2{margin:0;font-size:22px;}
  .overlay p{margin:0;color:#9fb0d0;font-size:13px;max-width:34ch;line-height:1.6;}
  .btn{background:linear-gradient(90deg,#2b67ff,#46a0ff);border:none;color:#fff;font:700 16px ui-rounded,system-ui;
    padding:13px 26px;border-radius:13px;cursor:pointer;box-shadow:0 0 24px rgba(43,103,255,.5);}
  .btn:active{transform:translateY(1px);}
  .hidden{display:none!important;}
  #cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .card{width:150px;background:#121828;border:2px solid #283454;border-radius:14px;padding:16px 12px;cursor:pointer;
    transition:.1s;box-shadow:0 6px 18px rgba(0,0,0,.4);}
  .card:hover{transform:translateY(-4px);border-color:#46e0ff;box-shadow:0 0 22px rgba(70,224,255,.35);}
  .card .ic{font-size:30px;filter:drop-shadow(0 0 8px currentColor);}
  .card .t{font-weight:800;margin:8px 0 5px;font-size:15px;}
  .card .d{font-size:11.5px;color:#9fb0d0;line-height:1.45;}
  .card .lv{font-size:10px;color:#7affd0;margin-top:8px;text-transform:uppercase;letter-spacing:.08em;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="xpwrap"><div id="xp"></div></div>
  <div id="hud"><div>Lv <span id="hlvl">1</span></div><div><span class="b">time</span> <span id="htime">0:00</span></div><div><span class="b">kills</span> <span id="hkills">0</span></div></div>
  <div id="hpwrap"><div id="hp"></div></div>

  <div id="ovStart" class="overlay">
    <h1>CINDER</h1>
    <p>Move to steer (drag, or WASD). You fire on your own. The floor is a chemistry set: light <b style="color:#ff8a3b">oil</b> on fire, flood with <b style="color:#46a0ff">water</b>, then <b style="color:#a0e0ff">spark</b> it to chain-shock the wet. Survive.</p>
    <button class="btn" id="bStart">Start</button>
  </div>
  <div id="ovLevel" class="overlay hidden">
    <h2>Level up</h2><p>Pick one.</p><div id="cards"></div>
  </div>
  <div id="ovOver" class="overlay hidden">
    <h1 style="background:linear-gradient(90deg,#ff4d6d,#ff9a6c);-webkit-background-clip:text;background-clip:text;color:transparent;">DOWN</h1>
    <h2 id="overStat"></h2>
    <button class="btn" id="bRetry">Again</button>
  </div>

<script>
(function () {
  'use strict';
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  let W = 0, H = 0, CELL = 44, gw = 0, gh = 0;
  function fit() { W = cv.width = innerWidth; H = cv.height = innerHeight; gw = Math.ceil(W / CELL); gh = Math.ceil(H / CELL); }
  fit(); addEventListener('resize', fit);

  // ---------- elements / surfaces ----------
  // surf[i] = {el,amt} | null  (el: 'fire'|'oil'|'water'|'steam')  ; lightning is an instant event
  const ELC = { fire: [255, 120, 40], oil: [150, 90, 200], water: [60, 150, 255], steam: [200, 210, 230] };
  let surf = [];
  const idx = (gx, gy) => gy * gw + gx;
  const sAt = (gx, gy) => (gx >= 0 && gy >= 0 && gx < gw && gy < gh) ? surf[idx(gx, gy)] : null;
  const cellOf = (x, y) => [Math.floor(x / CELL), Math.floor(y / CELL)];
  function clearSurf() { surf = new Array(gw * gh).fill(null); }
  const MAXA = 8;

  function applyEl(gx, gy, el, amt) {
    if (gx < 0 || gy < 0 || gx >= gw || gy >= gh) return;
    amt = Math.min(MAXA, amt); const i = idx(gx, gy), cur = surf[i];
    if (!cur) { surf[i] = { el, amt }; return; }
    if (cur.el === el) { cur.amt = Math.min(MAXA, Math.max(cur.amt, amt)); return; }
    const has = (a, b) => (cur.el === a && el === b) || (cur.el === b && el === a);
    if (has('oil', 'fire')) { surf[i] = { el: 'fire', amt: Math.min(MAXA, (cur.el === 'oil' ? cur.amt : amt) + 2) }; pop(gx, gy, 'fire'); sfx('ignite'); }
    else if (has('water', 'fire')) { surf[i] = { el: 'steam', amt: Math.min(cur.amt, amt) }; pop(gx, gy, 'steam'); sfx('steam'); }
    else surf[i] = { el, amt };
  }
  const nb = (gx, gy) => { const o = []; if (gx > 0) o.push([gx - 1, gy]); if (gx < gw - 1) o.push([gx + 1, gy]); if (gy > 0) o.push([gx, gy - 1]); if (gy < gh - 1) o.push([gx, gy + 1]); return o; };
  function tickSurf() {
    const spread = [];
    for (let gy = 0; gy < gh; gy++) for (let gx = 0; gx < gw; gx++) {
      const s = surf[idx(gx, gy)]; if (!s) continue;
      if (s.el === 'fire') { s.amt -= 1.1; for (const [nx, ny] of nb(gx, gy)) { const n = sAt(nx, ny); if (n && n.el === 'oil') spread.push([nx, ny, 'fire', n.amt + 2]); else if (P.wildfire && !n && s.amt > 3) spread.push([nx, ny, 'fire', s.amt - 3]); } }
      else if (s.el === 'water') { s.amt -= 0.25; if (s.amt > 3) for (const [nx, ny] of nb(gx, gy)) { if (!sAt(nx, ny)) { spread.push([nx, ny, 'water', s.amt - 2]); s.amt -= 1; break; } } }
      else if (s.el === 'oil') s.amt -= 0.06;
      else if (s.el === 'steam') { s.amt -= 0.7; if (s.amt > 2) for (const [nx, ny] of nb(gx, gy)) if (!sAt(nx, ny)) { spread.push([nx, ny, 'steam', s.amt - 2]); break; } }
      if (s.amt <= 0) surf[idx(gx, gy)] = null;
    }
    for (const [x, y, e, a] of spread) applyEl(x, y, e, a);
  }
  function paint(x, y, el, amt, rad) { const [cx, cy] = cellOf(x, y); const r = rad || 0; for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) if (dx * dx + dy * dy <= r * r + 1) applyEl(cx + dx, cy + dy, el, amt); }

  // lightning strike: chain through connected water/steam, shocking wet enemies on it
  function strike(x, y) {
    const [cx, cy] = cellOf(x, y); const seen = {}, q = [];
    const seeds = [[cx, cy], ...nb(cx, cy)];
    for (const [sx, sy] of seeds) { const s = sAt(sx, sy); if (s && (s.el === 'water' || s.el === 'steam') && !seen[sx + ',' + sy]) { seen[sx + ',' + sy] = 1; q.push([sx, sy]); } }
    const region = [];
    while (q.length) { const [gx, gy] = q.pop(); region.push([gx, gy]); for (const [nx, ny] of nb(gx, gy)) { const n = sAt(nx, ny); if (n && (n.el === 'water' || n.el === 'steam') && !seen[nx + ',' + ny]) { seen[nx + ',' + ny] = 1; q.push([nx, ny]); } } }
    let hit = 0;
    for (const e of enemies) { const [ex, ey] = cellOf(e.x, e.y); if (seen[ex + ',' + ey] || (ex === cx && ey === cy)) { shock(e); hit++; } }
    if (region.length) { for (const [gx, gy] of region) { const p1 = [(gx + .5) * CELL, (gy + .5) * CELL]; arc(x, y, p1[0], p1[1]); } shakeAdd(Math.min(7, 2 + region.length * .3)); sfx('shockBig'); }
    else { arc(x, y, x, y); sfx('shock'); }
    return hit;
  }
  function shock(e) { dmg(e, P.staticDmg * (e.wet > 0 ? 2.2 : 1), '#bff0ff'); e.stun = 0.7; for (let i = 0; i < 4; i++) part(e.x, e.y, '#bff0ff', 120); }

  // ---------- entities ----------
  let player, enemies, bullets, gems, parts, arcs, dmgs;
  let time, kills, level, xp, xpNext, spawnT, state, slow, shake, hitstop;
  const P = {}; // power levels + stat mods

  function reset() {
    clearSurf();
    player = { x: W / 2, y: H / 2, vx: 0, vy: 0, r: 11, hp: 100, maxhp: 100, speed: 230, pick: 70, hitcd: 0 };
    enemies = []; bullets = []; gems = []; parts = []; arcs = []; dmgs = [];
    time = 0; kills = 0; level = 1; xp = 0; xpNext = 5; spawnT = 0; slow = 1; shake = 0; hitstop = 0;
    Object.assign(P, { ember: 1, oil: 0, hydro: 0, static: 0, wildfire: 0,
      emberCd: 0.42, emberDmg: 8, oilCd: 2.4, hydroCd: 3.2, staticCd: 2.0, staticDmg: 22,
      _ember: 0, _oil: 0, _hydro: 0, _static: 0 });
  }

  // ---------- input ----------
  const keys = {}; let ptr = null, ptrActive = false;
  addEventListener('keydown', e => { keys[e.key.toLowerCase()] = 1; });
  addEventListener('keyup', e => { keys[e.key.toLowerCase()] = 0; });
  cv.addEventListener('pointerdown', e => { ptr = [e.clientX, e.clientY]; ptrActive = true; });
  cv.addEventListener('pointermove', e => { ptr = [e.clientX, e.clientY]; });
  cv.addEventListener('pointerup', () => { ptrActive = false; });

  // ---------- spawning ----------
  function spawn() {
    const edge = Math.floor(Math.random() * 4); let x, y;
    if (edge === 0) { x = -20; y = Math.random() * H; } else if (edge === 1) { x = W + 20; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = -20; } else { x = Math.random() * W; y = H + 20; }
    const t = time, hp = 10 + t * 0.9, big = Math.random() < Math.min(0.25, t / 240);
    enemies.push({ x, y, r: big ? 16 : 9, hp: big ? hp * 3 : hp, maxhp: big ? hp * 3 : hp, spd: big ? 42 : 60 + Math.random() * 26, dmg: big ? 16 : 9, burn: 0, wet: 0, oil: 0, stun: 0, big, hue: big ? 280 : 350 });
  }

  // ---------- damage / death ----------
  function dmg(e, d, col) { e.hp -= d; dmgs.push({ x: e.x, y: e.y - e.r, v: -34, life: 0.7, t: Math.round(d), c: col || '#fff' }); }
  function killEnemy(i) {
    const e = enemies[i]; for (let k = 0; k < (e.big ? 14 : 7); k++) part(e.x, e.y, 'hsl(' + e.hue + ',90%,65%)', 150);
    gems.push({ x: e.x, y: e.y, v: e.big ? 5 : 1, vx: 0, vy: 0 });
    enemies.splice(i, 1); kills++; sfx('die');
  }

  // ---------- powers ----------
  function firePowers(dt) {
    // Ember: auto-fire bolts at nearest enemy, leaving a fire patch on hit
    P._ember -= dt; if (P._ember <= 0 && enemies.length) {
      const e = nearest(); if (e) { const a = Math.atan2(e.y - player.y, e.x - player.x);
        for (let k = 0; k < P.ember; k++) { const sp = a + (k - (P.ember - 1) / 2) * 0.16; bullets.push({ x: player.x, y: player.y, vx: Math.cos(sp) * 520, vy: Math.sin(sp) * 520, r: 4, dmg: P.emberDmg, life: 1.1 }); }
        P._ember = P.emberCd; sfx('shoot');
      }
    }
    if (P.oil) { P._oil -= dt; if (P._oil <= 0) { const e = nearest() || player; paint(e.x, e.y, 'oil', 6, 1); P._oil = P.oilCd; } }
    if (P.hydro) { P._hydro -= dt; if (P._hydro <= 0) { paint(player.x, player.y, 'water', 6, 2); for (const en of enemies) if (dist2(en, player) < 150 * 150) en.wet = 3; ring(player.x, player.y, '#46a0ff'); P._hydro = P.hydroCd; sfx('steam'); } }
    if (P.static) { P._static -= dt; if (P._static <= 0) { const e = nearest(); if (e) strike(e.x, e.y); P._static = P.staticCd; } }
  }
  function nearest() { let b = null, bd = 1e9; for (const e of enemies) { const d = dist2(e, player); if (d < bd) { bd = d; b = e; } } return b; }
  const dist2 = (a, b) => (a.x - b.x) ** 2 + (a.y - b.y) ** 2;

  // ---------- update ----------
  function update(dt) {
    time += dt;
    // movement
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my--; if (keys['s'] || keys['arrowdown']) my++;
    if (keys['a'] || keys['arrowleft']) mx--; if (keys['d'] || keys['arrowright']) mx++;
    if (mx || my) { const l = Math.hypot(mx, my); player.x += (mx / l) * player.speed * dt; player.y += (my / l) * player.speed * dt; }
    else if (ptrActive && ptr) { const dx = ptr[0] - player.x, dy = ptr[1] - player.y, l = Math.hypot(dx, dy); if (l > 4) { const s = Math.min(player.speed, l * 6); player.x += (dx / l) * s * dt; player.y += (dy / l) * s * dt; } }
    player.x = Math.max(player.r, Math.min(W - player.r, player.x)); player.y = Math.max(player.r, Math.min(H - player.r, player.y));
    if (player.hitcd > 0) player.hitcd -= dt;

    firePowers(dt);

    // spawn ramp
    spawnT -= dt; const rate = Math.max(0.16, 0.95 - time * 0.012); if (spawnT <= 0) { spawn(); spawnT = rate; }

    // bullets
    for (let i = bullets.length - 1; i >= 0; i--) { const b = bullets[i]; b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
      if (b.life <= 0 || b.x < -30 || b.x > W + 30 || b.y < -30 || b.y > H + 30) { bullets.splice(i, 1); continue; }
      for (let j = 0; j < enemies.length; j++) { const e = enemies[j]; if ((e.x - b.x) ** 2 + (e.y - b.y) ** 2 < (e.r + b.r) ** 2) { dmg(e, b.dmg, '#ffd08a'); paint(b.x, b.y, 'fire', 3, 0); for (let k = 0; k < 3; k++) part(b.x, b.y, '#ffb060', 90); bullets.splice(i, 1); break; } }
    }

    // enemies
    for (let i = enemies.length - 1; i >= 0; i--) { const e = enemies[i];
      const [cx, cy] = cellOf(e.x, e.y), s = sAt(cx, cy);
      if (s) { if (s.el === 'fire' && e.wet <= 0) e.burn = 1.5; if (s.el === 'water' || s.el === 'steam') { e.wet = 3; e.burn = 0; } if (s.el === 'oil') e.oil = 2.5; }
      let mul = 1; if (e.oil > 0) { mul *= 0.5; e.oil -= dt; } if (e.stun > 0) { mul = 0; e.stun -= dt; }
      if (e.burn > 0) { e.hp -= (6 + time * 0.05) * (e.oil > 0 ? 2 : 1) * dt; e.burn -= dt; if (Math.random() < dt * 6) part(e.x, e.y, '#ff9040', 60); }
      if (e.wet > 0) e.wet -= dt;
      const dx = player.x - e.x, dy = player.y - e.y, l = Math.hypot(dx, dy) || 1; e.x += (dx / l) * e.spd * mul * dt; e.y += (dy / l) * e.spd * mul * dt;
      if (e.hp <= 0) { killEnemy(i); continue; }
      if (l < e.r + player.r && player.hitcd <= 0) { player.hp -= e.dmg; player.hitcd = 0.7; shakeAdd(5); hitstop = 0.05; sfx('hurt'); for (let k = 0; k < 6; k++) part(player.x, player.y, '#ff5070', 130); if (player.hp <= 0) return gameOver(); }
    }

    // gems
    for (let i = gems.length - 1; i >= 0; i--) { const g = gems[i]; const dx = player.x - g.x, dy = player.y - g.y, l = Math.hypot(dx, dy);
      if (l < player.pick) { const s = 600 / Math.max(20, l); g.x += dx * s * dt; g.y += dy * s * dt; }
      if (l < player.r + 6) { xp += g.v; gems.splice(i, 1); sfx('gem'); if (xp >= xpNext) levelUp(); }
    }

    // surfaces tick (own cadence)
    surfAcc += dt; while (surfAcc >= 0.12) { tickSurf(); surfAcc -= 0.12; }

    // fx timers
    for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; if (p.life <= 0) { parts.splice(i, 1); continue; } p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= .93; p.vy *= .93; }
    for (let i = arcs.length - 1; i >= 0; i--) { arcs[i].life -= dt; if (arcs[i].life <= 0) arcs.splice(i, 1); }
    for (let i = dmgs.length - 1; i >= 0; i--) { const d = dmgs[i]; d.life -= dt; d.y += d.v * dt; if (d.life <= 0) dmgs.splice(i, 1); }
    if (shake > 0) shake = Math.max(0, shake - dt * 26);
  }
  let surfAcc = 0;

  // ---------- level up ----------
  const POOL = [
    { id: 'static', ic: '⚡', c: '#a0e0ff', name: 'Spark', get: () => P.static ? 'Spark fires faster and harder.' : 'Bolt the nearest foe. In water it chains to every wet enemy.', av: () => true, ap: () => { if (!P.static) P.static = 1; else { P.staticCd *= .8; P.staticDmg *= 1.3; } } },
    { id: 'oil', ic: '🛢️', c: '#b070e0', name: 'Oil', get: () => P.oil ? 'More oil, more often.' : 'Lob oil that slows foes -- and burns.', av: () => true, ap: () => { if (!P.oil) P.oil = 1; else P.oilCd *= .8; } },
    { id: 'hydro', ic: '💧', c: '#46a0ff', name: 'Hydro', get: () => P.hydro ? 'Bigger, faster water bursts.' : 'Burst water around you, soaking foes for shocks.', av: () => true, ap: () => { if (!P.hydro) P.hydro = 1; else P.hydroCd *= .8; } },
    { id: 'ember+', ic: '🔥', c: '#ff8a3b', name: 'Embers', get: () => '+1 bolt and faster fire.', av: () => true, ap: () => { P.ember++; P.emberCd *= .9; } },
    { id: 'pyro', ic: '🌋', c: '#ff6a2b', name: 'Pyromania', get: () => '+50% bolt damage.', av: () => true, ap: () => { P.emberDmg *= 1.5; } },
    { id: 'wild', ic: '♨️', c: '#ffae66', name: 'Wildfire', get: () => 'Fire spreads across bare ground.', av: () => !P.wildfire, ap: () => { P.wildfire = 1; } },
    { id: 'hp', ic: '❤️', c: '#ff5070', name: 'Vigor', get: () => '+30 max HP, healed.', av: () => true, ap: () => { player.maxhp += 30; player.hp += 30; } },
    { id: 'spd', ic: '🌀', c: '#7affd0', name: 'Swift', get: () => '+14% move speed.', av: () => true, ap: () => { player.speed *= 1.14; } },
    { id: 'mag', ic: '🧲', c: '#c0a0ff', name: 'Magnet', get: () => '+40% pickup range.', av: () => true, ap: () => { player.pick *= 1.4; } },
  ];
  function levelUp() {
    level++; xp -= xpNext; xpNext = Math.round(xpNext * 1.45 + 2); player.hp = Math.min(player.maxhp, player.hp + 6);
    state = 'level'; sfx('level');
    const avail = POOL.filter(u => u.av()); const pick = [];
    while (pick.length < 3 && avail.length) pick.push(avail.splice(Math.floor(Math.random() * avail.length), 1)[0]);
    const wrap = document.getElementById('cards'); wrap.innerHTML = '';
    for (const u of pick) { const el = document.createElement('div'); el.className = 'card';
      el.innerHTML = `<div class="ic" style="color:${u.c}">${u.ic}</div><div class="t">${u.name}</div><div class="d">${u.get()}</div>` + (P[u.id.replace('+','')] ? `<div class="lv">owned</div>` : '');
      el.onclick = () => { u.ap(); document.getElementById('ovLevel').classList.add('hidden'); state = 'play'; };
      wrap.appendChild(el);
    }
    document.getElementById('ovLevel').classList.remove('hidden');
  }

  // ---------- particles / fx ----------
  function part(x, y, c, sp) { const a = Math.random() * 7, s = sp * (.3 + Math.random()); parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: .4 + Math.random() * .4, max: .8, c, r: 1.5 + Math.random() * 2 }); }
  function pop(gx, gy, kind) { const x = (gx + .5) * CELL, y = (gy + .5) * CELL; const c = kind === 'fire' ? '#ff9040' : '#cfe0ff'; for (let i = 0; i < 7; i++) part(x, y, c, 110); }
  function ring(x, y, c) { parts.push({ ring: 1, x, y, r: 8, R: 150, life: .35, max: .35, c }); }
  function arc(x1, y1, x2, y2) { arcs.push({ x1, y1, x2, y2, life: .12 }); }
  function shakeAdd(v) { shake = Math.min(12, shake + v); }

  // ---------- render ----------
  function render() {
    // fade-clear for neon trails
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(7,8,13,0.34)'; ctx.fillRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
    ctx.globalCompositeOperation = 'lighter';

    // surfaces
    for (let gy = 0; gy < gh; gy++) for (let gx = 0; gx < gw; gx++) { const s = surf[idx(gx, gy)]; if (!s) continue;
      const c = ELC[s.el], a = Math.min(.6, .12 + s.amt / MAXA * .5) * (s.el === 'fire' ? .8 + Math.random() * .2 : 1);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${a})`; ctx.fillRect(gx * CELL, gy * CELL, CELL, CELL); }

    // gems
    for (const g of gems) { ctx.fillStyle = '#7affd0'; glow(g.x, g.y, 3 + g.v, '#7affd0'); }
    // bullets
    for (const b of bullets) glow(b.x, b.y, b.r, '#ffcf8a');
    // arcs (lightning)
    ctx.strokeStyle = '#cdf0ff'; ctx.lineWidth = 2;
    for (const a of arcs) { ctx.globalAlpha = a.life / .12; jag(a.x1, a.y1, a.x2, a.y2); } ctx.globalAlpha = 1;
    // enemies
    for (const e of enemies) { const col = `hsl(${e.hue},85%,62%)`; glow(e.x, e.y, e.r, col);
      if (e.burn > 0) ringStroke(e.x, e.y, e.r + 3, '#ff8030');
      if (e.wet > 0) ringStroke(e.x, e.y, e.r + 3, '#46a0ff');
      // hp pip
      if (e.hp < e.maxhp) { ctx.globalCompositeOperation = 'source-over'; ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(e.x - e.r, e.y - e.r - 6, e.r * 2, 2.5); ctx.fillStyle = '#7affd0'; ctx.fillRect(e.x - e.r, e.y - e.r - 6, e.r * 2 * Math.max(0, e.hp / e.maxhp), 2.5); ctx.globalCompositeOperation = 'lighter'; }
    }
    // particles
    for (const p of parts) { ctx.globalAlpha = Math.max(0, p.life / p.max);
      if (p.ring) { const t = 1 - p.life / p.max; ctx.strokeStyle = p.c; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(p.x, p.y, p.r + (p.R - p.r) * t, 0, 7); ctx.stroke(); }
      else { ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill(); } }
    ctx.globalAlpha = 1;
    // player
    const hurt = player.hitcd > 0 && Math.floor(player.hitcd * 20) % 2;
    glow(player.x, player.y, player.r, hurt ? '#ff5070' : '#9fe8ff'); glow(player.x, player.y, player.r * .5, '#ffffff');

    // damage numbers
    ctx.globalCompositeOperation = 'source-over'; ctx.textAlign = 'center'; ctx.font = '700 13px ui-rounded, system-ui';
    for (const d of dmgs) { ctx.globalAlpha = Math.max(0, d.life / .7); ctx.fillStyle = d.c; ctx.fillText(d.t, d.x, d.y); } ctx.globalAlpha = 1;
    ctx.restore();
  }
  function glow(x, y, r, c) { ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = r * 1.8; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill(); ctx.shadowBlur = 0; }
  function ringStroke(x, y, r, c) { ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke(); }
  function jag(x1, y1, x2, y2) { ctx.beginPath(); ctx.moveTo(x1, y1); const n = 4; for (let i = 1; i < n; i++) { const t = i / n; ctx.lineTo(x1 + (x2 - x1) * t + (Math.random() - .5) * 16, y1 + (y2 - y1) * t + (Math.random() - .5) * 16); } ctx.lineTo(x2, y2); ctx.stroke(); }

  // ---------- audio (tiny) ----------
  let ac = null; function aOn() { try { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if (ac.state === 'suspended') ac.resume(); } catch (e) {} }
  function tone(f, d, t, g, gl) { if (!ac) return; const o = ac.createOscillator(), n = ac.createGain(), s = ac.currentTime; o.type = t || 'sine'; o.frequency.setValueAtTime(f, s); if (gl) o.frequency.exponentialRampToValueAtTime(Math.max(1, gl), s + d); n.gain.setValueAtTime(.0001, s); n.gain.exponentialRampToValueAtTime(g || .04, s + .008); n.gain.exponentialRampToValueAtTime(.0001, s + d); o.connect(n); n.connect(ac.destination); o.start(s); o.stop(s + d + .02); }
  function noise(d, g, f) { if (!ac) return; const n = Math.floor(ac.sampleRate * d), b = ac.createBuffer(1, n, ac.sampleRate), dt = b.getChannelData(0); for (let i = 0; i < n; i++)dt[i] = (Math.random() * 2 - 1) * (1 - i / n); const s = ac.createBufferSource(); s.buffer = b; const fl = ac.createBiquadFilter(); fl.type = 'highpass'; fl.frequency.value = f || 800; const gg = ac.createGain(); gg.gain.value = g || .04; s.connect(fl); fl.connect(gg); gg.connect(ac.destination); s.start(); s.stop(ac.currentTime + d); }
  function sfx(n) { if (!ac) return; switch (n) { case 'shoot': tone(680, .05, 'triangle', .025, 400); break; case 'die': tone(200, .12, 'triangle', .03, 80); break; case 'gem': tone(900, .05, 'sine', .02, 1300); break; case 'hurt': tone(150, .2, 'sawtooth', .05, 60); break; case 'ignite': noise(.16, .04, 500); tone(120, .2, 'sine', .04, 70); break; case 'steam': noise(.25, .025, 2600); break; case 'shock': tone(1100, .07, 'square', .03, 300); break; case 'shockBig': tone(1500, .12, 'sawtooth', .045, 200); noise(.12, .03, 2200); break; case 'level': tone(523, .12, 'triangle', .04); tone(784, .16, 'triangle', .035); break; } }

  // ---------- loop ----------
  let last = 0;
  function frame(ts) {
    let dt = Math.min(.05, (ts - last) / 1000 || 0); last = ts;
    if (state === 'play') { if (hitstop > 0) { hitstop -= dt; } else { update(dt); } updateHud(); }
    render();
    requestAnimationFrame(frame);
  }
  function updateHud() {
    document.getElementById('hlvl').textContent = level;
    document.getElementById('hkills').textContent = kills;
    document.getElementById('htime').textContent = Math.floor(time / 60) + ':' + String(Math.floor(time % 60)).padStart(2, '0');
    document.getElementById('hp').style.width = (100 * Math.max(0, player.hp) / player.maxhp) + '%';
    document.getElementById('xp').style.width = (100 * xp / xpNext) + '%';
  }

  // ---------- flow ----------
  function start() { fit(); reset(); state = 'play'; document.getElementById('ovStart').classList.add('hidden'); document.getElementById('ovOver').classList.add('hidden'); aOn(); }
  function gameOver() { state = 'over'; document.getElementById('overStat').textContent = `Lv ${level} · ${kills} kills · ${Math.floor(time / 60)}:${String(Math.floor(time % 60)).padStart(2, '0')}`; document.getElementById('ovOver').classList.remove('hidden'); }
  document.getElementById('bStart').onclick = () => { aOn(); start(); };
  document.getElementById('bRetry').onclick = () => { aOn(); start(); };
  state = 'start'; reset();
  requestAnimationFrame(frame);
  window.__cinder = { get state() { return state; }, get kills() { return kills; }, get enemies() { return enemies.length; } };
})();
</script>
