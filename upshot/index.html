<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>upshot</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0e0c16; overflow: hidden; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ============================================================ setup

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1, GW = 0, OX = 0;   // GW/OX: playfield width & left edge

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  GW = Math.min(W, 560);
  OX = (W - GW) / 2;
  seedStars();
}
window.addEventListener('resize', resize);

const TAU = Math.PI * 2;
const rnd = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const dist2 = (ax, ay, bx, by) => (ax - bx) * (ax - bx) + (ay - by) * (ay - by);
const lerp = (a, b, t) => a + (b - a) * t;

// One knob per effect. 0 = off, 1 = shipped feel, >1 = excessive.
const JUICE = {
  shake:     1,
  hitstop:   1,
  particles: 1,
  flash:     1,
  slowmo:    1,
};

const COLORS = {
  bg: '#0e0c16', gutter: 'rgba(0,0,0,0.35)',
  ship: '#f5f0e6', flame: '#ffb347', bullet: '#7df9ff', ebullet: '#ff5252',
  drone: '#ff4d7d', weaver: '#ffd23f', diver: '#ff9f1c',
  tank: '#9b5cff', gunner: '#3ddc84', boss: '#ff3860',
};

// ============================================================ audio

let AC = null, master = null;
let muted = localStorage.getItem('upshot.mute') === '1';

function audioInit() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain();
    master.gain.value = muted ? 0 : 0.5;
    master.connect(AC.destination);
  }
  if (AC.state === 'suspended') AC.resume();
}
function setMuted(m) {
  muted = m;
  localStorage.setItem('upshot.mute', m ? '1' : '0');
  if (master) master.gain.value = m ? 0 : 0.5;
}
function tone(f0, f1, dur, type, vol, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.02);
}
function noiseHit(dur, vol, f0, f1, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const n = (AC.sampleRate * dur) | 0;
  const buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.setValueAtTime((f0 + f1) / 2, t); bp.Q.value = 0.6;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t);
}
const SFX = {
  shoot()  { tone(1150 + Math.random() * 200, 420, 0.05, 'square', 0.022); },
  hit()    { tone(340, 170, 0.05, 'triangle', 0.09); },
  boom()   { noiseHit(0.22, 0.28, 100, 1400); tone(160, 45, 0.24, 'sine', 0.24); },
  bigBoom(){ noiseHit(0.55, 0.5, 50, 800); tone(110, 26, 0.55, 'sine', 0.4); },
  hurt()   { tone(210, 52, 0.32, 'sawtooth', 0.26); noiseHit(0.18, 0.2, 100, 800); },
  pickup() { tone(523, 1046, 0.11, 'sine', 0.2); tone(784, 1568, 0.13, 'sine', 0.16, 0.07); },
  bomb()   { noiseHit(0.7, 0.55, 40, 500); tone(85, 24, 0.8, 'sine', 0.45); },
  wave()   { tone(196, 197, 0.12, 'square', 0.1); tone(294, 295, 0.18, 'square', 0.1, 0.13); },
  alert()  { tone(440, 220, 0.3, 'square', 0.12); tone(440, 220, 0.3, 'square', 0.12, 0.35); },
  over()   { tone(392, 90, 1.1, 'sawtooth', 0.2); },
  spit()   { tone(520, 300, 0.07, 'square', 0.06); },
};

// ============================================================ input

const keys = {};
let touchActive = false, lastTX = 0, lastTY = 0, touchId = null;
const isTouch = 'ontouchstart' in window;

const PAUSE_BOX = () => ({ x: W - 46, y: 14, w: 34, h: 34 });

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  keys[e.code] = true;
  audioInit();
  if (e.code === 'KeyM') setMuted(!muted);
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (state === 'play') state = 'pause';
    else if (state === 'pause') state = 'play';
  }
  if (e.code === 'Enter' && (state === 'menu' || state === 'over')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let mouseInPlay = false;
cv.addEventListener('mousemove', e => {
  if (touchActive || isTouch) return;
  mouseInPlay = true;
  if (P) { P.tx = e.clientX; P.ty = e.clientY; }
});
cv.addEventListener('mousedown', e => { audioInit(); tapAt(e.clientX, e.clientY); });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('blur', () => { if (state === 'play') state = 'pause'; });

function tapAt(x, y) {
  const b = PAUSE_BOX();
  if (state === 'play' && x > b.x - 8 && x < b.x + b.w + 8 && y > b.y - 8 && y < b.y + b.h + 8) {
    state = 'pause'; return;
  }
  if (state === 'menu') startGame();
  else if (state === 'over') { if (overT > 0.6) startGame(); }
  else if (state === 'pause') state = 'play';
}

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  audioInit();
  const t = e.changedTouches[0];
  if (touchId === null) {
    touchId = t.identifier;
    touchActive = true;
    lastTX = t.clientX; lastTY = t.clientY;
  }
  tapAt(t.clientX, t.clientY);
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== touchId) continue;
    const dx = t.clientX - lastTX, dy = t.clientY - lastTY;
    lastTX = t.clientX; lastTY = t.clientY;
    if (P && state === 'play') {
      P.tx += dx * 1.2;          // relative drag: thumb never covers the ship
      P.ty += dy * 1.2;
    }
  }
}, { passive: false });
function touchEnd(e) {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { touchId = null; touchActive = false; }
  }
}
cv.addEventListener('touchend', touchEnd);
cv.addEventListener('touchcancel', touchEnd);

// ============================================================ state

let state = 'menu';   // menu | play | pause | over
let time = 0;
let freezeT = 0, trauma = 0;
let flashWhite = 0, flashRed = 0;
let score = 0, best = +(localStorage.getItem('upshot.best') || 0);
let bestWave = +(localStorage.getItem('upshot.bestwave') || 0);
let combo = 0, comboT = 0, mult = 1;
let overT = 0, deathSlow = 0;
let hintT = 0;

let P = null, boss = null;
let bullets = [], ebullets = [], enemies = [], particles = [], floaters = [], pickups = [];
let stars = [];
let wave = null;

function seedStars() {
  stars = [];
  for (let i = 0; i < 90; i++) {
    stars.push({
      x: rnd(0, GW), y: rnd(0, H),
      spd: [40, 95, 170][i % 3], r: [0.8, 1.1, 1.6][i % 3],
      a: [0.18, 0.3, 0.5][i % 3],
    });
  }
}

function startGame() {
  P = {
    x: OX + GW / 2, y: H * 0.78, tx: OX + GW / 2, ty: H * 0.78,
    vx: 0, r: 12, hp: 3, maxHp: 3,
    fireCd: 0, iframes: 0, shield: 0,
    spread: 0, rapid: 0, muzzle: 0,
  };
  boss = null;
  bullets = []; ebullets = []; enemies = [];
  particles = []; floaters = []; pickups = [];
  score = 0; combo = 0; comboT = 0; mult = 1;
  trauma = 0; freezeT = 0; flashWhite = 0; flashRed = 0; deathSlow = 0;
  hintT = 5;
  wave = { n: 0, budget: 0, spawnT: 0, interval: 1, breatherT: 0, bannerT: 0, banner: '', isBoss: false };
  beginWave(1);
  wave.breatherT = 1.2;
  state = 'play';
}

// ============================================================ waves & enemies

const ENEMY_DEFS = {
  drone:  { r: 13, hp: 1, score: 50,  cost: 1,   color: COLORS.drone,  from: 1 },
  weaver: { r: 11, hp: 1, score: 80,  cost: 1.2, color: COLORS.weaver, from: 2 },
  diver:  { r: 12, hp: 1, score: 120, cost: 1.5, color: COLORS.diver,  from: 3 },
  gunner: { r: 14, hp: 3, score: 150, cost: 2.2, color: COLORS.gunner, from: 4 },
  tank:   { r: 22, hp: 6, score: 250, cost: 3,   color: COLORS.tank,   from: 5 },
};

function beginWave(n) {
  wave.n = n;
  wave.isBoss = n % 5 === 0;
  wave.breatherT = 2;
  wave.bannerT = 1.8;
  if (wave.isBoss) {
    wave.banner = 'BOSS';
    wave.budget = 0;
    SFX.alert();
  } else {
    wave.banner = 'WAVE ' + n;
    wave.budget = 8 + n * 3;
    wave.interval = Math.max(0.38, 1.05 - n * 0.045);
    wave.spawnT = 0.3;
    SFX.wave();
  }
  if (n - 1 > bestWave) { bestWave = n - 1; localStorage.setItem('upshot.bestwave', bestWave); }
}

function spawnEnemy(type) {
  const d = ENEMY_DEFS[type];
  const s = 1 + Math.min(0.6, wave.n * 0.03);
  const e = {
    type, r: d.r, hp: d.hp, maxHp: d.hp, score: d.score, color: d.color,
    x: OX + rnd(30, GW - 30), y: -30,
    vy: 0, vx: 0, flash: 0, phase: rnd(0, TAU), fireT: rnd(0.8, 1.6), state: 0,
  };
  if (type === 'drone')  e.vy = rnd(90, 130) * s;
  if (type === 'weaver') e.vy = rnd(80, 110) * s;
  if (type === 'diver')  { e.vy = 70 * s; e.diveY = rnd(H * 0.2, H * 0.4); }
  if (type === 'gunner') { e.vy = 90 * s; e.holdY = rnd(H * 0.12, H * 0.3); }
  if (type === 'tank')   e.vy = 45 * s;
  enemies.push(e);
}

function spawnBoss() {
  const num = wave.n / 5;
  boss = {
    x: OX + GW / 2, y: -70, r: 44,
    hp: 60 + (num - 1) * 40, maxHp: 60 + (num - 1) * 40,
    num, flash: 0, phase: 0, fanT: 2, burstT: 1.2, entered: false,
  };
}

function updateWave(dt) {
  if (wave.breatherT > 0) {
    wave.breatherT -= dt;
    if (wave.breatherT <= 0 && wave.isBoss) spawnBoss();
    return;
  }
  if (wave.isBoss) {
    if (!boss) beginWave(wave.n + 1);
    return;
  }
  if (wave.budget > 0) {
    wave.spawnT -= dt;
    if (wave.spawnT <= 0) {
      wave.spawnT = wave.interval;
      const opts = Object.keys(ENEMY_DEFS).filter(k => {
        const d = ENEMY_DEFS[k];
        return d.from <= wave.n && d.cost <= wave.budget;
      });
      if (opts.length) {
        const type = opts[(Math.random() * opts.length) | 0];
        wave.budget -= ENEMY_DEFS[type].cost;
        spawnEnemy(type);
      } else wave.budget = 0;
    }
  } else if (enemies.length === 0) {
    beginWave(wave.n + 1);
  }
}

// ============================================================ juice helpers

function addTrauma(t) { trauma = Math.min(1, trauma + t * JUICE.shake); }
function hitstop(t)   { freezeT = Math.max(freezeT, t * JUICE.hitstop); }

function burst(x, y, color, n, power) {
  n = Math.round(n * JUICE.particles);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * TAU, s = rnd(40, power);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 30,
      r: rnd(1.5, 4.5), life: rnd(0.3, 0.8), maxLife: 0.8,
      color: Math.random() < 0.25 ? '#ffffff' : color, drag: 3, kind: 'chunk',
    });
  }
}
function ring(x, y, color, maxR) {
  particles.push({ x, y, r: 4, maxR, life: 0.35, maxLife: 0.35, color, kind: 'ring' });
}
function floater(x, y, txt, color, size) {
  floaters.push({ x, y, txt, color: color || '#fff', size: size || 15, life: 0.9, maxLife: 0.9 });
}

// ============================================================ combat

function fire(dt) {
  P.fireCd -= dt;
  if (P.fireCd > 0) return;
  P.fireCd = P.rapid > 0 ? 0.07 : 0.14;
  const shots = P.spread > 0 ? [-0.16, 0, 0.16] : [0];
  for (const off of shots) {
    const a = -Math.PI / 2 + off + rnd(-0.02, 0.02);
    bullets.push({
      x: P.x, y: P.y - P.r - 4,
      vx: Math.cos(a) * 950, vy: Math.sin(a) * 950, r: 4,
    });
  }
  P.muzzle = 0.05;
  SFX.shoot();
}

function killEnemy(e, quiet) {
  e.dead = true;
  combo += 1; comboT = 2;
  mult = Math.min(8, 1 + Math.floor(combo / 5));
  const pts = e.score * mult;
  score += pts;
  floater(e.x, e.y - e.r, '+' + pts);
  if (combo > 1 && combo % 5 === 0) floater(P.x, P.y - 40, '×' + mult, '#ffd23f', 22);
  burst(e.x, e.y, e.color, 8 + e.r, 160 + e.r * 8);
  ring(e.x, e.y, e.color, e.r * 3);
  if (!quiet) {
    addTrauma(0.12 + e.r * 0.004);
    hitstop(e.type === 'tank' ? 0.06 : 0.025);
    SFX.boom();
  }
  const chance = e.type === 'tank' ? 0.5 : 0.06;
  if (Math.random() < chance && pickups.length < 3) dropPickup(e.x, e.y);
}

function dropPickup(x, y, kind) {
  const kinds = ['triple', 'rapid', 'shield', 'bomb'];
  pickups.push({
    x, y, r: 12, kind: kind || kinds[(Math.random() * kinds.length) | 0],
    vy: 70, phase: rnd(0, TAU),
  });
}

function killBoss() {
  const b = boss;
  boss = null;
  score += 2000 * mult;
  floater(b.x, b.y, '+' + 2000 * mult, '#fff', 26);
  for (let i = 0; i < 5; i++) {
    burst(b.x + rnd(-b.r, b.r), b.y + rnd(-b.r, b.r), COLORS.boss, 14, 320);
  }
  ring(b.x, b.y, '#ffffff', 240);
  addTrauma(0.9); hitstop(0.12);
  flashWhite = Math.max(flashWhite, 0.5 * JUICE.flash);
  SFX.bigBoom();
  ebullets.length = 0;
  dropPickup(b.x - 30, b.y, 'shield');
  dropPickup(b.x + 30, b.y);
  beginWave(wave.n + 1);
}

function hurtPlayer() {
  if (P.iframes > 0) return;
  if (P.shield > 0) {
    P.shield -= 1;
    P.iframes = 1.2;
    ring(P.x, P.y, '#3ddc84', 70);
    addTrauma(0.3); SFX.hit();
    ebullets.length = 0;
    return;
  }
  P.hp -= 1;
  P.iframes = 1.6;
  addTrauma(0.6); hitstop(0.07);
  flashRed = Math.max(flashRed, 0.5 * JUICE.flash);
  burst(P.x, P.y, COLORS.ship, 16, 260);
  ebullets.length = 0;           // shmup mercy: hits clear the bullet field
  SFX.hurt();
  if (P.hp <= 0) {
    burst(P.x, P.y, COLORS.ship, 40, 420);
    burst(P.x, P.y, COLORS.flame, 20, 300);
    ring(P.x, P.y, '#ffffff', 200);
    addTrauma(1); hitstop(0.12);
    deathSlow = 1.2 * JUICE.slowmo;
    SFX.over();
    if (score > best) { best = score; localStorage.setItem('upshot.best', best); }
    overT = 0;
    state = 'over';
  }
}

function bombAll() {
  flashWhite = Math.max(flashWhite, 0.8 * JUICE.flash);
  addTrauma(0.8); hitstop(0.1); SFX.bomb();
  ring(P.x, P.y, '#ffffff', Math.max(GW, H));
  for (const e of enemies) if (!e.dead) killEnemy(e, true);
  enemies = enemies.filter(e => !e.dead);
  if (boss) {
    boss.hp -= 15; boss.flash = 0.15;
    if (boss.hp <= 0) killBoss();
  }
  ebullets.length = 0;
}

const PICKUP_STYLE = {
  triple: { color: '#7df9ff', label: '3' },
  rapid:  { color: '#ffd23f', label: 'R' },
  shield: { color: '#3ddc84', label: 'S' },
  bomb:   { color: '#ff5252', label: '!' },
};
function applyPickup(p) {
  SFX.pickup();
  ring(P.x, P.y, PICKUP_STYLE[p.kind].color, 60);
  if (p.kind === 'triple') { P.spread = 9; floater(P.x, P.y - 34, 'TRIPLE', '#7df9ff', 17); }
  if (p.kind === 'rapid')  { P.rapid = 9;  floater(P.x, P.y - 34, 'RAPID', '#ffd23f', 17); }
  if (p.kind === 'shield') { P.shield = Math.min(2, P.shield + 1); floater(P.x, P.y - 34, 'SHIELD', '#3ddc84', 17); }
  if (p.kind === 'bomb')   { floater(P.x, P.y - 34, 'BOMB', '#ff5252', 19); bombAll(); }
}

function aimedShot(x, y, speed, off) {
  const a = Math.atan2(P.y - y, P.x - x) + (off || 0);
  ebullets.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r: 5 });
}

// ============================================================ update

function update(dt) {
  time += dt;
  hintT -= dt;

  // --- ship: chase target point (thumb-drag or mouse), keys nudge target
  const kv = 460 * dt;
  if (keys.KeyA || keys.ArrowLeft)  P.tx -= kv;
  if (keys.KeyD || keys.ArrowRight) P.tx += kv;
  if (keys.KeyW || keys.ArrowUp)    P.ty -= kv;
  if (keys.KeyS || keys.ArrowDown)  P.ty += kv;
  P.tx = clamp(P.tx, OX + P.r + 4, OX + GW - P.r - 4);
  P.ty = clamp(P.ty, H * 0.18, H - P.r - 10);
  const px = P.x;
  const k = 1 - Math.pow(0.0001, dt);     // fast critically-damped-ish follow
  P.x = lerp(P.x, P.tx, k);
  P.y = lerp(P.y, P.ty, k);
  P.vx = (P.x - px) / Math.max(dt, 1e-4); // for banking tilt

  P.iframes -= dt; P.muzzle -= dt;
  P.spread -= dt; P.rapid -= dt;
  fire(dt);

  // engine flame
  if (Math.random() < 40 * dt * JUICE.particles) {
    particles.push({
      x: P.x + rnd(-3, 3), y: P.y + P.r + 2,
      vx: rnd(-15, 15), vy: rnd(120, 200),
      r: rnd(1.5, 3.5), life: 0.3, maxLife: 0.3,
      color: Math.random() < 0.4 ? COLORS.flame : '#f5f0e6', drag: 1, kind: 'chunk',
    });
  }

  comboT -= dt;
  if (comboT <= 0 && combo > 0) { combo = 0; mult = 1; }

  updateWave(dt);

  // --- enemies
  for (const e of enemies) {
    e.flash -= dt; e.phase += dt;
    if (e.type === 'weaver') e.x += Math.sin(time * 3 + e.phase * 2) * 90 * dt;
    if (e.type === 'diver') {
      if (e.state === 0 && e.y > e.diveY) {
        e.state = 1;
        const a = Math.atan2(P.y - e.y, P.x - e.x);
        e.vx = Math.cos(a) * 330; e.vy = Math.sin(a) * 330;
        if (e.vy < 80) { e.vy = 80; }        // never dive upward
      }
    }
    if (e.type === 'gunner') {
      if (e.y > e.holdY && e.state === 0) { e.state = 1; e.vy = 20; }
      if (e.state === 1) {
        e.fireT -= dt;
        if (e.fireT <= 0) {
          e.fireT = rnd(1.6, 2.4);
          aimedShot(e.x, e.y + e.r, 230, -0.12);
          aimedShot(e.x, e.y + e.r, 230, 0);
          aimedShot(e.x, e.y + e.r, 230, 0.12);
          SFX.spit();
        }
      }
    }
    e.x += e.vx * dt; e.y += e.vy * dt;
    e.x = clamp(e.x, OX + e.r, OX + GW - e.r);
    if (e.y > H + 50) e.dead = true;
  }

  // --- boss
  if (boss) {
    const b = boss;
    b.flash -= dt; b.phase += dt;
    if (!b.entered) {
      b.y += 60 * dt;
      if (b.y >= 110) b.entered = true;
    } else {
      b.x = OX + GW / 2 + Math.sin(b.phase * 0.7) * (GW / 2 - b.r - 20);
      b.y = 110 + Math.sin(b.phase * 1.3) * 18;
      b.fanT -= dt;
      if (b.fanT <= 0) {
        b.fanT = Math.max(1.4, 2.4 - b.num * 0.2);
        const n = 9 + b.num * 2;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * TAU + b.phase;
          ebullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 150, vy: Math.sin(a) * 150 + 40, r: 5 });
        }
        SFX.spit();
      }
      b.burstT -= dt;
      if (b.burstT <= 0) {
        b.burstT = rnd(1.8, 2.6);
        aimedShot(b.x, b.y + b.r * 0.6, 260, -0.1);
        aimedShot(b.x, b.y + b.r * 0.6, 260, 0);
        aimedShot(b.x, b.y + b.r * 0.6, 260, 0.1);
        SFX.spit();
      }
    }
  }

  // --- player bullets
  for (const b of bullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y < -20 || b.x < OX - 20 || b.x > OX + GW + 20) { b.dead = true; continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      const rr = b.r + e.r;
      if (dist2(b.x, b.y, e.x, e.y) < rr * rr) {
        b.dead = true;
        e.hp -= 1; e.flash = 0.08;
        burst(b.x, b.y, e.color, 3, 130);
        if (e.hp <= 0) killEnemy(e);
        else SFX.hit();
        break;
      }
    }
    if (!b.dead && boss) {
      const rr = b.r + boss.r;
      if (dist2(b.x, b.y, boss.x, boss.y) < rr * rr) {
        b.dead = true;
        boss.hp -= 1; boss.flash = 0.06;
        burst(b.x, b.y, COLORS.boss, 3, 130);
        SFX.hit();
        if (boss.hp <= 0) killBoss();
      }
    }
  }
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);

  // --- enemy bullets
  for (const b of ebullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y > H + 20 || b.y < -60 || b.x < OX - 20 || b.x > OX + GW + 20) { b.dead = true; continue; }
    const rr = b.r + P.r - 3;
    if (state === 'play' && dist2(b.x, b.y, P.x, P.y) < rr * rr) { b.dead = true; hurtPlayer(); }
  }
  ebullets = ebullets.filter(b => !b.dead);

  // --- contact damage
  for (const e of enemies) {
    const rr = e.r + P.r - 3;
    if (dist2(e.x, e.y, P.x, P.y) < rr * rr) hurtPlayer();
  }
  if (boss) {
    const rr = boss.r + P.r - 3;
    if (dist2(boss.x, boss.y, P.x, P.y) < rr * rr) hurtPlayer();
  }

  // --- pickups
  for (const p of pickups) {
    p.y += p.vy * dt; p.phase += dt * 4;
    if (p.y > H + 30) { p.dead = true; continue; }
    const rr = p.r + P.r + 8;
    if (dist2(p.x, p.y, P.x, P.y) < rr * rr) { p.dead = true; applyPickup(p); }
  }
  pickups = pickups.filter(p => !p.dead);

  updateFx(dt);
}

function updateFx(dt) {
  for (const s of stars) {
    s.y += s.spd * dt;
    if (s.y > H) { s.y -= H + 4; s.x = rnd(0, GW); }
  }
  for (const p of particles) {
    p.life -= dt;
    if (p.kind === 'chunk') {
      p.x += p.vx * dt; p.y += p.vy * dt;
      const f = Math.pow(0.5, dt * p.drag);
      p.vx *= f; p.vy *= f;
    } else if (p.kind === 'ring') {
      p.r = lerp(p.maxR, 4, Math.pow(p.life / p.maxLife, 2));
    }
  }
  particles = particles.filter(p => p.life > 0);
  for (const f of floaters) { f.life -= dt; f.y -= 36 * dt; }
  floaters = floaters.filter(f => f.life > 0);
  trauma = Math.max(0, trauma - dt * 1.5);
  flashWhite = Math.max(0, flashWhite - dt * 2.4);
  flashRed = Math.max(0, flashRed - dt * 1.4);
}

// ============================================================ render

function draw() {
  cx.fillStyle = COLORS.bg;
  cx.fillRect(0, 0, W, H);

  // stars
  for (const s of stars) {
    cx.globalAlpha = s.a;
    cx.fillStyle = '#cfd8ff';
    cx.fillRect(OX + s.x, s.y, s.r, s.r * 2.4);
  }
  cx.globalAlpha = 1;

  // gutters on wide screens
  if (OX > 0) {
    cx.fillStyle = COLORS.gutter;
    cx.fillRect(0, 0, OX, H);
    cx.fillRect(OX + GW, 0, OX + 1, H);
    cx.strokeStyle = 'rgba(255,255,255,0.06)';
    cx.strokeRect(OX + 0.5, -2, GW - 1, H + 4);
  }

  const sh = trauma * trauma;
  cx.save();
  if (sh > 0.001) {
    cx.translate(rnd(-1, 1) * 20 * sh, rnd(-1, 1) * 20 * sh);
    cx.rotate(rnd(-1, 1) * 0.015 * sh);
  }

  // pickups
  for (const p of pickups) {
    const st = PICKUP_STYLE[p.kind];
    cx.fillStyle = st.color;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, TAU); cx.fill();
    cx.fillStyle = COLORS.bg;
    cx.font = 'bold 13px "Geist Mono", ui-monospace, monospace';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(st.label, p.x, p.y + 1);
    cx.strokeStyle = st.color;
    cx.globalAlpha = 0.35;
    cx.beginPath(); cx.arc(p.x, p.y, p.r + 4 + Math.sin(p.phase * 1.7) * 2, 0, TAU); cx.stroke();
    cx.globalAlpha = 1;
  }

  // enemies
  for (const e of enemies) {
    const squish = 1 + Math.sin(time * 6 + e.phase) * 0.05;
    cx.save();
    cx.translate(e.x, e.y);
    cx.scale(squish, 2 - squish);
    cx.fillStyle = e.flash > 0 ? '#ffffff' : e.color;
    cx.beginPath(); cx.arc(0, 0, e.r, 0, TAU); cx.fill();
    const a = Math.atan2(P.y - e.y, P.x - e.x);
    const ex = Math.cos(a) * e.r * 0.35, ey = Math.sin(a) * e.r * 0.35;
    const er = Math.max(1.5, e.r * 0.15);
    cx.fillStyle = COLORS.bg;
    cx.beginPath(); cx.arc(ex - Math.sin(a) * e.r * 0.3, ey + Math.cos(a) * e.r * 0.3, er, 0, TAU); cx.fill();
    cx.beginPath(); cx.arc(ex + Math.sin(a) * e.r * 0.3, ey - Math.cos(a) * e.r * 0.3, er, 0, TAU); cx.fill();
    cx.restore();
    if (e.maxHp > 2 && e.hp < e.maxHp) {
      cx.fillStyle = 'rgba(255,255,255,0.2)';
      cx.fillRect(e.x - e.r, e.y - e.r - 7, e.r * 2, 3);
      cx.fillStyle = '#fff';
      cx.fillRect(e.x - e.r, e.y - e.r - 7, e.r * 2 * (e.hp / e.maxHp), 3);
    }
  }

  // boss
  if (boss) {
    const b = boss;
    cx.fillStyle = b.flash > 0 ? '#ffffff' : COLORS.boss;
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, TAU); cx.fill();
    cx.fillStyle = 'rgba(0,0,0,0.25)';
    cx.beginPath(); cx.arc(b.x, b.y + b.r * 0.35, b.r * 0.75, 0, Math.PI); cx.fill();
    // angry eyes
    cx.fillStyle = COLORS.bg;
    const ea = Math.atan2(P.y - b.y, P.x - b.x);
    for (const side of [-1, 1]) {
      const exx = b.x + side * b.r * 0.38 + Math.cos(ea) * 5;
      const eyy = b.y - b.r * 0.15 + Math.sin(ea) * 5;
      cx.beginPath(); cx.arc(exx, eyy, b.r * 0.14, 0, TAU); cx.fill();
    }
  }

  // enemy bullets
  for (const b of ebullets) {
    cx.fillStyle = COLORS.ebullet;
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, TAU); cx.fill();
    cx.globalAlpha = 0.3;
    cx.beginPath(); cx.arc(b.x, b.y, b.r + 3, 0, TAU); cx.fill();
    cx.globalAlpha = 1;
  }

  // player bullets
  cx.strokeStyle = COLORS.bullet;
  cx.lineCap = 'round';
  cx.lineWidth = 4.5;
  cx.beginPath();
  for (const b of bullets) {
    cx.moveTo(b.x - b.vx * 0.014, b.y - b.vy * 0.014);
    cx.lineTo(b.x, b.y);
  }
  cx.stroke();

  // ship
  if (P && state !== 'over') {
    const blink = P.iframes > 0 && Math.sin(P.iframes * 30) > 0;
    cx.globalAlpha = blink ? 0.35 : 1;
    const tilt = clamp(P.vx / 900, -0.35, 0.35);
    cx.save();
    cx.translate(P.x, P.y);
    cx.rotate(tilt);
    cx.fillStyle = COLORS.ship;
    cx.beginPath();
    cx.moveTo(0, -P.r - 6);
    cx.quadraticCurveTo(P.r + 2, P.r - 2, P.r * 0.7, P.r + 4);
    cx.lineTo(-P.r * 0.7, P.r + 4);
    cx.quadraticCurveTo(-P.r - 2, P.r - 2, 0, -P.r - 6);
    cx.fill();
    cx.fillStyle = '#8ad7e0';
    cx.beginPath(); cx.arc(0, -2, 4, 0, TAU); cx.fill();
    if (P.muzzle > 0) {
      cx.fillStyle = '#fff';
      cx.globalAlpha = (blink ? 0.35 : 1) * (P.muzzle / 0.05);
      cx.beginPath(); cx.arc(0, -P.r - 10, 6, 0, TAU); cx.fill();
    }
    cx.restore();
    cx.globalAlpha = 1;
    if (P.shield > 0) {
      cx.strokeStyle = '#3ddc84';
      cx.globalAlpha = 0.5 + Math.sin(time * 5) * 0.2;
      cx.lineWidth = 2.5;
      cx.beginPath(); cx.arc(P.x, P.y, P.r + 9, 0, TAU); cx.stroke();
      if (P.shield > 1) { cx.beginPath(); cx.arc(P.x, P.y, P.r + 14, 0, TAU); cx.stroke(); }
      cx.globalAlpha = 1;
    }
  }

  // particles
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    if (p.kind === 'chunk') {
      cx.globalAlpha = a;
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.r * a, 0, TAU); cx.fill();
    } else {
      cx.globalAlpha = a * 0.8;
      cx.strokeStyle = p.color;
      cx.lineWidth = 3 * a;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, TAU); cx.stroke();
    }
  }
  cx.globalAlpha = 1;

  // floaters
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  for (const f of floaters) {
    cx.globalAlpha = clamp(f.life / f.maxLife, 0, 1);
    cx.fillStyle = f.color;
    cx.font = `bold ${f.size}px "Geist Mono", ui-monospace, monospace`;
    cx.fillText(f.txt, f.x, f.y);
  }
  cx.globalAlpha = 1;

  cx.restore();

  drawUI();

  if (flashWhite > 0) {
    cx.fillStyle = `rgba(255,255,255,${clamp(flashWhite, 0, 1)})`;
    cx.fillRect(0, 0, W, H);
  }
  if (flashRed > 0) {
    const g = cx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.7);
    g.addColorStop(0, 'rgba(255,40,40,0)');
    g.addColorStop(1, `rgba(255,40,40,${clamp(flashRed, 0, 0.6)})`);
    cx.fillStyle = g;
    cx.fillRect(0, 0, W, H);
  }
}

function drawUI() {
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  const topY = 56;   // clears phone notches

  if (state === 'menu') {
    cx.fillStyle = COLORS.ship;
    cx.font = 'bold 58px "Geist Mono", ui-monospace, monospace';
    cx.fillText('UPSHOT', W / 2, H * 0.3);
    cx.fillStyle = 'rgba(245,240,230,0.55)';
    cx.font = '17px "Geist Mono", ui-monospace, monospace';
    cx.fillText('shoot shit up.', W / 2, H * 0.3 + 46);
    cx.font = '13px "Geist Mono", ui-monospace, monospace';
    const help = isTouch
      ? ['drag your thumb to fly', 'firing is automatic']
      : ['move the mouse to fly', 'firing is automatic · M mute'];
    help.forEach((line, i) => cx.fillText(line, W / 2, H * 0.3 + 78 + i * 20));
    const pulse = 0.55 + Math.sin(time * 3.5) * 0.3;
    cx.globalAlpha = pulse;
    cx.fillStyle = COLORS.bullet;
    cx.font = 'bold 19px "Geist Mono", ui-monospace, monospace';
    cx.fillText(isTouch ? 'tap to launch' : 'click to launch', W / 2, H * 0.6);
    cx.globalAlpha = 1;
    if (best > 0) {
      cx.fillStyle = 'rgba(245,240,230,0.4)';
      cx.font = '13px "Geist Mono", ui-monospace, monospace';
      cx.fillText(`best ${best}  ·  wave ${bestWave}`, W / 2, H * 0.6 + 32);
    }
    return;
  }

  // score
  cx.fillStyle = '#fff';
  cx.font = 'bold 28px "Geist Mono", ui-monospace, monospace';
  cx.fillText(score, W / 2, topY);
  if (mult > 1) {
    cx.fillStyle = '#ffd23f';
    cx.font = 'bold 15px "Geist Mono", ui-monospace, monospace';
    cx.fillText('×' + mult, W / 2, topY + 24);
    cx.fillStyle = 'rgba(255,210,63,0.35)';
    cx.fillRect(W / 2 - 36, topY + 36, 72 * clamp(comboT / 2, 0, 1), 3);
  }

  // hearts + shield count
  if (P) {
    for (let i = 0; i < P.maxHp; i++) {
      cx.fillStyle = i < P.hp ? '#ff4d7d' : 'rgba(255,255,255,0.15)';
      const hx = OX + 22 + i * 24, hy = topY - 6;
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(Math.PI / 4);
      cx.fillRect(-6, -6, 12, 12);
      cx.beginPath();
      cx.arc(0, -6, 6, 0, TAU); cx.arc(-6, 0, 6, 0, TAU);
      cx.fill();
      cx.restore();
    }
    cx.textAlign = 'left';
    cx.font = 'bold 11px "Geist Mono", ui-monospace, monospace';
    let py = topY + 18;
    if (P.spread > 0) { cx.fillStyle = '#7df9ff'; cx.fillText('TRIPLE ' + Math.ceil(P.spread), OX + 16, py); py += 16; }
    if (P.rapid > 0)  { cx.fillStyle = '#ffd23f'; cx.fillText('RAPID ' + Math.ceil(P.rapid), OX + 16, py); }
    cx.textAlign = 'center';
  }

  // wave label
  cx.fillStyle = 'rgba(245,240,230,0.6)';
  cx.font = 'bold 14px "Geist Mono", ui-monospace, monospace';
  cx.textAlign = 'right';
  cx.fillText(wave.isBoss ? 'BOSS' : 'WAVE ' + wave.n, OX + GW - 18, topY + 20);
  cx.textAlign = 'center';

  // pause button
  const pb = PAUSE_BOX();
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.fillRect(pb.x + 8, pb.y + 8, 6, 18);
  cx.fillRect(pb.x + 20, pb.y + 8, 6, 18);

  // boss hp bar
  if (boss) {
    const bw = GW - 60;
    cx.fillStyle = 'rgba(255,255,255,0.15)';
    cx.fillRect(OX + 30, 26, bw, 6);
    cx.fillStyle = COLORS.boss;
    cx.fillRect(OX + 30, 26, bw * clamp(boss.hp / boss.maxHp, 0, 1), 6);
  }

  // wave banner
  if (wave.bannerT > 0) {
    wave.bannerT -= 1 / 60;
    const t = 1.8 - wave.bannerT;
    const scale = t < 0.25 ? 0.6 + (t / 0.25) * 0.5 : 1.1 - Math.min(0.1, (t - 0.25) * 0.4);
    const alpha = wave.bannerT < 0.5 ? wave.bannerT * 2 : 1;
    cx.save();
    cx.translate(W / 2, H * 0.28);
    cx.scale(scale, scale);
    cx.globalAlpha = alpha * 0.9;
    cx.fillStyle = wave.isBoss ? COLORS.boss : '#fff';
    cx.font = 'bold 40px "Geist Mono", ui-monospace, monospace';
    cx.fillText(wave.banner, 0, 0);
    cx.restore();
    cx.globalAlpha = 1;
  }

  // first-run hint
  if (hintT > 0 && wave.n === 1 && state === 'play') {
    cx.globalAlpha = clamp(hintT, 0, 1) * 0.5;
    cx.fillStyle = '#fff';
    cx.font = '13px "Geist Mono", ui-monospace, monospace';
    cx.fillText(isTouch ? 'drag anywhere — the ship follows your thumb' : 'the ship follows your mouse', W / 2, H - 36);
    cx.globalAlpha = 1;
  }

  // mute hint (desktop)
  if (!isTouch) {
    cx.fillStyle = 'rgba(245,240,230,0.35)';
    cx.font = '11px "Geist Mono", ui-monospace, monospace';
    cx.textAlign = 'right';
    cx.fillText(muted ? 'muted · M' : '♪ · M', W - 16, H - 16);
    cx.textAlign = 'center';
  }

  if (state === 'pause') {
    cx.fillStyle = 'rgba(14,12,22,0.75)';
    cx.fillRect(0, 0, W, H);
    cx.fillStyle = '#fff';
    cx.font = 'bold 36px "Geist Mono", ui-monospace, monospace';
    cx.fillText('PAUSED', W / 2, H * 0.42);
    cx.fillStyle = 'rgba(245,240,230,0.55)';
    cx.font = '14px "Geist Mono", ui-monospace, monospace';
    cx.fillText(isTouch ? 'tap to resume' : 'P / ESC or click to resume', W / 2, H * 0.42 + 40);
  }

  if (state === 'over') {
    cx.fillStyle = `rgba(14,12,22,${clamp(overT * 1.2, 0, 0.7)})`;
    cx.fillRect(0, 0, W, H);
    if (overT > 0.35) {
      cx.fillStyle = '#ff4d7d';
      cx.font = 'bold 44px "Geist Mono", ui-monospace, monospace';
      cx.fillText('SHOT DOWN', W / 2, H * 0.34);
      cx.fillStyle = '#fff';
      cx.font = 'bold 24px "Geist Mono", ui-monospace, monospace';
      cx.fillText(score + (score >= best && score > 0 ? '  ★ best' : ''), W / 2, H * 0.34 + 50);
      cx.fillStyle = 'rgba(245,240,230,0.55)';
      cx.font = '14px "Geist Mono", ui-monospace, monospace';
      cx.fillText(`made it to wave ${wave.n}  ·  best ${best}`, W / 2, H * 0.34 + 84);
      if (overT > 0.6) {
        cx.globalAlpha = 0.55 + Math.sin(time * 3.5) * 0.3;
        cx.fillStyle = COLORS.bullet;
        cx.font = 'bold 17px "Geist Mono", ui-monospace, monospace';
        cx.fillText(isTouch ? 'tap to go again' : 'click to go again', W / 2, H * 0.6);
        cx.globalAlpha = 1;
      }
    }
  }
}

// ============================================================ main loop

let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  if (W !== window.innerWidth || H !== window.innerHeight) resize();
  let dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;
  time += state === 'play' ? 0 : dt * 0.2;   // keep menu pulses alive

  if (state === 'play' || state === 'over') {
    let scale = 1;
    if (freezeT > 0) { freezeT -= dt; scale = 0.05; }
    if (deathSlow > 0) { deathSlow -= dt; scale = Math.min(scale, 0.18); }
    const sdt = dt * scale;
    if (state === 'play') {
      update(sdt);
    } else {
      overT += dt;
      updateFx(sdt);
      for (const b of bullets) { b.x += b.vx * sdt; b.y += b.vy * sdt; }
      for (const b of ebullets) { b.x += b.vx * sdt; b.y += b.vy * sdt; }
      for (const e of enemies) { e.x += e.vx * sdt; e.y += e.vy * sdt; }
    }
  }
  draw();
}
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
