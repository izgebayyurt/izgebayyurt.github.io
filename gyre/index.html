<!doctype html>
<!-- GYRE — whirlpool match-3 shooter lab, on a DENSE HEXAGON board (hexbrew-style, radius 4).
     Drag to aim toward an angular lane, release to fire a ball across the empty gap ring; the lane
     shoves outward (rim ejected). Matches pop (straight lattice lines + ring arcs), and the whole
     board slides along ONE SPIRAL CONVEYOR — survivors pack toward the centre tail, the bottom-left
     rim mouth refills from the queue. Timed-goal + Endless modes. House paper/ink aesthetic. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Gyre</title>
<meta name="description" content="A whirlpool match-3 shooter on a dense hexagon — drag to aim, fire, and watch the board spiral inward along one conveyor." />
<!-- self-contained favicon (ink spiral on paper) so the page needs no extra asset -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f0e6cf'/%3E%3Cpath d='M16 6a10 10 0 1 1-9 6.2 7 7 0 1 0 6.5 9.6 4 4 0 1 1-2.4-6' fill='none' stroke='%232c2733' stroke-width='2.4' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%23ffd15c' stroke='%232c2733' stroke-width='1.4'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- top HUD ---------- */
.score{ position:fixed; top:calc(env(safe-area-inset-top) + 8px); right:calc(env(safe-area-inset-right) + 14px); z-index:4;
  text-align:right; pointer-events:none; }
.score b{ font-family:var(--font-d); font-weight:700; font-size:28px; line-height:.95; display:block; color:var(--ink);
  font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; }
.score .bst{ font-family:var(--font-u); font-weight:800; font-size:10px; color:var(--ink-soft); }
.hudL{ position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:calc(env(safe-area-inset-left) + 14px); z-index:4;
  pointer-events:none; display:flex; flex-direction:column; gap:5px; }
.clock{ font-family:var(--font-d); font-weight:700; font-size:26px; color:var(--ink); line-height:1;
  font-variant-numeric:tabular-nums; display:none; }
.clock.low{ color:#ef4a5a; }
.goal{ display:none; align-items:center; gap:6px; background:var(--paper2); border:2.5px solid var(--ink); border-radius:999px;
  box-shadow:0 2px 0 var(--shadow); padding:3px 10px 3px 7px; font-family:var(--font-d); font-weight:600; font-size:13px; }
.goal .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--ink); }
.bar{ display:none; width:150px; height:15px; background:var(--paper2); border:2.5px solid var(--ink); border-radius:999px;
  box-shadow:0 2px 0 var(--shadow); overflow:hidden; }
.bar > i{ display:block; height:100%; width:60%; background:linear-gradient(90deg,#57c268,#ffd23a); transition:width .12s linear; }
.bar.low > i{ background:linear-gradient(90deg,#ef4a5a,#f57420); }
.lvl{ display:none; font-family:var(--font-d); font-weight:700; font-size:12px; color:var(--ink-soft); }

/* ---------- gear + tuning drawer ---------- */
.gear{ position:fixed; right:calc(env(safe-area-inset-right) + 12px); bottom:calc(env(safe-area-inset-bottom) + 12px);
  z-index:6; width:46px; height:46px; border-radius:14px; background:var(--card); border:2.5px solid var(--ink);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.gear:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.drawer{ position:fixed; left:0; right:0; bottom:0; z-index:8; width:100%; max-width:380px; margin:0 auto;
  background:var(--card); border:3px solid var(--ink); border-bottom:none; border-radius:20px 20px 0 0;
  box-shadow:0 -4px 0 var(--shadow); padding:14px 18px calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(110%); transition:transform .3s var(--pop); max-height:88vh; overflow-y:auto; }
.drawer.open{ transform:translateY(0); }
.drawer h3{ font-family:var(--font-d); font-weight:700; font-size:16px; margin:0 0 8px; display:flex; align-items:center; gap:8px; }
.drawer h3 .x{ margin-left:auto; cursor:pointer; font-size:22px; color:var(--ink-soft); line-height:1; }
.row{ display:flex; align-items:center; gap:10px; margin:8px 0; font-weight:700; font-size:12.5px; }
.row label{ flex:none; width:104px; color:var(--ink-soft); }
.row input[type=range]{ flex:1; accent-color:#3d8bdf; height:22px; }
.row .val{ flex:none; width:40px; text-align:right; font-family:var(--font-d); font-weight:600; font-size:13px; }
.pills{ display:flex; gap:6px; flex:1; }
.pill{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:5px 0; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:999px;
  box-shadow:0 2px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.pill:active{ transform:translateY(2px); box-shadow:0 0 0 var(--shadow); }
.pill.on{ background:var(--accent); }
.btnrow{ display:flex; gap:8px; margin:11px 0 4px; }
.tbtn{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:9px 6px; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.tbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:10px; }
.stat{ background:var(--paper2); border:2.5px solid var(--ink); border-radius:11px; padding:6px 2px; text-align:center;
  box-shadow:0 2px 0 var(--shadow); }
.stat b{ font-family:var(--font-d); font-weight:700; font-size:15px; display:block; line-height:1.1; font-variant-numeric:tabular-nums; }
.stat small{ font-family:var(--font-u); font-weight:800; font-size:7.5px; letter-spacing:.04em; color:var(--ink-soft); text-transform:uppercase; }

/* ---------- overlays (start / win / lose) ---------- */
.screen{ position:fixed; inset:0; z-index:9; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; padding:24px; background:rgba(240,230,207,.9); backdrop-filter:blur(2px);
  opacity:0; visibility:hidden; pointer-events:none; transition:opacity .25s var(--calm), visibility 0s linear .25s; }
.screen.show{ opacity:1; visibility:visible; pointer-events:auto; transition:opacity .25s var(--calm), visibility 0s; }
.logo{ font-family:var(--font-d); font-weight:700; font-size:60px; letter-spacing:.5px; color:var(--ink); text-shadow:0 4px 0 var(--shadow); }
.tag{ font-family:var(--font-d); font-weight:600; font-size:15px; color:var(--ink-soft); margin-top:-8px; letter-spacing:.4px; }
.big{ font-family:var(--font-d); font-weight:700; font-size:40px; text-shadow:0 3px 0 var(--shadow); }
.sub{ font-family:var(--font-u); font-weight:700; font-size:15px; color:var(--ink-soft); text-align:center; max-width:280px; }
.modebtn{ font-family:var(--font-d); font-weight:700; font-size:20px; padding:15px 20px; cursor:pointer; width:250px; text-align:left;
  color:var(--ink); background:var(--card); border:3px solid var(--ink); border-radius:16px; box-shadow:0 5px 0 var(--shadow);
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.modebtn:active{ transform:translateY(5px); box-shadow:0 0 0 var(--shadow); }
.modebtn small{ display:block; font-family:var(--font-u); font-weight:700; font-size:12px; color:var(--ink-soft); margin-top:2px; }
.modebtn.acc{ background:var(--accent); }
.btn{ font-family:var(--font-d); font-weight:700; font-size:20px; padding:13px 30px; cursor:pointer;
  color:var(--ink); background:var(--accent); border:3px solid var(--ink); border-radius:16px;
  box-shadow:0 5px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.btn:active{ transform:translateY(5px); box-shadow:0 0 0 var(--shadow); }
.btn.alt{ background:var(--card); font-size:16px; padding:10px 22px; box-shadow:0 4px 0 var(--shadow); }
.btn.alt:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
.brow{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.hint{ position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 16px); transform:translateX(-50%); z-index:3;
  font-family:var(--font-d); font-weight:600; font-size:13px; color:var(--ink-soft); pointer-events:none; text-align:center;
  transition:opacity .4s var(--calm); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hudL">
  <div class="clock" id="clock">1:30</div>
  <div class="goal" id="goal"><span class="dot" id="goalDot"></span><span id="goalTxt">reach 1000</span></div>
  <div class="bar" id="bar"><i id="barFill"></i></div>
  <div class="lvl" id="lvl">Lv 1 · 4 colours</div>
</div>
<div class="score"><b id="score">0</b><span class="bst">best <span id="best">0</span></span></div>

<div class="gear" id="gear">&#9881;</div>
<div class="drawer" id="drawer">
  <h3>Tuning <span class="x" id="drawerClose">&times;</span></h3>
  <div class="row"><label>Timer (s)</label><input type="range" id="sTimer" min="30" max="180" step="5"><span class="val" id="vTimer">90</span></div>
  <div class="row"><label>Endless ramp</label><input type="range" id="sRamp" min="0.5" max="2.0" step="0.1"><span class="val" id="vRamp">1.0</span></div>
  <div class="row"><label>Colours</label><input type="range" id="sCol" min="4" max="6" step="1"><span class="val" id="vCol">5</span></div>
  <div class="row"><label>Aim snap</label><div class="pills"><button class="pill on" id="pSnapOn">snap</button><button class="pill" id="pSnapOff">free</button></div></div>
  <div class="row"><label>Fire speed</label><input type="range" id="sFire" min="0.5" max="2.2" step="0.1"><span class="val" id="vFire">1.0</span></div>
  <div class="row"><label>Spiral speed</label><input type="range" id="sCasc" min="0.5" max="2.2" step="0.1"><span class="val" id="vCasc">1.0</span></div>
  <div class="btnrow">
    <button class="tbtn" id="bReroll">Reroll board</button>
    <button class="tbtn" id="bMenu">Menu</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="stShots">0</b><small>shots</small></div>
    <div class="stat"><b id="stMatches">0</b><small>matches</small></div>
    <div class="stat"><b id="stArcs">0</b><small>arcs</small></div>
    <div class="stat"><b id="stRadials">0</b><small>lines</small></div>
    <div class="stat"><b id="stChain">0</b><small>max chain</small></div>
    <div class="stat"><b id="stEject">0</b><small>ejected</small></div>
    <div class="stat"><b id="stSlides">0</b><small>slides</small></div>
    <div class="stat"><b id="stScore">0</b><small>score</small></div>
  </div>
</div>

<!-- start / win / lose sticker cards -->
<div class="screen show" id="scrStart">
  <div class="logo">Gyre</div>
  <div class="tag">whirlpool match-3 shooter</div>
  <div style="height:6px"></div>
  <button class="modebtn acc" id="btnTimed">Timed Goal<small>beat a target before the clock runs out</small></button>
  <button class="modebtn" id="btnEndless">Endless<small>keep the bar alive — it only gets harder</small></button>
  <div class="sub" id="startBest"></div>
</div>
<div class="screen" id="scrWin">
  <div class="big" id="winTitle">Goal!</div>
  <div class="sub" id="winSub"></div>
  <div class="brow"><button class="btn" id="winAgain">Play again</button><button class="btn alt" id="winMenu">Menu</button></div>
</div>
<div class="screen" id="scrLose">
  <div class="big" id="loseTitle">Time!</div>
  <div class="sub" id="loseSub"></div>
  <div class="brow"><button class="btn" id="loseRetry">Retry</button><button class="btn alt" id="loseMenu">Menu</button></div>
</div>

<div class="hint" id="hint">drag to aim &middot; release to fire</div>

<script>
"use strict";
(function(){
// ================= palette / helpers =================
const HEX={ R:'#ef4a5a', Y:'#ffd23a', B:'#3d8bdf', G:'#57c268', P:'#9b62d6', O:'#f57420' };
const ORDER=['R','Y','B','G','P','O'];
const COLNAME={ R:'red', Y:'yellow', B:'blue', G:'green', P:'purple', O:'orange' };
const INK='#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', CARD='#fffdf6', ACCENT='#ffd15c', INK_SOFT='#6b6472';
function colOf(c){ return HEX[c]||INK; }
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function lerp(a,b,t){ return a+(b-a)*t; }
function ease(t){ t=Math.max(0,Math.min(1,t)); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function angDelta(to,from){ let d=to-from; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; return d; }
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function fmtClock(s){ s=Math.max(0,Math.ceil(s)); const m=(s/60)|0, ss=s%60; return m+':'+(ss<10?'0':'')+ss; }

// ================= DENSE HEXAGON geometry (hexbrew-style axial, radius 4) =================
const RAD=4;
const CELLS_QR=[]; for(let q=-RAD;q<=RAD;q++){ const r1=Math.max(-RAD,-q-RAD), r2=Math.min(RAD,-q+RAD);
  for(let r=r1;r<=r2;r++) CELLS_QR.push([q,r]); }
const NC=CELLS_QR.length;                                   // 61
const IDX={}; CELLS_QR.forEach(([q,r],i)=>IDX[q+','+r]=i);
const ringOfQR=(q,r)=>Math.max(Math.abs(q),Math.abs(r),Math.abs(-q-r));
const cellRing=CELLS_QR.map(([q,r])=>ringOfQR(q,r));
const cellUX=CELLS_QR.map(([q])=>1.5*q);
const cellUY=CELLS_QR.map(([q,r])=>Math.sqrt(3)*(r+q/2));
const cellAng=CELLS_QR.map((_,i)=>Math.atan2(cellUY[i],cellUX[i]));
const cellX=new Array(NC).fill(0), cellY=new Array(NC).fill(0), cellRad=new Array(NC).fill(0);
const ringCells={1:[],2:[],3:[],4:[]};
for(let i=0;i<NC;i++){ const k=cellRing[i]; if(k>=1&&k<=4) ringCells[k].push(i); }
for(const k of [1,2,3,4]) ringCells[k].sort((a,b)=>cellAng[a]-cellAng[b]);   // ascending angle == clockwise (screen y-down)
const ringPos=new Array(NC).fill(-1);   // index of each cell within its ring bucket (for wrap detection)
for(const k of [1,2,3,4]) ringCells[k].forEach((c,i)=>ringPos[c]=i);
function nearestInRing(k,ang){ let best=ringCells[k][0],bd=1e9;
  for(const c of ringCells[k]){ const d=Math.abs(angDelta(cellAng[c],ang)); if(d<bd){bd=d;best=c;} } return best; }
// firing lanes (unchanged): 12 lanes anchored on ring-2 cells; mid/outer = nearest ring3/ring4 by angle
const LANES=ringCells[2].map(a=>({ anchor:a, mid:nearestInRing(3,cellAng[a]), outer:nearestInRing(4,cellAng[a]), angle:cellAng[a] }))
  .sort((x,y)=>x.angle-y.angle);
function nearestLane(ang){ let best=0,bd=1e9; for(let l=0;l<LANES.length;l++){ const d=Math.abs(angDelta(LANES[l].angle,ang));
  if(d<bd){bd=d;best=l;} } return best; }
const ALL_LINES=(()=>{ function build(keyf,ordf){ const m={};
    for(let i=0;i<NC;i++){ const [q,r]=CELLS_QR[i]; const k=keyf(q,r); (m[k]=m[k]||[]).push([ordf(q,r),i]); }
    return Object.values(m).map(a=>a.sort((x,y)=>x[0]-y[0]).map(x=>x[1])).filter(l=>l.length>=3); }
  return [ ...build(q=>q,(q,r)=>r), ...build((q,r)=>r,q=>q), ...build((q,r)=>q+r,q=>q) ]; })();

// ---------- THE SPIRAL CONVEYOR ----------
// The 54 occupied cells form ONE ordered track S[0..53]. S[0] = the MOUTH: the ring-4 cell whose pixel
// angle is nearest the BOTTOM-LEFT seam (3π/4 in screen coords, y-down = down-and-left). We traverse
// ring4 CLOCKWISE (ascending angle) from the mouth (24), then step inward to ring3's cell nearest the seam
// and go clockwise (18), then inward to ring2 clockwise (12). S[53] = innermost tail near centre.
const MOUTH_ANG=3*Math.PI/4;
function ringClockwiseFrom(k,startAng){ const arr=ringCells[k]; let si=0,bd=1e9;
  for(let i=0;i<arr.length;i++){ const d=Math.abs(angDelta(cellAng[arr[i]],startAng)); if(d<bd){bd=d;si=i;} }
  const out=[]; for(let i=0;i<arr.length;i++) out.push(arr[(si+i)%arr.length]); return out; }
const Sseq=[ ...ringClockwiseFrom(4,MOUTH_ANG), ...ringClockwiseFrom(3,MOUTH_ANG), ...ringClockwiseFrom(2,MOUTH_ANG) ];
const Sindex={}; Sseq.forEach((cell,i)=>Sindex[cell]=i);
const SN=Sseq.length;                                       // 54
// continuous position along the track for a (possibly fractional / pre-mouth) index — smooth polar spiral
function trackPos(t){
  if(t>=SN-1){ const c=Sseq[SN-1]; return { x:cellX[c], y:cellY[c] }; }
  if(t<=0){ const c=Sseq[0], k=-t;                          // extrapolate beyond the mouth (outward + slight CCW) so new balls feed in
    const rad=cellRad[c]+k*size*0.95, ang=cellAng[c]+k*0.26; return { x:cx+rad*Math.cos(ang), y:cy+rad*Math.sin(ang) }; }
  const i=Math.floor(t), f=t-i, a=Sseq[i], b=Sseq[i+1];
  const rr=lerp(cellRad[a],cellRad[b],f), an=cellAng[a]+angDelta(cellAng[b],cellAng[a])*f;
  return { x:cx+rr*Math.cos(an), y:cy+rr*Math.sin(an) };
}

// ================= tunables =================
let COLORS=5;
let aimSnap=true;
let fireMult=1.0, cascMult=1.0;
let timerLen=90, endlessRamp=1.0;
const DEPTH_CAP=40;       // safety bound on a single chain (natural chains rarely exceed ~25); prevents pathological loops
// ---------- cascade scoring (Puzzle-Bobble pop-vs-drop asymmetry: pay the spiral-swept cascade far more) ----------
// Measured chain-depth distribution (realistic random play): median 0, p90=3, p95=5, p99=10, max ~16; hard cap 40.
// All levers are BOUNDED so a depth-40 whole-board resolve tops out near ~5M — never overflows Number (safe <9e15).
const BASE=10;            // points per matched ball (direct base)
const ROUND_K=0.75, ROUND_CAP=12;   // roundMult(r)=1+0.75(r-1), capped 12: round5 clearly > round2, depth stays sane
const GAP_K=0.5;          // gap shot: +50% per EXTRA ring a straight lattice line crosses (2-ring ×1.5, 3-ring ×2)
const WRAP_BASE=1.5, WRAP_WRAP=1.75;// ring arc = ×1.5 over a straight match; a true seam-wrapping "bank shot" = ×1.75
const COMBO_K=0.3, COMBO_CAP=6;     // whole-resolve combo multiplier by depth: 1+0.3(D-1), capped 6
function roundMult(r){ return Math.min(ROUND_CAP, 1+ROUND_K*(r-1)); }
function comboMult(D){ return Math.min(COMBO_CAP, 1+COMBO_K*(D-1)); }
// pure scorer (single source of truth, mirrored by the live resolver). rounds[i] = array of groups for round i+1:
//   { g:size, type:'arc'|'radial', spanned:(radial rings crossed), wrap:(arc crosses seam) }
function scoreResolve(rounds){
  const acc={ base:0, cascade:0, gap:0, wrap:0 };
  rounds.forEach((groups,ri)=>{ const rm=roundMult(ri+1);
    for(const grp of groups){ const b=BASE*grp.g;
      const gm = grp.type==='radial' ? 1+GAP_K*((grp.spanned||1)-1) : 1;
      const wm = grp.type==='arc' ? (grp.wrap?WRAP_WRAP:WRAP_BASE) : 1;
      acc.base+=b; acc.cascade+=b*(rm-1); acc.gap+=b*rm*(gm-1); acc.wrap+=b*rm*gm*(wm-1); } });
  const D=rounds.length||1, pre=acc.base+acc.cascade+acc.gap+acc.wrap, cm=comboMult(D);
  const combo=pre*(cm-1), total=pre+combo;
  return { base:acc.base, cascade:acc.cascade, gap:acc.gap, wrap:acc.wrap, combo, total, gain:Math.round(total), depth:D, comboMult:cm };
}
function labelSpec(depth){ const d=Math.max(2,depth); const t=Math.min(1,(d-2)/10);
  return { size:Math.min(58,18+d*3), hue:Math.round(198+(8-198)*t), life:Math.min(2.2,0.9+d*0.09), shake:d>=6?Math.min(6,(d-5)*0.85):0 }; }

// ================= audio =================
const SFX=(()=>{
  let ac=null, master=null, ready=false, nbuf=null, muted=false;
  function init(){ if(ready) return; try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
      ac=new AC(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination); ready=true; }catch(e){ ready=false; } }
  function on(){ if(!ready||muted||!ac) return false; try{ if(ac.state==='suspended') ac.resume(); }catch(e){} return true; }
  function tone(f,o){ if(!on())return; try{ const {type='sine',a=0.004,d=0.15,peak=0.2,delay=0,slide=0}=o||{};
      const t0=ac.currentTime+delay; const osc=ac.createOscillator(); osc.type=type;
      osc.frequency.setValueAtTime(Math.max(30,f),t0);
      if(slide) osc.frequency.exponentialRampToValueAtTime(Math.max(30,slide),t0+a+d);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.linearRampToValueAtTime(peak,t0+a);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+a+d); osc.connect(g); g.connect(master); osc.start(t0); osc.stop(t0+a+d+0.05); }catch(e){} }
  function noise(o){ if(!on())return; try{ const {dur=0.25,peak=0.16,delay=0,f0=1200,f1=0,ftype='bandpass'}=o||{};
      if(!nbuf){ nbuf=ac.createBuffer(1,(ac.sampleRate*0.5)|0,ac.sampleRate); const d=nbuf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
      const t0=ac.currentTime+delay; const src=ac.createBufferSource(); src.buffer=nbuf; src.loop=true;
      const fl=ac.createBiquadFilter(); fl.type=ftype; fl.frequency.setValueAtTime(f0,t0);
      if(f1) fl.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t0+dur);
      const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.linearRampToValueAtTime(peak,t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); src.connect(fl); fl.connect(g); g.connect(master);
      src.start(t0); src.stop(t0+dur+0.05); }catch(e){} }
  const PENTA=[0,2,4,7,9];
  function pfreq(n){ n=Math.max(0,Math.min(14,n|0)); return 440*Math.pow(2,(((n/5)|0)*12+PENTA[n%5])/12); }
  return {
    init, get ready(){return ready;}, get muted(){return muted;}, setMuted(m){muted=!!m;},
    resume(){ try{ if(ac&&ac.state==='suspended') ac.resume(); }catch(e){} },
    fire(){ tone(150,{type:'sine',d:0.12,peak:0.22,slide:430}); noise({dur:0.14,peak:0.08,f0:1600,f1:400,ftype:'bandpass'}); },
    pop(step){ tone(pfreq(step),{type:'triangle',d:0.13,peak:0.2}); },
    eject(){ tone(280,{type:'sine',d:0.26,peak:0.12,slide:110}); noise({dur:0.2,peak:0.08,f0:800,f1:180,ftype:'lowpass'}); },
    chain(d){ d=Math.max(2,d|0); const b=392*Math.pow(2,Math.min(9,d-2)/6);
      tone(b,{type:'triangle',d:0.13,peak:0.16}); tone(b*1.5,{type:'triangle',d:0.18,peak:0.12,delay:0.06}); },
    win(){ [523,659,784,1047].forEach((f,i)=>tone(f,{type:'triangle',d:0.3,peak:0.16,delay:i*0.12})); },
    lose(){ tone(392,{type:'triangle',d:0.3,peak:0.15}); tone(311,{type:'triangle',d:0.45,peak:0.14,delay:0.18}); }
  };
})();

// ================= state / model =================
let grid=new Array(NC).fill(null);
let current=null, next=[];
let resolver=null;
let popList=[], goo=[], puffs=[], flyers=[], scorePops=[];
let aim={ active:false, rawAngle:-Math.PI/2, angle:-Math.PI/2, target:0 };
let chainLabel=null;
let score=0, scoreShown=0, best=+lsGet('gyre_best','0')||0;
let lastResolve=null;                // exposed score breakdown of the most recent scoring resolve
let shakeMag=0, shakeT=0;            // small, bounded chain shake (never obscures the board)
let stats={ shots:0, matches:0, arcs:0, radials:0, maxChain:0, ejected:0, slides:0 };
let collect={};
// modes
let mode='menu', phase='menu';       // mode: menu|timed|endless ; phase: menu|play|win|lose
let clock=90;                        // timed countdown (s)
let goal=null;                       // {type:'score'|'color', target, color?}
let ebar=0, EBAR_MAX=30, endlessLevel=1;

function* allBalls(){ for(let i=0;i<NC;i++) if(grid[i]) yield grid[i]; }
function mkBall(c,cell){ return { c, cell, vx:cellX[cell], vy:cellY[cell], anim:null, land:0, popping:false }; }
function placeBall(c,cell){ const b=mkBall(c,cell); grid[cell]=b; return b; }
function setAnimPolar(b,r0,a0,r1,a1,swirl,dur){ b.anim={ kind:'polar', r0,a0,r1,a1,swirl,dur,t:0 }; b.vx=cx+r0*Math.cos(a0); b.vy=cy+r0*Math.sin(a0); }
function setAnimSlide(b,s0,s1,dur){ b.anim={ kind:'slide', s0,s1,dur,t:0 }; const p=trackPos(s0); b.vx=p.x; b.vy=p.y; }
function mkPuff(x,y,col){ const a=Math.random()*6.283, sp=30+Math.random()*70;
  return { x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, r:3+Math.random()*4, life:0.4+Math.random()*0.25, max:0.65, col }; }
function busy(){ return !!resolver; }
function saveBest(){ lsSet('gyre_best', String(best|0)); }
function colorAt(i){ return grid[i]?grid[i].c:null; }

function fillRandom(){
  grid=new Array(NC).fill(null);
  for(const k of [2,3,4]) for(const c of ringCells[k]) placeBall(randColor(),c);
  let guard=0;
  while(guard++<400){ const ms=findMatches(); if(!ms.length) break;
    for(const m of ms) for(const c of m.cells){ if(grid[c]) grid[c].c=randColor(); } }
}
function resetRun(){ fillRandom(); current=randColor(); next=[randColor(),randColor()];
  score=0; scoreShown=0; lastResolve=null; refillSeed=[]; resolver=null; popList=[]; goo=[]; puffs=[]; flyers=[]; scorePops=[];
  chainLabel=null; shakeMag=0; shakeT=0;
  collect={}; stats={ shots:0, matches:0, arcs:0, radials:0, maxChain:0, ejected:0, slides:0 }; }

// ================= matching =================
function findMatches(){
  const res=[];
  for(const L of ALL_LINES){ let i=0; while(i<L.length){ const c=colorAt(L[i]); if(c===null){ i++; continue; }
      let j=i; while(j<L.length && colorAt(L[j])===c) j++;
      if(j-i>=3) res.push({ type:'radial', colour:c, len:j-i, cells:L.slice(i,j) }); i=j; } }
  for(const k of [2,3,4]){ const R=ringCells[k], M=R.length;
    let start=0, found=false;
    for(let x=0;x<M;x++){ const p=(x-1+M)%M; if(colorAt(R[x])===null||colorAt(R[x])!==colorAt(R[p])){ start=x; found=true; break; } }
    if(!found){ if(colorAt(R[0])!==null && M>=3) res.push({ type:'arc', colour:colorAt(R[0]), len:M, cells:R.slice() }); continue; }
    let i=0;
    while(i<M){ const col=colorAt(R[(start+i)%M]); if(col===null){ i++; continue; }
      let j=i, run=[]; while(j<M && colorAt(R[(start+j)%M])===col){ run.push(R[(start+j)%M]); j++; }
      if(run.length>=3) res.push({ type:'arc', colour:col, len:run.length, cells:run }); i=j; } }
  return res;
}

// ================= firing (angular-column shove — unchanged) =================
function startFire(lane){
  if(busy()||current==null) return false;
  lane=((lane%LANES.length)+LANES.length)%LANES.length;
  const L=LANES[lane], c=current;
  const bA=grid[L.anchor], bM=grid[L.mid], bO=grid[L.outer];
  if(bO){ ejectBall(bO); stats.ejected++; SFX.eject(); }
  const fired=mkBall(c,L.anchor); grid[L.anchor]=fired;
  setAnimPolar(fired, 0, cellAng[L.anchor], cellRad[L.anchor], cellAng[L.anchor], 0, fireDur());
  if(bM){ grid[L.outer]=bM; bM.cell=L.outer; setAnimPolar(bM, cellRad[L.mid],cellAng[L.mid], cellRad[L.outer],cellAng[L.outer], 0, fireDur()*0.95); } else grid[L.outer]=null;
  if(bA){ grid[L.mid]=bA; bA.cell=L.mid; setAnimPolar(bA, cellRad[L.anchor],cellAng[L.anchor], cellRad[L.mid],cellAng[L.mid], 0, fireDur()*0.95); } else grid[L.mid]=null;
  current=null; stats.shots++;
  resolver={ phase:'firing', depth:0, t:0 };
  SFX.fire();
  return true;
}
function ejectBall(b){ const a=cellAng[b.cell];
  flyers.push({ x:b.vx, y:b.vy, vx:Math.cos(a)*(300+Math.random()*90), vy:Math.sin(a)*(300+Math.random()*90)-30,
    spin:0, vspin:(Math.random()<.5?-1:1)*(7+Math.random()*5), c:b.c, t:0, life:1.1 }); }
function advanceQueue(){ current=next.shift(); next.push(randColor()); while(next.length<2) next.push(randColor()); }

// ================= step-driven resolver: pop -> spiral slide -> chain =================
function allSettled(){ for(const b of allBalls()) if(b.anim) return false; return true; }
function stepResolver(dt){
  if(!resolver) return; const R=resolver; R.t+=dt;
  if(R.phase==='firing'){ if(allSettled()){ advanceQueue(); R.phase='detect'; R.t=0; } return; }
  if(R.phase==='detect'){ const ms=findMatches();
    if(ms.length && (R.depth||0)<DEPTH_CAP){ beginPops(ms,R); R.phase='popping'; R.t=0; } else { finishResolve(); } return; }
  if(R.phase==='popping'){ if(popList.length===0){ R.phase='slide'; R.t=0; } return; }
  if(R.phase==='slide'){ doSlide(); R.phase='sliding'; R.t=0; return; }
  if(R.phase==='sliding'){ if(allSettled()){ R.phase='detect'; R.t=0; } return; }
}
function beginPops(ms,R){
  R.depth=(R.depth||0)+1; const r=R.depth, rm=roundMult(r);
  if(!R.acc) R.acc={ base:0, cascade:0, gap:0, wrap:0 };
  const seen=new Set(), cells=[], cellVal={}; let arcs=0, radials=0;
  for(const m of ms){
    const g=m.len, b=BASE*g; let gm=1, wm=1;
    if(m.type==='arc'){ arcs++;
      const M=ringCells[cellRing[m.cells[0]]].length, pos=m.cells.map(c=>ringPos[c]);
      const wrap=pos.includes(0)&&pos.includes(M-1);            // arc crosses the ring seam = a "bank shot"
      wm=wrap?WRAP_WRAP:WRAP_BASE; m._wrap=wrap;
    } else { radials++;
      const spanned=new Set(m.cells.map(c=>cellRing[c])).size;  // rings a straight line crosses: gap shot
      gm=1+GAP_K*(spanned-1); m._spanned=spanned;
    }
    // additive decomposition (base + cascade + gap + wrap telescopes to base·rm·gm·wm)
    R.acc.base+=b; R.acc.cascade+=b*(rm-1); R.acc.gap+=b*rm*(gm-1); R.acc.wrap+=b*rm*gm*(wm-1);
    const per=(b*rm*gm*wm)/g;                                    // pre-combo value per cell (for the +N popups)
    for(const c of m.cells){ cellVal[c]=Math.max(cellVal[c]||0, per);
      if(!seen.has(c)){ seen.add(c); cells.push(c); } }
  }
  stats.matches+=ms.length; stats.arcs+=arcs; stats.radials+=radials;
  stats.maxChain=Math.max(stats.maxChain,r);
  if(r>=2){ setChainLabel(r); SFX.chain(r); }
  if(mode==='endless') addEndlessTime(cells.length, r);
  cells.sort((a,b)=> Sindex[b]-Sindex[a]);                       // pop from tail outward (ripple)
  cells.forEach((c,i)=>{ const b=grid[c]; if(!b) return; b.popping=true;
    popList.push({ ball:b, cell:c, delay:i*0.045, step:i, done:false, value:Math.round(cellVal[c]||0) }); });
  updateHUD();
}
function setChainLabel(depth){ const sp=labelSpec(depth); chainLabel={ n:depth, life:sp.life, maxLife:sp.life, spec:sp, born:performance.now() };
  if(sp.shake>0){ shakeMag=Math.max(shakeMag,sp.shake); shakeT=0.32; } }
function firePop(p){ p.done=true; const b=p.ball;
  goo.push({ x:b.vx, y:b.vy, r:ballRad*0.85, col:colOf(b.c), rgb:hexToRgb(colOf(b.c)), t:0, dur:0.28 });
  for(let k=0;k<5;k++) puffs.push(mkPuff(b.vx,b.vy,colOf(b.c)));
  if(p.value>0) scorePops.push({ x:b.vx, y:b.vy, v:p.value, life:0.85, max:0.85, col:colOf(b.c) });
  collect[b.c]=(collect[b.c]||0)+1;
  SFX.pop(p.step);
  if(grid[p.cell]===b) grid[p.cell]=null;
}
// THE SPIRAL SLIDE — a shift register bent into a spiral. Survivors keep relative order and pack toward the
// TAIL (high S-indices, toward centre); the MOUTH end (low indices, count = number popped) refills from the
// queue. Every ball slides along the track from its old S-index to its new S-index (arc-and-inward).
function doSlide(){
  stats.slides++;
  const survivors=[]; for(let i=0;i<SN;i++){ const b=grid[Sseq[i]]; if(b) survivors.push({ b, oldS:i }); }
  const P=SN-survivors.length;
  for(let i=0;i<SN;i++) grid[Sseq[i]]=null;
  for(let p=0;p<P;p++){ const cell=Sseq[p]; const nb=mkBall(spawnRefill(),cell); grid[cell]=nb;
    setAnimSlide(nb, p-P, p, slideDur()); }                     // new ball feeds in from beyond the mouth
  for(let j=0;j<survivors.length;j++){ const { b, oldS }=survivors[j]; const newS=P+j; const cell=Sseq[newS];
    grid[cell]=b; b.cell=cell; setAnimSlide(b, oldS, newS, slideDur()); }
}
function finishResolve(){
  const R=resolver;
  if(R && R.acc){                                               // apply the whole-resolve combo multiplier, then bank the score
    const D=R.depth||1, pre=R.acc.base+R.acc.cascade+R.acc.gap+R.acc.wrap;
    const cm=comboMult(D), combo=pre*(cm-1), total=pre+combo, gain=Math.round(total);
    score+=gain; if(score>best){ best=score; saveBest(); }
    lastResolve={ base:R.acc.base, cascade:R.acc.cascade, gap:R.acc.gap, wrap:R.acc.wrap, combo, total, gain, depth:D, comboMult:cm };
  }
  resolver=null; updateHUD();
}

// ================= modes =================
function startTimed(opts){ opts=opts||{};
  mode='timed'; phase='play';
  COLORS=opts.colors||COLORS; palette=ORDER.slice(0,COLORS);
  resetRun();
  clock=opts.sec||timerLen;
  // targets rescaled to the cascade-scoring magnitudes (a solid 90s run banks tens of thousands; a good
  // chain is a few thousand). First-pass values — high score variance means these want a real playtest.
  const gt = opts.goalType || (Math.random()<0.5?'score':'color');
  if(gt==='color'){ const col=opts.color || palette[(Math.random()*palette.length)|0];
    goal={ type:'color', target:opts.target||30, color:col }; }
  else goal={ type:'score', target:opts.target||40000 };
  showScreen(null); updateHUD(); wake();
}
function startEndless(opts){ opts=opts||{};
  mode='endless'; phase='play';
  COLORS=4; palette=ORDER.slice(0,4);
  resetRun();
  ebar=opts.sec||18; endlessLevel=1; goal=null;
  showScreen(null); updateHUD(); wake();
}
function addEndlessTime(cells,depth){
  const gainScale=Math.max(0.3, 1 - (endlessLevel-1)*0.05*endlessRamp);
  const gain=(cells*0.35 + (depth-1)*0.7) * gainScale;
  ebar=Math.min(EBAR_MAX, ebar+gain);
  endlessLevel=1 + Math.floor(stats.matches * 0.5 * endlessRamp / 3);   // ramps with matches × ramp knob
  const want=Math.min(6, 4 + Math.floor((endlessLevel-1)/2));
  if(want!==COLORS){ COLORS=want; palette=ORDER.slice(0,COLORS); }
}
function goalMet(){ if(!goal) return false;
  return goal.type==='score' ? score>=goal.target : (collect[goal.color]||0)>=goal.target; }
function goalProgress(){ if(!goal) return 0; return goal.type==='score'? score : (collect[goal.color]||0); }
function endRun(result){ phase=result;
  if(score>best){ best=score; saveBest(); }
  if(result==='win'){ SFX.win(); document.getElementById('winSub').textContent='Score '+score+' · best '+best; showScreen('scrWin'); }
  else { SFX.lose(); const t=document.getElementById('loseTitle');
    t.textContent = mode==='timed'?'Time!':'Run over';
    document.getElementById('loseSub').textContent='Score '+score+' · best '+best+(mode==='endless'?(' · Lv '+endlessLevel):''); showScreen('scrLose'); }
  wake();
}
function toMenu(){ mode='menu'; phase='menu'; resetRun(); document.getElementById('drawer').classList.remove('open'); showScreen('scrStart'); wake(); }

// ================= update =================
let last=performance.now(), idleDrawn=false;
function wake(){ idleDrawn=false; }
function isAnimating(){
  if(phase==='play') return true;                             // keep the clock/bar draining while playing
  if(resolver||popList.length||goo.length||puffs.length||flyers.length||scorePops.length) return true;
  if(aim.active||chainLabel) return true;
  if(scoreShown!==score || (shakeMag>0&&shakeT>0)) return true;   // count-up tween / chain shake still going
  for(const b of allBalls()) if(b.anim||(b.land&&performance.now()-b.land<160)) return true;
  return false;
}
function update(dt,now){
  stepResolver(dt);
  for(const b of allBalls()){ if(!b.anim) continue; const a=b.anim; a.t+=dt; const e=ease(a.t/a.dur);
    if(a.kind==='polar'){ const rr=lerp(a.r0,a.r1,e), aa=a.a0+angDelta(a.a1,a.a0)*e + a.swirl*Math.sin(Math.PI*e);
      b.vx=cx+rr*Math.cos(aa); b.vy=cy+rr*Math.sin(aa); }
    else { const p=trackPos(lerp(a.s0,a.s1,e)); b.vx=p.x; b.vy=p.y; }
    if(a.t>=a.dur){ b.anim=null; b.vx=cellX[b.cell]; b.vy=cellY[b.cell]; b.land=now; } }
  for(const p of popList){ if(p.done) continue; p.delay-=dt; if(p.delay<=0) firePop(p); }
  popList=popList.filter(p=>!p.done);
  for(const g of goo){ g.t+=dt; g.r+=(ballRad*0.35-g.r)*Math.min(1,dt*8); }
  goo=goo.filter(g=>g.t<g.dur);
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; }
  puffs=puffs.filter(p=>p.life>0);
  for(const f of flyers){ f.t+=dt; f.x+=f.vx*dt; f.y+=f.vy*dt; f.vy+=520*dt; f.spin+=f.vspin*dt; }
  flyers=flyers.filter(f=>f.t<f.life);
  for(const s of scorePops){ s.life-=dt; s.y-=dt*46; }
  scorePops=scorePops.filter(s=>s.life>0);
  if(chainLabel){ chainLabel.life-=dt; if(chainLabel.life<=0) chainLabel=null; }
  // score count-up tween — races the number toward its target over ~0.6s (readable surge), landing exactly
  if(scoreShown!==score){ const diff=score-scoreShown, stepAmt=Math.max(1, Math.abs(diff)*Math.min(1,dt*2.2));
    scoreShown = (stepAmt>=Math.abs(diff)) ? score : scoreShown+Math.sign(diff)*stepAmt; }
  if(shakeT>0){ shakeT-=dt; if(shakeT<=0){ shakeT=0; shakeMag=0; } }
  // ---- mode clocks (drain while actively playing; resolve conditions once the board settles) ----
  if(phase==='play'){
    if(mode==='timed') clock=Math.max(0,clock-dt);
    else if(mode==='endless') ebar=Math.max(0,ebar-dt);
    if(!resolver){
      if(mode==='timed'){ if(goalMet()) endRun('win'); else if(clock<=0) endRun('lose'); }
      else if(mode==='endless'){ if(ebar<=0) endRun('lose'); }
    }
    updateHUD();
  }
}

// ================= render =================
function stickerCircle(x,y,r,fill,rim,lw){ ctx.save();
  ctx.shadowColor='rgba(44,39,51,.26)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent'; ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke();
  ctx.beginPath(); ctx.arc(x-r*0.32,y-r*0.34,r*0.26,0,6.28); ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fill();
  ctx.restore(); }
function drawScaffold(){
  ctx.save();
  for(let i=0;i<NC;i++){ const k=cellRing[i]; if(k<1||k>4) continue;
    ctx.beginPath(); ctx.arc(cellX[i],cellY[i],ballRad*0.96,0,6.28);
    ctx.fillStyle= k===1?'rgba(44,39,51,.05)':'rgba(44,39,51,.03)'; ctx.fill();
    if(k===1){ ctx.setLineDash([2,4]); ctx.lineWidth=1.4; ctx.strokeStyle='rgba(44,39,51,.18)'; ctx.stroke(); ctx.setLineDash([]); } }
  // mouth marker: a small accent notch at S[0] so the conveyor intake reads
  const m=Sseq[0]; ctx.beginPath(); ctx.arc(cellX[m],cellY[m],ballRad*1.15,0,6.28);
  ctx.setLineDash([3,4]); ctx.lineWidth=2; ctx.strokeStyle='rgba(255,209,92,.55)'; ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
}
function drawCenterWell(){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,ballRad*1.24,0,6.28); ctx.fillStyle=CARD; ctx.fill();
  ctx.setLineDash([3,4]); ctx.lineWidth=2; ctx.strokeStyle='rgba(44,39,51,.35)'; ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
  if(current!=null) stickerCircle(cx,cy,ballRad,colOf(current),INK,3);
}
function drawAimGlow(){ if(!aim.active) return; const L=LANES[aim.target];
  for(const c of [L.anchor,L.mid,L.outer]){ const g=ctx.createRadialGradient(cellX[c],cellY[c],ballRad*0.4,cellX[c],cellY[c],ballRad*1.7);
    g.addColorStop(0,'rgba(255,209,92,.9)'); g.addColorStop(1,'rgba(255,209,92,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cellX[c],cellY[c],ballRad*1.7,0,6.28); ctx.fill(); } }
function drawAimLine(){ if(!aim.active) return; const a=aim.angle;
  const r0=ballRad*1.35, r1=cellRad[LANES[aim.target].anchor]-ballRad*0.3;
  ctx.save(); ctx.lineCap='round';
  if(aimSnap && Math.abs(angDelta(aim.rawAngle,aim.angle))>0.02){ const rr=aim.rawAngle;
    ctx.setLineDash([2,6]); ctx.lineWidth=2; ctx.strokeStyle='rgba(44,39,51,.22)';
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(rr)*r0,cy+Math.sin(rr)*r0); ctx.lineTo(cx+Math.cos(rr)*r1,cy+Math.sin(rr)*r1); ctx.stroke(); }
  ctx.setLineDash([7,7]); ctx.lineWidth=3.5; ctx.strokeStyle=INK;
  ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*r0,cy+Math.sin(a)*r0); ctx.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1); ctx.stroke();
  ctx.setLineDash([]);
  const ah=10; ctx.translate(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1); ctx.rotate(a);
  ctx.beginPath(); ctx.moveTo(ah,0); ctx.lineTo(-ah*0.6,ah*0.7); ctx.lineTo(-ah*0.6,-ah*0.7); ctx.closePath();
  ctx.fillStyle=ACCENT; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=INK; ctx.stroke(); ctx.restore(); }
function drawBalls(now){ for(const b of allBalls()){ let r=ballRad;
  if(b.popping) r*=1.0+0.12*Math.sin(now/40);
  if(b.land && now-b.land<160){ const t=(now-b.land)/160; r*=1+0.14*(1-t)*Math.sin(t*9); }
  stickerCircle(b.vx,b.vy,r,colOf(b.c),INK,3); } }
function drawAimRings(){ if(!aim.active) return; const L=LANES[aim.target];
  ctx.save(); ctx.lineWidth=4; ctx.strokeStyle=ACCENT;
  for(const c of [L.anchor,L.mid,L.outer]){ ctx.beginPath(); ctx.arc(cellX[c],cellY[c],ballRad+3,0,6.28); ctx.stroke(); } ctx.restore(); }
function drawGoo(){ if(!goo.length) return; ctx.save(); ctx.globalAlpha=0.8;
  for(const g of goo){ const R=g.r*1.9; const [r,gr,bl]=g.rgb;
    const grd=ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,R);
    grd.addColorStop(0,g.col); grd.addColorStop(0.68,g.col); grd.addColorStop(1,`rgba(${r},${gr},${bl},0)`);
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(g.x,g.y,R,0,6.2832); ctx.fill(); } ctx.restore(); }
function drawPuffs(){ for(const p of puffs){ const a=Math.max(0,p.life/p.max);
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); } ctx.globalAlpha=1; }
function drawFlyers(){ for(const f of flyers){ const a=f.t>f.life-0.3?Math.max(0,(f.life-f.t)/0.3):1;
  ctx.save(); ctx.globalAlpha=a; ctx.translate(f.x,f.y); ctx.rotate(f.spin);
  stickerCircle(0,0,ballRad*0.9,colOf(f.c),INK,3); ctx.restore(); } ctx.globalAlpha=1; }
function drawQueue(){ const y=H-46, r=13, gap=34;
  ctx.save(); ctx.textAlign='center'; ctx.font='800 9px Nunito, sans-serif'; ctx.fillStyle=INK_SOFT; ctx.fillText('NEXT', cx, y-21);
  for(let i=0;i<Math.min(2,next.length);i++){ const x=cx-gap*0.5+i*gap, rr=i===0?r:r*0.82;
    stickerCircle(x,y,rr,colOf(next[i]),INK,2.4); } ctx.restore(); }
function drawScorePops(){ for(const s of scorePops){ const a=Math.max(0,s.life/s.max);
  const sz=Math.min(30,11+Math.sqrt(s.v)*1.1);   // bigger +N for a bigger pop
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 '+sz+'px Fredoka, sans-serif';
  ctx.lineWidth=3.5; ctx.strokeStyle=PAPER; ctx.strokeText('+'+s.v,s.x,s.y);
  ctx.fillStyle=s.col; ctx.fillText('+'+s.v,s.x,s.y); ctx.restore(); } ctx.globalAlpha=1; }
function drawChain(){ if(!chainLabel) return; const sp=chainLabel.spec||labelSpec(chainLabel.n);
  const a=Math.max(0,chainLabel.life/(chainLabel.maxLife||sp.life)); const depth=Math.max(2,chainLabel.n);
  const pop=1+0.18*Math.max(0,Math.min(1,(1-a)*3.3));   // little entrance pop
  const sz=sp.size*pop, fill='hsl('+sp.hue+',88%,'+(depth>=10?54:60)+'%)';
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 '+sz+'px Fredoka, sans-serif';
  const y=Math.max(60, cy-cellRad[ringCells[4][0]]-18);
  ctx.lineWidth=4+sz*0.07; ctx.strokeStyle=PAPER; ctx.strokeText('chain x'+depth,cx,y);
  ctx.fillStyle=fill; ctx.fillText('chain x'+depth,cx,y); ctx.restore(); }
function render(now){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeMag>0&&shakeT>0){ const m=shakeMag*(shakeT/0.32); ctx.translate((Math.random()*2-1)*m,(Math.random()*2-1)*m); }
  drawScaffold(); drawAimGlow(); drawGoo(); drawBalls(now); drawAimRings();
  drawFlyers(); drawPuffs(); drawCenterWell(); drawAimLine(); drawQueue(); drawScorePops(); drawChain();
  ctx.restore();
}
function tick(now){ let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now;
  const active=isAnimating();
  if(active||!idleDrawn){ update(dt,now); render(now); idleDrawn=!active; }
  requestAnimationFrame(tick); }

// ================= input =================
function canPlay(){ return phase==='play'; }
function pointFromEvent(ev){ const t=ev.touches?ev.touches[0]:ev; return { x:t.clientX, y:t.clientY }; }
function setAimFromPoint(px,py){ const dx=px-cx, dy=py-cy; if(Math.hypot(dx,dy)<6) return;
  const raw=Math.atan2(dy,dx), tgt=nearestLane(raw); aim.rawAngle=raw; aim.target=tgt; aim.angle=aimSnap?LANES[tgt].angle:raw; }
function onDown(ev){ if(!canPlay()||busy()) return; ev.preventDefault(); SFX.init();
  aim.active=true; const p=pointFromEvent(ev); setAimFromPoint(p.x,p.y); hideHint(); wake(); }
function onMove(ev){ if(!aim.active) return; ev.preventDefault(); const p=pointFromEvent(ev); setAimFromPoint(p.x,p.y); wake(); }
function onUp(ev){ if(!aim.active) return; ev.preventDefault(); const t=aim.target; aim.active=false; wake(); if(canPlay()&&!busy()) startFire(t); }
canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointermove', onMove);
window.addEventListener('pointerup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp, {passive:false});
function hideHint(){ document.getElementById('hint').style.opacity='0'; }

// ================= screens + drawer + HUD =================
const $=id=>document.getElementById(id);
function showScreen(name){ for(const s of ['scrStart','scrWin','scrLose']) $(s).classList.toggle('show', s===name);
  $('hint').style.opacity = (name||mode!=='menu')?'0':'0'; }
$('btnTimed').addEventListener('click',()=>startTimed({}));
$('btnEndless').addEventListener('click',()=>startEndless({}));
$('winAgain').addEventListener('click',()=> mode==='timed'?startTimed({}):startEndless({}));
$('winMenu').addEventListener('click',toMenu);
$('loseRetry').addEventListener('click',()=> mode==='timed'?startTimed({}):startEndless({}));
$('loseMenu').addEventListener('click',toMenu);

function bindRange(id,vid,set,fmt){ const el=$(id), v=$(vid);
  el.addEventListener('input',()=>{ const n=parseFloat(el.value); v.textContent=fmt?fmt(n):n; set(n); wake(); }); }
function bindPills(onId,offId,set){ const on=$(onId), off=$(offId);
  on.addEventListener('click',()=>{ on.classList.add('on'); off.classList.remove('on'); set(true); wake(); });
  off.addEventListener('click',()=>{ off.classList.add('on'); on.classList.remove('on'); set(false); wake(); }); }
$('gear').addEventListener('click',()=> $('drawer').classList.toggle('open'));
$('drawerClose').addEventListener('click',()=> $('drawer').classList.remove('open'));
bindRange('sTimer','vTimer',n=>{ timerLen=n; });
bindRange('sRamp','vRamp',n=>{ endlessRamp=n; }, n=>n.toFixed(1));
bindRange('sCol','vCol',n=>{ COLORS=n; palette=ORDER.slice(0,COLORS); if(phase!=='play') resetRun(); });
bindPills('pSnapOn','pSnapOff',v=>{ aimSnap=v; });
bindRange('sFire','vFire',n=>{ fireMult=n; }, n=>n.toFixed(1));
bindRange('sCasc','vCasc',n=>{ cascMult=n; }, n=>n.toFixed(1));
$('bReroll').addEventListener('click',()=>{ if(busy())return; fillRandom(); wake(); });
$('bMenu').addEventListener('click',()=>{ $('drawer').classList.remove('open'); toMenu(); });
$('sTimer').value=timerLen; $('vTimer').textContent=timerLen;
$('sRamp').value=endlessRamp; $('vRamp').textContent=endlessRamp.toFixed(1);
$('sCol').value=COLORS; $('vCol').textContent=COLORS;
$('sFire').value=fireMult; $('vFire').textContent=fireMult.toFixed(1);
$('sCasc').value=cascMult; $('vCasc').textContent=cascMult.toFixed(1);

function updateHUD(){
  const disp=Math.round(scoreShown);
  $('score').textContent=disp; $('best').textContent=best|0;
  $('stShots').textContent=stats.shots; $('stMatches').textContent=stats.matches;
  $('stArcs').textContent=stats.arcs; $('stRadials').textContent=stats.radials;
  $('stChain').textContent=stats.maxChain; $('stEject').textContent=stats.ejected;
  $('stSlides').textContent=stats.slides; $('stScore').textContent=score;
  const clk=$('clock'), gl=$('goal'), bar=$('bar'), lvl=$('lvl');
  if(mode==='timed' && phase==='play'){
    clk.style.display='block'; clk.textContent=fmtClock(clock); clk.classList.toggle('low',clock<=10);
    gl.style.display='flex'; bar.style.display='none'; lvl.style.display='none';
    if(goal.type==='score'){ $('goalDot').style.display='none'; $('goalTxt').textContent='reach '+goal.target+' · '+disp; }
    else { $('goalDot').style.display='inline-block'; $('goalDot').style.background=colOf(goal.color);
      $('goalTxt').textContent='collect '+goal.target+' · '+(collect[goal.color]||0); }
  } else if(mode==='endless' && phase==='play'){
    clk.style.display='none'; gl.style.display='none'; bar.style.display='block'; lvl.style.display='block';
    $('barFill').style.width=Math.max(0,Math.min(100,ebar/EBAR_MAX*100))+'%'; bar.classList.toggle('low',ebar<=6);
    lvl.textContent='Lv '+endlessLevel+' · '+COLORS+' colours';
  } else { clk.style.display='none'; gl.style.display='none'; bar.style.display='none'; lvl.style.display='none'; }
  $('startBest').textContent = best>0? ('best '+best) : '';
}

// ================= window.GYRE debug handle =================
function ringColors(k){ return ringCells[k].map(c=>grid[c]?grid[c].c:null); }
function occupiedCount(){ let n=current!=null?1:0; for(const k of [2,3,4]) for(const c of ringCells[k]) if(grid[c]) n++; return n; }
function sColors(){ return Sseq.map(c=>colorAt(c)); }
window.GYRE={
  get geometry(){ return { radius:RAD, cells:NC, occupiedCells:SN, lanes:LANES.length,
    ringCounts:{ 0:1, 1:ringCells[1].length, 2:ringCells[2].length, 3:ringCells[3].length, 4:ringCells[4].length },
    rings:[2,3,4], gapRing:1, gapCells:ringCells[1].length, occupied:occupiedCount(), cx, cy, size, ballRad }; },
  get board(){ return { center:current, next:next.slice(), rings:{ 2:ringColors(2), 3:ringColors(3), 4:ringColors(4) } }; },
  ringColors(k){ return ringColors(k); },
  get spiralCells(){ return Sseq.slice(); },
  get mouthCell(){ return Sseq[0]; },
  sColors(){ return sColors(); },
  setSpiral(arr){ for(let i=0;i<SN;i++) grid[Sseq[i]]= arr[i]? mkBall(arr[i],Sseq[i]) : null; },
  // apply one conveyor slide directly (test hook): null the given S-indices, refill mouth from mouthColors,
  // run the shift, and snap animations to final. Returns the resulting S-order colours.
  applyPopAndSlide(sIndices, mouthColors){ for(const s of sIndices) grid[Sseq[s]]=null;
    if(mouthColors) refillSeed=mouthColors.slice(); doSlide();
    for(const b of allBalls()){ if(b.anim){ b.vx=cellX[b.cell]; b.vy=cellY[b.cell]; b.anim=null; } } refillSeed=[]; return sColors(); },
  get occupied(){ return occupiedCount(); },
  get current(){ return current; }, get next(){ return next.slice(); },
  get stats(){ return Object.assign({},stats); }, get score(){ return score; }, get best(){ return best; },
  get scoreShown(){ return Math.round(scoreShown); }, get scoreTarget(){ return score; },
  get lastResolve(){ return lastResolve?Object.assign({},lastResolve):null; },
  labelSpec(depth){ return labelSpec(depth); },
  scoreResolve(rounds){ return scoreResolve(rounds); },
  get chainLabel(){ return chainLabel?{ n:chainLabel.n, size:(chainLabel.spec||labelSpec(chainLabel.n)).size, hue:(chainLabel.spec||labelSpec(chainLabel.n)).hue }:null; },
  scoreParams(){ return { BASE, ROUND_K, ROUND_CAP, GAP_K, WRAP_BASE, WRAP_WRAP, COMBO_K, COMBO_CAP, DEPTH_CAP }; },
  get collect(){ return Object.assign({},collect); },
  get resolving(){ return !!resolver; }, get resolverPhase(){ return resolver?resolver.phase:null; },
  get aim(){ return { active:aim.active, angle:aim.angle, rawAngle:aim.rawAngle, target:aim.target, snap:aimSnap }; },
  get lanes(){ return LANES.map((L,i)=>({ i, angle:L.angle, anchor:L.anchor, mid:L.mid, outer:L.outer })); },
  laneAngle(i){ return LANES[((i%LANES.length)+LANES.length)%LANES.length].angle; },
  nearestLane(a){ return nearestLane(a); },
  fire(lane){ return startFire(lane); },
  aimTo(angle){ aim.active=true; setAimFromPoint(cx+Math.cos(angle)*100, cy+Math.sin(angle)*100); return aim.target; },
  endAim(){ aim.active=false; },
  cellIndex(q,r){ const i=IDX[q+','+r]; return i==null?-1:i; }, ringOf(i){ return cellRing[i]; },
  setCellQR(q,r,colour){ const i=IDX[q+','+r]; if(i==null) return false; const k=cellRing[i]; if(k<2||k>4) return false;
    grid[i]= colour? mkBall(colour,i) : null; return true; },
  setRingCell(ring,i,colour){ const arr=ringCells[ring]; if(!arr) return false; i=((i%arr.length)+arr.length)%arr.length;
    const idx=arr[i]; grid[idx]= colour? mkBall(colour,idx) : null; return true; },
  setCurrent(c){ current=c; }, setNext(arr){ next=arr.slice(); },
  seedRefill(arr){ refillSeed=arr.slice(); }, clearRefillSeed(){ refillSeed=[]; },
  findMatches(){ return findMatches().map(m=>({ type:m.type, colour:m.colour, len:m.len, cells:m.cells.slice(),
    rings:m.cells.map(c=>cellRing[c]) })); },
  triggerResolve(){ if(resolver) return false; resolver={ phase:'detect', depth:0, t:0 }; return true; },
  step(ms){ let t=ms||16; while(t>0){ const d=Math.min(16,t)/1000; update(d,performance.now()); t-=16; } },
  settle(maxMs){ let t=maxMs||60000; while(resolver && t>0){ update(0.016,performance.now()); t-=16; } return !resolver; },
  rerollBoard(){ if(busy()) return false; fillRandom(); return true; },
  clearBoard(){ grid=new Array(NC).fill(null); },
  // modes
  get mode(){ return mode; }, get phase(){ return phase; },
  get clock(){ return clock; }, get goal(){ return goal?Object.assign({},goal):null; },
  goalProgress(){ return goalProgress(); }, goalMet(){ return goalMet(); },
  get ebar(){ return ebar; }, get ebarMax(){ return EBAR_MAX; }, get level(){ return endlessLevel; }, get colors(){ return COLORS; },
  startTimed(opts){ startTimed(opts||{}); }, startEndless(opts){ startEndless(opts||{}); },
  toMenu(){ toMenu(); }, setScore(n){ score=n|0; if(score>best){best=score;saveBest();} updateHUD(); },  // sets target only; scoreShown tweens
  snapScore(){ scoreShown=score; updateHUD(); },
  setClock(s){ clock=s; }, setEbar(s){ ebar=s; },
  wake(){ wake(); }
};

// ================= boot =================
layout();
resetRun();                 // backdrop board for the menu
showScreen('scrStart');
updateHUD();
requestAnimationFrame(tick);
})();
</script>
