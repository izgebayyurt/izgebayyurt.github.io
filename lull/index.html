<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>lull — soundtrack sequencer</title>
<style>
  :root{
    --bg:#efe7d6; --panel:#fbf6ea; --ink:#2a2622; --mut:#8a8170;
    --acc:#d1743f; --acc2:#3f8be6; --sel:#ffce5c; --grid:#e5ddc9;
    --cellon:#d1743f; --cellhi:#ffce5c;
    color-scheme:light;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);
    font:14px/1.4 ui-rounded,"Segoe UI",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  body{padding:16px 14px 80px;}
  .wrap{max-width:1040px;margin:0 auto;}
  h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:0;}
  h1 .dot{color:var(--acc);}
  .sub{color:var(--mut);font-size:13px;margin:2px 0 16px;}

  .card{background:var(--panel);border:2.5px solid var(--ink);border-radius:15px;
    box-shadow:3px 4px 0 var(--ink);padding:13px;margin-bottom:14px;}
  .lbl{font-size:10.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);}

  .row{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
  .btn{background:var(--panel);border:2.5px solid var(--ink);border-radius:11px;
    box-shadow:2px 3px 0 var(--ink);font:800 13px ui-rounded,system-ui;color:var(--ink);
    cursor:pointer;padding:9px 13px;transition:transform .06s,box-shadow .06s;user-select:none;white-space:nowrap;}
  .btn:active{transform:translate(1px,2px);box-shadow:1px 1px 0 var(--ink);}
  .btn.play{background:var(--acc);color:#fff;font-size:15px;min-width:104px;}
  .btn.play.on{background:var(--ink);}
  .btn.ghost{background:var(--bg);}
  .btn.act{background:var(--sel);}
  .btn.sm{padding:6px 9px;font-size:12px;border-width:2px;box-shadow:1.5px 2px 0 var(--ink);border-radius:9px;}
  .btn[disabled]{opacity:.5;cursor:default;}

  select{font:700 13px ui-rounded,system-ui;color:var(--ink);background:var(--bg);
    border:2.5px solid var(--ink);border-radius:10px;padding:7px 8px;box-shadow:2px 3px 0 var(--ink);cursor:pointer;}
  select.sm{padding:5px 6px;font-size:12px;border-width:2px;box-shadow:1.5px 2px 0 var(--ink);}

  /* transport */
  .transport{display:flex;gap:11px;align-items:center;flex-wrap:wrap;}
  .mini{display:flex;flex-direction:column;gap:3px;}
  .mini .lbl{margin:0;}
  .mini input[type=range]{width:110px;}
  .readout{margin-left:auto;font-family:ui-monospace,monospace;font-weight:700;font-size:13px;
    background:var(--bg);border:2.5px solid var(--ink);border-radius:10px;padding:7px 11px;box-shadow:2px 3px 0 var(--ink);
    display:flex;gap:12px;white-space:nowrap;}
  .readout b{color:var(--acc);}
  input[type=range]{-webkit-appearance:none;appearance:none;height:9px;background:var(--bg);
    border:2.5px solid var(--ink);border-radius:20px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;background:var(--acc);
    border:2.5px solid var(--ink);border-radius:50%;cursor:pointer;box-shadow:1px 2px 0 var(--ink);}
  input[type=range]::-moz-range-thumb{width:19px;height:19px;background:var(--acc);border:2.5px solid var(--ink);border-radius:50%;cursor:pointer;}

  /* chord lane */
  .chordlane{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch;}
  .chord{position:relative;min-width:78px;background:var(--bg);border:2.5px solid var(--ink);border-radius:11px;
    box-shadow:2px 3px 0 var(--ink);padding:8px 9px 7px;cursor:grab;user-select:none;text-align:center;
    transition:transform .06s,box-shadow .06s;}
  .chord:active{cursor:grabbing;}
  .chord.sel{background:var(--sel);box-shadow:2px 3px 0 var(--ink),0 0 0 3px var(--acc) inset;}
  .chord.drop{outline:3px dashed var(--acc);outline-offset:2px;}
  .chord .bar{font-size:9.5px;color:var(--mut);font-weight:800;letter-spacing:.05em;}
  .chord .nm{font-size:16px;font-weight:800;margin-top:1px;}
  .chord .playing{position:absolute;inset:0;border-radius:8px;background:rgba(209,116,63,.16);pointer-events:none;opacity:0;}
  .chord.now .playing{opacity:1;}
  .chordadd{min-width:44px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;
    color:var(--mut);background:var(--bg);border:2.5px dashed var(--ink);border-radius:11px;cursor:pointer;}

  .chordedit{margin-top:11px;padding-top:11px;border-top:2px dashed var(--grid);display:none;flex-wrap:wrap;gap:8px;align-items:center;}
  .chordedit.show{display:flex;}
  .pill{display:inline-flex;gap:4px;background:var(--bg);border:2px solid var(--ink);border-radius:9px;padding:3px;box-shadow:1.5px 2px 0 var(--ink);}
  .pill button{border:none;background:transparent;font:800 12px ui-rounded;color:var(--ink);padding:5px 8px;border-radius:6px;cursor:pointer;}
  .pill button.on{background:var(--acc);color:#fff;}
  .sugg{flex-basis:100%;display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:2px;}
  .sugg .lbl{margin:0;}
  .suggchip{background:var(--bg);border:2px solid var(--ink);border-radius:9px;box-shadow:1.5px 2px 0 var(--ink);
    font:800 12px ui-rounded;color:var(--ink);padding:6px 10px;cursor:pointer;}
  .suggchip:active{transform:translate(1px,2px);box-shadow:.5px 1px 0 var(--ink);}
  .suggchip .star{color:var(--acc);}
  .fxchip.on{background:var(--acc);color:#fff;}
  .chord .fxbadge{font-size:10px;height:13px;line-height:13px;letter-spacing:1px;margin-top:1px;}

  /* bar navigator (sync-scroll all grids; mobile-friendly) */
  .barnav{position:sticky;top:0;z-index:20;display:flex;gap:6px;align-items:center;overflow-x:auto;
    padding:8px 10px;margin-bottom:12px;background:var(--bg);border:2.5px solid var(--ink);border-radius:12px;box-shadow:2px 3px 0 var(--ink);
    -webkit-overflow-scrolling:touch;}
  .barnav .lbl{flex:0 0 auto;}
  .barchip{flex:0 0 auto;min-width:32px;padding:6px 9px;border:2px solid var(--ink);border-radius:8px;background:var(--panel);
    font:800 12px ui-rounded;color:var(--ink);cursor:pointer;box-shadow:1.5px 2px 0 var(--ink);text-align:center;}
  .barchip.now{background:var(--acc);color:#fff;}
  .pattern{max-width:132px;}

  /* tracks */
  .track{background:var(--panel);border:2.5px solid var(--ink);border-radius:14px;box-shadow:3px 4px 0 var(--ink);
    margin-bottom:12px;overflow:hidden;}
  .thead{display:flex;gap:8px;align-items:center;padding:9px 11px;background:var(--bg);border-bottom:2.5px solid var(--ink);flex-wrap:wrap;}
  .thead .nm{font-weight:800;font-size:14px;min-width:54px;}
  .thead .spacer{flex:1;}
  .iconbtn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;padding:0;font-size:13px;}
  .iconbtn.act{background:var(--sel);}
  .iconbtn.solo.act{background:var(--acc2);color:#fff;}
  .vol{width:78px;}

  .gridwrap{overflow-x:auto;padding:9px 11px;}
  .seqgrid{border-collapse:separate;border-spacing:0;}
  .seqgrid td,.seqgrid th{padding:0;}
  .rowlab{font-size:10.5px;font-weight:700;color:var(--mut);text-align:right;padding-right:7px !important;white-space:nowrap;
    min-width:40px;font-family:ui-monospace,monospace;}
  .rowlab.acc{color:var(--ink);}
  .cell{width:22px;height:20px;border:1px solid var(--grid);background:var(--panel);cursor:pointer;}
  .cell.beat{border-left:2px solid #cdbfa0;}
  .cell.barline{border-left:3px solid var(--ink);}
  .cell.on{background:var(--cellon);border-color:var(--ink);}
  .cell.on.long{background:var(--cellon);}
  .cell.pcol{box-shadow:inset 0 0 0 2px var(--cellhi);}
  .cell.on.pcol{box-shadow:inset 0 0 0 2px #fff;}
  .drumrow .cell.on{background:var(--acc2);}
  .follownote{padding:16px 12px;color:var(--mut);font-size:13px;font-style:italic;}

  .foot{color:var(--mut);font-size:12px;text-align:center;margin-top:14px;}
  .foot a{color:var(--acc);}
  @media(max-width:640px){.readout{margin-left:0;width:100%;}}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;">
    <h1>lull<span class="dot">.</span></h1>
    <p class="sub">A step sequencer for chill game soundtracks — build chords, program tracks, export a seamless loop.</p>
  </div>

  <!-- transport -->
  <div class="card">
    <div class="transport">
      <button class="btn play" id="play">▶ Play</button>
      <button class="btn ghost sm" id="stop">■ Stop</button>
      <div class="mini"><span class="lbl">Tempo</span><input type="range" id="bpm" min="52" max="128" step="1"></div>
      <div class="mini"><span class="lbl">Swing</span><input type="range" id="swing" min="0" max="60" step="1"></div>
      <div class="mini"><span class="lbl">Master</span><input type="range" id="master" min="0" max="100" step="1"></div>
      <button class="btn ghost sm" id="vinyl" title="Vinyl crackle">💿 Vinyl</button>
      <div class="readout">
        <span>bar <b id="rBar">1</b>/<span id="rBars">4</span></span>
        <span>step <b id="rStep">1</b></span>
        <span>loop <b id="rLoop">0</b></span>
      </div>
    </div>
  </div>

  <!-- chord lane -->
  <div class="card">
    <div class="row" style="margin-bottom:10px;">
      <span class="lbl">Chord sequence</span>
      <span class="spacer" style="flex:1"></span>
      <span class="lbl">Key</span>
      <select id="root" class="sm"></select>
      <select id="scale" class="sm"></select>
      <button class="btn ghost sm" id="chordDice" title="Random progression">🎲</button>
    </div>
    <div class="chordlane" id="chordlane"></div>
    <div class="chordedit" id="chordedit">
      <span class="lbl">Chord</span>
      <div class="pill" id="degPill"></div>
      <div class="pill" id="extPill"></div>
      <button class="btn ghost sm" id="delChord">Remove bar</button>
      <div class="sugg" id="chordSugg"></div>
      <div class="sugg" id="chordFx"></div>
    </div>
  </div>

  <!-- bar navigator (tap a bar to scroll every track's grid to it) -->
  <div class="barnav" id="barnav"></div>

  <!-- tracks -->
  <div id="tracks"></div>

  <div class="row" style="margin-bottom:14px;">
    <button class="btn" id="addTrack">＋ Add track</button>
    <span class="spacer" style="flex:1"></span>
    <span class="lbl">Export</span>
    <button class="btn ghost sm" id="exportWav">⬇ Download .wav loop</button>
  </div>

  <p class="foot">Everything runs in your browser · no uploads · <a href="/">izgebayyurt.github.io</a></p>
</div>

<script>
'use strict';
/* ============================================================
   lull — a step-sequencer soundtrack maker (Web Audio API)
   Song length is defined by the chord lane (one chord = one bar).
   Each track is either a drum grid or a pitched synth grid, or a
   synth that follows the chord lane (pad / arp / bass).
   The same triggerStep() drives live playback and offline WAV
   render, so the export matches what you hear.
   ============================================================ */

// ---------- theory ----------
const KEYS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SCALES={
  major:[0,2,4,5,7,9,11], minor:[0,2,3,5,7,8,10], dorian:[0,2,3,5,7,9,10],
  lydian:[0,2,4,6,7,9,11], mixolydian:[0,2,4,5,7,9,10],
};
const SCALE_NAMES={major:'Major',minor:'Minor',dorian:'Dorian',lydian:'Lydian',mixolydian:'Mixolydian'};
const ROMAN=['I','II','III','IV','V','VI','VII'];
const EXTS=['triad','7','sus2','sus4','add9'];
// which scale degrees tend to follow each degree (functional harmony, 0=I..6=vii)
const NEXT={0:[3,4,5,1,2],1:[4,6,3,0],2:[5,3,1,0],3:[4,0,1,5],4:[0,5,3,1],5:[3,1,4,0],6:[0,2,4]};
function suggestAfter(deg){return (NEXT[deg]||[0,3,4,5]).slice(0,5);}
// per-bar effects the user can toggle on any bar
const FX=[
  {id:'reverb',name:'Reverb',emo:'🌫'},{id:'echo',name:'Echo',emo:'🔊'},
  {id:'arp',   name:'Arp',   emo:'🎹'},{id:'muffle',name:'Muffle',emo:'🎚'},
  {id:'lift',  name:'Lift 8ve',emo:'⬆'},{id:'drop',name:'Drum drop',emo:'🥁'},
];
const FXMAP=Object.fromEntries(FX.map(e=>[e.id,e]));
// effect-send base / boosted levels
const REV_BASE=.5,REV_HI=.95, DEL_BASE=.24,DEL_HI=.5, WARM_BASE=9000,WARM_LO=700;
const mtof=m=>440*Math.pow(2,(m-69)/12);
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// scale index -> midi, relative to a base midi (handles octave wrap)
function scaleMidi(scaleArr,root,baseMidi,index){
  const len=scaleArr.length, oct=Math.floor(index/len), d=((index%len)+len)%len;
  return baseMidi+root+scaleArr[d]+12*oct;
}
// chord tones (midi) for a chord {deg,ext} in current scale, around baseMidi
function chordTones(ch,scaleArr,root,baseMidi){
  const g=i=>scaleMidi(scaleArr,root,baseMidi,ch.deg+i);
  let t;
  if(ch.ext==='sus2')      t=[g(0),g(1),g(4)];
  else if(ch.ext==='sus4') t=[g(0),g(3),g(4)];
  else if(ch.ext==='7')    t=[g(0),g(2),g(4),g(6)];
  else if(ch.ext==='add9') t=[g(0),g(2),g(4),g(7)];
  else                     t=[g(0),g(2),g(4)];
  return t;
}
function chordName(ch,scaleArr,root){
  const t=chordTones(ch,scaleArr,root,60);
  const rootName=KEYS[t[0]%12];
  if(ch.ext==='sus2')return rootName+'sus2';
  if(ch.ext==='sus4')return rootName+'sus4';
  const third=((t[1]-t[0])%12+12)%12;
  let q=third===3?'m':(third===4?'':'dim?');
  if(ch.ext==='7'){const sev=((t[3]-t[0])%12+12)%12;
    if(third===4&&sev===11)return rootName+'maj7';
    if(third===4&&sev===10)return rootName+'7';
    if(third===3&&sev===10)return rootName+'m7';
    if(third===3&&sev===11)return rootName+'mMaj7';}
  if(ch.ext==='add9')return rootName+q+'add9';
  return rootName+q;
}

// ---------- instruments ----------
const SYNTHS={
  // Keys
  rhodes:  {name:'Rhodes',      group:'Keys', oct:0},
  wurli:   {name:'Wurlitzer',   group:'Keys', oct:0},
  piano:   {name:'Dusty Piano', group:'Keys', oct:0},
  // Pads
  warmpad: {name:'Warm Pad',    group:'Pads', oct:0},
  tapepad: {name:'Tape Pad',    group:'Pads', oct:0},
  strings: {name:'Strings',     group:'Pads', oct:0},
  choir:   {name:'Choir',       group:'Pads', oct:0},
  // Bass
  subbass:   {name:'Sub Bass',    group:'Bass', oct:-1},
  fingerbass:{name:'Finger Bass', group:'Bass', oct:-1},
  synthbass: {name:'Synth Bass',  group:'Bass', oct:-1},
  // Plucks & leads
  pluck:  {name:'Pluck',        group:'Plucks & Leads', oct:1},
  guitar: {name:'Nylon Guitar', group:'Plucks & Leads', oct:0},
  harp:   {name:'Harp',         group:'Plucks & Leads', oct:1},
  saw:    {name:'Saw Lead',     group:'Plucks & Leads', oct:1},
  reed:   {name:'Reed',         group:'Plucks & Leads', oct:0},
  // Mallets & bells
  vibes:   {name:'Vibraphone',  group:'Mallets & Bells', oct:1},
  marimba: {name:'Marimba',     group:'Mallets & Bells', oct:0},
  musicbox:{name:'Music Box',   group:'Mallets & Bells', oct:1},
  bell:    {name:'Bell',        group:'Mallets & Bells', oct:1},
};
const DRUM_ROWS=['kick','snare','clap','hat','ohat','tom','rim'];
const DRUM_LABEL={kick:'Kick',snare:'Snare',clap:'Clap',hat:'Hat',ohat:'O-Hat',tom:'Tom',rim:'Rim'};
const KITS={lofi:'Lofi Dust',boombap:'Boom Bap',jazzy:'Jazzy Brush',tape:'Tape',clean:'Clean'};
const KITP={
  lofi:   {kTop:150,kDec:.26,sFreq:1600,sLvl:.24,hHz:6200,hDec:.045,hLvl:.11},
  boombap:{kTop:172,kDec:.30,sFreq:1950,sLvl:.34,hHz:8000,hDec:.040,hLvl:.13},
  jazzy:  {kTop:120,kDec:.22,sFreq:2600,sLvl:.15,hHz:9000,hDec:.055,hLvl:.09,brush:1},
  tape:   {kTop:140,kDec:.25,sFreq:1500,sLvl:.22,hHz:5600,hDec:.050,hLvl:.10},
  clean:  {kTop:160,kDec:.20,sFreq:2400,sLvl:.30,hHz:8600,hDec:.035,hLvl:.12},
};

// ---------- project state ----------
let P;
function defaultProject(){
  const mk=(deg,ext)=>({deg,ext,fx:[]});
  return {
    bpm:78, swing:16, master:0.85, stepsPerBar:16, root:0, scale:'dorian', vinyl:true,
    chords:[mk(1,'7'),mk(4,'7'),mk(0,'7'),mk(5,'7')],
    tracks:[
      {type:'drum', name:'Drums', kit:'lofi', vol:.9, mute:false, solo:false, grid:emptyDrum(4)},
      {type:'synth',name:'Bass',  inst:'fingerbass', src:'chord', role:'bass', oct:0, vol:.9, mute:false, solo:false, grid:emptyGrid(4)},
      {type:'synth',name:'Keys',  inst:'rhodes',     src:'chord', role:'pad',  oct:0, vol:.75,mute:false, solo:false, grid:emptyGrid(4)},
      {type:'synth',name:'Lead',  inst:'guitar',     src:'grid',  role:'pad',  oct:0, vol:.8, mute:false, solo:false, grid:emptyGrid(4)},
    ],
    sel:0,           // selected chord index
  };
}
const SYNTH_ROWS=17;  // piano-roll rows (~2+ octaves of the scale)
function emptyGrid(bars){return Array.from({length:SYNTH_ROWS},()=>new Array(bars*16).fill(false));}
function emptyDrum(bars){return Array.from({length:DRUM_ROWS.length},()=>new Array(bars*16).fill(false));}
const totalSteps=()=>P.chords.length*P.stepsPerBar;

// resize all grids when bar count changes (preserve existing)
function resizeGrids(){
  const w=totalSteps();
  P.tracks.forEach(t=>{
    const rows=t.type==='drum'?DRUM_ROWS.length:SYNTH_ROWS;
    const g=t.grid;
    while(g.length<rows)g.push(new Array(w).fill(false));
    g.length=rows;
    for(let r=0;r<rows;r++){const old=g[r]||[];const nr=new Array(w).fill(false);
      for(let i=0;i<Math.min(w,old.length);i++)nr[i]=old[i];g[r]=nr;}
    t.notes=t.type==='synth'&&t.src==='grid'?computeNotes(g):null;
  });
}
// consecutive on-cells in a row become a single held note {row,start,len}
function computeNotes(g){
  const notes=[];
  for(let r=0;r<g.length;r++){let i=0;const row=g[r];
    while(i<row.length){ if(row[i]){let j=i;while(j+1<row.length&&row[j+1])j++;notes.push({row:r,start:i,len:j-i+1});i=j+1;} else i++; }}
  return notes;
}

// ============================================================
//  audio graph + voices (shared live / offline)
// ============================================================
function makeIR(ctx,sec,decay){const n=Math.floor(ctx.sampleRate*sec),b=ctx.createBuffer(2,n,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<n;i++){const t=i/n;d[i]=(Math.random()*2-1)*Math.pow(1-t,decay);}}return b;}
const _noise=new WeakMap();
function noiseBuf(ctx){if(_noise.has(ctx))return _noise.get(ctx);const n=ctx.sampleRate,b=ctx.createBuffer(1,n,ctx.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=Math.random()*2-1;_noise.set(ctx,b);return b;}

function makeGraph(ctx){
  const master=ctx.createGain(); master.gain.value=P.master;
  const warm=ctx.createBiquadFilter(); warm.type='lowpass'; warm.frequency.value=WARM_BASE; warm.Q.value=.2;
  warm.connect(master); master.connect(ctx.destination);
  const dry=ctx.createGain(); dry.connect(warm);
  const rev=ctx.createConvolver(); rev.buffer=makeIR(ctx,2.6,2.3);
  const revWet=ctx.createGain(); revWet.gain.value=REV_BASE; rev.connect(revWet); revWet.connect(warm);
  const delay=ctx.createDelay(1.0); delay.delayTime.value=(60/P.bpm)*.75;
  const fb=ctx.createGain(); fb.gain.value=.30; delay.connect(fb); fb.connect(delay);
  const delWet=ctx.createGain(); delWet.gain.value=DEL_BASE; delay.connect(delWet); delWet.connect(warm);
  const B={ctx,master,dry,rev,delay,revWet,delWet,warm};
  addVinyl(B);           // always present; gain follows P.vinyl so it can toggle live
  return B;
}
// looping vinyl hiss + random crackle, summed into master
function addVinyl(B){
  const{ctx}=B,secs=4,sr=ctx.sampleRate,buf=ctx.createBuffer(1,sr*secs,sr),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.012;          // base hiss
  const pops=Math.floor(secs*26);
  for(let k=0;k<pops;k++){const pos=Math.floor(Math.random()*(d.length-2)),amp=(Math.random()*.4+.15)*(Math.random()<.5?-1:1);
    d[pos]+=amp;d[pos+1]+=amp*.5;}                                    // crackle
  const s=ctx.createBufferSource();s.buffer=buf;s.loop=true;
  const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=900;
  const g=ctx.createGain();g.gain.value=P.vinyl?.6:0;

// pitched voices ---------------------------------------------------
const VOICES={};
function playSynth(B,inst,freq,t,dur,vel){(VOICES[inst]||vRhodes)(B,freq,t,dur,vel);}
// amplitude-tremolo gain node (osc modulates gain around `center`)
function tremGain(B,t,rate,depth,center,stop){const{ctx}=B,g=ctx.createGain();g.gain.value=center;
  const l=ctx.createOscillator();l.type='sine';l.frequency.value=rate;const lg=ctx.createGain();lg.gain.value=depth;
  l.connect(lg);lg.connect(g.gain);l.start(t);l.stop(stop);return g;}
// Karplus–Strong plucked string (nylon guitar / harp) rendered to a buffer
function ksVoice(B,f,t,dur,v,damp,tone,delay){const{ctx}=B,sr=ctx.sampleRate;
  const p=Math.max(2,Math.round(sr/f)),len=Math.floor(sr*Math.min(3.5,Math.max(.6,dur+.8)));
  const buf=ctx.createBuffer(1,len,sr),d=buf.getChannelData(0),wt=new Float32Array(p);
  for(let i=0;i<p;i++)wt[i]=Math.random()*2-1;
  let pos=0;for(let n=0;n<len;n++){const np=(pos+1)%p,val=(wt[pos]+wt[np])*.5*damp;d[n]=val;wt[pos]=val;pos=np;}
  const s=ctx.createBufferSource();s.buffer=buf;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=tone;
  const g=ctx.createGain();g.gain.value=.85*v;s.connect(lp);lp.connect(g);
  g.connect(B.dry);g.connect(B.rev);if(delay)g.connect(B.delay);s.start(t);s.stop(t+len/sr+.05);}

function vRhodes(B,f,t,dur,v){const{ctx}=B,end=t+3.1,env=ctx.createGain(),tm=tremGain(B,t,5.2,.06,1,end);

function vPiano(B,f,t,dur,v){const{ctx}=B,end=t+3.1,lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=3200;

// drum voices -----------------------------------------------------
function playDrum(B,which,t,v,kit){({kick:dKick,snare:dSnare,clap:dClap,hat:dHat,ohat:dOhat,tom:dTom,rim:dRim})[which](B,t,v,kit);}
function kp(kit){return KITP[kit]||KITP.lofi;}
function dKick(B,t,v,kit){const{ctx}=B,k=kp(kit),o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.setValueAtTime(k.kTop,t);o.frequency.exponentialRampToValueAtTime(46,t+.12);
  g.gain.setValueAtTime(.55*v,t);g.gain.exponentialRampToValueAtTime(.0001,t+k.kDec);o.connect(g);g.connect(B.dry);o.start(t);o.stop(t+k.kDec+.05);}
function dSnare(B,t,v,kit){const{ctx}=B,k=kp(kit),s=ctx.createBufferSource(),bp=ctx.createBiquadFilter(),g=ctx.createGain();
  s.buffer=noiseBuf(ctx);bp.type=k.brush?'lowpass':'bandpass';bp.frequency.value=k.sFreq;bp.Q.value=.9;
  const dec=k.brush?.22:.16;g.gain.setValueAtTime(k.sLvl*v,t);g.gain.exponentialRampToValueAtTime(.0001,t+dec);s.connect(bp);bp.connect(g);g.connect(B.dry);

  if(!k.brush){const o=ctx.createOscillator(),g2=ctx.createGain();o.frequency.value=180;g2.gain.setValueAtTime(.12*v,t);g2.gain.exponentialRampToValueAtTime(.0001,t+.09);o.connect(g2);g2.connect(B.dry);o.start(t);o.stop(t+.12);}}

  s.buffer=noiseBuf(ctx);bp.type='bandpass';bp.frequency.value=1500;bp.Q.value=1.2;const tt=t+k*.012;
  g.gain.setValueAtTime(.2*v,tt);g.gain.exponentialRampToValueAtTime(.0001,tt+.11);s.connect(bp);bp.connect(g);g.connect(B.dry);s.start(tt);s.stop(tt+.14);}}

  s.buffer=noiseBuf(ctx);hp.type='highpass';hp.frequency.value=k.hHz;
  g.gain.setValueAtTime(k.hLvl*v,t);g.gain.exponentialRampToValueAtTime(.0001,t+k.hDec);s.connect(hp);hp.connect(g);g.connect(B.dry);s.start(t);s.stop(t+k.hDec+.02);}

// ============================================================
//  the sequencer core — one function drives live + offline
// ============================================================
function anySolo(){return P.tracks.some(t=>t.solo);}
function audible(t){if(t.mute)return false;if(anySolo())return t.solo;return true;}

// trigger everything that lands on global step `s` at audio time `t`
function triggerStep(B,s,t){
  const spb=P.stepsPerBar, scaleArr=SCALES[P.scale], root=P.root;
  const barIdx=Math.floor(s/spb), inBar=s%spb;
  const ch=P.chords[barIdx%P.chords.length], fx=ch.fx||[];
  const lift=fx.includes('lift')?12:0;
  // per-bar global effects: set send/filter targets at each bar boundary
  if(inBar===0){
    B.revWet.gain.setTargetAtTime(fx.includes('reverb')?REV_HI:REV_BASE,t,.05);
    B.delWet.gain.setTargetAtTime(fx.includes('echo')  ?DEL_HI:DEL_BASE,t,.05);
    B.warm.frequency.setTargetAtTime(fx.includes('muffle')?WARM_LO:WARM_BASE,t,.05);
  }
  const solo=anySolo();
  for(const tr of P.tracks){
    if(tr.mute)continue; if(solo&&!tr.solo)continue;
    const vel=tr.vol;
    if(tr.type==='drum'){
      if(fx.includes('drop'))continue;                          // breakdown: drums out
      for(let r=0;r<DRUM_ROWS.length;r++) if(tr.grid[r][s]) playDrum(B,DRUM_ROWS[r],t,vel,tr.kit);
      continue;
    }
    // synth
    const spec=SYNTHS[tr.inst], octBase=48+(spec.oct+tr.oct)*12+lift;
    if(tr.src==='chord'){
      const arpNow=tr.role==='arp'||(tr.role==='pad'&&fx.includes('arp'));
      if(tr.role==='bass'){
        if(inBar%8===0){const m=chordTones(ch,scaleArr,root,octBase-12)[0];playSynth(B,tr.inst,mtof(m),t,4*stepDur(),vel);}
      }else if(arpNow){
        const rate=2; if(inBar%rate===0){const tones=chordTones(ch,scaleArr,root,octBase);
          const seq=tones.concat(tones.map(m=>m+12));const idx=Math.floor(s/rate)%seq.length;playSynth(B,tr.inst,mtof(seq[idx]),t,rate*stepDur()*.9,vel);}
      }else{                                                    // held pad
        if(inBar===0){const tones=chordTones(ch,scaleArr,root,octBase);const dur=spb*stepDur();
          tones.forEach(m=>playSynth(B,tr.inst,mtof(m),t,dur,vel*.9/Math.sqrt(tones.length)));}
      }
    }else{
      // piano-roll notes
      const notes=tr.notes||(tr.notes=computeNotes(tr.grid));
      for(const n of notes) if(n.start===s){
        const m=scaleMidi(scaleArr,root,octBase,n.row);   // row 0 = lowest
        playSynth(B,tr.inst,mtof(m),t,n.len*stepDur(),vel);}
    }
  }
}
function stepDur(){return (60/P.bpm)/ (P.stepsPerBar/4);}

// ---------- live scheduler ----------
let live=null,playing=false,timer=null,nextStepTime=0,curStep=0,loopCount=0,rafId=0;
function startAudio(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  live=makeGraph(ctx); curStep=0; loopCount=0; nextStepTime=ctx.currentTime+.08;
  timer=setInterval(pump,25); pump(); playing=true;
  document.getElementById('play').textContent='⏸ Pause';
  document.getElementById('play').classList.add('on');
  loopUI();
}
function pump(){
  if(!live)return; const ctx=live.ctx, sd=stepDur(), T=totalSteps();
  while(nextStepTime<ctx.currentTime+.1){
    let t=nextStepTime; if(curStep%2===1)t+=(P.swing/100)*sd;
    triggerStep(live,curStep,t);
    curStep++; nextStepTime+=sd;
    if(curStep>=T){curStep=0;loopCount++;}
  }
}
function pauseAudio(){playing=false;if(timer)clearInterval(timer);timer=null;
  document.getElementById('play').textContent='▶ Play';document.getElementById('play').classList.remove('on');}
function stopAudio(){pauseAudio();if(live){live.ctx.close();live=null;}curStep=0;loopCount=0;

// playhead + readout each frame
function loopUI(){cancelAnimationFrame(rafId);const tick=()=>{if(!live)return;updateReadout();paintPlayhead();rafId=requestAnimationFrame(tick);};rafId=requestAnimationFrame(tick);}
function curPlayStep(){if(!live)return -1;const sd=stepDur(),T=totalSteps();
  let s=curStep-1;const ahead=(nextStepTime-live.ctx.currentTime)/sd;s=Math.round(curStep-ahead);return ((s%T)+T)%T;}
function updateReadout(){const T=totalSteps(),spb=P.stepsPerBar;let s=live?curPlayStep():0;
  document.getElementById('rBar').textContent=Math.floor(s/spb)+1;
  document.getElementById('rBars').textContent=P.chords.length;
  document.getElementById('rStep').textContent=(s%spb)+1;
  document.getElementById('rLoop').textContent=loopCount;}
let lastPhCol=-1;
function paintPlayhead(){const s=curPlayStep();if(s===lastPhCol)return;
  document.querySelectorAll('.cell.pcol').forEach(c=>c.classList.remove('pcol'));
  document.querySelectorAll('.cell[data-step="'+s+'"]').forEach(c=>c.classList.add('pcol'));
  const bar=Math.floor(s/P.stepsPerBar);
  document.querySelectorAll('.chord').forEach((c,i)=>c.classList.toggle('now',i===bar));
  document.querySelectorAll('.barchip').forEach(c=>c.classList.toggle('now',+c.dataset.b===bar));
  lastPhCol=s;}
function clearPlayhead(){document.querySelectorAll('.cell.pcol').forEach(c=>c.classList.remove('pcol'));
  document.querySelectorAll('.chord.now,.barchip.now').forEach(c=>c.classList.remove('now'));lastPhCol=-1;}

// ============================================================
//  offline render -> seamless WAV
// ============================================================
async function renderWav(){
  const sr=44100,tail=2.6,T=totalSteps(),sd=stepDur(),loopLen=T*sd,total=loopLen+tail;
  const oac=new OfflineAudioContext(2,Math.ceil(total*sr),sr);
  const B=makeGraph(oac);
  for(let s=0;s<T;s++){let t=s*sd;if(s%2===1)t+=(P.swing/100)*sd;triggerStep(B,s,t);}
  const r=await oac.startRendering();
  const loopN=Math.round(loopLen*sr),tailN=Math.min(Math.round(tail*sr),r.length-loopN),out=[];
  for(let c=0;c<2;c++){const src=r.getChannelData(c),ch=new Float32Array(loopN);ch.set(src.subarray(0,loopN));
    for(let i=0;i<tailN;i++)ch[i]+=src[loopN+i];out.push(ch);}
  return encodeWav(out,sr);
}
function encodeWav(chs,sr){const n=chs.length,len=chs[0].length,bytes=len*n*2,buf=new ArrayBuffer(44+bytes),dv=new DataView(buf);
  const wr=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  wr(0,'RIFF');dv.setUint32(4,36+bytes,true);wr(8,'WAVE');wr(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,n,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,sr*n*2,true);dv.setUint16(32,n*2,true);dv.setUint16(34,16,true);wr(36,'data');dv.setUint32(40,bytes,true);
  let o=44;for(let i=0;i<len;i++)for(let c=0;c<n;c++){let s=Math.max(-1,Math.min(1,chs[c][i]));dv.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;}
  return new Blob([buf],{type:'audio/wav'});}

function gridEl(tr,ti){
  const wrap=document.createElement('div');wrap.className='gridwrap';
  const tbl=document.createElement('table');tbl.className='seqgrid';
  const W=totalSteps(),spb=P.stepsPerBar;
  const rows=tr.type==='drum'?DRUM_ROWS.length:SYNTH_ROWS;
  const scaleArr=SCALES[P.scale];
  for(let r=0;r<rows;r++){
    const trEl=document.createElement('tr');if(tr.type==='drum')trEl.className='drumrow';
    const gr=tr.type==='drum'?(DRUM_ROWS.length-1-r):(rows-1-r); // display top->bottom
    const lab=document.createElement('td');lab.className='rowlab';
    if(tr.type==='drum'){lab.textContent=DRUM_LABEL[DRUM_ROWS[gr]];}
    else{const m=scaleMidi(scaleArr,P.root,48+(SYNTHS[tr.inst].oct+tr.oct)*12,gr);
      lab.textContent=KEYS[m%12]+(Math.floor(m/12)-1);if(m%12===P.root)lab.classList.add('acc');}
    trEl.appendChild(lab);
    for(let s=0;s<W;s++){
      const td=document.createElement('td');const c=document.createElement('div');c.className='cell';
      c.dataset.step=s;c.dataset.row=gr;
      if(s%spb===0)c.classList.add('barline');else if(s%4===0)c.classList.add('beat');
      if(tr.grid[gr][s])c.classList.add('on');
      c.onmousedown=e=>{e.preventDefault();paintStart(tr,gr,s,!tr.grid[gr][s]);};
      c.onmouseenter=e=>{if(painting)paintCell(tr,gr,s);};
      td.appendChild(c);trEl.appendChild(td);
    }
    tbl.appendChild(trEl);
  }
  wrap.appendChild(tbl);return wrap;
}
// click-drag painting
let painting=false,paintVal=true,paintTrack=null;
function paintStart(tr,r,s,val){painting=true;paintVal=val;paintTrack=tr;paintCell(tr,r,s);}
function paintCell(tr,r,s){if(paintTrack!==tr)return;if(tr.grid[r][s]===paintVal)return;
  tr.grid[r][s]=paintVal;if(tr.type==='synth')tr.notes=computeNotes(tr.grid);
  const cell=[...$$('.track')][P.tracks.indexOf(tr)]?.querySelector(`.cell[data-row="${r}"][data-step="${s}"]`);
  if(cell)cell.classList.toggle('on',paintVal);}

// ---- preset pattern library --------------------------------------
// drum presets: (grid, barOffset, stepsPerBar, barIndex) => set cells
const DRUM_PRESETS={
  'Boom bap':   (g,o,n)=>{K(g,0,o,0);K(g,0,o,10);K(g,1,o,4);K(g,1,o,12);for(let i=0;i<n;i+=2)K(g,3,o,i);},
  'Laid-back':  (g,o,n)=>{K(g,0,o,0);K(g,1,o,8);for(let i=0;i<n;i+=2)if(i!==8)K(g,3,o,i);K(g,3,o,7);},
  'Half-time':  (g,o,n)=>{K(g,0,o,0);K(g,1,o,8);for(let i=0;i<n;i+=4)K(g,3,o,i);},
  'Busy hats':  (g,o,n)=>{K(g,0,o,0);K(g,0,o,10);K(g,1,o,4);K(g,1,o,12);for(let i=0;i<n;i++)K(g,3,o,i);},
  'Four floor': (g,o,n)=>{for(let i=0;i<n;i+=4)K(g,0,o,i);K(g,2,o,4);K(g,2,o,12);for(let i=1;i<n;i+=2)K(g,3,o,i);},
  'Jazzy swing':(g,o,n)=>{K(g,0,o,0);K(g,6,o,4);K(g,6,o,12);K(g,3,o,0);K(g,3,o,6);K(g,3,o,8);K(g,3,o,14);K(g,4,o,10);},
  'Minimal':    (g,o,n)=>{K(g,0,o,0);K(g,0,o,8);for(let i=0;i<n;i+=4)K(g,3,o,i);},
};
// synth presets: fill grid from the chord sequence
const SYNTH_PRESETS={
  'Block chords':(tr)=>chordGrid(tr,(g,o,n,ch)=>rowsFor(ch,7,4).forEach(r=>note(g,r,o,n))),
  'Chord stabs': (tr)=>chordGrid(tr,(g,o,n,ch)=>[0,6,10].forEach(s=>rowsFor(ch,7,4).forEach(r=>note(g,r,o+s,2)))),
  'Offbeat comp':(tr)=>chordGrid(tr,(g,o,n,ch)=>[2,6,10,14].forEach(s=>rowsFor(ch,7,3).forEach(r=>note(g,r,o+s,2)))),
  'Arp up':      (tr)=>arpGrid(tr,'up'),
  'Arp up-down': (tr)=>arpGrid(tr,'updown'),
  'Root pulse':  (tr)=>chordGrid(tr,(g,o,n,ch)=>{const r=rowsFor(ch,0,1)[0];for(let i=0;i<n;i+=4)note(g,r,o+i,3);}),
  'Walking bass':(tr)=>chordGrid(tr,(g,o,n,ch)=>{const t=rowsFor(ch,0,4);[t[0],t[2]||t[0],t[1],t[3]||t[2]||t[0]].forEach((r,i)=>note(g,r,o+i*4,3));}),
  'Plucky melody':(tr)=>{tr.grid=emptyGrid(P.chords.length);const spb=P.stepsPerBar,rng=mulberry32(0x51ee|P.chords.length);
    let w=9;for(let b=0;b<P.chords.length;b++){const ch=P.chords[b],o=b*spb,tones=rowsFor(ch,7,3);
      for(let i=0;i<spb;i++){const strong=i%4===0;
        if(strong){w=tones[(i/4)%tones.length];note(tr.grid,w,o+i,2);}
        else if(rng()<.32){w=Math.max(0,Math.min(SYNTH_ROWS-1,w+(rng()<.5?-1:1)));note(tr.grid,w,o+i,1);}}}
    tr.notes=computeNotes(tr.grid);},
};
const K=(g,row,o,s)=>{if(o+s<g[row].length)g[row][o+s]=true;};                 // set one drum hit
const note=(g,row,start,len)=>{for(let i=0;i<len&&start+i<g[row].length;i++)g[row][start+i]=true;};
// grid rows for a chord's tones, in register `reg` (scale-steps up), up to `count` tones
function rowsFor(ch,reg,count){const idx=[0,2,4,6].slice(0,count);
  return idx.map(i=>reg+ch.deg+i).filter(r=>r>=0&&r<SYNTH_ROWS);}
function chordGrid(tr,fn){tr.grid=emptyGrid(P.chords.length);const spb=P.stepsPerBar;
  for(let b=0;b<P.chords.length;b++)fn(tr.grid,b*spb,spb,P.chords[b]);tr.notes=computeNotes(tr.grid);}
function arpGrid(tr,mode){tr.grid=emptyGrid(P.chords.length);const spb=P.stepsPerBar;
  for(let b=0;b<P.chords.length;b++){const ch=P.chords[b],o=b*spb;let seq=rowsFor(ch,7,4);
    seq=seq.concat(seq.map(r=>r+7).filter(r=>r<SYNTH_ROWS));
    if(mode==='updown')seq=seq.concat(seq.slice(1,-1).reverse());
    let k=0;for(let i=0;i<spb;i+=2){note(tr.grid,seq[k%seq.length],o+i,2);k++;}}
  tr.notes=computeNotes(tr.grid);}
function presetsFor(tr){return tr.type==='drum'?DRUM_PRESETS:SYNTH_PRESETS;}
function applyPreset(tr,name){const set=presetsFor(tr),fn=set[name];if(!fn)return;
  if(tr.type==='drum'){tr.grid=emptyDrum(P.chords.length);const spb=P.stepsPerBar;
    for(let b=0;b<P.chords.length;b++)fn(tr.grid,b*spb,spb,b);}
  else fn(tr);}
function randomPreset(tr){const names=Object.keys(presetsFor(tr));
  const i=Math.floor((Date.now()>>>4)%names.length);applyPreset(tr,names[i]);}

}
function scrollAllToBar(b){const step=b*P.stepsPerBar;
  document.querySelectorAll('.gridwrap').forEach(w=>{const t=w.querySelector('.cell[data-step="'+step+'"]');if(!t)return;
    const lab=w.querySelector('.rowlab'),labW=lab?lab.getBoundingClientRect().width:0;
    const wr=w.getBoundingClientRect(),tr=t.getBoundingClientRect();
    w.scrollTo({left:w.scrollLeft+(tr.left-wr.left)-labW-2,behavior:'smooth'});});
}
let syncing=false;
function linkScroll(){const wraps=[...document.querySelectorAll('.gridwrap')];
  wraps.forEach(w=>{w.onscroll=()=>{if(syncing)return;syncing=true;
    wraps.forEach(o=>{if(o!==w&&o.scrollLeft!==w.scrollLeft)o.scrollLeft=w.scrollLeft;});syncing=false;};});}

function renderAll(){renderChords();renderChordEdit();renderBarNav();renderTracks();updateReadout();}

// --- boot ---
function boot(){
  P=defaultProject();resizeGrids();
  // populate selects
  KEYS.forEach((k,i)=>opt($('#root'),i,k,i===P.root));
  Object.entries(SCALE_NAMES).forEach(([k,n])=>opt($('#scale'),k,n,k===P.scale));
  $('#bpm').value=P.bpm;$('#swing').value=P.swing;$('#master').value=P.master*100;
  $('#vinyl').classList.toggle('act',P.vinyl);
  // seed starter patterns so it sounds like something immediately
  applyPreset(P.tracks[0],'Boom bap');       // Drums
  applyPreset(P.tracks[3],'Plucky melody');  // Lead (nylon guitar)
  bindTransport();renderAll();
}
boot();
</script>
