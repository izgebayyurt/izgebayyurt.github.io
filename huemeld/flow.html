<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f3ead6" />
<title>Huemeld Flow (prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3ead6; --card:#fdf8ec; --ink:#2c2733; --ink-soft:#7a7284; --line:#2c2733; --shadow:rgba(44,39,51,.35);
  --font-d:'Fredoka',sans-serif; --font-u:'Nunito',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.055) 1.2px, transparent 1.3px);
  background-size:22px 22px;
  font-family:var(--font-u); color:var(--ink);
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; overscroll-behavior:none;
}
.top{ width:min(94vw,420px); display:flex; align-items:center; justify-content:space-between; padding:12px 2px 8px; }
.brand{ display:flex; align-items:baseline; gap:8px; }
.brand a{ text-decoration:none; color:var(--ink); }
h1{ font-family:var(--font-d); font-weight:700; font-size:24px; line-height:1; }
.arc{ font-family:var(--font-d); font-weight:600; font-size:11px; letter-spacing:2px; color:#fff; background:var(--ink); border-radius:6px; padding:3px 7px; transform:rotate(-2deg); }
.lvbar{ width:min(94vw,420px); display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.mkk{ height:38px; border-radius:11px; border:2.5px solid var(--line); background:var(--card); box-shadow:0 3px 0 var(--shadow); font-size:16px; cursor:pointer; font-family:var(--font-d); padding:0 14px; }
.mkk:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--shadow); }
.lvname{ font-family:var(--font-d); font-weight:700; font-size:17px; }
.cov{ font-size:11.5px; font-weight:800; color:var(--ink-soft); letter-spacing:.5px; }
.boardwrap{ position:relative; width:min(94vw,420px); }
.board{
  position:relative; width:100%; aspect-ratio:1;
  background:var(--card); border:3px solid var(--line); border-radius:18px;
  box-shadow:0 5px 0 var(--shadow); overflow:hidden; touch-action:none;
}
.gridlayer,.pathlayer,.dotlayer{ position:absolute; inset:0; pointer-events:none; }
.gcell{ position:absolute; }
.gcell::before{ content:""; position:absolute; left:50%; top:50%; width:14%; height:14%; transform:translate(-50%,-50%); border-radius:50%; background:var(--line); opacity:.12; }
.pb{ position:absolute; border-radius:38%; }
.pc{ position:absolute; }
.jun{ position:absolute; border:3px solid var(--line); border-radius:50%; box-shadow:1.5px 2px 0 var(--shadow); z-index:3; animation:junPop .3s cubic-bezier(.3,1.5,.6,1); }
@keyframes junPop{ 0%{transform:scale(.4)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.dot{ position:absolute; border:3px solid var(--line); box-shadow:1.5px 2px 0 var(--shadow); z-index:4; display:flex; align-items:center; justify-content:center; }
.dot.sq{ border-radius:26% 32% 28% 34% / 30% 26% 34% 28%; }
.dot.ci{ border-radius:50%; }
.dot .st{ color:#fff; font-size:13px; -webkit-text-stroke:1px var(--line); font-family:var(--font-d); font-weight:700; }
.dot.donept{ box-shadow:0 0 0 3px #fff, 0 0 10px 2px rgba(87,194,104,.6); }
.toast{
  position:absolute; left:50%; bottom:12px; transform:translateX(-50%); z-index:8;
  background:var(--ink); color:#fff; font-family:var(--font-d); font-weight:600; font-size:13px;
  padding:7px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap;
}
.toast.show{ opacity:1; }
.ov{
  position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
  background:rgba(243,234,214,.9); border-radius:15px; opacity:0; pointer-events:none; transition:opacity .2s;
}
.ov.show{ opacity:1; pointer-events:auto; }
.panel{ background:var(--card); border:3px solid var(--line); border-radius:18px; box-shadow:0 5px 0 var(--shadow); padding:22px 26px; text-align:center; max-width:86%; }
.panel h2{ font-family:var(--font-d); font-weight:700; font-size:26px; margin-bottom:6px; }
.panel p{ font-size:13px; font-weight:700; color:var(--ink-soft); line-height:1.5; }
.mk{
  font-family:var(--font-d); font-weight:600; cursor:pointer; color:var(--ink);
  background:#ffd15c; border:2.5px solid var(--line); border-radius:14px;
  box-shadow:0 3px 0 var(--shadow); height:46px; padding:0 28px; font-size:16px; margin-top:13px;
  transition:transform .08s, box-shadow .08s; touch-action:manipulation;
}
.mk:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.tip{ width:min(94vw,420px); text-align:center; font-size:11.5px; font-weight:700; color:var(--ink-soft); margin-top:10px; line-height:1.5; }
.tip b{ color:var(--ink); }
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><a href="./" title="back to Huemeld"><h1>Huemeld</h1></a><span class="arc">FLOW</span></div>
    <button class="mkk" id="btnReset" title="Reset level">↻ reset</button>
  </div>
  <div class="lvbar">
    <button class="mkk" id="btnPrev">←</button>
    <div style="text-align:center"><div class="lvname" id="lvName">Level 1</div><div class="cov" id="cov">0/25 painted</div></div>
    <button class="mkk" id="btnNext">→</button>
  </div>
  <div class="boardwrap">
    <div class="board" id="board">
      <div class="gridlayer" id="gridlayer"></div>
      <div class="pathlayer" id="pathlayer"></div>
      <div class="dotlayer" id="dotlayer"></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="ov" id="ovWin">
      <div class="panel">
        <h2>Solved! ✦</h2>
        <p id="winMsg">Every cell painted.</p>
        <button class="mk" id="btnWinNext">Next →</button>
      </div>
    </div>
  </div>
  <p class="tip">each paint must reach <b>two</b> blends — drag from the dot twice, or grab its line to <b>branch</b> · join two paints that <b>mix</b>, carry the blend to its <b>✦</b> · <b>paint every cell</b></p>

<script>
(function(){
"use strict";
var HEX={R:"#ef4a5a",Y:"#f6c445",B:"#3d8bdf",O:"#f2913d",G:"#57c268",P:"#9b62d6"};
var MIXMAP={RY:"O",BR:"P",BY:"G"};
function mixOf(a,b){ return MIXMAP[[a,b].sort().join("")]||null; }

/* iOS zoom guards */
document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
document.addEventListener("gesturechange", function(e){ e.preventDefault(); });
document.addEventListener("touchmove", function(e){ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
var lastTE=0;
document.addEventListener("touchend", function(e){ var now=Date.now(); if(now-lastTE<300 && !e.target.closest("button")) e.preventDefault(); lastTE=now; }, {passive:false});

/* ---------- levels: ONE emitter each of R/Y/B, ONE receiver each of O/G/P.
   Every emitter must split into two lines (fork at the dot, or branch mid-line;
   branches never rejoin). Each authored level has a verified full-coverage solution. */
var LEVELS=[
  { name:"The colour wheel", n:5,
    ems:[["R",2,0],["Y",0,4],["B",4,4]],
    tgts:[["O",0,0],["G",2,1],["P",3,2]] },
  { name:"Branch out", n:6,
    ems:[["R",2,1],["Y",2,3],["B",5,3]],
    tgts:[["O",1,4],["G",5,4],["P",1,2]] },
  { name:"Long way round", n:7,
    ems:[["R",2,0],["Y",0,6],["B",6,6]],
    tgts:[["O",0,0],["G",2,1],["P",5,3]] }
];

var board=document.getElementById("board"), pathL=document.getElementById("pathlayer"),
    dotL=document.getElementById("dotlayer"), gridL=document.getElementById("gridlayer"),
    covEl=document.getElementById("cov"), lvNameEl=document.getElementById("lvName"),
    toastEl=document.getElementById("toast"), ovWin=document.getElementById("ovWin");

var li=Math.min(+(localStorage.getItem("hm_flow_i")||0), LEVELS.length-1);
var N=5, ems=[], tgts=[], junctions=[], drag=null, solved=false, toastTid=0;

/* ---------- audio ---------- */
var actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } } if(actx&&actx.state==="suspended") actx.resume(); }
function beep(f,d,t,g){ if(!actx) return; try{ var o=actx.createOscillator(),v=actx.createGain(),n=actx.currentTime; o.type=t||"sine"; o.frequency.value=f; o.connect(v); v.connect(actx.destination); v.gain.setValueAtTime(0.0001,n); v.gain.linearRampToValueAtTime(g||0.05,n+0.01); v.gain.exponentialRampToValueAtTime(0.0001,n+d); o.start(n); o.stop(n+d+0.03); }catch(e){} }
function sfxJun(){ beep(430,0.08,"triangle",0.05); setTimeout(function(){ beep(650,0.1,"triangle",0.045); },60); }
function sfxDone(){ beep(520,0.09,"triangle",0.05); setTimeout(function(){ beep(780,0.12,"triangle",0.045); },70); }
function sfxWin(){ [0,110,220,400].forEach(function(t,i){ setTimeout(function(){ beep(440+i*140,0.15,"triangle",0.05); },t); }); }

/* ---------- level state ---------- */
function loadLevel(i){
  li=Math.max(0, Math.min(LEVELS.length-1, i));
  localStorage.setItem("hm_flow_i",""+li);
  var L=LEVELS[li];
  N=L.n; drag=null; solved=false; junctions=[];
  ems=L.ems.map(function(s){ return {col:s[0], r:s[1], c:s[2], legs:[]}; });   // legs: up to 2, each {cells:[[r,c]...], jun:-1}
  tgts=L.tgts.map(function(t){ return {sec:t[0], r:t[1], c:t[2], done:false}; });
  lvNameEl.textContent=(li+1)+". "+L.name;
  ovWin.classList.remove("show");
  buildGrid(); renderDots(); renderPaths();
}
function cs(){ return board.clientWidth/N; }
function same(a,b){ return a[0]===b[0] && a[1]===b[1]; }
function inb(r,c){ return r>=0 && c>=0 && r<N && c<N; }
function indexIn(list,r,c){ for(var i=0;i<list.length;i++) if(list[i][0]===r&&list[i][1]===c) return i; return -1; }
function tgtFor(sec){ for(var i=0;i<tgts.length;i++) if(tgts[i].sec===sec) return tgts[i]; return null; }

function buildGrid(){
  var h="", s=100/N;
  for(var r=0;r<N;r++) for(var c=0;c<N;c++)
    h+='<div class="gcell" style="left:'+(c*s)+'%;top:'+(r*s)+'%;width:'+s+'%;height:'+s+'%"></div>';
  gridL.innerHTML=h;
}

function occAt(r,c){
  for(var j=0;j<junctions.length;j++){ if(same(junctions[j].cell,[r,c])) return {t:"jun", i:j}; }
  for(var j2=0;j2<junctions.length;j2++){ var jd=indexIn(junctions[j2].leg,r,c); if(jd>=0) return {t:"jleg", i:j2, idx:jd}; }
  for(var e=0;e<ems.length;e++){
    if(ems[e].r===r && ems[e].c===c) return {t:"emdot", e:e};
    for(var l=0;l<ems[e].legs.length;l++){ var idx=indexIn(ems[e].legs[l].cells,r,c); if(idx>=0) return {t:"em", e:e, l:l, idx:idx}; }
  }
  for(var t2=0;t2<tgts.length;t2++){ if(tgts[t2].r===r && tgts[t2].c===c) return {t:"tgt", i:t2}; }
  return null;
}
function destroyJunctionOf(leg){
  if(leg.jun<0) return;
  var j=leg.jun, J=junctions[j];
  if(J){
    ems.forEach(function(E){ E.legs.forEach(function(Lg){ if(Lg.jun===j) Lg.jun=-1; else if(Lg.jun>j) Lg.jun--; }); });
    var t=tgtFor(J.sec); if(t) t.done=false;
    junctions.splice(j,1);
  }
}
function clearLeg(e,l){
  var E=ems[e], leg=E.legs[l];
  destroyJunctionOf(leg);
  E.legs.splice(l,1);
  // a surviving branch rooted on the removed leg dies with it
  for(var k=E.legs.length-1;k>=0;k--){
    var root=E.legs[k].cells[0];
    var rootOk = (root[0]===E.r && root[1]===E.c);
    if(!rootOk){ for(var m=0;m<E.legs.length;m++){ if(m!==k && indexIn(E.legs[m].cells, root[0], root[1])>=0){ rootOk=true; break; } } }
    if(!rootOk){ destroyJunctionOf(E.legs[k]); E.legs.splice(k,1); }
  }
}

/* ---------- input ---------- */
function cellAt(x,y){
  var rect=board.getBoundingClientRect(), s=cs();
  var c=Math.floor((x-rect.left)/s), r=Math.floor((y-rect.top)/s);
  if(!inb(r,c)) return null;
  return [r,c];
}
board.addEventListener("pointerdown", function(e){
  if(!e.isPrimary || solved) return; ensureAudio();
  var cell=cellAt(e.clientX,e.clientY); if(!cell) return;
  var o=occAt(cell[0],cell[1]);
  if(!o) return;
  if(o.t==="jun"){                                   // redraw the blended line from the junction
    var J=junctions[o.i]; J.leg=[J.cell.slice()];
    var tj=tgtFor(J.sec); if(tj) tj.done=false;
    drag={t:"jun", i:o.i};
  } else if(o.t==="jleg"){
    var J2=junctions[o.i]; J2.leg=J2.leg.slice(0,o.idx+1);
    var tj2=tgtFor(J2.sec); if(tj2) tj2.done=false;
    drag={t:"jun", i:o.i};
  } else if(o.t==="emdot"){
    var E=ems[o.e];
    if(E.legs.length===0){ E.legs.push({cells:[[E.r,E.c]], jun:-1}); drag={t:"em", e:o.e, l:0}; }
    else if(E.legs.length===1 && E.legs[0].cells.length<=1){ E.legs[0]={cells:[[E.r,E.c]], jun:-1}; drag={t:"em", e:o.e, l:0}; }
    else if(E.legs.length===1){ E.legs.push({cells:[[E.r,E.c]], jun:-1}); drag={t:"em", e:o.e, l:1}; }   // second pipe straight from the dot
    else { while(E.legs.length) clearLeg(o.e,0); E.legs.push({cells:[[E.r,E.c]], jun:-1}); drag={t:"em", e:o.e, l:0}; }   // third grab = start over
  } else if(o.t==="em"){
    var E2=ems[o.e], leg=E2.legs[o.l], isHead=(o.idx===leg.cells.length-1);
    if(isHead && leg.jun<0){ drag={t:"em", e:o.e, l:o.l}; }                       // continue this line
    else if(E2.legs.length<2){                                                    // BRANCH: second line rooted mid-trunk
      E2.legs.push({cells:[[cell[0],cell[1]]], jun:-1});
      drag={t:"em", e:o.e, l:E2.legs.length-1};
    } else {                                                                       // truncate (may orphan+kill a branch)
      destroyJunctionOf(leg);
      leg.cells=leg.cells.slice(0,o.idx+1);
      clearOrphans(o.e);
      drag={t:"em", e:o.e, l:o.l};
    }
  } else return;
  try{ board.setPointerCapture(e.pointerId); }catch(_e){}
  renderPaths();
});
function clearOrphans(e){
  var E=ems[e];
  for(var k=E.legs.length-1;k>=0;k--){
    var root=E.legs[k].cells[0];
    var ok=(root[0]===E.r && root[1]===E.c);
    if(!ok){ for(var m=0;m<E.legs.length;m++){ if(m!==k && indexIn(E.legs[m].cells, root[0], root[1])>=0){ ok=true; break; } } }
    if(!ok){ destroyJunctionOf(E.legs[k]); E.legs.splice(k,1); }
  }
}
board.addEventListener("pointermove", function(e){
  if(!drag || !e.isPrimary) return;
  var cell=cellAt(e.clientX,e.clientY); if(!cell) return;
  step(cell);
});
board.addEventListener("pointerup", function(){ finishDrag(); });
board.addEventListener("pointercancel", function(){ finishDrag(); });
board.addEventListener("contextmenu", function(e){ e.preventDefault(); });
function finishDrag(){
  if(drag && drag.t==="em"){   // a lone abandoned dot-cell leg is noise — drop it
    var E=ems[drag.e], leg=E.legs[drag.l];
    if(leg && leg.cells.length<=1 && !(leg.cells[0][0]===E.r&&leg.cells[0][1]===E.c && E.legs.length===1)){
      if(leg.cells.length<=1 && leg.jun<0 && E.legs.length===2 && !(leg.cells[0][0]===E.r&&leg.cells[0][1]===E.c)){ /* keep branch roots */ }
    }
  }
  drag=null;
}
function legOf(d){ return d.t==="em" ? ems[d.e].legs[d.l].cells : junctions[d.i].leg; }

function step(cell){
  var leg=legOf(drag); if(!leg) { drag=null; return; }
  var head=leg[leg.length-1];
  if(same(cell,head)) return;
  if(leg.length>1 && same(cell, leg[leg.length-2])){ leg.pop(); renderPaths(); return; }   // drag back = undo
  if(Math.abs(cell[0]-head[0])+Math.abs(cell[1]-head[1])!==1) return;
  var o=occAt(cell[0],cell[1]);
  if(!o){ leg.push(cell); renderPaths(); return; }

  if(drag.t==="em" && o.t==="em" && o.e!==drag.e){
    var me=ems[drag.e], other=ems[o.e], oleg=other.legs[o.l];
    var isHead=(o.idx===oleg.cells.length-1);
    var sec=mixOf(me.col, other.col);
    var myLeg=me.legs[drag.l];
    if(isHead && sec && myLeg.jun<0 && oleg.jun<0 && tgtFor(sec) && !tgtFor(sec).done){
      myLeg.cells.push(cell);                                        // heads meet — THE BLEND
      var J={cell:cell.slice(), sec:sec, leg:[cell.slice()]};
      junctions.push(J);
      myLeg.jun=junctions.length-1; oleg.jun=junctions.length-1;
      drag={t:"jun", i:junctions.length-1};                          // keep dragging in the blended colour
      sfxJun(); renderPaths(); return;
    }
  }
  if(drag.t==="jun" && o.t==="tgt"){
    var T=tgts[o.i], J3=junctions[drag.i];
    if(T.sec===J3.sec && !T.done){
      J3.leg.push(cell); T.done=true; drag=null;
      sfxDone(); renderPaths(); checkWin(); return;
    }
  }
  /* blocked otherwise — including your own other line: branches never re-merge */
}

/* ---------- coverage & win ---------- */
function coverage(){
  var set={};
  ems.forEach(function(E){ set[E.r+","+E.c]=1; E.legs.forEach(function(Lg){ Lg.cells.forEach(function(c){ set[c[0]+","+c[1]]=1; }); }); });
  junctions.forEach(function(J){ J.leg.forEach(function(c){ set[c[0]+","+c[1]]=1; }); });
  tgts.forEach(function(T){ set[T.r+","+T.c]=1; });
  return Object.keys(set).length;
}
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); if(toastTid) clearTimeout(toastTid); toastTid=setTimeout(function(){ toastEl.classList.remove("show"); },1800); }
function checkWin(){
  if(!tgts.every(function(t){ return t.done; })) return;
  var cov=coverage();
  if(cov<N*N){ toast("All blended — now paint every cell!"); return; }
  solved=true; sfxWin();
  var done=JSON.parse(localStorage.getItem("hm_flow_done")||"{}"); done[li]=1; localStorage.setItem("hm_flow_done", JSON.stringify(done));
  document.getElementById("winMsg").textContent = "Every cell painted."+(li+1<LEVELS.length ? "" : " That's all the levels — for now!");
  document.getElementById("btnWinNext").style.display = li+1<LEVELS.length ? "" : "none";
  setTimeout(function(){ ovWin.classList.add("show"); }, 350);
}

/* ---------- render ---------- */
function renderDots(){
  var s=cs(), h="";
  function dot(col,r,c,shape,star){
    var sz=s*0.68, off=(s-sz)/2;
    return '<div class="dot '+shape+'" data-dr="'+r+'" data-dc="'+c+'" style="left:'+(c*s+off)+'px;top:'+(r*s+off)+'px;width:'+sz+'px;height:'+sz+'px;background:'+HEX[col]+'">'+(star?'<span class="st">✦</span>':'')+'</div>';
  }
  ems.forEach(function(E){ h+=dot(E.col,E.r,E.c,"sq",false); });
  tgts.forEach(function(T){ h+=dot(T.sec,T.r,T.c,"ci",true); });
  dotL.innerHTML=h;
}
function renderPaths(){
  var s=cs(), h="", bw=s*0.34, bb=s*0.5;
  function seg(list,color){
    for(var i=0;i<list.length;i++){
      var r=list[i][0], c=list[i][1];
      h+='<div class="pb" style="left:'+(c*s+(s-bb)/2)+'px;top:'+(r*s+(s-bb)/2)+'px;width:'+bb+'px;height:'+bb+'px;background:'+color+'"></div>';
      if(i>0){
        var pr=list[i-1][0], pc=list[i-1][1];
        var x1=pc*s+s/2, y1=pr*s+s/2, x2=c*s+s/2, y2=r*s+s/2;
        if(pr===r) h+='<div class="pc" style="left:'+(Math.min(x1,x2))+'px;top:'+(y1-bw/2)+'px;width:'+(Math.abs(x2-x1))+'px;height:'+bw+'px;background:'+color+'"></div>';
        else h+='<div class="pc" style="left:'+(x1-bw/2)+'px;top:'+(Math.min(y1,y2))+'px;width:'+bw+'px;height:'+(Math.abs(y2-y1))+'px;background:'+color+'"></div>';
      }
    }
  }
  ems.forEach(function(E){ E.legs.forEach(function(Lg){ seg(Lg.cells, HEX[E.col]); }); });
  junctions.forEach(function(J){ seg(J.leg, HEX[J.sec]); });
  junctions.forEach(function(J){
    var jz=s*0.62, jo=(s-jz)/2;
    h+='<div class="jun" style="left:'+(J.cell[1]*s+jo)+'px;top:'+(J.cell[0]*s+jo)+'px;width:'+jz+'px;height:'+jz+'px;background:'+HEX[J.sec]+'"></div>';
  });
  pathL.innerHTML=h;
  covEl.textContent=coverage()+"/"+(N*N)+" painted";
  var dots=dotL.querySelectorAll(".dot");
  tgts.forEach(function(T){ dots.forEach(function(d){ if(+d.dataset.dr===T.r && +d.dataset.dc===T.c) d.classList.toggle("donept", T.done); }); });
}
window.addEventListener("resize", function(){ renderDots(); renderPaths(); });

/* ---------- controls ---------- */
document.getElementById("btnPrev").addEventListener("click", function(){ ensureAudio(); loadLevel(li-1); });
document.getElementById("btnNext").addEventListener("click", function(){ ensureAudio(); loadLevel(li+1); });
document.getElementById("btnReset").addEventListener("click", function(){ ensureAudio(); loadLevel(li); });
document.getElementById("btnWinNext").addEventListener("click", function(){ ensureAudio(); loadLevel(li+1); });

loadLevel(li);

/* debug hooks for automated testing */
window.__flow={
  load:loadLevel,
  state:function(){ return { li:li, n:N, solved:solved, coverage:coverage(),
    tgts:tgts.map(function(t){ return {sec:t.sec, done:t.done}; }),
    junctions:junctions.map(function(j){ return {sec:j.sec, cell:j.cell, legLen:j.leg.length}; }),
    ems:ems.map(function(E){ return {col:E.col, legs:E.legs.map(function(l){ return {len:l.cells.length, jun:l.jun, root:l.cells[0]}; })}; }) }; },
  cellCenter:function(r,c){ var rect=board.getBoundingClientRect(), s=cs(); return {x:rect.left+c*s+s/2, y:rect.top+r*s+s/2}; }
};
})();
</script>
</body>
