<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f3ead6" />
<title>Huemeld Flow (prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3ead6; --card:#fdf8ec; --ink:#2c2733; --ink-soft:#7a7284; --line:#2c2733; --shadow:rgba(44,39,51,.35);
  --font-d:'Fredoka',sans-serif; --font-u:'Nunito',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.055) 1.2px, transparent 1.3px);
  background-size:22px 22px;
  font-family:var(--font-u); color:var(--ink);
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; overscroll-behavior:none;
}
.top{ width:min(94vw,420px); display:flex; align-items:center; justify-content:space-between; padding:12px 2px 8px; }
.brand{ display:flex; align-items:baseline; gap:8px; }
.brand a{ text-decoration:none; color:var(--ink); }
h1{ font-family:var(--font-d); font-weight:700; font-size:24px; line-height:1; }
.arc{ font-family:var(--font-d); font-weight:600; font-size:11px; letter-spacing:2px; color:#fff; background:var(--ink); border-radius:6px; padding:3px 7px; transform:rotate(-2deg); }
.topbtns{ display:flex; gap:7px; }
.mkk{ height:38px; border-radius:11px; border:2.5px solid var(--line); background:var(--card); box-shadow:0 3px 0 var(--shadow); font-size:15px; cursor:pointer; font-family:var(--font-d); font-weight:600; padding:0 13px; color:var(--ink); }
.mkk:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--shadow); }
.lvbar{ width:min(94vw,420px); display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.lvname{ font-family:var(--font-d); font-weight:700; font-size:17px; }
.cov{ font-size:11.5px; font-weight:800; color:var(--ink-soft); letter-spacing:.5px; }
.boardwrap{ position:relative; width:min(94vw,420px); }
.board{
  position:relative; width:100%; aspect-ratio:1;
  background:var(--card); border:3px solid var(--line); border-radius:18px;
  box-shadow:0 5px 0 var(--shadow); overflow:hidden; touch-action:none;
}
.gridlayer,.dotlayer{ position:absolute; inset:0; pointer-events:none; }
.pathlayer{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.gcell{ position:absolute; }
.gcell::before{ content:""; position:absolute; left:50%; top:50%; width:14%; height:14%; transform:translate(-50%,-50%); border-radius:50%; background:var(--line); opacity:.12; }
.dot{ position:absolute; border:3px solid var(--line); box-shadow:1.5px 2px 0 var(--shadow); z-index:4; display:flex; align-items:center; justify-content:center; }
.dot.sq{ border-radius:26% 32% 28% 34% / 30% 26% 34% 28%; }
.dot.ci{ border-radius:50%; }
.dot .st{ position:relative; z-index:2; color:#fff; font-size:13px; -webkit-text-stroke:1px var(--line); font-family:var(--font-d); font-weight:700; }
.dot.donept{ box-shadow:0 0 0 3px #fff, 0 0 10px 2px rgba(87,194,104,.6); }
@keyframes dotBounce{ 0%{transform:scale(1)} 32%{transform:scale(1.24)} 66%{transform:scale(.93)} 100%{transform:scale(1)} }
.dot.bounce{ animation:dotBounce .42s cubic-bezier(.34,1.7,.6,1); }
@keyframes starSpin{ to{ transform:rotate(360deg) } }
.dot.winspin .st{ display:inline-block; animation:starSpin .7s linear infinite; }
@keyframes dotWin{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.dot.winspin{ animation:dotWin .7s ease-in-out infinite; }
.toast{
  position:absolute; left:50%; bottom:12px; transform:translateX(-50%); z-index:8;
  background:var(--ink); color:#fff; font-family:var(--font-d); font-weight:600; font-size:13px;
  padding:7px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap;
}
.toast.show{ opacity:1; }
.ov{
  position:absolute; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
  background:rgba(243,234,214,.9); border-radius:15px; opacity:0; pointer-events:none; transition:opacity .2s;
}
.ov.show{ opacity:1; pointer-events:auto; }
.panel{ background:var(--card); border:3px solid var(--line); border-radius:18px; box-shadow:0 5px 0 var(--shadow); padding:22px 26px; text-align:center; max-width:88%; }
.panel h2{ font-family:var(--font-d); font-weight:700; font-size:24px; margin-bottom:8px; }
.panel p{ font-size:13px; font-weight:700; color:var(--ink-soft); line-height:1.5; }
.mk{
  font-family:var(--font-d); font-weight:600; cursor:pointer; color:var(--ink);
  background:#ffd15c; border:2.5px solid var(--line); border-radius:14px;
  box-shadow:0 3px 0 var(--shadow); height:46px; padding:0 28px; font-size:16px; margin-top:13px;
  transition:transform .08s, box-shadow .08s; touch-action:manipulation;
}
.mk:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.pkgrid{ display:flex; flex-wrap:wrap; gap:9px; justify-content:center; margin-top:10px; max-width:280px; }
#ovPick{ position:fixed; }
#ovPick .panel{ max-height:86vh; display:flex; flex-direction:column; }
#ovPick .pkgrid{ overflow-y:auto; overflow-x:hidden; padding:6px 4px; min-height:0; }
.pkbtn{
  width:52px; height:52px; border:3px solid var(--line); border-radius:14px; background:var(--card);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-family:var(--font-d); font-weight:700; font-size:17px; color:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1;
}
.pkbtn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--shadow); }
.pkbtn .pkd{ font-size:10px; color:#2f7d3a; font-weight:800; height:11px; }
.pkbtn.cur{ background:#ffd15c; }
.tip{ width:min(94vw,420px); text-align:center; font-size:11.5px; font-weight:700; color:var(--ink-soft); margin-top:10px; line-height:1.5; }
.tip b{ color:var(--ink); }
.cdots{ display:flex; gap:6px; justify-content:center; margin-top:14px; }
.cdots i{ width:8px; height:8px; border-radius:50%; background:rgba(44,39,51,.2); }
.cdots i.on{ background:var(--ink); }
.coachmix{ display:flex; gap:14px; justify-content:center; align-items:center; margin-bottom:10px; min-height:0; flex-wrap:wrap; }
.coachmix .mx{ display:flex; align-items:center; gap:3px; font-family:var(--font-d); font-weight:700; font-size:15px; color:var(--ink-soft); }
.coachmix .sw{ width:22px; height:22px; border:2.5px solid var(--line); box-shadow:1px 1.5px 0 var(--shadow); }
.coachmix .sw.sq{ border-radius:30%; } .coachmix .sw.ci{ border-radius:50%; }
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><a href="./" title="back to Huemeld"><h1>Huemeld</h1></a><span class="arc">FLOW</span></div>
    <div class="topbtns">
      <button class="mkk" id="btnPick">☰ levels</button>
      <button class="mkk" id="btnReset" title="Reset level">↻</button>
    </div>
  </div>
  <div class="lvbar">
    <button class="mkk" id="btnPrev">←</button>
    <div style="text-align:center"><div class="lvname" id="lvName">Level 1</div><div class="cov" id="cov">0/25 painted</div></div>
    <button class="mkk" id="btnNext">→</button>
  </div>
  <div class="boardwrap">
    <div class="board" id="board">
      <div class="gridlayer" id="gridlayer"></div>
      <canvas class="pathlayer" id="pathcanvas"></canvas>
      <div class="dotlayer" id="dotlayer"></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="ov" id="ovWin">
      <div class="panel">
        <h2>Solved! ✦</h2>
        <p id="winMsg">Every cell painted.</p>
        <button class="mk" id="btnWinNext">Next →</button>
      </div>
    </div>
    <div class="ov" id="ovPick">
      <div class="panel">
        <h2>Levels</h2>
        <button class="mk" id="btnHow" style="background:#bfe3ff;margin-top:4px">How to play</button>
        <div class="pkgrid" id="pkgrid"></div>
        <button class="mk" id="btnPickClose">Close</button>
      </div>
    </div>
    <div class="ov" id="ovCoach">
      <div class="panel">
        <div class="coachmix" id="coachMix"></div>
        <h2 id="coachTitle">How to play</h2>
        <p id="coachBody">…</p>
        <div class="cdots" id="coachDots"></div>
        <button class="mk" id="btnCoachNext">Next →</button>
      </div>
    </div>
  </div>
  <p class="tip">each paint must reach <b>two</b> blends — drag from the dot twice, or grab its line to <b>branch</b> · join two paints that <b>mix</b>, carry the blend to its <b>✦</b> · <b>paint every cell</b></p>

<script>
(function(){
"use strict";
var HEX={R:"#ef4a5a",Y:"#f6c445",B:"#3d8bdf",O:"#f2913d",G:"#57c268",P:"#9b62d6"};
var MIXMAP={RY:"O",BR:"P",BY:"G"};
function mixOf(a,b){ return MIXMAP[[a,b].sort().join("")]||null; }

/* iOS zoom guards */
document.addEventListener("gesturestart", function(e){ e.preventDefault(); });
document.addEventListener("gesturechange", function(e){ e.preventDefault(); });
document.addEventListener("touchmove", function(e){ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
var lastTE=0;
document.addEventListener("touchend", function(e){ var now=Date.now(); if(now-lastTE<300 && !e.target.closest("button")) e.preventDefault(); lastTE=now; }, {passive:false});

/* ---------- levels: ONE emitter each of R/Y/B, ONE receiver each of O/G/P.
   Every emitter splits into two lines (fork at the dot or branch mid-line; branches
   never rejoin). Machine-generated: each level has a verified full-coverage solution
   (16x 5x5, 26x 6x6, 8x 7x7), ordered easiest-first. TUTORIAL is a gentle 5x5. */
var TUTORIAL={ n:5, ems:[["R",2,3],["Y",3,3],["B",4,4]], tgts:[["O",2,1],["G",0,2],["P",0,1]] };
var LEVELS=[
  { n:5, ems:[["R",1,2],["Y",4,2],["B",0,2]], tgts:[["O",4,3],["G",1,1],["P",4,4]] },
  { n:5, ems:[["R",2,2],["Y",1,3],["B",4,2]], tgts:[["O",3,3],["G",0,0],["P",2,1]] },
  { n:5, ems:[["R",3,3],["Y",1,3],["B",3,0]], tgts:[["O",2,2],["G",1,4],["P",4,0]] },
  { n:5, ems:[["R",0,2],["Y",1,3],["B",4,0]], tgts:[["O",3,3],["G",3,1],["P",2,1]] },
  { n:5, ems:[["R",3,0],["Y",1,1],["B",1,4]], tgts:[["O",0,2],["G",3,2],["P",3,1]] },
  { n:5, ems:[["R",2,3],["Y",2,2],["B",4,1]], tgts:[["O",0,0],["G",1,1],["P",3,2]] },
  { n:5, ems:[["R",0,2],["Y",3,2],["B",1,0]], tgts:[["O",2,3],["G",1,2],["P",0,0]] },
  { n:5, ems:[["R",0,4],["Y",2,4],["B",4,1]], tgts:[["O",2,2],["G",3,1],["P",2,1]] },
  { n:5, ems:[["R",0,1],["Y",2,0],["B",1,3]], tgts:[["O",0,0],["G",2,2],["P",4,4]] },
  { n:5, ems:[["R",3,2],["Y",1,4],["B",4,0]], tgts:[["O",1,2],["G",1,3],["P",2,0]] },
  { n:5, ems:[["R",3,4],["Y",3,0],["B",1,4]], tgts:[["O",4,4],["G",1,0],["P",3,1]] },
  { n:5, ems:[["R",1,1],["Y",0,2],["B",4,4]], tgts:[["O",2,0],["G",0,4],["P",4,0]] },
  { n:5, ems:[["R",2,3],["Y",4,3],["B",0,0]], tgts:[["O",0,4],["G",4,0],["P",0,3]] },
  { n:5, ems:[["R",2,4],["Y",0,2],["B",3,0]], tgts:[["O",0,4],["G",2,3],["P",3,3]] },
  { n:5, ems:[["R",3,4],["Y",2,0],["B",0,2]], tgts:[["O",2,2],["G",1,0],["P",0,3]] },
  { n:5, ems:[["R",4,4],["Y",3,0],["B",0,0]], tgts:[["O",3,2],["G",2,2],["P",0,4]] },
  { n:6, ems:[["R",3,4],["Y",1,1],["B",4,3]], tgts:[["O",2,4],["G",4,1],["P",5,5]] },
  { n:6, ems:[["R",2,4],["Y",2,5],["B",3,1]], tgts:[["O",1,0],["G",5,0],["P",4,2]] },
  { n:6, ems:[["R",2,4],["Y",2,0],["B",5,5]], tgts:[["O",2,1],["G",0,2],["P",5,3]] },
  { n:6, ems:[["R",0,1],["Y",2,4],["B",4,2]], tgts:[["O",4,1],["G",4,4],["P",1,2]] },
  { n:6, ems:[["R",4,0],["Y",4,4],["B",1,0]], tgts:[["O",2,4],["G",2,5],["P",2,0]] },
  { n:6, ems:[["R",5,0],["Y",2,3],["B",1,1]], tgts:[["O",1,5],["G",4,1],["P",0,5]] },
  { n:6, ems:[["R",5,3],["Y",3,4],["B",3,1]], tgts:[["O",0,4],["G",0,0],["P",2,1]] },
  { n:6, ems:[["R",1,2],["Y",1,5],["B",4,5]], tgts:[["O",1,1],["G",4,3],["P",3,3]] },
  { n:6, ems:[["R",4,3],["Y",0,5],["B",2,1]], tgts:[["O",3,4],["G",1,4],["P",5,3]] },
  { n:6, ems:[["R",4,4],["Y",2,4],["B",1,5]], tgts:[["O",4,1],["G",1,0],["P",2,0]] },
  { n:6, ems:[["R",4,2],["Y",2,4],["B",0,2]], tgts:[["O",5,0],["G",2,1],["P",1,1]] },
  { n:6, ems:[["R",5,2],["Y",3,0],["B",1,4]], tgts:[["O",2,2],["G",0,5],["P",2,3]] },
  { n:6, ems:[["R",3,4],["Y",2,1],["B",5,1]], tgts:[["O",5,0],["G",3,3],["P",0,3]] },
  { n:6, ems:[["R",1,4],["Y",0,0],["B",2,3]], tgts:[["O",5,5],["G",3,1],["P",1,2]] },
  { n:6, ems:[["R",4,1],["Y",0,3],["B",4,3]], tgts:[["O",1,1],["G",1,2],["P",0,5]] },
  { n:6, ems:[["R",5,3],["Y",2,3],["B",3,0]], tgts:[["O",1,5],["G",0,0],["P",4,2]] },
  { n:6, ems:[["R",1,4],["Y",4,2],["B",0,4]], tgts:[["O",5,2],["G",1,1],["P",2,5]] },
  { n:6, ems:[["R",4,1],["Y",0,3],["B",3,4]], tgts:[["O",2,3],["G",5,5],["P",4,0]] },
  { n:6, ems:[["R",4,5],["Y",5,2],["B",2,1]], tgts:[["O",4,3],["G",4,2],["P",2,3]] },
  { n:6, ems:[["R",5,0],["Y",1,2],["B",2,2]], tgts:[["O",5,4],["G",4,4],["P",3,1]] },
  { n:6, ems:[["R",0,0],["Y",2,4],["B",4,0]], tgts:[["O",4,1],["G",4,3],["P",2,2]] },
  { n:6, ems:[["R",1,3],["Y",4,0],["B",2,4]], tgts:[["O",1,1],["G",0,5],["P",4,3]] },
  { n:6, ems:[["R",3,1],["Y",4,2],["B",1,5]], tgts:[["O",5,2],["G",2,2],["P",2,3]] },
  { n:6, ems:[["R",1,5],["Y",1,2],["B",4,3]], tgts:[["O",3,1],["G",5,0],["P",1,4]] },
  { n:6, ems:[["R",3,2],["Y",2,2],["B",1,4]], tgts:[["O",4,4],["G",0,1],["P",2,0]] },
  { n:6, ems:[["R",4,3],["Y",0,4],["B",2,3]], tgts:[["O",3,5],["G",0,0],["P",2,1]] },
  { n:7, ems:[["R",1,5],["Y",5,1],["B",2,0]], tgts:[["O",3,4],["G",3,5],["P",2,2]] },
  { n:7, ems:[["R",0,3],["Y",4,4],["B",5,1]], tgts:[["O",2,4],["G",4,3],["P",4,0]] },
  { n:7, ems:[["R",3,5],["Y",0,3],["B",2,3]], tgts:[["O",4,2],["G",1,3],["P",4,3]] },
  { n:7, ems:[["R",4,3],["Y",2,1],["B",1,5]], tgts:[["O",3,1],["G",4,5],["P",6,4]] },
  { n:7, ems:[["R",0,2],["Y",4,2],["B",6,4]], tgts:[["O",2,3],["G",4,4],["P",4,0]] },
  { n:7, ems:[["R",3,3],["Y",6,4],["B",0,6]], tgts:[["O",5,4],["G",6,2],["P",3,1]] },
  { n:7, ems:[["R",5,3],["Y",2,1],["B",3,5]], tgts:[["O",6,2],["G",3,3],["P",2,5]] },
  { n:7, ems:[["R",5,2],["Y",1,2],["B",4,5]], tgts:[["O",4,3],["G",0,4],["P",6,4]] }
];

var board=document.getElementById("board"), canvas=document.getElementById("pathcanvas"), ctx=canvas.getContext("2d"),
    shadowCanvas=document.createElement("canvas"), sctx=shadowCanvas.getContext("2d"),
    dotL=document.getElementById("dotlayer"),
    gridL=document.getElementById("gridlayer"), covEl=document.getElementById("cov"),
    lvNameEl=document.getElementById("lvName"), toastEl=document.getElementById("toast"),
    ovWin=document.getElementById("ovWin"), ovPick=document.getElementById("ovPick");

var li=Math.min(+(localStorage.getItem("hm_flow_i")||0), LEVELS.length-1);
var N=5, ems=[], tgts=[], junctions=[], drag=null, solved=false, toastTid=0;
var lastEmTap={e:-1, t:0};   // for double-tap-to-reset on emitters
var DBL_MS=340;
var isTut=false;

/* ---------- audio ---------- */
var actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } } if(actx&&actx.state==="suspended") actx.resume(); }
function beep(f,d,t,g){ if(!actx) return; try{ var o=actx.createOscillator(),v=actx.createGain(),n=actx.currentTime; o.type=t||"sine"; o.frequency.value=f; o.connect(v); v.connect(actx.destination); v.gain.setValueAtTime(0.0001,n); v.gain.linearRampToValueAtTime(g||0.05,n+0.01); v.gain.exponentialRampToValueAtTime(0.0001,n+d); o.start(n); o.stop(n+d+0.03); }catch(e){} }
function sfxJun(){ beep(430,0.08,"triangle",0.05); setTimeout(function(){ beep(650,0.1,"triangle",0.045); },60); }
function sfxDone(){ beep(520,0.09,"triangle",0.05); setTimeout(function(){ beep(780,0.12,"triangle",0.045); },70); }
function sfxWin(){ [0,110,220,400].forEach(function(t,i){ setTimeout(function(){ beep(440+i*140,0.15,"triangle",0.05); },t); }); }

/* ---------- level state ---------- */
function applyLevel(L){
  N=L.n; drag=null; solved=false; junctions=[]; lastEmTap={e:-1,t:0};
  blooms=[]; sweeps=[]; confetti=[]; drawSteps=0;
  ems=L.ems.map(function(s){ return {col:s[0], r:s[1], c:s[2], legs:[]}; });
  tgts=L.tgts.map(function(t){ return {sec:t[0], r:t[1], c:t[2], done:false}; });
  ovWin.classList.remove("show"); ovPick.classList.remove("show");
  buildGrid(); renderDots(); renderPaths();
}
function loadLevel(i){
  isTut=false;
  li=Math.max(0, Math.min(LEVELS.length-1, i));
  localStorage.setItem("hm_flow_i",""+li);
  lvNameEl.textContent="Level "+(li+1);
  applyLevel(LEVELS[li]);
}
function loadTutorial(withCoach){
  isTut=true;
  lvNameEl.textContent="Tutorial";
  applyLevel(TUTORIAL);
  if(withCoach!==false) showCoach(0);
}
function cs(){ return board.clientWidth/N; }
function same(a,b){ return a[0]===b[0] && a[1]===b[1]; }
function inb(r,c){ return r>=0 && c>=0 && r<N && c<N; }
function indexIn(list,r,c){ for(var i=0;i<list.length;i++) if(list[i][0]===r&&list[i][1]===c) return i; return -1; }
function tgtFor(sec){ for(var i=0;i<tgts.length;i++) if(tgts[i].sec===sec) return tgts[i]; return null; }

function buildGrid(){
  var h="", s=100/N;
  for(var r=0;r<N;r++) for(var c=0;c<N;c++)
    h+='<div class="gcell" style="left:'+(c*s)+'%;top:'+(r*s)+'%;width:'+s+'%;height:'+s+'%"></div>';
  gridL.innerHTML=h;
}
/* seeded per-cell wobble — stable within a level, different each level (echoes the tiles' random tilt) */

  //    looped, because removing a branch can orphan a branch-of-a-branch.
  ems.forEach(function(E){
    var changed=true;
    while(changed){ changed=false;
      for(var k=E.legs.length-1;k>=0;k--){

/* ---------- input ---------- */
function cellAt(x,y){

board.addEventListener("pointerdown", function(e){
  if(!e.isPrimary || solved) return; ensureAudio();

    var J=junctions[o.i]; J.leg=[J.cell.slice()];

    else if(E.legs.length===1 && E.legs[0].cells.length<=1){ E.legs[0]={cells:[[E.r,E.c]], jun:-1}; drag={t:"em", e:o.e, l:0}; }

board.addEventListener("pointermove", function(e){
  if(!drag || !e.isPrimary) return;

  step(cell);
});
board.addEventListener("pointerup", function(){ drag=null; });
board.addEventListener("pointercancel", function(){ drag=null; });
board.addEventListener("contextmenu", function(e){ e.preventDefault(); });
function legOf(d){ return d.t==="em" ? (ems[d.e].legs[d.l]&&ems[d.e].legs[d.l].cells) : (junctions[d.i]&&junctions[d.i].leg); }

function step(cell){
  var leg=legOf(drag); if(!leg){ drag=null; return; }
  var head=leg[leg.length-1];
  if(same(cell,head)) return;
  if(leg.length>1 && same(cell, leg[leg.length-2])){ leg.pop(); penTick(false); reconcileAndFixDrag(); renderPaths(); return; }
  if(Math.abs(cell[0]-head[0])+Math.abs(cell[1]-head[1])!==1) return;
  var o=occAt(cell[0],cell[1]);
  if(!o){ leg.push(cell); penTick(true); renderPaths(); return; }

  if(drag.t==="jun" && o.t==="em" && ems[o.e].legs[o.l] && ems[o.e].legs[o.l].jun===drag.i){
    // swiped back from the junction onto one of ITS feeder pipes -> separate the merge
    var jcell=junctions[drag.i].cell.slice();
    var fleg=ems[o.e].legs[o.l];

    if(fleg.cells.length>1 && same(fleg.cells[fleg.cells.length-1], jcell)) fleg.cells.pop();

    var isHead=(o.idx===oleg.cells.length-1);
    var sec=mixOf(me.col, other.col);
    var myLeg=me.legs[drag.l];
    if(isHead && sec && myLeg.jun<0 && oleg.jun<0 && tgtFor(sec) && !tgtFor(sec).done){

/* ---------- coverage & win ---------- */
function coverage(){

  ems.forEach(function(E){ set[E.r+","+E.c]=1; E.legs.forEach(function(Lg){ Lg.cells.forEach(function(c){ set[c[0]+","+c[1]]=1; }); }); });

/* ---------- render: marker-style SVG pipes with blend gradients ---------- */

  var s=cs(), h="";
  function dot(col,r,c,shape,star){
    var sz=s*0.84, off=(s-sz)/2;
    return '<div class="dot '+shape+'" data-dr="'+r+'" data-dc="'+c+'" style="left:'+(c*s+off)+'px;top:'+(r*s+off)+'px;width:'+sz+'px;height:'+sz+'px;background:'+HEX[col]+'">'+(star?'<span class="st">✦</span>':'')+'</div>';

/* ---------- juice: living paint, junction blooms, delivery sweeps, win cascade, shimmer ---------- */
function nowMs(){ return (window.performance&&performance.now)?performance.now():Date.now(); }

  var legList=[]; ems.forEach(function(E){ E.legs.forEach(function(Lg){ if(Lg.cells.length>1) legList.push(Lg.cells); }); }); junctions.forEach(function(J){ if(J.leg.length>1) legList.push(J.leg); });

/* pipes are drawn on a canvas as metaball chains: at each cell a CIRCLE whose diameter is the pipe

   glosses travel the pipes; a junction blooms on merge; delivery pulses; the win sweeps the whole

  });

    if(age<0.4){ ctx.globalAlpha=(0.4-age)/0.4*0.6; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(pt[0],pt[1],pipeW*0.55*(1-age),0,6.2832); ctx.fill(); } ctx.restore(); });
  // 6 — coverage shimmer: all blends delivered but board not full -> unpainted cells breathe
  if(!solved && tgts.length && tgts.every(function(t){ return t.done; })){
    var ps=paintedSet(), pulse=0.5+0.5*Math.sin(animT/330);
    ctx.save(); ctx.fillStyle="#b7a883";
    for(var rr=0;rr<N;rr++) for(var cc2=0;cc2<N;cc2++){ if(ps[rr+","+cc2]) continue; ctx.globalAlpha=0.10+0.18*pulse; ctx.beginPath(); ctx.arc(cc2*s+s/2, rr*s+s/2, s*0.12*(0.85+0.35*pulse),0,6.2832); ctx.fill(); }
    ctx.restore();
  }
  // 7 — win confetti (marker chips, on top of everything)
  confetti=confetti.filter(function(p){ return nowMs()-p.t0<p.life; });
  if(confetti.length){ ctx.save(); ctx.lineWidth=2; confetti.forEach(function(p){ var t=(nowMs()-p.t0)/1000, x=p.x+p.vx*t, y=p.y+p.vy*t+240*t*t, rot=p.rot+p.vr*t, a=1-(nowMs()-p.t0)/p.life;
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=p.color; ctx.strokeStyle="#2c2733"; roundRect(ctx,-p.sz/2,-p.sz/2,p.sz,p.sz,p.sz*0.3); ctx.fill(); ctx.stroke(); ctx.restore(); }); ctx.restore(); }
  covEl.textContent=coverage()+"/"+(N*N)+" painted";
  var dots=dotL.querySelectorAll(".dot");
  tgts.forEach(function(T2){ dots.forEach(function(d){ if(+d.dataset.dr===T2.r && +d.dataset.dc===T2.c) d.classList.toggle("donept", T2.done); }); });
}
window.addEventListener("resize", function(){ renderDots(); renderPaths(); });
/* continuous render loop drives the living-paint gloss, blooms, sweeps, shimmer and confetti */
function frame(){ animT=nowMs()-animStart; renderPaths(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

/* ---------- level picker & controls ---------- */
function renderPicker(){
  var done=JSON.parse(localStorage.getItem("hm_flow_done")||"{}"), h="";
  for(var i=0;i<LEVELS.length;i++)
    h+='<button class="pkbtn'+(i===li?" cur":"")+'" data-i="'+i+'"><span>'+(i+1)+'</span><span class="pkd">'+(done[i]?"✓":"")+'</span></button>';
  document.getElementById("pkgrid").innerHTML=h;
}
document.getElementById("btnPick").addEventListener("click", function(){ ensureAudio(); renderPicker(); ovPick.classList.add("show"); });
document.getElementById("btnPickClose").addEventListener("click", function(){ ovPick.classList.remove("show"); });
document.getElementById("pkgrid").addEventListener("click", function(e){
  var b=e.target.closest(".pkbtn"); if(!b) return;
  ensureAudio(); loadLevel(+b.dataset.i);
});
document.getElementById("btnPrev").addEventListener("click", function(){ ensureAudio(); loadLevel(isTut?0:li-1); });
document.getElementById("btnNext").addEventListener("click", function(){ ensureAudio(); loadLevel(isTut?0:li+1); });
document.getElementById("btnReset").addEventListener("click", function(){ ensureAudio(); if(isTut) loadTutorial(false); else loadLevel(li); });
document.getElementById("btnWinNext").addEventListener("click", function(){ ensureAudio(); if(isTut) loadLevel(0); else loadLevel(li+1); });

/* ---------- tutorial coach (Huemeld-style walkthrough) ---------- */
var COACH=[
  { mix:false, t:"Paint flows", b:"Drag out from a coloured square — it's a paint source. Trace a pipe across the grid." },
  { mix:true,  t:"Two paints mix", b:"Lead one paint into a different one. Where they meet, they bloom into a blend:" },
  { mix:false, t:"Reach the ✦", b:"Carry that blend along to the matching ✦ target circle to lock it in." },
  { mix:false, t:"Each source feeds two", b:"Every square must reach TWO blends — fork a second line from its dot, or branch off its own pipe. Double-tap a source to reset it." },
  { mix:false, t:"Fill every cell", b:"Deliver all three blends AND paint every cell to win. Give it a go!" }
];
var coachStep=0, ovCoach=document.getElementById("ovCoach");
function coachMixHTML(){
  function sw(col,sh){ return '<span class="sw '+sh+'" style="background:'+HEX[col]+'"></span>'; }
  return '<div class="mx">'+sw("R","sq")+"+"+sw("Y","sq")+"="+sw("O","ci")+'</div>'
       + '<div class="mx">'+sw("Y","sq")+"+"+sw("B","sq")+"="+sw("G","ci")+'</div>'
       + '<div class="mx">'+sw("B","sq")+"+"+sw("R","sq")+"="+sw("P","ci")+'</div>';
}
function showCoach(i){
  coachStep=i; var s=COACH[i], mixEl=document.getElementById("coachMix");
  mixEl.innerHTML = s.mix ? coachMixHTML() : ""; mixEl.style.display = s.mix ? "flex" : "none";
  document.getElementById("coachTitle").textContent=s.t;
  document.getElementById("coachBody").textContent=s.b;
  var d=""; for(var k=0;k<COACH.length;k++) d+='<i class="'+(k===i?"on":"")+'"></i>';
  document.getElementById("coachDots").innerHTML=d;
  document.getElementById("btnCoachNext").textContent=(i===COACH.length-1)?"Play! ✦":"Next →";
  ovCoach.classList.add("show");
}
document.getElementById("btnCoachNext").addEventListener("click", function(){
  ensureAudio();
  if(coachStep<COACH.length-1) showCoach(coachStep+1);
  else ovCoach.classList.remove("show");
});
document.getElementById("btnHow").addEventListener("click", function(){ ensureAudio(); ovPick.classList.remove("show"); loadTutorial(true); });

if(!localStorage.getItem("hm_flow_seen")){ localStorage.setItem("hm_flow_seen","1"); loadTutorial(true); }
else loadLevel(li);

/* debug hooks for automated testing */
window.__flow={
  load:loadLevel,
  tut:loadTutorial,
  count:LEVELS.length,
  state:function(){ return { li:li, n:N, solved:solved, coverage:coverage(),
    tgts:tgts.map(function(t){ return {sec:t.sec, done:t.done}; }),
    junctions:junctions.map(function(j){ return {sec:j.sec, cell:j.cell, legLen:j.leg.length}; }),
    ems:ems.map(function(E){ return {col:E.col, legs:E.legs.map(function(l){ return {len:l.cells.length, jun:l.jun, root:l.cells[0]}; })}; }) }; },
  cellCenter:function(r,c){ var rect=board.getBoundingClientRect(), s=cs(); return {x:rect.left+c*s+s/2, y:rect.top+r*s+s/2}; },
  winFx:function(){ playWinCascade(); },
  fx:function(){ return {blooms:blooms.length, sweeps:sweeps.length, confetti:confetti.length}; },
  render:function(){ renderPaths(); }
};
})();
</script>
