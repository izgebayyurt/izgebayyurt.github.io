<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f3ead6" />
<title>Huemeld · İzge Bayyurt</title>
<meta name="description" content="Meld primary paints into a suspended combo, then detonate it. A hand-drawn colour puzzle." />
<meta property="og:title" content="Huemeld" />
<meta property="og:description" content="Meld primary paints into a suspended combo, then detonate it. A hand-drawn colour puzzle." />
<meta property="og:type" content="website" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f3ead6'/%3E%3Crect x='4' y='4' width='11' height='11' rx='3' fill='%23ef4a5a' stroke='%232c2733' stroke-width='2'/%3E%3Crect x='17' y='6' width='10' height='10' rx='3' fill='%233d8bdf' stroke='%232c2733' stroke-width='2'/%3E%3Ccircle cx='16' cy='23' r='6' fill='%2357c268' stroke='%232c2733' stroke-width='2'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472; --line:#2c2733;
  --shadow:rgba(44,39,51,.9);
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --pop:cubic-bezier(.34,1.7,.6,1); --calm:cubic-bezier(.4,0,.2,1);
  --ripen:900ms;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
body{
  min-height:100dvh; color:var(--ink); font-family:var(--font-u);
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; align-items:center;
  padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 16px);
}
.app{ width:100%; max-width:470px; }
::selection{ background:rgba(155,98,214,.25); }
h1,h2,h3{ font-family:var(--font-d); font-weight:700; margin:0; letter-spacing:.2px; }

.mk{
  font-family:var(--font-d); font-weight:600; cursor:pointer; color:var(--ink);
  background:var(--card); border:2.5px solid var(--line); border-radius:14px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm);
  touch-action:manipulation;
}
.mk:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.mk.big{ height:54px; font-size:19px; border-radius:16px; padding:0 22px; }
.mk.accent{ background:#ffd15c; }
.icobtn{ width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; padding:0; }

/* ---------- level select ---------- */
#screen-levels .top{ display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:4px; }
.logo{ position:relative; width:44px; height:40px; flex:none; }
.logo i{ position:absolute; width:18px; height:18px; border:2.5px solid var(--line); box-shadow:0 2px 0 var(--shadow); }
.logo i:nth-child(1){ left:0; top:3px; background:#ef4a5a; border-radius:40% 55% 50% 48%; transform:rotate(-6deg); }
.logo i:nth-child(2){ right:0; top:0; background:#3d8bdf; border-radius:52% 45% 50% 55%; transform:rotate(5deg); }
.logo i:nth-child(3){ left:13px; bottom:0; background:#57c268; border-radius:50%; }
h1{ font-size:30px; line-height:1; }
.tagline{ font-family:var(--font-u); font-weight:700; color:var(--ink-soft); font-size:12.5px; margin-top:3px; }
.progress{ font-family:var(--font-d); font-weight:600; font-size:14px; color:var(--ink); background:var(--paper2); border:2.5px solid var(--line); border-radius:999px; padding:5px 13px; box-shadow:0 3px 0 var(--shadow); white-space:nowrap; }
.grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:13px; margin-top:16px; }
.lvl-card{ text-align:left; padding:13px 14px; display:flex; flex-direction:column; gap:6px; min-height:104px; position:relative; }
.lvl-card .num{ font-family:var(--font-d); font-weight:700; font-size:15px; width:30px; height:30px; border:2.5px solid var(--line); border-radius:9px; display:flex; align-items:center; justify-content:center; background:#ffd15c; box-shadow:0 2px 0 var(--shadow); }
.lgoals{ display:flex; gap:5px; margin-top:auto; }
.lgoals .sw{ width:17px; height:17px; border:2px solid var(--line); border-radius:5px; }
.lgoals .sw.r{ border-radius:50%; }
.lmeta{ font-family:var(--font-u); font-weight:700; font-size:12px; color:var(--ink-soft); }
.lmeta .st{ font-size:14px; letter-spacing:1px; color:#f0a92c; }
.lmeta .st.dim{ color:rgba(44,39,51,.22); }
.lvl-card.lock{ background:#e9e0cb; box-shadow:0 3px 0 rgba(44,39,51,.4); cursor:default; }
.lvl-card.lock .num{ background:#d8cdb4; color:var(--ink-soft); }
.lvl-card.lock:active{ transform:none; box-shadow:0 3px 0 rgba(44,39,51,.4); }
.credit{ text-align:center; margin-top:16px; font-size:12px; }
.credit a{ color:var(--ink-soft); text-decoration:none; border-bottom:1.5px solid rgba(44,39,51,.3); }

/* ---------- game ---------- */
#screen-game{ display:none; }
.gtop{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.gtitle{ flex:1; min-width:0; }
.gtitle h2{ font-size:19px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gtitle .sub{ font-family:var(--font-u); font-weight:700; font-size:11.5px; color:var(--ink-soft); }
.moves{ display:flex; flex-direction:column; align-items:center; justify-content:center; width:60px; height:52px; border:2.5px solid var(--line); border-radius:14px; background:#ffd15c; box-shadow:0 3px 0 var(--shadow); flex:none; }
.moves b{ font-family:var(--font-d); font-weight:700; font-size:23px; line-height:1; }
.moves span{ font-family:var(--font-u); font-weight:800; font-size:8.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink); opacity:.7; }
.goals{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.goal{ display:flex; align-items:center; gap:7px; background:var(--paper2); border:2.5px solid var(--line); border-radius:12px; padding:5px 11px 5px 8px; box-shadow:0 3px 0 var(--shadow); }
.goal .swatch{ width:21px; height:21px; border:2px solid var(--line); border-radius:6px; }
.goal .swatch.round{ border-radius:50%; }
.goal b{ font-family:var(--font-d); font-weight:600; font-size:16px; min-width:14px; text-align:center; }
.goal.done{ background:#d7f0d0; }
.goal.done b{ color:#2f7d3a; }

/* powerup bars (charged by chaining primaries; the payoff layer comes later) */
.pups{ display:flex; gap:8px; margin-bottom:12px; }
.pup{ flex:1; display:flex; align-items:center; gap:6px; }
.pup .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--line); flex:none; }
.pup .track{ flex:1; height:10px; border:2px solid var(--line); border-radius:999px; background:#fff; overflow:hidden; box-shadow:0 2px 0 var(--shadow); }
.pup .fill{ height:100%; width:0; border-radius:999px; transition:width .28s var(--pop); }
.pup.ready{ animation:hmReady .9s ease-in-out infinite; }
.pup.ready .track{ border-color:#f0a92c; }

.stage{ position:relative; }
.board{
  display:grid; grid-template-columns:repeat(var(--cols,7),1fr); gap:2px;
  padding:12px; border-radius:20px; background:var(--paper2);
  border:3px solid var(--line); box-shadow:0 5px 0 var(--shadow);
  touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  transition:box-shadow .18s var(--calm);
}
.board.suspended{ box-shadow:0 5px 0 var(--shadow), 0 0 0 3px #ffd15c, 0 0 24px 5px rgba(255,209,92,.55); }
.cell{ position:relative; aspect-ratio:1; }
.tile{
  position:absolute; inset:7%;
  background:var(--pc); border:3px solid var(--line);
  border-radius:22% 28% 24% 30% / 26% 22% 30% 24%;
  box-shadow:1.5px 2px 0 rgba(44,39,51,.28);
  transform:rotate(var(--rot,0deg));
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; will-change:transform, filter;
}
.tile.sec{ border-radius:50%; }
.tile .streak{ position:absolute; top:15%; left:17%; width:32%; height:20%; border-radius:50%; background:rgba(255,255,255,.4); pointer-events:none; }
.tile .sym{ position:relative; z-index:2; font-family:var(--font-d); font-weight:700; font-size:clamp(11px,3.2vw,16px); color:#fff; -webkit-text-stroke:.8px var(--line); }
.tile.dim{ filter:saturate(.2) brightness(1.08) opacity(.45); }
.tile.incombo{ box-shadow:0 0 0 3px #fff, 0 0 0 6px var(--ink), 0 0 15px 3px rgba(255,255,255,.65); z-index:4; animation:hmBob .7s ease-in-out infinite; }
.tile.press{ box-shadow:0 0 0 3px #fff, 0 0 0 6px var(--ink), 1.5px 2px 0 rgba(44,39,51,.28); z-index:5; }
.tile.clr{ animation:hmPop .26s var(--calm) forwards; z-index:2; }
.tile.new{ animation:hmDrop .22s var(--pop); }
.tile.mixed{ animation:hmMix .28s var(--pop); z-index:4; }
.tile.squish{ animation:hmSquish .3s var(--pop); }

.combo-meter{ position:absolute; left:14px; right:14px; top:-3px; height:7px; border:2px solid var(--line); border-radius:999px; background:#fff; overflow:hidden; opacity:0; transition:opacity .15s; z-index:8; box-shadow:0 2px 0 var(--shadow); }
.combo-meter.show{ opacity:1; }
.combo-meter .fill{ height:100%; width:0; background:#ffd15c; }
.combo-meter.run .fill{ width:100%; transition:width var(--ripen) linear; }

.toast{
  position:absolute; left:50%; top:12px; transform:translateX(-50%);
  font-family:var(--font-d); font-weight:600; font-size:15px; white-space:nowrap;
  background:#ffd15c; border:2.5px solid var(--line); border-radius:999px; padding:6px 15px;
  box-shadow:0 3px 0 var(--shadow); opacity:0; pointer-events:none; z-index:9;
}
.over{ position:absolute; inset:0; z-index:10; display:none; align-items:center; justify-content:center; padding:18px; background:rgba(240,230,207,.72); border-radius:20px; }
.over.show{ display:flex; }
.panel{ width:100%; max-width:300px; text-align:center; padding:22px 22px 20px; background:var(--card); border:3px solid var(--line); border-radius:22px; box-shadow:0 6px 0 var(--shadow); }
.panel h2{ font-size:27px; }
.panel p{ font-family:var(--font-u); font-weight:700; color:var(--ink-soft); font-size:13.5px; margin:6px 0 14px; }
.stars{ font-size:34px; letter-spacing:4px; color:#f0a92c; margin:2px 0 6px; }
.stars .dim{ color:rgba(44,39,51,.18); }
.panel .row{ display:flex; gap:9px; margin-top:12px; }
.panel .row .mk{ flex:1; height:46px; font-size:15px; border-radius:13px; }

.ghint{ text-align:center; font-size:12px; color:var(--ink-soft); margin:11px 2px 0; line-height:1.4; }
.ghint b{ font-weight:700; color:var(--ink); }

@keyframes hmPop{ 0%{transform:rotate(var(--rot,0deg)) scale(1)} 42%{transform:rotate(var(--rot,0deg)) scale(1.18)} 100%{transform:rotate(var(--rot,0deg)) scale(.05); opacity:0} }
@keyframes hmDrop{ from{transform:translateY(-15px) rotate(var(--rot,0deg)); opacity:.2} to{transform:translateY(0) rotate(var(--rot,0deg)); opacity:1} }
@keyframes hmMix{ 0%{transform:rotate(var(--rot,0deg)) scale(1)} 45%{transform:rotate(0deg) scale(1.28)} 100%{transform:rotate(var(--rot,0deg)) scale(1)} }
@keyframes hmBob{ 0%,100%{transform:rotate(var(--rot,0deg)) scale(1.02)} 50%{transform:rotate(var(--rot,0deg)) scale(1.1)} }
@keyframes hmSquish{ 0%{transform:rotate(var(--rot,0deg)) scale(1)} 40%{transform:rotate(var(--rot,0deg)) scaleX(1.25) scaleY(.72)} 100%{transform:rotate(var(--rot,0deg)) scale(1)} }
@keyframes hmReady{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
@keyframes hmToast{ 0%{transform:translateX(-50%) translateY(6px) scale(.85); opacity:0} 18%{transform:translateX(-50%) translateY(0) scale(1); opacity:1} 76%{opacity:1} 100%{transform:translateX(-50%) translateY(-12px); opacity:0} }
@media (prefers-reduced-motion:reduce){ *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; } .tile.incombo{ animation:none; } }
</style>
</head>
<body>
<div class="app">

  <section id="screen-levels">
    <div class="top">
      <div style="display:flex; align-items:center; gap:11px;">
        <div class="logo" aria-hidden="true"><i></i><i></i><i></i></div>
        <div>
          <h1>Huemeld</h1>
          <div class="tagline">Meld paints · build a combo · detonate</div>
        </div>
      </div>
      <div class="progress" id="progress">0 / 0</div>
    </div>
    <div class="grid" id="levelGrid"></div>
    <div class="credit"><a href="/" title="İzge Bayyurt">İzge Bayyurt ↗</a></div>
  </section>

  <section id="screen-game">
    <div class="gtop">
      <button class="mk icobtn" id="btnBack" title="Levels" aria-label="Back to levels">←</button>
      <div class="gtitle">
        <h2 id="gName">Level</h2>
        <div class="sub" id="gSub">Clear the goals</div>
      </div>
      <button class="mk icobtn" id="btnAid" title="Colour aid" aria-label="Colour aid" aria-pressed="false">◐</button>
      <button class="mk icobtn" id="btnSound" title="Sound" aria-label="Sound" aria-pressed="true">♪</button>
      <button class="mk icobtn" id="btnRestart" title="Restart" aria-label="Restart level">↻</button>
      <div class="moves"><b id="movesN">0</b><span>moves</span></div>
    </div>
    <div class="goals" id="goals"></div>
    <div class="pups" id="pups"></div>
    <div class="stage">
      <div class="board" id="board"></div>
      <div class="combo-meter" id="meter"><div class="fill"></div></div>
      <div class="toast" id="toast"></div>
      <div class="over" id="over">
        <div class="panel">
          <h2 id="overTitle">Cleared!</h2>
          <div class="stars" id="overStars"></div>
          <p id="overMsg"></p>
          <div class="row" id="overRow"></div>
        </div>
      </div>
    </div>
    <p class="ghint">Drag one paint onto a <b>different</b> one to meld · keep melding the same colour to grow a combo · lift and it <b>detonates</b></p>
  </section>

</div>

<script src="engine.js"></script>
<script src="levels.js"></script>
<script>
(function(){
  "use strict";
  var HM=window.HM, LEVELS=window.HUEMELD_LEVELS||[];
  var HEX=HM.HEX, NAME=HM.NAME;
  var PRIMS=["R","Y","B"];
  var ING={ O:["R","Y"], G:["Y","B"], P:["R","B"] };   // a merge session's live ingredient primaries
  var RIPEN_MS=900;

  var state=null, curLevel=null, curIndex=0, busy=false;
  var aid=false, muted=false;
  var cells=[];          // persistent DOM: cells[r][c] = {cell, tile} (built once per level)
  var geom=null;         // cached cell centres for index-math hit-testing (per gesture)
  var sess=null;         // engine combo session, persists across gestures until it ripens
  var gest=null;         // the current finger drag
  var resolveTid=0;

  var board=document.getElementById("board");
  var goalsEl=document.getElementById("goals");
  var pupsEl=document.getElementById("pups");
  var meterEl=document.getElementById("meter");
  var movesN=document.getElementById("movesN");
  var toastEl=document.getElementById("toast");
  var over=document.getElementById("over");
  var screenLevels=document.getElementById("screen-levels");
  var screenGame=document.getElementById("screen-game");

  function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function loadProg(){ try{ return JSON.parse(lsGet("hm_prog")||"{}"); }catch(e){ return {}; } }
  function saveProg(p){ lsSet("hm_prog", JSON.stringify(p)); }
  function unlocked(i){ if(i===0) return true; var p=loadProg(); var prev=LEVELS[i-1]; return !!(prev && p[prev.id] && p[prev.id].done); }
  function starsFor(level, movesLeft){ var r=movesLeft/level.moves; return r>=0.5?3:(r>=0.2?2:1); }
  function starStr(n){ return '<span>'+"★★★".slice(0,n)+'</span><span class="dim">'+"☆☆☆".slice(0,3-n)+'</span>'; }

  /* ---------- audio ---------- */
  var actx=null;
  function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } } if(actx&&actx.state==="suspended") actx.resume(); }
  function beep(f,d,t,g){ if(muted||!actx) return; try{ var o=actx.createOscillator(),v=actx.createGain(),n=actx.currentTime; o.type=t||"sine"; o.frequency.value=f; o.connect(v); v.connect(actx.destination); v.gain.setValueAtTime(0.0001,n); v.gain.linearRampToValueAtTime(g||0.05,n+0.01); v.gain.exponentialRampToValueAtTime(0.0001,n+d); o.start(n); o.stop(n+d+0.03); }catch(e){} }
  function sfxMix(n){ var b=430+Math.min(n||0,12)*30; beep(b,0.07,"triangle",0.05); setTimeout(function(){ beep(b*1.5,0.09,"triangle",0.04); },55); }
  function sfxEat(n){ beep(520+Math.min(n,14)*24, 0.06, "sine", 0.045); }
  function sfxPop(n){ var b=340+Math.min(n,12)*16; beep(b,0.13,"sine",0.06); beep(b*1.5,0.15,"sine",0.03); }
  function sfxWin(){ [0,120,240,420].forEach(function(t,i){ setTimeout(function(){ beep(440+i*140,0.16,"triangle",0.05); },t); }); }

  /* ---------- persistent-DOM board ----------
     Built ONCE per level; every later change mutates existing nodes (class/
     style), never innerHTML. This is the fix for the v2 fast-drag bug: the
     node under the finger is never destroyed mid-gesture. */
  function tileRot(r,c){ return ((r*7+c*13)%5)-2; }
  function buildBoard(){
    board.style.setProperty("--cols", state.W);
    board.classList.remove("suspended");
    var html="";
    for(var r=0;r<state.H;r++) for(var c=0;c<state.W;c++){
      if(!state.mask[r][c]){ html+='<div class="cell wall"></div>'; continue; }
      html+='<div class="cell" data-r="'+r+'" data-c="'+c+'"><div class="tile" style="--rot:'+tileRot(r,c)+'deg"><span class="streak"></span><span class="sym"></span></div></div>';
    }
    board.innerHTML=html;   // the ONLY innerHTML write; never called mid-session
    cells=[];
    for(var r2=0;r2<state.H;r2++){ cells[r2]=[]; for(var c2=0;c2<state.W;c2++){
      var cell=board.querySelector('.cell[data-r="'+r2+'"][data-c="'+c2+'"]');
      cells[r2][c2]=cell?{cell:cell, tile:cell.querySelector(".tile")}:null;
    }}
    paintAll();
  }
  function paintTile(r,c){
    var ref=cells[r]&&cells[r][c]; if(!ref) return;
    var t=ref.tile, v=state.grid[r][c];
    t.className="tile";   // reset transient state (dim/incombo/clr/mixed/press...)
    if(!v){ t.style.visibility="hidden"; return; }
    t.style.visibility="";
    t.style.setProperty("--pc", HEX[v]);
    if(!HM.isPrim(v)) t.classList.add("sec");
    t.querySelector(".sym").textContent = aid ? v : "";
    ref.col=v;
  }
  function paintAll(){ for(var r=0;r<state.H;r++) for(var c=0;c<state.W;c++) if(cells[r]&&cells[r][c]) paintTile(r,c); }
  function setAnim(t, cls, ms){ if(!t) return; t.classList.remove(cls); void t.offsetWidth; t.classList.add(cls); setTimeout(function(){ t.classList.remove(cls); }, ms); }

  function renderGoals(){
    var h="";
    for(var i=0;i<state.obj.length;i++){ var o=state.obj[i];
      h+='<div class="goal"><span class="swatch'+(HM.isPrim(o.color)?"":" round")+'" style="background:'+HEX[o.color]+'"></span><b>'+o.need+'</b></div>';
    }
    goalsEl.innerHTML=h;
  }
  function updateGoals(){
    var chips=goalsEl.children;
    for(var i=0;i<state.obj.length;i++){ var o=state.obj[i], rem=Math.max(0,o.need-o.have), chip=chips[i];
      chip.querySelector("b").textContent = rem>0 ? rem : "✓"; chip.classList.toggle("done", rem===0);
    }
  }
  function renderBars(){
    var h="";
    for(var i=0;i<PRIMS.length;i++){ var c=PRIMS[i];
      h+='<div class="pup" data-c="'+c+'"><span class="dot" style="background:'+HEX[c]+'"></span><span class="track"><span class="fill" style="background:'+HEX[c]+'"></span></span></div>';
    }
    pupsEl.innerHTML=h;
  }
  function updateBars(){
    var kids=pupsEl.children;
    for(var i=0;i<PRIMS.length;i++){ var c=PRIMS[i], pct=Math.min(1, state.bars[c]/state.barMax);
      kids[i].querySelector(".fill").style.width=(pct*100)+"%";
      kids[i].classList.toggle("ready", state.bars[c]>=state.barMax);
    }
  }
  function updateMoves(){ movesN.textContent=Math.max(0,state.movesLeft); }
  function toast(t){ toastEl.textContent=t; toastEl.style.animation="none"; void toastEl.offsetWidth; toastEl.style.animation="hmToast 1.2s var(--pop) forwards"; }

  /* ---------- hit-testing: index math from cached geometry (no elementFromPoint,
     no per-move getBoundingClientRect). Geometry is cached once per gesture at
     pointerdown — the board never relayouts during a suspended session. */
  function cacheGeom(){
    geom=[];
    for(var r=0;r<state.H;r++) for(var c=0;c<state.W;c++){ var ref=cells[r]&&cells[r][c]; if(!ref) continue;
      var cr=ref.cell.getBoundingClientRect();
      geom.push({ r:r, c:c, cx:cr.left+cr.width/2, cy:cr.top+cr.height/2, s:cr.width });
    }
  }
  function cellAt(x,y){
    if(!geom) return null;
    var best=null, bd=1e9;
    for(var i=0;i<geom.length;i++){ var g=geom[i], dx=x-g.cx, dy=y-g.cy, d=dx*dx+dy*dy;
      if(d<bd && Math.abs(dx)<g.s*0.62 && Math.abs(dy)<g.s*0.62){ bd=d; best=g; }
    }
    return best?{r:best.r,c:best.c}:null;
  }

  /* ---------- combo session ---------- */
  function liveSet(){
    if(!sess||sess.color==null) return null;
    if(sess.hadMerge){ var s={}; s[sess.color]=1; (ING[sess.color]||[]).forEach(function(p){ s[p]=1; }); return s; }
    var o={}; o[sess.color]=1; return o;   // chain: only its own colour
  }
  function applyDim(){
    var live=liveSet();
    for(var r=0;r<state.H;r++) for(var c=0;c<state.W;c++){ var ref=cells[r]&&cells[r][c]; if(!ref) continue;
      var v=state.grid[r][c], dim = live && v && !live[v] && !sess.collected[r+","+c];
      ref.tile.classList.toggle("dim", !!dim);
    }
    board.classList.toggle("suspended", !!live);
  }
  function clearDim(){
    for(var r=0;r<state.H;r++) for(var c=0;c<state.W;c++){ var ref=cells[r]&&cells[r][c]; if(ref){ ref.tile.classList.remove("dim","incombo"); } }
    board.classList.remove("suspended");
  }
  function markCollected(r,c){ var ref=cells[r]&&cells[r][c]; if(ref) ref.tile.classList.add("incombo"); }
  function setPress(p,on){ var ref=p&&cells[p.r]&&cells[p.r][p.c]; if(ref) ref.tile.classList.toggle("press", on); }

  function landMove(){ if(!gest.counted){ gest.counted=true; sess.moves++; state.movesLeft--; updateMoves(); } }

  function doMerge(from,to){
    HM.sessionMerge(state, sess, from, to);
    gest.carry=sess.color;
    landMove();
    paintTile(from.r,from.c);            // source is now a hole
    paintTile(to.r,to.c);                // destination is now the blend
    setAnim(cells[to.r][to.c].tile, "mixed", 300);
    applyDim(); markCollected(to.r,to.c);
    gest.anchor=to; sfxMix(sess.count);
  }
  function doCollect(from,to,firstAnchor){
    if(firstAnchor) HM.sessionCollect(state, sess, from.r, from.c);
    HM.sessionCollect(state, sess, to.r, to.c);
    gest.carry=sess.color;
    landMove();
    applyDim();
    if(firstAnchor) markCollected(from.r,from.c);
    markCollected(to.r,to.c);
    setAnim(cells[to.r][to.c].tile, "mixed", 280);
    gest.anchor=to; sfxEat(sess.count);
  }

  function tryStep(from,to){
    var B=state.grid[to.r][to.c];
    if(!B){ gest.anchor=to; return; }                 // over a hole: reposition, no action
    var lock=sess.color, carry=gest.carry;
    // MERGE: carrying a primary, target a different primary, blend matches the lock (or lock unset)
    if(HM.isPrim(carry) && HM.isPrim(B) && B!==carry){
      var blend=HM.mix(carry,B);
      if(lock==null || (sess.hadMerge && blend===lock)){ doMerge(from,to); return; }
      return;   // inert: would make a different colour
    }
    // CHAIN / SWEEP: target is the carried colour
    if(B===carry && (lock==null || B===lock)){ doCollect(from,to, lock==null); return; }
    // else inert (session continues)
  }

  function stopMeter(){ if(resolveTid){ clearTimeout(resolveTid); resolveTid=0; } meterEl.classList.remove("run","show"); }
  function armMeter(){
    if(resolveTid) clearTimeout(resolveTid);
    meterEl.classList.add("show");
    meterEl.classList.remove("run"); void meterEl.offsetWidth; meterEl.classList.add("run");
    resolveTid=setTimeout(resolveNow, RIPEN_MS);
  }

  async function resolveNow(){
    if(!sess||busy) return;
    busy=true; stopMeter();
    var keys=Object.keys(sess.collected), n=sess.count;
    var color=sess.color, hadMerge=sess.hadMerge;
    keys.forEach(function(k){ var p=k.split(","); var ref=cells[+p[0]]&&cells[+p[0]][+p[1]]; if(ref) ref.tile.classList.add("clr"); });
    sfxPop(n);
    await sleep(250);
    var res=HM.resolveSession(state, sess, Math.random);   // pops collected, credits, scores, gravity+fill (one RNG draw)
    sess=null;
    clearDim(); paintAll();
    // fresh-drop animation on refilled cells
    Object.keys(res.fresh).forEach(function(k){ var p=k.split(","); var ref=cells[+p[0]]&&cells[+p[0]][+p[1]]; if(ref) setAnim(ref.tile,"new",240); });
    updateGoals(); updateBars();
    if(res.gain>0 && (hadMerge ? n>=2 : n>=4)) toast((n>=3?"×"+n+"  ":"")+"+"+res.gain+(hadMerge?" "+NAME[color]:""));
    await sleep(180);
    HM.checkEnd(state);
    var spared=state.movesLeft;
    busy=false;
    if(state.won){ showEnd(true, spared); }
    else if(state.lost){ showEnd(false, 0); }
  }

  board.addEventListener("pointerdown", function(e){
    if(!e.isPrimary || busy || !state || state.movesLeft<=0) return; ensureAudio();
    cacheGeom();
    var tp=cellAt(e.clientX,e.clientY);
    if(!tp || !state.grid[tp.r][tp.c]) return;
    if(resolveTid){ clearTimeout(resolveTid); resolveTid=0; }   // finger down pauses the ripen
    meterEl.classList.remove("run");
    var col=state.grid[tp.r][tp.c];
    // pressing a lone secondary with no session going = free squish toy
    if(!sess && !HM.isPrim(col) && !primedPair(tp,col)){ setAnim(cells[tp.r][tp.c].tile,"squish",300); sfxEat(3); return; }
    try{ board.setPointerCapture(e.pointerId); }catch(_e){}
    if(!sess){ sess=HM.newSession(null,null); sess.moves=0; }
    gest={ anchor:tp, carry:col, counted:false };
    setPress(tp,true);
  });
  function primedPair(tp,col){
    return (HM.playable(state,tp.r+1,tp.c)&&state.grid[tp.r+1][tp.c]===col)||(HM.playable(state,tp.r-1,tp.c)&&state.grid[tp.r-1][tp.c]===col)||
           (HM.playable(state,tp.r,tp.c+1)&&state.grid[tp.r][tp.c+1]===col)||(HM.playable(state,tp.r,tp.c-1)&&state.grid[tp.r][tp.c-1]===col);
  }
  board.addEventListener("pointermove", function(e){
    if(!gest || !e.isPrimary) return;
    var tp=cellAt(e.clientX,e.clientY);
    if(!tp || (tp.r===gest.anchor.r && tp.c===gest.anchor.c)) return;
    var adj=Math.abs(tp.r-gest.anchor.r)+Math.abs(tp.c-gest.anchor.c)===1;
    if(adj) tryStep(gest.anchor, tp);
    else gest.anchor=tp;   // fast jump: re-anchor without acting
  });
  function endGesture(){
    if(!gest) return;
    setPress(gest.anchor,false);
    var acted=gest.counted;
    gest=null;
    if(sess && sess.count>0){ armMeter(); }        // relaxed cash-out; a new press cancels it
    else if(sess && !acted){ sess=null; clearDim(); }
  }
  board.addEventListener("pointerup", function(e){ if(!e.isPrimary) return; endGesture(); });
  board.addEventListener("pointercancel", function(){ endGesture(); });
  board.addEventListener("contextmenu", function(e){ e.preventDefault(); });

  /* ---------- screens ---------- */
  function renderLevelSelect(){
    var p=loadProg(), done=0, h="";
    for(var i=0;i<LEVELS.length;i++){
      var L=LEVELS[i], d=p[L.id], lock=!unlocked(i);
      if(d&&d.done) done++;
      h+='<button class="mk lvl-card'+(lock?" lock":"")+'" data-i="'+i+'"'+(lock?" disabled":"")+'>';
      h+='<div class="num">'+L.id+'</div>';
      h+='<div class="lgoals">';
      for(var j=0;j<L.objectives.length;j++){ var o=L.objectives[j]; h+='<span class="sw'+(HM.isPrim(o.color)?"":" r")+'" style="background:'+HEX[o.color]+'"></span>'; }
      h+='</div>';
      h+='<div class="lmeta">'+(lock ? "Locked" : (d&&d.done ? '<span class="st">'+"★".repeat(d.stars)+'</span><span class="st dim">'+"☆".repeat(3-d.stars)+'</span>' : L.moves+" moves"))+'</div>';
      h+='</button>';
    }
    document.getElementById("levelGrid").innerHTML=h;
    document.getElementById("progress").textContent=done+" / "+LEVELS.length;
  }
  function showLevels(){ screenGame.style.display="none"; screenLevels.style.display="block"; stopMeter(); renderLevelSelect(); }
  function goalSub(L){ return "Make "+L.objectives.map(function(o){ return o.count+" "+NAME[o.color]; }).join(" + "); }

  function startLevel(i){
    curIndex=i; curLevel=LEVELS[i];
    state=HM.newState(curLevel); HM.fill(state, Math.random);
    if(!HM.hasFusePair(state)) HM.reshufflePrimaries(state, Math.random);
    busy=false; sess=null; gest=null; geom=null; stopMeter();
    over.classList.remove("show");
    document.getElementById("gName").textContent="Level "+curLevel.id;
    document.getElementById("gSub").textContent=goalSub(curLevel);
    screenLevels.style.display="none"; screenGame.style.display="block";
    renderGoals(); updateGoals(); renderBars(); updateBars(); updateMoves(); buildBoard();
  }

  function showEnd(win, spared){
    if(spared==null) spared=state.movesLeft;
    document.getElementById("overTitle").textContent = win ? "Cleared!" : "Out of moves";
    var stars = win ? starsFor(curLevel, spared) : 0;
    document.getElementById("overStars").innerHTML = win ? starStr(stars) : "";
    document.getElementById("overMsg").textContent = win
      ? (spared+" move"+(spared===1?"":"s")+" to spare")
      : "You needed a few more moves — try again.";
    if(win){
      sfxWin();
      var p=loadProg(); var rec=p[curLevel.id]||{done:false,stars:0};
      rec.done=true; rec.stars=Math.max(rec.stars||0, stars); p[curLevel.id]=rec; saveProg(p);
    }
    var row=document.getElementById("overRow"), h="";
    if(win && curIndex+1<LEVELS.length) h+='<button class="mk accent" id="obNext">Next →</button>';
    h+='<button class="mk" id="obReplay">Replay</button>';
    h+='<button class="mk" id="obLevels">Levels</button>';
    row.innerHTML=h;
    var nx=document.getElementById("obNext"); if(nx) nx.addEventListener("click",function(){ ensureAudio(); startLevel(curIndex+1); });
    document.getElementById("obReplay").addEventListener("click",function(){ ensureAudio(); startLevel(curIndex); });
    document.getElementById("obLevels").addEventListener("click",function(){ ensureAudio(); showLevels(); });
    over.classList.add("show");
  }

  /* ---------- wiring ---------- */
  document.getElementById("levelGrid").addEventListener("click",function(e){
    var card=e.target.closest(".lvl-card"); if(!card||card.classList.contains("lock")) return;
    ensureAudio(); startLevel(+card.dataset.i);
  });
  document.getElementById("btnBack").addEventListener("click",showLevels);
  document.getElementById("btnRestart").addEventListener("click",function(){ if(!busy) startLevel(curIndex); });
  document.getElementById("btnAid").addEventListener("click",function(e){
    aid=!aid; e.currentTarget.classList.toggle("on",aid); e.currentTarget.setAttribute("aria-pressed",aid?"true":"false");
    lsSet("hm_aid",aid?"1":"0"); if(state) paintAll();
  });
  document.getElementById("btnSound").addEventListener("click",function(e){
    muted=!muted; ensureAudio(); e.currentTarget.setAttribute("aria-pressed",muted?"false":"true");
    e.currentTarget.style.opacity=muted?"0.45":"1"; lsSet("hm_mute",muted?"1":"0"); if(!muted) sfxMix(2);
  });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape"&&screenGame.style.display!=="none"&&!over.classList.contains("show")) showLevels(); });

  /* ---------- init ---------- */
  aid=lsGet("hm_aid")==="1"; muted=lsGet("hm_mute")==="1";
  document.getElementById("btnAid").setAttribute("aria-pressed",aid?"true":"false");
  var sb=document.getElementById("btnSound"); sb.setAttribute("aria-pressed",muted?"false":"true"); sb.style.opacity=muted?"0.45":"1";
  if(!LEVELS.length){ document.getElementById("levelGrid").innerHTML='<p style="grid-column:1/-1;color:var(--ink-soft)">No levels found — run tools/feeltest.mjs to generate levels.js.</p>'; }
  showLevels();
})();
</script>
</body>
