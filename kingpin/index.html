<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>cosmic kingpin</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #07070f; overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
  canvas { display: block; touch-action: none; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ============================================================ setup

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutLane();
}
window.addEventListener('resize', resize);

const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const len = (x, y) => Math.hypot(x, y);
const now = () => performance.now();

const C = {
  bg: '#07070f', panel: '#141426', panel2: '#1d1d38', stroke: 'rgba(255,255,255,0.10)',
  lane: '#1b2436', gutter: '#0a0d16', ball: '#4fd1c5', ballDk: '#2a8f88',
  pin: '#f5f0e6', band: '#ff5d73', text: '#f5f0e6', dim: 'rgba(245,240,230,0.55)',
  gold: '#ffcc4d', good: '#67e88a', guide: 'rgba(79,209,197,0.55)',
  acc: '#4fd1c5', cur: '#c58cff', pow: '#ff8a5c', spd: '#ffd34d',
};

// ============================================================ profile + roster

const STAT_KEYS = ['acc', 'cur', 'pow', 'spd'];
const STAT_NAME = { acc: 'ACCURACY', cur: 'CURVE', pow: 'POWER', spd: 'SPEED' };
const STAT_COL = { acc: C.acc, cur: C.cur, pow: C.pow, spd: C.spd };
const STAT_HINT = {
  acc: 'less wobble — the ball goes where you aim',
  cur: 'bend the ball harder to reach the pocket',
  pow: 'pins scatter harder — fewer nasty splits',
  spd: 'more pace down the lane, better carry',
};

const player = { acc: 24, cur: 20, pow: 32, spd: 40, defeated: 0 };
const RANKS = ['Gutter Rookie', 'Lane Prospect', 'Star Roller', 'Galaxy Ace', 'COSMIC KINGPIN'];
function rankName() { return RANKS[Math.min(player.defeated, RANKS.length - 1)]; }

const ALIENS = [
  { name: 'Blorf',       color: '#67e88a', quip: 'blorf blorf (i am nervous)',        acc: 30, cur: 12, pow: 30, spd: 40, face: 'blob' },
  { name: 'Zyx-9',       color: '#8fb2ff', quip: 'PREPARE FOR OPTIMAL PINFALL.',       acc: 55, cur: 35, pow: 55, spd: 55, face: 'bot'  },
  { name: 'Gloopathar',  color: '#ff8a5c', quip: 'your gutters will feast tonight.',   acc: 62, cur: 60, pow: 68, spd: 60, face: 'squid'},
  { name: 'Queen Nebula',color: '#c58cff', quip: 'bow before the celestial strike.',   acc: 82, cur: 78, pow: 85, spd: 78, face: 'crown'},
];

// ============================================================ lane geometry

const lane = { x: 0, w: 0, foulY: 0, deckY: 0, pinR: 0, ballR: 0 };
function layoutLane() {
  const maxW = Math.min(W * 0.6, 380);
  lane.w = maxW; lane.x = (W - lane.w) / 2;
  lane.foulY = H - Math.max(96, H * 0.15);
  lane.deckY = Math.max(150, H * 0.24);
  lane.ballR = clamp(lane.w * 0.05, 11, 20);
  lane.pinR = clamp(lane.w * 0.044, 8, 16);
  if (pins.length) placePins();
}

const PIN_LAYOUT = [[0,0],[-1,1],[1,1],[-2,2],[0,2],[2,2],[-3,3],[-1,3],[1,3],[3,3]];
let pins = [];
function buildPins() { pins = PIN_LAYOUT.map(() => ({ standing: true, down: false, r: lane.pinR, x:0,y:0,vx:0,vy:0,ox:0,oy:0 })); placePins(); resetRack(); }
function placePins() {
  const sx = lane.w * 0.15, sy = sx * 0.87, cxp = lane.x + lane.w / 2, apexY = lane.deckY + sy * 0.4;
  for (let i = 0; i < 10; i++) {
    const [gx, gy] = PIN_LAYOUT[i];
    pins[i].ox = cxp + gx * sx * 0.5; pins[i].oy = apexY + gy * sy; pins[i].r = lane.pinR;
    if (pins[i].standing) { pins[i].x = pins[i].ox; pins[i].y = pins[i].oy; }
  }
}
function resetRack() { for (const p of pins) { p.standing = true; p.down = false; p.vx = p.vy = 0; p.x = p.ox; p.y = p.oy; } }

// ============================================================ ball + shot

const ball = { x:0,y:0,vx:0,vy:0,r:14,spin:0,dist:0,live:false,gutter:false,power:1 };
const trail = [];
let shotOwner = null;   // 'you' | 'alien'
let onSettle = null;    // callback(knocked)
let pinsBefore = 10;

const FRICTION = 0.992, PIN_FRICTION = 0.9, HOOK = 950, MAXV = 1600;

// stats -> shot. aim = {dir(radians), power(px/s), spin(-1..1 intent)}
function startShot(owner, stats, aim) {
  shotOwner = owner;
  ball.x = lane.x + lane.w / 2; ball.y = lane.foulY;
  ball.r = lane.ballR; ball.dist = 0; ball.gutter = false; ball.live = true;
  // SPEED scales pace
  const spd = 0.62 + stats.spd / 100 * 0.85;
  const power = aim.power * spd;
  // ACCURACY -> wobble. low acc = big random deviation in both angle and spin.
  const missAmt = (1 - stats.acc / 100);
  const devAngle = (rand() - 0.5) * missAmt * 0.42;      // up to ~24deg off at 0 acc
  const dir = aim.dir + devAngle;
  ball.vx = Math.cos(dir) * power; ball.vy = Math.sin(dir) * power;
  // CURVE caps how much hook the swipe can express
  const curCap = 0.35 + stats.cur / 100 * 1.75;
  ball.spin = clamp(aim.spin, -curCap, curCap) + (rand() - 0.5) * missAmt * 0.5;
  // POWER -> pin carry
  ball.power = 0.6 + stats.pow / 100 * 1.05;
  trail.length = 0;
  rollSfx();
}

function simulate(dt) {
  if (ball.live) {
    ball.vx *= FRICTION; ball.vy *= FRICTION;
    const sp = len(ball.vx, ball.vy);
    if (sp > 1 && Math.abs(ball.spin) > 0.001) {
      const px = -ball.vy / sp, py = ball.vx / sp;
      const decay = Math.max(0, 1 - ball.dist / (H * 0.95));
      ball.vx += px * ball.spin * HOOK * decay * dt;
      ball.vy += py * ball.spin * HOOK * decay * dt;
    }
    const s2 = len(ball.vx, ball.vy);
    if (s2 > MAXV) { ball.vx *= MAXV / s2; ball.vy *= MAXV / s2; }
    const mx = ball.vx * dt, my = ball.vy * dt;
    ball.x += mx; ball.y += my; ball.dist += len(mx, my);
    trail.push({ x: ball.x, y: ball.y }); if (trail.length > 22) trail.shift();
    if (!ball.gutter && (ball.x < lane.x + ball.r || ball.x > lane.x + lane.w - ball.r)) {
      ball.gutter = true; ball.vx *= 0.15; ball.vy *= 0.6;
      ball.x = clamp(ball.x, lane.x + ball.r * 0.3, lane.x + lane.w - ball.r * 0.3);
    }
    if (!ball.gutter) for (const p of pins) collide(ball, p, 3.0 * ball.power);
  }
  for (const p of pins) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= PIN_FRICTION; p.vy *= PIN_FRICTION;
    if (p.standing && len(p.x - p.ox, p.y - p.oy) > lane.pinR * 1.05) { p.standing = false; p.down = true; burst(p.x, p.y, C.pin, 8); shake = Math.min(1, shake + 0.1); }
    if (p.x < lane.x + p.r) { p.x = lane.x + p.r; p.vx *= -0.4; }
    if (p.x > lane.x + lane.w - p.r) { p.x = lane.x + lane.w - p.r; p.vx *= -0.4; }
  }
  for (let i = 0; i < 10; i++) for (let j = i + 1; j < 10; j++) collide(pins[i], pins[j], 1);
}

function collide(a, b, heavy) {
  const dx = b.x - a.x, dy = b.y - a.y, rr = a.r + b.r, d2 = dx*dx + dy*dy;
  if (d2 >= rr*rr || d2 < 0.0001) return;
  const d = Math.sqrt(d2), nx = dx/d, ny = dy/d, ov = rr - d;
  a.x -= nx*ov*0.5; a.y -= ny*ov*0.5; b.x += nx*ov*0.5; b.y += ny*ov*0.5;
  const rvx = (b.vx||0)-(a.vx||0), rvy = (b.vy||0)-(a.vy||0), vn = rvx*nx + rvy*ny;
  if (vn > 0) return;
  const ma = heavy, mb = 1, imp = -(1.55) * vn / (1/ma + 1/mb), ix = imp*nx, iy = imp*ny;
  if (a.vx !== undefined) { a.vx -= ix/ma; a.vy -= iy/ma; }
  b.vx += ix/mb; b.vy += iy/mb;
  if (Math.abs(vn) > 60) pinSfx(Math.abs(vn));
}

let settleT = 0, shooting = false;
function shotDone() {
  const standing = pins.filter(p => p.standing).length;
  const knocked = pinsBefore - standing;
  shooting = false; ball.live = false;
  const cb = onSettle; onSettle = null;
  if (cb) cb(knocked);
}

// ============================================================ scenes

let scene = 'title';
const hit = [];  // clickable rects for current frame: {x,y,w,h,id}
function btn(x, y, w, h, id) { hit.push({ x, y, w, h, id }); return { x, y, w, h }; }
function hitTest(mx, my) { for (let i = hit.length - 1; i >= 0; i--) { const b = hit[i]; if (mx > b.x && mx < b.x + b.w && my > b.y && my < b.y + b.h) return b.id; } return null; }

// ------- match state -------
const match = { alien: null, frame: 0, ballNo: 0, turn: 'you', youPins: 0, alienPins: 0, phase: 'idle', banner: '', bannerT: 0, aiTimer: 0 };
function startMatch(alien) {
  match.alien = alien; match.frame = 0; match.ballNo = 0; match.turn = 'you';
  match.youPins = 0; match.alienPins = 0; match.phase = 'aim'; match.banner = ''; match.bannerT = 0;
  resetRack(); pinsBefore = 10; scene = 'match';
  toast(alien.name + ': ' + alien.quip, 2.4);
}
function beginBall() {
  if (match.ballNo === 0) resetRack();
  pinsBefore = pins.filter(p => p.standing).length;
  match.phase = 'aim';
  if (match.turn === 'alien') match.aiTimer = 0.7 + rand() * 0.5;
}
function shotSettledMatch(knocked) {
  if (match.turn === 'you') match.youPins += knocked; else match.alienPins += knocked;
  const cleared = pins.every(p => !p.standing);
  const isSecond = match.ballNo === 1;
  if (cleared || isSecond) {
    // frame done for this bowler; swap turn (and advance frame after alien)
    if (match.turn === 'you') { match.turn = 'alien'; match.ballNo = 0; }
    else { match.turn = 'you'; match.ballNo = 0; match.frame++; }
    if (match.frame >= 3) { endMatch(); return; }
    match.phase = 'between'; match.bannerT = 0.7;
  } else {
    match.ballNo = 1; match.phase = 'between'; match.bannerT = 0.5;
  }
}
function endMatch() {
  const win = match.youPins > match.alienPins;
  scene = 'result';
  result.win = win; result.alien = match.alien;
  result.gains = null;
  if (win) {
    const idx = ALIENS.indexOf(match.alien);
    if (idx === player.defeated) player.defeated = Math.min(player.defeated + 1, ALIENS.length);
    strikeSfx();
  } else { tone(140, 0.5, 0.2, 'sawtooth'); }
}
const result = { win: false, alien: null };

// ------- training minigame (timing drill) -------
const train = { stat: null, round: 0, rounds: 3, marker: 0, dir: 1, speed: 1.1, gained: 0, phase: 'run', flashT: 0, lastHit: 0 };
function startTrain(stat) {
  train.stat = stat; train.round = 0; train.marker = 0; train.dir = 1;
  train.speed = 1.05 + rand() * 0.25; train.gained = 0; train.phase = 'run'; train.flashT = 0;
  scene = 'train';
}
function trainTap() {
  if (train.phase !== 'run') { if (train.phase === 'done') scene = 'hub'; return; }
  // score by distance from center (0.5). green zone ~ +-0.14
  const off = Math.abs(train.marker - 0.5);
  let pts = 0;
  if (off < 0.05) { pts = 4; toast('PERFECT +4', 0.8); tone(720, 0.18, 0.22); }
  else if (off < 0.14) { pts = 2; toast('good +2', 0.7); tone(520, 0.14, 0.18); }
  else { pts = 1; toast('+1', 0.6); tone(300, 0.1, 0.14); }
  train.gained += pts; train.lastHit = 3 - Math.round(off * 6); train.flashT = 0.3;
  player[train.stat] = clamp(player[train.stat] + pts, 0, 100);
  train.round++;
  train.speed += 0.12;
  if (train.round >= train.rounds) { train.phase = 'done'; }
}

// ============================================================ input

let drawing = false; const stroke = [];
cv.addEventListener('pointerdown', e => {
  ensureAudio();
  const mx = e.clientX, my = e.clientY;
  const id = hitTest(mx, my);
  if (scene === 'title') { scene = 'hub'; return; }
  if (scene === 'hub') {
    if (id && id.startsWith('train:')) startTrain(id.split(':')[1]);
    else if (id === 'challenge') { const a = ALIENS[Math.min(player.defeated, ALIENS.length - 1)]; if (player.defeated < ALIENS.length) startMatch(a); }
    return;
  }
  if (scene === 'train') { trainTap(); return; }
  if (scene === 'result') { scene = 'hub'; return; }
  if (scene === 'match') {
    if (match.phase === 'aim' && match.turn === 'you') { drawing = true; stroke.length = 0; stroke.push({ x: mx, y: my }); cv.setPointerCapture(e.pointerId); }
    return;
  }
});
cv.addEventListener('pointermove', e => {
  if (!drawing) return;
  const p = { x: e.clientX, y: e.clientY }, last = stroke[stroke.length - 1];
  if (!last || len(p.x - last.x, p.y - last.y) > 3) stroke.push(p);
});
function endStroke() {
  if (!drawing) return; drawing = false;
  if (stroke.length < 2) return;
  launchPlayerShot();
}
cv.addEventListener('pointerup', endStroke);
cv.addEventListener('pointercancel', endStroke);

function launchPlayerShot() {
  const S = stroke[0], E = stroke[stroke.length - 1];
  let dx = E.x - S.x, dy = E.y - S.y; if (dy > -20) dy = -20;
  let sl = 0; for (let i = 1; i < stroke.length; i++) sl += len(stroke[i].x - stroke[i-1].x, stroke[i].y - stroke[i-1].y);
  const aim = { dir: Math.atan2(dy, dx), power: clamp(sl * 2.3, 560, 1400), spin: clamp(strokeCurve() * 2.6, -2, 2) };
  pinsBefore = pins.filter(p => p.standing).length;
  onSettle = shotSettledMatch; shooting = true; settleT = 0; match.phase = 'roll';
  startShot('you', player, aim);
}
function strokeCurve() {
  let turn = 0, n = 0;
  for (let i = 2; i < stroke.length; i++) {
    const ax = stroke[i-1].x - stroke[i-2].x, ay = stroke[i-1].y - stroke[i-2].y;
    const bx = stroke[i].x - stroke[i-1].x, by = stroke[i].y - stroke[i-1].y;
    const la = len(ax, ay), lb = len(bx, by); if (la < 1 || lb < 1) continue;
    turn += (ax*by - ay*bx) / (la*lb); n++;
  }
  return n ? turn : 0;
}

function launchAlienShot() {
  const a = match.alien;
  // aim: toward the pocket, small deliberate offset; its own stats add wobble
  const cxp = lane.x + lane.w / 2;
  const targetX = cxp + (rand() - 0.5) * lane.w * 0.16;
  const dx = targetX - (lane.x + lane.w / 2), dy = -(lane.foulY - lane.deckY);
  const aim = { dir: Math.atan2(dy, dx), power: 1000, spin: (rand() - 0.5) * 0.8 * (a.cur / 100 + 0.3) };
  pinsBefore = pins.filter(p => p.standing).length;
  onSettle = shotSettledMatch; shooting = true; settleT = 0; match.phase = 'roll';
  startShot('alien', a, aim);
}

// ============================================================ audio

let AC = null, master = null, muted = localStorage.getItem('kp.mute') === '1';
function ensureAudio() { if (AC) return; try { AC = new (window.AudioContext||window.webkitAudioContext)(); master = AC.createGain(); master.gain.value = muted?0:0.5; master.connect(AC.destination); } catch(_){ AC=null; } }
function tone(f, d, v, ty) { if (!AC||muted) return; const o=AC.createOscillator(), g=AC.createGain(); o.type=ty||'triangle'; o.frequency.value=f; g.gain.setValueAtTime(0,AC.currentTime); g.gain.linearRampToValueAtTime(v,AC.currentTime+0.006); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d); o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+d+0.02); }
function rollSfx(){ tone(90,0.5,0.1,'sawtooth'); }
function pinSfx(v){ tone(220+rand()*300,0.06,clamp(0.05+v/3000,0.05,0.2)); }
function strikeSfx(){ tone(400,0.5,0.28); setTimeout(()=>tone(600,0.5,0.24),100); setTimeout(()=>tone(820,0.6,0.22),210); }

// deterministic-ish randomness allowed here (gameplay, not workflow)
function rand(){ return Math.random(); }

// ============================================================ loop

let last = 0, shake = 0, flash = 0, flashCol = '#fff';
const parts = [];
let toastMsg = '', toastT = 0;
function toast(m, t){ toastMsg = m; toastT = t; }

function frame(t) {
  const dt = last ? Math.min((t - last)/1000, 0.032) : 0.016; last = t;
  update(dt); render(); requestAnimationFrame(frame);
}

function update(dt) {
  shake = Math.max(0, shake - dt*3.5); flash = Math.max(0, flash - dt*3);
  if (toastT > 0) toastT -= dt;
  for (let i = parts.length-1; i>=0; i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.93; p.vy*=0.93; p.life-=dt; if(p.life<=0) parts.splice(i,1); }

  if (scene === 'match') {
    if (match.bannerT > 0) { match.bannerT -= dt; if (match.bannerT <= 0 && match.phase === 'between') beginBall(); }
    if (match.phase === 'aim' && match.turn === 'alien') { match.aiTimer -= dt; if (match.aiTimer <= 0) launchAlienShot(); }
    if (match.phase === 'roll') {
      simulate(dt);
      if (ball.y < lane.deckY - lane.pinR*3 || ball.gutter) { if (ball.live) { ball.live = false; } }
      const moving = pins.some(p => len(p.vx,p.vy) > 6) || (ball.live && len(ball.vx,ball.vy) > 6);
      settleT += dt;
      if ((!moving && settleT > 0.4 && !ball.live) || settleT > 3.4) { match.phase = 'settle'; shotDone(); }
    }
  }
  if (scene === 'train') {
    if (train.flashT > 0) train.flashT -= dt;
    if (train.phase === 'run') { train.marker += train.dir * train.speed * dt; if (train.marker > 1) { train.marker = 1; train.dir = -1; } if (train.marker < 0) { train.marker = 0; train.dir = 1; } }
  }
}

// ============================================================ render

function render() {
  hit.length = 0;
  let ox=0, oy=0; if (shake>0){ ox=(rand()-0.5)*shake*12; oy=(rand()-0.5)*shake*12; }
  cx.save(); cx.translate(ox, oy);
  cx.fillStyle = C.bg; cx.fillRect(-20,-20,W+40,H+40);
  drawStars();
  if (scene === 'title') drawTitle();
  else if (scene === 'hub') drawHub();
  else if (scene === 'train') drawTrain();
  else if (scene === 'match') drawMatch();
  else if (scene === 'result') drawResult();
  cx.restore();

  if (toastT > 0) drawToast();
  if (flash > 0){ cx.globalAlpha=flash*0.3; cx.fillStyle=flashCol; cx.fillRect(0,0,W,H); cx.globalAlpha=1; }
}

const stars = [];
function drawStars(){
  if (!stars.length) for (let i=0;i<60;i++) stars.push({ x: rand(), y: rand(), r: rand()*1.4+0.3, a: rand()*0.5+0.2 });
  cx.fillStyle = '#fff';
  for (const s of stars){ cx.globalAlpha = s.a; cx.beginPath(); cx.arc(s.x*W, s.y*H, s.r, 0, TAU); cx.fill(); }
  cx.globalAlpha = 1;
}

function drawTitle() {
  cx.textAlign = 'center';
  cx.fillStyle = C.gold; cx.font = '800 15px -apple-system, system-ui, sans-serif';
  cx.fillText('★  INTERGALACTIC  CIRCUIT  ★', W/2, H*0.3);
  cx.fillStyle = C.text; cx.font = '800 44px -apple-system, system-ui, sans-serif';
  cx.fillText('COSMIC', W/2, H*0.4); cx.fillText('KINGPIN', W/2, H*0.4 + 50);
  cx.fillStyle = C.dim; cx.font = '500 15px -apple-system, system-ui, sans-serif';
  cx.fillText('a gutter-to-glory bowling career', W/2, H*0.4 + 92);
  // a little ball + pins motif
  cx.fillStyle = C.ball; cx.beginPath(); cx.arc(W/2 - 44, H*0.62, 16, 0, TAU); cx.fill();
  for (let i=0;i<3;i++){ cx.fillStyle=C.pin; cx.beginPath(); cx.arc(W/2 + 20 + i*22, H*0.62, 9, 0, TAU); cx.fill(); }
  pulseBtn(W/2 - 90, H*0.78, 180, 52, 'tap to begin', C.ball, 'start');
}

function drawHub() {
  cx.textAlign = 'left';
  const px = W/2 - Math.min(W*0.44, 210), pw = Math.min(W*0.88, 420);
  // header
  cx.textAlign = 'center';
  cx.fillStyle = C.gold; cx.font = '700 13px -apple-system, system-ui, sans-serif';
  cx.fillText('RANK', W/2, H*0.10);
  cx.fillStyle = C.text; cx.font = '800 26px -apple-system, system-ui, sans-serif';
  cx.fillText(rankName(), W/2, H*0.10 + 28);
  cx.fillStyle = C.dim; cx.font = '500 13px -apple-system, system-ui, sans-serif';
  cx.fillText('aliens defeated: ' + player.defeated + ' / ' + ALIENS.length, W/2, H*0.10 + 50);

  // stat bars (tap to train)
  let y = H*0.24;
  const rowH = Math.min(58, H*0.075);
  cx.textAlign = 'left';
  for (const k of STAT_KEYS) {
    const r = btn(px, y, pw, rowH - 8, 'train:' + k);
    panel(r.x, r.y, r.w, r.h, C.panel);
    cx.fillStyle = STAT_COL[k]; cx.font = '700 14px -apple-system, system-ui, sans-serif';
    cx.textAlign = 'left'; cx.fillText(STAT_NAME[k], r.x + 14, r.y + 20);
    // bar
    const bx = r.x + 14, by = r.y + r.h - 18, bw = r.w - 90;
    cx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(bx, by, bw, 8, 4); cx.fill();
    cx.fillStyle = STAT_COL[k]; roundRect(bx, by, bw * player[k]/100, 8, 4); cx.fill();
    cx.fillStyle = C.text; cx.font = '800 18px -apple-system, system-ui, sans-serif'; cx.textAlign = 'right';
    cx.fillText(Math.round(player[k]), r.x + r.w - 14, r.y + 20);
    cx.fillStyle = C.dim; cx.font = '600 11px -apple-system, system-ui, sans-serif';
    cx.fillText('TRAIN ▸', r.x + r.w - 14, r.y + r.h - 14);
    y += rowH;
  }

  // challenge button
  y += 6;
  if (player.defeated < ALIENS.length) {
    const a = ALIENS[player.defeated];
    const r = btn(px, y, pw, 66, 'challenge');
    panel(r.x, r.y, r.w, r.h, C.panel2); cx.strokeStyle = a.color; cx.lineWidth = 2; roundRect(r.x, r.y, r.w, r.h, 12); cx.stroke();
    drawAlienFace(r.x + 34, r.y + r.h/2, 20, a);
    cx.textAlign = 'left';
    cx.fillStyle = C.dim; cx.font = '600 11px -apple-system, system-ui, sans-serif'; cx.fillText('NEXT CHALLENGER', r.x + 66, r.y + 24);
    cx.fillStyle = C.text; cx.font = '800 20px -apple-system, system-ui, sans-serif'; cx.fillText(a.name, r.x + 66, r.y + 46);
    cx.fillStyle = a.color; cx.font = '700 13px -apple-system, system-ui, sans-serif'; cx.textAlign = 'right'; cx.fillText('CHALLENGE ▸', r.x + r.w - 14, r.y + r.h/2 + 1);
  } else {
    cx.textAlign = 'center'; cx.fillStyle = C.gold; cx.font = '800 20px -apple-system, system-ui, sans-serif';
    cx.fillText('★ CIRCUIT CHAMPION ★', W/2, y + 34);
  }
}

function drawTrain() {
  const k = train.stat;
  cx.textAlign = 'center';
  cx.fillStyle = STAT_COL[k]; cx.font = '700 13px -apple-system, system-ui, sans-serif';
  cx.fillText('TRAINING DRILL', W/2, H*0.16);
  cx.fillStyle = C.text; cx.font = '800 30px -apple-system, system-ui, sans-serif';
  cx.fillText(STAT_NAME[k], W/2, H*0.16 + 34);
  cx.fillStyle = C.dim; cx.font = '500 13px -apple-system, system-ui, sans-serif';
  cx.fillText(STAT_HINT[k], W/2, H*0.16 + 58);

  // timing bar
  const bx = W*0.12, bw = W*0.76, by = H*0.5, bh = 26;
  panel(bx, by, bw, bh, C.panel);
  // green zone
  const gz = bw * 0.14, gzc = bx + bw*0.5;
  cx.fillStyle = 'rgba(103,232,138,0.25)'; roundRect(gzc - gz/2, by, gz, bh, 6); cx.fill();
  cx.fillStyle = C.good; roundRect(gzc - bw*0.025, by, bw*0.05, bh, 4); cx.fill();
  // marker
  const mxp = bx + train.marker * bw;
  cx.fillStyle = train.flashT > 0 ? C.gold : C.text;
  roundRect(mxp - 3, by - 8, 6, bh + 16, 3); cx.fill();

  cx.fillStyle = C.dim; cx.font = '500 14px -apple-system, system-ui, sans-serif';
  cx.fillText('drill ' + Math.min(train.round + (train.phase==='done'?0:1), train.rounds) + ' / ' + train.rounds + '   ·   gained +' + train.gained, W/2, by + 70);

  if (train.phase === 'run') {
    cx.fillStyle = C.text; cx.font = '700 18px -apple-system, system-ui, sans-serif';
    cx.fillText('TAP when the marker hits the center', W/2, by - 44);
  } else {
    cx.fillStyle = STAT_COL[k]; cx.font = '800 24px -apple-system, system-ui, sans-serif';
    cx.fillText(STAT_NAME[k] + ' +' + train.gained, W/2, by - 44);
    pulseBtn(W/2 - 90, H*0.74, 180, 50, 'back to hub', STAT_COL[k], 'done');
  }
}

function drawMatch() {
  drawLane();
  drawPins();
  drawBallAndTrail();
  if (drawing && stroke.length > 1) {
    cx.strokeStyle = C.guide; cx.lineWidth = 3; cx.lineCap='round'; cx.lineJoin='round';
    cx.beginPath(); cx.moveTo(stroke[0].x, stroke[0].y); for (let i=1;i<stroke.length;i++) cx.lineTo(stroke[i].x, stroke[i].y); cx.stroke();
  }
  for (const p of parts){ cx.globalAlpha=clamp(p.life*2,0,1); cx.fillStyle=p.col; cx.beginPath(); cx.arc(p.x,p.y,2.5,0,TAU); cx.fill(); }
  cx.globalAlpha = 1;

  // scoreboard
  const a = match.alien;
  cx.textAlign = 'left';
  scoreChip(10, 8, 'YOU', C.ball, match.youPins, match.turn === 'you');
  scoreChip(W - 130, 8, a.name, a.color, match.alienPins, match.turn === 'alien');
  cx.textAlign = 'center';
  cx.fillStyle = C.dim; cx.font = '600 12px -apple-system, system-ui, sans-serif';
  cx.fillText('frame ' + (match.frame + 1) + ' / 3   ·   ball ' + (match.ballNo + 1), W/2, 24);

  if (match.turn === 'you' && match.phase === 'aim') {
    cx.fillStyle = C.text; cx.font = '700 15px -apple-system, system-ui, sans-serif';
    cx.fillText('your roll — swipe up, curve to hook', W/2, lane.foulY + 40);
  } else if (match.turn === 'alien' && (match.phase === 'aim' || match.phase === 'roll')) {
    cx.fillStyle = a.color; cx.font = '700 15px -apple-system, system-ui, sans-serif';
    cx.fillText(a.name + ' is bowling…', W/2, lane.foulY + 40);
  }
}

function drawResult() {
  const a = result.alien; cx.textAlign = 'center';
  cx.fillStyle = result.win ? C.gold : C.dim; cx.font = '800 40px -apple-system, system-ui, sans-serif';
  cx.fillText(result.win ? 'VICTORY' : 'DEFEAT', W/2, H*0.32);
  drawAlienFace(W/2, H*0.46, 34, a);
  cx.fillStyle = C.text; cx.font = '600 16px -apple-system, system-ui, sans-serif';
  cx.fillText('you ' + match.youPins + '  —  ' + match.alienPins + '  ' + a.name, W/2, H*0.56);
  cx.fillStyle = result.win ? C.good : C.dim; cx.font = '500 14px -apple-system, system-ui, sans-serif';
  if (result.win) {
    cx.fillText(player.defeated >= ALIENS.length ? 'you are the COSMIC KINGPIN!' : 'next challenger unlocked · rank up!', W/2, H*0.62);
  } else {
    cx.fillText('hit the training drills and try again', W/2, H*0.62);
  }
  pulseBtn(W/2 - 90, H*0.76, 180, 50, 'continue', result.win ? C.gold : C.ball, 'cont');
}

// ---- shared drawing helpers ----

function drawLane() {
  cx.fillStyle = C.gutter;
  cx.fillRect(lane.x - 20, lane.deckY - 30, 20, lane.foulY - lane.deckY + 60);
  cx.fillRect(lane.x + lane.w, lane.deckY - 30, 20, lane.foulY - lane.deckY + 60);
  const g = cx.createLinearGradient(0, lane.deckY, 0, lane.foulY);
  g.addColorStop(0, '#243257'); g.addColorStop(1, C.lane);
  cx.fillStyle = g; cx.fillRect(lane.x, lane.deckY - 30, lane.w, lane.foulY - lane.deckY + 60);
  cx.strokeStyle = 'rgba(255,255,255,0.04)'; cx.lineWidth = 1;
  for (let i=1;i<8;i++){ const lx=lane.x+lane.w*i/8; cx.beginPath(); cx.moveTo(lx,lane.deckY-30); cx.lineTo(lx,lane.foulY+30); cx.stroke(); }
  cx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let i=-2;i<=2;i++){ const ax=lane.x+lane.w/2+i*lane.w*0.16; cx.beginPath(); cx.arc(ax, lane.foulY-(lane.foulY-lane.deckY)*0.32, 3,0,TAU); cx.fill(); }
  cx.strokeStyle = 'rgba(255,93,115,0.55)'; cx.lineWidth = 3;
  cx.beginPath(); cx.moveTo(lane.x, lane.foulY+lane.ballR+6); cx.lineTo(lane.x+lane.w, lane.foulY+lane.ballR+6); cx.stroke();
}
function drawPins() {
  for (const p of pins) {
    if (!p.standing && (p.y > lane.foulY || p.y < lane.deckY - 70)) continue;
    cx.globalAlpha = p.standing ? 1 : 0.5;
    cx.fillStyle = C.pin; cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, TAU); cx.fill();
    if (p.standing){ cx.fillStyle = C.band; cx.beginPath(); cx.arc(p.x, p.y - p.r*0.25, p.r*0.5, 0, TAU); cx.fill(); }
    cx.globalAlpha = 1;
  }
}
function drawBallAndTrail() {
  for (let i=0;i<trail.length;i++){ const t=i/trail.length; cx.globalAlpha=t*0.4; cx.fillStyle=C.ball; cx.beginPath(); cx.arc(trail[i].x, trail[i].y, ball.r*(0.3+t*0.6),0,TAU); cx.fill(); }
  cx.globalAlpha = 1;
  const showBall = match.phase === 'aim' || match.phase === 'roll' || ball.live;
  if (showBall) {
    const bg = cx.createRadialGradient(ball.x-ball.r*0.3, ball.y-ball.r*0.3, 1, ball.x, ball.y, ball.r);
    const col = shotOwner === 'alien' && match.alien ? match.alien.color : C.ball;
    bg.addColorStop(0, col); bg.addColorStop(1, C.ballDk);
    cx.fillStyle = bg; cx.beginPath(); cx.arc(ball.x, ball.y, ball.r, 0, TAU); cx.fill();
  }
}
function drawAlienFace(x, y, r, a) {
  cx.fillStyle = a.color; cx.beginPath(); cx.arc(x, y, r, 0, TAU); cx.fill();
  cx.fillStyle = '#0a0a14';
  const ex = r*0.36, ey = -r*0.1, er = r*0.16;
  cx.beginPath(); cx.arc(x-ex, y+ey, er, 0, TAU); cx.fill();
  cx.beginPath(); cx.arc(x+ex, y+ey, er, 0, TAU); cx.fill();
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(x-ex+er*0.3, y+ey-er*0.3, er*0.4, 0, TAU); cx.fill();
  cx.beginPath(); cx.arc(x+ex+er*0.3, y+ey-er*0.3, er*0.4, 0, TAU); cx.fill();
  // antennae
  cx.strokeStyle = a.color; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(x, y-r*0.9); cx.lineTo(x-r*0.3, y-r*1.4); cx.stroke();
  cx.beginPath(); cx.moveTo(x, y-r*0.9); cx.lineTo(x+r*0.3, y-r*1.4); cx.stroke();
  cx.fillStyle = a.color; cx.beginPath(); cx.arc(x-r*0.3, y-r*1.4, r*0.12, 0, TAU); cx.fill();
  cx.beginPath(); cx.arc(x+r*0.3, y-r*1.4, r*0.12, 0, TAU); cx.fill();
}

function scoreChip(x, y, label, col, val, active) {
  panel(x, y, 120, 44, active ? C.panel2 : C.panel);
  if (active){ cx.strokeStyle = col; cx.lineWidth = 2; roundRect(x, y, 120, 44, 10); cx.stroke(); }
  cx.textAlign = 'left'; cx.fillStyle = col; cx.font = '700 11px -apple-system, system-ui, sans-serif'; cx.fillText(label, x + 12, y + 16);
  cx.fillStyle = C.text; cx.font = '800 22px -apple-system, system-ui, sans-serif'; cx.fillText(val, x + 12, y + 36);
}

function pulseBtn(x, y, w, h, label, col, id) {
  btn(x, y, w, h, id);
  const pulse = 0.5 + 0.5 * Math.sin(now()/350);
  panel(x, y, w, h, C.panel2); cx.globalAlpha = 0.4 + pulse*0.4; cx.strokeStyle = col; cx.lineWidth = 2; roundRect(x, y, w, h, 12); cx.stroke(); cx.globalAlpha = 1;
  cx.textAlign = 'center'; cx.fillStyle = col; cx.font = '700 16px -apple-system, system-ui, sans-serif'; cx.textBaseline = 'middle';
  cx.fillText(label, x + w/2, y + h/2); cx.textBaseline = 'alphabetic';
}

function panel(x, y, w, h, fill) { cx.fillStyle = fill; roundRect(x, y, w, h, 12); cx.fill(); cx.strokeStyle = C.stroke; cx.lineWidth = 1; roundRect(x, y, w, h, 12); cx.stroke(); }
function drawToast() {
  cx.globalAlpha = clamp(toastT*1.5, 0, 1);
  cx.textAlign = 'center'; cx.font = '700 16px -apple-system, system-ui, sans-serif';
  const tw = cx.measureText(toastMsg).width + 32;
  cx.fillStyle = 'rgba(10,10,20,0.85)'; roundRect(W/2 - tw/2, H*0.86, tw, 36, 10); cx.fill();
  cx.fillStyle = C.text; cx.textBaseline = 'middle'; cx.fillText(toastMsg, W/2, H*0.86 + 18); cx.textBaseline = 'alphabetic';
  cx.globalAlpha = 1;
}

function burst(x, y, col, n) { for (let i=0;i<n;i++){ const a=rand()*TAU, s=60+rand()*240; parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4+rand()*0.4, col }); } }
function roundRect(x, y, w, h, r) { cx.beginPath(); cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }

cv.addEventListener('dblclick', () => { muted = !muted; localStorage.setItem('kp.mute', muted?'1':'0'); if (master) master.gain.value = muted?0:0.5; });

// ============================================================ go
resize();
buildPins();
requestAnimationFrame(frame);
</script>
