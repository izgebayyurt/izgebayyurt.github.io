<!doctype html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<title>cosmic kingpin</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #07070f; overflow: hidden;
    font-family: -apple-system, system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
  canvas { display: block; touch-action: none; cursor: pointer; }

<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ============================================================ setup

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutLane();
}
window.addEventListener('resize', resize);

const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const len = (x, y) => Math.hypot(x, y);
const now = () => performance.now();
const rand = () => Math.random();
const pick = arr => arr[(rand() * arr.length) | 0];

const C = {
  bg: '#07070f', panel: '#141426', panel2: '#1d1d38', stroke: 'rgba(255,255,255,0.10)',
  lane: '#1b2436', gutter: '#0a0d16', ball: '#4fd1c5', ballDk: '#2a8f88',
  pin: '#f5f0e6', band: '#ff5d73', text: '#f5f0e6', dim: 'rgba(245,240,230,0.55)',
  gold: '#ffcc4d', good: '#67e88a', bad: '#ff5d73', guide: 'rgba(79,209,197,0.55)',
  acc: '#4fd1c5', cur: '#c58cff', pow: '#ff8a5c', spd: '#ffd34d', energy: '#67e88a', money: '#ffcc4d',
};

// ============================================================ stats + roster + divisions

const STAT_KEYS = ['acc', 'cur', 'pow', 'spd'];
const STAT_NAME = { acc: 'ACCURACY', cur: 'CURVE', pow: 'POWER', spd: 'SPEED' };
const STAT_COL = { acc: C.acc, cur: C.cur, pow: C.pow, spd: C.spd };
const TRAIN_TITLE = { acc: 'BULLSEYE', cur: 'SLALOM', pow: 'MASH-O-TRON', spd: 'REFLEX START' };
const TRAIN_HINT = {
  acc: 'roll the ball through the drifting target',
  cur: 'curve the ball through every gate',
  pow: 'mash the button — raw power!',
  spd: 'wait for GO, then tap fast',
};

// alien: name,color,quip,stats,power,lane,face
function A(name, color, quip, acc, cur, pow, spd, power, lane, face) {
  return { name, color, quip, acc, cur, pow, spd, power, lane, face };
}
const DIVISIONS = [
  { name: 'Backwater League', aliens: [
    A('Blorf', '#67e88a', 'blorf blorf (i am so nervous)', 28, 12, 30, 38, null, 'normal', 'blob'),
    A('Nibbles', '#8fe6c0', 'squeak! prepare to be nibbled', 34, 18, 28, 44, null, 'normal', 'blob'),
    A('Pockmark', '#b0c46a', 'i once bowled a 3. my best.', 40, 22, 42, 40, null, 'moving', 'squid'),
  ]},
  { name: 'Nebula Circuit', aliens: [
    A('Zyx-9', '#8fb2ff', 'PREPARE FOR OPTIMAL PINFALL.', 58, 36, 56, 60, null, 'ice', 'bot'),
    A('Gloopathar', '#ff8a5c', 'your gutters will feast tonight', 60, 55, 66, 55, 'goo', 'normal', 'squid'),
    A('Bouncer Bo', '#ffd34d', 'everything comes back around, kid', 55, 48, 60, 66, null, 'bumpers', 'bot'),
  ]},
  { name: 'Galactic Masters', aliens: [
    A('Vortex', '#7ad0ff', 'feel the pull of the void', 72, 70, 70, 80, 'extraball', 'lowgrav', 'squid'),
    A('Moltar', '#ff6a6a', 'my pins DANCE for me', 74, 66, 82, 70, null, 'moving', 'crown'),
    A('Queen Nebula', '#c58cff', 'bow before the celestial strike', 86, 80, 88, 82, 'reset', 'lowgrav', 'crown'),
  ]},
];
const RANKS = ['Gutter Rookie', 'Lane Prospect', 'Star Roller', 'COSMIC KINGPIN'];

// bar patrons (casual games)
const BAR_PATRONS = [
  A('Greg (an ooze)', '#9ad06a', 'i got twenty on me. easy money.', 35, 20, 35, 40, null, 'normal', 'blob'),
  A('Two-Thumb Timmy', '#ff9ecb', 'these thumbs never miss. mostly.', 45, 40, 45, 45, null, 'normal', 'squid'),
  A('Old Rustbucket', '#c0c0d0', 'beep. i mean, you\'re on.', 52, 30, 58, 50, null, 'normal', 'bot'),
];

// ============================================================ profile + persistence

let player = null;
function defaultProfile() {
  return {
    acc: 24, cur: 20, pow: 32, spd: 40,
    credits: 60, energy: 5, energyTs: Date.now(),
    div: 0, league: null, champion: false,
    v: 1,
  };
}
const ENERGY_MAX = 5, ENERGY_MS = 150000; // 2.5 min per pip
function loadProfile() {
  try {
    const raw = localStorage.getItem('kp.save');
    if (raw) { const p = JSON.parse(raw); if (p && p.v === 1) { player = p; } }
  } catch (_) {}
  if (!player) player = defaultProfile();
  refreshEnergy();
  if (!player.league) newSeason();
}
function saveProfile() { try { localStorage.setItem('kp.save', JSON.stringify(player)); } catch (_) {} }
function refreshEnergy() {
  const t = Date.now();
  if (player.energy < ENERGY_MAX) {
    const gained = Math.floor((t - player.energyTs) / ENERGY_MS);
    if (gained > 0) { player.energy = Math.min(ENERGY_MAX, player.energy + gained); player.energyTs += gained * ENERGY_MS; }
  } else player.energyTs = t;
}
function spendEnergy(n) { refreshEnergy(); if (player.energy < n) return false; if (player.energy === ENERGY_MAX) player.energyTs = Date.now(); player.energy -= n; saveProfile(); return true; }
function energyMsLeft() { refreshEnergy(); if (player.energy >= ENERGY_MAX) return 0; return ENERGY_MS - (Date.now() - player.energyTs); }
function addCredits(n) { player.credits = Math.max(0, player.credits + n); saveProfile(); }

// ============================================================ league season

function curDivision() { return DIVISIONS[Math.min(player.div, DIVISIONS.length - 1)]; }
function newSeason() {
  const div = curDivision();
  const games = div.aliens.map((_, i) => ({ opp: i, mine: null, theirs: null }));
  // simulate rival vs rival (3 games among aliens 0,1,2)
  const sim = {};
  const pairs = [[0,1],[0,2],[1,2]];
  for (const [i, j] of pairs) { const r = simGame(div.aliens[i], div.aliens[j]); sim[i + '-' + j] = r; }
  player.league = { games, sim, over: false };
  saveProfile();
}
function statSum(a) { return a.acc + a.cur + a.pow + a.spd; }
function simGame(a, b) {
  // pins ~ scaled by stat sum with noise; range 8..30
  const pa = Math.round(clamp(10 + (statSum(a) / 400) * 18 + (rand() - 0.5) * 10, 4, 30));
  const pb = Math.round(clamp(10 + (statSum(b) / 400) * 18 + (rand() - 0.5) * 10, 4, 30));
  return [pa, pb];
}
function leagueTable() {
  const div = curDivision();
  const names = ['YOU', ...div.aliens.map(a => a.name)];
  const T = {}; names.forEach(n => T[n] = { name: n, w: 0, l: 0, d: 0, pts: 0, pf: 0, pa: 0 });
  const rec = (n, f, a) => { const t = T[n]; t.pf += f; t.pa += a; if (f > a) { t.w++; t.pts += 3; } else if (f < a) t.l++; else { t.d++; t.pts += 1; } };
  for (const g of player.league.games) if (g.mine !== null) { const oppName = div.aliens[g.opp].name; rec('YOU', g.mine, g.theirs); rec(oppName, g.theirs, g.mine); }
  const pairs = [[0,1],[0,2],[1,2]];
  for (const [i, j] of pairs) { const r = player.league.sim[i + '-' + j]; rec(div.aliens[i].name, r[0], r[1]); rec(div.aliens[j].name, r[1], r[0]); }
  return Object.values(T).sort((a, b) => b.pts - a.pts || (b.pf - b.pa) - (a.pf - a.pa) || b.pf - a.pf);
}
function seasonComplete() { return player.league.games.every(g => g.mine !== null); }
function myPosition() { const t = leagueTable(); return t.findIndex(r => r.name === 'YOU'); }

// ============================================================ 3D world + camera (meters)

const LANE_HALF = 0.525, FOUL = 0.0, PIN_Z0 = 17.2, DECK_END = 18.6;
const BALL_R = 0.107, PIN_R = 0.061, PIN_H = 0.38;
const lane = { gimmick: 'normal' };
const cam = { y: 1.55, z: -2.3, pitch: 0.26, f: 0, vp: 0 };
function layoutLane() { cam.f = H * 1.18; cam.vp = H * 0.47; }
function project(x, y, z) {
  const rx = x, ry = y - cam.y, rz = z - cam.z;
  const c = Math.cos(cam.pitch), s = Math.sin(cam.pitch);
  const dz = rz * c - ry * s, dy = ry * c + rz * s;
  const zz = dz < 0.05 ? 0.05 : dz, sc = cam.f / zz;
  return { x: W / 2 + rx * sc, y: cam.vp - dy * sc, sc, z: zz };
}

const PIN_LAYOUT = [[0,0],[-1,1],[1,1],[-2,2],[0,2],[2,2],[-3,3],[-1,3],[1,3],[3,3]];
let pins = [];
function buildPins() {
  pins = PIN_LAYOUT.map(([gx, gy]) => ({ ox: gx * 0.1525, oz: PIN_Z0 + gy * 0.264,
    x: 0, z: 0, vx: 0, vz: 0, y: 0, vy: 0, tx: 0, tz: 0, wx: 0, wz: 0, standing: true, down: false }));
  resetRack();
}
function resetRack() { for (const p of pins) { p.x = p.ox; p.z = p.oz; p.vx = p.vz = 0; p.y = 0; p.vy = 0; p.tx = p.tz = p.wx = p.wz = 0; p.standing = true; p.down = false; } }

// ============================================================ ball + physics (3D)

const ball = { x: 0, z: 0, vx: 0, vz: 0, y: BALL_R, spin: 0, dist: 0, live: false, gutter: false, power: 1 };
const trail = [];
let shotOwner = null, extraFriction = 1;

// stats -> shot. aim = { aimX (start board -0.42..0.42), speed (m/s), spin }
function startShot(owner, stats, aim) {
  shotOwner = owner;
  // low accuracy = thinner margins, NOT a random ball. The shot still goes where you aim.
  const miss = Math.pow(1 - stats.acc / 100, 1.4);
  ball.x = clamp(aim.aimX + (rand() - 0.5) * miss * 0.10, -0.44, 0.44);
  ball.z = FOUL; ball.y = BALL_R; ball.vx = 0;
  ball.vz = clamp(aim.speed * (0.72 + stats.spd / 100 * 0.55), 6.5, 13.5);
  const curCap = 0.4 + stats.cur / 100 * 2.1;
  ball.spin = clamp(aim.spin, -curCap, curCap) + (rand() - 0.5) * miss * 0.13;
  ball.power = 0.6 + stats.pow / 100 * 1.1;
  ball.dist = 0; ball.live = true; ball.gutter = false;
  trail.length = 0; rollSfx();
}

const FR_BASE = 0.9986, PIN_FR = 0.86, GRAV = 9.8;
const BALANCE = 0.16, FALL = 1.15, TOPPLE_G = 7.0, WOBBLE_K = 55, kAng = 9.0, kLin = 0.5, kPop = 0.05;
function frictionFor() { let f = FR_BASE; if (lane.gimmick === 'ice') f = 0.9992; else if (lane.gimmick === 'lowgrav') f = 0.9990; return f * extraFriction; }
function hookK() { return lane.gimmick === 'lowgrav' ? 4.6 : 3.1; }

function stepBall(dt) {
  if (!ball.live) return;
  const f = frictionFor(); ball.vx *= f; ball.vz *= f;
  const sp = len(ball.vx, ball.vz);
  if (sp > 0.05 && Math.abs(ball.spin) > 0.001) { const decay = Math.max(0, 1 - ball.dist / 20); ball.vx += ball.spin * hookK() * decay * dt; }
  const mx = ball.vx * dt, mz = ball.vz * dt; ball.x += mx; ball.z += mz; ball.dist += len(mx, mz);
  trail.push({ x: ball.x, z: ball.z }); if (trail.length > 26) trail.shift();
  if (Math.abs(ball.x) > LANE_HALF - BALL_R) {
    if (lane.gimmick === 'bumpers') { ball.x = clamp(ball.x, -(LANE_HALF - BALL_R), LANE_HALF - BALL_R); ball.vx *= -0.8; tone(300, 0.05, 0.08); }
    else if (!ball.gutter) { ball.gutter = true; ball.x = clamp(ball.x, -(LANE_HALF + 0.02), LANE_HALF + 0.02); ball.vx *= 0.1; ball.vz *= 0.85; ball.y = BALL_R * 0.5; }
  }
  if (ball.z > DECK_END + 0.7 || len(ball.vx, ball.vz) < 0.12) ball.live = false;
}
function stepPins(dt) {
  for (const p of pins) {
    p.tx += p.wx * dt; p.tz += p.wz * dt;
    const mag = Math.hypot(p.tx, p.tz);
    if (p.standing) {
      if (mag > BALANCE) { const ux = p.tx / mag, uz = p.tz / mag, g = TOPPLE_G * Math.sin(mag); p.wx += ux * g * dt; p.wz += uz * g * dt; if (mag > FALL) { p.standing = false; p.down = true; toppleFx(p); } }
      else { p.wx += -p.tx * WOBBLE_K * dt; p.wz += -p.tz * WOBBLE_K * dt; p.wx *= 0.85; p.wz *= 0.85; if (mag < 0.008 && Math.hypot(p.wx, p.wz) < 0.05) { p.tx *= 0.6; p.tz *= 0.6; } }
    } else { p.wx *= 0.9; p.wz *= 0.9; }
    p.x += p.vx * dt; p.z += p.vz * dt; p.vx *= PIN_FR; p.vz *= PIN_FR;
    p.y += p.vy * dt; p.vy -= GRAV * dt; if (p.y < 0) { p.y = 0; p.vy = 0; }
    if (Math.abs(p.x) > LANE_HALF + 0.12) { p.x = Math.sign(p.x) * (LANE_HALF + 0.12); p.vx *= -0.3; }
  }
  for (let i = 0; i < pins.length; i++) for (let j = i + 1; j < pins.length; j++) pinPin(pins[i], pins[j]);
}
function toppleFx(p) { const pr = project(p.x, 0, p.z); burst(pr.x, pr.y, C.pin, 6); shake = Math.min(1, shake + 0.09); }
function simulate(dt) {
  stepBall(dt);
  if (ball.live && !ball.gutter) for (const p of pins) hitPin(p);
  stepPins(dt);
}
function hitPin(p) {
  const rr = BALL_R + PIN_R, dx = p.x - ball.x, dz = p.z - ball.z, d2 = dx * dx + dz * dz;
  if (d2 >= rr * rr || d2 < 1e-6) return;
  const d = Math.sqrt(d2), nx = dx / d, nz = dz / d, ov = rr - d; p.x += nx * ov; p.z += nz * ov;
  const sp = len(ball.vx, ball.vz) * ball.power;
  p.vx += nx * sp * kLin; p.vz += nz * sp * kLin;
  p.wx += nz * sp * kAng; p.wz += nx * sp * kAng;
  if (p.standing) p.vy += Math.min(sp * kPop, 0.6);
  ball.vx -= nx * sp * 0.10; ball.vz -= nz * sp * 0.10; ball.vx *= 0.985; ball.vz *= 0.985;
  pinSfx(sp * 220);
}
function pinPin(a, b) {
  const rra = a.down ? 0.09 : PIN_R, rrb = b.down ? 0.09 : PIN_R, rr = rra + rrb;
  const dx = b.x - a.x, dz = b.z - a.z, d2 = dx * dx + dz * dz; if (d2 >= rr * rr || d2 < 1e-6) return;
  const d = Math.sqrt(d2), nx = dx / d, nz = dz / d, ov = rr - d;
  a.x -= nx * ov * 0.5; a.z -= nz * ov * 0.5; b.x += nx * ov * 0.5; b.z += nz * ov * 0.5;
  const rvx = b.vx - a.vx, rvz = b.vz - a.vz, vn = rvx * nx + rvz * nz; if (vn > 0) return;
  const imp = -(1.4) * vn / 2, ix = imp * nx, iz = imp * nz; a.vx -= ix; a.vz -= iz; b.vx += ix; b.vz += iz;
  const sp = Math.abs(vn);
  if (b.standing && sp > 0.3) { b.wx += nz * sp * kAng * 0.7; b.wz += nx * sp * kAng * 0.7; }
  if (a.standing && sp > 0.3) { a.wx += -nz * sp * kAng * 0.7; a.wz += -nx * sp * kAng * 0.7; }
}

// ============================================================ scenes

let scene = 'title';
const hit = [];
function btn(x, y, w, h, id) { hit.push({ x, y, w, h, id }); return { x, y, w, h }; }
function hitTest(mx, my) { for (let i = hit.length - 1; i >= 0; i--) { const b = hit[i]; if (mx > b.x && mx < b.x + b.w && my > b.y && my < b.y + b.h) return b.id; } return null; }

// ---------------- match ----------------
const match = { alien: null, source: 'league', gameIdx: -1, wager: 0, frames: 3, ballsPerFrame: 2,
  frame: 0, ballNo: 0, turn: 'you', youPins: 0, alienPins: 0, phase: 'idle', bannerT: 0, aiTimer: 0, gooNext: false };
function setupLane(alien) { lane.gimmick = alien ? alien.lane : 'normal'; extraFriction = 1; }
function startMatch(alien, source, opts) {
  opts = opts || {};
  match.alien = alien; match.source = source; match.gameIdx = opts.gameIdx ?? -1; match.wager = opts.wager || 0;
  match.frames = source === 'bar' ? 2 : 3; match.ballsPerFrame = 2;
  match.frame = 0; match.ballNo = 0; match.turn = 'you'; match.youPins = 0; match.alienPins = 0;
  match.phase = 'aim'; match.bannerT = 0; match.gooNext = false;
  setupLane(alien); resetRack(); pinsBefore = 10; scene = 'match';
  toast(alien.name + ': ' + alien.quip, 2.6);
}
let pinsBefore = 10, onSettle = null, settleT = 0;
function beginBall() {
  if (match.ballNo === 0) resetRack();
  pinsBefore = pins.filter(p => p.standing).length;
  match.phase = 'aim';
  extraFriction = 1;
  // goo power: foe slimes YOUR next ball
  if (match.turn === 'you' && match.gooNext) { extraFriction = 0.985; match.gooNext = false; toast('slimed! the ball drags…', 1.4); }
  if (match.turn === 'alien') match.aiTimer = 0.7 + rand() * 0.5;
}
function ballsThisFrame() { return (match.turn === 'alien' && match.alien.power === 'extraball') ? 3 : 2; }
function shotSettledMatch(knocked) {
  if (match.turn === 'you') match.youPins += knocked; else match.alienPins += knocked;
  // reset power: after your ball, foe stands one knocked pin back up (if pins remain to clear)
  if (match.turn === 'you' && match.alien.power === 'reset') {
    const downPins = pins.filter(p => !p.standing);
    if (downPins.length && pins.some(p => p.standing)) { const q = pick(downPins); q.standing = true; q.down = false; q.x = q.ox; q.z = q.oz; q.y = 0; q.vx = q.vz = q.vy = 0; q.tx = q.tz = q.wx = q.wz = 0; toast(match.alien.name + ' re-stands a pin!', 1.4); }
  }
  const cleared = pins.every(p => !p.standing);
  const isLast = match.ballNo >= ballsThisFrame() - 1;
  if (cleared || isLast) {
    if (match.turn === 'you') { match.turn = 'alien'; match.ballNo = 0; }
    else { match.turn = 'you'; match.ballNo = 0; match.frame++; if (match.alien.power === 'goo') match.gooNext = true; }
    if (match.frame >= match.frames) { endMatch(); return; }
    match.phase = 'between'; match.bannerT = 0.7;
  } else { match.ballNo++; match.phase = 'between'; match.bannerT = 0.5; }
}
function endMatch() {
  const win = match.youPins > match.alienPins;
  result.win = win; result.alien = match.alien; result.source = match.source;
  result.credits = 0; result.promoted = false; result.champion = false;
  if (match.source === 'league') {
    const g = player.league.games[match.gameIdx];
    g.mine = match.youPins; g.theirs = match.alienPins;
    if (win) { result.credits = 45; addCredits(45); }
    if (seasonComplete()) { player.league.over = true; const pos = myPosition();
      if (pos <= 1) { // promote
        if (player.div < DIVISIONS.length - 1) { player.div++; result.promoted = true; addCredits(120); result.credits += 120; newSeason(); }
        else { player.champion = true; result.champion = true; addCredits(300); result.credits += 300; }
      } else { newSeason(); } // missed promotion, new season
    }
    saveProfile();
  } else { // bar
    if (win) { result.credits = match.wager; addCredits(match.wager); }
    else { result.credits = -match.wager; addCredits(-match.wager); }
    // learn a little from every bar game
    const k = pick(STAT_KEYS); const g = 1 + (win ? 1 : 0); player[k] = clamp(player[k] + g, 0, 100); result.trained = { k, g };
    saveProfile();
  }
  win ? strikeSfx() : tone(140, 0.5, 0.2, 'sawtooth');
  scene = 'result';
}
const result = { win: false, alien: null };

// ---------------- bar ----------------
const bar = { patron: null, wager: 20 };
function enterBar() { bar.patron = pick(BAR_PATRONS); bar.wager = Math.min(20, player.credits); scene = 'bar'; }

// ---------------- training minigames ----------------
const mini = { type: null, stat: null, phase: 'run', gained: 0, round: 0, rounds: 3,
  // bullseye/slalom use ball; power uses mash; speed uses reaction
  targetX: 0, targetDir: 1, best: 999, score: 0,
  gates: [], gatesPassed: 0,
  mashCount: 0, mashT: 0,
  lights: 0, lightT: 0, go: false, goAt: 0, reaction: 0, jump: false,
  flashT: 0 };
function startTrain(stat) {
  mini.type = stat; mini.stat = stat; mini.phase = 'run'; mini.gained = 0; mini.round = 0; mini.flashT = 0;
  lane.gimmick = 'normal'; extraFriction = 1;
  if (stat === 'acc') { mini.rounds = 3; mini.targetX = 0; mini.targetDir = 1; mini.targetZ = 11.0; mini.best = 999; newTrainBall(); }
  else if (stat === 'cur') { mini.rounds = 2; buildGates(); newTrainBall(); }
  else if (stat === 'pow') { mini.rounds = 1; mini.mashCount = 0; mini.mashT = 3.0; mini.phase = 'mash'; }
  else if (stat === 'spd') { mini.rounds = 3; startReaction(); }
  scene = 'train';
}
function newTrainBall() { ball.live = false; mini.subphase = 'aim'; resetRack(); }
function buildGates() {
  mini.gates = []; mini.gatesPassed = 0;
  const zs = [7.5, 11.5, 15.0], offs = [-0.24, 0.22, -0.15], gap = 0.30;
  for (let i = 0; i < 3; i++) mini.gates.push({ z: zs[i], cx: offs[i], gap, passed: false });
}
function startReaction() { mini.phase = 'lights'; mini.lights = 0; mini.lightT = 0.5 + rand()*0.4; mini.go = false; mini.jump = false; mini.goAt = 0; }

function trainBallLaunch(stroke) {
  startShot('you', player, strokeToAim(stroke));
  mini.subphase = 'roll'; mini.rollT = 0; mini.best = 999; if (mini.gates) mini.gates.forEach(g => g.passed = false); mini.gatesPassed = 0;
}
function miniTap() {
  if (mini.type === 'pow') {
    if (mini.phase === 'mash') { mini.mashCount++; mini.flashT = 0.08; tone(200 + mini.mashCount * 6, 0.03, 0.12); }
    else if (mini.phase === 'done') scene = 'career';
    return;
  }
  if (mini.type === 'spd') {
    if (mini.phase === 'lights') { mini.jump = true; mini.phase = 'result'; toast('JUMP START! too early', 1.2); tone(120,0.2,0.2,'sawtooth'); mini.flashT = 0.3; finishReactionRound(0); }
    else if (mini.phase === 'go') { const rt = now() - mini.goAt; finishReactionRound(rt); }
    else if (mini.phase === 'done') scene = 'career';
    return;
  }
  if (mini.phase === 'done') scene = 'career';
}
function finishReactionRound(rt) {
  let pts = 0;
  if (mini.jump) { pts = 0; }
  else { if (rt < 260) { pts = 4; toast('lightning! ' + Math.round(rt) + 'ms', 1.0); } else if (rt < 400) { pts = 2; toast('sharp ' + Math.round(rt) + 'ms', 1.0); } else { pts = 1; toast('ok ' + Math.round(rt) + 'ms', 1.0); } }
  applyGain(pts); mini.round++; mini.jump = false;
  if (mini.round >= mini.rounds) miniDone(); else startReaction();
}
function applyGain(pts) { mini.gained += pts; player[mini.stat] = clamp(player[mini.stat] + pts, 0, 100); saveProfile(); }
function miniDone() { mini.phase = 'done'; if (mini.gained >= 8) tone(720,0.3,0.24); }

function strokeCurve(stroke) {
  let turn = 0, n = 0;
  for (let i = 2; i < stroke.length; i++) {
    const ax = stroke[i-1].x - stroke[i-2].x, ay = stroke[i-1].y - stroke[i-2].y;
    const bx = stroke[i].x - stroke[i-1].x, by = stroke[i].y - stroke[i-1].y;
    const la = len(ax, ay), lb = len(bx, by); if (la < 1 || lb < 1) continue;
    turn += (ax*by - ay*bx) / (la*lb); n++;
  }
  return n ? turn : 0;
}

// ============================================================ input

let drawing = false; const stroke = [];
cv.addEventListener('pointerdown', e => {
  ensureAudio();
  const mx = e.clientX, my = e.clientY, id = hitTest(mx, my);
  if (scene === 'title') { scene = 'career'; return; }
  if (scene === 'career') {
    if (id === 'league') scene = 'league';
    else if (id === 'bar') enterBar();
    else if (id && id.startsWith('train:')) { if (spendEnergy(1)) startTrain(id.split(':')[1]); else toast('no energy — rest a bit or grab a drink at the bar', 2); }
    return;
  }
  if (scene === 'league') {
    if (id === 'back') scene = 'career';
    else if (id && id.startsWith('play:')) { const gi = +id.split(':')[1]; const g = player.league.games[gi];
      if (g.mine !== null) { toast('already played this fixture', 1.5); return; }
      if (spendEnergy(1)) startMatch(curDivision().aliens[g.opp], 'league', { gameIdx: gi }); else toast('no energy — rest or hit the bar', 2); }
    return;
  }
  if (scene === 'bar') {
    if (id === 'back') scene = 'career';
    else if (id === 'wdown') bar.wager = Math.max(10, bar.wager - 10);
    else if (id === 'wup') bar.wager = Math.min(player.credits, bar.wager + 10);
    else if (id === 'drink') { if (player.credits >= 40) { addCredits(-40); player.energy = Math.min(ENERGY_MAX, player.energy + 2); saveProfile(); toast('gulp! +2 energy', 1.4); } else toast('need 40 credits', 1.4); }
    else if (id === 'play') { if (player.credits < bar.wager || bar.wager < 10) { toast('not enough credits', 1.5); return; } if (spendEnergy(1)) startMatch(bar.patron, 'bar', { wager: bar.wager }); else toast('no energy for a game', 1.8); }
    else if (id === 'reroll') enterBar();
    return;
  }
  if (scene === 'train') {
    if ((mini.type === 'acc' || mini.type === 'cur') && mini.subphase === 'aim' && mini.phase === 'run') { drawing = true; stroke.length = 0; stroke.push({ x: mx, y: my }); cv.setPointerCapture(e.pointerId); return; }
    miniTap(); return;
  }
  if (scene === 'result') { scene = match.source === 'league' ? 'league' : 'career'; if (result.champion) scene = 'career'; return; }
  if (scene === 'match') {
    if (match.phase === 'aim' && match.turn === 'you') { drawing = true; stroke.length = 0; stroke.push({ x: mx, y: my }); cv.setPointerCapture(e.pointerId); }
    return;
  }
});
cv.addEventListener('pointermove', e => {
  if (!drawing) return;
  const p = { x: e.clientX, y: e.clientY }, last = stroke[stroke.length - 1];
  if (!last || len(p.x - last.x, p.y - last.y) > 3) stroke.push(p);
});
function endStroke() {
  if (!drawing) return; drawing = false;
  if (stroke.length < 2) return;
  if (scene === 'match') launchPlayerShot();
  else if (scene === 'train') trainBallLaunch(stroke);
}
cv.addEventListener('pointerup', endStroke);
cv.addEventListener('pointercancel', endStroke);

function launchPlayerShot() {
  const aim = strokeToAim(stroke);
  pinsBefore = pins.filter(p => p.standing).length;
  onSettle = shotSettledMatch; settleT = 0; match.phase = 'roll';
  startShot('you', player, aim);
}
function strokeToAim(st) {
  const S = st[0], E = st[st.length - 1];
  let dy = E.y - S.y; if (dy > -20) dy = -20;
  let sl = 0; for (let i = 1; i < st.length; i++) sl += len(st[i].x - st[i-1].x, st[i].y - st[i-1].y);
  const dx = E.x - S.x;
  let curv = strokeCurve(st);
  if (Math.abs(curv) < 0.035) curv = 0; // deadzone: a near-straight swipe rolls straight
  return { aimX: clamp(dx / (W * 0.5) * 0.42, -0.42, 0.42), speed: clamp(sl / H * 20, 7, 13), spin: clamp(curv * 2.4, -2.2, 2.2) };
}
function launchAlienShot() {
  const a = match.alien;
  const pocket = (rand() < 0.5 ? 1 : -1) * 0.07;
  const aim = { aimX: pocket + (rand() - 0.5) * 0.12, speed: 9 + a.spd / 100 * 3, spin: (rand() - 0.5) * 0.6 * (a.cur / 100 + 0.3) };
  pinsBefore = pins.filter(p => p.standing).length;
  onSettle = shotSettledMatch; settleT = 0; match.phase = 'roll';
  startShot('alien', a, aim);
}

// ============================================================ audio

let AC = null, master = null, muted = localStorage.getItem('kp.mute') === '1';
function ensureAudio() { if (AC) return; try { AC = new (window.AudioContext||window.webkitAudioContext)(); master = AC.createGain(); master.gain.value = muted?0:0.5; master.connect(AC.destination); } catch(_){ AC=null; } }
function tone(f, d, v, ty) { if (!AC||muted) return; const o=AC.createOscillator(), g=AC.createGain(); o.type=ty||'triangle'; o.frequency.value=f; g.gain.setValueAtTime(0,AC.currentTime); g.gain.linearRampToValueAtTime(v,AC.currentTime+0.006); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d); o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+d+0.02); }
function rollSfx(){ tone(90,0.5,0.1,'sawtooth'); }
function pinSfx(v){ tone(220+rand()*300,0.06,clamp(0.05+v/3000,0.05,0.2)); }
function strikeSfx(){ tone(400,0.5,0.28); setTimeout(()=>tone(600,0.5,0.24),100); setTimeout(()=>tone(820,0.6,0.22),210); }

// ============================================================ loop

let last = 0, shake = 0, flash = 0, flashCol = '#fff';
const parts = [];
let toastMsg = '', toastT = 0;
function toast(m, t){ toastMsg = m; toastT = t; }
function frame(t) { const dt = last ? Math.min((t - last)/1000, 0.032) : 0.016; last = t; update(dt); render(); requestAnimationFrame(frame); }

function update(dt) {
  shake = Math.max(0, shake - dt*3.5); flash = Math.max(0, flash - dt*3);
  if (toastT > 0) toastT -= dt;
  for (let i = parts.length-1; i>=0; i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.93; p.vy*=0.93; p.life-=dt; if(p.life<=0) parts.splice(i,1); }

  if (scene === 'match') updateMatch(dt);
  else if (scene === 'train') updateTrain(dt);
}

function updateMatch(dt) {
  // moving-pins gimmick: sway standing pins gently while aiming
  if (lane.gimmick === 'moving' && match.phase === 'aim') {
    const t = now()/600;
    for (const p of pins) if (p.standing) { p.x = p.ox + Math.sin(t + p.oz*3.0) * 0.075; }
  }
  if (match.bannerT > 0) { match.bannerT -= dt; if (match.bannerT <= 0 && match.phase === 'between') beginBall(); }
  if (match.phase === 'aim' && match.turn === 'alien') { match.aiTimer -= dt; if (match.aiTimer <= 0) launchAlienShot(); }
  if (match.phase === 'roll') {
    simulate(dt); simulate(dt); // 2 substeps for stability
    const moving = pins.some(p => len(p.vx,p.vz) > 0.05 || Math.hypot(p.wx,p.wz) > 0.15) || (ball.live && len(ball.vx,ball.vz) > 0.1);
    settleT += dt;
    if ((!moving && settleT > 0.4 && !ball.live) || settleT > 4.2) { match.phase = 'settle'; const k = pinsBefore - pins.filter(p=>p.standing).length; ball.live=false; const cb=onSettle; onSettle=null; if(cb) cb(k); }
  }
}

function updateTrain(dt) {
  if (mini.flashT > 0) mini.flashT -= dt;
  if (mini.type === 'acc' || mini.type === 'cur') {
    if (mini.type === 'acc') { mini.targetX += mini.targetDir * 0.5 * dt; if (mini.targetX > 0.34){mini.targetX=0.34;mini.targetDir=-1;} if(mini.targetX<-0.34){mini.targetX=-0.34;mini.targetDir=1;} }
    if (mini.subphase === 'roll' && mini.phase === 'run') {
      mini.rollT = (mini.rollT||0) + dt; stepBall(dt); stepBall(dt);
      if (mini.type === 'acc') { // measure closest pass to target band
        if (Math.abs(ball.z - mini.targetZ) < 0.4) mini.best = Math.min(mini.best, Math.abs(ball.x - mini.targetX));
      } else { // slalom: check gate passes
        for (const g of mini.gates) if (!g.passed && ball.z >= g.z) { const ok = Math.abs(ball.x - g.cx) < g.gap/2; g.passed = ok ? true : 'missed'; if (ok) { mini.gatesPassed++; tone(500,0.08,0.16); const pr = project(g.cx, 0, g.z); burst(pr.x, pr.y, C.cur, 6); } }
      }
      if (!ball.live) scoreTrainRun();
    }
  } else if (mini.type === 'pow') {
    if (mini.phase === 'mash') { mini.mashT -= dt; if (mini.mashT <= 0) { mini.mashT = 0; const pts = clamp(Math.round(mini.mashCount/4), 1, 8); applyGain(pts); toast('POWER +' + pts + '  (' + mini.mashCount + ' mashes)', 2); miniDone(); } }
  } else if (mini.type === 'spd') {
    if (mini.phase === 'lights') { mini.lightT -= dt; if (mini.lightT <= 0) { mini.lights++; if (mini.lights >= 4) { mini.phase = 'go'; mini.go = true; mini.goAt = now(); } else mini.lightT = 0.4 + rand()*0.5; } }
  }
}
function scoreTrainRun() {
  if (mini.type === 'acc') {
    let pts = 0; const b = mini.best;
    if (b < 0.05) { pts = 4; toast('BULLSEYE +4', 1); } else if (b < 0.11) { pts = 2; toast('close +2', 1); } else if (b < 0.2) { pts = 1; toast('grazed +1', 1); } else toast('missed the target', 1);
    applyGain(pts);
  } else {
    const p = mini.gatesPassed, pts = p >= 3 ? 4 : p; applyGain(pts); toast(p + '/3 gates  +' + pts, 1.2);
  }
  mini.round++;
  if (mini.round >= mini.rounds) miniDone(); else { newTrainBall(); }
}

function render() {
  hit.length = 0;
  let ox=0, oy=0; if (shake>0){ ox=(rand()-0.5)*shake*12; oy=(rand()-0.5)*shake*12; }
  cx.save(); cx.translate(ox, oy);
  cx.fillStyle = C.bg; cx.fillRect(-20,-20,W+40,H+40);
  drawStars();
  if (scene === 'title') drawTitle();
  else if (scene === 'career') drawCareer();
  else if (scene === 'league') drawLeague();
  else if (scene === 'bar') drawBar();
  else if (scene === 'train') drawTrain();
  else if (scene === 'match') drawMatch();
  else if (scene === 'result') drawResult();
  cx.restore();
  if (toastT > 0) drawToast();
  if (flash > 0){ cx.globalAlpha=flash*0.3; cx.fillStyle=flashCol; cx.fillRect(0,0,W,H); cx.globalAlpha=1; }
}

      const rb = btn(W/2 - 90, by + 96, 180, 64, 'mash'); panel(rb.x, rb.y, rb.w, rb.h, C.panel2); cx.strokeStyle = C.pow; cx.lineWidth = 3; roundRect(rb.x,rb.y,rb.w,rb.h,14); cx.stroke(); cx.fillStyle = C.pow; cx.font = '800 22px'; cx.fillText('TAP', W/2, by + 96 + 40); }

// ---- shared draw helpers ----
function backBtn() { const r = btn(14, H - 52, 92, 40, 'back'); panel(r.x, r.y, r.w, r.h, C.panel); cx.textAlign='center'; cx.fillStyle = C.dim; cx.font = '700 13px -apple-system, system-ui, sans-serif'; cx.fillText('◂ back', r.x + r.w/2, r.y + 25); cx.textAlign='left'; }
function drawStroke() { cx.strokeStyle = C.guide; cx.lineWidth = 3; cx.lineCap='round'; cx.lineJoin='round'; cx.beginPath(); cx.moveTo(stroke[0].x, stroke[0].y); for (let i=1;i<stroke.length;i++) cx.lineTo(stroke[i].x, stroke[i].y); cx.stroke(); }
function polyPts(pts, fill) { cx.fillStyle = fill; cx.beginPath(); cx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) cx.lineTo(pts[i].x, pts[i].y); cx.closePath(); cx.fill(); }
function drawLane() {
  const g = lane.gimmick;
  let top = '#243257', bot = '#16202f';
  if (g === 'ice') { top = '#3a5a7a'; bot = '#22374d'; }
  else if (g === 'lowgrav') { top = '#2a2350'; bot = '#171232'; }
  else if (g === 'bumpers') { top = '#3a2f52'; bot = '#221b34'; }
  else if (g === 'moving') { top = '#2f3a24'; bot = '#1c2418'; }
  const zEnd = DECK_END + 0.8;
  const c1 = project(-LANE_HALF,0,FOUL), c2 = project(LANE_HALF,0,FOUL), c3 = project(LANE_HALF,0,zEnd), c4 = project(-LANE_HALF,0,zEnd);
  polyPts([project(-LANE_HALF-0.12,0,FOUL), c1, c4, project(-LANE_HALF-0.12,0,zEnd)], C.gutter);
  polyPts([c2, project(LANE_HALF+0.12,0,FOUL), project(LANE_HALF+0.12,0,zEnd), c3], C.gutter);
  const grd = cx.createLinearGradient(0, c3.y, 0, c1.y); grd.addColorStop(0, top); grd.addColorStop(1, bot);
  polyPts([c1, c2, c3, c4], grd);
  if (g === 'bumpers') { cx.strokeStyle = C.gold; cx.globalAlpha = 0.5; cx.lineWidth = 3; cx.beginPath(); cx.moveTo(c1.x,c1.y); cx.lineTo(c4.x,c4.y); cx.moveTo(c2.x,c2.y); cx.lineTo(c3.x,c3.y); cx.stroke(); cx.globalAlpha = 1; }
  cx.strokeStyle = 'rgba(255,255,255,0.05)'; cx.lineWidth = 1;
  for (let i = 1; i < 7; i++) { const xx = -LANE_HALF + LANE_HALF*2*i/7; const a = project(xx,0,FOUL), b = project(xx,0,zEnd); cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y); cx.stroke(); }
  cx.fillStyle = 'rgba(255,255,255,0.14)';
  for (let i = -2; i <= 2; i++) { const a = project(i*0.14,0,4.2); cx.beginPath(); cx.arc(a.x, a.y, Math.max(2, 0.016*a.sc), 0, TAU); cx.fill(); }
  cx.strokeStyle = 'rgba(255,93,115,0.5)'; cx.lineWidth = 3; cx.beginPath(); cx.moveTo(c1.x, c1.y); cx.lineTo(c2.x, c2.y); cx.stroke();
}
function drawPins() { const arr = pins.slice().sort((a, b) => b.z - a.z); for (const p of arr) drawPin3D(p); }
function drawPin3D(p) {
  const mag = Math.hypot(p.tx, p.tz);
  const topY = p.y + PIN_H*Math.cos(Math.min(mag, Math.PI/2));
  const topX = p.x + PIN_H*Math.sin(p.tz);
  const topZ = p.z + PIN_H*Math.sin(p.tx);
  const base = project(p.x, p.y, p.z), top = project(topX, topY, topZ);
  const dx = top.x - base.x, dy = top.y - base.y, L = Math.hypot(dx, dy) || 1;
  const px = -dy/L, py = dx/L, sc = base.sc;
  const wBody = 0.095*sc, wNeck = 0.052*sc, wBase = 0.062*sc;
  const segs = [[0,wBase],[0.22,wBody],[0.34,wBody],[0.6,wNeck],[0.72,wNeck*1.35],[0.9,0.066*sc],[1,0.026*sc]];
  cx.beginPath();
  for (let i = 0; i < segs.length; i++) { const [t,w] = segs[i], cxp = base.x+dx*t, cyp = base.y+dy*t; const X = cxp+px*w, Y = cyp+py*w; if (i===0) cx.moveTo(X,Y); else cx.lineTo(X,Y); }
  for (let i = segs.length-1; i >= 0; i--) { const [t,w] = segs[i], cxp = base.x+dx*t, cyp = base.y+dy*t; cx.lineTo(cxp-px*w, cyp-py*w); }
  cx.closePath();
  cx.fillStyle = p.standing ? '#f5f0e6' : '#cfc9bd'; cx.fill();
  cx.lineWidth = 1; cx.strokeStyle = 'rgba(0,0,0,0.15)'; cx.stroke();
  const s0 = 0.58, s1 = 0.7, a0 = base.x+dx*s0, b0 = base.y+dy*s0, a1 = base.x+dx*s1, b1 = base.y+dy*s1, w0 = wNeck, w1 = wNeck*1.25;
  cx.beginPath(); cx.moveTo(a0+px*w0,b0+py*w0); cx.lineTo(a1+px*w1,b1+py*w1); cx.lineTo(a1-px*w1,b1-py*w1); cx.lineTo(a0-px*w0,b0-py*w0); cx.closePath();
  cx.fillStyle = p.standing ? '#ff5d73' : '#b0455a'; cx.fill();
}
function drawBallAndTrail(forceShow) {
  for (let i = 0; i < trail.length; i++) { const t = i/trail.length, pr = project(trail[i].x, BALL_R*0.6, trail[i].z); cx.globalAlpha = t*0.32; cx.fillStyle = C.ball; cx.beginPath(); cx.arc(pr.x, pr.y, BALL_R*pr.sc*(0.4+t*0.6), 0, TAU); cx.fill(); }
  cx.globalAlpha = 1;
  const show = forceShow || match.phase === 'aim' || match.phase === 'roll' || ball.live;
  if (show) { const pr = project(ball.x, ball.y, ball.z), r = BALL_R*pr.sc; const col = (shotOwner === 'alien' && match.alien && scene === 'match') ? match.alien.color : C.ball; const bg = cx.createRadialGradient(pr.x-r*0.3, pr.y-r*0.35, r*0.1, pr.x, pr.y, r); bg.addColorStop(0, col); bg.addColorStop(1, C.ballDk); cx.fillStyle = bg; cx.beginPath(); cx.arc(pr.x, pr.y, r, 0, TAU); cx.fill(); }
}
function drawAlienFace(x, y, r, a) {
  cx.fillStyle = a.color;
  if (a.face === 'crown') { cx.beginPath(); cx.arc(x,y,r,0,TAU); cx.fill(); cx.fillStyle=C.gold; cx.beginPath(); cx.moveTo(x-r*0.7,y-r*0.8); cx.lineTo(x-r*0.4,y-r*1.4); cx.lineTo(x,y-r*0.9); cx.lineTo(x+r*0.4,y-r*1.4); cx.lineTo(x+r*0.7,y-r*0.8); cx.closePath(); cx.fill(); }
  else { cx.beginPath(); cx.arc(x, y, r, 0, TAU); cx.fill(); }
  cx.fillStyle = '#0a0a14'; const ex = r*0.36, ey = -r*0.1, er = r*0.16;
  cx.beginPath(); cx.arc(x-ex, y+ey, er, 0, TAU); cx.fill(); cx.beginPath(); cx.arc(x+ex, y+ey, er, 0, TAU); cx.fill();
  cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(x-ex+er*0.3, y+ey-er*0.3, er*0.4, 0, TAU); cx.fill(); cx.beginPath(); cx.arc(x+ex+er*0.3, y+ey-er*0.3, er*0.4, 0, TAU); cx.fill();
  if (a.face !== 'crown') { cx.strokeStyle = a.color; cx.lineWidth = 2; cx.beginPath(); cx.moveTo(x, y-r*0.9); cx.lineTo(x-r*0.3, y-r*1.4); cx.stroke(); cx.beginPath(); cx.moveTo(x, y-r*0.9); cx.lineTo(x+r*0.3, y-r*1.4); cx.stroke(); cx.fillStyle = a.color; cx.beginPath(); cx.arc(x-r*0.3, y-r*1.4, r*0.12, 0, TAU); cx.fill(); cx.beginPath(); cx.arc(x+r*0.3, y-r*1.4, r*0.12, 0, TAU); cx.fill(); }
}
function scoreChip(x, y, label, col, val, active) {

function pulseBtn(x, y, w, h, label, col, id) {
  btn(x, y, w, h, id);
  const pulse = 0.5 + 0.5 * Math.sin(now()/350);
  panel(x, y, w, h, C.panel2); cx.globalAlpha = 0.4 + pulse*0.4; cx.strokeStyle = col; cx.lineWidth = 2; roundRect(x, y, w, h, 12); cx.stroke(); cx.globalAlpha = 1;
  cx.textAlign = 'center'; cx.fillStyle = col; cx.font = '700 16px -apple-system, system-ui, sans-serif'; cx.textBaseline = 'middle'; cx.fillText(label, x + w/2, y + h/2); cx.textBaseline = 'alphabetic';
}
function panel(x, y, w, h, fill) { cx.fillStyle = fill; roundRect(x, y, w, h, 12); cx.fill(); cx.strokeStyle = C.stroke; cx.lineWidth = 1; roundRect(x, y, w, h, 12); cx.stroke(); }
function drawToast() {
  cx.globalAlpha = clamp(toastT*1.5, 0, 1); cx.textAlign = 'center'; cx.font = '700 15px -apple-system, system-ui, sans-serif';
  const tw = Math.min(cx.measureText(toastMsg).width + 32, W - 20);
  cx.fillStyle = 'rgba(10,10,20,0.9)'; roundRect(W/2 - tw/2, H*0.87, tw, 36, 10); cx.fill();
  cx.fillStyle = C.text; cx.textBaseline = 'middle'; cx.fillText(toastMsg, W/2, H*0.87 + 18); cx.textBaseline = 'alphabetic'; cx.globalAlpha = 1;
}
function wrapText(t, x, y, maxW, lh) { const words = t.split(' '); let line = '', yy = y; for (const w of words){ const test = line + w + ' '; if (cx.measureText(test).width > maxW && line){ cx.fillText(line.trim(), x, yy); line = w + ' '; yy += lh; } else line = test; } cx.fillText(line.trim(), x, yy); }
function burst(x, y, col, n) { for (let i=0;i<n;i++){ const a=rand()*TAU, s=60+rand()*240; parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4+rand()*0.4, col }); } }
function roundRect(x, y, w, h, r) { cx.beginPath(); cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r); cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath(); }

cv.addEventListener('dblclick', () => { muted = !muted; localStorage.setItem('kp.mute', muted?'1':'0'); if (master) master.gain.value = muted?0:0.5; });

loadProfile();
resize();
buildPins();
requestAnimationFrame(frame);
