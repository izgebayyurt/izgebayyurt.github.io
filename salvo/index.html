<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>salvo</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #14121c; overflow: hidden; }
  canvas { display: block; touch-action: none; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ============================================================ setup

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const TAU = Math.PI * 2;
const rnd = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const dist2 = (ax, ay, bx, by) => (ax - bx) * (ax - bx) + (ay - by) * (ay - by);
const lerp = (a, b, t) => a + (b - a) * t;

// One knob per effect. 0 = off, 1 = shipped feel, >1 = excessive.
const JUICE = {
  shake:     1,   // screen shake from trauma
  hitstop:   1,   // frame freeze on kills / hurt
  particles: 1,   // gib + spark counts
  flash:     1,   // white/red full-screen flashes
  recoil:    1,   // player pushback per shot
  slowmo:    1,   // death slow-motion
};

const COLORS = {
  bg: '#14121c', grid: 'rgba(255,255,255,0.035)',
  player: '#f5f0e6', bullet: '#7df9ff', ebullet: '#ff5252',
  chaser: '#ff4d7d', speedy: '#ffd23f', brute: '#9b5cff',
  splitter: '#3ddc84', mini: '#8ef0b8', spitter: '#ff9f1c',
};

// ============================================================ audio

let AC = null, master = null;
let muted = localStorage.getItem('salvo.mute') === '1';

function audioInit() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain();
    master.gain.value = muted ? 0 : 0.5;
    master.connect(AC.destination);
  }
  if (AC.state === 'suspended') AC.resume();
}
function setMuted(m) {
  muted = m;
  localStorage.setItem('salvo.mute', m ? '1' : '0');
  if (master) master.gain.value = m ? 0 : 0.5;
}
function tone(f0, f1, dur, type, vol, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.02);
}
function noiseHit(dur, vol, f0, f1, delay) {
  if (!AC || muted) return;
  const t = AC.currentTime + (delay || 0);
  const n = (AC.sampleRate * dur) | 0;
  const buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.setValueAtTime((f0 + f1) / 2, t); bp.Q.value = 0.6;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t);
}
const SFX = {
  shoot()  { tone(620 + Math.random() * 160, 210, 0.07, 'square', 0.045); },
  hit()    { tone(340, 170, 0.05, 'triangle', 0.1); },
  boom()   { noiseHit(0.26, 0.32, 90, 1300); tone(150, 40, 0.28, 'sine', 0.28); },
  bigBoom(){ noiseHit(0.5, 0.5, 60, 900); tone(120, 28, 0.5, 'sine', 0.4); },
  hurt()   { tone(210, 52, 0.32, 'sawtooth', 0.26); noiseHit(0.18, 0.2, 100, 800); },
  dash()   { noiseHit(0.11, 0.12, 900, 6000); },
  pickup() { tone(523, 1046, 0.11, 'sine', 0.2); tone(784, 1568, 0.13, 'sine', 0.16, 0.07); },
  nuke()   { noiseHit(0.7, 0.55, 40, 500); tone(85, 24, 0.8, 'sine', 0.45); },
  wave()   { tone(196, 197, 0.12, 'square', 0.1); tone(294, 295, 0.18, 'square', 0.1, 0.13); },
  over()   { tone(392, 90, 1.1, 'sawtooth', 0.2); },
  spit()   { tone(480, 290, 0.08, 'square', 0.07); },
};

// ============================================================ input

const keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false;
const isTouch = 'ontouchstart' in window;
let touchSeen = false;
const sticks = { move: null, aim: null };  // {id, ox, oy, x, y}
const DASH_BTN = () => ({ x: W / 2, y: H - 64, r: 34 });

window.addEventListener('keydown', e => {
  if (e.repeat) return;
  keys[e.code] = true;
  audioInit();
  if (e.code === 'KeyM') setMuted(!muted);
  if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
    e.preventDefault();
    if (state === 'play') tryDash();
  }
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (state === 'play') state = 'pause';
    else if (state === 'pause') state = 'play';
  }
  if (e.code === 'Enter' && (state === 'menu' || state === 'over')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

cv.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
cv.addEventListener('mousedown', e => {
  audioInit();
  if (e.button !== 0) return;
  if (state === 'menu') { startGame(); return; }
  if (state === 'over') { if (overT > 0.6) startGame(); return; }
  if (state === 'pause') { state = 'play'; return; }
  mouseDown = true;
});
window.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('blur', () => { if (state === 'play') state = 'pause'; });

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  audioInit();
  touchSeen = true;
  if (state === 'menu') { startGame(); return; }
  if (state === 'over') { if (overT > 0.6) startGame(); return; }
  if (state === 'pause') { state = 'play'; return; }
  for (const t of e.changedTouches) {
    const b = DASH_BTN();
    if (dist2(t.clientX, t.clientY, b.x, b.y) < b.r * b.r * 2.2) { tryDash(); continue; }
    if (t.clientX < W / 2 && !sticks.move) {
      sticks.move = { id: t.identifier, ox: t.clientX, oy: t.clientY, x: t.clientX, y: t.clientY };
    } else if (!sticks.aim) {
      sticks.aim = { id: t.identifier, ox: t.clientX, oy: t.clientY, x: t.clientX, y: t.clientY };
    }
  }
}, { passive: false });
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    for (const k of ['move', 'aim']) {
      const s = sticks[k];
      if (s && s.id === t.identifier) { s.x = t.clientX; s.y = t.clientY; }
    }
  }
}, { passive: false });
function touchEnd(e) {
  for (const t of e.changedTouches) {
    for (const k of ['move', 'aim']) {
      if (sticks[k] && sticks[k].id === t.identifier) sticks[k] = null;
    }
  }
}
cv.addEventListener('touchend', touchEnd);
cv.addEventListener('touchcancel', touchEnd);

function stickVec(s, dead) {
  if (!s) return null;
  let dx = s.x - s.ox, dy = s.y - s.oy;
  const len = Math.hypot(dx, dy);
  if (len < (dead || 8)) return { x: 0, y: 0, len: 0, a: 0 };
  const m = Math.min(len, 48);
  return { x: dx / len * (m / 48), y: dy / len * (m / 48), len: m / 48, a: Math.atan2(dy, dx) };
}

// ============================================================ state

let state = 'menu';   // menu | play | pause | over
let time = 0;
let freezeT = 0;      // hitstop timer
let trauma = 0;       // screen shake energy
let flashWhite = 0, flashRed = 0;
let score = 0, best = +(localStorage.getItem('salvo.best') || 0);
let bestWave = +(localStorage.getItem('salvo.bestwave') || 0);
let combo = 0, comboT = 0, mult = 1;
let overT = 0, deathSlow = 0;
let hintT = 0;

let P = null;
let bullets = [], ebullets = [], enemies = [], telegraphs = [], particles = [], floaters = [], pickups = [];
let wave = null;

function startGame() {
  P = {
    x: W / 2, y: H / 2, vx: 0, vy: 0, r: 13,
    hp: 3, maxHp: 3, aim: 0, fireCd: 0, iframes: 0,
    dashCd: 0, dashT: 0, shield: 0, muzzle: 0, recoil: 0,
    spread: 0, rapid: 0, ghosts: [],
  };
  bullets = []; ebullets = []; enemies = []; telegraphs = [];
  particles = []; floaters = []; pickups = [];
  score = 0; combo = 0; comboT = 0; mult = 1;
  trauma = 0; freezeT = 0; flashWhite = 0; flashRed = 0; deathSlow = 0;
  hintT = 5;
  wave = { n: 1, budget: 0, spawnT: 0, interval: 1.1, active: false, breatherT: 1.4, bannerT: 1.8 };
  beginWave(1);
  wave.breatherT = 1.4;
  state = 'play';
}

// ============================================================ waves & enemies

const ENEMY_DEFS = {
  chaser:   { r: 13, hp: 2, speed: 115, score: 100, cost: 1,   color: COLORS.chaser,   from: 1 },
  speedy:   { r: 9,  hp: 1, speed: 215, score: 150, cost: 1.5, color: COLORS.speedy,   from: 2 },
  splitter: { r: 16, hp: 3, speed: 95,  score: 200, cost: 2,   color: COLORS.splitter, from: 3 },
  spitter:  { r: 14, hp: 3, speed: 82,  score: 250, cost: 2.5, color: COLORS.spitter,  from: 4 },
  brute:    { r: 26, hp: 9, speed: 55,  score: 450, cost: 4,   color: COLORS.brute,    from: 5 },
  mini:     { r: 8,  hp: 1, speed: 200, score: 50,  cost: 0,   color: COLORS.mini,     from: 99 },
};

function beginWave(n) {
  wave.n = n;
  wave.budget = 6 + n * 3;
  wave.interval = Math.max(0.45, 1.15 - n * 0.04);
  wave.spawnT = 0.4;
  wave.active = false;
  wave.breatherT = 2.2;
  wave.bannerT = 1.8;
  SFX.wave();
}

function pickSpawnPoint() {
  for (let i = 0; i < 12; i++) {
    const side = (Math.random() * 4) | 0;
    const inset = 50;
    let x, y;
    if (side === 0)      { x = rnd(inset, W - inset); y = inset; }
    else if (side === 1) { x = rnd(inset, W - inset); y = H - inset; }
    else if (side === 2) { x = inset; y = rnd(inset, H - inset); }
    else                 { x = W - inset; y = rnd(inset, H - inset); }
    if (dist2(x, y, P.x, P.y) > 240 * 240) return { x, y };
  }
  return { x: 50, y: 50 };
}

function spawnEnemy(type, x, y) {
  const d = ENEMY_DEFS[type];
  const spdBoost = 1 + Math.min(0.55, wave.n * 0.028);
  enemies.push({
    type, x, y, r: d.r, hp: d.hp, maxHp: d.hp,
    speed: d.speed * spdBoost, color: d.color, score: d.score,
    flash: 0, phase: Math.random() * TAU, wfreq: rnd(3, 6),
    fireT: rnd(1.2, 2.2), kx: 0, ky: 0, born: 0,
  });
}

function updateWave(dt) {
  if (!wave.active) {
    wave.breatherT -= dt;
    if (wave.breatherT <= 0) wave.active = true;
    return;
  }
  if (wave.budget > 0) {
    wave.spawnT -= dt;
    if (wave.spawnT <= 0) {
      wave.spawnT = wave.interval;
      const opts = Object.keys(ENEMY_DEFS).filter(k => {
        const d = ENEMY_DEFS[k];
        return d.from <= wave.n && d.cost > 0 && d.cost <= wave.budget;
      });
      if (opts.length) {
        const type = opts[(Math.random() * opts.length) | 0];
        wave.budget -= ENEMY_DEFS[type].cost;
        const p = pickSpawnPoint();
        telegraphs.push({ x: p.x, y: p.y, t: 0.75, type });
      } else {
        wave.budget = 0;
      }
    }
  } else if (enemies.length === 0 && telegraphs.length === 0) {
    beginWave(wave.n + 1);
    if (wave.n - 1 > bestWave) { bestWave = wave.n - 1; localStorage.setItem('salvo.bestwave', bestWave); }
  }
}

// ============================================================ juice helpers

function addTrauma(t) { trauma = Math.min(1, trauma + t * JUICE.shake); }
function hitstop(t)   { freezeT = Math.max(freezeT, t * JUICE.hitstop); }

function burst(x, y, color, n, power) {
  n = Math.round(n * JUICE.particles);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * TAU, s = rnd(40, power);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      r: rnd(1.5, 4.5), life: rnd(0.3, 0.8), maxLife: 0.8,
      color: Math.random() < 0.25 ? '#ffffff' : color, drag: 3.2, kind: 'chunk',
    });
  }
}
function ring(x, y, color, maxR) {
  particles.push({ x, y, r: 4, maxR, life: 0.35, maxLife: 0.35, color, kind: 'ring' });
}
function floater(x, y, txt, color, size) {
  floaters.push({ x, y, txt, color: color || '#fff', size: size || 16, life: 0.9, maxLife: 0.9 });
}

// ============================================================ combat

function tryDash() {
  if (!P || P.dashCd > 0) return;
  let dx = 0, dy = 0;
  const mv = stickVec(sticks.move);
  if (mv && mv.len > 0) { dx = mv.x; dy = mv.y; }
  else {
    if (keys.KeyW || keys.ArrowUp) dy -= 1;
    if (keys.KeyS || keys.ArrowDown) dy += 1;
    if (keys.KeyA || keys.ArrowLeft) dx -= 1;
    if (keys.KeyD || keys.ArrowRight) dx += 1;
  }
  if (!dx && !dy) { dx = Math.cos(P.aim); dy = Math.sin(P.aim); }
  const l = Math.hypot(dx, dy);
  P.vx = dx / l * 860; P.vy = dy / l * 860;
  P.dashT = 0.16; P.dashCd = 1.1; P.iframes = Math.max(P.iframes, 0.22);
  addTrauma(0.12); SFX.dash();
}

function fire() {
  const rate = P.rapid > 0 ? 0.075 : 0.15;
  if (P.fireCd > 0) return;
  P.fireCd = rate;
  const angles = P.spread > 0 ? [-0.2, 0, 0.2] : [0];
  for (const off of angles) {
    const a = P.aim + off + rnd(-0.025, 0.025);
    bullets.push({
      x: P.x + Math.cos(P.aim) * (P.r + 8), y: P.y + Math.sin(P.aim) * (P.r + 8),
      vx: Math.cos(a) * 900, vy: Math.sin(a) * 900, r: 4,
    });
  }
  P.vx -= Math.cos(P.aim) * 26 * JUICE.recoil;
  P.vy -= Math.sin(P.aim) * 26 * JUICE.recoil;
  P.muzzle = 0.05; P.recoil = 4;
  addTrauma(0.022);
  SFX.shoot();
}

function killEnemy(e, quiet) {
  e.dead = true;
  combo += 1; comboT = 1.6;
  mult = Math.min(8, 1 + Math.floor(combo / 4));
  const pts = e.score * mult;
  score += pts;
  floater(e.x, e.y - e.r, '+' + pts, '#fff', e.type === 'brute' ? 22 : 15);
  if (combo > 1 && combo % 4 === 0) floater(P.x, P.y - 34, '×' + mult, '#ffd23f', 24);
  burst(e.x, e.y, e.color, 10 + e.r, 180 + e.r * 8);
  ring(e.x, e.y, e.color, e.r * 3.2);
  if (!quiet) {
    if (e.type === 'brute') { addTrauma(0.5); hitstop(0.09); SFX.bigBoom(); flashWhite = Math.max(flashWhite, 0.18 * JUICE.flash); }
    else { addTrauma(0.16 + e.r * 0.004); hitstop(0.035); SFX.boom(); }
  }
  if (e.type === 'splitter') {
    for (let i = 0; i < 3; i++) {
      const a = Math.random() * TAU;
      spawnEnemy('mini', e.x + Math.cos(a) * 14, e.y + Math.sin(a) * 14);
    }
  }
  const dropChance = e.type === 'brute' ? 1 : 0.08;
  if (Math.random() < dropChance && pickups.length < 3) {
    const kinds = ['triple', 'rapid', 'shield', 'nuke'];
    pickups.push({
      x: e.x, y: e.y, r: 11, kind: kinds[(Math.random() * kinds.length) | 0],
      life: 10, phase: Math.random() * TAU,
    });
  }
}

function hurtPlayer() {
  if (P.iframes > 0 || P.dashT > 0) return;
  if (P.shield > 0) {
    P.shield -= 1;
    P.iframes = 1;
    ring(P.x, P.y, '#7df9ff', 70);
    addTrauma(0.3); SFX.hit();
    return;
  }
  P.hp -= 1;
  P.iframes = 1.3;
  addTrauma(0.65); hitstop(0.07);
  flashRed = Math.max(flashRed, 0.5 * JUICE.flash);
  burst(P.x, P.y, COLORS.player, 16, 260);
  SFX.hurt();
  if (P.hp <= 0) {
    burst(P.x, P.y, COLORS.player, 40, 420);
    ring(P.x, P.y, '#ffffff', 180);
    addTrauma(1); hitstop(0.12);
    deathSlow = 1.2 * JUICE.slowmo;
    SFX.over();
    if (score > best) { best = score; localStorage.setItem('salvo.best', best); }
    overT = 0;
    state = 'over';
  }
}

function nukeAll() {
  flashWhite = Math.max(flashWhite, 0.85 * JUICE.flash);
  addTrauma(0.9); hitstop(0.1); SFX.nuke();
  ring(P.x, P.y, '#ffffff', Math.max(W, H));
  for (const e of enemies) if (!e.dead) killEnemy(e, true);
  enemies = enemies.filter(e => !e.dead);
  ebullets.length = 0;
}

const PICKUP_STYLE = {
  triple: { color: '#7df9ff', label: '3' },
  rapid:  { color: '#ffd23f', label: 'R' },
  shield: { color: '#3ddc84', label: 'S' },
  nuke:   { color: '#ff5252', label: '!' },
};
function applyPickup(p) {
  SFX.pickup();
  ring(P.x, P.y, PICKUP_STYLE[p.kind].color, 60);
  if (p.kind === 'triple') { P.spread = 8; floater(P.x, P.y - 30, 'TRIPLE', '#7df9ff', 18); }
  if (p.kind === 'rapid')  { P.rapid = 8;  floater(P.x, P.y - 30, 'RAPID', '#ffd23f', 18); }
  if (p.kind === 'shield') { P.shield = Math.min(2, P.shield + 1); floater(P.x, P.y - 30, 'SHIELD', '#3ddc84', 18); }
  if (p.kind === 'nuke')   { floater(P.x, P.y - 30, 'NUKE', '#ff5252', 20); nukeAll(); }
}

// ============================================================ update

function update(dt) {
  time += dt;
  hintT -= dt;

  // --- player
  let ax = 0, ay = 0;
  const mv = stickVec(sticks.move);
  if (mv && mv.len > 0) { ax = mv.x; ay = mv.y; }
  else {
    if (keys.KeyW || keys.ArrowUp) ay -= 1;
    if (keys.KeyS || keys.ArrowDown) ay += 1;
    if (keys.KeyA || keys.ArrowLeft) ax -= 1;
    if (keys.KeyD || keys.ArrowRight) ax += 1;
    const l = Math.hypot(ax, ay);
    if (l > 1) { ax /= l; ay /= l; }
  }
  const accel = 2600, maxSpd = 330;
  P.vx += ax * accel * dt; P.vy += ay * accel * dt;
  if (P.dashT <= 0) {
    const spd = Math.hypot(P.vx, P.vy);
    if (spd > maxSpd) { P.vx *= maxSpd / spd; P.vy *= maxSpd / spd; }
    P.vx *= Math.pow(0.0001, dt * (ax || ay ? 0.35 : 1.6));
    P.vy *= Math.pow(0.0001, dt * (ax || ay ? 0.35 : 1.6));
  }
  P.x = clamp(P.x + P.vx * dt, P.r, W - P.r);
  P.y = clamp(P.y + P.vy * dt, P.r, H - P.r);

  const av = stickVec(sticks.aim, 10);
  let firing = mouseDown;
  if (av && av.len > 0.1) { P.aim = av.a; firing = true; }
  else if (!isTouch || !touchSeen) P.aim = Math.atan2(mouseY - P.y, mouseX - P.x);

  P.fireCd -= dt; P.iframes -= dt; P.dashCd -= dt; P.dashT -= dt;
  P.muzzle -= dt; P.recoil = Math.max(0, P.recoil - dt * 40);
  P.spread -= dt; P.rapid -= dt;
  if (firing) fire();
  if (P.dashT > 0) {
    P.ghosts.push({ x: P.x, y: P.y, life: 0.25 });
  }
  for (const g of P.ghosts) g.life -= dt;
  P.ghosts = P.ghosts.filter(g => g.life > 0);

  // --- combo decay
  comboT -= dt;
  if (comboT <= 0 && combo > 0) { combo = 0; mult = 1; }

  // --- waves
  updateWave(dt);

  // --- telegraphs
  for (const t of telegraphs) {
    t.t -= dt;
    if (t.t <= 0) spawnEnemy(t.type, t.x, t.y);
  }
  telegraphs = telegraphs.filter(t => t.t > 0);

  // --- enemies
  for (const e of enemies) {
    e.flash -= dt; e.born += dt;
    let dx = P.x - e.x, dy = P.y - e.y;
    const d = Math.hypot(dx, dy) || 1;
    dx /= d; dy /= d;
    let sx = dx, sy = dy;
    if (e.type === 'spitter') {
      if (d < 210) { sx = -dx; sy = -dy; }
      else if (d < 300) { sx = -dy; sy = dx; }   // strafe
      e.fireT -= dt;
      if (e.fireT <= 0 && d < 560) {
        e.fireT = rnd(1.5, 2.2);
        ebullets.push({ x: e.x, y: e.y, vx: dx * 250, vy: dy * 250, r: 6 });
        SFX.spit();
      }
    }
    const wob = Math.sin(time * e.wfreq + e.phase) * 0.2;
    const wx = -sy * wob, wy = sx * wob;
    e.x += (sx + wx) * e.speed * dt + e.kx * dt;
    e.y += (sy + wy) * e.speed * dt + e.ky * dt;
    e.kx *= Math.pow(0.001, dt); e.ky *= Math.pow(0.001, dt);
    e.x = clamp(e.x, -60, W + 60); e.y = clamp(e.y, -60, H + 60);
  }
  // separation
  for (let i = 0; i < enemies.length; i++) {
    for (let j = i + 1; j < enemies.length; j++) {
      const a = enemies[i], b = enemies[j];
      const min = a.r + b.r;
      const d2 = dist2(a.x, a.y, b.x, b.y);
      if (d2 > 0.01 && d2 < min * min) {
        const d = Math.sqrt(d2), push = (min - d) / d * 0.5;
        const px = (b.x - a.x) * push, py = (b.y - a.y) * push;
        a.x -= px; a.y -= py; b.x += px; b.y += py;
      }
    }
  }

  // --- player bullets
  for (const b of bullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) { b.dead = true; continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      const rr = b.r + e.r;
      if (dist2(b.x, b.y, e.x, e.y) < rr * rr) {
        b.dead = true;
        e.hp -= 1; e.flash = 0.08;
        e.kx += b.vx * 0.14; e.ky += b.vy * 0.14;
        burst(b.x, b.y, e.color, 3, 140);
        if (e.hp <= 0) killEnemy(e);
        else SFX.hit();
        break;
      }
    }
  }
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);

  // --- enemy bullets
  for (const b of ebullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) { b.dead = true; continue; }
    const rr = b.r + P.r - 2;
    if (dist2(b.x, b.y, P.x, P.y) < rr * rr) { b.dead = true; hurtPlayer(); }
  }
  ebullets = ebullets.filter(b => !b.dead);

  // --- contact damage
  for (const e of enemies) {
    const rr = e.r + P.r - 3;
    if (dist2(e.x, e.y, P.x, P.y) < rr * rr) hurtPlayer();
  }

  // --- pickups
  for (const p of pickups) {
    p.life -= dt; p.phase += dt * 4;
    if (p.life <= 0) { p.dead = true; continue; }
    const rr = p.r + P.r + 6;
    if (dist2(p.x, p.y, P.x, P.y) < rr * rr) { p.dead = true; applyPickup(p); }
  }
  pickups = pickups.filter(p => !p.dead);

  updateFx(dt);
}

function updateFx(dt) {
  for (const p of particles) {
    p.life -= dt;
    if (p.kind === 'chunk') {
      p.x += p.vx * dt; p.y += p.vy * dt;
      const f = Math.pow(0.5, dt * p.drag);
      p.vx *= f; p.vy *= f;
    } else if (p.kind === 'ring') {
      p.r = lerp(p.maxR, 4, Math.pow(p.life / p.maxLife, 2));
    }
  }
  particles = particles.filter(p => p.life > 0);
  for (const f of floaters) { f.life -= dt; f.y -= 34 * dt; }
  floaters = floaters.filter(f => f.life > 0);
  trauma = Math.max(0, trauma - dt * 1.5);
  flashWhite = Math.max(0, flashWhite - dt * 2.4);
  flashRed = Math.max(0, flashRed - dt * 1.4);
}

// ============================================================ render

function draw() {
  cx.fillStyle = COLORS.bg;
  cx.fillRect(0, 0, W, H);

  // grid
  cx.strokeStyle = COLORS.grid;
  cx.lineWidth = 1;
  cx.beginPath();
  for (let x = 0.5; x < W; x += 48) { cx.moveTo(x, 0); cx.lineTo(x, H); }
  for (let y = 0.5; y < H; y += 48) { cx.moveTo(0, y); cx.lineTo(W, y); }
  cx.stroke();

  // camera shake
  const sh = trauma * trauma;
  cx.save();
  if (sh > 0.001) {
    cx.translate(rnd(-1, 1) * 22 * sh, rnd(-1, 1) * 22 * sh);
    cx.rotate(rnd(-1, 1) * 0.02 * sh);
  }

  // telegraphs
  for (const t of telegraphs) {
    const d = ENEMY_DEFS[t.type];
    const pulse = 0.5 + 0.5 * Math.sin(time * 18);
    cx.strokeStyle = d.color;
    cx.globalAlpha = 0.25 + 0.45 * pulse;
    cx.lineWidth = 2;
    cx.beginPath();
    cx.arc(t.x, t.y, d.r + 5 + pulse * 4, 0, TAU);
    cx.stroke();
    cx.globalAlpha = 1;
  }

  // pickups
  for (const p of pickups) {
    const st = PICKUP_STYLE[p.kind];
    const bob = Math.sin(p.phase) * 3;
    const blink = p.life < 3 && Math.sin(p.life * 16) > 0;
    if (blink) continue;
    cx.fillStyle = st.color;
    cx.beginPath();
    cx.arc(p.x, p.y + bob, p.r, 0, TAU);
    cx.fill();
    cx.fillStyle = '#14121c';
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(st.label, p.x, p.y + bob + 1);
    cx.strokeStyle = st.color;
    cx.globalAlpha = 0.35;
    cx.beginPath();
    cx.arc(p.x, p.y + bob, p.r + 4 + Math.sin(p.phase * 1.7) * 2, 0, TAU);
    cx.stroke();
    cx.globalAlpha = 1;
  }

  // enemy bullets
  for (const b of ebullets) {
    cx.fillStyle = COLORS.ebullet;
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, TAU); cx.fill();
    cx.globalAlpha = 0.3;
    cx.beginPath(); cx.arc(b.x, b.y, b.r + 3, 0, TAU); cx.fill();
    cx.globalAlpha = 1;
  }

  // enemies
  for (const e of enemies) {
    const squish = 1 + Math.sin(time * e.wfreq * 2 + e.phase) * 0.06;
    const grow = Math.min(1, e.born * 5);
    cx.save();
    cx.translate(e.x, e.y);
    cx.scale(squish * grow, (2 - squish) * grow);
    cx.fillStyle = e.flash > 0 ? '#ffffff' : e.color;
    cx.beginPath(); cx.arc(0, 0, e.r, 0, TAU); cx.fill();
    // eyes: two dots looking at player
    const a = Math.atan2(P.y - e.y, P.x - e.x);
    const ex = Math.cos(a) * e.r * 0.35, ey = Math.sin(a) * e.r * 0.35;
    const er = Math.max(1.5, e.r * 0.14);
    cx.fillStyle = '#14121c';
    cx.beginPath(); cx.arc(ex - Math.sin(a) * e.r * 0.3, ey + Math.cos(a) * e.r * 0.3, er, 0, TAU); cx.fill();
    cx.beginPath(); cx.arc(ex + Math.sin(a) * e.r * 0.3, ey - Math.cos(a) * e.r * 0.3, er, 0, TAU); cx.fill();
    cx.restore();
    if (e.maxHp > 3 && e.hp < e.maxHp) {
      cx.fillStyle = 'rgba(255,255,255,0.2)';
      cx.fillRect(e.x - e.r, e.y - e.r - 8, e.r * 2, 3);
      cx.fillStyle = '#fff';
      cx.fillRect(e.x - e.r, e.y - e.r - 8, e.r * 2 * (e.hp / e.maxHp), 3);
    }
  }

  // player bullets (capsules along velocity)
  cx.strokeStyle = COLORS.bullet;
  cx.lineCap = 'round';
  cx.lineWidth = 5;
  cx.beginPath();
  for (const b of bullets) {
    const l = 0.016;
    cx.moveTo(b.x - b.vx * l, b.y - b.vy * l);
    cx.lineTo(b.x, b.y);
  }
  cx.stroke();

  // player
  if (P && state !== 'over') {
    for (const g of P.ghosts) {
      cx.globalAlpha = g.life * 1.6;
      cx.fillStyle = COLORS.player;
      cx.beginPath(); cx.arc(g.x, g.y, P.r * 0.85, 0, TAU); cx.fill();
    }
    cx.globalAlpha = 1;
    const blink = P.iframes > 0 && Math.sin(P.iframes * 30) > 0;
    cx.globalAlpha = blink ? 0.35 : 1;
    const rx = P.x - Math.cos(P.aim) * P.recoil;
    const ry = P.y - Math.sin(P.aim) * P.recoil;
    // barrel
    cx.strokeStyle = COLORS.player;
    cx.lineWidth = 7;
    cx.beginPath();
    cx.moveTo(rx, ry);
    cx.lineTo(rx + Math.cos(P.aim) * (P.r + 9), ry + Math.sin(P.aim) * (P.r + 9));
    cx.stroke();
    // body
    cx.fillStyle = COLORS.player;
    cx.beginPath(); cx.arc(rx, ry, P.r, 0, TAU); cx.fill();
    cx.fillStyle = '#14121c';
    cx.beginPath(); cx.arc(rx + Math.cos(P.aim) * 4, ry + Math.sin(P.aim) * 4, 4, 0, TAU); cx.fill();
    // muzzle flash
    if (P.muzzle > 0) {
      cx.fillStyle = '#fff';
      cx.globalAlpha = P.muzzle / 0.05;
      cx.beginPath();
      cx.arc(rx + Math.cos(P.aim) * (P.r + 12), ry + Math.sin(P.aim) * (P.r + 12), 7, 0, TAU);
      cx.fill();
    }
    cx.globalAlpha = 1;
    // shield ring
    if (P.shield > 0) {
      cx.strokeStyle = '#3ddc84';
      cx.globalAlpha = 0.5 + Math.sin(time * 5) * 0.2;
      cx.lineWidth = 2.5;
      cx.beginPath(); cx.arc(rx, ry, P.r + 7, 0, TAU); cx.stroke();
      if (P.shield > 1) { cx.beginPath(); cx.arc(rx, ry, P.r + 12, 0, TAU); cx.stroke(); }
      cx.globalAlpha = 1;
    }
  }

  // particles
  for (const p of particles) {
    const a = clamp(p.life / p.maxLife, 0, 1);
    if (p.kind === 'chunk') {
      cx.globalAlpha = a;
      cx.fillStyle = p.color;
      cx.beginPath(); cx.arc(p.x, p.y, p.r * a, 0, TAU); cx.fill();
    } else if (p.kind === 'ring') {
      cx.globalAlpha = a * 0.8;
      cx.strokeStyle = p.color;
      cx.lineWidth = 3 * a;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, TAU); cx.stroke();
    }
  }
  cx.globalAlpha = 1;

  // floaters
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  for (const f of floaters) {
    cx.globalAlpha = clamp(f.life / f.maxLife, 0, 1);
    cx.fillStyle = f.color;
    cx.font = `bold ${f.size}px "Geist Mono", ui-monospace, monospace`;
    cx.fillText(f.txt, f.x, f.y);
  }
  cx.globalAlpha = 1;

  cx.restore(); // end shake

  drawUI();

  // flashes
  if (flashWhite > 0) {
    cx.fillStyle = `rgba(255,255,255,${clamp(flashWhite, 0, 1)})`;
    cx.fillRect(0, 0, W, H);
  }
  if (flashRed > 0) {
    const g = cx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.75);
    g.addColorStop(0, 'rgba(255,40,40,0)');
    g.addColorStop(1, `rgba(255,40,40,${clamp(flashRed, 0, 0.6)})`);
    cx.fillStyle = g;
    cx.fillRect(0, 0, W, H);
  }
}

function drawUI() {
  cx.textAlign = 'center'; cx.textBaseline = 'middle';

  if (state === 'menu') {
    cx.fillStyle = COLORS.player;
    cx.font = 'bold 64px "Geist Mono", ui-monospace, monospace';
    cx.fillText('SALVO', W / 2, H * 0.34);
    cx.fillStyle = 'rgba(245,240,230,0.55)';
    cx.font = '18px "Geist Mono", ui-monospace, monospace';
    cx.fillText('shoot shit. survive waves.', W / 2, H * 0.34 + 52);
    cx.font = '14px "Geist Mono", ui-monospace, monospace';
    const help = isTouch
      ? 'left thumb move · right thumb aim + fire · tap DASH'
      : 'WASD move · mouse aim · hold click to fire · SPACE dash · M mute';
    cx.fillText(help, W / 2, H * 0.34 + 86);
    const pulse = 0.55 + Math.sin(time * 3.5) * 0.3;
    cx.globalAlpha = pulse;
    cx.fillStyle = COLORS.bullet;
    cx.font = 'bold 20px "Geist Mono", ui-monospace, monospace';
    cx.fillText(isTouch ? 'tap to start' : 'click to start', W / 2, H * 0.62);
    cx.globalAlpha = 1;
    if (best > 0) {
      cx.fillStyle = 'rgba(245,240,230,0.4)';
      cx.font = '13px "Geist Mono", ui-monospace, monospace';
      cx.fillText(`best ${best}  ·  wave ${bestWave}`, W / 2, H * 0.62 + 34);
    }
    return;
  }

  // score
  cx.fillStyle = '#fff';
  cx.font = 'bold 30px "Geist Mono", ui-monospace, monospace';
  cx.fillText(score, W / 2, 34);
  if (mult > 1) {
    cx.fillStyle = '#ffd23f';
    cx.font = 'bold 16px "Geist Mono", ui-monospace, monospace';
    cx.fillText('×' + mult, W / 2, 60);
    // combo window bar
    cx.fillStyle = 'rgba(255,210,63,0.35)';
    cx.fillRect(W / 2 - 40, 72, 80 * clamp(comboT / 1.6, 0, 1), 3);
  }

  // hearts
  if (P) {
    for (let i = 0; i < P.maxHp; i++) {
      cx.fillStyle = i < P.hp ? '#ff4d7d' : 'rgba(255,255,255,0.15)';
      const hx = 24 + i * 26, hy = 26;
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(Math.PI / 4);
      cx.fillRect(-7, -7, 14, 14);
      cx.beginPath();
      cx.arc(-7 + 7, -7, 7, 0, TAU); cx.arc(-7, -7 + 7, 7, 0, TAU);
      cx.fill();
      cx.restore();
    }
    // dash cooldown pip
    cx.fillStyle = P.dashCd <= 0 ? COLORS.bullet : 'rgba(255,255,255,0.18)';
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.textAlign = 'left';
    cx.fillText('DASH', 20, 52);
    if (P.dashCd > 0) {
      cx.fillStyle = 'rgba(125,249,255,0.5)';
      cx.fillRect(20, 60, 40 * (1 - clamp(P.dashCd / 1.1, 0, 1)), 3);
    }
    // powerup timers
    let py = 78;
    if (P.spread > 0) { cx.fillStyle = '#7df9ff'; cx.fillText('TRIPLE ' + Math.ceil(P.spread), 20, py); py += 18; }
    if (P.rapid > 0)  { cx.fillStyle = '#ffd23f'; cx.fillText('RAPID ' + Math.ceil(P.rapid), 20, py); }
    cx.textAlign = 'center';
  }

  // wave counter
  cx.fillStyle = 'rgba(245,240,230,0.6)';
  cx.font = 'bold 16px "Geist Mono", ui-monospace, monospace';
  cx.textAlign = 'right';
  cx.fillText('WAVE ' + wave.n, W - 22, 30);
  cx.textAlign = 'center';

  // wave banner
  if (wave.bannerT > 0) {
    wave.bannerT -= 1 / 60; // cosmetic; ok off real dt
    const t = 1.8 - wave.bannerT;
    const scale = t < 0.25 ? 0.6 + (t / 0.25) * 0.5 : 1.1 - Math.min(0.1, (t - 0.25) * 0.4);
    const alpha = wave.bannerT < 0.5 ? wave.bannerT * 2 : 1;
    cx.save();
    cx.translate(W / 2, H * 0.3);
    cx.scale(scale, scale);
    cx.globalAlpha = alpha * 0.9;
    cx.fillStyle = '#fff';
    cx.font = 'bold 44px "Geist Mono", ui-monospace, monospace';
    cx.fillText('WAVE ' + wave.n, 0, 0);
    cx.restore();
    cx.globalAlpha = 1;
  }

  // first-run hint
  if (hintT > 0 && wave.n === 1 && state === 'play') {
    cx.globalAlpha = clamp(hintT, 0, 1) * 0.5;
    cx.fillStyle = '#fff';
    cx.font = '14px "Geist Mono", ui-monospace, monospace';
    cx.fillText(isTouch ? 'thumbs on both halves of the screen' : 'hold click to fire · space to dash', W / 2, H - 40);
    cx.globalAlpha = 1;
  }

  // touch controls
  if (touchSeen && state === 'play') {
    for (const k of ['move', 'aim']) {
      const s = sticks[k];
      if (!s) continue;
      cx.globalAlpha = 0.18;
      cx.fillStyle = '#fff';
      cx.beginPath(); cx.arc(s.ox, s.oy, 48, 0, TAU); cx.fill();
      cx.globalAlpha = 0.35;
      const v = stickVec(s);
      cx.beginPath(); cx.arc(s.ox + v.x * 48, s.oy + v.y * 48, 20, 0, TAU); cx.fill();
      cx.globalAlpha = 1;
    }
    const b = DASH_BTN();
    cx.globalAlpha = P && P.dashCd <= 0 ? 0.5 : 0.15;
    cx.strokeStyle = COLORS.bullet;
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, TAU); cx.stroke();
    cx.fillStyle = COLORS.bullet;
    cx.font = 'bold 12px "Geist Mono", ui-monospace, monospace';
    cx.fillText('DASH', b.x, b.y);
    cx.globalAlpha = 1;
  }

  // mute indicator
  cx.fillStyle = 'rgba(245,240,230,0.35)';
  cx.font = '12px "Geist Mono", ui-monospace, monospace';
  cx.textAlign = 'right';
  cx.fillText(muted ? 'muted · M' : '♪ · M', W - 22, H - 20);
  cx.textAlign = 'center';

  if (state === 'pause') {
    cx.fillStyle = 'rgba(20,18,28,0.75)';
    cx.fillRect(0, 0, W, H);
    cx.fillStyle = '#fff';
    cx.font = 'bold 40px "Geist Mono", ui-monospace, monospace';
    cx.fillText('PAUSED', W / 2, H * 0.42);
    cx.fillStyle = 'rgba(245,240,230,0.55)';
    cx.font = '15px "Geist Mono", ui-monospace, monospace';
    cx.fillText('P / ESC or click to resume', W / 2, H * 0.42 + 44);
  }

  if (state === 'over') {
    cx.fillStyle = `rgba(20,18,28,${clamp(overT * 1.2, 0, 0.7)})`;
    cx.fillRect(0, 0, W, H);
    if (overT > 0.35) {
      cx.fillStyle = '#ff4d7d';
      cx.font = 'bold 52px "Geist Mono", ui-monospace, monospace';
      cx.fillText('WASTED', W / 2, H * 0.36);
      cx.fillStyle = '#fff';
      cx.font = 'bold 26px "Geist Mono", ui-monospace, monospace';
      cx.fillText(score + (score >= best && score > 0 ? '  ★ best' : ''), W / 2, H * 0.36 + 56);
      cx.fillStyle = 'rgba(245,240,230,0.55)';
      cx.font = '15px "Geist Mono", ui-monospace, monospace';
      cx.fillText(`made it to wave ${wave.n}  ·  best ${best}`, W / 2, H * 0.36 + 92);
      if (overT > 0.6) {
        cx.globalAlpha = 0.55 + Math.sin(time * 3.5) * 0.3;
        cx.fillStyle = COLORS.bullet;
        cx.font = 'bold 18px "Geist Mono", ui-monospace, monospace';
        cx.fillText(isTouch ? 'tap to go again' : 'click to go again', W / 2, H * 0.62);
        cx.globalAlpha = 1;
      }
    }
  }
}

// ============================================================ main loop

let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  if (W !== window.innerWidth || H !== window.innerHeight) resize();
  let dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;
  time += state === 'play' ? 0 : dt * 0.2; // keep menu pulses alive

  if (state === 'play' || state === 'over') {
    let scale = 1;
    if (freezeT > 0) { freezeT -= dt; scale = 0.05; }
    if (deathSlow > 0) { deathSlow -= dt; scale = Math.min(scale, 0.18); }
    const sdt = dt * scale;
    if (state === 'play') {
      update(sdt);
    } else {
      overT += dt;
      updateFx(sdt);
      // let stray bullets/enemies drift during the slowmo death
      for (const b of bullets) { b.x += b.vx * sdt; b.y += b.vy * sdt; }
      for (const b of ebullets) { b.x += b.vx * sdt; b.y += b.vy * sdt; }
    }
  }
  draw();
}
requestAnimationFrame(frame);
</script>
