<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Spectra</title>
<style>
  :root{
    --paper:#f4eee1; --paper2:#efe7d8; --surface:#fffdf8; --ink:#2a211a; --ink-dim:#8b8170;
    --hairline:#e4dccb; --shadow:0 10px 26px rgba(60,46,30,.16);
  }
  html,body{margin:0;height:100%;background:var(--paper);overflow:hidden;color:var(--ink);
    font:14px/1.45 ui-rounded,"Segoe UI",system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;}
  #c{position:fixed;inset:0;display:block;cursor:pointer;}
  #top{position:fixed;top:13px;left:0;right:0;z-index:5;display:flex;justify-content:center;gap:9px;align-items:center;}
  #moves{font-weight:800;font-size:14px;color:var(--ink);background:var(--surface);border:1.5px solid var(--hairline);
    border-radius:11px;padding:6px 13px;box-shadow:0 2px 0 var(--hairline);}
  #moves b{color:#c8743f;} #moves .best{color:var(--ink-dim);font-weight:700;margin-left:6px;}
  .btn{background:var(--surface);border:1.5px solid var(--hairline);border-radius:11px;color:var(--ink);
    font:800 13px ui-rounded,system-ui;padding:7px 13px;cursor:pointer;box-shadow:0 2px 0 var(--hairline);}
  .btn:active{transform:translateY(2px);box-shadow:none;}
  .btn.pri{background:#6a45f0;border-color:#5a3ce0;color:#fff;box-shadow:0 2px 0 #4a31c0;}
  #hint{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);z-index:5;color:var(--ink-dim);
    font-size:12.5px;text-align:center;max-width:92%;line-height:1.5;}
  /* level select */
  #select{position:fixed;inset:0;z-index:8;background:var(--paper);overflow-y:auto;display:none;
    flex-direction:column;align-items:center;padding:18px 14px 40px;}
  #select h1{font-size:30px;letter-spacing:.18em;margin:6px 0 18px;font-weight:900;
    background:linear-gradient(90deg,#e2685f,#e0a23a,#5aae6e,#4f86e0,#8a63d8);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #help{position:fixed;top:14px;right:14px;z-index:9;width:38px;height:38px;padding:0;border-radius:50%;font-size:18px;}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,62px);gap:11px;justify-content:center;max-width:520px;width:100%;}
  .lvl{width:62px;height:68px;border-radius:15px;border:2px solid var(--hairline);background:var(--surface);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 4px 0 var(--hairline);position:relative;}
  .lvl:active{transform:translateY(2px);box-shadow:0 2px 0 var(--hairline);}
  .lvl .n{font-size:19px;font-weight:900;color:var(--ink);}
  .lvl .st{font-size:9px;letter-spacing:1px;color:#e0a23a;height:11px;}
  .lvl .tg{position:absolute;top:-6px;right:-5px;width:11px;height:11px;border-radius:50%;border:2px solid var(--paper);}
  .lvl.t0 .tg{background:#5aae6e;} .lvl.t1 .tg{background:#e0a23a;} .lvl.t2 .tg{background:#e2685f;}
  #won{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);z-index:9;text-align:center;opacity:0;
    transition:opacity .3s,transform .3s;pointer-events:none;}
  #won.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
  #won .card{background:var(--surface);border:2px solid var(--hairline);border-radius:20px;padding:24px 32px;box-shadow:var(--shadow);}
  #won h2{margin:0;font-size:25px;letter-spacing:.06em;background:linear-gradient(90deg,#e2685f,#e0a23a,#5aae6e,#4f86e0,#8a63d8);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  #won .stars{font-size:30px;letter-spacing:5px;margin:8px 0;color:#e0a23a;}
  #won p{margin:0 0 16px;color:var(--ink-dim);font-size:13px;}
  #won .row{display:flex;gap:10px;justify-content:center;}
  /* intro card stack */
  #intro{position:fixed;inset:0;z-index:12;background:rgba(40,30,18,.34);display:none;align-items:center;justify-content:center;padding:18px;}
  #intro.show{display:flex;}
  .icard{background:var(--surface);border:2px solid var(--hairline);border-radius:22px;box-shadow:var(--shadow);
    width:min(380px,92vw);padding:22px 22px 18px;display:flex;flex-direction:column;align-items:center;}
  .icard .art{width:100%;}
  .icard .art svg{width:100%;height:auto;display:block;}
  .icard .cap{font-size:15px;font-weight:700;color:var(--ink);text-align:center;margin:14px 6px 4px;min-height:42px;line-height:1.45;}
  .icard .cap b{color:#c8743f;}
  .dots{display:flex;gap:7px;margin:8px 0 14px;}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--hairline);}
  .dots i.on{background:#6a45f0;}
  .inav{display:flex;gap:10px;width:100%;justify-content:space-between;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="top">
    <button class="btn" id="menu">‹ Levels</button>
    <span id="moves"><b id="mv">0</b> moves<span class="best">best <span id="bs">-</span></span></span>
    <button class="btn" id="undo">Undo</button>
    <button class="btn" id="reset">Reset</button>
  </div>
  <div id="hint">Swipe a glass to slide or swap it.</div>

  <div id="select">
    <button class="btn" id="help" title="How to play">?</button>
    <h1>SPECTRA</h1>
    <div id="grid"></div>
  </div>

  <div id="intro"><div class="icard">
    <div class="art" id="iart"></div>
    <div class="cap" id="icap"></div>
    <div class="dots" id="idots"></div>
    <div class="inav"><button class="btn" id="iback">Back</button><button class="btn pri" id="inext">Next ›</button></div>
  </div></div>

  <div id="won"><div class="card"><h2>SOLVED</h2><div class="stars" id="stars">★ ★ ★</div><p id="wsub"></p>
    <div class="row"><button class="btn" id="wmenu">Levels</button><button class="btn pri" id="wnext">Next ›</button></div></div></div>

<script>
(function () {
  'use strict';
  const cv = document.getElementById('c'), ctx = cv.getContext('2d');
  const R = 1, Y = 2, B = 4;
  // High-contrast palette: separated in hue AND value so neighbours read apart.
  // red (dark) vs orange (mid) vs yellow (light); blue (dark) vs green (mid).
  const CMAP = {
    1: [214, 40, 40],    // R  red   (dark)
    2: [248, 208, 50],   // Y  yellow (light)
    4: [38, 92, 206],    // B  blue  (dark)
    3: [242, 128, 24],   // R|Y orange (mid)
    6: [44, 168, 92],    // Y|B green  (mid)
    5: [150, 74, 212],   // R|B purple
    7: [255, 255, 255]   // R|Y|B white
  };
  const drk = (m) => { const c = CMAP[m]; return [c[0] * .55 | 0, c[1] * .55 | 0, c[2] * .55 | 0]; };
  const rgb = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a == null ? 1 : a})`;

  // Baked levels: r rows, c cols, s source mask per row, t target mask per row, g grid (0 = empty), p par.
  const LV = [{"r":2,"c":3,"s":[7,7],"t":[3,1],"g":[[1,1,0],[2,0,0]],"p":1},{"r":2,"c":3,"s":[7,7],"t":[4,6],"g":[[0,4,4],[0,0,2]],"p":1},{"r":2,"c":3,"s":[7,7],"t":[5,2],"g":[[0,1,0],[4,0,2]],"p":1},{"r":2,"c":3,"s":[7,7],"t":[5,1],"g":[[4,0,0],[1,1,0]],"p":1},{"r":2,"c":3,"s":[7,7],"t":[3,4],"g":[[0,4,2],[0,4,1]],"p":2},{"r":2,"c":3,"s":[7,7],"t":[2,1],"g":[[2,4,0],[1,1,0]],"p":2},{"r":2,"c":3,"s":[7,7],"t":[7,1],"g":[[1,0,1],[0,2,4]],"p":2},{"r":2,"c":3,"s":[7,7],"t":[2,5],"g":[[1,2,0],[0,4,2]],"p":2},{"r":3,"c":3,"s":[1,4,1],"t":[1,1,5],"g":[[0,0,0],[4,1,1],[4,2,1]],"p":2},{"r":3,"c":3,"s":[1,7,4],"t":[7,5,2],"g":[[0,2,0],[2,1,4],[4,0,2]],"p":2},{"r":3,"c":3,"s":[4,7,1],"t":[6,7,4],"g":[[4,4,0],[0,0,2],[4,4,2]],"p":2},{"r":3,"c":3,"s":[2,4,2],"t":[2,7,2],"g":[[0,4,2],[1,2,2],[0,0,1]],"p":2},{"r":3,"c":3,"s":[7,7,7],"t":[2,3,4],"g":[[0,2,2],[4,4,1],[2,0,0]],"p":2},{"r":3,"c":3,"s":[2,7,2],"t":[1,6,3],"g":[[0,1,1],[1,2,0],[1,0,4]],"p":2},{"r":3,"c":3,"s":[2,4,4],"t":[2,5,2],"g":[[2,1,0],[2,2,0],[0,1,2]],"p":2},{"r":3,"c":3,"s":[7,2,2],"t":[1,2,3],"g":[[0,0,1],[0,1,1],[2,4,2]],"p":2},{"r":3,"c":3,"s":[4,2,1],"t":[6,2,4],"g":[[0,2,4],[0,2,0],[1,0,4]],"p":3},{"r":3,"c":4,"s":[7,7,7],"t":[4,1,3],"g":[[0,0,1,4],[2,1,0,0],[0,2,1,4]],"p":3},{"r":3,"c":3,"s":[1,1,7],"t":[3,1,4],"g":[[0,1,1],[2,4,0],[4,0,0]],"p":3},{"r":3,"c":4,"s":[2,4,1],"t":[3,1,7],"g":[[0,0,1,2],[1,4,0,0],[2,1,1,0]],"p":3},{"r":3,"c":3,"s":[2,1,2],"t":[3,7,1],"g":[[1,0,0],[1,0,1],[0,4,2]],"p":3},{"r":3,"c":4,"s":[1,4,7],"t":[1,3,5],"g":[[2,2,0,0],[4,0,1,1],[0,4,1,0]],"p":3},{"r":3,"c":3,"s":[7,1,4],"t":[6,1,6],"g":[[2,0,0],[4,2,0],[2,1,0]],"p":3},{"r":3,"c":4,"s":[7,7,7],"t":[7,2,7],"g":[[0,0,2,0],[2,0,1,4],[0,4,1,2]],"p":3},{"r":3,"c":3,"s":[2,4,1],"t":[2,1,5],"g":[[0,1,0],[1,1,0],[4,1,0]],"p":3},{"r":3,"c":4,"s":[2,4,7],"t":[4,2,5],"g":[[0,2,1,4],[2,4,4,0],[0,0,1,0]],"p":3},{"r":3,"c":4,"s":[6,2,1],"t":[5,1,6],"g":[[0,0,1,2],[0,1,0,4],[1,4,4,0]],"p":4},{"r":3,"c":4,"s":[7,4,3],"t":[3,5,2],"g":[[1,4,0,2],[0,1,2,0],[1,0,4,0]],"p":4},{"r":3,"c":4,"s":[1,3,7],"t":[5,2,1],"g":[[0,2,2,0],[0,2,2,4],[0,1,0,1]],"p":4},{"r":3,"c":4,"s":[4,2,3],"t":[5,6,7],"g":[[2,1,4,4],[1,0,4,0],[2,0,0,0]],"p":4},{"r":3,"c":4,"s":[3,3,6],"t":[7,3,6],"g":[[4,2,0,2],[1,0,0,0],[0,4,1,4]],"p":4},{"r":3,"c":4,"s":[4,6,4],"t":[4,3,4],"g":[[1,4,0,2],[0,1,0,4],[0,4,0,2]],"p":4},{"r":3,"c":4,"s":[4,6,3],"t":[1,4,2],"g":[[1,0,0,4],[1,0,0,0],[2,1,2,4]],"p":4},{"r":3,"c":4,"s":[7,1,1],"t":[4,6,1],"g":[[1,4,2,2],[0,4,0,4],[0,0,2,0]],"p":4},{"r":3,"c":4,"s":[5,2,2],"t":[2,3,3],"g":[[2,0,1,0],[1,2,0,2],[2,2,0,0]],"p":4},{"r":3,"c":4,"s":[3,3,1],"t":[7,6,4],"g":[[2,0,4,4],[1,0,0,0],[0,4,1,4]],"p":4},{"r":4,"c":4,"s":[2,2,1,7],"t":[2,2,5,1],"g":[[4,4,2,0],[2,0,2,4],[0,0,0,0],[1,1,4,4]],"p":5},{"r":4,"c":4,"s":[6,7,4,5],"t":[6,6,4,3],"g":[[0,0,2,4],[0,1,4,0],[0,4,4,2],[4,0,2,4]],"p":5},{"r":4,"c":4,"s":[1,3,7,2],"t":[1,7,3,4],"g":[[2,0,1,1],[0,4,4,1],[4,0,0,0],[0,2,4,1]],"p":5},{"r":4,"c":4,"s":[5,3,3,7],"t":[2,5,3,1],"g":[[4,2,0,1],[4,2,4,1],[0,1,0,2],[0,0,2,0]],"p":5},{"r":4,"c":4,"s":[3,1,7,7],"t":[6,5,1,2],"g":[[2,0,4,2],[0,1,0,4],[0,0,2,2],[4,0,1,4]],"p":5},{"r":4,"c":4,"s":[6,7,7,3],"t":[1,1,3,7],"g":[[2,1,0,1],[1,0,1,4],[1,2,2,2],[0,0,0,0]],"p":5},{"r":4,"c":4,"s":[5,4,1,2],"t":[5,4,3,4],"g":[[0,0,4,4],[2,1,4,4],[4,4,0,0],[0,0,2,4]],"p":5},{"r":4,"c":4,"s":[4,1,4,5],"t":[6,5,7,1],"g":[[4,2,0,0],[0,2,4,0],[1,2,0,2],[0,1,2,1]],"p":5},{"r":4,"c":4,"s":[5,1,6,2],"t":[1,1,6,4],"g":[[0,2,0,4],[2,2,4,1],[0,2,0,0],[1,4,0,4]],"p":6},{"r":4,"c":4,"s":[6,1,1,3],"t":[3,1,1,4],"g":[[2,0,4,4],[4,0,1,1],[0,1,0,0],[1,0,1,4]],"p":6},{"r":4,"c":4,"s":[3,2,1,4],"t":[2,6,3,4],"g":[[0,2,1,2],[4,1,0,0],[1,0,0,4],[4,4,0,4]],"p":6},{"r":4,"c":4,"s":[7,2,1,1],"t":[1,3,6,3],"g":[[2,2,1,0],[2,1,0,4],[1,2,2,0],[0,0,0,4]],"p":6},{"r":4,"c":4,"s":[7,1,2,1],"t":[5,1,5,7],"g":[[0,0,0,0],[4,1,4,1],[4,4,0,2],[1,0,1,1]],"p":6},{"r":4,"c":4,"s":[5,6,6,3],"t":[5,3,2,2],"g":[[0,0,0,0],[0,4,2,1],[2,1,2,4],[0,1,1,2]],"p":6}];
  const LEVELS = LV.length;

  let W, H, cs, gx, gy, cols, rows, screen = 'select';
  let grid, tiles, src, tgt, par = 0, moves = 0, history = [], won = false, curLevel = 0;
  let stars = load('spectra_stars_v2'), bestMv = load('spectra_best_v2');
  function load(k) { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch (e) { return []; } }
  function saveS() { try { localStorage.setItem('spectra_stars_v2', JSON.stringify(stars)); } catch (e) {} }
  function saveB() { try { localStorage.setItem('spectra_best_v2', JSON.stringify(bestMv)); } catch (e) {} }

  function layout() {
    W = cv.width = innerWidth; H = cv.height = innerHeight;
    // Reserve full side gutters (~1.5 cells each for source + receiver) so nothing clips off-screen.
    cs = Math.min((W - 24) / (cols + 3.0), (H - 168) / rows, 104);
    gx = (W - cols * cs) / 2; gy = (H - rows * cs) / 2 + 6;
  }
  const cx0 = (c) => gx + c * cs, cy0 = (r) => gy + r * cs, ccx = (c) => gx + (c + .5) * cs, ccy = (r) => gy + (r + .5) * cs;
  const inb = (c, r) => c >= 0 && r >= 0 && c < cols && r < rows;
  const cloneG = (g) => g.map(row => row.slice());

  // ---------- filter model ----------
  // White light takes a glass's colour. A new colour mixes in; a colour already present purifies down to it.
  function rowOut(g, r) { let m = src[r]; for (let c = 0; c < cols; c++) { const p = g[r][c]; if (p) m = (m & p) ? p : (m | p); } return m; }
  function wonG(g) { for (let r = 0; r < rows; r++) { let m = src[r]; for (let c = 0; c < cols; c++) { const p = g[r][c]; if (p) m = (m & p) ? p : (m | p); } if (m !== tgt[r]) return false; } return true; }

  // ---------- level lifecycle ----------
  function openLevel(i) {
    curLevel = i; const L = LV[i];
    rows = L.r; cols = L.c; src = L.s.slice(); tgt = L.t.slice(); grid = cloneG(L.g); par = L.p;
    layout(); moves = 0; history = []; won = false; buildTiles();
    document.getElementById('bs').textContent = bestMv[i] != null ? bestMv[i] : '-';
    document.getElementById('mv').textContent = 0;
    document.getElementById('won').classList.remove('show');
    document.getElementById('select').style.display = 'none';
    document.getElementById('top').style.display = 'flex';
    document.getElementById('hint').style.display = 'block';
    screen = 'play'; aOn();
  }
  function showMenu() {
    screen = 'select';
    document.getElementById('top').style.display = 'none';
    document.getElementById('hint').style.display = 'none';
    document.getElementById('won').classList.remove('show');
    buildGrid(); document.getElementById('select').style.display = 'flex';
  }
  function tierOf(p) { return p <= 2 ? 0 : p <= 4 ? 1 : 2; }
  function buildGrid() {
    const el = document.getElementById('grid'); el.innerHTML = '';
    for (let i = 0; i < LEVELS; i++) {
      const s = stars[i] || 0, d = document.createElement('div'); d.className = 'lvl t' + tierOf(LV[i].p);
      d.innerHTML = `<div class="tg"></div><div class="n">${i + 1}</div><div class="st">${s ? '★'.repeat(s) : ''}</div>`;
      d.onclick = () => openLevel(i); el.appendChild(d);
    }
  }
  function buildTiles() { tiles = []; for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (grid[r][c]) tiles.push({ c, r, col: grid[r][c], x: ccx(c), y: ccy(r) }); }

  // ---------- input ----------
  let down = null;
  cv.addEventListener('pointerdown', e => {
    if (screen !== 'play' || won) return; aOn();
    const c = Math.floor((e.clientX - gx) / cs), r = Math.floor((e.clientY - gy) / cs);
    if (inb(c, r) && grid[r][c]) down = { c, r, x: e.clientX, y: e.clientY };
  });
  cv.addEventListener('pointerup', e => {
    if (!down) return; const dx = e.clientX - down.x, dy = e.clientY - down.y, d = down; down = null;
    if (Math.hypot(dx, dy) < cs * 0.28) return;
    let dc = 0, dr = 0; if (Math.abs(dx) > Math.abs(dy)) dc = dx > 0 ? 1 : -1; else dr = dy > 0 ? 1 : -1;
    const nc = d.c + dc, nr = d.r + dr; if (!inb(nc, nr) || grid[d.r][d.c] === grid[nr][nc]) return;
    doSwap(d.r, d.c, nr, nc);
  });
  function doSwap(r1, c1, r2, c2) {
    history.push(cloneG(grid));
    const t = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = t;
    // Move the actual tile objects by identity (no colour guessing -- fixes the triangular shuffle).
    const a = tiles.find(o => o.c === c1 && o.r === r1), b = tiles.find(o => o.c === c2 && o.r === r2);
    if (a) { a.c = c2; a.r = r2; } if (b) { b.c = c1; b.r = r1; }
    moves++; document.getElementById('mv').textContent = moves; sfx('move');
    if (wonG(grid)) onWin();
  }
  function onWin() {
    won = true;
    const prev = bestMv[curLevel] != null ? bestMv[curLevel] : Infinity;
    const isPB = moves < prev; if (isPB) { bestMv[curLevel] = moves; saveB(); }
    const best = Math.min(moves, prev);
    const s = moves <= par + 1 ? 3 : moves <= Math.ceil(par * 1.8) ? 2 : 1;
    stars[curLevel] = Math.max(stars[curLevel] || 0, s); saveS();
    document.getElementById('stars').textContent = [0, 1, 2].map(i => i < s ? '★' : '☆').join(' ');
    const head = s === 3 ? 'Brilliant, a clean solve!' : s === 2 ? 'Nicely done.' : 'Solved! Fewer moves earns more stars.';
    document.getElementById('wsub').textContent = isPB ? `${head} New best: ${moves} moves.` : `${head} ${moves} moves (best ${best}).`;
    document.getElementById('bs').textContent = best;
    setTimeout(() => document.getElementById('won').classList.add('show'), 360); sfx('win');
  }
  document.getElementById('undo').onclick = () => { if (won || !history.length) return; grid = history.pop(); moves = Math.max(0, moves - 1); document.getElementById('mv').textContent = moves; buildTiles(); };
  document.getElementById('reset').onclick = () => { if (won) return; if (!history.length) return; grid = history[0]; history = []; moves = 0; document.getElementById('mv').textContent = 0; buildTiles(); };
  document.getElementById('menu').onclick = showMenu;
  document.getElementById('wmenu').onclick = showMenu;
  document.getElementById('wnext').onclick = () => openLevel(Math.min(LEVELS - 1, curLevel + 1));

  // ---------- render ----------
  function rr(x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }

  // one beam segment with a soft glow + a solid core outlined so even white reads on paper
  function seg(x0, y0, x1, y1, m, w) {
    const c = CMAP[m];
    ctx.lineCap = 'butt';
    ctx.strokeStyle = rgb(c, .20); ctx.lineWidth = w * 2.4; ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    ctx.strokeStyle = rgb(drk(m), .9); ctx.lineWidth = w + 2.4; ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    ctx.strokeStyle = rgb(c, 1); ctx.lineWidth = w; ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }

  function render() {
    ctx.fillStyle = '#f4eee1'; ctx.fillRect(0, 0, W, H);
    if (screen !== 'play') return;
    const pad = cs * 0.5, gut = cs * 0.62;
    // board panel
    ctx.fillStyle = '#fffdf8'; ctx.strokeStyle = '#e4dccb'; ctx.lineWidth = 2;
    rr(gx - pad, gy - pad, cols * cs + pad * 2, rows * cs + pad * 2, 20); ctx.fill(); ctx.stroke();
    // grid cells (empty slots)
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
      ctx.fillStyle = 'rgba(60,46,30,.035)'; rr(cx0(c) + 4, cy0(r) + 4, cs - 8, cs - 8, 12); ctx.fill();
    }
    const bw = Math.max(5, cs * 0.11);
    const exC = gx - pad - gut, rxC = gx + cols * cs + pad + gut;   // emitter / receiver centres
    const eTip = exC + cs * 0.2, rEdge = rxC - cs * 0.21;           // beam meets the triangle tip and the receiver edge
    for (let r = 0; r < rows; r++) {
      const y = ccy(r); let m = src[r];
      seg(eTip, y, gx, y, m, bw);                                   // from emitter into the board
      for (let c = 0; c < cols; c++) {
        const xl = cx0(c), xm = ccx(c), xr = cx0(c) + cs;
        seg(xl, y, xm, y, m, bw);                                   // pre-tile colour
        const p = grid[r][c]; if (p) m = (m & p) ? p : (m | p);     // glass acts at the cell centre
        seg(xm, y, xr, y, m, bw);                                   // post-tile colour
      }
      seg(gx + cols * cs, y, rEdge, y, m, bw);                      // out to the receiver
      emitter(exC, y, src[r]);
      receiver(rxC, y, m, tgt[r]);
    }
    // glass tiles (tween to cell centres)
    for (const t of tiles) { t.x += (ccx(t.c) - t.x) * 0.34; t.y += (ccy(t.r) - t.y) * 0.34; tile(t.x, t.y, t.col); }
  }

  function tile(x, y, col) {
    const s = cs * 0.74, c = CMAP[col], d = drk(col);
    ctx.save(); ctx.shadowColor = 'rgba(60,46,30,.22)'; ctx.shadowBlur = 9; ctx.shadowOffsetY = 4;
    const g = ctx.createLinearGradient(0, y - s / 2, 0, y + s / 2);
    g.addColorStop(0, rgb([Math.min(255, c[0] + 26), Math.min(255, c[1] + 26), Math.min(255, c[2] + 26)]));
    g.addColorStop(1, rgb(c));
    ctx.fillStyle = g; rr(x - s / 2, y - s / 2, s, s, s * .24); ctx.fill(); ctx.restore();
    ctx.strokeStyle = rgb(d); ctx.lineWidth = Math.max(2, cs * 0.032); rr(x - s / 2, y - s / 2, s, s, s * .24); ctx.stroke();
    // glassy top highlight
    ctx.fillStyle = 'rgba(255,255,255,.4)'; rr(x - s / 2 + s * .14, y - s / 2 + s * .13, s * .42, s * .14, 5); ctx.fill();
  }
  // Emitter: a projector that casts light to the right (triangle). Distinct from the ring receiver.
  function emitter(x, y, m) {
    const c = CMAP[m], d = drk(m), r = cs * .17;
    ctx.beginPath(); ctx.moveTo(x - r * .85, y - r * 1.08); ctx.lineTo(x + r * 1.2, y); ctx.lineTo(x - r * .85, y + r * 1.08); ctx.closePath();
    ctx.lineJoin = 'round'; ctx.fillStyle = rgb(c); ctx.fill();
    ctx.lineWidth = Math.max(2.4, cs * .032); ctx.strokeStyle = rgb(d); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.moveTo(x - r * .5, y - r * .5); ctx.lineTo(x + r * .1, y - r * .12); ctx.lineTo(x - r * .5, y + r * .05); ctx.closePath(); ctx.fill();
  }
  // Receiver: a concentric target ring that fills + checks when satisfied.
  function receiver(x, y, cur, t) {
    const ok = cur === t, c = CMAP[t], d = drk(t), rad = cs * .21;
    if (ok) { ctx.fillStyle = rgb(c, .26); ctx.beginPath(); ctx.arc(x, y, rad * 1.85, 0, 7); ctx.fill(); }
    ctx.beginPath(); ctx.arc(x, y, rad, 0, 7);
    ctx.fillStyle = ok ? rgb(c) : rgb(c, .18); ctx.fill();
    ctx.lineWidth = 3.6; ctx.strokeStyle = ok ? rgb(d) : rgb(d, .7); ctx.stroke();
    if (ok) { ctx.strokeStyle = t === 7 ? '#2a211a' : '#fff'; ctx.lineWidth = 3.6; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath(); ctx.moveTo(x - rad * .42, y); ctx.lineTo(x - rad * .08, y + rad * .38); ctx.lineTo(x + rad * .48, y - rad * .36); ctx.stroke(); }
    else { ctx.beginPath(); ctx.arc(x, y, rad * .46, 0, 7); ctx.lineWidth = 2.6; ctx.strokeStyle = rgb(d, .7); ctx.stroke(); }
  }

  // ---------- intro card stack (visual, minimal text) ----------
  const IHEX = { 1: '#d62828', 2: '#f8d032', 4: '#265ece', 3: '#f2801c', 6: '#2ca85c', 5: '#964ed4', 7: '#ffffff' };
  function dk(hex) { const n = parseInt(hex.slice(1), 16); return `rgb(${(n >> 16 & 255) * .5 | 0},${(n >> 8 & 255) * .5 | 0},${(n & 255) * .5 | 0})`; }
  const svg = (inner, h) => `<svg viewBox="0 0 320 ${h || 120}">${inner}</svg>`;
  // beam bar between two x's
  function ibar(x0, x1, y, m) { return `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${dk(IHEX[m])}" stroke-width="13"/><line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="${IHEX[m]}" stroke-width="8"/>`; }
  function igl(cx, cy, m, s) { s = s || 44; const x = cx - s / 2, yy = cy - s / 2; return `<rect x="${x}" y="${yy}" width="${s}" height="${s}" rx="${s * .27}" fill="${IHEX[m]}" stroke="${dk(IHEX[m])}" stroke-width="3"/><rect x="${x + s * .16}" y="${yy + s * .16}" width="${s * .36}" height="${s * .12}" rx="3" fill="rgba(255,255,255,.55)"/>`; }
  function itri(cx, cy, m) { const r = 16; return `<polygon points="${cx - r * .85},${cy - r * 1.08} ${cx + r * 1.2},${cy} ${cx - r * .85},${cy + r * 1.08}" fill="${IHEX[m]}" stroke="${dk(IHEX[m])}" stroke-width="3" stroke-linejoin="round"/>`; }
  function irc(cx, cy, m, ok, r) { r = r || 17; let s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${ok ? IHEX[m] : 'rgba(60,46,30,.08)'}" stroke="${dk(IHEX[m])}" stroke-width="3"/>`; if (ok) s += `<path d="M ${cx - r * .42} ${cy} L ${cx - r * .1} ${cy + r * .32} L ${cx + r * .48} ${cy - r * .34}" fill="none" stroke="${m === 7 ? '#2a211a' : '#fff'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`; else s += `<circle cx="${cx}" cy="${cy}" r="${r * .42}" fill="none" stroke="${dk(IHEX[m])}" stroke-width="2.4"/>`; return s; }
  function osq(cx, cy, m) { const s = 24, x = cx - s / 2, yy = cy - s / 2; return `<rect x="${x}" y="${yy}" width="${s}" height="${s}" rx="7" fill="${IHEX[m]}" stroke="${dk(IHEX[m])}" stroke-width="2.5"/>`; }
  // one "light -> glass -> result" row
  function eqRow(y, inM, gM, outM) { return ibar(20, 116, y, inM) + igl(126, y, gM, 36) + ibar(144, 214, y, outM) + irc(240, y, outM, true, 16); }
  // full light x glass result chart (screen 5)
  function chart() {
    const glass = [1, 2, 4], inc = [1, 2, 4, 3, 6, 5, 7], colx = [150, 210, 270];
    let s = '<text x="84" y="22" font-size="11" fill="#8b8170" text-anchor="middle">light</text><text x="210" y="22" font-size="11" fill="#8b8170" text-anchor="middle">glass</text>';
    for (let j = 0; j < 3; j++) s += igl(colx[j], 40, glass[j], 30);
    for (let r = 0; r < inc.length; r++) { const y = 78 + r * 30; s += ibar(28, 92, y, inc[r]); for (let j = 0; j < 3; j++) { const out = (inc[r] & glass[j]) ? glass[j] : (inc[r] | glass[j]); s += osq(colx[j], y, out); } }
    return svg(s, 290);
  }
  const CARDS = [
    // 1: emitters & receivers
    { art: svg(itri(30, 54, 7) + ibar(44, 150, 54, 7) + igl(150, 54, 4) + ibar(150, 264, 54, 4) + irc(288, 54, 4, true) +
        '<text x="30" y="92" font-size="12" fill="#8b8170" text-anchor="middle">emitter</text><text x="288" y="92" font-size="12" fill="#8b8170" text-anchor="middle">receiver</text>'),
      cap: 'Light flows from an <b>emitter</b> to a <b>receiver</b>. Direct the correct colour to each receiver.' },
    // 2: moving glass
    { art: svg('<text x="48" y="30" font-size="22">👆</text>' +
        igl(110, 50, 4, 38) + '<text x="158" y="58" font-size="24" fill="#8b8170" text-anchor="middle">→</text>' +
        '<rect x="186" y="31" width="38" height="38" rx="10" fill="none" stroke="#c9bfa9" stroke-width="2.5" stroke-dasharray="5 5"/>' +
        igl(118, 98, 1, 38) + '<text x="160" y="106" font-size="24" fill="#8b8170" text-anchor="middle">⇄</text>' + igl(202, 98, 2, 38)),
      cap: 'Swipe a glass up, down, left or right. It slides into an empty space, or swaps with the tile beside it.' },
    // 3: light changes colour + mixes
    { art: svg(eqRow(28, 7, 1, 1) + eqRow(64, 1, 4, 5) + eqRow(100, 2, 4, 6) + eqRow(136, 1, 2, 3), 162),
      cap: 'Light through a glass changes colour. White takes the glass colour. Two primaries mix: red + blue = purple, yellow + blue = green, red + yellow = orange.' },
    // 4: combination drops back to a component
    { art: svg(eqRow(40, 6, 2, 2) + eqRow(86, 6, 4, 4), 126),
      cap: 'A combined colour passing through one of its parts drops back to that part. Green through yellow is yellow, green through blue is blue.' },
    // 5: full reference chart
    { art: chart(),
      cap: 'Every light and glass combination.' }
  ];
  let icur = 0;
  function renderIntro() {
    document.getElementById('iart').innerHTML = CARDS[icur].art;
    document.getElementById('icap').innerHTML = CARDS[icur].cap;
    document.getElementById('idots').innerHTML = CARDS.map((_, i) => `<i class="${i === icur ? 'on' : ''}"></i>`).join('');
    document.getElementById('iback').style.visibility = icur === 0 ? 'hidden' : 'visible';
    document.getElementById('inext').textContent = icur === CARDS.length - 1 ? 'Play ›' : 'Next ›';
  }
  function openIntro() { icur = 0; renderIntro(); document.getElementById('intro').classList.add('show'); }
  function closeIntro() { document.getElementById('intro').classList.remove('show'); try { localStorage.setItem('spectra_intro_v1', '1'); } catch (e) {} }
  document.getElementById('inext').onclick = () => { if (icur < CARDS.length - 1) { icur++; renderIntro(); } else closeIntro(); };
  document.getElementById('iback').onclick = () => { if (icur > 0) { icur--; renderIntro(); } };
  document.getElementById('help').onclick = openIntro;

  // ---------- audio ----------
  let ac = null; function aOn() { try { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if (ac.state === 'suspended') ac.resume(); } catch (e) {} }
  function tone(f, d, t, g) { if (!ac) return; const o = ac.createOscillator(), n = ac.createGain(), s = ac.currentTime; o.type = t || 'sine'; o.frequency.value = f; n.gain.setValueAtTime(.0001, s); n.gain.exponentialRampToValueAtTime(g || .05, s + .01); n.gain.exponentialRampToValueAtTime(.0001, s + d); o.connect(n); n.connect(ac.destination); o.start(s); o.stop(s + d + .02); }
  function sfx(n) { if (!ac) return; if (n === 'move') tone(440, .05, 'triangle', .03); else if (n === 'win') [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, .3, 'triangle', .05), i * 95)); }

  function loop() { render(); requestAnimationFrame(loop); }
  addEventListener('resize', () => { if (screen === 'play') { layout(); for (const t of (tiles || [])) { t.x = ccx(t.c); t.y = ccy(t.r); } } });
  showMenu();
  let seenIntro = false; try { seenIntro = localStorage.getItem('spectra_intro_v1') === '1'; } catch (e) {}
  if (!seenIntro) openIntro();
  requestAnimationFrame(loop);
  window.__sp = { levels: LEVELS, levelPar: (i) => LV[i].p, open: (i) => openLevel(i), solved: () => wonG(grid), win: () => onWin(),
    swap: (r1, c1, r2, c2) => doSwap(r1, c1, r2, c2), tiles: () => tiles.map(t => ({ c: t.c, r: t.r, col: t.col })), grid: () => grid };
})();
</script>
</body>
