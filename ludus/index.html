<!doctype html>
<!-- LUDUS — a gladiator-school idle game. Recruit fighters, train them, send them
     to the arena, upgrade your ludus, and mourn the ones who don't come back. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#241a15" />
<title>Ludus</title>
<meta name="description" content="Run a gladiator school. Recruit fighters, train them, send them to the arena for glory and gold — an idle game." />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ludus" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23241a15'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle' fill='%23d9a441'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23241a15'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle' fill='%23d9a441'%3E%E2%9A%94%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Load fonts non-render-blocking so the game boots instantly even offline / on a blocked
     network (installable PWA). The CSS font stacks fall back to Georgia until these arrive. -->
<link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Spectral+SC:wght@500;600&display=swap" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Spectral+SC:wght@500;600&display=swap" /></noscript>
<style>
:root{
  --sand:#e7d8bd; --sand2:#efe3cb; --parch:#f4ecd8;
  --dark:#241a15; --ink:#3a2c22; --ink-soft:#6d5b48;
  --line:#c9b592; --line2:#bda37c;
  --blood:#932f22; --blood2:#b2402f;
  --gold:#c8912f; --gold2:#e0b04a;
  --bronze:#9c6b3f;
  --green:#5a7d3c;
  --str:#a5432f; --agi:#3f7a5c; --vit:#8a6a2b;
  --shadow:rgba(36,26,21,.55);
  --font-d:"Cinzel", Georgia, serif;
  --font-sc:"Spectral SC", Georgia, serif;
  --font-b:"Spectral", Georgia, serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.6,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; }
body{
  background:#1c140f;
  color:var(--ink); font-family:var(--font-b);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  -webkit-user-select:none; user-select:none;
  overscroll-behavior:none;
}
#app{
  position:relative; max-width:520px; margin:0 auto; min-height:100%;
  min-height:100dvh; display:flex; flex-direction:column;
  background:var(--sand);
  background-image:
    radial-gradient(rgba(36,26,21,.045) 1px, transparent 1.4px),
    linear-gradient(180deg,#efe3cb,#e3d3b4);
  background-size:6px 6px, 100% 100%;
  box-shadow:0 0 60px rgba(0,0,0,.5);
}

/* ---------- top status bar ---------- */
#top{
  position:sticky; top:0; z-index:20;
  padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
  background:linear-gradient(180deg,#241a15,#2f231b);
  color:var(--sand);
  box-shadow:0 3px 0 var(--gold), 0 6px 16px rgba(0,0,0,.4);
}
#brand{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
#brand h1{
  font-family:var(--font-d); font-weight:700; font-size:19px; letter-spacing:.14em;
  margin:0; color:var(--gold2); text-transform:uppercase;
}
#brand h1 span{ color:var(--sand); opacity:.65; font-size:11px; letter-spacing:.2em; }
#daychip{ font-family:var(--font-sc); font-size:12px; color:var(--sand); opacity:.8; letter-spacing:.08em; }
#stats{ display:flex; gap:8px; margin-top:8px; }
.stat{
  flex:1; background:rgba(0,0,0,.22); border:1px solid rgba(230,216,189,.14);
  border-radius:9px; padding:6px 8px; text-align:center; overflow:hidden;
}
.stat b{ display:block; font-family:var(--font-d); font-size:17px; font-weight:600; line-height:1.1; }
.stat b.bump{ animation:statbump .35s var(--pop); }
@keyframes statbump{ 0%{ transform:scale(1); } 40%{ transform:scale(1.22); } 100%{ transform:scale(1); } }
.stat small{ display:block; font-family:var(--font-sc); font-size:9px; letter-spacing:.14em; opacity:.62; text-transform:uppercase; margin-top:2px; }
.stat.gold b{ color:var(--gold2); }
.stat.fame b{ color:#cf9fb6; }
.stat.pop b{ color:var(--sand); }
#goal{ display:flex; align-items:center; gap:7px; margin-top:8px; padding:6px 11px;
  background:rgba(200,145,47,.14); border:1px solid rgba(200,145,47,.3); border-radius:9px; }
#goal .goal-ic{ color:var(--gold2); font-size:12px; }
#goal #goal-txt{ font-family:var(--font-b); font-size:12.5px; color:var(--sand); opacity:.92; }
#goal #goal-txt b{ color:var(--gold2); font-weight:600; }

/* ---------- main scroll area ---------- */
#main{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 12px 92px; }
.panel{ display:none; animation:fade .28s var(--calm); }
.panel.on{ display:block; }
@keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

.section-h{
  font-family:var(--font-sc); font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--ink-soft); margin:4px 2px 8px; display:flex; align-items:center; gap:8px;
}
.section-h::after{ content:""; flex:1; height:1px; background:var(--line2); opacity:.7; }

/* ---------- cards ---------- */
.card{
  background:var(--parch); border:1.5px solid var(--line);
  border-radius:13px; padding:12px; margin-bottom:11px;
  box-shadow:0 2px 0 var(--line2), 0 5px 14px rgba(36,26,21,.10);
  position:relative; overflow:hidden;
}
.card.flash-win{ animation:flashwin .6s var(--calm); }
.card.flash-lose{ animation:flashlose .6s var(--calm); }
@keyframes flashwin{ 0%{box-shadow:0 0 0 3px var(--gold2), 0 5px 14px rgba(36,26,21,.10);} 100%{box-shadow:0 2px 0 var(--line2), 0 5px 14px rgba(36,26,21,.10);} }
@keyframes flashlose{ 0%{box-shadow:0 0 0 3px var(--blood2), 0 5px 14px rgba(36,26,21,.10);} 100%{box-shadow:0 2px 0 var(--line2), 0 5px 14px rgba(36,26,21,.10);} }

.g-head{ display:flex; align-items:center; gap:10px; }
.g-portrait{
  width:46px; height:46px; flex:none; border-radius:10px;
  background:radial-gradient(circle at 35% 30%, #3a2c22, #241a15);
  display:flex; align-items:center; justify-content:center; font-size:24px;
  border:1.5px solid var(--bronze); box-shadow:inset 0 0 0 2px rgba(200,145,47,.25);
}
.g-name{ font-family:var(--font-d); font-weight:600; font-size:16px; line-height:1.05; color:var(--ink); }
.g-title{ font-family:var(--font-sc); font-size:10.5px; letter-spacing:.1em; color:var(--bronze); text-transform:uppercase; }
.g-meta{ flex:1; min-width:0; }
.g-lvl{
  font-family:var(--font-d); font-size:11px; font-weight:600; color:var(--sand);
  background:var(--bronze); border-radius:20px; padding:2px 9px; white-space:nowrap;
}

/* HP + XP bars */
.bar{ height:7px; border-radius:5px; background:rgba(36,26,21,.13); overflow:hidden; margin-top:3px; }
.bar > i{ display:block; height:100%; border-radius:5px; transition:width .35s var(--calm); }
.bar.hp > i{ background:linear-gradient(90deg,#b2402f,#d06450); }
.bar.xp > i{ background:linear-gradient(90deg,#c8912f,#e0b04a); }
.barrow{ display:flex; align-items:center; gap:7px; margin-top:7px; }
.barrow .lab{ font-family:var(--font-sc); font-size:9px; letter-spacing:.1em; color:var(--ink-soft); width:22px; }
.barrow .bar{ flex:1; margin-top:0; }
.barrow .num{ font-family:var(--font-d); font-size:10px; color:var(--ink-soft); width:auto; white-space:nowrap; }

/* stat pips */
.g-stats{ display:flex; gap:6px; margin-top:9px; }
.pip{
  flex:1; text-align:center; border-radius:8px; padding:5px 2px 4px;
  background:rgba(36,26,21,.05); border:1px solid rgba(36,26,21,.08);
}
.pip b{ display:block; font-family:var(--font-d); font-size:16px; font-weight:600; line-height:1; }
.pip small{ display:block; font-family:var(--font-sc); font-size:8px; letter-spacing:.12em; margin-top:3px; opacity:.7; }
.pip.str b{ color:var(--str);} .pip.agi b{ color:var(--agi);} .pip.vit b{ color:var(--vit);}
.pip.pow{ background:rgba(156,107,63,.12); border-color:rgba(156,107,63,.28); }
.pip.pow b{ color:var(--bronze); }

/* status label */
.g-status{
  position:absolute; top:10px; right:10px;
  font-family:var(--font-sc); font-size:9px; letter-spacing:.12em; text-transform:uppercase;
  padding:2px 8px; border-radius:20px;
}
.st-idle{ background:rgba(36,26,21,.08); color:var(--ink-soft); }
.st-fighting{ background:rgba(147,47,34,.14); color:var(--blood); }
.st-training{ background:rgba(63,122,92,.16); color:var(--agi); }
.st-injured{ background:rgba(120,60,30,.16); color:#8a4a24; }

/* action buttons row */
.g-actions{ display:flex; gap:6px; margin-top:11px; }
.btn{
  font-family:var(--font-sc); font-weight:600; font-size:12px; letter-spacing:.06em;
  border:1.5px solid var(--ink); border-radius:9px; padding:9px 6px; cursor:pointer;
  background:var(--sand2); color:var(--ink); flex:1; text-align:center;
  box-shadow:0 2px 0 var(--line2); transition:transform .05s, box-shadow .05s, background .15s;
  -webkit-user-select:none;
}
.btn:active{ transform:translateY(2px); box-shadow:0 0 0 var(--line2); }
.btn.fight{ background:var(--blood); color:var(--sand); border-color:#5c1c14; box-shadow:0 2px 0 #5c1c14; }
.btn.train{ background:#3f7a5c; color:var(--sand); border-color:#26543c; box-shadow:0 2px 0 #26543c; }
.btn.rest{ background:#8a6a2b; color:var(--sand); border-color:#5f4718; box-shadow:0 2px 0 #5f4718; }
.btn.recall{ background:var(--sand2); }
.btn.gold{ background:var(--gold); color:#2a1e08; border-color:#8a611c; box-shadow:0 2px 0 #8a611c; }
.btn.gearbtn{ background:#5a4a7a; color:var(--sand); border-color:#3a2e52; box-shadow:0 2px 0 #3a2e52; }
.btn[disabled]{ opacity:.42; pointer-events:none; }
.btn small{ display:block; font-family:var(--font-b); font-size:9.5px; font-weight:400; opacity:.85; margin-top:1px; letter-spacing:0; }
.btn.wide{ width:100%; }

/* gear line on card */
.g-gear{ margin-top:9px; font-family:var(--font-b); font-size:11px; color:var(--ink-soft);
  background:rgba(36,26,21,.05); border:1px solid rgba(36,26,21,.07); border-radius:8px; padding:5px 9px; text-align:center; }

/* gear modal slots */
.gslot{ display:flex; align-items:center; gap:10px; text-align:left; padding:9px 2px; border-bottom:1px solid var(--line); }
.gslot:last-of-type{ border-bottom:none; }
.gslot-ic{ font-size:24px; width:34px; text-align:center; flex:none; }
.gslot-body{ flex:1; min-width:0; }
.gslot-name{ font-family:var(--font-d); font-weight:600; font-size:14px; color:var(--ink); }
.gslot-sub{ font-family:var(--font-b); font-size:10.5px; color:var(--ink-soft); margin-top:1px; }
.gslot-btn{ flex:none; min-width:78px; }

/* recruit / empty slot card */
.slot-empty{
  border:1.5px dashed var(--line2); background:rgba(244,236,216,.4);
  text-align:center; padding:18px 12px; border-radius:13px; margin-bottom:11px;
}
.slot-empty .em{ font-size:26px; opacity:.5; }
.slot-empty p{ font-family:var(--font-b); font-size:13px; color:var(--ink-soft); margin:6px 0 11px; }

/* slave market */
.market{ border:1.5px dashed var(--line-2); background:rgba(244,236,216,.45); border-radius:13px; padding:12px; margin-bottom:11px; }
.mk-head{ font-family:var(--font-sc); font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); margin-bottom:10px; }
.mk-head small{ display:block; font-family:var(--font-b); font-size:11px; text-transform:none; letter-spacing:0; color:var(--ink-soft); margin-top:2px; }
.mk-empty{ font-family:var(--font-b); font-style:italic; font-size:12.5px; color:var(--ink-soft); text-align:center; padding:14px 6px; }
.cand{ position:relative; background:var(--parch); border:1.5px solid var(--line); border-radius:11px; padding:11px 12px; margin-bottom:9px; }
.cand-top{ display:flex; gap:9px; align-items:center; }
.g-portrait.csm{ width:38px; height:38px; font-size:20px; border-radius:9px; }
.cand-name{ font-family:var(--font-d); font-weight:600; font-size:15px; color:var(--ink); }
.cand-cls{ font-family:var(--font-sc); font-size:10px; letter-spacing:.08em; color:var(--bronze); text-transform:uppercase; }
.cand-tier{ position:absolute; top:-8px; right:10px; font-family:var(--font-sc); font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; padding:2px 8px; border-radius:20px; font-weight:600; }
.t-raw{ background:var(--sand2); color:var(--ink-soft); border:1px solid var(--line-2); }
.t-promising{ background:#3f7a5c; color:var(--sand); }
.t-exceptional{ background:var(--gold); color:#241a08; box-shadow:0 0 10px rgba(224,176,74,.5); }
.cand-origin{ font-family:var(--font-b); font-style:italic; font-size:11px; color:var(--ink-soft); margin-top:7px; line-height:1.35; }
.cand-stats{ font-family:var(--font-sc); font-size:10.5px; letter-spacing:.05em; color:var(--ink-soft); margin-top:6px; }
.cand-stats b{ font-family:var(--font-d); color:var(--ink); }
.cand .cand-buy{ margin-top:9px; }
.mk-reroll{ width:100%; margin-top:2px; }

/* daily games */
.daily{ background:var(--parch); border:1.5px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:11px;
  box-shadow:0 2px 0 var(--line2); }
.d-head{ font-family:var(--font-sc); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink);
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px; }
.d-streak{ font-family:var(--font-b); font-size:11px; text-transform:none; letter-spacing:0; color:var(--bronze); }
.d-ob{ display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px dashed var(--line); font-family:var(--font-b); font-size:13px; color:var(--ink); }
.d-ob:last-of-type{ border-bottom:none; }
.d-ob .d-check{ font-family:var(--font-d); color:var(--ink-soft); width:16px; text-align:center; flex:none; }
.d-ob.done{ color:var(--ink-soft); }
.d-ob.done .d-check{ color:var(--green); }
.d-ob.done .d-txt{ text-decoration:line-through; opacity:.75; }
.d-ob .d-txt{ flex:1; }
.d-ob .d-prog{ font-family:var(--font-sc); font-size:10.5px; color:var(--ink-soft); letter-spacing:.04em; }
.d-cleared{ font-family:var(--font-b); font-size:12px; color:var(--green); background:rgba(90,125,60,.1);
  border:1px dashed var(--green); border-radius:9px; padding:7px 10px; margin-top:8px; text-align:center; }

/* ---------- arena ---------- */
.opp-card{ text-align:center; }
.opp-portrait{
  width:66px; height:66px; margin:2px auto 8px; border-radius:14px;
  background:radial-gradient(circle at 40% 30%, #4a2620, #2a1512);
  display:flex; align-items:center; justify-content:center; font-size:34px;
  border:2px solid var(--blood); box-shadow:inset 0 0 0 3px rgba(147,47,34,.3);
}
.opp-name{ font-family:var(--font-d); font-weight:700; font-size:18px; color:var(--ink); }
.opp-sub{ font-family:var(--font-sc); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--blood); margin-top:2px; }
.opp-row{ display:flex; justify-content:center; gap:16px; margin:11px 0; }
.opp-row .kv b{ display:block; font-family:var(--font-d); font-size:17px; }
.opp-row .kv small{ display:block; font-family:var(--font-sc); font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.65; }
.tier-nav{ display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:2px; }
.tier-nav button{
  font-family:var(--font-d); font-size:18px; width:38px; height:38px; border-radius:10px;
  border:1.5px solid var(--ink); background:var(--sand2); color:var(--ink); cursor:pointer;
  box-shadow:0 2px 0 var(--line2);
}
.tier-nav button:active{ transform:translateY(2px); box-shadow:none; }
.tier-nav button[disabled]{ opacity:.3; pointer-events:none; }
.tier-lab{ font-family:var(--font-sc); font-size:11px; letter-spacing:.14em; color:var(--ink-soft); min-width:96px; text-align:center; text-transform:uppercase;}
.locked-note{ font-family:var(--font-b); font-style:italic; font-size:12px; color:var(--blood); margin-top:6px;}
.vendetta-note{ font-family:var(--font-sc); font-size:12px; letter-spacing:.06em; color:var(--blood);
  background:rgba(147,47,34,.10); border:1px dashed var(--blood2); border-radius:9px; padding:7px 10px; margin-top:8px; }

/* traits & origin on the roster card */
.g-origin{ font-family:var(--font-b); font-style:italic; font-size:11.5px; color:var(--ink-soft); margin-top:8px; line-height:1.35; }
.g-traits{ display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.tchip{ font-family:var(--font-sc); font-size:10px; letter-spacing:.05em; color:var(--bronze);
  background:rgba(156,107,63,.10); border:1px solid rgba(156,107,63,.35); border-radius:20px; padding:2px 8px; }

/* laurels (achievements) */
.ach-grid{ display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:11px; }
.ach{ display:flex; gap:8px; align-items:center; background:var(--parch); border:1.5px solid var(--line);
  border-radius:10px; padding:7px 9px; }
.ach .a-ic{ font-size:17px; flex:none; }
.ach .a-body b{ display:block; font-family:var(--font-d); font-size:11.5px; font-weight:600; color:var(--ink); line-height:1.15; }
.ach .a-body small{ display:block; font-family:var(--font-b); font-size:9.5px; color:var(--ink-soft); margin-top:1px; line-height:1.2; }
.ach.locked{ opacity:.45; filter:grayscale(.6); }

/* hall of the fallen */
.hall{ margin-bottom:11px; }
.fallen-row{ display:flex; gap:10px; align-items:flex-start; background:var(--parch); border:1.5px solid var(--line);
  border-left:4px solid var(--blood); border-radius:10px; padding:9px 11px; margin-bottom:7px; }
.fallen-row .f-ic{ font-size:20px; flex:none; filter:grayscale(.7); opacity:.8; }
.f-name{ font-family:var(--font-d); font-weight:600; font-size:14px; color:var(--ink); }
.f-sub{ font-family:var(--font-sc); font-size:10px; letter-spacing:.06em; color:var(--bronze); text-transform:uppercase; }
.f-slain{ font-family:var(--font-b); font-size:11.5px; color:var(--ink-soft); margin-top:2px; line-height:1.35; }
.f-slain em{ color:var(--ink-soft); opacity:.85; }
.vendetta-card{ font-family:var(--font-b); font-size:12.5px; color:var(--ink); line-height:1.45;
  background:rgba(147,47,34,.09); border:1.5px dashed var(--blood2); border-radius:11px; padding:10px 13px; margin-bottom:11px; }

.auto-toggle{ display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--parch); border:1.5px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:11px; }
.auto-toggle .t{ font-family:var(--font-sc); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); }
.auto-toggle .t small{ display:block; font-family:var(--font-b); font-size:11px; text-transform:none; letter-spacing:0; color:var(--ink-soft); margin-top:2px;}
.switch{ width:52px; height:30px; border-radius:16px; background:rgba(36,26,21,.18); position:relative; flex:none; cursor:pointer; transition:background .2s;}
.switch::after{ content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:var(--sand); box-shadow:0 1px 3px rgba(0,0,0,.3); transition:left .2s var(--pop);}
.switch.on{ background:var(--green);}
.switch.on::after{ left:25px;}

/* battle log */
#log{ margin-top:4px; }
.log-line{
  font-family:var(--font-b); font-size:12.5px; line-height:1.5; padding:5px 10px; border-radius:8px;
  margin-bottom:5px; border-left:3px solid var(--line2); background:rgba(244,236,216,.55); color:var(--ink);
  animation:logIn .3s var(--calm);
}
@keyframes logIn{ from{opacity:0; transform:translateX(-6px);} to{opacity:1; transform:none;} }
.log-line.win{ border-left-color:var(--gold); }
.log-line.lose{ border-left-color:var(--bronze); }
.log-line.death{ border-left-color:var(--blood); background:rgba(147,47,34,.09); font-weight:600; }
.log-line.level{ border-left-color:var(--green); }
.log-line b{ font-family:var(--font-d); font-weight:600; }
.log-line .cash{ color:var(--gold); font-weight:600; }

/* ---------- facilities ---------- */
.fac{ display:flex; gap:11px; align-items:center; }
.fac .ic{ font-size:28px; width:44px; text-align:center; flex:none; }
.fac .body{ flex:1; min-width:0; }
.fac .fname{ font-family:var(--font-d); font-weight:600; font-size:15px; color:var(--ink); }
.fac .flvl{ font-family:var(--font-sc); font-size:10px; letter-spacing:.1em; color:var(--bronze); text-transform:uppercase; }
.fac .fdesc{ font-family:var(--font-b); font-size:12px; color:var(--ink-soft); margin-top:3px; line-height:1.4; }
.fac .fdesc em{ color:var(--green); font-style:normal; font-weight:600; }
.fac-up{ margin-top:10px; }
.fac.maxed .fdesc em{ color:var(--bronze); }

/* ---------- legacy / prestige ---------- */
.leg-hero{ text-align:center; background:linear-gradient(180deg,#2f231b,#241a15); border-color:#000; }
.leg-glory{ font-family:var(--font-d); font-weight:700; font-size:34px; color:var(--gold2); letter-spacing:.04em; }
.leg-glory-sub{ font-family:var(--font-sc); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--sand); opacity:.8; margin-top:2px; }
.leg-glory-sub b{ color:var(--gold2); }
.leg-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:4px; }
.leg-stat{ display:flex; align-items:center; gap:9px; background:var(--parch); border:1.5px solid var(--line);
  border-radius:11px; padding:9px 11px; box-shadow:0 2px 0 var(--line2); }
.leg-stat .li{ font-size:20px; flex:none; }
.leg-stat b{ display:block; font-family:var(--font-d); font-size:15px; font-weight:600; line-height:1.1; }
.leg-stat small{ display:block; font-family:var(--font-sc); font-size:8.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-top:1px; }
.retire-box{ display:flex; align-items:center; justify-content:center; gap:14px; padding:6px 0 2px; }
.retire-box .rb-num{ font-family:var(--font-d); font-weight:700; font-size:22px; text-align:center; }
.retire-box .rb-lab{ font-family:var(--font-sc); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); text-align:center; margin-top:1px; }
.retire-box .rb-arrow{ font-family:var(--font-d); font-size:22px; color:var(--ink-soft); }
.perk .perk-lv{ font-family:var(--font-sc); font-size:10px; letter-spacing:.06em; color:var(--bronze); text-transform:uppercase; }
.perk .perk-next{ color:var(--green); }
.btn.glory{ background:linear-gradient(180deg,#6a4f9c,#4a3672); color:#f4ecd8; border-color:#2f2352; box-shadow:0 2px 0 #2f2352; min-width:78px; }

/* ---------- bottom nav ---------- */
#nav{
  position:fixed; bottom:0; left:0; right:0; z-index:30; max-width:520px; margin:0 auto;
  display:flex; background:linear-gradient(180deg,#2f231b,#241a15);
  padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);
  box-shadow:0 -3px 0 var(--gold), 0 -6px 18px rgba(0,0,0,.4);
}
.nav-b{
  flex:1; text-align:center; padding:7px 4px; border-radius:11px; cursor:pointer;
  color:rgba(230,216,189,.55); position:relative;
}
.nav-b .ni{ font-size:21px; display:block; line-height:1; filter:grayscale(.4) brightness(.9); }
.nav-b .nl{ font-family:var(--font-sc); font-size:9px; letter-spacing:.14em; text-transform:uppercase; margin-top:3px; display:block; }
.nav-b.on{ color:var(--gold2); background:rgba(0,0,0,.25); }
.nav-b.on .ni{ filter:none; }
.nav-b .badge{
  position:absolute; top:2px; right:calc(50% - 20px); min-width:16px; height:16px; padding:0 4px;
  background:var(--blood2); color:#fff; border-radius:9px; font-family:var(--font-d);
  font-size:10px; line-height:16px; font-weight:600;
}

/* ---------- modal ---------- */
.overlay{
  position:fixed; inset:0; z-index:50; background:rgba(28,20,15,.72);
  display:flex; align-items:center; justify-content:center; padding:22px;
  animation:fade .25s var(--calm);
}
.modal{
  background:var(--parch); border:2px solid var(--gold); border-radius:16px;
  max-width:380px; width:100%; padding:20px; box-shadow:0 12px 40px rgba(0,0,0,.5);
  max-height:86vh; overflow-y:auto; animation:pop .35s var(--pop);
}
@keyframes pop{ from{opacity:0; transform:scale(.9) translateY(12px);} to{opacity:1; transform:none;} }
.modal h2{ font-family:var(--font-d); font-weight:700; font-size:19px; text-align:center; color:var(--ink); margin:0 0 4px; letter-spacing:.06em; }
.modal .sub{ font-family:var(--font-sc); text-align:center; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--bronze); margin-bottom:14px; }
.away-row{ display:flex; justify-content:space-between; align-items:center; padding:8px 2px; border-bottom:1px solid var(--line); font-family:var(--font-b); font-size:14px; }
.away-row:last-child{ border-bottom:none; }
.away-row b{ font-family:var(--font-d); font-size:16px; }
.modal .m-btns{ display:flex; gap:8px; margin-top:16px; }

/* choose stat popup */
.chooser{ display:flex; gap:8px; margin-top:14px; }
.chooser .cbtn{
  flex:1; border:1.5px solid var(--ink); border-radius:11px; padding:12px 6px; cursor:pointer;
  background:var(--sand2); text-align:center; box-shadow:0 2px 0 var(--line2);
}
.chooser .cbtn:active{ transform:translateY(2px); box-shadow:none; }
.chooser .cbtn .ce{ font-size:22px; }
.chooser .cbtn .cn{ font-family:var(--font-d); font-weight:600; font-size:14px; margin-top:4px; }
.chooser .cbtn .cd{ font-family:var(--font-b); font-size:10.5px; color:var(--ink-soft); margin-top:2px; }
.chooser .cbtn.str .cn{ color:var(--str);} .chooser .cbtn.agi .cn{ color:var(--agi);} .chooser .cbtn.vit .cn{ color:var(--vit);}

.empty-note{ text-align:center; font-family:var(--font-b); font-style:italic; color:var(--ink-soft); font-size:13px; padding:30px 20px; }

.reset-link{ text-align:center; margin:18px 0 4px; }
.reset-link button{ background:none; border:none; font-family:var(--font-sc); font-size:10px; letter-spacing:.1em; color:var(--ink-soft); text-decoration:underline; cursor:pointer; opacity:.7; text-transform:uppercase; }

.toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%); z-index:60;
  background:var(--dark); color:var(--sand); font-family:var(--font-b); font-size:13px;
  padding:10px 16px; border-radius:22px; box-shadow:0 6px 20px rgba(0,0,0,.4);
  border:1px solid var(--gold); max-width:88%; text-align:center;
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

/* ============================ DUEL (interactive fight) ============================ */
#duel{
  position:fixed; inset:0; z-index:100; display:none;
  max-width:520px; margin:0 auto;
  flex-direction:column;
  background:
    radial-gradient(120% 60% at 50% 0%, #3a2418 0%, #221510 55%, #170f0a 100%);
  color:var(--sand);
  padding:calc(env(safe-area-inset-top) + 6px) 12px calc(env(safe-area-inset-bottom) + 10px);
  overflow:hidden; touch-action:none;
}
#duel.on{ display:flex; animation:fade .3s var(--calm); }
#duel.shake{ animation:shake .3s; }
@keyframes shake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(3px);} }

/* enemy header */
.duel-ehead{ text-align:center; }
.duel-ehead .en{ font-family:var(--font-d); font-weight:700; font-size:16px; color:#f0c98a; letter-spacing:.06em; }
.duel-ehead .es{ font-family:var(--font-sc); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:#c98a5a; }
.hpbar{ height:15px; border-radius:9px; background:rgba(0,0,0,.4); border:1.5px solid rgba(230,216,189,.2); overflow:hidden; position:relative; margin-top:5px; }
.hpbar i{ position:absolute; left:0; top:0; bottom:0; display:block; }
.hpbar .fill{ z-index:2; transition:width .15s var(--calm); }
.hpbar .ghost{ z-index:1; background:rgba(255,236,200,.55); transition:width .5s ease .3s; }  /* trails behind — recent damage reads as a pale wake */
.hpbar.enemy .fill{ background:linear-gradient(90deg,#7a241a,#c0392b); }
.hpbar.player .fill{ background:linear-gradient(90deg,#3f7a3c,#79b356); }
.hpbar .lab{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-d); font-size:10px; font-weight:600; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.7); letter-spacing:.04em; }

/* stage */
.duel-stage{ flex:1; position:relative; margin:6px 0; min-height:150px; overflow:hidden; }
.floor{ position:absolute; left:0; right:0; bottom:26px; height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,145,47,.5),transparent); }
.floor::after{ content:""; position:absolute; left:6%; right:6%; bottom:-30px; height:34px;
  background:radial-gradient(60% 100% at 50% 0%, rgba(0,0,0,.4), transparent); }
.fighter{
  position:absolute; bottom:26px; width:78px; height:78px; border-radius:16px;
  display:flex; align-items:center; justify-content:center; font-size:42px;
  transition:transform .12s var(--pop), filter .12s; will-change:transform;
}
.fighter.player{ left:8%; background:radial-gradient(circle at 40% 30%, #3a2c22, #1c1410);
  border:2px solid var(--bronze); box-shadow:inset 0 0 0 3px rgba(200,145,47,.25), 0 6px 14px rgba(0,0,0,.5); transform:scaleX(1); }
.fighter.enemy{ left:72%; background:radial-gradient(circle at 40% 30%, #4a2620, #241210);
  border:2px solid var(--blood); box-shadow:inset 0 0 0 3px rgba(147,47,34,.3), 0 6px 14px rgba(0,0,0,.5); transform:scaleX(-1); }
.fighter.enemy.can-hit{ box-shadow:inset 0 0 0 3px rgba(147,47,34,.3), 0 0 16px rgba(224,176,74,.55), 0 6px 14px rgba(0,0,0,.5); }

/* the reach line — how far your blade carries from where you stand */
.reach-zone{ position:absolute; bottom:22px; height:3px; border-radius:2px; pointer-events:none;
  background:linear-gradient(90deg, rgba(200,145,47,.55), rgba(200,145,47,.06)); transition:opacity .2s; }
.reach-zone.hot{ background:linear-gradient(90deg, rgba(224,176,74,.9), rgba(224,176,74,.12)); }

/* movement affordances — hold either side of the arena to walk */
.mv-hint{ position:absolute; bottom:40px; font-family:var(--font-d); font-size:34px;
  color:rgba(230,216,189,.22); pointer-events:none; transition:color .15s, text-shadow .15s; }
.mv-hint.left{ left:6px; } .mv-hint.right{ right:6px; }
.mv-hint.held{ color:rgba(224,176,74,.85); text-shadow:0 0 12px rgba(224,176,74,.5); }

/* impact sparks */
.spark{ position:absolute; width:5px; height:5px; border-radius:50%; background:#ffd15c; pointer-events:none; z-index:6;
  animation:sparkfly .45s ease-out forwards; }
@keyframes sparkfly{ from{ opacity:1; transform:translate(0,0) scale(1); } to{ opacity:0; transform:translate(var(--dx,20px), var(--dy,-40px)) scale(.4); } }

/* full-stage moments */
.stagefx{ position:absolute; inset:0; pointer-events:none; z-index:7; }
.stagefx.roar{ background:radial-gradient(80% 90% at 50% 70%, rgba(224,176,74,.45), transparent 70%); animation:roarfx .9s ease-out forwards; }
.stagefx.mourn{ background:radial-gradient(120% 120% at 50% 50%, transparent 30%, rgba(10,6,4,.85)); animation:mournfx 1.3s ease-in forwards; }
@keyframes roarfx{ 0%{opacity:0;} 18%{opacity:1;} 100%{opacity:0;} }
@keyframes mournfx{ 0%{opacity:0;} 60%{opacity:1;} 100%{opacity:1;} }
.fighter.p-lunge{ transform:translateX(46px); }
.fighter.e-lunge{ transform:scaleX(-1) translateX(46px); }
.fighter.p-hurt{ filter:brightness(2.2) sepia(1) hue-rotate(-35deg) saturate(4); }
.fighter.e-hurt{ filter:brightness(2.2) sepia(1) hue-rotate(-35deg) saturate(4); }
.fighter.p-block{ box-shadow:inset 0 0 0 3px rgba(90,160,220,.9), 0 0 22px rgba(90,160,220,.6), 0 6px 14px rgba(0,0,0,.5); }
.fighter.p-dodge{ opacity:.35; }
.fighter.stagger{ transform:scaleX(-1) rotate(-14deg) translateY(6px); filter:grayscale(.4) brightness(.8); }
.fighter.player.downed{ transform:scaleX(1) rotate(16deg) translateY(10px); filter:grayscale(1) brightness(.45); opacity:.7; }
.fighter.enemy.downed{ transform:scaleX(-1) rotate(16deg) translateY(10px); filter:grayscale(1) brightness(.45); opacity:.7; }

/* enemy telegraph — red ring = heavy (blockable, hurts), yellow = quick jab */
.tele{
  position:absolute; left:72%; bottom:26px; width:78px; height:78px; pointer-events:none;
  display:flex; align-items:flex-start; justify-content:center;
}
.tele .ring{
  position:absolute; inset:-8px; border-radius:22px; border:3px solid #ff5a3c;
  opacity:0; transform:scale(1.35);
}
.tele.jab .ring{ border-color:#f2c94c; }
.tele.on .ring{ animation:tele var(--tdur,0.7s) linear forwards; }
@keyframes tele{ from{opacity:.15; transform:scale(1.45);} to{opacity:.95; transform:scale(1);} }
.tele .bang{ position:absolute; top:-26px; font-size:26px; opacity:0; }
.tele.on .bang{ animation:bang var(--tdur,0.7s) ease-out forwards; }
@keyframes bang{ 0%{opacity:0; transform:translateY(6px) scale(.6);} 30%{opacity:1;} 100%{opacity:1; transform:translateY(-2px) scale(1.1);} }

/* floating combat text */
.float{ position:absolute; font-family:var(--font-d); font-weight:700; font-size:22px; pointer-events:none;
  text-shadow:0 2px 4px rgba(0,0,0,.7); animation:floatUp 0.85s var(--calm) forwards; z-index:5; white-space:nowrap; }
.float.dmg{ color:#ffdf7a; }
.float.pd{ color:#ff6a4a; }
.float.big{ font-size:30px; color:#ff8f5a; }
.float.crit{ color:#ffd15c; font-size:30px; }
.float.miss{ color:#8fd0ff; font-size:18px; }
.float.block{ color:#8fd0ff; font-size:20px; }
.float.heal{ color:#8fe08a; }
@keyframes floatUp{ 0%{opacity:0; transform:translateY(4px) scale(.7);} 20%{opacity:1; transform:translateY(-6px) scale(1.1);} 100%{opacity:0; transform:translateY(-46px) scale(1);} }

/* player HUD */
.duel-phud{ margin-top:2px; }
.duel-phud .pn{ font-family:var(--font-d); font-weight:600; font-size:13px; color:#f4ecd8; display:flex; justify-content:space-between; align-items:baseline; }
.duel-phud .pn small{ font-family:var(--font-sc); font-size:9px; letter-spacing:.12em; color:#c8a05a; }
.stambar{ height:9px; border-radius:6px; background:rgba(0,0,0,.4); border:1px solid rgba(230,216,189,.16); overflow:hidden; margin-top:4px; }
.stambar > i{ display:block; height:100%; background:linear-gradient(90deg,#c8912f,#e6c25a); transition:width .1s linear; }
.stambar.low > i{ background:linear-gradient(90deg,#8a4a24,#b2402f); }

/* control pad */
.duel-pad{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
.dbtn{
  border:2px solid rgba(0,0,0,.5); border-radius:13px; padding:13px 8px; text-align:center; cursor:pointer;
  font-family:var(--font-d); font-weight:600; font-size:15px; color:var(--sand);
  box-shadow:0 3px 0 rgba(0,0,0,.45); transition:transform .05s, box-shadow .05s, filter .1s; position:relative; overflow:hidden;
  -webkit-user-select:none; user-select:none;
}
.dbtn:active{ transform:translateY(3px); box-shadow:0 0 0 rgba(0,0,0,.45); }
.dbtn small{ display:block; font-family:var(--font-b); font-size:9.5px; font-weight:400; opacity:.85; margin-top:1px; }
.dbtn.strike{ background:linear-gradient(180deg,#b2402f,#8a2e22); }
.dbtn.heavy{ background:linear-gradient(180deg,#9c6b3f,#734b28); }
.dbtn.block{ background:linear-gradient(180deg,#3a6f9c,#2a5478); }
.dbtn.dodge{ background:linear-gradient(180deg,#3f7a5c,#2a5540); }
.dbtn.cooling{ filter:grayscale(.6) brightness(.7); pointer-events:none; }
.dbtn.nostam{ filter:grayscale(.7) brightness(.55); }
.dbtn .cd{ position:absolute; left:0; bottom:0; height:3px; background:rgba(255,255,255,.55); width:0%; }

/* signature move button + charge meter */
.dbtn.special{ margin-top:8px; width:100%; background:linear-gradient(180deg,#4a3a68,#2f2547);
  border-color:#1c1430; box-shadow:0 3px 0 #1c1430; font-size:16px; letter-spacing:.04em;
  filter:grayscale(.5) brightness(.72); transition:filter .2s, transform .05s, box-shadow .05s; }
.dbtn.special .charge{ position:absolute; left:0; top:0; bottom:0; width:0%;
  background:linear-gradient(180deg, rgba(224,176,74,.5), rgba(200,145,47,.35)); transition:width .12s linear; }
.dbtn.special .sp-txt{ position:relative; z-index:1; }
.dbtn.special.ready{ filter:none; border-color:var(--gold2);
  box-shadow:0 3px 0 #1c1430, 0 0 18px rgba(224,176,74,.6); animation:spPulse 1s ease-in-out infinite; }
@keyframes spPulse{ 0%,100%{ box-shadow:0 3px 0 #1c1430, 0 0 14px rgba(224,176,74,.45); } 50%{ box-shadow:0 3px 0 #1c1430, 0 0 26px rgba(224,176,74,.85); } }

/* ensnared enemy */
.fighter.netted{ filter:brightness(.7) sepia(.5) hue-rotate(150deg) saturate(1.4); }

/* banner (countdown / FIGHT) */
.duel-banner{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:8; }
.duel-banner span{ font-family:var(--font-d); font-weight:700; font-size:64px; color:var(--gold2);
  text-shadow:0 4px 14px rgba(0,0,0,.7); animation:pop .35s var(--pop); letter-spacing:.05em; }

/* intro + result covers */
.duel-cover{ position:absolute; inset:0; z-index:12; background:rgba(23,15,10,.9);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:26px; }
.duel-cover .big-em{ font-size:66px; margin-bottom:6px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.6)); }
.duel-cover h2{ font-family:var(--font-d); font-weight:700; font-size:26px; margin:0 0 4px; color:var(--gold2); letter-spacing:.06em; }
.duel-cover .cs{ font-family:var(--font-sc); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#c98a5a; margin-bottom:16px; }
.duel-cover .vs-stats{ display:flex; gap:22px; justify-content:center; margin:6px 0 16px; }
.duel-cover .vs-stats .kv b{ display:block; font-family:var(--font-d); font-size:20px; }
.duel-cover .vs-stats .kv small{ display:block; font-family:var(--font-sc); font-size:9px; letter-spacing:.1em; text-transform:uppercase; opacity:.7; }
.duel-cover .tier-nav .tier-lab{ color:#e7d8bd; }
.duel-cover .tier-nav button{ background:#2f231b; color:var(--sand); border-color:#000; }
.duel-cover .reward-list{ width:100%; max-width:260px; margin:2px 0 14px; }
.duel-cover .away-row{ color:var(--sand); border-color:rgba(230,216,189,.18); }
.dcbtn{ font-family:var(--font-d); font-weight:600; font-size:16px; padding:13px 20px; border-radius:12px; cursor:pointer;
  border:2px solid rgba(0,0,0,.5); box-shadow:0 3px 0 rgba(0,0,0,.4); color:var(--sand); min-width:150px; }
.dcbtn:active{ transform:translateY(3px); box-shadow:none; }
.dcbtn.go{ background:linear-gradient(180deg,#b2402f,#8a2e22); }
.dcbtn.again{ background:linear-gradient(180deg,#3f7a5c,#2a5540); }
.dcbtn.leave{ background:#2f231b; }
.duel-cover .btn-col{ display:flex; flex-direction:column; gap:9px; align-items:center; }
.hint{ font-family:var(--font-b); font-style:italic; font-size:11.5px; color:#b89a72; margin-top:12px; max-width:280px; line-height:1.5; }
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <div id="brand">
      <h1>Ludus <span>· ARENA IDLE</span></h1>
      <div id="daychip">Day 1</div>
    </div>
    <div id="stats">
      <div class="stat gold"><b id="s-gold">0</b><small>Denarii</small></div>
      <div class="stat fame"><b id="s-fame">0</b><small>Fame</small></div>
      <div class="stat pop"><b id="s-pop">0/1</b><small>Stable</small></div>
    </div>
    <div id="goal"><span class="goal-ic">◗</span><span id="goal-txt">—</span></div>
  </div>

  <div id="main">
    <!-- ARENA -->
    <div class="panel" id="p-arena">
      <div class="section-h">The Arena</div>
      <div class="card opp-card" id="opp-card"></div>

      <div class="auto-toggle" id="auto-toggle">
        <div class="t">Auto-Battle
          <small>Idle fighters keep entering the arena on their own.</small>

<script>
'use strict';
(function(){

/* ============================ CONFIG ============================ */
const SAVE_KEY = 'ludus.save.v1';
const TICK_MS = 1000;                 // one game tick
const MAX_OFFLINE_H = 24;             // cap offline catch-up (daily check-in friendly)
const XP_FOR = lvl => Math.round(60 * Math.pow(1.55, lvl-1));

const NAMES = ['Flamma','Crixus','Verus','Priscus','Spiculus','Hermes','Tetraites','Rutuba',
  'Celadus','Columbus','Pugnax','Crescens','Triumphus','Draco','Ferox','Glaucus','Marius',

  {w:30,t:'Champion'}, {w:55,t:'Legend'}, {w:90,t:'Immortal'} ];
const PORTRAITS = ['🗡️','⚔️','🛡️','🪓','🔱','🏹','🤺','💪'];

// Gladiator classes — each leans the stat roll and gives a distinct duel feel.
// lean: bonus starting stats · hpMul: max-HP scale · duel knobs (block/dodge/riposte/strike).
const CLASSES = {
  murmillo:   { name:'Murmillo',    ic:'🛡️', blurb:'Heavy shield, iron nerve',
                lean:{str:2,agi:0,vit:4}, hpMul:1.18, block:1.6, dodge:0.9,  riposte:1.0, strikeMul:1.0,  strikeCd:1.12, reach:0.95 },
  thraex:     { name:'Thraex',      ic:'🗡️', blurb:'Curved sica, relentless',
                lean:{str:4,agi:1,vit:1}, hpMul:1.02, block:1.05, dodge:1.0, riposte:1.0, strikeMul:1.15, strikeCd:0.98, reach:1.0 },
  retiarius:  { name:'Retiarius',   ic:'🔱', blurb:'Net and trident, elusive',
                lean:{str:1,agi:4,vit:0}, hpMul:0.94, block:0.8, dodge:1.4,  riposte:1.25, strikeMul:1.0, strikeCd:0.9, reach:1.5 },
  secutor:    { name:'Secutor',     ic:'⚔️', blurb:'Patient hunter, deadly counter',
                lean:{str:2,agi:2,vit:2}, hpMul:1.06, block:1.2, dodge:1.1,  riposte:1.5, strikeMul:1.0,  strikeCd:1.0, reach:1.1 },
  dimachaerus:{ name:'Dimachaerus', ic:'🤺', blurb:'Twin blades, no guard',
                lean:{str:3,agi:3,vit:0}, hpMul:0.9,  block:0.55, dodge:1.0, riposte:1.0, strikeMul:1.12, strikeCd:0.7, reach:0.85 },
};
const CLASS_IDS = Object.keys(CLASSES);
const clsOf = g => CLASSES[g.cls] || CLASSES.thraex;

// Class signature moves — fired from the duel once the charge meter is full.
const SPECIALS = {

  thraex:     { name:'Sica Flurry', ic:'🗡️', desc:'A blur of curved cuts — four rapid hits.' },
  retiarius:  { name:'Cast Net',    ic:'🕸️', desc:'Ensnare the foe so they can’t attack, then jab with the trident.' },
  secutor:    { name:'Executioner', ic:'💀', desc:'A killing blow — the more hurt the foe, the deeper it bites.' },
  dimachaerus:{ name:'Whirlwind',   ic:'🌀', desc:'Spin both blades for massive damage — but you’re left wide open.' },
};
const specOf = g => SPECIALS[g.cls] || SPECIALS.thraex;

// Traits — every gladiator rolls two. Each touches one lever, so a fighter's
// personality is mechanical, not just flavor. `mods` are multipliers (default 1).
const TRAITS = {
  bloodthirsty:{ ic:'🔥', name:'Bloodthirsty', desc:'+12% power — lives for the kill',            mods:{pow:1.12} },
  reckless:    { ic:'💢', name:'Reckless',     desc:'+20% power, −12% max HP — no guard, all fury', mods:{pow:1.20, hp:0.88} },
  ironhide:    { ic:'🪨', name:'Ironhide',     desc:'+18% max HP — shrugs off blows',              mods:{hp:1.18} },
  swift:       { ic:'🦵', name:'Swift',        desc:'15% faster strikes in the duel',              mods:{spd:1.15} },
  oldscars:    { ic:'🩹', name:'Old Scars',    desc:'Blocks 40% stronger in the duel',             mods:{guard:1.4} },
  showman:     { ic:'🎭', name:'Showman',      desc:'+25% denarii from victories',                 mods:{gold:1.25} },
  darling:     { ic:'🌟', name:'Crowd-Darling',desc:'+30% fame from victories',                    mods:{fame:1.30} },
  student:     { ic:'📖', name:'Quick Study',  desc:'+25% experience from victories',              mods:{xp:1.25} },
  stoic:       { ic:'🗿', name:'Stoic',        desc:'Heals 50% faster',                            mods:{heal:1.5} },
  lucky:       { ic:'🍀', name:'Lucky',        desc:'Better odds of looting gear',                 mods:{drop:1} },
};
const TRAIT_IDS = Object.keys(TRAITS);
function rollTraits(){
  const a = TRAIT_IDS[(Math.random()*TRAIT_IDS.length)|0];
  let b = a; while(b===a) b = TRAIT_IDS[(Math.random()*TRAIT_IDS.length)|0];
  return [a,b];
}
// product of a mod across a gladiator's traits (1 if none)
function tmod(g, key){
  let m = 1;
  for(const t of (g.traits||[])){ const tr = TRAITS[t]; if(tr && tr.mods[key]) m *= tr.mods[key]; }
  return m;
}
const hasTrait = (g,id) => (g.traits||[]).includes(id);

// Origins — a one-line past, assembled at recruitment. Pure story; free attachment.
const ORIGIN_WHO = ['a debtor from Capua','a captured Thracian spearman','a fallen legionnaire','a Numidian horse-thief',
  'a volunteer chasing glory','a condemned poisoner','a shepherd who strangled a wolf','a bankrupt merchant’s son',
  'a deserter from the German frontier','a pit-fighter from the docks','a temple guard who struck a senator','a farmhand sold for taxes'];
const ORIGIN_HOW = ['sold to the sand for a handful of denarii','dragged to the ludus in chains','who signed the oath willingly',
  'bought cheap at the Capua market','spared the cross for the arena','traded for two oxen and a debt'];
function rollOrigin(){
  const s = ORIGIN_WHO[(Math.random()*ORIGIN_WHO.length)|0] + ', ' + ORIGIN_HOW[(Math.random()*ORIGIN_HOW.length)|0];
  return s.charAt(0).toUpperCase() + s.slice(1) + '.';
}

// Per-gladiator equipment. Weapon lifts damage/power, armor lifts HP/power.
// Tier you can buy is gated by the Armory facility level.
const GEAR = {
  weapon:{ ic:'⚔️', name:'Weapon', tiers:['Bare fists','Wooden rudis','Iron gladius','Steel spatha','Honed falx','Gilded blade','Legend’s edge'] },
  armor:{  ic:'🛡️', name:'Armor',  tiers:['Loincloth','Leather manica','Bronze scale','Iron cuirass','Steel lorica','Champion’s plate','Aegis of Mars'] },
};
const GEAR_MAX = 6;
const gearCost = t => Math.round(50 * Math.pow(1.9, t));        // cost to go from tier t → t+1
const maxGearTier = () => Math.min(GEAR_MAX, S.fac.armory);     // Armory level caps gear tier
const weaponPow = g => (g.gear ? g.gear.weapon : 0) * 7;
const armorPow  = g => (g.gear ? g.gear.armor  : 0) * 6;

// Loot roll after a won bout. Tougher foes drop better gear, more often.
// Returns {slot, tier, name} if the drop beats what's equipped, else null.
function rollGearDrop(g, i){
  if(!g.gear) g.gear = { weapon:0, armor:0 };
  let chance = Math.min(0.5, 0.12 + i*0.03);          // ~12% at bout 1 → 50% at the top
  if(hasTrait(g,'lucky')) chance = Math.min(0.62, chance + 0.10);   // Lucky trait
  if(Math.random() >= chance) return null;
  const slot = Math.random() < 0.5 ? 'weapon' : 'armor';
  // dropped tier hovers around the opponent's rung, never above the gear ceiling
  const tier = Math.min(GEAR_MAX, 1 + Math.floor(i*0.6) + (Math.random()<0.35 ? 1 : 0));
  if(tier <= g.gear[slot]) return null;               // not an upgrade — no drop
  g.gear[slot] = tier; recalc(g);
  return { slot, tier, name: GEAR[slot].tiers[tier] };
}

// Arena opponents — the first bouts are hand-named; beyond them the games are
// endless, with procedurally-titled foes that scale forever. Every rank is a wall.
const NAMED = [
  {n:'Drunken Brawler',   e:'🥴', d:'Back-alley chancer'},
  {n:'Condemned Thief',   e:'⛓️', d:'Nothing left to lose'},
  {n:'Wild Boar',         e:'🐗', d:'Beast hunt · venatio'},
  {n:'Thracian Novice',   e:'🗡️', d:'Curved sica, light shield'},
  {n:'Retiarius Veteran', e:'🔱', d:'Net and trident'},
  {n:'Chained War-Dog',   e:'🐕', d:'Half-starved, all teeth'},
  {n:'Murmillo Brute',    e:'🛡️', d:'Heavy fish-helm'},
  {n:'The Iron Gaul',     e:'🪓', d:'Undefeated in Capua'},
  {n:'Arena Lion',        e:'🦁', d:'Beast hunt · venatio'},
  {n:'Champion Secutor',  e:'⚔️', d:'The crowd’s favourite'},
  {n:'Barca the Giant',   e:'🗿', d:'A head taller than any man'},
  {n:'The Emperor’s Champion', e:'👑', d:'None have bested him'},
];
const RANK_TITLES = ['Challenger','Gladiator','Champion','Myrmidon','Destroyer','Warlord','Titan','Colossus','Demigod','Immortal'];
const RANK_EMOJI  = ['⚔️','🗡️','🛡️','🪓','🔱','🐺','🦁','🐗','🐉','👹','🗿','☠️','👑','🔥'];
const MAX_RANK = 120;                 // effectively endless — each rank is a grind wall
function foe(i){
  if(i < NAMED.length) return NAMED[i];
  const k = i - NAMED.length;
  const title = RANK_TITLES[k % RANK_TITLES.length];
  const suffix = ['','Redux','Ascendant','Eternal','Apex'][Math.floor(k/RANK_TITLES.length) % 5];
  return { n:`${title}${suffix?' '+suffix:''} · Rank ${i+1}`, e:RANK_EMOJI[i % RANK_EMOJI.length], d:'The endless games' };
}
// foe name with a correct article: "the Drunken Brawler" but "The Emperor's Champion" (no double "the")
const theFoe = i => { const n = foe(i).n; return /^the\s/i.test(n) ? n : 'the '+n; };
const oppPower  = i => Math.round(16 * Math.pow(1.30, i));      // gentler curve — champions can chase it
const oppReward = i => Math.round(14 * Math.pow(1.5, i));       // denarii for a win
const oppFame   = i => Math.round(1 + i*1.4 + i*i*0.05);        // fame ramps up — feeds Glory
const oppXP     = i => Math.round(22 * Math.pow(1.32, i));
// enemy HP for duels — tapers from 3.2× down to ~2.0× so high-rank duels aren't unwinnable DPS races
const MANAGER_MULT = l => 1 + (l-1)*0.12;                        // gold multiplier from Lanista's Contacts

// Facilities — high caps so they stay a gold sink for weeks, not days
const FAC = {
  barracks:{ ic:'⛺', name:'Barracks', max:10,
    desc:l=>`Houses up to <em>${l}</em> gladiator${l>1?'s':''}.`,
    cost:l=> Math.round(120 * Math.pow(2.15, l-1)) },
  training:{ ic:'🏋️', name:'Training Grounds', max:30,
    desc:l=>`Training is <em>${(1+(l-1)*0.35).toFixed(2)}×</em> faster.`,
    cost:l=> Math.round(80 * Math.pow(1.85, l-1)) },
  infirmary:{ ic:'⚕️', name:'Infirmary', max:30,
    desc:l=>`Heals <em>+${(l).toFixed(0)}</em> HP/sec · <em>${Math.round(deathCut(l)*100)}%</em> odds the Medicus saves a dying duelist.`,
    cost:l=> Math.round(100 * Math.pow(1.9, l-1)) },
  armory:{ ic:'🗡️', name:'Armory', max:24,
    desc:l=>`Forge gear up to <em>Tier ${Math.min(GEAR_MAX,l)}</em> · <em>+${(l-1)*8}</em> power to all fighters.`,
    cost:l=> Math.round(90 * Math.pow(1.95, l-1)) },
  manager:{ ic:'📜', name:'Lanista’s Contacts', max:20,
    desc:l=>`Arena purses pay <em>${MANAGER_MULT(l).toFixed(2)}×</em> more.`,
    cost:l=> Math.round(150 * Math.pow(2.05, l-1)) },
};
const deathCut = l => Math.min(0.75, (l-1)*0.09);   // Medicus revive odds when a duelist falls (by Infirmary level)

/* ============================ STATE ============================ */
let S = null;
let nextId = 1;
let simFights = 0, simWins = 0;   // running tallies, survive gladiator removal (for away summary)

function newGladiator(){
  const name = NAMES[(Math.random()*NAMES.length)|0];
  const clsId = CLASS_IDS[(Math.random()*CLASS_IDS.length)|0];
  const lean = CLASSES[clsId].lean;
  return {
    id: nextId++, name,
    cls: clsId,
    portrait: CLASSES[clsId].ic,
    traits: rollTraits(),
    origin: rollOrigin(),
    str: 4 + lean.str + (Math.random()*3|0),
    agi: 4 + lean.agi + (Math.random()*3|0),
    vit: 4 + lean.vit + (Math.random()*3|0),
    hp: 0, maxHp: 0,
    gear: { weapon:0, armor:0 },
    level:1, xp:0, wins:0, fights:0,
    state:'idle',           // idle | fighting | training | injured | dueling
    trainStat:null,
    progress:0,             // ticks accumulated toward current action
  };
}
function initState(){
  nextId = 1;
  const g = newGladiator();
  recalc(g); g.hp = g.maxHp;
  return {
    gold: 60, fame: 0, day: 1, dayT: 0,
    fac:{ barracks:1, training:1, infirmary:1, armory:1, manager:1 },
    tier: 0, maxTier: 0, autoFight:false,
    gladiators:[g],
    log:[], nextId:2,
    glory:0, lifeFame:0, retirements:0, bestRank:0, perks:{},   // prestige / lifetime meta
    fallen:[], vendetta:null, stats:{}, ach:{},                 // legacy: the Hall, vendettas, laurels
    market:null, daily:null, streak:{count:0,last:null},        // slave market stock · daily games
    lastTick: Date.now(),
  };
}

/* derived stats */
function recalc(g){
  const base = 40 + g.vit*9 + g.level*6 + armorPow(g)*1.5;
  g.maxHp = Math.round(base * clsOf(g).hpMul * tmod(g,'hp'));
  if(g.hp > g.maxHp) g.hp = g.maxHp;
}
function power(g){
  const facGear = (S.fac.armory-1)*8;
  const raw = g.str*2.4 + g.agi*1.7 + g.vit*1.5 + g.level*4 + facGear + weaponPow(g) + armorPow(g);
  return Math.round(raw * (1 + perkLvl('might')*0.08) * tmod(g,'pow'));   // Ludus Renown perk + traits
}
// Resting/wounded recovery, scaled to max HP so it stays meaningful at any level.
function healRate(g){ return (1.5 + g.maxHp*0.03 + S.fac.infirmary*0.7) * tmod(g,'heal'); }   // hp per second
function titleFor(g){
  let t = TITLES[0].t;
  for(const x of TITLES){ if(g.wins >= x.w) t = x.t; }
  return t;
}
const slots = () => S.fac.barracks;
const alive = () => S.gladiators.length;

/* ============================ SIMULATION ============================ */
// A single gladiator's tick. Returns array of log events (for offline summary).
// mult = how many seconds this call represents (coarse stepping for offline catch-up);
// offline = true when catching up while the game was closed/backgrounded.
function tickGladiator(g, live, mult, offline){
  mult = mult || 1;
  const ev = [];
  if(g.state === 'dueling') return ev;   // you're controlling this one by hand
  if(g.state === 'injured'){
    g.hp = Math.min(g.maxHp, g.hp + healRate(g) * 1.4 * (1 + perkLvl('will')*0.25) * mult);   // infirmary + Field Medicine
    if(g.hp >= g.maxHp*0.6){ g.state='idle'; g.progress=0;
      if(live) ev.push({cls:'', txt:`<b>${g.name}</b> has recovered and returns to the ludus.`});
    }
    return ev;
  }
  if(g.state === 'training'){
    if(offline) return ev;               // drilling is hands-on — it pauses while you're away
    const speed = 1 + (S.fac.training-1)*0.35;
    const need = 6 + g.level*0.6;
    g.progress += speed * mult;
    let guard = 0;
    while(g.progress >= need && guard++ < 500){
      g.progress -= need;
      const st = g.trainStat || 'str';
      g[st] += 1; recalc(g); g.xp += 3;
      maybeLevel(g, ev, live);
      if(live) ev.push({cls:'level', txt:`<b>${g.name}</b> drilled — ${st.toUpperCase()} raised to ${g[st]}.`});
    }
    return ev;
  }
  if(g.state === 'fighting'){
    // faster fighters resolve bouts quicker
    const cd = Math.max(3, 7 - g.agi*0.12);
    g.progress += mult;
    let guard = 0;
    while(g.progress >= cd && guard++ < 6000){
      g.progress -= cd;
      resolveFight(g, ev, live);
      if(g._dead || g.state !== 'fighting'){ g.progress = 0; break; }   // downed → stop fighting
    }
    return ev;
  }
  // idle: slowly recover between bouts, then auto-fight if enabled & healthy
  if(g.state === 'idle'){
    if(g.hp < g.maxHp){
      g.hp = Math.min(g.maxHp, g.hp + healRate(g) * mult);
    }
    // auto-battle waits until a fighter has recovered a healthy margin before sending them back in
    if(S.autoFight && g.hp >= g.maxHp*0.7){
      g.state = 'fighting'; g.progress = 0;
    }
  }
  return ev;
}

function maybeLevel(g, ev, live){
  let need = XP_FOR(g.level);
  while(g.xp >= need){
    g.xp -= need;
    g.level++;
    g.str += 1; g.agi += 1; g.vit += 1;    // small automatic growth
    recalc(g); g.hp = g.maxHp;              // full heal on level up
    if(live) ev.push({cls:'level', txt:`⭐ <b>${g.name}</b> reached level ${g.level}! Wounds mend, resolve hardens.`});
    need = XP_FOR(g.level);
  }
}

// ---- Prestige perks: spend Glory on permanent, run-spanning bonuses ----
const PERKS = {
  might:   { ic:'💪', name:'Ludus Renown',      max:10, base:3, growth:1.6, desc:l=>`Every gladiator fights with +<em>${l*8}%</em> power.` },
  purse:   { ic:'💰', name:'Patron’s Purse',    max:10, base:2, growth:1.5, desc:l=>`+<em>${l*20}%</em> denarii from every victory.` },
  renown:  { ic:'✦',  name:'Champion’s Renown', max:10, base:2, growth:1.5, desc:l=>`+<em>${l*20}%</em> fame from every victory.` },
  instinct:{ ic:'✧',  name:'Veteran Instinct',  max:10, base:2, growth:1.5, desc:l=>`+<em>${l*20}%</em> experience from every victory.` },
  blood:   { ic:'🩸', name:'Noble Blood',        max:8,  base:3, growth:1.7, desc:l=>`New gladiators are born at level <em>${1+l}</em>.` },
  armed:   { ic:'⚔️', name:'Well-Armed',         max:6,  base:3, growth:1.7, desc:l=>`New gladiators start with tier-<em>${l}</em> weapon &amp; armor.` },
  will:    { ic:'🩹', name:'Field Medicine',     max:6,  base:3, growth:1.7, desc:l=>`Wounded fighters recover <em>+${l*25}%</em> faster.` },
  reserves:{ ic:'⏳', name:'Endless Reserves',    max:6,  base:3, growth:1.6, desc:l=>`Offline earnings last <em>${24+l*4}h</em>.` },
  legacy:  { ic:'🏛️', name:'Ludus Legacy',       max:4,  base:5, growth:2.0, desc:l=>`Every new run opens with <em>${1+l}</em> barracks slots.` },
};
const perkLvl  = id => (S.perks && S.perks[id]) || 0;
const perkCost = (id,l) => Math.round(PERKS[id].base * Math.pow(PERKS[id].growth, l));
// Laurels — permanent achievements. Each one earned adds +2% to all payouts, forever
// (survives retirement). The Cookie Clicker "milk" model: milestones ARE progression.
const ACH = [
  {id:'first-blood', ic:'🩸', name:'First Blood',      desc:'Win a bout',                    test:s=>(s.stats.wins||0)>=1},
  {id:'ten-wins',    ic:'⚔️', name:'Blooded',           desc:'Win 10 bouts',                  test:s=>(s.stats.wins||0)>=10},
  {id:'century',     ic:'💯', name:'Centurion',         desc:'Win 100 bouts',                 test:s=>(s.stats.wins||0)>=100},
  {id:'legion',      ic:'🦅', name:'A Legion Felled',   desc:'Win 1,000 bouts',               test:s=>(s.stats.wins||0)>=1000},
  {id:'myriad',      ic:'🌋', name:'Myriad',            desc:'Win 10,000 bouts',              test:s=>(s.stats.wins||0)>=10000},
  {id:'first-duel',  ic:'🤺', name:'By My Own Hand',    desc:'Win a duel yourself',           test:s=>(s.stats.duelWins||0)>=1},
  {id:'duelist',     ic:'🗡️', name:'Duelist',           desc:'Win 25 duels',                  test:s=>(s.stats.duelWins||0)>=25},
  {id:'thread',      ic:'🫀', name:'By a Thread',       desc:'Win a duel below 12% HP',       test:s=>(s.stats.closeCall||0)>=1},
  {id:'rank5',       ic:'🥉', name:'Rising Name',       desc:'Reach Rank 5',                  test:s=>(s.bestRank||0)>=4},

const achCount = () => Object.keys(S.ach||{}).length;
const laurelMult = () => 1 + achCount()*0.02;
// Sweep for newly-earned laurels. Cheap tests; called once per tick + after key events.
function checkAch(live){
  if(!S.ach) S.ach = {};
  for(const a of ACH){
    if(S.ach[a.id]) continue;
    let hit = false;
    try{ hit = a.test(S); }catch(e){}
    if(hit){
      S.ach[a.id] = 1;
      S.log.push({cls:'level', txt:`🏅 Laurel earned — <b>${a.name}</b>: ${a.desc}. All payouts +2%.`});
      if(live) toast(`🏅 Laurel earned: ${a.name}`);
    }
  }
}

const goldMult = () => (1 + perkLvl('purse')*0.20) * laurelMult();
const fameMult = () => (1 + perkLvl('renown')*0.20) * laurelMult();
const xpMult   = () => (1 + perkLvl('instinct')*0.20) * laurelMult();
const maxOfflineH = () => MAX_OFFLINE_H + perkLvl('reserves')*4;

// Apply run-start perks to a freshly-made gladiator (Noble Blood, Well-Armed).
function applyRecruitPerks(g){
  const blood = perkLvl('blood');
  if(blood > 0 && g.level < 1+blood){
    const add = (1+blood) - g.level;
    g.level = 1+blood; g.str += add; g.agi += add; g.vit += add;
  }
  const armed = Math.min(GEAR_MAX, perkLvl('armed'));
  if(armed > 0){ g.gear.weapon = Math.max(g.gear.weapon, armed); g.gear.armor = Math.max(g.gear.armor, armed); }
}

// Grant the spoils of a victory. Shared by the auto-sim and the manual duel.
// Returns { gain, drop } — drop is a gear find or null.
// manual=true (a duel you fought yourself) always unlocks the next rank — skill earned it.
// Auto-battle needs a CONVINCING win (power ≥ 40% of the foe's) so a 6%-fluke can't brute-force the ladder.
function grantWin(g, i, ev, live, manual){
  const gain = Math.round(oppReward(i) * MANAGER_MULT(S.fac.manager) * goldMult() * tmod(g,'gold'));
  const fame = Math.round(oppFame(i) * fameMult() * tmod(g,'fame'));
  const xp   = Math.round(oppXP(i) * xpMult() * tmod(g,'xp'));
  S.gold += gain;
  S.fame += fame;
  S.lifeFame = (S.lifeFame||0) + fame;
  g.xp += xp;
  g.wins++;
  S.stats.wins = (S.stats.wins||0) + 1;
  const convincing = manual || power(g) >= oppPower(i)*0.4;
  if(convincing && i === S.maxTier && S.maxTier < MAX_RANK-1){ S.maxTier++; if(S.maxTier > (S.bestRank||0)) S.bestRank = S.maxTier; }  // unlock next tier
  simWins++;
  // a fallen brother avenged — settle the vendetta for a fame windfall
  let avenged = null;
  if(S.vendetta && i === S.vendetta.rank){
    const bonus = Math.round((fame*3 + 50) * (manual?2:1));
    S.fame += bonus; S.lifeFame += bonus;
    avenged = { victim:S.vendetta.victim, bonus };
    S.stats.avenged = (S.stats.avenged||0) + 1;
    S.log.push({cls:'win', txt:`⚖️ <b>${g.name}</b> avenged <b>${S.vendetta.victim}</b> — ${S.vendetta.foe} lies beaten! <span class="cash">+${fmt(bonus)} fame</span>`});
    S.vendetta = null;
  }
  const drop = rollGearDrop(g, i);
  bumpDaily('wins', 1); bumpDaily('gold', gain);
  if(drop) bumpDaily('forge', 1);
  maybeLevel(g, ev, live);
  return { gain, fame, xp, drop, avenged };
}
// A gladiator has died. Carve their name into the Hall of the Fallen and open a vendetta
// against their killer — settling it (beating that rank) pays a fame windfall.
function recordDeath(g, i){
  S.fallen = S.fallen || [];
  S.fallen.unshift({ name:g.name, cls:g.cls, level:g.level, wins:g.wins, fights:g.fights,
    day:S.day, killer:foe(i).n, rank:i, traits:g.traits||[], origin:g.origin||'' });
  if(S.fallen.length > 50) S.fallen.length = 50;    // the Hall keeps the last fifty names
  S.stats.deaths = (S.stats.deaths||0) + 1;
  S.vendetta = { rank:i, foe:foe(i).n, victim:g.name };
}
function epitaph(f){
  if(f.wins === 0)  return 'The sand keeps even the briefest names.';
  if(f.wins < 10)   return 'He fought; it is enough.';
  if(f.wins < 50)   return 'The crowd knew his name.';
  if(f.wins < 150)  return 'Taverns still argue about his final bout.';
  return 'A legend, cut down at his peak.';
}

function resolveFight(g, ev, live){
  const i = S.tier;
  const opp = foe(i);
  const gp = power(g);
  const ep = oppPower(i);
  let wc = gp/(gp+ep);
  wc = Math.max(0.06, Math.min(0.95, wc));
  const won = Math.random() < wc;
  g.fights++; simFights++;

  // damage taken this bout
  let dmg = ep * (won ? (0.12+Math.random()*0.22) : (0.45+Math.random()*0.5));
  dmg = dmg / (1 + g.vit*0.03);
  g.hp -= dmg;

  if(won){
    const { gain, fame, drop } = grantWin(g, i, ev, live);
    if(live) ev.push({cls:'win', txt:`<b>${g.name}</b> defeated ${theFoe(i)}! <span class="cash">+${fmt(gain)}◈</span> · +${fmt(fame)} fame`});
    if(live && drop) ev.push({cls:'level', txt:`🎁 <b>${g.name}</b> looted a <b>${drop.name}</b> from ${theFoe(i)}.`});
    ev._win = true;
  } else {
    if(live) ev.push({cls:'lose', txt:`<b>${g.name}</b> was bested by ${theFoe(i)}. The mob jeers.`});
    ev._lose = true;
  }

  // downed — auto-battle never kills; the arena only wounds. Death is reserved for manual duels.
  if(g.hp <= 0){
    g.hp = 0; g.state = 'injured'; g.progress = 0;
    if(live) ev.push({cls:'lose', txt:`<b>${g.name}</b> is carried off gravely wounded — to the infirmary.`});
  }
}

// Master tick — advances the whole world by `mult` seconds (default 1).
function tick(live, mult, offline){
  mult = mult || 1;
  const events = [];
  let winFlash=false, loseFlash=false;
  for(const g of S.gladiators){
    const ev = tickGladiator(g, live, mult, offline);
    if(ev._win) winFlash = true;
    if(ev._lose) loseFlash = true;
    for(const e of ev) events.push(Object.assign({gid:g.id}, e));
  }
  // remove the dead
  const before = S.gladiators.length;
  S.gladiators = S.gladiators.filter(g => !g._dead);
  const deaths = before - S.gladiators.length;

  // day passes
  S.dayT += mult;
  while(S.dayT >= 20){ S.dayT -= 20; S.day++; }

  checkAch(live);
  return { events, deaths, winFlash, loseFlash };
}

/* ============================ OFFLINE CATCH-UP ============================ */
const MAX_CATCHUP_STEPS = 1200;   // cap iterations so a long absence never freezes the UI
function catchUp(){
  const now = Date.now();
  let elapsed = Math.floor((now - (S.lastTick||now))/1000);
  S.lastTick = now;
  if(elapsed < 3) return null;
  elapsed = Math.min(elapsed, maxOfflineH()*3600);

  // simulate `elapsed` seconds in at most MAX_CATCHUP_STEPS coarse steps
  const stride = Math.max(1, Math.ceil(elapsed / MAX_CATCHUP_STEPS));
  const steps  = Math.round(elapsed / stride);

  const goldBefore=S.gold, fameBefore=S.fame, fBefore=simFights, wBefore=simWins;
  let deaths=0;
  const lvlBefore = {}; S.gladiators.forEach(g=>lvlBefore[g.id]=g.level);

  for(let s=0; s<steps; s++){ deaths += tick(false, stride, true).deaths; }

  let levels=0;
  S.gladiators.forEach(g=>{ if(lvlBefore[g.id]!==undefined) levels += Math.max(0, g.level-lvlBefore[g.id]); });

  return {
    secs: elapsed,
    gold: S.gold-goldBefore,
    fame: S.fame-fameBefore,
    fights: simFights-fBefore,
    wins: simWins-wBefore,
    deaths, levels,
  };
}

/* ============================ PERSISTENCE ============================ */
function save(){
  S.lastTick = Date.now();
  S.nextId = nextId;
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    S = JSON.parse(raw);
    nextId = S.nextId || (Math.max(0,...S.gladiators.map(g=>g.id))+1);
    // migrate new meta fields onto older saves
    if(S.glory==null) S.glory = 0;
    if(S.lifeFame==null) S.lifeFame = S.fame||0;
    if(S.retirements==null) S.retirements = 0;
    if(S.bestRank==null) S.bestRank = S.maxTier||0;
    if(S.perks==null) S.perks = {};
    if(S.fallen==null) S.fallen = [];
    if(S.vendetta===undefined) S.vendetta = null;
    if(S.stats==null) S.stats = {};
    if(S.ach==null) S.ach = {};
    if(S.market===undefined) S.market = null;
    if(S.daily===undefined) S.daily = null;
    if(S.streak==null) S.streak = {count:0,last:null};
    // migrate + heal derived state; free anyone stuck mid-duel from a closed tab
    S.gladiators.forEach(g=>{
      if(!g.cls){ g.cls = CLASS_IDS[(Math.random()*CLASS_IDS.length)|0]; g.portrait = CLASSES[g.cls].ic; }
      if(!g.gear) g.gear = { weapon:0, armor:0 };
      if(!g.traits) g.traits = rollTraits();
      if(!g.origin) g.origin = rollOrigin();
      recalc(g);
      if(g.hp==null || g.hp>g.maxHp) g.hp = g.maxHp;
      if(g.state==='dueling') g.state='idle';
    });
    return true;
  }catch(e){ return false; }
}

const $ = s => document.querySelector(s);

const SUFFIX = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UDc','DDc','TDc','QaDc','QiDc','SxDc','SpDc','OcDc','NoDc','Vg'];
function fmt(n){
  n = Math.round(n);
  if(!isFinite(n)) return '∞';
  if(Math.abs(n) < 1000) return ''+n;
  const t = Math.floor(Math.log10(Math.abs(n))/3);
  if(t < SUFFIX.length){
    const s = n / Math.pow(10, t*3);
    return (s<10 ? s.toFixed(2) : s<100 ? s.toFixed(1) : Math.round(s)) + SUFFIX[t];
  }
  return n.toExponential(2).replace('+','');
}

// The single most relevant "what to do next", always visible under the stats.
function nextGoal(){
  if(alive() === 0) return `Recruit a <b>free</b> gladiator to rebuild your ludus`;
  if(S.vendetta && S.maxTier >= S.vendetta.rank) return `⚖️ Avenge <b>${S.vendetta.victim}</b> — defeat ${S.vendetta.foe} at Rank ${S.vendetta.rank+1}`;
  const injured = S.gladiators.filter(g=>g.state==='injured').length;
  const fighting = S.gladiators.filter(g=>g.state==='fighting'||g.state==='dueling').length;
  // cheapest affordable facility upgrade as a spend hint
  let cheapFac=null, cheapCost=Infinity;
  for(const k in FAC){ if(S.fac[k]<FAC[k].max){ const c=FAC[k].cost(S.fac[k]+1); if(c<cheapCost){cheapCost=c; cheapFac=FAC[k].name;} } }
  if(alive() < slots() && S.gold >= recruitCost()) return `Recruit another fighter — you have an empty bunk`;
  if(!S.autoFight && fighting===0 && injured<alive()) return `Send a gladiator to the <b>Arena</b>, or switch on Auto-Battle`;
  if(cheapFac && S.gold >= cheapCost) return `Upgrade <b>${cheapFac}</b> for ${fmt(cheapCost)}◈`;
  if(S.maxTier < MAX_RANK-1) return `Grow stronger to clear <b>Rank ${S.maxTier+2}</b> (enemy power ${fmt(oppPower(S.maxTier+1))})`;
  return `Keep climbing the endless ranks`;
}

function recruitCost(){
  if(alive() === 0) return 0;        // an empty ludus always gets a free fighter — never a dead end
  return Math.round(45 * Math.pow(1.85, alive()));
}

/* ---- The Slave Market: scout before you buy. Fresh stock each dawn; the trader
        can be paid to parade more (a gold sink that scales with your rank). ---- */
const PROMISE = {
  raw:        { name:'Raw',         mult:1   },
  promising:  { name:'Promising',   mult:2.4 },
  exceptional:{ name:'Exceptional', mult:5.5 },
};
function makeCandidate(){
  const r = Math.random()*100;
  const tier = r<12 ? 'exceptional' : r<45 ? 'promising' : 'raw';
  const g = newGladiator(); g.id = 0;                   // a real id is stamped when bought
  if(tier==='promising'){ g.str+=3; g.agi+=3; g.vit+=3; }
  if(tier==='exceptional'){ g.str+=6; g.agi+=6; g.vit+=6; g.level=3; }
  applyRecruitPerks(g); recalc(g); g.hp = g.maxHp;
  return { g, tier };
}
function candAsk(c){
  // an empty ludus always finds one free Raw fighter — never a dead end
  const base = alive()===0 ? (c.tier==='raw' ? 0 : 60) : 45*Math.pow(1.85, alive());
  return Math.round(base * PROMISE[c.tier].mult);
}
function ensureMarket(){
  if(!S.market || S.market.day !== S.day){
    S.market = { day:S.day, cands:[makeCandidate(), makeCandidate(), makeCandidate()] };
  }
}
const rerollCost = () => Math.max(40, Math.round(oppReward(S.maxTier)*0.75));
function rerollMarket(){
  const c = rerollCost();
  if(S.gold < c) return;
  S.gold -= c;
  S.market = { day:S.day, cands:[makeCandidate(), makeCandidate(), makeCandidate()] };
  toast('The trader parades new stock.');
  refresh(); save();
}
function buyCandidate(ix){
  ensureMarket();
  const c = S.market.cands[ix];
  if(!c || alive() >= slots()) return;
  const ask = candAsk(c);
  if(S.gold < ask) return;
  S.gold -= ask;
  c.g.id = nextId++;
  S.gladiators.push(c.g);
  S.market.cands.splice(ix,1);
  S.stats.recruits = (S.stats.recruits||0) + 1;
  bumpDaily('recruit', 1);
  toast(`${c.g.name} joins your ludus — ${TRAITS[c.g.traits[0]].name} · ${TRAITS[c.g.traits[1]].name}.`);
  checkAch(true);
  refresh(); save();
}

/* ---- Daily Games: three objectives rolled from the real date, a streak for
        clearing all three, and a Glory coin for the day's purse. Server-free. ---- */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const todayStr = () => new Date().toISOString().slice(0,10);
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function ensureDaily(){
  const today = todayStr();
  if(S.daily && S.daily.date === today) return;
  // a lapsed streak dies at dawn
  if(S.streak && S.streak.last && S.streak.last !== today && S.streak.last !== yesterdayStr()) S.streak.count = 0;
  let seed = 0; for(const ch of today) seed = (seed*31 + ch.charCodeAt(0))|0;
  const rng = mulberry32(seed);
  const winN  = 8 + Math.floor(rng()*3)*4;                             // 8 / 12 / 16
  const goldN = Math.max(200, Math.round(oppReward(S.maxTier) * (10 + Math.floor(rng()*10))));
  const pool = [
    {id:'wins',    txt:`Win ${winN} bouts`,                    n:winN},
    {id:'gold',    txt:`Earn ${fmt(goldN)} denarii`,           n:goldN},
    {id:'duel',    txt:`Win a duel by your own hand`,          n:1},
    {id:'forge',   txt:`Forge or loot a piece of gear`,        n:1},
    {id:'recruit', txt:`Buy a fighter from the market`,        n:1},
    {id:'upgrade', txt:`Upgrade a facility`,                   n:1},
  ];
  // pick 3 distinct, seeded by the date so everyone’s day matches
  const obs = [];
  while(obs.length < 3){ const p = pool[Math.floor(rng()*pool.length)]; if(!obs.some(o=>o.id===p.id)) obs.push({id:p.id, txt:p.txt, n:p.n, p:0, done:false}); }
  S.daily = { date:today, obs, cleared:false };
}
function bumpDaily(id, amt){
  ensureDaily();
  const ob = S.daily.obs.find(o=>o.id===id && !o.done);
  if(!ob) return;
  ob.p += amt;
  if(ob.p >= ob.n){
    ob.p = ob.n; ob.done = true;
    S.log.push({cls:'level', txt:`🎯 Daily objective met — <b>${ob.txt}</b>.`});
    if(!S.daily.cleared && S.daily.obs.every(o=>o.done)){
      S.daily.cleared = true;
      const today = todayStr();
      S.streak.count = (S.streak.last === yesterdayStr()) ? (S.streak.count||0)+1 : 1;
      S.streak.last = today;
      const purse = Math.round(oppReward(S.maxTier) * 8 * (1 + 0.15*Math.min(7, S.streak.count)));
      S.gold += purse; S.glory = (S.glory||0) + 1;
      S.log.push({cls:'win', txt:`🎉 <b>The Daily Games are yours!</b> <span class="cash">+${fmt(purse)}◈</span> · +1 🏆 Glory · streak ${S.streak.count}`});
      toast(`Daily Games cleared — +${fmt(purse)}◈ and +1 Glory!`);
    }
  }
}
function renderDaily(){
  const box = $('#daily-card'); if(!box) return;
  ensureDaily();
  const d = S.daily;
  box.innerHTML = `<div class="daily">
    <div class="d-head">🎯 Daily Games <span class="d-streak">${S.streak.count>0?`🔥 ${S.streak.count}-day streak`:'no streak yet'}</span></div>
    ${d.obs.map(o=>`
      <div class="d-ob${o.done?' done':''}">
        <span class="d-check">${o.done?'✓':'○'}</span>
        <span class="d-txt">${o.txt}</span>
        <span class="d-prog">${o.n>1 ? fmt(Math.min(o.p,o.n))+'/'+fmt(o.n) : (o.done?'done':'—')}</span>
      </div>`).join('')}
    ${d.cleared?`<div class="d-cleared">🎉 Cleared — the purse and a Glory coin are yours. Fresh games at midnight.</div>`:''}
  </div>`;
}

function chooseGear(g){

    const cap = maxGearTier();
    const rows = Object.keys(GEAR).map(slot=>{
      const info = GEAR[slot];
      const t = g.gear[slot];
      const maxed = t >= GEAR_MAX;

      const cost = gearCost(t);
      const eff = slot==='weapon' ? `+${(t+1)*7} power` : `+${(t+1)*6} power · +HP`;
      let btn;
      if(maxed) btn = `<div class="btn recall gslot-btn" disabled>Max</div>`;

/* ============================ MAIN LOOP ============================ */
function pushLog(events){
  for(const e of events){
    S.log.push({cls:e.cls, txt:e.txt});
  }
  if(S.log.length>60) S.log = S.log.slice(-60);
}

let acc = 0, lastFrame = 0;
function loop(ts){
  if(!lastFrame) lastFrame = ts;
  acc += ts - lastFrame; lastFrame = ts;
  if(acc > 5000) acc = 5000;   // a long gap (backgrounded tab) is handled by the visibility catch-up, not by grinding here
  let ran = false;
  while(acc >= TICK_MS){
    acc -= TICK_MS;
    const r = tick(true, 1, false);
    if(r.events.length) pushLog(r.events);
    ran = true;
  }
  if(ran){
    renderTop();
    if(tab==='ludus') renderRoster();
    if(tab==='arena'){ renderArena(); renderLog(); }
    save();
  }
  requestAnimationFrame(loop);
}
