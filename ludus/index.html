const STAM_MAX = 100;
const enemyHP = i => Math.round(Math.max(42, oppPower(i) * Math.max(2.0, 3.2 - i*0.03)));  // taper 3.2x -> 2.0x
const vib = p => { try{ navigator.vibrate && navigator.vibrate(p); }catch(e){} };

let D = { active:false };   // live combat state
let dz = null;              // cached DOM refs

function buildDuelDOM(){
  if(dz) return;
  const d = el('div'); d.id = 'duel';
  d.innerHTML = `
    <div class="duel-ehead">
      <div class="en" id="d-en"></div><div class="es" id="d-es"></div>
      <div class="hpbar enemy"><i class="ghost" id="d-ehpg"></i><i class="fill" id="d-ehp"></i><span class="lab" id="d-ehpl"></span></div>
    </div>
    <div class="duel-stage" id="d-stage">
      <div class="floor"></div>
      <div class="reach-zone" id="d-reach"></div>
      <div class="mv-hint left" id="d-mvl">‹</div>
      <div class="mv-hint right" id="d-mvr">›</div>
      <div class="fighter player" id="d-pf"></div>
      <div class="fighter enemy" id="d-ef"></div>
      <div class="tele" id="d-tele"><div class="ring"></div><div class="bang">⚠️</div></div>
      <div class="duel-banner" id="d-banner"></div>
    </div>
    <div class="duel-phud">
      <div class="pn"><span id="d-pn"></span><small id="d-pinfo"></small></div>
      <div class="hpbar player"><i class="ghost" id="d-phpg"></i><i class="fill" id="d-php"></i><span class="lab" id="d-phpl"></span></div>
      <div class="stambar" id="d-stamwrap"><i id="d-stam"></i></div>
    </div>
    <div class="duel-pad">
      <div class="dbtn strike" id="d-b-strike">Strike<small>fast · cheap</small><div class="cd"></div></div>
      <div class="dbtn heavy" id="d-b-heavy">Heavy<small>slow · staggers</small><div class="cd"></div></div>
      <div class="dbtn block" id="d-b-block">Block<small>brace · 20 stam</small><div class="cd"></div></div>
      <div class="dbtn dodge" id="d-b-dodge">Dodge<small>hop back · riposte</small><div class="cd"></div></div>
    </div>
    <div class="dbtn special" id="d-b-special"><div class="charge" id="d-charge"></div><span class="sp-txt" id="d-sp-label">Signature</span></div>
    <div class="duel-cover" id="d-cover" style="display:none"></div>`;
  document.body.appendChild(d);
  dz = {
    root:d, en:$('#d-en'), es:$('#d-es'), ehp:$('#d-ehp'), ehpg:$('#d-ehpg'), ehpl:$('#d-ehpl'),
    stage:$('#d-stage'), pf:$('#d-pf'), ef:$('#d-ef'), tele:$('#d-tele'), banner:$('#d-banner'),
    reach:$('#d-reach'), mvl:$('#d-mvl'), mvr:$('#d-mvr'),
    pn:$('#d-pn'), pinfo:$('#d-pinfo'), php:$('#d-php'), phpg:$('#d-phpg'), phpl:$('#d-phpl'),
    stam:$('#d-stam'), stamwrap:$('#d-stamwrap'), cover:$('#d-cover'),
    bStrike:$('#d-b-strike'), bHeavy:$('#d-b-heavy'), bBlock:$('#d-b-block'), bDodge:$('#d-b-dodge'),
    bSpecial:$('#d-b-special'), charge:$('#d-charge'), spLabel:$('#d-sp-label'),
  };
  const bind=(elm,k)=> elm.addEventListener('pointerdown', e=>{ e.preventDefault(); dInput(k); });
  bind(dz.bStrike,'strike'); bind(dz.bHeavy,'heavy'); bind(dz.bBlock,'block'); bind(dz.bDodge,'dodge');
  bind(dz.bSpecial,'special');
  // movement: hold either side of the arena to walk — the whole stage is a control
  const setMove = e=>{
    const r = dz.stage.getBoundingClientRect();
    D.moveDir = (e.clientX - r.left) < r.width/2 ? -1 : 1;
  };
  dz.stage.addEventListener('pointerdown', e=>{ e.preventDefault(); D.movePtr = e.pointerId; setMove(e); });
  dz.stage.addEventListener('pointermove', e=>{ if(D.movePtr === e.pointerId) setMove(e); });
  const endMove = e=>{ if(D.movePtr === e.pointerId){ D.movePtr = null; D.moveDir = 0; } };
  dz.stage.addEventListener('pointerup', endMove);
  dz.stage.addEventListener('pointercancel', endMove);
  // keyboard for desktop play
  window.addEventListener('keydown', e=>{
    if(!D.active || D.ended) return;
    if(e.key==='ArrowRight'||e.key==='d') D.moveDir = 1;
    else if(e.key==='ArrowLeft'||e.key==='a') D.moveDir = -1;
  });
  window.addEventListener('keyup', e=>{
    if(['ArrowRight','ArrowLeft','a','d'].includes(e.key)) D.moveDir = 0;
  });
}

function dAnim(elm, cls, dur){ elm.classList.add(cls); setTimeout(()=>elm.classList.remove(cls), dur); }
function teleOn(dur){ const t=dz.tele; t.classList.remove('on'); t.style.setProperty('--tdur', dur+'ms'); void t.offsetWidth; t.classList.add('on'); }
function teleOff(){ dz.tele.classList.remove('on'); }
function spawnFloat(where, cls, text){
  const f = el('div','float '+cls); f.textContent = text;
  let left;
  if(D.W){  // position over the actual fighters
    const px = D.px/D.W*100, ex = D.ex/D.W*100;
    left = where==='enemy' ? ex-6+Math.random()*8 : where==='player' ? px-6+Math.random()*8 : (px+ex)/2-6+Math.random()*8;
  } else {
    left = where==='enemy' ? (60+Math.random()*10) : where==='player' ? (13+Math.random()*10) : (40+Math.random()*8);
  }
  f.style.left = Math.max(2,Math.min(84,left))+'%'; f.style.bottom = (118+Math.random()*42)+'px';
  dz.stage.appendChild(f); setTimeout(()=>f.remove(), 850);
}
// impact sparks — a small burst of flecks at a stage x position (px)
function spawnSparks(x, n, col){
  for(let i=0;i<(n||6);i++){
    const s = el('div','spark'); if(col) s.style.background = col;
    s.style.left = x+'px'; s.style.bottom = (55+Math.random()*30)+'px';
    s.style.setProperty('--dx', (Math.random()*90-45)+'px');
    s.style.setProperty('--dy', (-30-Math.random()*60)+'px');
    dz.stage.appendChild(s); setTimeout(()=>s.remove(), 480);
  }
}
// hitstop — freeze the sim for a beat so a landed blow has weight
function hitstop(ms){ D.freezeUntil = Math.max(D.freezeUntil||0, (D.now||0) + ms); }
// a full-stage flash — gold roar for victory, dark pall for a death
function stageFx(cls, ms){
  const o = el('div','stagefx '+cls);
  dz.stage.appendChild(o); setTimeout(()=>o.remove(), ms||900);
}

function startDuel(g){
  buildDuelDOM();
  D.g = g; D.tier = S.tier; D.active = true; D.raf = null; D.last = 0; D.now = performance.now();
  g.state = 'dueling';
  dz.root.classList.add('on');
  showIntro();
  save(); renderTop(); renderRoster();
}

function showIntro(){
  const i = D.tier, opp = foe(i), g = D.g;
  const pw = power(g), ew = oppPower(i);
  dz.cover.style.display = 'flex';
  dz.cover.innerHTML = `
    <div class="tier-nav" style="margin-bottom:12px">
      <button id="di-prev">‹</button>
      <div class="tier-lab">Rank ${i+1}</div>
      <button id="di-next">›</button>
    </div>
    <div class="big-em">${opp.e}</div>
    <h2>${opp.n}</h2>
    <div class="cs">${opp.d}</div>
    <div class="vs-stats">
      <div class="kv"><b style="color:#79b356">${fmt(pw)}</b><small>${clsOf(g).name} · power</small></div>
      <div class="kv"><b style="color:#c0392b">${fmt(ew)}</b><small>enemy power</small></div>
      <div class="kv"><b style="color:var(--gold2)">${fmt(Math.round(oppReward(i)*MANAGER_MULT(S.fac.manager)*goldMult()))}◈</b><small>purse</small></div>
    </div>
    <div class="btn-col">
      <div class="dcbtn go" id="di-go">Enter the Sand</div>
      <div class="dcbtn leave" id="di-leave">Not yet</div>
    </div>
    <div class="hint"><b style="color:var(--blood2)">A duel is to the death — lose and ${g.name} dies.</b>
      <b>Hold either side of the arena</b> to advance or retreat — strikes only land <b>in reach</b> (the gold line), and stepping back makes his blows part empty air.
      A <b>yellow ring</b> is a quick jab, a <b>red ring</b> a lunging heavy — Block and Dodge cost stamina now, so spacing is the cheapest shield. Land and take hits to charge <b>${specOf(g).ic} ${specOf(g).name}</b>.</div>`;
  const prev=$('#di-prev'), next=$('#di-next');
  if(i<=0) prev.setAttribute('disabled','');
  if(i>=S.maxTier || i>=MAX_RANK-1) next.setAttribute('disabled','');
  prev.onclick=()=>{ if(D.tier>0){ D.tier--; showIntro(); } };
  next.onclick=()=>{ if(D.tier<S.maxTier && D.tier<MAX_RANK-1){ D.tier++; showIntro(); } };
  $('#di-go').onclick=()=> beginDuel();
  $('#di-leave').onclick=()=> closeDuel();
}

function beginDuel(){
  const g = D.g, i = D.tier, opp = foe(i);
  dz.cover.style.display = 'none';
  // enemy header
  dz.en.textContent = opp.n; dz.es.textContent = opp.d; dz.ef.textContent = opp.e;
  dz.pf.textContent = g.portrait;
  dz.pn.textContent = g.name; dz.pinfo.textContent = `LVL ${g.level} · ${clsOf(g).name}`;
  dz.ef.classList.remove('downed','stagger'); dz.pf.classList.remove('downed');
  // combat state
  const c = clsOf(g);
  D.pmax = g.maxHp; D.php = Math.max(1, g.hp);
  D.emax = enemyHP(i); D.ehp = D.emax;
  D.stam = STAM_MAX; D.riposte = false;
  D.blockUntil = 0; D.dodgeUntil = 0;
  D.cd = {strike:0, heavy:0, block:0, dodge:0};
  D.cdTotal = {strike:1, heavy:1, block:1, dodge:1};
  D.strikeCd = Math.max(220, (540 - g.agi*12) * c.strikeCd / tmod(g,'spd'));  D.strikeCost = 16;
  D.heavyCd  = Math.max(600, (980 - g.agi*10) * c.strikeCd / tmod(g,'spd'));  D.heavyCost  = 34;
  D.blockCd  = 520; D.dodgeCd = 620;
  // class-derived duel knobs (traits fold in: Swift → speed, Bloodthirsty/Reckless → damage, Old Scars → block)
  D.wpn       = weaponPow(g);                                  // weapon damage bonus
  D.strikeMul = c.strikeMul * tmod(g,'pow');                   // class attack lean × trait fury
  D.blockKeep = Math.max(0.05, Math.min(0.6, 0.22 / (c.block * tmod(g,'guard')) )); // blow fraction through a block
  D.dodgeWin  = 360 * c.dodge;                                 // dodge i-frame window
  D.riposteMul= 1 + c.riposte;                                 // riposte damage multiplier
  // signature move
  D.charge = 0; D.chargeMax = 100;
  D.ensnareUntil = 0; D.exposedUntil = 0;
  dz.spLabel.textContent = specOf(g).ic + ' ' + specOf(g).name;
  dz.ef.classList.remove('netted');
  // ---- the sand: a 1-D arena. Hold either side of the stage to walk; reach decides everything ----
  D.W = dz.stage.clientWidth || 360;
  D.px = D.W*0.16; D.ex = D.W*0.84;                 // fighter positions (centers)
  D.moveDir = 0; D.movePtr = null;
  D.pSpeed = 130 + g.agi*1.2;                        // your walk speed (AGI helps)
  D.reach  = (76 + (g.gear.weapon||0)*3) * (c.reach||1);   // strike reach in px — class + weapon
  D.eReach = 78 + (i*7)%24;                          // the foe's reach varies by opponent
  D.eSpeed = Math.min(165, 92 + i*3);                // foes close faster up the ladder
  D.atkType = 'jab'; D.retreating = false;
  D.freezeUntil = 0;
  D.phase = 'idle'; D.phaseEnd = 1e15;    // enemy holds until countdown ends
  D.ended = false; D.locked = true;
  renderDuel(D.now || performance.now());
  if(!D.raf) D.raf = requestAnimationFrame(duelFrame);
  // 3-2-1 FIGHT
  const seq = ['III','II','I','FIGHT!']; let k = 0;
  const step = ()=>{
    if(!D.active || D.ended) return;
    if(k >= seq.length){
      dz.banner.innerHTML = '';
      D.locked = false; D.phase = 'idle';
      D.phaseEnd = (D.now || performance.now()) + 650;
      return;
    }
    dz.banner.innerHTML = '<span>'+seq[k]+'</span>'; k++;
    setTimeout(step, 430);
  };
  step();
}

function dInput(k){
  if(!D.active || D.ended || D.locked) return;
  const ts = D.now, g = D.g;
  if(D.cd[k] > ts) return;
  const dist = D.ex - D.px;
  if(k==='strike'){
    if(dist > D.reach){ spawnFloat('player','miss','out of reach'); D.cd.strike = ts+170; D.cdTotal.strike = 170; return; }
    if(D.stam < D.strikeCost){ spawnFloat('player','miss','winded'); return; }
    D.stam -= D.strikeCost;
    let dmg = (g.str*1.25 + g.level*1.4 + D.wpn*0.6) * D.strikeMul * (0.9+Math.random()*0.25), cls='dmg';
    if(D.riposte){ dmg*=D.riposteMul; D.riposte=false; cls='crit'; spawnFloat('enemy','crit','RIPOSTE!'); }
    D.ehp -= dmg;
    dAnim(dz.pf,'p-lunge',150); dAnim(dz.ef,'e-hurt',150);
    spawnFloat('enemy', cls, '-'+Math.round(dmg)); vib(10);
    spawnSparks(D.ex, 5); hitstop(cls==='crit'?110:55);
    addCharge(12);
    D.cd.strike = ts + D.strikeCd; D.cdTotal.strike = D.strikeCd;
    if(D.ehp<=0){ D.ehp=0; endDuel(true); }
  } else if(k==='heavy'){
    if(dist > D.reach*1.18){ spawnFloat('player','miss','out of reach'); D.cd.heavy = ts+170; D.cdTotal.heavy = 170; return; }
    if(D.stam < D.heavyCost){ spawnFloat('player','miss','winded'); return; }
    D.stam -= D.heavyCost;
    let dmg = (g.str*2.5 + g.level*1.8 + D.wpn*1.1) * D.strikeMul * (0.9+Math.random()*0.2), cls='big';
    if(D.phase==='windup'){ D.phase='recover'; D.phaseEnd=ts+850; teleOff(); dAnim(dz.ef,'stagger',850); spawnFloat('enemy','block','STAGGERED!'); }
    if(D.riposte){ dmg*=D.riposteMul; D.riposte=false; cls='crit'; spawnFloat('enemy','crit','RIPOSTE!'); }
    D.ehp -= dmg;
    dAnim(dz.pf,'p-lunge',190); dAnim(dz.ef,'e-hurt',190);
    spawnFloat('enemy', cls, '-'+Math.round(dmg)); vib(18);
    spawnSparks(D.ex, 9); hitstop(95); dAnim(dz.root,'shake',180);
    addCharge(17);
    D.cd.heavy = ts + D.heavyCd; D.cdTotal.heavy = D.heavyCd;
    if(D.ehp<=0){ D.ehp=0; endDuel(true); }
  } else if(k==='block'){
    // bracing costs wind — defense and offense drink from the same skin
    if(D.stam < 20){ spawnFloat('player','miss','winded'); return; }
    D.stam -= 20;
    D.blockUntil = ts + 340; D.cd.block = ts + D.blockCd; D.cdTotal.block = D.blockCd;
  } else if(k==='dodge'){
    if(D.stam < 16){ spawnFloat('player','miss','winded'); return; }
    D.stam -= 16;
    D.px = Math.max(D.W*0.05, D.px - 58);            // a real hop backward — spacing IS the dodge
    D.dodgeUntil = ts + D.dodgeWin*0.62;             // tighter i-frames than before: timing matters now
    D.cd.dodge = ts + D.dodgeCd; D.cdTotal.dodge = D.dodgeCd;
  } else if(k==='special'){
    doSpecial(ts, g);
  }
}

function addCharge(n){ D.charge = Math.min(D.chargeMax, D.charge + n); }

// Fire the class signature move (only when the charge meter is full).
function doSpecial(ts, g){
  if(D.charge < D.chargeMax){ spawnFloat('player','miss','not ready'); return; }
  // melee signatures need the foe in reach — the net alone can be thrown from distance
  if(g.cls !== 'retiarius' && (D.ex - D.px) > D.reach*1.3){ spawnFloat('player','miss','out of reach'); return; }
  D.charge = 0;
  const wpn = D.wpn, S_ = g.str;
  const hit = (dmg, cls, label)=>{
    D.ehp -= dmg;
    dAnim(dz.pf,'p-lunge',220); dAnim(dz.ef,'e-hurt',220);
    if(label) spawnFloat('center','crit', label);
    spawnFloat('enemy', cls||'big', '-'+Math.round(dmg));
    if(D.ehp<=0){ D.ehp=0; endDuel(true); return true; }
    return false;
  };
  vib([15,30,15]);
  switch(g.cls){
    case 'murmillo': {
      teleOff(); D.phase='recover'; D.phaseEnd = ts + 1700;   // heavy stagger
      dAnim(dz.ef,'stagger',1200);
      D.blockUntil = ts + 900;                                 // brace behind the boss
      hit((S_*2.0 + wpn) * (0.95+Math.random()*0.2), 'big', '🛡️ SHIELD BASH');
      break;
    }
    case 'thraex': {
      spawnFloat('center','crit','🗡️ SICA FLURRY');
      let n = 0;
      const cut = ()=>{
        if(!D.active || D.ended) return;
        if(hit((S_*0.95 + wpn*0.4) * (0.9+Math.random()*0.2), 'dmg')) return;
        if(++n < 4) setTimeout(cut, 110);
      };
      cut();
      break;
    }
    case 'retiarius': {
      D.ensnareUntil = ts + 3200; teleOff(); D.phase='idle'; D.phaseEnd = D.ensnareUntil + 200;
      dz.ef.classList.add('netted');
      hit((S_*1.2 + wpn) * (0.9+Math.random()*0.2), 'big', '🕸️ CAST NET');
      break;
    }
    case 'secutor': {
      const missing = 1 - D.ehp/D.emax;                        // deeper vs a wounded foe
      hit((S_*2.0 + wpn) * (1 + missing*2.4) * (0.95+Math.random()*0.15), 'crit', '💀 EXECUTIONER');
      break;
    }
    case 'dimachaerus':
    default: {
      D.exposedUntil = ts + 1600;                              // next blow hurts more
      hit((S_*4.0 + wpn*2) * (0.95+Math.random()*0.2), 'crit', '🌀 WHIRLWIND');
      break;
    }
  }
}

function updateEnemy(ts, dt){
  // ensnared by a net — the foe can neither move nor wind up
  if(ts < D.ensnareUntil){
    if(D.phase==='windup'){ teleOff(); }
    D.phase='idle'; D.phaseEnd = D.ensnareUntil + 150;
    return;
  }
  const dist = D.ex - D.px;
  if(D.phase==='idle'){
    // walk toward striking range; shuffle back if crowded
    if(dist > D.eReach*0.85)      D.ex -= D.eSpeed*dt/1000;
    else if(dist < D.eReach*0.45) D.ex += D.eSpeed*0.6*dt/1000;
    if(D.retreating) D.ex += D.eSpeed*0.7*dt/1000;
    // attack when cooled down and in range
    if(ts >= D.phaseEnd && dist <= D.eReach*1.05){
      const heavy = Math.random() < 0.4;
      D.atkType = heavy ? 'heavy' : 'jab';
      D.windupDur = heavy ? Math.max(560, 820 - D.tier*20) + Math.random()*180
                          : 300 + Math.random()*140;         // jabs are quick — react-blocking them is hard
      D.phase='windup'; D.phaseEnd = ts + D.windupDur;
      teleOn(D.windupDur);
      dz.tele.classList.toggle('jab', !heavy);
    }
  } else if(D.phase==='windup'){
    if(D.atkType==='heavy') D.ex -= 95*dt/1000;              // a heavy commits — he lunges in
    if(ts >= D.phaseEnd) resolveEnemyHit(ts);
  } else if(D.phase==='recover'){
    if(D.retreating) D.ex += 70*dt/1000;
    if(ts >= D.phaseEnd){
      D.phase='idle'; D.retreating = false;
      D.phaseEnd = ts + Math.max(260, (D.atkType==='jab' ? 320+Math.random()*380 : 480+Math.random()*520) - D.tier*10);
    }
  }
  // never overlap, never leave the sand
  D.ex = Math.max(D.px + 64, Math.min(D.W*0.95, D.ex));
}

function resolveEnemyHit(ts){
  teleOff();
  dAnim(dz.ef,'e-lunge',180);
  const dist = D.ex - D.px;
  // spaced it — the blow parts empty air, and he's wide open
  if(dist > D.eReach*1.12){
    D.phase='recover'; D.phaseEnd = ts + 680; D.retreating = false;
    spawnFloat('enemy','miss','WHIFF');
    return;
  }
  D.phase='recover'; D.phaseEnd = ts + (D.atkType==='jab' ? 340 : 560);
  D.retreating = Math.random() < 0.35;
  let dmg = oppPower(D.tier) * (0.55 + Math.random()*0.5) * 0.9 * (D.atkType==='jab' ? 0.5 : 1.15);
  dmg /= (1 + D.g.vit*0.02);
  if(ts < D.blockUntil){ dmg*=D.blockKeep; spawnFloat('player','block','BLOCK'); spawnSparks(D.px, 4, '#8fd0ff'); vib(8); }
  else if(ts < D.dodgeUntil){ dmg=0; D.riposte=true; spawnFloat('player','miss','DODGE!'); spawnFloat('center','block','RIPOSTE READY'); vib(6); }
  else {
    if(ts < D.exposedUntil){ dmg *= 1.6; spawnFloat('player','crit','EXPOSED!'); }   // caught mid-whirlwind
    dAnim(dz.root,'shake',280); vib(30);
  }
  if(dmg>0){ D.php -= dmg; dAnim(dz.pf,'p-hurt',160); spawnFloat('player','pd','-'+Math.round(dmg)); spawnSparks(D.px, 5, '#ff6a4a'); hitstop(45); }
  addCharge(9);                                    // taking a blow builds fury too
  if(D.php<=0){ D.php=0; endDuel(false); }
}

function renderDuel(ts){
  const eW = Math.max(0, D.ehp/D.emax*100)+'%', pW = Math.max(0, D.php/D.pmax*100)+'%';
  dz.ehp.style.width = eW; dz.ehpg.style.width = eW;     // ghost fill trails via CSS delay
  dz.ehpl.textContent = fmt(Math.ceil(Math.max(0,D.ehp)))+' / '+fmt(D.emax);
  dz.php.style.width = pW; dz.phpg.style.width = pW;
  dz.phpl.textContent = Math.ceil(Math.max(0,D.php))+' / '+D.pmax;
  dz.stam.style.width = (D.stam/STAM_MAX*100)+'%';
  dz.stamwrap.classList.toggle('low', D.stam < 30);
  dz.pf.classList.toggle('p-block', ts < D.blockUntil);
  dz.pf.classList.toggle('p-dodge', ts < D.dodgeUntil);
  dz.ef.classList.toggle('netted', ts < D.ensnareUntil);
  // positions on the sand
  if(D.W){
    dz.pf.style.left = (D.px-39)+'px';
    dz.ef.style.left = (D.ex-39)+'px';
    dz.tele.style.left = (D.ex-39)+'px';
    dz.reach.style.left = D.px+'px';
    dz.reach.style.width = D.reach+'px';
    const inReach = (D.ex - D.px) <= D.reach;
    dz.ef.classList.toggle('can-hit', inReach && !D.ended);
    dz.reach.classList.toggle('hot', inReach);
    dz.mvl.classList.toggle('held', D.moveDir===-1);
    dz.mvr.classList.toggle('held', D.moveDir===1);
  }
  const cds = [['strike',dz.bStrike,D.strikeCost],['heavy',dz.bHeavy,D.heavyCost],['block',dz.bBlock,20],['dodge',dz.bDodge,16]];
  for(const [k,btn,cost] of cds){
    const rem = D.cd[k]-ts, tot = D.cdTotal[k]||1;
    btn.querySelector('.cd').style.width = rem>0 ? Math.min(100, rem/tot*100)+'%' : '0%';
    btn.classList.toggle('cooling', rem>0);
    btn.classList.toggle('nostam', cost>0 && D.stam<cost && rem<=0);
  }
  // signature charge meter + ready glow
  dz.charge.style.width = (D.charge/D.chargeMax*100)+'%';
  dz.bSpecial.classList.toggle('ready', D.charge >= D.chargeMax);
}

function duelFrame(ts){
  if(!D.active){ D.raf=null; return; }
  const dt = D.last ? Math.min(100, ts-D.last) : 16;
  D.last = ts; D.now = ts;
  if(!D.ended && !D.locked && ts >= (D.freezeUntil||0)){
    // your legs: hold a side of the arena (or arrow keys) to walk
    if(D.moveDir){
      D.px += D.moveDir * D.pSpeed * dt/1000;
      D.px = Math.max(D.W*0.05, Math.min(D.ex-64, D.px));
    }
    D.stam = Math.min(STAM_MAX, D.stam + (16 + D.g.agi*0.8)*dt/1000);
    updateEnemy(ts, dt);
  }
  renderDuel(ts);
  D.raf = requestAnimationFrame(duelFrame);
}

function endDuel(won){
  if(D.ended) return;
  D.ended = true; D.locked = true; teleOff();
  const g = D.g, i = D.tier;
  g.fights++;
  g.hp = Math.max(0, Math.round(D.php));
  const data = { won, name:g.name, opp:foe(i).n, gain:0, fame:0, xp:0, leveled:0, death:false, drop:null, avenged:null };
  if(won){
    const lvlB = g.level, ev = [];
    const r = grantWin(g, i, ev, false, true);
    data.gain = r.gain; data.drop = r.drop; data.avenged = r.avenged;
    data.fame = r.fame; data.xp = r.xp; data.leveled = g.level - lvlB;
    if(g.hp <= 0) g.hp = 1;                     // a victor lives
    S.stats.duelWins = (S.stats.duelWins||0) + 1;
    if(D.php / D.pmax < 0.12) S.stats.closeCall = (S.stats.closeCall||0) + 1;   // won by a thread
    bumpDaily('duel', 1);
    S.log.push({cls:'win', txt:`⚔️ <b>${g.name}</b> bested ${theFoe(i)} in single combat! <span class="cash">+${fmt(data.gain)}◈</span> · +${fmt(data.fame)} fame`});
    if(data.drop) S.log.push({cls:'level', txt:`🎁 <b>${g.name}</b> claimed a <b>${data.drop.name}</b> as spoils.`});
    dAnim(dz.ef,'downed',1400); vib([20,40,30]);
    stageFx('roar', 900); spawnSparks(D.ex, 14); dAnim(dz.root,'shake',260);
  } else if(Math.random() < deathCut(S.fac.infirmary)){
    // the Medicus drags a dying man from the sand — Infirmary level sets the odds
    g.state = 'injured'; g.progress = 0; g.hp = 0;
    S.log.push({cls:'lose', txt:`⚕️ The Medicus drags <b>${g.name}</b> from the sand — barely alive. The crowd exhales.`});
    dAnim(dz.pf,'downed',1400); vib(70);
  } else {
    // a duel is to the death — you had control, so a loss here is final
    g._dead = true; data.death = true;
    recordDeath(g, i);
    S.log.push({cls:'death', txt:`💀 <b>${g.name}</b> fell to ${theFoe(i)} in single combat. The ludus mourns.`});
    dAnim(dz.pf,'downed',1400); vib(90);
    stageFx('mourn', 1400);
  }
  if(S.log.length>60) S.log = S.log.slice(-60);
  save();
  setTimeout(()=>{ if(D.active) showResult(data); }, 750);
}

function showResult(data){
  const row = (l,v,c)=>`<div class="away-row"><span>${l}</span><b style="color:${c||'#fff'}">${v}</b></div>`;
  let emoji, title, sub, rows='', btns='';
  if(data.won){
    emoji='🏆'; title='VICTORY'; sub='The crowd roars your name';
    rows += row('◈ Purse', '+'+fmt(data.gain), 'var(--gold2)');
    rows += row('✦ Fame', '+'+fmt(data.fame), '#cf9fb6');
    rows += row('✧ Experience', '+'+fmt(data.xp), '#8fe08a');
    if(data.leveled>0) rows += row('⭐ Levels gained', '+'+data.leveled, '#fff');
    if(data.drop) rows += row('🎁 Looted', GEAR[data.drop.slot].ic+' '+data.drop.name, '#c8a0e0');
    btns += `<div class="dcbtn again" id="dr-again">Fight Again</div>`;
    if(D.tier < S.maxTier && D.tier < MAX_RANK-1)
      btns += `<div class="dcbtn go" id="dr-next">Next foe: ${foe(D.tier+1).n}</div>`;
    btns += `<div class="dcbtn leave" id="dr-leave">Return to Ludus</div>`;
  } else if(data.death){
    emoji='💀'; title='DEATH'; sub=`${data.name} dies on the sand`;
    rows = `<div style="font-family:var(--font-b);font-style:italic;color:#c9a074;text-align:center;padding:8px 4px;line-height:1.5">Sic transit gloria. Their name joins the fallen. Recruit another and begin anew.</div>`;
    btns = `<div class="dcbtn leave" id="dr-leave">Return to Ludus</div>`;
  } else {
    emoji='🩸'; title='DEFEAT'; sub=`${data.name} is carried off, gravely wounded`;
    rows = `<div style="font-family:var(--font-b);font-style:italic;color:#c9a074;text-align:center;padding:8px 4px;line-height:1.5">They will mend in the infirmary. Upgrade it to heal faster — and to cheat death when a bout goes wrong.</div>`;
    btns = `<div class="dcbtn leave" id="dr-leave">Return to Ludus</div>`;
  }
  dz.cover.style.display = 'flex';
  dz.cover.innerHTML = `<div class="big-em">${emoji}</div><h2>${title}</h2><div class="cs">${sub}</div>
    <div class="reward-list">${rows}</div><div class="btn-col">${btns}</div>`;
  const again=$('#dr-again'), next=$('#dr-next'), leave=$('#dr-leave');
  if(again) again.onclick=()=> beginDuel();
  if(next) next.onclick=()=>{ D.tier++; S.tier=D.tier; beginDuel(); };
  if(leave) leave.onclick=()=> closeDuel();
}

function closeDuel(){
  D.active = false;
  if(D.raf){ cancelAnimationFrame(D.raf); D.raf=null; }
  if(dz) dz.root.classList.remove('on');
  const g = D.g;
  if(g){
    if(g._dead) S.gladiators = S.gladiators.filter(x=>x!==g);
    else if(g.state==='dueling') g.state='idle';
  }
  D.g = null; D.last = 0;
  save(); goTab('ludus');
}

/* ============================ INIT ============================ */
function boot(){
  const had = load();
  if(!had){ S = initState(); nextId = S.nextId; }
  // offline catch-up
  let away = null;
  if(had) away = catchUp();

  // nav
  document.querySelectorAll('.nav-b').forEach(b=>{
    b.onclick=()=> goTab(b.dataset.tab);
  });
  $('#auto-toggle').onclick=()=>{
    S.autoFight = !S.autoFight;
    $('#auto-switch').classList.toggle('on', S.autoFight);
    if(S.autoFight) toast('Auto-Battle on — idle fighters will enter the arena.');
    else toast('Auto-Battle off.');
    refresh(); save();
  };
  $('#reset-btn').onclick=()=>{
    const ov = el('div','overlay'); const m = el('div','modal');
    m.innerHTML = `<h2>Raze the Ludus?</h2><div class="sub">This cannot be undone</div>
      <p style="font-family:var(--font-b);text-align:center;color:var(--ink-soft);font-size:13px">Every gladiator, coin, and building will be lost to history. Begin anew?</p>
      <div class="m-btns"><div class="btn recall" id="r-no" style="flex:1">Keep it</div><div class="btn fight" id="r-yes" style="flex:1">Raze it</div></div>`;
    ov.appendChild(m); document.body.appendChild(ov);
    m.querySelector('#r-no').onclick=()=>ov.remove();
    m.querySelector('#r-yes').onclick=()=>{
      localStorage.removeItem(SAVE_KEY); S = initState(); nextId=S.nextId;
      ov.remove(); goTab('ludus'); toast('A new ludus rises from the dust.'); save();
    };
  };

  goTab('ludus');
  if(away && (away.fights>0 || away.gold>0 || away.deaths>0)) showAway(away);
  refresh(); save();
  requestAnimationFrame(loop);

  // save on hide; catch up on return (covers backgrounded tabs without freezing)
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden){ save(); return; }
    lastFrame = 0; acc = 0;                 // rebaseline the rAF clock
    if(D.active) return;                    // an active duel runs its own loop; don't catch up over it
    const a = catchUp();
    if(a && a.secs >= 60 && (a.fights>0 || a.gold>0 || a.deaths>0)) showAway(a);
    refresh();
  });
  window.addEventListener('pagehide', save);
  window.addEventListener('beforeunload', save);
}

boot();
})();
</script>
