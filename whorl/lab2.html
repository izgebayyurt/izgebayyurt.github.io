<!doctype html>
<!-- whorl · casting lab (lab2) — Inkwells one-verb prototype -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Whorl · Casting Lab</title>
<meta name="description" content="Inkwells casting prototype — one verb: trace a path across six colour wells and release to cast." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- header ---------- */
.hud{ position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:0; right:0; z-index:4;
  display:flex; align-items:center; gap:8px; padding:0 10px; pointer-events:none; }
.title{ font-family:var(--font-d); font-weight:700; font-size:15px; letter-spacing:.3px;
  background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); padding:5px 11px; white-space:nowrap; }
.title span{ color:var(--ink-soft); font-weight:600; }
.spacer{ flex:1; }
.pills{ display:flex; gap:0; pointer-events:auto; background:var(--paper2);
  border:2.5px solid var(--ink); border-radius:12px; box-shadow:0 3px 0 var(--shadow); overflow:hidden; }
.pill{ font-family:var(--font-d); font-weight:600; font-size:12px; padding:6px 9px; cursor:pointer;
  color:var(--ink-soft); background:transparent; border:none; border-right:2px solid var(--ink);
  transition:background .15s var(--calm), color .15s var(--calm); touch-action:manipulation; }
.pill:last-child{ border-right:none; }
.pill.on{ background:var(--accent); color:var(--ink); }

/* ---------- tuning drawer ---------- */
.gear{ position:fixed; left:calc(env(safe-area-inset-left) + 12px); bottom:calc(env(safe-area-inset-bottom) + 12px);
  z-index:6; width:46px; height:46px; border-radius:14px; background:var(--card); border:2.5px solid var(--ink);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.gear:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.drawer{ position:fixed; left:0; bottom:0; z-index:7; width:100%; max-width:360px; margin:0 auto; right:0;
  background:var(--card); border:3px solid var(--ink); border-bottom:none; border-radius:20px 20px 0 0;
  box-shadow:0 -4px 0 var(--shadow); padding:16px 18px calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(110%); transition:transform .3s var(--pop); }
.drawer.open{ transform:translateY(0); }
.drawer h3{ font-family:var(--font-d); font-weight:700; font-size:16px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.drawer h3 .x{ margin-left:auto; cursor:pointer; font-size:20px; color:var(--ink-soft); line-height:1; }
.row{ display:flex; align-items:center; gap:10px; margin:9px 0; font-weight:700; font-size:12.5px; }
.row label{ flex:none; width:104px; color:var(--ink-soft); }
.row input[type=range]{ flex:1; accent-color:#3d8bdf; height:22px; }
.row .val{ flex:none; width:44px; text-align:right; font-family:var(--font-d); font-weight:600; font-size:13px; }
.btnrow{ display:flex; gap:8px; margin:12px 0 6px; }
.tbtn{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:9px 6px; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.tbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:10px; }
.stat{ background:var(--paper2); border:2.5px solid var(--ink); border-radius:11px; padding:7px 4px; text-align:center;
  box-shadow:0 2px 0 var(--shadow); }
.stat b{ font-family:var(--font-d); font-weight:700; font-size:17px; display:block; line-height:1.1; }
.stat small{ font-family:var(--font-u); font-weight:800; font-size:8.5px; letter-spacing:.08em; color:var(--ink-soft); text-transform:uppercase; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="title">Whorl <span>· Casting Lab</span></div>
  <div class="spacer"></div>
  <div class="pills" id="pills">
    <button class="pill" data-layout="HEX">HEX</button>
    <button class="pill" data-layout="ARC">ARC</button>
    <button class="pill" data-layout="GRID">GRID</button>
  </div>
</div>

<div class="gear" id="gear">⚙</div>
<div class="drawer" id="drawer">
  <h3>Tuning <span class="x" id="drawerClose">×</span></h3>
  <div class="row"><label>Regen (s)</label><input type="range" id="sRegen" min="1.0" max="6.0" step="0.1"><span class="val" id="vRegen">2.5</span></div>
  <div class="row"><label>Spawn (s)</label><input type="range" id="sSpawn" min="1.0" max="8.0" step="0.1"><span class="val" id="vSpawn">3.0</span></div>
  <div class="row"><label>Enemy px/s</label><input type="range" id="sSpeed" min="4" max="40" step="1"><span class="val" id="vSpeed">14</span></div>
  <div class="btnrow">
    <button class="tbtn" id="bRefill">Refill wells</button>
    <button class="tbtn" id="bClear">Clear enemies</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="stCasts">0</b><small>casts</small></div>
    <div class="stat"><b id="stFizzles">0</b><small>fizzles</small></div>
    <div class="stat"><b id="stKills">0</b><small>kills</small></div>
    <div class="stat"><b id="stLeaks">0</b><small>leaks</small></div>
    <div class="stat"><b id="stAvg">0.0</b><small>avg len</small></div>
    <div class="stat"><b id="stWords">0</b><small>words</small></div>
  </div>
</div>

<script>
"use strict";
(function(){
// ---------------- constants ----------------
const COLS = ['R','Y','B','O','G','P'];
const HEX = {
  R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6'
};
const HEX_DARK = { // darker rim tone per colour
  R:'#c02c3c', Y:'#c99518', B:'#2564a8', O:'#c26a20', G:'#3a9247', P:'#6f3fae'
};
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const MAX_INK = 5;
const HYST = 1.28;        // must leave well radius * this before re-entering same well
const MAX_VISITS = 6;
const ESCAPE = 46;        // px beyond last well to enter aim mode
const HOLD_TICK = 0.45;   // seconds per pump tick
const NAMES_WING = { R:'Fire', Y:'Splash', B:'Lance', O:'Fan', G:'Bog', P:'Orb' };
const NAMES_HEART = { R:'bolt', Y:'ray', B:'shard', O:'burst', G:'mire', P:'hex' };

// ---------------- persisted settings ----------------
function lsGet(k, d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k, v){ try{ localStorage.setItem(k, v); }catch(e){} }

let layout = lsGet('whlab2_layout','HEX');
if(!['HEX','ARC','GRID'].includes(layout)) layout='HEX';
let REGEN = parseFloat(lsGet('whlab2_regen','2.5'));
if(!(REGEN>=1&&REGEN<=6)) REGEN=2.5;
let SPAWN = 3.0;
let ESPEED = 14;

// ---------------- canvas ----------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=390, H=800, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W*DPR); canvas.height = Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layoutWells();
}
window.addEventListener('resize', resize);

// offscreen for metaball field
const off = document.createElement('canvas');
const octx = off.getContext('2d');
function sizeOff(){ off.width=Math.round(W*0.6); off.height=Math.round(H*0.6); }

// ---------------- wells ----------------
// each: {c, x, y, r, ink (float display), inkN (int actual), regenT, wobble}
let wells = [];
function wellRadius(){ return Math.max(26, Math.min(40, W*0.087)); }
function layoutWells(){
  const r = wellRadius();
  const cx = W*0.5;
  const fieldBottom = H*0.55; // keyboard lives below this
  let pts = [];
  if(layout==='HEX'){
    const rad = Math.min(W*0.30, (H*0.42-r*1.4)/2 );
    const cyc = H*0.55 + (H*0.45 - 60)*0.52;
    // 6 wells on a circle, start at top
    for(let i=0;i<6;i++){
      const a = -Math.PI/2 + i*(Math.PI*2/6);
      pts.push([cx + Math.cos(a)*rad, cyc + Math.sin(a)*rad]);
    }
  } else if(layout==='ARC'){
    // arc of 6 along bottom, like a hand of cards (ends raised, centre dips)
    const spread = Math.min(W - 2*r - 18, r*2*6*0.92);
    const baseY = H - 132 - r;
    const arcH = 40;
    for(let i=0;i<6;i++){
      const t = (i/(6-1)) - 0.5;             // -0.5..0.5
      const x = cx + t*spread;
      const y = baseY + Math.cos(t*Math.PI)*arcH; // centre lower, ends higher
      pts.push([x,y]);
    }
  } else { // GRID 2x3
    const gapx = Math.min(W*0.30, r*2.35);
    const gapy = r*2.78;
    const startY = H - 96 - r - gapy;
    for(let i=0;i<6;i++){
      const col = i%3, row=(i/3)|0;
      pts.push([cx + (col-1)*gapx, startY + row*gapy]);
    }
  }
  if(wells.length!==6){
    wells = COLS.map((c,i)=>({c, x:pts[i][0], y:pts[i][1], r, ink:MAX_INK, inkN:MAX_INK, regenT:0, wob:0, refuse:0}));
  } else {
    for(let i=0;i<6;i++){ wells[i].x=pts[i][0]; wells[i].y=pts[i][1]; wells[i].r=r; }
  }
}

// ---------------- game state ----------------
let enemies = [];  // {x,y,r,hp,maxhp,col,wob,dead,death}
let spells = [];   // travelling spells {x,y,vx,vy,form,wing,heart,dmg,life,tint,trail}
let warriors = []; // {x,y,r,hp,maxhp,col,tier}
let puffs = [];    // fizzle/impact particles {x,y,vx,vy,life,max,r,col,text?}
let dmgPops = [];  // {x,y,life,val,col}
let spawnT = 0;
let stats = { casts:0, fizzles:0, kills:0, leaks:0, words:0, totalLen:0 };

// ---------------- input / path ----------------
let path = [];         // sequence of well indices visited
let dragging = false;
let pointer = {x:0,y:0};
let lastWellIdx = -1;   // last well finger is currently "inside" (for hysteresis)
let aiming = false;
let aimVec = {x:0,y:1};
let holdWell = -1;      // well index for hold-to-pump
let holdT = 0;
let holdCount = 0;
let holdMoved = false;
let blobs = [];         // visual metaball blobs {wi, x,y, tx,ty, r, born, col}
let startPos = {x:0,y:0};

function wellAt(x,y, mult){
  mult = mult||1;
  for(let i=0;i<6;i++){
    const w=wells[i]; const d=Math.hypot(x-w.x,y-w.y);
    if(d <= w.r*mult) return i;
  }
  return -1;
}
function keyboardTop(){ // y above which is "field"; below is keyboard escape area reference
  let miny=1e9; for(const w of wells) miny=Math.min(miny, w.y-w.r);
  return miny;
}

function beginPath(i){
  path=[i]; lastWellIdx=i; aiming=false; blobs=[];
  addBlob(i);
  wells[i].wob = 1;
}
function addBlob(i){
  const w=wells[i];
  blobs.push({wi:i, x:w.x, y:w.y - w.r*0.1, tx:w.x, ty:w.y, r:0, born:performance.now(), col:w.c, seed:Math.random()*6.28});
}
function tryExtend(i){
  if(path.length>=MAX_VISITS) return;
  // ink availability check (count how many times this well already used vs its inkN)
  const usedCount = path.filter(p=>p===i).length;
  if(usedCount >= wells[i].inkN){
    wells[i].refuse = 1; // shake / refuse
    return;
  }
  path.push(i);
  addBlob(i);
  wells[i].wob = 1;
  vibrate(8);
}

// ---------------- casting ----------------
function wordFromPath(p){ return p.map(i=>wells[i].c); }

function isPalindrome(a){
  for(let i=0,j=a.length-1;i<j;i++,j--) if(a[i]!==a[j]) return false;
  return true;
}
function allSame(a){ return a.every(c=>c===a[0]); }

// classify a word -> {type:'pure'|'mixed'|'fizzle', ...}
function classify(word){
  const n=word.length;
  if(n<3 || n>5) return {type:'fizzle', reason: n>5?'too long':'too short'};
  if(allSame(word)) return {type:'pure', col:word[0], len:n};
  if(isPalindrome(word)) return {type:'mixed', wing:word[0], heart:word[Math.floor(n/2)], len:n};
  return {type:'fizzle', reason:'not mirror'};
}
// Can this partial word STILL become valid with more visits (up to 5)?
function canStillBeValid(word){
  const n=word.length;
  if(n===0) return true;
  if(n>5) return false;
  // pure still possible?
  if(allSame(word)) return true;
  // mixed: needs to become a palindrome of length 3..5.
  // Check if word is a prefix of some palindrome length L in [max(n,3)..5].
  for(let L=Math.max(n,3); L<=5; L++){
    if(prefixCanPalindrome(word, L)) return true;
  }
  return false;
}
function prefixCanPalindrome(word, L){
  // build array length L, fill known prefix, unknown = null. mirror constraint.
  const a = new Array(L).fill(null);
  for(let i=0;i<word.length;i++) a[i]=word[i];
  for(let i=0,j=L-1;i<=j;i++,j--){
    const x=a[i], y=a[j];
    if(x!==null && y!==null && x!==y) return false;
  }
  return true;
}

function nameFor(cls){
  if(cls.type==='pure') return 'Warrior '+cls.col;
  if(cls.type==='mixed') return NAMES_WING[cls.wing] + NAMES_HEART[cls.heart];
  return '';
}

const DMG_BY_LEN = {3:10,4:22,5:40};

// perform an actual cast from current path
function castFromPath(vec){
  const word = wordFromPath(path);
  const cls = classify(word);
  // consume ink for each visit (already validated availability on entry, but clamp)
  const usage = {};
  for(const i of path){ usage[i]=(usage[i]||0)+1; }

  if(cls.type==='fizzle' || word.length<3){
    // refund HALF, floor
    for(const i in usage){
      const spent = usage[i];
      const refund = Math.floor(spent/2);
      wells[i].inkN = Math.min(MAX_INK, wells[i].inkN - spent + refund);
      wells[i].wob = 1;
    }
    doFizzle();
    stats.fizzles++; stats.words++;
    stats.totalLen += word.length;
    endPath();
    return {result:'fizzle', word:word.join('')};
  }
  // valid: spend full
  for(const i in usage){ wells[i].inkN = Math.max(0, wells[i].inkN - usage[i]); wells[i].wob=1; }

  const origin = castOrigin();
  const v = normVec(vec);
  if(cls.type==='pure'){
    summonWarrior(cls.col, cls.len, origin);
  } else {
    launchSpell(cls, origin, v);
  }
  stats.casts++; stats.words++; stats.totalLen += word.length;
  vibrate(24);
  endPath();
  return {result:cls.type, word:word.join(''), name:nameFor(cls)};
}

function castOrigin(){
  // center of keyboard-ish: average of wells
  let sx=0,sy=0; for(const w of wells){ sx+=w.x; sy+=w.y; }
  return {x:sx/6, y:keyboardTop()-6};
}
function normVec(v){
  const m=Math.hypot(v.x,v.y)||1; return {x:v.x/m, y:v.y/m};
}
function nearestEnemyVec(origin){
  let best=null,bd=1e9;
  for(const e of enemies){ if(e.dead) continue; const d=Math.hypot(e.x-origin.x,e.y-origin.y); if(d<bd){bd=d;best=e;} }
  if(best) return normVec({x:best.x-origin.x, y:best.y-origin.y});
  return {x:0,y:-1};
}

function summonWarrior(col, len, origin){
  const tier = len-2; // 1,2,3
  const r = 15 + tier*6;
  const hp = 30 + tier*30;
  warriors.push({x:origin.x + (Math.random()-0.5)*40, y:origin.y-10, r, hp, maxhp:hp, col, tier, atk:6+tier*4, atkT:0});
  for(let k=0;k<10;k++){ puffs.push(mkPuff(origin.x,origin.y, HEX[col])); }
}

function launchSpell(cls, origin, v){
  const form = cls.wing;      // wing colour -> form
  const heart = cls.heart;    // heart -> tint/flavour + bonus
  const dmg = DMG_BY_LEN[cls.len] + (heart==='R'?6:heart==='P'?4:heart==='B'?3:2);
  const speed = form==='R'?520 : form==='B'?420 : form==='P'?190 : form==='O'?300 : form==='Y'?250 : 300;
  function one(vv, extra){
    spells.push({
      x:origin.x, y:origin.y, vx:vv.x*speed, vy:vv.y*speed,
      form, wing:cls.wing, heart, dmg, life:2.4, r: form==='P'?20:form==='B'?10:13,
      tint:HEX[heart], col:HEX[cls.wing], pierce: form==='B', trail:[], lob: form==='Y', t:0,
      pool: form==='G', gravity: form==='Y'?260:0, ...extra
    });
  }
  if(form==='O'){ // wide fan of 3
    const spread=0.32;
    one(rot(v,-spread)); one(v); one(rot(v,spread));
  } else {
    one(v);
  }
}
function rot(v,a){ const c=Math.cos(a),s=Math.sin(a); return {x:v.x*c-v.y*s, y:v.x*s+v.y*c}; }

function doFizzle(){
  const o = castOrigin();
  for(const b of blobs){
    for(let k=0;k<3;k++){ const p=mkPuff(b.x,b.y, HEX[b.col]); p.life*=0.7; puffs.push(p); }
  }
  vibrate([12,30,12]);
}

function endPath(){ path=[]; blobs=[]; aiming=false; lastWellIdx=-1; dragging=false; }

function mkPuff(x,y,col){
  const a=Math.random()*6.28, sp=40+Math.random()*90;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30, life:0.5+Math.random()*0.3, max:0.8, r:4+Math.random()*5, col};
}

function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ---------------- enemies ----------------
function spawnEnemy(){
  const hp = Math.random()<0.5?20:40;
  const r = hp===20?18:24;
  const col = COLS[(Math.random()*6)|0];
  enemies.push({x: r+ Math.random()*(W-2*r), y:-r-6, r, hp, maxhp:hp, col:HEX[col], wob:Math.random()*6.28, dead:false, death:0});
}
function damageEnemy(e, dmg, col){
  if(e.dead) return;
  e.hp -= dmg; e.wob += 1.6;
  dmgPops.push({x:e.x, y:e.y-e.r-4, life:0.9, val:Math.round(dmg), col:col||INK});
  for(let k=0;k<6;k++){ puffs.push(mkPuff(e.x,e.y, col||e.col)); }
  if(e.hp<=0){ e.dead=true; e.death=0; stats.kills++;
    for(let k=0;k<12;k++){ const p=mkPuff(e.x,e.y,e.col); p.life+=0.2; puffs.push(p); }
  }
}

// ---------------- update loop ----------------
let last=performance.now();
function tick(now){
  let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now;
  update(dt);
  render(now);
  requestAnimationFrame(tick);
}

function update(dt){
  // well regen + wobble decay
  for(const w of wells){
    if(w.inkN<MAX_INK){
      w.regenT += dt;
      if(w.regenT>=REGEN){ w.regenT-=REGEN; w.inkN=Math.min(MAX_INK,w.inkN+1); w.wob=1; }
    } else w.regenT=0;
    // display ink eases toward inkN minus current-path pending usage
    let pending = 0;
    if(dragging && !holdActive()) pending = path.filter(p=>wells.indexOf(w)===p?false:false).length;
    const target = w.inkN;
    w.ink += (target - w.ink)*Math.min(1, dt*10);
    w.wob *= Math.pow(0.02, dt);
    w.refuse *= Math.pow(0.001, dt);
  }

  // hold-to-pump
  if(holdActive()){
    holdT += dt;
    if(holdT>=HOLD_TICK){
      holdT-=HOLD_TICK;
      const w=wells[holdWell];
      if(holdCount < Math.min(MAX_INK, w.inkN) && holdCount<5){ holdCount++; w.wob=1; vibrate(14); }
    }
  }

  // spells
  for(const s of spells){
    s.t += dt; s.life-=dt;
    if(s.gravity) s.vy += s.gravity*dt;
    s.x += s.vx*dt; s.y += s.vy*dt;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>10) s.trail.shift();
    // collision
    for(const e of enemies){
      if(e.dead) continue;
      if(Math.hypot(e.x-s.x, e.y-s.y) < e.r + s.r*0.7){
        damageEnemy(e, s.dmg, s.col);
        spawnSplash(s.x,s.y,s.col);
        if(!s.pierce){ s.life=0; }
        else { s.dmg*=0.7; }
        break;
      }
    }
    if(s.lob && s.vy>0 && s.y>H*0.5){ // splash lands
      spawnSplash(s.x,s.y,s.col);
      for(const e of enemies){ if(!e.dead && Math.hypot(e.x-s.x,e.y-s.y)<50){ damageEnemy(e, s.dmg*0.8, s.col); } }
      s.life=0;
    }
    if(s.y<-40||s.x<-40||s.x>W+40||s.y>H+40) s.life=0;
  }
  spells = spells.filter(s=>s.life>0);

  // warriors march up, block enemies
  for(const wr of warriors){
    wr.y -= 34*dt;
    wr.atkT -= dt;
    for(const e of enemies){
      if(e.dead) continue;
      if(Math.hypot(e.x-wr.x,e.y-wr.y) < e.r+wr.r){
        wr.y += 34*dt*0.9; // hold ground
        if(wr.atkT<=0){ damageEnemy(e, wr.atk, HEX[wr.col]); wr.atkT=0.5; wr.hp-=6; }
      }
    }
    if(wr.y< -30) wr.hp=0;
  }
  warriors = warriors.filter(w=>w.hp>0);

  // enemies drift down
  for(const e of enemies){
    if(e.dead){ e.death+=dt; continue; }
    e.y += ESPEED*dt;
    e.wob += dt*1.4;
    if(e.y > keyboardTop()-6){ e.dead=true; e.death=0; e.leaked=true; stats.leaks++;
      for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,e.col));
    }
  }
  enemies = enemies.filter(e=> !e.dead || e.death<0.4);

  // spawn
  spawnT += dt;
  if(spawnT>=SPAWN){ spawnT-=SPAWN; if(enemies.filter(e=>!e.dead).length<14) spawnEnemy(); }

  // particles
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs = puffs.filter(p=>p.life>0);
  for(const d of dmgPops){ d.life-=dt; d.y-=34*dt; }
  dmgPops = dmgPops.filter(d=>d.life>0);

  // blob positions ease toward path spread along drawn route
  updateBlobs(dt);

  updateStatsUI();
}
function holdActive(){ return holdWell>=0 && !holdMoved && dragging; }

function spawnSplash(x,y,col){
  for(let k=0;k<9;k++){ const p=mkPuff(x,y,col); p.r+=2; puffs.push(p); }
}

// ---------------- metaball blobs ----------------
function updateBlobs(dt){
  const n=blobs.length;
  for(let k=0;k<n;k++){
    const b=blobs[k];
    if(aiming){
      // condense into swirled orb at pointer
      const ang = (k/n)*6.28;
      b.tx = pointer.x + Math.cos(ang+performance.now()/300)*6;
      b.ty = pointer.y + Math.sin(ang+performance.now()/300)*6;
      b.r += (16 - b.r)*Math.min(1,dt*8);
    } else {
      const w=wells[b.wi];
      // string blobs from their well toward pointer along index
      const f = n>1 ? k/(n-1) : 0;
      b.tx = w.x + (pointer.x - w.x)*0.16;
      b.ty = w.y - w.r*0.2 + (pointer.y - w.y)*0.16;
      b.r += (14 - b.r)*Math.min(1,dt*10);
    }
    b.x += (b.tx-b.x)*Math.min(1,dt*14);
    b.y += (b.ty-b.y)*Math.min(1,dt*14);
  }
}

// ---------------- render ----------------
function render(now){
  ctx.clearRect(0,0,W,H);
  // field / keyboard divider
  drawFieldLine();
  drawEnemies(now);
  drawWarriors(now);
  drawSpells(now);
  drawWells(now);
  drawMetaChain(now);
  drawPuffs();
  drawDmgPops();
  drawWord(now);
  drawAim(now);
  drawHoldRing(now);
}

function drawFieldLine(){
  const y = keyboardTop()-14;
  ctx.save();
  ctx.strokeStyle='rgba(44,39,51,.14)'; ctx.lineWidth=2; ctx.setLineDash([2,7]); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,y); ctx.lineTo(W-14,y); ctx.stroke();
  ctx.restore();
}

function stickerCircle(x,y,r,fill,rim,lw){
  ctx.save();
  ctx.shadowColor='rgba(44,39,51,.28)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent';
  ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke();
  ctx.restore();
}

function drawWells(now){
  for(let i=0;i<6;i++){
    const w=wells[i];
    const r=w.r;
    const wob = w.wob;
    const refuse = w.refuse;
    const shake = refuse>0.02 ? Math.sin(now/22)*refuse*4 : 0;
    const cx=w.x+shake, cy=w.y;
    // pot outer
    ctx.save();
    ctx.shadowColor='rgba(44,39,51,.30)'; ctx.shadowOffsetY=4; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,6.2832); ctx.fillStyle=PAPER2; ctx.fill();
    ctx.restore();
    // clip and draw liquid
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r-2,0,6.2832); ctx.clip();
    const lvl = w.ink/MAX_INK;          // 0..1
    const wobAmp = 2 + wob*3;
    const surfaceY = cy + r - (r*2*lvl);
    ctx.beginPath();
    ctx.moveTo(cx-r, cy+r+2);
    ctx.lineTo(cx-r, surfaceY);
    const steps=10;
    for(let s=0;s<=steps;s++){
      const px = cx-r + (2*r)*(s/steps);
      const py = surfaceY + Math.sin(now/240 + s*0.9 + i)*wobAmp;
      ctx.lineTo(px,py);
    }
    ctx.lineTo(cx+r, cy+r+2); ctx.closePath();
    // gradient fill
    const g=ctx.createLinearGradient(0,surfaceY-8,0,cy+r);
    g.addColorStop(0, HEX[w.c]);
    g.addColorStop(1, HEX_DARK[w.c]);
    ctx.fillStyle = g; ctx.fill();
    // surface glint line
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let s=0;s<=steps;s++){
      const px = cx-r + (2*r)*(s/steps);
      const py = surfaceY + Math.sin(now/240 + s*0.9 + i)*wobAmp;
      s===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.restore();
    // rim
    const inPath = path.includes(i);
    const canUse = wells[i].inkN>0;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r,0,6.2832);
    ctx.lineWidth = inPath?4.5:3; ctx.strokeStyle= inPath?ACCENT:INK; ctx.stroke();
    if(!canUse){ // empty look: dashed grey overlay
      ctx.beginPath(); ctx.arc(cx,cy,r-1,0,6.2832);
      ctx.fillStyle='rgba(240,230,207,.35)'; ctx.fill();
    }
    ctx.restore();
    // letter label
    ctx.save();
    ctx.font='700 15px Fredoka, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(44,39,51,.85)';
    ctx.fillText(w.c, cx, cy - r - 2 - 8);
    // ink count pips as small text
    ctx.font='800 10px Nunito, sans-serif'; ctx.fillStyle='rgba(44,39,51,.55)';
    ctx.fillText(wells[i].inkN+'', cx, cy);
    ctx.restore();
  }
}

// metaball chain rendered via offscreen colour field + alpha threshold (huemeld trick)
function hexToRgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function drawMetaChain(now){
  if(blobs.length===0) return;
  sizeOff();
  const sx = off.width/W, sy=off.height/H;
  octx.setTransform(1,0,0,1,0,0);
  octx.clearRect(0,0,off.width,off.height);
  // additively paint each blob's OWN colour as a soft radial field
  octx.globalCompositeOperation='lighter';
  for(const b of blobs){
    const R = b.r*2.5*sx;
    const gx=b.x*sx, gy=b.y*sy;
    const [r,g,bl]=hexToRgb(HEX[b.col]);
    const grd=octx.createRadialGradient(gx,gy,0,gx,gy,R);
    grd.addColorStop(0,`rgba(${r},${g},${bl},1)`);
    grd.addColorStop(0.55,`rgba(${r},${g},${bl},.55)`);
    grd.addColorStop(1,`rgba(${r},${g},${bl},0)`);
    octx.fillStyle=grd;
    octx.beginPath(); octx.arc(gx,gy,R,0,6.2832); octx.fill();
  }
  octx.globalCompositeOperation='source-over';
  // threshold the accumulated coverage (alpha) into gooey merged shapes; keep colour
  const img = octx.getImageData(0,0,off.width,off.height);
  const d=img.data;
  for(let p=0;p<d.length;p+=4){
    const a=d[p+3];
    if(a>150){ d[p+3]=255; }
    else if(a>92){ d[p+3]=Math.round((a-92)/58*255); }  // soft goo edge
    else d[p+3]=0;
    // normalise over-additive colour back to a vivid tint
    if(d[p+3]>0){
      const mx=Math.max(d[p],d[p+1],d[p+2])||1; const k=Math.min(1,235/mx);
      d[p]=Math.min(255,d[p]*k*1.05); d[p+1]=Math.min(255,d[p+1]*k*1.05); d[p+2]=Math.min(255,d[p+2]*k*1.05);
    }
  }
  octx.putImageData(img,0,0);
  ctx.save();
  ctx.imageSmoothingEnabled=true;
  // ink rim: draw the goo silhouette slightly enlarged in dark ink first
  ctx.globalAlpha=0.55;
  ctx.drawImage(off,0,0,off.width,off.height,-1.5,-1.5,W+3,H+3);
  ctx.globalCompositeOperation='source-atop';
  ctx.fillStyle='rgba(44,39,51,.28)'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  // coloured goo body
  ctx.globalAlpha=1;
  ctx.drawImage(off,0,0,off.width,off.height,0,0,W,H);
  ctx.restore();
  // crisp glossy highlight per blob for identity
  ctx.save();
  for(const b of blobs){
    ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.32,b.r*0.24,0,6.2832);
    ctx.fillStyle='rgba(255,255,255,.75)'; ctx.fill();
  }
  ctx.restore();
}

function drawEnemies(now){
  for(const e of enemies){
    const t = e.dead ? (1-e.death/0.4) : 1;
    if(t<=0) continue;
    const r=e.r*(e.dead? (0.6+0.4*t) : 1) + Math.sin(e.wob)*1.5;
    ctx.save();
    ctx.globalAlpha = e.dead? t : 1;
    stickerCircle(e.x, e.y, r, e.col, INK, 3);
    // face-ish: hp arc
    ctx.beginPath();
    const frac = Math.max(0,e.hp/e.maxhp);
    ctx.arc(e.x,e.y,r+5, -Math.PI/2, -Math.PI/2 + frac*6.2832);
    ctx.strokeStyle='rgba(44,39,51,.4)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.restore();
  }
}
function drawWarriors(now){
  for(const wr of warriors){
    const r=wr.r + Math.sin(now/180+wr.x)*1.5;
    stickerCircle(wr.x, wr.y, r, HEX[wr.col], INK, 3);
    // eyes
    ctx.save(); ctx.fillStyle=INK;
    ctx.beginPath(); ctx.arc(wr.x-r*0.3, wr.y-r*0.1, 2.4,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(wr.x+r*0.3, wr.y-r*0.1, 2.4,0,6.28); ctx.fill();
    // hp bar
    ctx.fillStyle='rgba(44,39,51,.2)'; ctx.fillRect(wr.x-r, wr.y+r+4, r*2, 3);
    ctx.fillStyle='#57c268'; ctx.fillRect(wr.x-r, wr.y+r+4, r*2*Math.max(0,wr.hp/wr.maxhp), 3);
    ctx.restore();
  }
}
function drawSpells(now){
  for(const s of spells){
    // trail
    for(let k=0;k<s.trail.length;k++){
      const p=s.trail[k]; const a=k/s.trail.length;
      ctx.beginPath(); ctx.arc(p.x,p.y, s.r*a*0.8, 0,6.28);
      ctx.fillStyle = s.col + Math.floor(a*120).toString(16).padStart(2,'0'); ctx.fill();
    }
    stickerCircle(s.x,s.y,s.r, s.col, INK, 2.5);
    ctx.beginPath(); ctx.arc(s.x - s.r*0.3, s.y-s.r*0.3, s.r*0.3,0,6.28);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
    // heart tint core
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.35,0,6.28); ctx.fillStyle=s.tint; ctx.fill();
  }
}
function drawPuffs(){
  for(const p of puffs){
    const a=Math.max(0,p.life/p.max);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28);
    ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1;
  }
}
function drawDmgPops(){
  for(const d of dmgPops){
    const a=Math.max(0,d.life/0.9);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='700 18px Fredoka, sans-serif'; ctx.textAlign='center';
    ctx.lineWidth=3.5; ctx.strokeStyle=PAPER; ctx.strokeText(d.val, d.x, d.y);
    ctx.fillStyle=d.col; ctx.fillText(d.val, d.x, d.y);
    ctx.restore();
  }
}

function drawWord(now){
  // show word dots + name above keyboard while dragging
  const showHold = holdWell>=0;
  let word = wordFromPath(path);
  if(showHold && holdCount>0){
    const c=wells[holdWell].c; word=[]; for(let k=0;k<holdCount;k++) word.push(c);
  }
  if(word.length===0) return;
  const cls = classify(word);
  const stillValid = canStillBeValid(word);
  const valid = cls.type!=='fizzle';
  const y = keyboardTop() - 46;
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // dots
  const dotR=6, gap=18; const totalW=(word.length-1)*gap;
  let x0 = W/2 - totalW/2 - 40;
  // measure label width later; draw dots left, label right
  // Build: dots then " — Name"
  const label = valid? nameFor(cls) : (stillValid? '' : '…fizzle');
  ctx.font='700 14px Fredoka, sans-serif';
  const lblW = label? ctx.measureText(' — '+label).width : (stillValid?0:ctx.measureText(' …fizzle').width);
  const dotsW = totalW + dotR*2;
  const blockW = dotsW + lblW + 8;
  let bx = W/2 - blockW/2;
  // pill background
  ctx.save();
  ctx.beginPath(); roundRect(bx-12, y-16, blockW+24, 32, 14);
  ctx.fillStyle=PAPER2; ctx.strokeStyle=INK; ctx.lineWidth=2.5;
  ctx.shadowColor='rgba(44,39,51,.25)'; ctx.shadowOffsetY=3;
  ctx.fill(); ctx.shadowColor='transparent'; ctx.stroke();
  ctx.restore();
  let cx=bx+dotR;
  for(let k=0;k<word.length;k++){
    ctx.beginPath(); ctx.arc(cx, y, dotR, 0,6.28);
    ctx.fillStyle=HEX[word[k]]; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=INK; ctx.stroke();
    cx+=gap;
  }
  cx = cx - gap + dotR + 4;
  ctx.textAlign='left';
  if(!stillValid && !valid){ ctx.fillStyle='#ef4a5a'; ctx.fillText(' …fizzle', cx, y); }
  else if(valid){ ctx.fillStyle=INK; ctx.fillText(' — '+label, cx, y); }
  ctx.restore();
}

function drawAim(now){
  if(!aiming) return;
  const o=castOrigin();
  const v=normVec(aimVec);
  ctx.save();
  ctx.strokeStyle='rgba(44,39,51,.5)'; ctx.lineWidth=3; ctx.setLineDash([3,9]); ctx.lineCap='round';
  const len = 220;
  ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(o.x+v.x*len, o.y+v.y*len); ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  const ax=o.x+v.x*len, ay=o.y+v.y*len;
  const perp={x:-v.y,y:v.x};
  ctx.beginPath();
  ctx.moveTo(ax+v.x*12, ay+v.y*12);
  ctx.lineTo(ax-v.x*8+perp.x*9, ay-v.y*8+perp.y*9);
  ctx.lineTo(ax-v.x*8-perp.x*9, ay-v.y*8-perp.y*9);
  ctx.closePath(); ctx.fillStyle='rgba(44,39,51,.6)'; ctx.fill();
  ctx.restore();
}

function drawHoldRing(now){
  if(holdWell<0 || holdMoved) return;
  const w=wells[holdWell];
  ctx.save();
  const frac = (holdCount + Math.min(1,holdT/HOLD_TICK))/5;
  ctx.beginPath();
  ctx.arc(w.x,w.y,w.r+10, -Math.PI/2, -Math.PI/2 + Math.min(1,frac)*6.2832);
  ctx.strokeStyle=ACCENT; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
  ctx.font='700 22px Fredoka, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=INK; ctx.fillText(holdCount+'', w.x, w.y - w.r - 22);
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ---------------- pointer handling ----------------
function getPos(ev){
  const rect=canvas.getBoundingClientRect();
  let cx,cy;
  if(ev.touches && ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
  else if(ev.changedTouches && ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top};
}

function onDown(ev){
  const p=getPos(ev); pointer=p; startPos=p;
  const i=wellAt(p.x,p.y,1);
  if(i<0){ return; }
  ev.preventDefault();
  dragging=true;
  // start hold-to-pump candidate + path
  if(wells[i].inkN<=0){ wells[i].refuse=1; dragging=false; return; }
  beginPath(i);
  holdWell=i; holdT=0; holdCount=1; holdMoved=false;
}
function onMove(ev){
  if(!dragging) return;
  const p=getPos(ev); pointer=p;
  ev.preventDefault();
  // moving cancels hold-to-pump mode (once moved beyond small threshold)
  if(!holdMoved && holdWell>=0){
    if(Math.hypot(p.x-startPos.x, p.y-startPos.y) > 14){ holdMoved=true; holdWell=-1; }
  }
  // hysteresis: track leaving last well
  if(lastWellIdx>=0){
    const w=wells[lastWellIdx];
    if(Math.hypot(p.x-w.x,p.y-w.y) > w.r*HYST){ lastWellIdx=-1; }
  }
  // entering a well
  const i=wellAt(p.x,p.y,1);
  if(i>=0 && i!==lastWellIdx){
    lastWellIdx=i;
    // don't double-register first well at path start
    if(!(path.length===1 && path[0]===i && holdMoved===false && blobs.length<=1 && sameStart(i))){
      tryExtend(i);
    }
  }
  // aim mode: after >=3 visits, dragging away from keyboard
  if(path.length>=3){
    const last=wells[path[path.length-1]];
    const kbTop=keyboardTop();
    const distLast=Math.hypot(p.x-last.x, p.y-last.y);
    const awayUp = p.y < kbTop - ESCAPE;
    if((distLast>last.r+ESCAPE) || awayUp){
      aiming=true;
      const o=castOrigin();
      aimVec={x:p.x-o.x, y:p.y-o.y};
    } else {
      aiming=false;
    }
  }
}
let _startConsumed=false;
function sameStart(i){ // helper to avoid re-adding the very first well immediately
  return false;
}
function onUp(ev){
  if(!dragging){ return; }
  ev.preventDefault();
  const p=getPos(ev); pointer=p;
  // hold-to-pump cast (pure run) if never moved
  if(holdWell>=0 && !holdMoved){
    const w=wells[holdWell];
    const cnt=Math.min(holdCount, Math.min(MAX_INK, w.inkN));
    if(cnt>=3){
      // synth a pure path
      path=[]; for(let k=0;k<cnt;k++) path.push(holdWell);
      const r=castFromPath(nearestEnemyVec(castOrigin()));
    } else {
      // too short -> fizzle small refund on the single well
      path=[]; for(let k=0;k<Math.max(1,holdCount);k++) path.push(holdWell);
      castFromPath({x:0,y:-1});
    }
    holdWell=-1; endPath(); dragging=false; return;
  }
  // normal path cast
  if(path.length===0){ dragging=false; return; }
  let vec;
  if(aiming){ vec=aimVec; }
  else { vec=nearestEnemyVec(castOrigin()); }
  castFromPath(vec);
  dragging=false;
}

canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});

const gear=document.getElementById('gear'), drawer=document.getElementById('drawer');
gear.addEventListener('click', ()=> drawer.classList.toggle('open'));
document.getElementById('drawerClose').addEventListener('click', ()=> drawer.classList.remove('open'));

const sRegen=document.getElementById('sRegen'), vRegen=document.getElementById('vRegen');
const sSpawn=document.getElementById('sSpawn'), vSpawn=document.getElementById('vSpawn');
const sSpeed=document.getElementById('sSpeed'), vSpeed=document.getElementById('vSpeed');
sRegen.value=REGEN; vRegen.textContent=REGEN.toFixed(1);
sSpawn.value=SPAWN; vSpawn.textContent=SPAWN.toFixed(1);
sSpeed.value=ESPEED; vSpeed.textContent=ESPEED;
sRegen.addEventListener('input', ()=>{ REGEN=parseFloat(sRegen.value); vRegen.textContent=REGEN.toFixed(1); lsSet('whlab2_regen',REGEN); });
sSpawn.addEventListener('input', ()=>{ SPAWN=parseFloat(sSpawn.value); vSpawn.textContent=SPAWN.toFixed(1); });
sSpeed.addEventListener('input', ()=>{ ESPEED=parseFloat(sSpeed.value); vSpeed.textContent=ESPEED; });
document.getElementById('bRefill').addEventListener('click', ()=>{ for(const w of wells){ w.inkN=MAX_INK; w.wob=1; } });
document.getElementById('bClear').addEventListener('click', ()=>{ enemies=[]; });

function updateStatsUI(){
  document.getElementById('stCasts').textContent=stats.casts;
  document.getElementById('stFizzles').textContent=stats.fizzles;
  document.getElementById('stKills').textContent=stats.kills;
  document.getElementById('stLeaks').textContent=stats.leaks;
  document.getElementById('stWords').textContent=stats.words;
  document.getElementById('stAvg').textContent=(stats.words? (stats.totalLen/stats.words):0).toFixed(1);
}

// ---------------- debug handle ----------------
window.LAB = {
  get wells(){ return wells.map(w=>({c:w.c, ink:w.inkN, x:w.x, y:w.y, r:w.r})); },
  get word(){ return wordFromPath(path).join(''); },
  get stats(){ return Object.assign({avgLen: stats.words?stats.totalLen/stats.words:0}, stats); },
  get enemies(){ return enemies.map(e=>({x:e.x,y:e.y,hp:e.hp,dead:e.dead})); },
  get warriors(){ return warriors.length; },
  get spells(){ return spells.length; },
  get layout(){ return layout; },
  setLayout(l){ if(['HEX','ARC','GRID'].includes(l)){ layout=l; lsSet('whlab2_layout',l); layoutWells(); refreshPills(); } },
  wellPos(c){ const w=wells.find(x=>x.c===c); return w?{x:w.x,y:w.y,r:w.r}:null; },
  // synthesize a cast directly (bypasses pointer) — for tests
  castWord(arr, aimVec){
    // check ink for validity of test; consume via path mechanism
    path=[]; blobs=[];
    for(const c of arr){ const idx=COLS.indexOf(c); if(idx<0) continue; path.push(idx); }
    return castFromPath(aimVec||{x:0,y:-1});
  },
  classify(arr){ return classify(arr); },
  spawnEnemyAt(x,y,hp){ enemies.push({x,y,r:hp===20?18:24,hp,maxhp:hp,col:HEX.R,wob:0,dead:false,death:0}); },
  clearEnemies(){ enemies=[]; },
  refill(){ for(const w of wells){ w.inkN=MAX_INK; w.ink=MAX_INK; } },
  setInk(c,n){ const w=wells.find(x=>x.c===c); if(w){ w.inkN=n; w.ink=n; } },
  forceRegenAll(){ for(const w of wells){ w.regenT=REGEN+1; } },
  step(dt){ update(dt||0.016); },
  get regen(){ return REGEN; },
  setRegen(v){ REGEN=v; },
  get counts(){ return {enemies:enemies.length, spells:spells.length, warriors:warriors.length, puffs:puffs.length}; }
};

// ---------------- boot ----------------
resize();
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
