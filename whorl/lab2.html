<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />

<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- header ---------- */
.hud{ position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:0; right:0; z-index:4;
  display:flex; align-items:center; gap:8px; padding:0 10px; pointer-events:none; }
.title{ font-family:var(--font-d); font-weight:700; font-size:15px; letter-spacing:.3px;
  background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); padding:5px 11px; white-space:nowrap; }
.title span{ color:var(--ink-soft); font-weight:600; }
.spacer{ flex:1; }

/* ---------- tuning drawer ---------- */
.gear{ position:fixed; left:calc(env(safe-area-inset-left) + 12px); bottom:calc(env(safe-area-inset-bottom) + 12px);
  z-index:6; width:46px; height:46px; border-radius:14px; background:var(--card); border:2.5px solid var(--ink);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.gear:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.drawer{ position:fixed; left:0; bottom:0; z-index:7; width:100%; max-width:360px; margin:0 auto; right:0;
  background:var(--card); border:3px solid var(--ink); border-bottom:none; border-radius:20px 20px 0 0;
  box-shadow:0 -4px 0 var(--shadow); padding:16px 18px calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(110%); transition:transform .3s var(--pop); }
.drawer.open{ transform:translateY(0); }
.drawer h3{ font-family:var(--font-d); font-weight:700; font-size:16px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.drawer h3 .x{ margin-left:auto; cursor:pointer; font-size:20px; color:var(--ink-soft); line-height:1; }
.row{ display:flex; align-items:center; gap:10px; margin:9px 0; font-weight:700; font-size:12.5px; }
.row label{ flex:none; width:104px; color:var(--ink-soft); }
.row input[type=range]{ flex:1; accent-color:#3d8bdf; height:22px; }
.row .val{ flex:none; width:44px; text-align:right; font-family:var(--font-d); font-weight:600; font-size:13px; }
.btnrow{ display:flex; gap:8px; margin:12px 0 6px; }
.tbtn{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:9px 6px; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.tbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.stats{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-top:10px; }
.stat{ background:var(--paper2); border:2.5px solid var(--ink); border-radius:11px; padding:6px 2px; text-align:center;
  box-shadow:0 2px 0 var(--shadow); }
.stat b{ font-family:var(--font-d); font-weight:700; font-size:15px; display:block; line-height:1.1; }
.stat small{ font-family:var(--font-u); font-weight:800; font-size:7.5px; letter-spacing:.04em; color:var(--ink-soft); text-transform:uppercase; }
</style>

<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="title">Whorl <span>· Match Lab</span></div>
  <div class="spacer"></div>
</div>

<div class="gear" id="gear">⚙</div>
<div class="drawer" id="drawer">
  <h3>Tuning <span class="x" id="drawerClose">×</span></h3>
  <div class="row"><label>Swap CD (s)</label><input type="range" id="sCd" min="0.5" max="4.0" step="0.1"><span class="val" id="vCd">1.6</span></div>
  <div class="row"><label>Forge count</label><input type="range" id="sForge" min="1" max="3" step="1"><span class="val" id="vForge">2</span></div>
  <div class="row"><label>Pops / bar</label><input type="range" id="sPops" min="3" max="8" step="1"><span class="val" id="vPops">5</span></div>
  <div class="row"><label>Spawn (s)</label><input type="range" id="sSpawn" min="1.0" max="8.0" step="0.1"><span class="val" id="vSpawn">3.0</span></div>
  <div class="row"><label>Enemy px/s</label><input type="range" id="sSpeed" min="4" max="40" step="1"><span class="val" id="vSpeed">14</span></div>
  <div class="btnrow">
    <button class="tbtn" id="bReroll">Reroll board</button>
    <button class="tbtn" id="bClear">Clear enemies</button>
    <button class="tbtn" id="bFill">Fill bars</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="stMatches">0</b><small>matches</small></div>
    <div class="stat"><b id="stDoubles">0</b><small>doubles</small></div>
    <div class="stat"><b id="stForged">0</b><small>forged</small></div>
    <div class="stat"><b id="stSec">0</b><small>sec pop</small></div>
    <div class="stat"><b id="stWhorls">0</b><small>whorls</small></div>
    <div class="stat"><b id="stChain">0</b><small>max chain</small></div>
    <div class="stat"><b id="stCasts">0</b><small>casts</small></div>
    <div class="stat"><b id="stKills">0</b><small>kills</small></div>
    <div class="stat"><b id="stLeaks">0</b><small>leaks</small></div>
    <div class="stat"><b id="stRemix">0</b><small>remixes</small></div>
  </div>
</div>

<script>
"use strict";
(function(){
// ================= constants =================
const PRIMS = ['R','Y','B'];
const SECS  = ['O','G','P'];
const HEX = { R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6' };
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const DECOMP = { R:['R'], Y:['Y'], B:['B'], O:['R','Y'], G:['Y','B'], P:['R','B'] };
const MIX = { RY:'O', YR:'O', RB:'P', BR:'P', YB:'G', BY:'G' };
function isSec(c){ return c==='O'||c==='G'||c==='P'; }
// spell forms per colour
const SPELLS = {
  R:{ speed:520, r:12, applies:'burn' },
  Y:{ speed:660, r:11, dmgMul:1.2 },
  B:{ speed:430, r:14, applies:'chill' },
  O:{ speed:340, r:16, aoe:70 },
  P:{ speed:300, r:13, pierce:true },
  G:{ speed:300, r:14, pool:true }
};
const LAD_PRIM = {3:8,4:18,5:32}, LAD_SEC = {3:22,4:44,5:80};
function ladder(colour,len){ const t=Math.min(5,len); return (isSec(colour)?LAD_SEC:LAD_PRIM)[t]; }

// ---------- hexagon radius 3 (flat-top cells → vertical columns for gravity) ----------
const RAD=3;
const CELLS_QR=[]; { for(let q=-RAD;q<=RAD;q++){ const r1=Math.max(-RAD,-q-RAD), r2=Math.min(RAD,-q+RAD);
  for(let r=r1;r<=r2;r++) CELLS_QR.push([q,r]); } }               // 37 cells
const N = CELLS_QR.length;
const KEY = (q,r)=>q+','+r;
const IDX = {}; CELLS_QR.forEach(([q,r],i)=>IDX[KEY(q,r)]=i);
const NDELTA=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const NEIGH = CELLS_QR.map(([q,r])=> NDELTA.map(([dq,dr])=>IDX[KEY(q+dq,r+dr)]).filter(v=>v!==undefined));
// columns (const q) top→bottom = r ascending (y grows with r); gravity pulls to larger r
const COLUMNS = (()=>{ const m={}; CELLS_QR.forEach(([q,r],i)=>(m[q]=m[q]||[]).push(i));
  return Object.keys(m).map(q=>+q).sort((a,b)=>a-b).map(q=>m[q].sort((i,j)=>CELLS_QR[i][1]-CELLS_QR[j][1])); })();
// match lines for the 3 axes (A=const q vertical, B=const r, C=const q+r)
const LINES = (()=>{ function build(keyf,ordf){ const m={};
    for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i]; const k=keyf(q,r); (m[k]=m[k]||[]).push([ordf(q,r),i]); }
    return Object.values(m).map(a=>a.sort((x,y)=>x[0]-y[0]).map(x=>x[1])).filter(l=>l.length>=3); }
  return { A:build((q)=>q,(q,r)=>r), B:build((q,r)=>r,(q)=>q), C:build((q,r)=>q+r,(q)=>q) }; })();
const ALL_LINES = [...LINES.A,...LINES.B,...LINES.C];

// ================= persisted settings =================
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
let CD_DUR = parseFloat(lsGet('whlab2_cd','1.6')); if(!(CD_DUR>=0.5&&CD_DUR<=4)) CD_DUR=1.6;
let FORGE_COUNT = parseInt(lsGet('whlab2_forge','2'),10); if(!(FORGE_COUNT>=1&&FORGE_COUNT<=3)) FORGE_COUNT=2;
let POPS = parseInt(lsGet('whlab2_pops','5'),10); if(!(POPS>=3&&POPS<=8)) POPS=5;
let SPAWN = 3.0, ESPEED = 14;

// ================= canvas / layout =================
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W=390,H=800,DPR=1;
let size=26, ballRad=20, COL_DX=39, ROW_DY=45, latCX=195, latCY=584, leakY=360, topY=430;
let sigilX=195, sigilY=372, sigilR=26;
let barX=[10,26,42], barW=12, barTop=512, barH=144;
function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const margin=16;
  size=Math.max(20,Math.min(26,(W-2*margin-14)/10.58));
  ballRad=Math.max(18,Math.min(21,size*0.78));
  COL_DX=1.5*size; ROW_DY=Math.sqrt(3)*size;
  latCX=W/2;
  const halfH=3*ROW_DY;
  latCY=H-58-ballRad-halfH;
  topY=latCY-halfH-ballRad;
  leakY=topY-70;
  sigilR=Math.min(27,ballRad+6);
  sigilX=W/2; sigilY=Math.max(leakY, (leakY+topY)/2 - 2);
  barW=10;
  const gap=4, bmargin=8;
  barX=[bmargin, bmargin+barW+gap, bmargin+2*(barW+gap)];
  barTop=latCY-72; barH=150;
  for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i];
    cells[i].x=latCX+COL_DX*q; cells[i].y=latCY+ROW_DY*(r+q/2); }
}
window.addEventListener('resize', layout);

// offscreen metaball
const off=document.createElement('canvas'), octx=off.getContext('2d');
function sizeOff(){ off.width=Math.round(W*0.55); off.height=Math.round(H*0.55); }

// ================= state =================
// cell: {q,r,x,y,c, oy, shake, born, forgeFx, _new}
const cells = CELLS_QR.map(([q,r])=>({q,r,x:0,y:0,c:'R',oy:0,shake:0,born:0,forgeFx:0,_new:false}));
let meters={O:0,G:0,P:0}, whorlReady=false;
let enemies=[], spells=[], pools=[], puffs=[], dmgPops=[], shocks=[], castGoo=[], sparks=[];
let remixFx=null, chainLabel=null;
let cooldown=0, spawnT=0, auto=true, SAFE_REFILL=false;
let selIdx=-1;                       // tap-select
let stats={ matches:0, doubles:0, forged:0, secPopped:0, whorls:0, maxChain:0, casts:0, kills:0, leaks:0, swaps:0, remixes:0 };

function randPrim(){ return PRIMS[(Math.random()*3)|0]; }

// ================= match finding =================
function findMatches(){
  const out=[];
  for(const line of ALL_LINES){
    let k=0;
    while(k<line.length){
      const c=cells[line[k]].c;
      if(c==null){ k++; continue; }
      let j=k+1; while(j<line.length && cells[line[j]].c===c) j++;
      if(j-k>=3) out.push({ cells:line.slice(k,j), colour:c, len:j-k });
      k=j;
    }
  }
  return out;
}
function hasInstantMatch(){ return findMatches().length>0; }
// is there a swap of two adjacent balls that would create a 3+ line?
function hasMatchingMove(){
  for(let a=0;a<N;a++){
    for(const b of NEIGH[a]){
      if(b<=a) continue;
      const ca=cells[a].c, cb=cells[b].c;
      if(ca==null||cb==null||ca===cb) continue;
      cells[a].c=cb; cells[b].c=ca;
      const hit=findMatches().some(m=>m.cells.includes(a)||m.cells.includes(b));
      cells[a].c=ca; cells[b].c=cb;
      if(hit) return true;
    }
  }
  return false;
}

// ================= board generation =================
function genNoMatch(){
  for(const cell of cells){ cell.c=randPrim(); cell.oy=0; cell.shake=0; cell.forgeFx=0; }
  let guard=0;
  while(guard++<400 && hasInstantMatch()){
    for(const m of findMatches()) for(const ci of m.cells) cells[ci].c=randPrim();
  }
}
function rerollBoard(){ genNoMatch(); ensurePlayable(true); }

// ================= remix (deadlock rescue) =================
// rearrange the SAME multiset into a no-match arrangement that has a matching move
function remixArrange(){
  const bag=cells.map(c=>c.c);
  for(let attempt=0; attempt<60; attempt++){
    // Fisher–Yates shuffle of the exact same multiset
    for(let i=bag.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
    for(let i=0;i<N;i++) cells[i].c=bag[i];
    // repair any matches by swapping colours between two board cells (keeps multiset intact)
    let g=0;
    while(g++<400 && hasInstantMatch()){
      const m=findMatches()[0]; const ci=m.cells[(Math.random()*m.cells.length)|0];
      let dj=-1; for(let t=0;t<60;t++){ const j=(Math.random()*N)|0; if(cells[j].c!==cells[ci].c){ dj=j; break; } }
      if(dj<0) break; const tmp=cells[ci].c; cells[ci].c=cells[dj].c; cells[dj].c=tmp;
    }
    if(!hasInstantMatch() && hasMatchingMove()) return true;
    for(let i=0;i<N;i++) bag[i]=cells[i].c;   // carry the repaired arrangement into the next reshuffle
  }
  return false;
}
function remix(force){
  if(!force && hasMatchingMove()) return false;
  const before=cells.map(c=>c.c);
  const ok=remixArrange();
  if(!ok){ genNoMatch(); if(!hasMatchingMove()) remixArrange(); }   // degenerate fallback
  // pretty swirl using the *previous* positions as ink trails
  remixFx={ t0:performance.now(), dur:700, from:before.map((c,i)=>({x:cells[i].x,y:cells[i].y,c})) };
  chainLabel={ n:-1, life:1.1, text:'whorled!' };
  for(let i=0;i<N;i++){ cells[i].born=performance.now(); cells[i].oy=0; }
  stats.remixes++;
  return true;
}
// called after every settling moment
function ensurePlayable(silent){
  if(hasMatchingMove()) return false;
  remix(true);
  return true;
}

// ================= swap =================
function adjacent(a,b){ return NEIGH[a].includes(b); }
function swapCore(a,b){
  if(a===b || a<0 || b<0 || a>=N || b>=N) return {type:'blocked', reason:'bad'};
  if(!adjacent(a,b)) return {type:'blocked', reason:'nonadjacent'};
  const ca=cells[a].c, cb=cells[b].c;
  if(ca==null||cb==null) return {type:'blocked', reason:'empty'};
  if(ca===cb) return {type:'blocked', reason:'same-colour'};   // no-op, costs nothing
  cells[a].c=cb; cells[b].c=ca;
  const trig=findMatches().filter(m=>m.cells.includes(a)||m.cells.includes(b));
  if(trig.length>0){
    animSwap(a,b);
    const res=resolveBoard({a,b});
    stats.swaps++;
    vibrate(24);
    ensurePlayable();
    return {type:'match', matches:res.firstMatches, forged:res.forged, surged:res.surged, chain:res.depth};
  }
  // no match
  if(cooldown>0){ cells[a].c=ca; cells[b].c=cb; refuse(a,b); vibrate([10,24,10]); return {type:'blocked', reason:'cooldown'}; }
  animSwap(a,b);
  cooldown=CD_DUR; stats.swaps++;
  vibrate(16);
  ensurePlayable();
  return {type:'positional'};
}
function animSwap(a,b){ cells[a].shake=Math.max(cells[a].shake,0.35); cells[b].shake=Math.max(cells[b].shake,0.35);
  cells[a].born=performance.now(); cells[b].born=performance.now(); }
function refuse(a,b){ cells[a].shake=0.5; cells[b].shake=0.5; }

// ================= resolution & casting =================
function resolveBoard(swapInfo){
  let depth=0, forgedTotal=0, surged=false, firstMatches=null;
  let guard=0;
  while(guard++<40){
    const matches=findMatches();
    if(!matches.length) break;
    depth++;
    if(depth===1) firstMatches=matches;
    const mult=Math.pow(1.15, depth-1);
    const clearSet=new Set();
    for(const m of matches){
      castProjectile(m, ladder(m.colour,m.len)*mult, mult);
      stats.matches++; stats.casts++;
      for(const ci of m.cells) clearSet.add(ci);
    }
    // forge / surge — only the swap round
    let forgeThis=null;
    if(depth===1 && swapInfo){
      const trig=matches.filter(m=>m.cells.includes(swapInfo.a)||m.cells.includes(swapInfo.b));
      const tcol=[...new Set(trig.map(m=>m.colour))];
      if(tcol.length>=2){
        stats.doubles++;
        const prim=new Set(); for(const c of tcol) for(const p of DECOMP[c]) prim.add(p);
        if(prim.has('R')&&prim.has('Y')&&prim.has('B')){ surgeMeters(); surged=true; }
        else { const ps=tcol.filter(c=>PRIMS.includes(c)); if(ps.length>=2) forgeThis={colour:MIX[ps[0]+ps[1]], count:FORGE_COUNT}; }
      }
    }
    // pop meters + clear
    for(const ci of clearSet){ const c=cells[ci].c; if(c==null) continue;
      if(isSec(c)){ addMeter(c); stats.secPopped++; } spawnClearPuffs(cells[ci].x,cells[ci].y,c); cells[ci].c=null; }
    applyGravity(forgeThis, swapInfo);
    if(forgeThis){ forgedTotal+=forgeThis.count; stats.forged+=forgeThis.count; }
    if(depth>1) chainLabel={n:depth,life:1.1};
  }
  stats.maxChain=Math.max(stats.maxChain, depth);
  return {depth, forged:forgedTotal, surged, firstMatches:firstMatches||[]};
}
function applyGravity(forge, swapInfo){
  const newSlots=[];
  for(const col of COLUMNS){
    const survivors=[];
    for(let k=0;k<col.length;k++){ const ci=col[k]; if(cells[ci].c!=null) survivors.push({c:cells[ci].c,fromK:k}); }
    const nEmpty=col.length-survivors.length;
    for(let k=0;k<col.length;k++){ const ci=col[k];
      if(k<nEmpty){ cells[ci].c=null; cells[ci]._new=true; cells[ci].oy=-((nEmpty-k)*ROW_DY+ROW_DY+18); newSlots.push(ci); }
      else { const s=survivors[k-nEmpty]; cells[ci].c=s.c; cells[ci].oy=(s.fromK-k)*ROW_DY; }
    }
  }
  if(forge && forge.count>0 && swapInfo){
    const sx=(cells[swapInfo.a].x+cells[swapInfo.b].x)/2, sy=(cells[swapInfo.a].y+cells[swapInfo.b].y)/2;
    newSlots.sort((i,j)=>((cells[i].x-sx)**2+(cells[i].y-sy)**2)-((cells[j].x-sx)**2+(cells[j].y-sy)**2));
    for(let k=0;k<forge.count && k<newSlots.length;k++){ cells[newSlots[k]].c=forge.colour; cells[newSlots[k]].forgeFx=performance.now(); }
  }
  for(const ci of newSlots){ if(cells[ci].c==null) cells[ci].c=randPrim(); cells[ci]._new=false; cells[ci].born=performance.now(); }
  // debug: guarantee no cascade from the refill (reroll only NEW cells until stable)
  if(SAFE_REFILL){ const nset=new Set(newSlots); let g=0;
    while(g++<300){ const bad=findMatches().flatMap(m=>m.cells).filter(ci=>nset.has(ci));
      if(!bad.length) break; for(const ci of bad) cells[ci].c=randPrim(); } }
}
function centroidCells(arr){ let sx=0,sy=0; for(const i of arr){ sx+=cells[i].x; sy+=cells[i].y; }
  const n=Math.max(1,arr.length); return {x:sx/n,y:sy/n}; }
function nearestEnemy(o){ let best=null,bd=1e9; for(const e of enemies){ if(e.dead) continue;
  const d=(e.x-o.x)**2+(e.y-o.y)**2; if(d<bd){bd=d;best=e;} } return best; }
function norm(v){ const m=Math.hypot(v.x,v.y)||1; return {x:v.x/m,y:v.y/m}; }
function castProjectile(m, dmg, mult){
  const o=centroidCells(m.cells);
  const spec=SPELLS[m.colour]||SPELLS.R;
  if(spec.dmgMul) dmg*=spec.dmgMul;
  const tgt=nearestEnemy(o);
  const v=tgt?norm({x:tgt.x-o.x,y:tgt.y-o.y}):{x:0,y:-1};
  for(const ci of m.cells) castGoo.push({x:cells[ci].x,y:cells[ci].y,tx:o.x,ty:o.y,r:ballRad*0.7,col:m.colour,t:0,dur:0.24});
  spells.push({ x:o.x,y:o.y, vx:v.x*spec.speed, vy:v.y*spec.speed, colour:m.colour, col:HEX[m.colour],
    dmg, r:spec.r, life:2.4, pierce:!!spec.pierce, aoe:spec.aoe||0, pool:!!spec.pool, applies:spec.applies||null,
    trail:[], t:0 });
}

// ================= meters / whorl =================
function addMeter(c){ if(whorlReady) return; meters[c]=Math.min(1,meters[c]+1/POPS); checkWhorl(); }
function surgeMeters(){ if(whorlReady) return; for(const k of SECS) meters[k]=Math.min(1,meters[k]+0.4); checkWhorl(); }
function checkWhorl(){ if(!whorlReady && meters.O>=1 && meters.G>=1 && meters.P>=1){ whorlReady=true; meters.O=meters.G=meters.P=1;
  for(let k=0;k<10;k++) sparks.push(mkSpark(sigilX,sigilY,ACCENT)); vibrate([12,20,12]); } }
function tapWhorl(){ if(!whorlReady) return {ok:false};
  shocks.push({x:sigilX,y:latCY,r:0,maxr:Math.hypot(W,H),t0:performance.now(),dur:640});
  for(const e of enemies){ if(!e.dead) damageEnemy(e,100,ACCENT); }
  for(let k=0;k<24;k++){ const p=mkPuff(sigilX,latCY,ACCENT); p.life+=0.3; puffs.push(p); }
  meters={O:0,G:0,P:0}; whorlReady=false; stats.whorls++; vibrate([18,26,18]);
  return {ok:true};
}
function fillBars(){ meters={O:1,G:1,P:1}; checkWhorl(); }

// ================= enemies =================
function spawnEnemy(){ const hp=Math.random()<0.5?20:40; const r=hp===20?18:24;
  const col=PRIMS[(Math.random()*3)|0];
  enemies.push({x:r+8+Math.random()*(W-2*r-16), y:-r-6, r, hp, maxhp:hp, col:HEX[col], wob:Math.random()*6.28,
    dead:false, death:0, burn:0, chill:0, poison:0, pStacks:0, bAcc:0, pAcc:0}); }
function spawnEnemyAt(x,y,hp){ hp=hp||20; const r=hp===20?18:24;
  enemies.push({x,y,r,hp,maxhp:hp,col:HEX.R,wob:0,dead:false,death:0,burn:0,chill:0,poison:0,pStacks:0,bAcc:0,pAcc:0}); }
function damageEnemy(e,dmg,col,quiet){ if(e.dead) return; e.hp-=dmg; e.wob+=1.6;
  dmgPops.push({x:e.x,y:e.y-e.r-4,life:0.9,val:Math.round(dmg),col:col||INK});
  if(!quiet) for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,col||e.col));
  if(e.hp<=0){ e.dead=true; e.death=0; stats.kills++;
    for(let k=0;k<12;k++){ const p=mkPuff(e.x,e.y,e.col); p.life+=0.2; puffs.push(p); } } }

// ================= particles =================
function mkPuff(x,y,col){ const a=Math.random()*6.28, sp=40+Math.random()*90;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:0.5+Math.random()*0.3,max:0.8,r:4+Math.random()*5,col}; }
function mkSpark(x,y,col){ const a=Math.random()*6.28, sp=60+Math.random()*120;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.6,max:0.6,r:3+Math.random()*3,col}; }
function spawnClearPuffs(x,y,c){ const col=HEX[c]; for(let k=0;k<5;k++) puffs.push(mkPuff(x,y,col)); }
function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ================= update =================
let last=performance.now();
function tick(now){ let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now; if(auto) update(dt); render(now); requestAnimationFrame(tick); }
function update(dt){
  const now=performance.now();
  cooldown=Math.max(0,cooldown-dt);
  // cells settle
  for(const cell of cells){ cell.oy+=(0-cell.oy)*Math.min(1,dt*13); if(Math.abs(cell.oy)<0.3) cell.oy=0;
    cell.shake=Math.max(0,cell.shake-dt*2.4); }
  // cast goo
  for(const g of castGoo){ g.t+=dt; g.x+=(g.tx-g.x)*Math.min(1,dt*15); g.y+=(g.ty-g.y)*Math.min(1,dt*15);
    g.r+=(ballRad*0.5-g.r)*Math.min(1,dt*10); }
  castGoo=castGoo.filter(g=>g.t<g.dur);
  // spells
  for(const s of spells){ s.t+=dt; s.life-=dt; s.x+=s.vx*dt; s.y+=s.vy*dt;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>10) s.trail.shift();
    for(const e of enemies){ if(e.dead) continue;
      if(Math.hypot(e.x-s.x,e.y-s.y)<e.r+s.r*0.7){
        let d=s.dmg;
        if(e.chill>0 && (s.colour==='R'||s.colour==='O')){ d*=1.5; e.chill=0; iceCrack(e.x,e.y); }
        damageEnemy(e,d,s.col);
        if(s.applies==='burn'){ e.burn=Math.max(e.burn,2); }
        else if(s.applies==='chill'){ e.chill=2.5; }
        if(s.aoe){ for(const o of enemies){ if(o.dead||o===e) continue; if(Math.hypot(o.x-s.x,o.y-s.y)<s.aoe) damageEnemy(o,d*0.6,s.col,true); }
          for(let k=0;k<8;k++){ const p=mkPuff(s.x,s.y,HEX.O); p.r+=2; puffs.push(p); } }
        if(s.pool){ pools.push({x:s.x,y:s.y,r:26,life:3.0,max:3.0,tick:0}); }
        if(!s.pierce) s.life=0; else s.dmg*=0.72;
        break;
      }
    }
    if(s.pool && s.life<=0.02 && !s._pooled){ s._pooled=true; pools.push({x:s.x,y:s.y,r:26,life:3.0,max:3.0,tick:0}); }
    if(s.y<-40||s.x<-40||s.x>W+40||s.y>H+40) s.life=0;
  }
  spells=spells.filter(s=>s.life>0);
  // venom pools — poison enemies over them
  for(const pl of pools){ pl.life-=dt; pl.tick-=dt;
    if(pl.tick<=0){ pl.tick=0.4; for(const e of enemies){ if(!e.dead && Math.hypot(e.x-pl.x,e.y-pl.y)<pl.r){ e.poison=Math.max(e.poison,1.2); e.pStacks=Math.min(4,e.pStacks+1); } } } }
  pools=pools.filter(p=>p.life>0);
  // enemies + dots + drift
  for(const e of enemies){ if(e.dead){ e.death+=dt; continue; }
    let sp=ESPEED; if(e.chill>0){ e.chill-=dt; sp*=0.5; }
    e.y+=sp*dt; e.wob+=dt*1.4;
    if(e.burn>0){ e.burn-=dt; e.bAcc+=3*dt; if(e.bAcc>=1){ const d=Math.floor(e.bAcc); e.bAcc-=d; damageEnemy(e,d,HEX.R,true); } }
    if(e.poison>0){ e.poison-=dt; e.pAcc+=(2+e.pStacks)*dt; if(e.pAcc>=1){ const d=Math.floor(e.pAcc); e.pAcc-=d; damageEnemy(e,d,HEX.G,true); } if(e.poison<=0) e.pStacks=0; }
    if(e.y>leakY){ e.dead=true; e.death=0; stats.leaks++; for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,e.col)); }
  }
  enemies=enemies.filter(e=>!e.dead||e.death<0.4);
  // spawn (auto play only)
  spawnT+=dt; if(spawnT>=SPAWN){ spawnT-=SPAWN; if(enemies.filter(e=>!e.dead).length<14) spawnEnemy(); }
  // particles
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs=puffs.filter(p=>p.life>0);
  for(const p of sparks){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.2,dt); p.vy*=Math.pow(0.2,dt); }
  sparks=sparks.filter(p=>p.life>0);
  for(const d of dmgPops){ d.life-=dt; d.y-=34*dt; } dmgPops=dmgPops.filter(d=>d.life>0);
  shocks=shocks.filter(s=>now-s.t0<s.dur);
  if(remixFx && now-remixFx.t0>=remixFx.dur) remixFx=null;
  if(chainLabel){ chainLabel.life-=dt; if(chainLabel.life<=0) chainLabel=null; }
  updateStatsUI();
}

// ================= render =================
function render(now){
  ctx.clearRect(0,0,W,H);
  drawBoardBack();
  drawFieldLine();
  drawEnemies(now);
  drawPools(now);
  drawSpells(now);
  drawBalls(now);
  drawCastGoo();
  drawBars(now);
  drawSigil(now);
  drawCooldownRing();
  drawShocks(now);
  drawRemix(now);
  drawPuffs();
  drawDmgPops();
  drawChain(now);
}
function drawBoardBack(){
  ctx.save();
  const pad=ballRad+12;
  ctx.beginPath();
  // hex outline of the board region (approx rounded)
  roundRect(latCX-3*COL_DX-pad, topY-6, 6*COL_DX+2*pad, (latCY+3*ROW_DY)-(topY)+pad+ballRad, 26);
  ctx.fillStyle='rgba(255,253,246,.5)'; ctx.strokeStyle='rgba(44,39,51,.10)'; ctx.lineWidth=2;
  ctx.fill(); ctx.stroke(); ctx.restore();
}
function drawFieldLine(){ ctx.save();
  ctx.strokeStyle='rgba(44,39,51,.14)'; ctx.lineWidth=2; ctx.setLineDash([2,7]); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,leakY); ctx.lineTo(W-14,leakY); ctx.stroke(); ctx.restore(); }
function stickerCircle(x,y,r,fill,rim,lw){ ctx.save();
  ctx.shadowColor='rgba(44,39,51,.28)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent'; ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke(); ctx.restore(); }
function drawBalls(now){
  const remixing = remixFx && (now-remixFx.t0)<remixFx.dur;
  for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null) continue;
    let x=b.x, y=b.y+b.oy;
    if(b.shake>0) x+=Math.sin(now/26+i)*b.shake*5;
    if(remixing){ const f=ease((now-remixFx.t0)/remixFx.dur); // swirl in from a spin around centre
      const ang=(i*0.53)+(1-f)*5.0; const rr=(1-f)*(90+((i*13)%60));
      x=latCX+Math.cos(ang)*rr + (b.x-latCX)*f; y=latCY+Math.sin(ang)*rr*0.7 + (b.y-latCY)*f;
    }
    let r=ballRad + Math.sin(now/170+i)*0.6;
    const age=now-b.born; if(age<260){ const f=age/260; r*=0.62+0.38*f; }
    const sel=(i===selIdx);
    stickerCircle(x,y,r,HEX[b.c],INK,sel?4:3);
    // secondary sparkle ring
    if(isSec(b.c)){ ctx.save(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(x,y,r-4,0,6.2832); ctx.stroke(); ctx.restore(); }
    // glossy highlight
    ctx.beginPath(); ctx.arc(x-r*0.3,y-r*0.34,r*0.24,0,6.28); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill();
    // forge sparkle
    if(b.forgeFx && now-b.forgeFx<600){ const f=(now-b.forgeFx)/600; ctx.save(); ctx.globalAlpha=1-f;
      for(let k=0;k<4;k++){ const a=k*1.57+f*4; const rr=r+3+f*10;
        ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,2.2*(1-f)+1,0,6.28); ctx.fillStyle=ACCENT; ctx.fill(); }
      ctx.restore(); }
    if(sel){ ctx.beginPath(); ctx.arc(x,y,r+4,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=2.6; ctx.stroke();
      for(const ni of NEIGH[i]){ const nb=cells[ni]; ctx.beginPath(); ctx.arc(nb.x,nb.y+nb.oy,ballRad+2,0,6.28);
        ctx.strokeStyle='rgba(255,209,92,.4)'; ctx.lineWidth=2; ctx.stroke(); } }
  }
}
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function drawCastGoo(){
  if(castGoo.length===0) return;
  sizeOff(); const sx=off.width/W, sy=off.height/H;
  octx.setTransform(1,0,0,1,0,0); octx.clearRect(0,0,off.width,off.height);
  octx.globalCompositeOperation='lighter';
  for(const g of castGoo){ const R=g.r*2.6*sx, gx=g.x*sx, gy=g.y*sy; const [r,gr,bl]=hexToRgb(HEX[g.col]);
    const grd=octx.createRadialGradient(gx,gy,0,gx,gy,R);
    grd.addColorStop(0,`rgba(${r},${gr},${bl},1)`); grd.addColorStop(0.55,`rgba(${r},${gr},${bl},.55)`); grd.addColorStop(1,`rgba(${r},${gr},${bl},0)`);
    octx.fillStyle=grd; octx.beginPath(); octx.arc(gx,gy,R,0,6.2832); octx.fill(); }
  octx.globalCompositeOperation='source-over';
  const img=octx.getImageData(0,0,off.width,off.height), d=img.data;
  for(let p=0;p<d.length;p+=4){ const a=d[p+3];
    if(a>150) d[p+3]=255; else if(a>92) d[p+3]=Math.round((a-92)/58*255); else d[p+3]=0; }
  octx.putImageData(img,0,0);
  ctx.save(); ctx.imageSmoothingEnabled=true; ctx.globalAlpha=0.85; ctx.drawImage(off,0,0,off.width,off.height,0,0,W,H); ctx.restore();
}
function drawBars(now){
  const cols={O:HEX.O,G:HEX.G,P:HEX.P};
  SECS.forEach((c,i)=>{ const x=barX[i];
    ctx.save();
    // track
    ctx.shadowColor='rgba(44,39,51,.22)'; ctx.shadowOffsetY=2;
    roundRect(x,barTop,barW,barH,barW/2); ctx.fillStyle=PAPER2; ctx.fill();
    ctx.shadowColor='transparent'; ctx.lineWidth=2.4; ctx.strokeStyle=INK; ctx.stroke();
    // fill
    const fv=meters[c]; const fh=(barH-6)*fv;
    if(fh>1){ roundRect(x+3,barTop+3+(barH-6-fh),barW-6,fh,(barW-6)/2); ctx.fillStyle=cols[c]; ctx.fill(); }
    if(whorlReady){ ctx.globalAlpha=0.4+0.4*Math.sin(now/180+i); roundRect(x,barTop,barW,barH,barW/2); ctx.strokeStyle=ACCENT; ctx.lineWidth=2.4; ctx.stroke(); ctx.globalAlpha=1; }
    // label
    ctx.fillStyle=INK; ctx.font='700 9px Fredoka, sans-serif'; ctx.textAlign='center';
    ctx.fillText(c, x+barW/2, barTop+barH+11);
    ctx.restore();
  });
}
function drawSigil(now){
  const x=sigilX, y=sigilY; const lit=whorlReady;
  const pulse=lit?(1+0.08*Math.sin(now/160)):1;
  const r=sigilR*pulse;
  ctx.save();
  if(lit){ ctx.shadowColor='rgba(255,209,92,.9)'; ctx.shadowBlur=18; }
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832);
  ctx.fillStyle=lit?ACCENT:'rgba(255,253,246,.7)'; ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=3; ctx.strokeStyle=lit?INK:'rgba(44,39,51,.35)'; ctx.stroke();
  // spiral
  ctx.beginPath(); const turns=2.4, steps=48;
  for(let k=0;k<=steps;k++){ const t=k/steps; const a=t*turns*6.2832 + (lit?now/500:0); const rr=r*0.82*t;
    const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr; k?ctx.lineTo(px,py):ctx.moveTo(px,py); }
  ctx.strokeStyle=lit?INK:'rgba(44,39,51,.3)'; ctx.lineWidth=lit?2.6:2; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
}
function drawCooldownRing(){
  if(cooldown<=0) return; const f=cooldown/CD_DUR;
  ctx.save();
  ctx.globalAlpha=0.5*f; ctx.beginPath();
  ctx.arc(sigilX,sigilY,sigilR+6,-Math.PI/2,-Math.PI/2+f*6.2832);
  ctx.strokeStyle='rgba(44,39,51,.55)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke(); ctx.restore();
}
function drawPools(now){ for(const pl of pools){ const a=Math.max(0,pl.life/pl.max);
  ctx.save(); ctx.globalAlpha=0.28*a+0.06; ctx.beginPath(); ctx.ellipse(pl.x,pl.y,pl.r,pl.r*0.5,0,0,6.28);
  ctx.fillStyle=HEX.G; ctx.fill(); ctx.globalAlpha=0.5*a; ctx.lineWidth=2; ctx.strokeStyle=HEX.G; ctx.stroke(); ctx.restore(); } }
function drawShocks(now){ for(const s of shocks){ let f=(now-s.t0)/s.dur; if(f<0)f=0; if(f>=1)continue; const r=f*s.maxr;
  ctx.save(); ctx.globalAlpha=(1-f)*0.85;
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=18*(1-f)+2; ctx.stroke();
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle='rgba(44,39,51,.5)'; ctx.lineWidth=4*(1-f); ctx.stroke(); ctx.restore(); } }
function drawRemix(now){ if(!remixFx) return; const f=(now-remixFx.t0)/remixFx.dur;
  if(f<0||f>=1) return;
  ctx.save(); ctx.globalAlpha=(1-f)*0.5;
  for(const fp of remixFx.from){ const a=(1-f)*4; const rr=(1-f)*70;
    const x=latCX+(fp.x-latCX)*f+Math.cos(a)*rr, y=latCY+(fp.y-latCY)*f+Math.sin(a)*rr*0.7;
    ctx.beginPath(); ctx.arc(x,y,ballRad*0.4*(1-f)+2,0,6.28); ctx.fillStyle=HEX[fp.c]; ctx.fill(); }
  ctx.globalAlpha=(1-f)*0.4; ctx.beginPath(); ctx.arc(latCX,latCY,(f*180)+10,0,6.28);
  ctx.strokeStyle='rgba(44,39,51,.4)'; ctx.lineWidth=3*(1-f); ctx.stroke(); ctx.restore(); }
function drawEnemies(now){ for(const e of enemies){ const t=e.dead?(1-e.death/0.4):1; if(t<=0) continue;
  const r=e.r*(e.dead?(0.6+0.4*t):1)+Math.sin(e.wob)*1.5;
  ctx.save(); ctx.globalAlpha=e.dead?t:1; stickerCircle(e.x,e.y,r,e.col,INK,3);
  if(e.chill>0){ ctx.strokeStyle='rgba(61,139,223,.8)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x,e.y,r+2,0,6.28); ctx.stroke(); }
  if(e.burn>0){ ctx.fillStyle='rgba(239,74,90,.5)'; ctx.beginPath(); ctx.arc(e.x,e.y-r,2.6,0,6.28); ctx.fill(); }
  ctx.beginPath(); const frac=Math.max(0,e.hp/e.maxhp);
  ctx.arc(e.x,e.y,r+5,-Math.PI/2,-Math.PI/2+frac*6.2832); ctx.strokeStyle='rgba(44,39,51,.4)'; ctx.lineWidth=2.5; ctx.stroke();
  // face
  ctx.fillStyle=INK; ctx.beginPath(); ctx.arc(e.x-r*0.32,e.y-r*0.1,2.2,0,6.28); ctx.arc(e.x+r*0.32,e.y-r*0.1,2.2,0,6.28); ctx.fill();
  ctx.restore(); } }
function drawSpells(now){ for(const s of spells){
  for(let k=0;k<s.trail.length;k++){ const p=s.trail[k], a=k/s.trail.length;
    ctx.beginPath(); ctx.arc(p.x,p.y,s.r*a*0.8,0,6.28);
    ctx.fillStyle=s.col+Math.floor(a*120).toString(16).padStart(2,'0'); ctx.fill(); }
  stickerCircle(s.x,s.y,s.r,s.col,INK,2.5);
  ctx.beginPath(); ctx.arc(s.x-s.r*0.3,s.y-s.r*0.3,s.r*0.3,0,6.28); ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill(); } }
function drawPuffs(){ for(const p of puffs){ const a=Math.max(0,p.life/p.max);
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; }
  for(const p of sparks){ const a=Math.max(0,p.life/p.max); ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28);
    ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; } }
function drawDmgPops(){ for(const d of dmgPops){ const a=Math.max(0,d.life/0.9);
  ctx.save(); ctx.globalAlpha=a; ctx.font='700 18px Fredoka, sans-serif'; ctx.textAlign='center';
  ctx.lineWidth=3.5; ctx.strokeStyle=PAPER; ctx.strokeText(d.val,d.x,d.y); ctx.fillStyle=d.col; ctx.fillText(d.val,d.x,d.y); ctx.restore(); } }
function drawChain(now){ if(!chainLabel) return; const a=Math.max(0,chainLabel.life/1.1);
  const txt=chainLabel.text||('chain ×'+chainLabel.n);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 20px Fredoka, sans-serif';
  const y=topY-24-(1-a)*10;
  ctx.lineWidth=4; ctx.strokeStyle=PAPER; ctx.strokeText(txt,W/2,y); ctx.fillStyle=chainLabel.text?HEX.P:ACCENT; ctx.fillText(txt,W/2,y); ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function ease(t){ t=Math.max(0,Math.min(1,t)); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function iceCrack(x,y){ for(let k=0;k<8;k++){ const p=mkSpark(x,y,HEX.B); sparks.push(p); } }

// ================= input =================
function getPos(ev){ const rect=canvas.getBoundingClientRect(); let cx,cy;
  if(ev.touches&&ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
  else if(ev.changedTouches&&ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top}; }
function ballAt(x,y){ let best=-1,bd=ballRad*1.25; for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null) continue;
  const d=Math.hypot(x-b.x,y-b.y); if(d<bd){bd=d;best=i;} } return best; }
let dragStart=-1, downPos={x:0,y:0}, movedFar=false, ptr={x:0,y:0};
function onDown(ev){ const p=getPos(ev);
  if(whorlReady && Math.hypot(p.x-sigilX,p.y-sigilY)<=sigilR+6){ ev.preventDefault(); tapWhorl(); dragStart=-1; return; }
  const i=ballAt(p.x,p.y); if(i<0){ return; }
  ev.preventDefault(); dragStart=i; downPos=p; ptr=p; movedFar=false; }
function onMove(ev){ if(dragStart<0) return; const p=getPos(ev); ptr=p; ev.preventDefault();
  if(!movedFar && Math.hypot(p.x-downPos.x,p.y-downPos.y)>ballRad*0.5) movedFar=true; }
function onUp(ev){ if(dragStart<0) return; ev.preventDefault(); const p=getPos(ev); ptr=p;
  const start=dragStart; dragStart=-1;
  if(movedFar){
    // drag-nudge onto nearest neighbour in the drag direction
    let best=-1,bd=1e9; for(const ni of NEIGH[start]){ const n=cells[ni]; const d=(n.x-p.x)**2+(n.y-p.y)**2; if(d<bd){bd=d;best=ni;} }
    if(best>=0){ swapCore(start,best); selIdx=-1; return; }
  }
  // tap
  if(selIdx<0){ selIdx=start; }
  else if(selIdx===start){ selIdx=-1; }
  else if(adjacent(selIdx,start)){ swapCore(selIdx,start); selIdx=-1; }
  else { selIdx=start; }
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});

// ================= drawer wiring =================
const gear=document.getElementById('gear'), drawer=document.getElementById('drawer');
gear.addEventListener('click', ()=> drawer.classList.toggle('open'));
document.getElementById('drawerClose').addEventListener('click', ()=> drawer.classList.remove('open'));
function bindSlider(id,vid,set,fmt){ const s=document.getElementById(id), v=document.getElementById(vid);
  s.addEventListener('input', ()=>{ set(parseFloat(s.value)); v.textContent=fmt(parseFloat(s.value)); }); return {s,v}; }
const uiCd=bindSlider('sCd','vCd',x=>{ CD_DUR=x; lsSet('whlab2_cd',x); }, x=>x.toFixed(1));
const uiForge=bindSlider('sForge','vForge',x=>{ FORGE_COUNT=x|0; lsSet('whlab2_forge',x|0); }, x=>String(x|0));
const uiPops=bindSlider('sPops','vPops',x=>{ POPS=x|0; lsSet('whlab2_pops',x|0); }, x=>String(x|0));
const uiSpawn=bindSlider('sSpawn','vSpawn',x=>SPAWN=x, x=>x.toFixed(1));
const uiSpeed=bindSlider('sSpeed','vSpeed',x=>ESPEED=x, x=>String(x|0));
uiCd.s.value=CD_DUR; uiCd.v.textContent=CD_DUR.toFixed(1);
uiForge.s.value=FORGE_COUNT; uiForge.v.textContent=String(FORGE_COUNT);
uiPops.s.value=POPS; uiPops.v.textContent=String(POPS);
uiSpawn.s.value=SPAWN; uiSpawn.v.textContent=SPAWN.toFixed(1);
uiSpeed.s.value=ESPEED; uiSpeed.v.textContent=String(ESPEED);
document.getElementById('bReroll').addEventListener('click', rerollBoard);
document.getElementById('bClear').addEventListener('click', ()=>{ enemies=[]; });
document.getElementById('bFill').addEventListener('click', fillBars);
function updateStatsUI(){
  document.getElementById('stMatches').textContent=stats.matches;
  document.getElementById('stDoubles').textContent=stats.doubles;
  document.getElementById('stForged').textContent=stats.forged;
  document.getElementById('stSec').textContent=stats.secPopped;
  document.getElementById('stWhorls').textContent=stats.whorls;
  document.getElementById('stChain').textContent=stats.maxChain;
  document.getElementById('stCasts').textContent=stats.casts;
  document.getElementById('stKills').textContent=stats.kills;
  document.getElementById('stLeaks').textContent=stats.leaks;
  document.getElementById('stRemix').textContent=stats.remixes;
}

// ================= debug handle =================
window.LAB = {
  get cells(){ return cells.map((b,i)=>({i, q:b.q, r:b.r, c:b.c, x:b.x, y:b.y})); },
  get meters(){ return {O:meters.O, G:meters.G, P:meters.P}; },
  get whorlReady(){ return whorlReady; },
  get stats(){ return Object.assign({}, stats); },
  get enemies(){ return enemies.map(e=>({x:e.x,y:e.y,hp:e.hp,dead:e.dead,chill:e.chill,burn:e.burn})); },
  get cooldown(){ return cooldown; },
  get cooldownDur(){ return CD_DUR; },
  get counts(){ return {enemies:enemies.length, spells:spells.length, pools:pools.length, castGoo:castGoo.length}; },
  neighbors(i){ return NEIGH[i]?NEIGH[i].slice():[]; },
  colours(){ return cells.map(c=>c.c); },
  setBall(idx,colour){ if(cells[idx]){ cells[idx].c=colour; cells[idx].oy=0; cells[idx]._new=false; } },
  swap(a,b){ return swapCore(a,b); },
  findMatches(){ return findMatches().map(m=>({cells:m.cells.slice(), colour:m.colour, len:m.len})); },
  hasMatchingMove(){ return hasMatchingMove(); },
  hasInstantMatch(){ return hasInstantMatch(); },
  remix(){ return remix(true); },
  tapWhorl(){ return tapWhorl(); },
  fillBars(){ fillBars(); },
  spawnEnemyAt(x,y,hp){ spawnEnemyAt(x,y,hp); },
  clearEnemies(){ enemies=[]; },
  rerollBoard(){ rerollBoard(); },
  setCooldown(sec){ cooldown=Math.max(0,sec); },
  clearCooldown(){ cooldown=0; },
  setCooldownDur(v){ CD_DUR=Math.max(0.5,Math.min(4,v)); uiCd.s.value=CD_DUR; uiCd.v.textContent=CD_DUR.toFixed(1); lsSet('whlab2_cd',CD_DUR); },
  setForge(n){ FORGE_COUNT=Math.max(1,Math.min(3,n|0)); uiForge.s.value=FORGE_COUNT; uiForge.v.textContent=String(FORGE_COUNT); lsSet('whlab2_forge',FORGE_COUNT); },
  setPops(n){ POPS=Math.max(3,Math.min(8,n|0)); uiPops.s.value=POPS; uiPops.v.textContent=String(POPS); lsSet('whlab2_pops',POPS); },
  pause(){ auto=false; }, resume(){ auto=true; }, get auto(){ return auto; },
  setSafeRefill(v){ SAFE_REFILL=!!v; },
  step(ms){ let t=ms||16; while(t>0){ update(Math.min(16,t)/1000); t-=16; } },
  sigil(){ return {x:sigilX,y:sigilY,r:sigilR}; }
};

// ================= boot =================
layout();
genNoMatch();
ensurePlayable(true);
requestAnimationFrame(tick);
})();
</script>
