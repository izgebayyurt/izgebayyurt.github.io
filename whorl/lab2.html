<!doctype html>
<!-- whorl · crucible lab (lab2) — hex-19 lattice, line casting, alchemy traces -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Whorl · Crucible Lab</title>
<meta name="description" content="The Crucible — a hex-19 colour lattice. Draw straight lines across it to cast; casting merges the balls it crosses." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- header ---------- */
.hud{ position:fixed; top:calc(env(safe-area-inset-top) + 8px); left:0; right:0; z-index:4;
  display:flex; align-items:center; gap:8px; padding:0 10px; pointer-events:none; }
.title{ font-family:var(--font-d); font-weight:700; font-size:15px; letter-spacing:.3px;
  background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); padding:5px 11px; white-space:nowrap; }
.title span{ color:var(--ink-soft); font-weight:600; }
.spacer{ flex:1; }

/* ---------- tuning drawer ---------- */
.gear{ position:fixed; left:calc(env(safe-area-inset-left) + 12px); bottom:calc(env(safe-area-inset-bottom) + 12px);
  z-index:6; width:46px; height:46px; border-radius:14px; background:var(--card); border:2.5px solid var(--ink);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;
  transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.gear:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.drawer{ position:fixed; left:0; bottom:0; z-index:7; width:100%; max-width:360px; margin:0 auto; right:0;
  background:var(--card); border:3px solid var(--ink); border-bottom:none; border-radius:20px 20px 0 0;
  box-shadow:0 -4px 0 var(--shadow); padding:16px 18px calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(110%); transition:transform .3s var(--pop); }
.drawer.open{ transform:translateY(0); }
.drawer h3{ font-family:var(--font-d); font-weight:700; font-size:16px; margin:0 0 10px; display:flex; align-items:center; gap:8px; }
.drawer h3 .x{ margin-left:auto; cursor:pointer; font-size:20px; color:var(--ink-soft); line-height:1; }
.row{ display:flex; align-items:center; gap:10px; margin:9px 0; font-weight:700; font-size:12.5px; }
.row label{ flex:none; width:104px; color:var(--ink-soft); }
.row input[type=range]{ flex:1; accent-color:#3d8bdf; height:22px; }
.row .val{ flex:none; width:44px; text-align:right; font-family:var(--font-d); font-weight:600; font-size:13px; }
.btnrow{ display:flex; gap:8px; margin:12px 0 6px; }
.tbtn{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:9px 6px; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:12px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.tbtn:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-top:10px; }
.stat{ background:var(--paper2); border:2.5px solid var(--ink); border-radius:11px; padding:7px 3px; text-align:center;
  box-shadow:0 2px 0 var(--shadow); }
.stat b{ font-family:var(--font-d); font-weight:700; font-size:16px; display:block; line-height:1.1; }
.stat small{ font-family:var(--font-u); font-weight:800; font-size:8px; letter-spacing:.06em; color:var(--ink-soft); text-transform:uppercase; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="title">Whorl <span>· Crucible Lab</span></div>
  <div class="spacer"></div>
</div>

<div class="gear" id="gear">⚙</div>
<div class="drawer" id="drawer">
  <h3>Tuning <span class="x" id="drawerClose">×</span></h3>
  <div class="row"><label>Cooldown (s)</label><input type="range" id="sCd" min="0.5" max="4.0" step="0.1"><span class="val" id="vCd">1.6</span></div>
  <div class="row"><label>Spawn (s)</label><input type="range" id="sSpawn" min="1.0" max="8.0" step="0.1"><span class="val" id="vSpawn">3.0</span></div>
  <div class="row"><label>Enemy px/s</label><input type="range" id="sSpeed" min="4" max="40" step="1"><span class="val" id="vSpeed">14</span></div>
  <div class="btnrow">
    <button class="tbtn" id="bReroll">Reroll board</button>
    <button class="tbtn" id="bClear">Clear enemies</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="stCasts">0</b><small>casts</small></div>
    <div class="stat"><b id="stFizzles">0</b><small>fizzles</small></div>
    <div class="stat"><b id="stKills">0</b><small>kills</small></div>
    <div class="stat"><b id="stLeaks">0</b><small>leaks</small></div>
    <div class="stat"><b id="stAvg">0.0</b><small>avg len</small></div>
    <div class="stat"><b id="stWhorls">0</b><small>whorls</small></div>
    <div class="stat"><b id="stWhites">0</b><small>whites</small></div>
    <div class="stat"><b id="stWords">0</b><small>words</small></div>
  </div>
</div>

<script>
"use strict";
(function(){
// ---------------- constants ----------------
const PRIMS = ['R','Y','B'];
const HEX = {
  R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6', W:'#faf6ec'
};
const HEX_DARK = { // darker rim tone per colour
  R:'#c02c3c', Y:'#c99518', B:'#2564a8', O:'#c26a20', G:'#3a9247', P:'#6f3fae', W:'#cbbf9a'
};
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const NAMES_WING  = { R:'Fire', Y:'Splash', B:'Lance', O:'Fan', G:'Bog', P:'Orb', W:'Prism' };
const NAMES_HEART = { R:'bolt', Y:'ray', B:'shard', O:'burst', G:'mire', P:'hex', W:'prism' };
const DMG_BY_LEN = {3:10,4:22,5:40};

// colour decomposition -> primaries, and recombination
const DECOMP = { R:['R'], Y:['Y'], B:['B'], O:['R','Y'], G:['Y','B'], P:['R','B'], W:['R','Y','B'] };
function mergeColours(word){
  const set = new Set();
  for(const c of word){ for(const p of (DECOMP[c]||[])) set.add(p); }
  const key = (set.has('R')?'R':'')+(set.has('Y')?'Y':'')+(set.has('B')?'B':'');
  const map = {R:'R',Y:'Y',B:'B',RY:'O',YB:'G',RB:'P',RYB:'W'};
  return map[key] || word[Math.floor(word.length/2)];
}

// hex-19 lattice, axial (q,r), hexagon radius 2. Ordered row-by-row (r asc, q asc).
const BALLS_QR = [
  [0,-2],[1,-2],[2,-2],
  [-1,-1],[0,-1],[1,-1],[2,-1],
  [-2,0],[-1,0],[0,0],[1,0],[2,0],
  [-2,1],[-1,1],[0,1],[1,1],
  [-2,2],[-1,2],[0,2]
];
const CENTER_IDX = 9;

// ---------------- feel / tuning ----------------
const TAP_TOL = 8;      // px before a press becomes a drag
const COMMIT_TOL = 16;  // px before drag commits to an axis
const AIM_TOL = 46;     // perpendicular px off the line (with >=3 selected) => pull-to-aim
const LOCK_DUR = 0.8;   // fizzle input lockout (s)

// ---------------- persisted settings ----------------
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

let CD_DUR = parseFloat(lsGet('whlab2_cd','1.6'));
if(!(CD_DUR>=0.5 && CD_DUR<=4.0)) CD_DUR=1.6;
let SPAWN = 3.0;
let ESPEED = 14;

// ---------------- canvas ----------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W=390, H=800, DPR=1;
// lattice geometry (set by layout)
let latCX=195, latCY=545, spacing=64, rowH=55, ballRad=24, leakY=394;
function layout(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W*DPR); canvas.height = Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const margin = 18;
  spacing = Math.min(64, (W-2*margin)/4.8);   // guarantees the middle row of 5 fits
  ballRad = Math.max(20, Math.min(24, spacing*0.375));
  const size = spacing/Math.sqrt(3);
  rowH = size*1.5;
  latCX = W/2;
  latCY = H - 118 - ballRad - 2*rowH;          // bottom ball edge ~118px off the floor
  leakY = latCY - 2*rowH - ballRad - 16;        // enemies leak just above the top row
  for(let i=0;i<balls.length;i++){
    const [q,r]=BALLS_QR[i];
    balls[i].x = latCX + spacing*(q + r/2);
    balls[i].y = latCY + rowH*r;
    balls[i].rad = ballRad;
  }
}
window.addEventListener('resize', layout);

// offscreen for metaball field
const off = document.createElement('canvas');
const octx = off.getContext('2d');
function sizeOff(){ off.width=Math.round(W*0.6); off.height=Math.round(H*0.6); }

// ---------------- lattice state ----------------
// ball: {q,r,x,y,rad,c,wob, consumed(bool), refillT(s countdown), born}
const REFILL_DUR = 0.6;
function randPrim(){ return PRIMS[(Math.random()*3)|0]; }
let balls = BALLS_QR.map(([q,r])=>({q,r,x:0,y:0,rad:24,c:randPrim(),wob:0,consumed:false,refillT:0,born:performance.now()}));

// ---------------- game state ----------------
let enemies = [];  // {x,y,r,hp,maxhp,col,wob,dead,death}
let spells = [];   // travelling spells
let warriors = [];
let puffs = [];
let dmgPops = [];
let alchFx = [];   // {x,y,t0,dur,from:[prims],to,col}
let shocks = [];   // whorl rings {x,y,r,maxr,t0,dur}
let spawnT = 0;
let cooldown = 0;  // remaining cast cooldown (s)
let lockout = 0;   // remaining fizzle lockout (s)
let stats = { casts:0, fizzles:0, kills:0, leaks:0, words:0, totalLen:0, whorls:0, whites:0 };

// ---------------- input / selection ----------------
let dragging=false, moved=false;
let startIdx=-1;                 // ball the press started on
let startPos={x:0,y:0};
let pointer={x:0,y:0};
let committed=-1;                // axis 0/1/2 once committed
let selection=[];                // ordered ball indices (start -> far)
let aiming=false;
let aimVec={x:0,y:-1};
let blobs=[];                    // metaball goo {bi,x,y,tx,ty,r,col,seed}

// pixel direction of each axis (pointy-top): A horizontal, B down-right, C up-right
const AXPIX = [ {x:1,y:0}, {x:0.5,y:0.8660254}, {x:0.5,y:-0.8660254} ];

function ballAt(x,y){
  for(let i=0;i<balls.length;i++){ const b=balls[i]; if(b.consumed) continue;
    if(Math.hypot(x-b.x,y-b.y)<=b.rad) return i; }
  return -1;
}
// balls collinear with startIdx along an axis, sorted by position along it
function lineOf(sIdx, axis){
  const s=balls[sIdx];
  const key = axis===0 ? s.r : axis===1 ? s.q : (s.q+s.r);
  const line = [];
  for(let i=0;i<balls.length;i++){ const b=balls[i]; if(b.consumed && i!==sIdx) continue;
    const k = axis===0 ? b.r : axis===1 ? b.q : (b.q+b.r);
    if(k===key) line.push(i);
  }
  line.sort((i,j)=> posAlong(i,axis)-posAlong(j,axis));
  return line;
}
function posAlong(i,axis){ const b=balls[i]; return axis===1 ? b.r : b.q; }

function commitAxis(){
  const dx=pointer.x-startPos.x, dy=pointer.y-startPos.y;
  let best=-1, bestd=0;
  for(let a=0;a<3;a++){ const d=Math.abs(dx*AXPIX[a].x + dy*AXPIX[a].y); if(d>bestd){bestd=d;best=a;} }
  committed=best;
}
function updateSelection(){
  const axis=committed;
  const s=balls[startIdx];
  const dir=AXPIX[axis];
  const line=lineOf(startIdx, axis);
  const tf=(pointer.x-s.x)*dir.x + (pointer.y-s.y)*dir.y;   // finger projection rel. start
  let target=startIdx, bd=1e9;
  for(const i of line){ const b=balls[i]; const t=(b.x-s.x)*dir.x+(b.y-s.y)*dir.y;
    const d=Math.abs(t-tf); if(d<bd){bd=d;target=i;} }
  const si=line.indexOf(startIdx), ti=line.indexOf(target);
  const lo=Math.min(si,ti), hi=Math.max(si,ti);
  let seg=line.slice(lo,hi+1);
  if(si>ti) seg.reverse();
  if(seg.length>5) seg=seg.slice(0,5);
  selection=seg;
  // aim: pull far perpendicular to the line with >=3 selected
  const drag={x:pointer.x-s.x,y:pointer.y-s.y};
  const along=drag.x*dir.x+drag.y*dir.y;
  const perp=Math.hypot(drag.x-dir.x*along, drag.y-dir.y*along);
  aiming = selection.length>=3 && perp>AIM_TOL;
  if(aiming){ const o=centroid(selection); aimVec={x:pointer.x-o.x, y:pointer.y-o.y}; }
  syncBlobs();
}
function centroid(sel){ let sx=0,sy=0; for(const i of sel){ sx+=balls[i].x; sy+=balls[i].y; }
  const n=Math.max(1,sel.length); return {x:sx/n, y:sy/n}; }

function syncBlobs(){
  blobs = blobs.filter(bl=>selection.includes(bl.bi));
  for(const bi of selection){
    let bl=blobs.find(x=>x.bi===bi);
    if(!bl){ const b=balls[bi]; bl={bi,x:b.x,y:b.y,tx:b.x,ty:b.y,r:0,col:b.c,seed:Math.random()*6.28}; blobs.push(bl); }
    bl.col=balls[bi].c;
  }
}
function clearSelection(){ selection=[]; blobs=[]; aiming=false; committed=-1; dragging=false; moved=false; startIdx=-1; }

// ---------------- grammar ----------------
function isPalindrome(a){ for(let i=0,j=a.length-1;i<j;i++,j--) if(a[i]!==a[j]) return false; return true; }
function allSame(a){ return a.every(c=>c===a[0]); }
function classify(word){
  const n=word.length;
  if(n<3||n>5) return {type:'fizzle', reason:n>5?'too long':'too short'};
  if(allSame(word)) return {type:'pure', col:word[0], len:n};
  if(isPalindrome(word)) return {type:'mixed', wing:word[0], heart:word[Math.floor(n/2)], len:n};
  return {type:'fizzle', reason:'not mirror'};
}
function heartIndices(n){ return n%2 ? [Math.floor(n/2)] : [n/2-1, n/2]; }
function nameFor(cls){
  if(cls.type==='pure') return 'Warrior '+cls.col;
  if(cls.type==='mixed') return NAMES_WING[cls.wing]+NAMES_HEART[cls.heart];
  return '';
}

// ---------------- casting ----------------
function castFromSelection(vec){
  if(cooldown>0){ clearSelection(); return {result:'cooldown'}; }
  const sel = selection.slice();
  const word = sel.map(i=>balls[i].c);
  const cls = classify(word);
  stats.words++; stats.totalLen += word.length;

  if(cls.type==='fizzle'){
    doFizzle(sel);
    stats.fizzles++; lockout=LOCK_DUR;
    clearSelection();
    return {result:'fizzle', word:word.join('')};
  }

  const o = centroid(sel);
  const v = normVec(vec || nearestEnemyVec(o));

  if(cls.type==='pure'){
    // consume the whole segment; warrior emerges; spots refill after ~0.6s
    for(const i of sel){ const b=balls[i]; b.consumed=true; b.refillT=REFILL_DUR;
      for(let k=0;k<5;k++) puffs.push(mkPuff(b.x,b.y,HEX[b.c])); }
    summonWarrior(cls.col, cls.len, o);
  } else {
    // MIXED MIRROR — trace rule: transform heart ball(s) into the merge
    const merged = mergeColours(word);
    const contribs = [...new Set(word.flatMap(c=>DECOMP[c]))];
    for(const h of heartIndices(cls.len)){
      const bi=sel[h]; const b=balls[bi];
      const prev=b.c; b.c=merged; b.wob=1.2;
      alchFx.push({x:b.x,y:b.y,t0:performance.now(),dur:600,from:contribs.slice(),to:merged});
      if(merged==='W' && prev!=='W') stats.whites++;
    }
    launchSpell(cls, o, v);
  }
  stats.casts++;
  cooldown = CD_DUR;
  vibrate(24);
  clearSelection();
  return {result:cls.type, word:word.join(''), name:nameFor(cls)};
}

function castWhorl(bi){
  if(cooldown>0){ return {result:'cooldown'}; }
  const cx=latCX, cy=latCY;
  shocks.push({x:cx,y:cy,r:0,maxr:Math.hypot(W,H),t0:performance.now(),dur:520});
  for(const e of enemies){ if(!e.dead) damageEnemy(e, 60, HEX.W); }
  for(let k=0;k<20;k++){ const p=mkPuff(cx,cy,HEX.W); p.life+=0.3; puffs.push(p); }
  if(balls[bi]) balls[bi].c=randPrim(), balls[bi].wob=1.2;
  stats.whorls++;
  cooldown = CD_DUR;
  vibrate([16,20,16]);
  return {result:'whorl'};
}

function normVec(v){ const m=Math.hypot(v.x,v.y)||1; return {x:v.x/m,y:v.y/m}; }
function nearestEnemyVec(o){
  let best=null,bd=1e9;
  for(const e of enemies){ if(e.dead) continue; const d=Math.hypot(e.x-o.x,e.y-o.y); if(d<bd){bd=d;best=e;} }
  if(best) return normVec({x:best.x-o.x,y:best.y-o.y});
  return {x:0,y:-1};
}
function summonWarrior(col,len,o){
  const tier=len-2; const r=15+tier*6; const hp=30+tier*30;
  warriors.push({x:o.x+(Math.random()-0.5)*30, y:o.y-10, r, hp, maxhp:hp, col, tier, atk:6+tier*4, atkT:0});
  for(let k=0;k<10;k++) puffs.push(mkPuff(o.x,o.y,HEX[col]));
}
function launchSpell(cls,o,v){
  const form=cls.wing, heart=cls.heart;
  const dmg=DMG_BY_LEN[cls.len] + (heart==='R'?6:heart==='P'?4:heart==='B'?3:2);
  const speed={R:520,B:420,P:190,O:300,Y:250,G:300,W:240}[form]||300;
  function one(vv){
    spells.push({ x:o.x, y:o.y, vx:vv.x*speed, vy:vv.y*speed,
      form, wing:cls.wing, heart, dmg, life:2.4, r:(form==='P'||form==='W')?20:form==='B'?10:13,
      tint:HEX[heart], col:HEX[cls.wing], pierce:form==='B', trail:[], lob:form==='Y',
      pool:form==='G', gravity:form==='Y'?260:0, t:0 });
  }
  if(form==='O'){ const s=0.32; one(rot(v,-s)); one(v); one(rot(v,s)); }
  else one(v);
}
function rot(v,a){ const c=Math.cos(a),s=Math.sin(a); return {x:v.x*c-v.y*s,y:v.x*s+v.y*c}; }
function doFizzle(sel){
  for(const i of sel){ const b=balls[i]; for(let k=0;k<3;k++){ const p=mkPuff(b.x,b.y,HEX[b.c]); p.life*=0.7; puffs.push(p); } }
  vibrate([12,30,12]);
}
function mkPuff(x,y,col){ const a=Math.random()*6.28, sp=40+Math.random()*90;
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:0.5+Math.random()*0.3,max:0.8,r:4+Math.random()*5,col}; }
function vibrate(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ---------------- enemies ----------------
function spawnEnemy(){
  const hp=Math.random()<0.5?20:40; const r=hp===20?18:24;
  const col=PRIMS[(Math.random()*3)|0];
  enemies.push({x:r+Math.random()*(W-2*r), y:-r-6, r, hp, maxhp:hp, col:HEX[col], wob:Math.random()*6.28, dead:false, death:0});
}
function damageEnemy(e,dmg,col){
  if(e.dead) return;
  e.hp-=dmg; e.wob+=1.6;
  dmgPops.push({x:e.x,y:e.y-e.r-4,life:0.9,val:Math.round(dmg),col:col||INK});
  for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,col||e.col));
  if(e.hp<=0){ e.dead=true; e.death=0; stats.kills++;
    for(let k=0;k<12;k++){ const p=mkPuff(e.x,e.y,e.col); p.life+=0.2; puffs.push(p); } }
}

// ---------------- update loop ----------------
let last=performance.now();
function tick(now){ let dt=(now-last)/1000; if(dt>0.05) dt=0.05; last=now; update(dt); render(now); requestAnimationFrame(tick); }

function update(dt){
  cooldown=Math.max(0,cooldown-dt);
  lockout=Math.max(0,lockout-dt);

  // ball wobble + consumed refill (dt-driven so LAB.step is deterministic)
  const now=performance.now();
  for(const b of balls){
    b.wob*=Math.pow(0.02,dt);
    if(b.consumed){ b.refillT-=dt; if(b.refillT<=0){ b.consumed=false; b.c=randPrim(); b.wob=1.2; b.born=now; } }
  }

  // spells
  for(const s of spells){
    s.t+=dt; s.life-=dt;
    if(s.gravity) s.vy+=s.gravity*dt;
    s.x+=s.vx*dt; s.y+=s.vy*dt;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>10) s.trail.shift();
    for(const e of enemies){ if(e.dead) continue;
      if(Math.hypot(e.x-s.x,e.y-s.y)<e.r+s.r*0.7){ damageEnemy(e,s.dmg,s.col); spawnSplash(s.x,s.y,s.col);
        if(!s.pierce) s.life=0; else s.dmg*=0.7; break; } }
    if(s.lob && s.vy>0 && s.y>H*0.5){ spawnSplash(s.x,s.y,s.col);
      for(const e of enemies){ if(!e.dead && Math.hypot(e.x-s.x,e.y-s.y)<50) damageEnemy(e,s.dmg*0.8,s.col); } s.life=0; }
    if(s.y<-40||s.x<-40||s.x>W+40||s.y>H+40) s.life=0;
  }
  spells=spells.filter(s=>s.life>0);

  // warriors
  for(const wr of warriors){
    wr.y-=34*dt; wr.atkT-=dt;
    for(const e of enemies){ if(e.dead) continue;
      if(Math.hypot(e.x-wr.x,e.y-wr.y)<e.r+wr.r){ wr.y+=34*dt*0.9;
        if(wr.atkT<=0){ damageEnemy(e,wr.atk,HEX[wr.col]); wr.atkT=0.5; wr.hp-=6; } } }
    if(wr.y<-30) wr.hp=0;
  }
  warriors=warriors.filter(w=>w.hp>0);

  // enemies drift
  for(const e of enemies){ if(e.dead){ e.death+=dt; continue; }
    e.y+=ESPEED*dt; e.wob+=dt*1.4;
    if(e.y>leakY){ e.dead=true; e.death=0; stats.leaks++; for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,e.col)); } }
  enemies=enemies.filter(e=>!e.dead||e.death<0.4);

  // spawn
  spawnT+=dt; if(spawnT>=SPAWN){ spawnT-=SPAWN; if(enemies.filter(e=>!e.dead).length<14) spawnEnemy(); }

  // particles
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs=puffs.filter(p=>p.life>0);
  for(const d of dmgPops){ d.life-=dt; d.y-=34*dt; } dmgPops=dmgPops.filter(d=>d.life>0);
  alchFx=alchFx.filter(a=>now-a.t0<a.dur);
  shocks=shocks.filter(s=>now-s.t0<s.dur);

  updateBlobs(dt);
  updateStatsUI();
}
function spawnSplash(x,y,col){ for(let k=0;k<9;k++){ const p=mkPuff(x,y,col); p.r+=2; puffs.push(p); } }

// ---------------- metaball blobs ----------------
function updateBlobs(dt){
  const n=blobs.length;
  for(let k=0;k<n;k++){ const b=blobs[k];
    if(aiming){ const ang=(k/n)*6.28; b.tx=pointer.x+Math.cos(ang+performance.now()/300)*6;
      b.ty=pointer.y+Math.sin(ang+performance.now()/300)*6; b.r+=(16-b.r)*Math.min(1,dt*8); }
    else { const w=balls[b.bi]; b.tx=w.x; b.ty=w.y; b.r+=(ballRad*0.74-b.r)*Math.min(1,dt*10); }
    b.x+=(b.tx-b.x)*Math.min(1,dt*16); b.y+=(b.ty-b.y)*Math.min(1,dt*16);
  }
}

// ---------------- render ----------------
function render(now){
  ctx.clearRect(0,0,W,H);
  drawFieldLine();
  drawEnemies(now);
  drawWarriors(now);
  drawSpells(now);
  drawSelectionLine();
  drawBalls(now);
  drawMetaChain(now);
  drawAlch(now);
  drawShocks(now);
  drawCooldown(now);
  drawPuffs();
  drawDmgPops();
  drawWord(now);
  drawAim(now);
}

function drawFieldLine(){
  const y=leakY;
  ctx.save();
  ctx.strokeStyle='rgba(44,39,51,.14)'; ctx.lineWidth=2; ctx.setLineDash([2,7]); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,y); ctx.lineTo(W-14,y); ctx.stroke();
  ctx.restore();
}
function stickerCircle(x,y,r,fill,rim,lw){
  ctx.save();
  ctx.shadowColor='rgba(44,39,51,.28)'; ctx.shadowBlur=0; ctx.shadowOffsetY=3;
  ctx.beginPath(); ctx.arc(x,y,r,0,6.2832); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowColor='transparent'; ctx.lineWidth=lw||2.5; ctx.strokeStyle=rim||INK; ctx.stroke();
  ctx.restore();
}
function drawSelectionLine(){
  if(selection.length<2 || aiming) return;
  ctx.save();
  ctx.strokeStyle='rgba(255,209,92,.75)'; ctx.lineWidth=ballRad*1.5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  for(let k=0;k<selection.length;k++){ const b=balls[selection[k]]; k?ctx.lineTo(b.x,b.y):ctx.moveTo(b.x,b.y); }
  ctx.stroke(); ctx.restore();
}
function drawBalls(now){
  for(let i=0;i<balls.length;i++){
    const b=balls[i];
    let r=b.rad + Math.sin(now/170+i)*0.6 + b.wob*3;
    let alpha=1, sc=1;
    if(b.consumed){ const f=Math.min(1,1-b.refillT/REFILL_DUR); sc=1-0.55*f; alpha=1-f; }
    else if(now-b.born<300){ const f=(now-b.born)/300; sc=0.6+0.4*f; }
    if(alpha<=0.02) continue;
    ctx.save(); ctx.globalAlpha=alpha;
    const rr=r*sc;
    const sel=selection.includes(i);
    stickerCircle(b.x,b.y,rr,HEX[b.c],INK,sel?4:3);
    // white/prism sparkle
    if(b.c==='W'){
      ctx.strokeStyle='rgba(155,98,214,.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(b.x,b.y,rr-4,0,6.2832); ctx.stroke();
      const tw=0.5+0.5*Math.sin(now/220+i);
      ctx.fillStyle='rgba(255,255,255,'+(0.6+0.4*tw)+')';
      for(const [dx,dy] of [[0,-rr*0.5],[rr*0.5,0.15*rr],[-rr*0.45,0.2*rr]]){
        ctx.beginPath(); ctx.arc(b.x+dx,b.y+dy,2.1,0,6.28); ctx.fill(); }
    }
    // glossy highlight
    ctx.beginPath(); ctx.arc(b.x-rr*0.3,b.y-rr*0.34,rr*0.24,0,6.28);
    ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fill();
    if(sel){ ctx.beginPath(); ctx.arc(b.x,b.y,rr+3,0,6.28); ctx.strokeStyle=ACCENT; ctx.lineWidth=2.5; ctx.stroke(); }
    ctx.restore();
  }
}
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function drawMetaChain(now){
  if(blobs.length===0) return;
  sizeOff();
  const sx=off.width/W, sy=off.height/H;
  octx.setTransform(1,0,0,1,0,0); octx.clearRect(0,0,off.width,off.height);
  octx.globalCompositeOperation='lighter';
  for(const b of blobs){
    const R=b.r*2.5*sx; const gx=b.x*sx, gy=b.y*sy; const [r,g,bl]=hexToRgb(HEX[b.col]);
    const grd=octx.createRadialGradient(gx,gy,0,gx,gy,R);
    grd.addColorStop(0,`rgba(${r},${g},${bl},1)`); grd.addColorStop(0.55,`rgba(${r},${g},${bl},.55)`);
    grd.addColorStop(1,`rgba(${r},${g},${bl},0)`);
    octx.fillStyle=grd; octx.beginPath(); octx.arc(gx,gy,R,0,6.2832); octx.fill();
  }
  octx.globalCompositeOperation='source-over';
  const img=octx.getImageData(0,0,off.width,off.height); const d=img.data;
  for(let p=0;p<d.length;p+=4){ const a=d[p+3];
    if(a>150) d[p+3]=255; else if(a>92) d[p+3]=Math.round((a-92)/58*255); else d[p+3]=0;
    if(d[p+3]>0){ const mx=Math.max(d[p],d[p+1],d[p+2])||1; const k=Math.min(1,235/mx);
      d[p]=Math.min(255,d[p]*k*1.05); d[p+1]=Math.min(255,d[p+1]*k*1.05); d[p+2]=Math.min(255,d[p+2]*k*1.05); } }
  octx.putImageData(img,0,0);
  ctx.save(); ctx.imageSmoothingEnabled=true;
  ctx.globalAlpha=0.42; ctx.drawImage(off,0,0,off.width,off.height,-1.5,-1.5,W+3,H+3);
  ctx.globalCompositeOperation='source-atop'; ctx.fillStyle='rgba(44,39,51,.22)'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=0.8; ctx.drawImage(off,0,0,off.width,off.height,0,0,W,H);
  ctx.restore();
  ctx.save();
  for(const b of blobs){ ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.32,b.r*0.22,0,6.2832);
    ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill(); }
  ctx.restore();
}
function drawAlch(now){
  for(const a of alchFx){
    const f=(now-a.t0)/a.dur;                // 0..1
    const R=(1-f)*ballRad*1.7 + ballRad*0.3;
    ctx.save();
    // swirl of contributing primaries collapsing inward
    for(let k=0;k<a.from.length;k++){
      const base=(k/a.from.length)*6.28;
      const ang=base + f*7;
      const rad=R*(1-f*0.6);
      const px=a.x+Math.cos(ang)*rad, py=a.y+Math.sin(ang)*rad;
      ctx.globalAlpha=1-f; ctx.beginPath(); ctx.arc(px,py,4.5*(1-f)+1.5,0,6.28);
      ctx.fillStyle=HEX[a.from[k]]; ctx.fill();
    }
    // ring pulse
    ctx.globalAlpha=(1-f)*0.8; ctx.beginPath(); ctx.arc(a.x,a.y,ballRad+8+f*14,0,6.28);
    ctx.strokeStyle=HEX[a.to]; ctx.lineWidth=3*(1-f)+0.5; ctx.stroke();
    ctx.restore();
  }
}
function drawShocks(now){
  for(const s of shocks){
    const f=(now-s.t0)/s.dur; const r=f*s.maxr;
    ctx.save(); ctx.globalAlpha=(1-f)*0.85;
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle=HEX.W; ctx.lineWidth=18*(1-f)+2; ctx.stroke();
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,6.28); ctx.strokeStyle='rgba(155,98,214,.7)'; ctx.lineWidth=4*(1-f); ctx.stroke();
    ctx.restore();
  }
}
function drawCooldown(now){
  if(cooldown<=0) return;
  const f=cooldown/CD_DUR;   // 1 -> 0
  ctx.save();
  // subtle radial sweep around lattice centre
  const R=2.4*rowH+ballRad+14;
  ctx.globalAlpha=0.16*f;
  ctx.beginPath(); ctx.arc(latCX,latCY,R,0,6.28); ctx.fillStyle=INK; ctx.fill();
  ctx.globalAlpha=0.55*f;
  ctx.beginPath(); ctx.arc(latCX,latCY,R-4,-Math.PI/2,-Math.PI/2+f*6.2832);
  ctx.strokeStyle=ACCENT; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
}
function drawEnemies(now){
  for(const e of enemies){ const t=e.dead?(1-e.death/0.4):1; if(t<=0) continue;
    const r=e.r*(e.dead?(0.6+0.4*t):1)+Math.sin(e.wob)*1.5;
    ctx.save(); ctx.globalAlpha=e.dead?t:1; stickerCircle(e.x,e.y,r,e.col,INK,3);
    ctx.beginPath(); const frac=Math.max(0,e.hp/e.maxhp);
    ctx.arc(e.x,e.y,r+5,-Math.PI/2,-Math.PI/2+frac*6.2832); ctx.strokeStyle='rgba(44,39,51,.4)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.restore(); }
}
function drawWarriors(now){
  for(const wr of warriors){ const r=wr.r+Math.sin(now/180+wr.x)*1.5;
    stickerCircle(wr.x,wr.y,r,HEX[wr.col],INK,3);
    ctx.save(); ctx.fillStyle=INK;
    ctx.beginPath(); ctx.arc(wr.x-r*0.3,wr.y-r*0.1,2.4,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(wr.x+r*0.3,wr.y-r*0.1,2.4,0,6.28); ctx.fill();
    ctx.fillStyle='rgba(44,39,51,.2)'; ctx.fillRect(wr.x-r,wr.y+r+4,r*2,3);
    ctx.fillStyle='#57c268'; ctx.fillRect(wr.x-r,wr.y+r+4,r*2*Math.max(0,wr.hp/wr.maxhp),3); ctx.restore(); }
}
function drawSpells(now){
  for(const s of spells){
    for(let k=0;k<s.trail.length;k++){ const p=s.trail[k]; const a=k/s.trail.length;
      ctx.beginPath(); ctx.arc(p.x,p.y,s.r*a*0.8,0,6.28);
      ctx.fillStyle=s.col+Math.floor(a*120).toString(16).padStart(2,'0'); ctx.fill(); }
    stickerCircle(s.x,s.y,s.r,s.col,INK,2.5);
    ctx.beginPath(); ctx.arc(s.x-s.r*0.3,s.y-s.r*0.3,s.r*0.3,0,6.28); ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.35,0,6.28); ctx.fillStyle=s.tint; ctx.fill();
  }
}
function drawPuffs(){ for(const p of puffs){ const a=Math.max(0,p.life/p.max);
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*a,0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; } }
function drawDmgPops(){ for(const d of dmgPops){ const a=Math.max(0,d.life/0.9);
  ctx.save(); ctx.globalAlpha=a; ctx.font='700 18px Fredoka, sans-serif'; ctx.textAlign='center';
  ctx.lineWidth=3.5; ctx.strokeStyle=PAPER; ctx.strokeText(d.val,d.x,d.y); ctx.fillStyle=d.col; ctx.fillText(d.val,d.x,d.y); ctx.restore(); } }

function drawWord(now){
  if(selection.length===0) return;
  const word=selection.map(i=>balls[i].c);
  const cls=classify(word);
  const valid=cls.type!=='fizzle';
  const label = valid?nameFor(cls) : (word.length>=3?'…fizzle':'');
  const y=leakY-30;
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  const dotR=6, gap=18; const totalW=(word.length-1)*gap;
  ctx.font='700 14px Fredoka, sans-serif';
  const lblW = label?ctx.measureText(' — '+label).width:0;
  const dotsW=totalW+dotR*2; const blockW=dotsW+lblW+8; let bx=W/2-blockW/2;
  ctx.save(); ctx.beginPath(); roundRect(bx-12,y-16,blockW+24,32,14);
  ctx.fillStyle=PAPER2; ctx.strokeStyle=INK; ctx.lineWidth=2.5; ctx.shadowColor='rgba(44,39,51,.25)'; ctx.shadowOffsetY=3;
  ctx.fill(); ctx.shadowColor='transparent'; ctx.stroke(); ctx.restore();
  let cx=bx+dotR;
  for(let k=0;k<word.length;k++){ ctx.beginPath(); ctx.arc(cx,y,dotR,0,6.28);
    ctx.fillStyle=HEX[word[k]]; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle=INK; ctx.stroke(); cx+=gap; }
  cx=cx-gap+dotR+4; ctx.textAlign='left';
  if(!valid && word.length>=3){ ctx.fillStyle='#ef4a5a'; ctx.fillText(' …fizzle',cx,y); }
  else if(valid){ ctx.fillStyle=INK; ctx.fillText(' — '+label,cx,y); }
  ctx.restore();
}
function drawAim(now){
  if(!aiming) return;
  const o=centroid(selection); const v=normVec(aimVec);
  ctx.save(); ctx.strokeStyle='rgba(44,39,51,.5)'; ctx.lineWidth=3; ctx.setLineDash([3,9]); ctx.lineCap='round';
  const len=220; ctx.beginPath(); ctx.moveTo(o.x,o.y); ctx.lineTo(o.x+v.x*len,o.y+v.y*len); ctx.stroke(); ctx.setLineDash([]);
  const ax=o.x+v.x*len, ay=o.y+v.y*len; const perp={x:-v.y,y:v.x};
  ctx.beginPath(); ctx.moveTo(ax+v.x*12,ay+v.y*12);
  ctx.lineTo(ax-v.x*8+perp.x*9,ay-v.y*8+perp.y*9); ctx.lineTo(ax-v.x*8-perp.x*9,ay-v.y*8-perp.y*9);
  ctx.closePath(); ctx.fillStyle='rgba(44,39,51,.6)'; ctx.fill(); ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ---------------- pointer handling ----------------
function getPos(ev){
  const rect=canvas.getBoundingClientRect(); let cx,cy;
  if(ev.touches && ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
  else if(ev.changedTouches && ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top};
}
function onDown(ev){
  if(lockout>0) return;
  const p=getPos(ev); const i=ballAt(p.x,p.y);
  if(i<0) return;
  ev.preventDefault();
  dragging=true; moved=false; startIdx=i; startPos=p; pointer=p; committed=-1; aiming=false;
  selection=[i]; balls[i].wob=Math.max(balls[i].wob,0.5); syncBlobs();
}
function onMove(ev){
  if(!dragging) return;
  const p=getPos(ev); pointer=p; ev.preventDefault();
  if(!moved){ if(Math.hypot(p.x-startPos.x,p.y-startPos.y)>TAP_TOL) moved=true; else return; }
  if(committed<0){ if(Math.hypot(p.x-startPos.x,p.y-startPos.y)>COMMIT_TOL) commitAxis(); else return; }
  updateSelection();
}
function onUp(ev){
  if(!dragging) return;
  ev.preventDefault();
  pointer=getPos(ev);
  if(!moved){
    const b=balls[startIdx];
    if(b && !b.consumed && b.c==='W') castWhorl(startIdx);
    else if(b) b.wob=1;                        // tiny wobble on non-white tap
    clearSelection(); return;
  }
  let vec = aiming ? aimVec : nearestEnemyVec(centroid(selection));
  castFromSelection(vec);
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});

// ---------------- debug handle ----------------
function segmentFor(sIdx, axis, len){
  const line=lineOf(sIdx, axis); const si=line.indexOf(sIdx);
  if(si<0) return null;
  if(si+len<=line.length) return line.slice(si,si+len);
  if(si-len+1>=0){ const s=line.slice(si-len+1,si+1); return s; }
  return null;
}
window.LAB = {
  get balls(){ return balls.map((b,i)=>({i, q:b.q, r:b.r, c:b.c, x:b.x, y:b.y, consumed:!!b.consumed})); },
  get selection(){ return selection.slice(); },
  get word(){ return selection.map(i=>balls[i].c).join(''); },
  get stats(){ return Object.assign({avgLen: stats.words?stats.totalLen/stats.words:0}, stats); },
  get enemies(){ return enemies.map(e=>({x:e.x,y:e.y,hp:e.hp,dead:e.dead})); },
  get counts(){ return {enemies:enemies.length, spells:spells.length, warriors:warriors.length, puffs:puffs.length, alch:alchFx.length, shocks:shocks.length}; },
  get cooldown(){ return cooldown; },
  get cooldownDur(){ return CD_DUR; },
  get lockout(){ return lockout; },
  get center(){ return CENTER_IDX; },
  setCooldownDur(v){ CD_DUR=Math.max(0.5,Math.min(4.0,v)); sCd.value=CD_DUR; vCd.textContent=CD_DUR.toFixed(1); lsSet('whlab2_cd',CD_DUR); },
  clearCooldown(){ cooldown=0; lockout=0; },
  classify(arr){ return classify(arr); },
  merge(arr){ return mergeColours(arr); },
  segment(sIdx,axis,len){ return segmentFor(sIdx, typeof axis==='number'?axis:{A:0,B:1,C:2}[axis], len); },
  setBall(idx,colour){ if(balls[idx]){ balls[idx].c=colour; balls[idx].consumed=false; balls[idx].refillT=0; balls[idx].wob=1; } },
  tapBall(idx){ const b=balls[idx]; if(!b) return {result:'nofit'};
    if(!b.consumed && b.c==='W') return castWhorl(idx); b.wob=1; return {result:'wobble'}; },
  // synthesize a straight-line cast; axis 0/1/2 or 'A'/'B'/'C'; aimVec optional (else auto-target)
  castLine(sIdx, axis, len, aimVec){
    const ax = typeof axis==='number'?axis:{A:0,B:1,C:2}[axis];
    const seg=segmentFor(sIdx, ax, len);
    if(!seg || seg.length<len) return {result:'nofit'};
    selection=seg; syncBlobs();
    return castFromSelection(aimVec||null);
  },
  spawnEnemyAt(x,y,hp){ hp=hp||20; enemies.push({x,y,r:hp===20?18:24,hp,maxhp:hp,col:HEX.R,wob:0,dead:false,death:0}); },
  clearEnemies(){ enemies=[]; },
  rerollBoard(){ rerollBoard(); },
  step(ms){ update((ms||16)/1000); }
};

// ---------------- boot ----------------
layout();
requestAnimationFrame(tick);
})();
</script>
