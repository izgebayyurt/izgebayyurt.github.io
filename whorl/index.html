<!doctype html>
<!-- whorl · build 16 — hex-37 match-3 casting core hooked to the open-field wave game -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#f0e6cf" />
<title>Whorl · İzge Bayyurt</title>
<meta name="description" content="Swap colour bubbles into lines, forge secondaries, charge the Whorl, and hold the wall against the horde. A hex match-3 colour-alchemy defense." />
<meta property="og:title" content="Whorl" />
<meta property="og:description" content="Swap. Match. Whorl. A hex match-3 colour-alchemy defense." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f0e6cf'/%3E%3Ccircle cx='16' cy='7' r='4' fill='%23ef4a5a' stroke='%232c2733' stroke-width='2'/%3E%3Ccircle cx='25' cy='16' r='4' fill='%233d8bdf' stroke='%232c2733' stroke-width='2'/%3E%3Ccircle cx='16' cy='25' r='4' fill='%2357c268' stroke='%232c2733' stroke-width='2'/%3E%3Ccircle cx='7' cy='16' r='4' fill='%23f6c445' stroke='%232c2733' stroke-width='2'/%3E%3C/svg%3E" />

<style>
:root{
  --paper:#f0e6cf; --paper2:#fbf5e6; --card:#fffdf6;
  --ink:#2c2733; --ink-soft:#6b6472;
  --shadow:rgba(44,39,51,.9);
  --accent:#ffd15c;
  --font-d:"Fredoka", system-ui, sans-serif;
  --font-u:"Nunito", system-ui, sans-serif;
  --calm:cubic-bezier(.4,0,.2,1); --pop:cubic-bezier(.34,1.7,.6,1);
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
body{
  background:var(--paper);
  background-image:radial-gradient(rgba(44,39,51,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
  color:var(--ink); font-family:var(--font-u);
  -webkit-font-smoothing:antialiased; -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#c{ position:fixed; inset:0; display:block; touch-action:none; }

/* ---------- HUD ---------- */
.hud{ position:fixed; top:calc(env(safe-area-inset-top) + 9px); left:0; right:0; z-index:4;
  display:flex; align-items:center; gap:9px; padding:0 12px; pointer-events:none; }
.chip{ display:flex; align-items:center; gap:6px; background:var(--paper2); border:2.5px solid var(--ink);
  border-radius:12px; box-shadow:0 3px 0 var(--shadow); padding:5px 11px; font-family:var(--font-d); font-weight:600; }
.chip small{ font-family:var(--font-u); font-weight:800; font-size:9px; letter-spacing:.12em; color:var(--ink-soft); text-transform:uppercase; }
.hearts{ font-size:15px; color:#ef4a5a; letter-spacing:1px; }
.hearts b{ color:var(--ink); font-size:15px; margin-left:2px; }
.wave b{ font-size:16px; }
.spacer{ flex:1; }

/* ---------- settings gear ---------- */
.gear{ position:fixed; right:calc(env(safe-area-inset-right) + 12px); top:calc(env(safe-area-inset-top) + 9px);
  z-index:6; width:38px; height:38px; border-radius:12px; background:var(--card); border:2.5px solid var(--ink);
  box-shadow:0 3px 0 var(--shadow); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  pointer-events:auto; transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.gear:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.drawer{ position:fixed; left:0; bottom:0; z-index:8; width:100%; max-width:360px; margin:0 auto; right:0;
  background:var(--card); border:3px solid var(--ink); border-bottom:none; border-radius:20px 20px 0 0;
  box-shadow:0 -4px 0 var(--shadow); padding:16px 18px calc(env(safe-area-inset-bottom) + 16px);
  transform:translateY(115%); transition:transform .3s var(--pop); }
.drawer.open{ transform:translateY(0); }
.drawer h3{ font-family:var(--font-d); font-weight:700; font-size:16px; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
.drawer h3 .x{ margin-left:auto; cursor:pointer; font-size:22px; color:var(--ink-soft); line-height:1; }
.srow{ display:flex; align-items:center; gap:10px; margin:11px 0; font-weight:700; font-size:12.5px; }
.srow > label{ flex:none; width:90px; color:var(--ink-soft); }
.srow input[type=range]{ flex:1; accent-color:#3d8bdf; height:22px; }
.srow .val{ flex:none; width:40px; text-align:right; font-family:var(--font-d); font-weight:600; font-size:13px; }
.pills{ display:flex; gap:6px; flex:1; }
.pill{ flex:1; font-family:var(--font-d); font-weight:600; font-size:13px; padding:7px 0; cursor:pointer;
  color:var(--ink); background:var(--paper2); border:2.5px solid var(--ink); border-radius:999px;
  box-shadow:0 2px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm); touch-action:manipulation; }
.pill:active{ transform:translateY(2px); box-shadow:0 0 0 var(--shadow); }
.pill.on{ background:var(--accent); }

/* ---------- overlays ---------- */
.veil{ position:fixed; inset:0; z-index:9; display:none; align-items:center; justify-content:center; padding:20px;
  background:rgba(240,230,207,.80); backdrop-filter:blur(2px); }
.veil.show{ display:flex; }
.panel{ width:100%; max-width:340px; text-align:center; padding:26px 22px 20px; background:var(--card);
  border:3px solid var(--ink); border-radius:22px; box-shadow:0 6px 0 var(--shadow); animation:whPanel .28s var(--pop); }
@keyframes whPanel{ from{transform:scale(.85); opacity:0} to{transform:scale(1); opacity:1} }
.panel h1{ font-family:var(--font-d); font-weight:700; font-size:36px; margin:0 0 2px; letter-spacing:.5px; }
.panel h2{ font-family:var(--font-d); font-weight:700; font-size:26px; margin:0 0 6px; }
.panel p{ font-weight:700; color:var(--ink-soft); font-size:13.5px; line-height:1.55; margin:8px 0 14px; }
.ringlogo{ width:66px; height:66px; margin:2px auto 10px; position:relative; }
.ringlogo i{ position:absolute; width:22px; height:22px; border-radius:50%; border:2.5px solid var(--ink); box-shadow:0 2px 0 var(--shadow); }
.ringlogo i:nth-child(1){ background:#ef4a5a; left:22px; top:0; }
.ringlogo i:nth-child(2){ background:#3d8bdf; right:0; top:22px; }
.ringlogo i:nth-child(3){ background:#57c268; left:22px; bottom:0; }
.ringlogo i:nth-child(4){ background:#f6c445; left:0; top:22px; }
.tagline{ font-family:var(--font-d); font-weight:600; color:var(--ink); font-size:15px; margin:4px 0 6px; letter-spacing:1.5px; }
.diffrow{ display:flex; align-items:center; gap:6px; margin-top:14px; }
.diff-lbl{ font-family:var(--font-u); font-weight:800; font-size:9px; letter-spacing:.11em; text-transform:uppercase; color:var(--ink-soft); }
.mk{ font-family:var(--font-d); font-weight:600; cursor:pointer; color:var(--ink);
  background:var(--card); border:2.5px solid var(--ink); border-radius:14px;
  box-shadow:0 3px 0 var(--shadow); transition:transform .08s var(--calm), box-shadow .08s var(--calm), opacity .18s var(--calm);
  touch-action:manipulation; padding:0 16px; height:46px; font-size:15px; }
.mk:active{ transform:translateY(3px); box-shadow:0 0 0 var(--shadow); }
.mk.accent{ background:var(--accent); }
.diffbtn{ flex:1; height:34px; font-size:13px; padding:0 6px; }
.row{ display:flex; gap:9px; margin-top:14px; }
.row .mk{ flex:1; }
.credit{ margin-top:16px; font-size:11.5px; }
.credit a, .startcredit{ color:var(--ink-soft); text-decoration:none; border-bottom:1.5px solid rgba(44,39,51,.3); }
.statcard{ text-align:left; margin:8px 0 2px; padding:11px 15px; background:var(--paper2);
  border:2.5px solid var(--ink); border-radius:15px; box-shadow:0 3px 0 var(--shadow); }
.statcard .sr{ display:flex; justify-content:space-between; align-items:baseline; gap:10px;
  font-weight:700; font-size:13px; padding:5px 0; border-bottom:1.5px dashed rgba(44,39,51,.14); }
.statcard .sr:last-child{ border-bottom:0; }
.statcard .sr .sk{ color:var(--ink-soft); }
.statcard .sr .sv{ font-family:var(--font-d); font-weight:700; color:var(--ink); font-size:15px; }
.statcard .sr.hero .sv{ color:#b9791a; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="chip hearts">♥<b id="hpN">30</b></div>
  <div class="chip wave"><small>Wave</small><b id="waveN">1</b></div>
</div>

<div class="gear" id="gear">⚙</div>
<div class="drawer" id="drawer">
  <h3>Settings <span class="x" id="drawerClose">×</span></h3>
  <div class="srow"><label>Difficulty</label><div class="pills">
    <button class="pill" data-diff="gentle">Gentle</button>
    <button class="pill" data-diff="standard">Standard</button>
    <button class="pill" data-diff="fierce">Fierce</button></div></div>
  <div class="srow"><label>Match</label><div class="pills"><button class="pill" id="pM3">3</button><button class="pill" id="pM4">4</button></div></div>
  <div class="srow"><label>Sound</label><div class="pills"><button class="pill" id="pSndOn">On</button><button class="pill" id="pSndOff">Off</button></div></div>
  <div class="srow"><label>Swap CD</label><input type="range" id="sCd" min="0.8" max="3.0" step="0.1"><span class="val" id="vCd">1.6</span></div>
</div>

<!-- start -->
<div class="veil show" id="vStart">
  <div class="panel">
    <div class="ringlogo"><i></i><i></i><i></i><i></i></div>
    <h1>Whorl</h1>
    <p class="tagline">swap · match · whorl</p>
    <div class="diffrow" id="diffRow">
      <span class="diff-lbl">Difficulty</span>
      <button class="mk diffbtn" data-diff="gentle">Gentle</button>
      <button class="mk diffbtn" data-diff="standard">Standard</button>
      <button class="mk diffbtn" data-diff="fierce">Fierce</button>
    </div>
    <div class="row"><button class="mk accent" id="btnBegin" style="flex:1;height:54px;font-size:19px;">Play</button></div>
    <div class="credit"><a class="startcredit" href="/" title="İzge Bayyurt">İzge Bayyurt ↗</a></div>
  </div>
</div>

<!-- game over -->
<div class="veil" id="vOver">
  <div class="panel">
    <h2 id="ovTitle">The wall breaks</h2>
    <p id="ovMsg" style="margin:8px 0 6px;">The colour fades — for now.</p>
    <div class="statcard" id="ovStats"></div>
    <div class="row"><button class="mk accent" id="btnRetry" style="flex:1;height:50px;font-size:17px;">Run it back</button></div>
    <div class="credit"><a href="/" title="İzge Bayyurt">İzge Bayyurt ↗</a></div>
  </div>
</div>

<script>
"use strict";
(function(){
// ================= constants =================
const PRIMS = ['R','Y','B'];
const SECS  = ['O','G','P'];
const HEX = { R:'#ef4a5a', Y:'#f6c445', B:'#3d8bdf', O:'#f2913d', G:'#57c268', P:'#9b62d6' };
const INK = '#2c2733', PAPER='#f0e6cf', PAPER2='#fbf5e6', ACCENT='#ffd15c';
const HUSK='#c9c1b4', HUSK_BRUTE='#b7ad9a', HUSK_ELITE='#8f8677';
const DECOMP = { R:['R'], Y:['Y'], B:['B'], O:['R','Y'], G:['Y','B'], P:['R','B'] };
const MIX = { RY:'O', YR:'O', RB:'P', BR:'P', YB:'G', BY:'G' };
function isSec(c){ return c==='O'||c==='G'||c==='P'; }
// spell forms per colour — el drives the reaction system; payloads applied after damage
const SPELLS = {
  R:{ speed:520, r:12, el:'R', burn:2 },
  Y:{ speed:660, r:11, el:'Y', dmgMul:1.2 },
  B:{ speed:430, r:14, el:'B', chill:true },
  O:{ speed:340, r:16, el:'O', aoe:70 },
  P:{ speed:300, r:13, el:'P', pierce:true },
  G:{ speed:300, r:14, el:'G', pool:true, poison:2 }
};
const LAD_PRIM = {3:8,4:18,5:32}, LAD_SEC = {3:22,4:44,5:80};
function ladder(colour,len){ const t=Math.min(5,len); return (isSec(colour)?LAD_SEC:LAD_PRIM)[t]; }

// ---- real reaction/balance constants (from the shipping game) ----
const WARD_MULT = 2;                 // matching-colour ward hit ×2, off-colour ×0.5
const SHATTER_FROZEN = 2.5, SHATTER_CHILL = 1.75;
const BRITTLE_MUL = 1.5, CONSUME_PER = 2, BLOOM_PER = 2;
const POISON_CAP = 12;
const FREEZE_SEC = 2.6, FRIMM_SEC = 0.9, BURN_TICK = 0.8, POISON_TICK = 0.9;
const WHORL_DMG = 240;               // heavy true-damage hit to every enemy (~3× a len-5 secondary)
// global balance knob — one lever over the wave tables (waves 1-8 survivable with basic play)
const BAL = { hp:0.90, dmg:0.88, count:1.0, speedBeats:5.4 };

// ---------- hexagon radius 3 (flat-top cells → vertical columns for gravity) ----------
const RAD=3;
const CELLS_QR=[]; { for(let q=-RAD;q<=RAD;q++){ const r1=Math.max(-RAD,-q-RAD), r2=Math.min(RAD,-q+RAD);
  for(let r=r1;r<=r2;r++) CELLS_QR.push([q,r]); } }               // 37 cells
const N = CELLS_QR.length;
const KEY = (q,r)=>q+','+r;
const IDX = {}; CELLS_QR.forEach(([q,r],i)=>IDX[KEY(q,r)]=i);
const NDELTA=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const NEIGH = CELLS_QR.map(([q,r])=> NDELTA.map(([dq,dr])=>IDX[KEY(q+dq,r+dr)]).filter(v=>v!==undefined));
const COLUMNS = (()=>{ const m={}; CELLS_QR.forEach(([q,r],i)=>(m[q]=m[q]||[]).push(i));
  return Object.keys(m).map(q=>+q).sort((a,b)=>a-b).map(q=>m[q].sort((i,j)=>CELLS_QR[i][1]-CELLS_QR[j][1])); })();
const LINES = (()=>{ function build(keyf,ordf){ const m={};
    for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i]; const k=keyf(q,r); (m[k]=m[k]||[]).push([ordf(q,r),i]); }
    return Object.values(m).map(a=>a.sort((x,y)=>x[0]-y[0]).map(x=>x[1])).filter(l=>l.length>=3); }
  return { A:build((q)=>q,(q,r)=>r), B:build((q,r)=>r,(q)=>q), C:build((q,r)=>q+r,(q)=>q) }; })();
const ALL_LINES = [...LINES.A,...LINES.B,...LINES.C];

// ================= persisted settings =================
function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
let CD_DUR = parseFloat(lsGet('wh_cd','1.6')); if(!(CD_DUR>=0.8&&CD_DUR<=3)) CD_DUR=1.6;
let MIN_MATCH = parseInt(lsGet('wh_minmatch','3'),10); if(MIN_MATCH!==3&&MIN_MATCH!==4) MIN_MATCH=3;
let MUTED = lsGet('wh_mute','0')==='1';
const FORGE_COUNT = 2, POPS = 5;    // fixed forge count + pops-per-bar (retired sliders)

// difficulty (persisted wh_diff)
const DIFF = { gentle:{hp:0.70,count:0.75,dmg:0.70}, standard:{hp:1.00,count:1.00,dmg:1.00}, fierce:{hp:1.20,count:1.15,dmg:1.20} };
const DIFF_LABEL = { gentle:'Gentle', standard:'Standard', fierce:'Fierce' };
let difficulty = 'standard';
{ const wd=lsGet('wh_diff',null); if(wd&&DIFF[wd]) difficulty=wd; }
function diffMul(){ return DIFF[difficulty]||DIFF.standard; }

// ================= canvas / layout =================
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W=390,H=800,DPR=1;
let size=26, ballRad=20, COL_DX=39, ROW_DY=45, latCX=195, latCY=584, wallY=360, topY=430, fieldTop=96;
let sigilX=195, sigilY=372, sigilR=26;
let barX=[10,26,42], barW=12, barTop=512, barH=144;
function layout(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const margin=16;
  size=Math.max(20,Math.min(26,(W-2*margin-14)/10.58));
  ballRad=Math.max(18,Math.min(21,size*0.78));
  COL_DX=1.5*size; ROW_DY=Math.sqrt(3)*size;
  latCX=W/2;
  const halfH=3*ROW_DY;
  latCY=H-54-ballRad-halfH;
  topY=latCY-halfH-ballRad;
  wallY=topY-64;
  fieldTop=Math.max(92, wallY-Math.min(300, H*0.42));
  sigilR=Math.min(27,ballRad+6);
  sigilX=W/2; sigilY=Math.max(wallY+14, (wallY+topY)/2);
  barW=10;
  const gap=4, bmargin=8;
  barX=[bmargin, bmargin+barW+gap, bmargin+2*(barW+gap)];
  barTop=latCY-72; barH=150;
  for(let i=0;i<N;i++){ const [q,r]=CELLS_QR[i];
    cells[i].x=latCX+COL_DX*q; cells[i].y=latCY+ROW_DY*(r+q/2); }
}
window.addEventListener('resize', layout);

const off=document.createElement('canvas'), octx=off.getContext('2d');
function sizeOff(){ off.width=Math.round(W*0.55); off.height=Math.round(H*0.55); }

// ================= state =================
const cells = CELLS_QR.map(([q,r])=>({q,r,x:0,y:0,c:'R',oy:0,shake:0,born:0,forgeFx:0,fresh:false}));
let meters={O:0,G:0,P:0}, whorlReady=false;
let enemies=[], spells=[], pools=[], puffs=[], dmgPops=[], shocks=[], castGoo=[], sparks=[], banners=[];
let remixFx=null, chainLabel=null;
let cooldown=0, selIdx=-1;
let resolver=null, lastResolve=null;
let stats={ matches:0, doubles:0, forged:0, secPopped:0, whorls:0, maxChain:0, casts:0, kills:0, swaps:0, remixes:0, waves:0, bestCast:null };

// --- game / run state ---
let started=false, paused=false;
let hp=30, maxhp=30, wave=0, over=false;
let beatT=0, beatMax=5.0;
let spawnQueue=[], nextWaveSpec=null, waveClearT=-1;
let coachSeen = new Set(lsGet('wh_coach','').split(',').filter(Boolean).map(Number));
let coach=null;                 // {idx,text,t}
let idleT=0, sawDoubleReady=false;

function randPrim(){ return PRIMS[(Math.random()*3)|0]; }

// ================= match finding =================
function findMatches(){
  const out=[];
  for(const line of ALL_LINES){ let k=0;
    while(k<line.length){ const c=cells[line[k]].c;
      if(c==null){ k++; continue; }
      let j=k+1; while(j<line.length && cells[line[j]].c===c) j++;
      if(j-k>=MIN_MATCH) out.push({ cells:line.slice(k,j), colour:c, len:j-k }); k=j; } }
  return out;
}
function hasInstantMatch(){ return findMatches().length>0; }
function hasMatchingMove(){
  for(let a=0;a<N;a++){ for(const b of NEIGH[a]){ if(b<=a) continue;
    const ca=cells[a].c, cb=cells[b].c; if(ca==null||cb==null||ca===cb) continue;
    cells[a].c=cb; cells[b].c=ca;
    const hit=findMatches().some(m=>m.cells.includes(a)||m.cells.includes(b));
    cells[a].c=ca; cells[b].c=cb; if(hit) return true; } }
  return false;
}

// ================= board generation =================
function genNoMatch(){
  for(const cell of cells){ cell.c=randPrim(); cell.oy=0; cell.shake=0; cell.forgeFx=0; cell.fresh=false; }
  let guard=0;
  while(guard++<400 && hasInstantMatch()){ for(const m of findMatches()) for(const ci of m.cells) cells[ci].c=randPrim(); }
}
function rerollBoard(){ resolver=null; lastResolve=null; genNoMatch(); ensurePlayable(true); }

// ================= remix (deadlock rescue) =================
function remixArrange(){
  const bag=cells.map(c=>c.c);
  for(let attempt=0; attempt<60; attempt++){
    for(let i=bag.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
    for(let i=0;i<N;i++) cells[i].c=bag[i];
    let g=0;
    while(g++<400 && hasInstantMatch()){
      const m=findMatches()[0]; const ci=m.cells[(Math.random()*m.cells.length)|0];
      let dj=-1; for(let t=0;t<60;t++){ const j=(Math.random()*N)|0; if(cells[j].c!==cells[ci].c){ dj=j; break; } }
      if(dj<0) break; const tmp=cells[ci].c; cells[ci].c=cells[dj].c; cells[dj].c=tmp; }
    if(!hasInstantMatch() && hasMatchingMove()) return true;
    for(let i=0;i<N;i++) bag[i]=cells[i].c;
  }
  return false;
}
function remix(force){
  if(!force && hasMatchingMove()) return false;
  const before=cells.map(c=>c.c);
  const ok=remixArrange();
  if(!ok){ let g=0; do{ genNoMatch(); }while(!hasMatchingMove() && ++g<400); }
  remixFx={ t0:performance.now(), dur:700, from:before.map((c,i)=>({x:cells[i].x,y:cells[i].y,c})) };
  chainLabel={ n:-1, life:1.1, text:'whorled!' };
  for(let i=0;i<N;i++){ cells[i].born=performance.now(); cells[i].oy=0; }
  stats.remixes++;
  return true;
}

// ================= swap =================
function adjacent(a,b){ return NEIGH[a].includes(b); }

  if(!adjacent(a,b)) return {type:'blocked', reason:'nonadjacent'};
  const ca=cells[a].c, cb=cells[b].c;
  if(ca==null||cb==null) return {type:'blocked', reason:'empty'};
  if(ca===cb) return {type:'blocked', reason:'same-colour'};
  if(resolver){ refuse(a,b); return {type:'blocked', reason:'resolving'}; }
  cells[a].c=cb; cells[b].c=ca;
  const trig=findMatches().filter(m=>m.cells.includes(a)||m.cells.includes(b));
  if(trig.length>0){
    animSwap(a,b); const info=startResolve({a,b}); stats.swaps++; markSwap(); vib(24); sCast();
    return {type:'match', matches:info.firstMatches, forged:info.forgedPlanned, surged:info.surged};
  }
  if(cooldown>0){ cells[a].c=ca; cells[b].c=cb; refuse(a,b); vib([10,24,10]); sFizzle(); return {type:'blocked', reason:'cooldown'}; }
  animSwap(a,b); cooldown=CD_DUR; stats.swaps++; markSwap(); vib(16); ensurePlayable();

}
function markSwap(){ idleT=0; }
function animSwap(a,b){ cells[a].shake=Math.max(cells[a].shake,0.35); cells[b].shake=Math.max(cells[b].shake,0.35);
  cells[a].born=performance.now(); cells[b].born=performance.now(); }
function refuse(a,b){ cells[a].shake=0.5; cells[b].shake=0.5; }

// ================= resolution & casting (PACED) =================
const SQUISH_DUR=0.25, FALL_MIN=0.20, FALL_MAX=0.30, BEAT_DUR=0.15, REFILL_DROP=0.26;
const CELL_LINES=(()=>{ const m=Array.from({length:N},()=>[]);
  for(const l of ALL_LINES) for(const ci of l) m[ci].push(l); return m; })();
function runThrough(line,ci){ const pos=line.indexOf(ci); if(pos<0) return 0;
  const c=cells[ci].c; if(c==null) return 0; let n=1;

function createsMatchAt(ci){ for(const line of CELL_LINES[ci]){ if(runThrough(line,ci)>=MIN_MATCH) return true; } return false; }
function pickRefillColour(ci){
  const ok=[]; for(const c of PRIMS){ cells[ci].c=c; if(!createsMatchAt(ci)) ok.push(c); }
  if(ok.length){ cells[ci].c=ok[(Math.random()*ok.length)|0]; return {c:cells[ci].c, biased:true}; }
  cells[ci].c=randPrim(); return {c:cells[ci].c, biased:false};
}
function clearRound(matches, depth, swapInfo){
  const mult=Math.pow(1.15, depth-1);

  for(const m of matches){ castProjectile(m, ladder(m.colour,m.len)*mult, mult);
    stats.matches++; stats.casts++; for(const ci of m.cells) clearSet.add(ci); }
  let forgeThis=null, surged=false;
  if(depth===1 && swapInfo){
    const trig=matches.filter(m=>m.cells.includes(swapInfo.a)||m.cells.includes(swapInfo.b));
    const tcol=[...new Set(trig.map(m=>m.colour))];
    if(tcol.length>=2){
      stats.doubles++; coachHit('double');
      const prim=new Set(); for(const c of tcol) for(const p of DECOMP[c]) prim.add(p);
      if(prim.has('R')&&prim.has('Y')&&prim.has('B')){ surgeMeters(); surged=true; }
      else { const ps=tcol.filter(c=>PRIMS.includes(c)); if(ps.length>=2) forgeThis={colour:MIX[ps[0]+ps[1]], count:FORGE_COUNT}; }
    }
  }
  for(const ci of clearSet){ const c=cells[ci].c; if(c==null) continue;
    if(isSec(c)){ addMeter(c); stats.secPopped++; } spawnClearPuffs(cells[ci].x,cells[ci].y,c); cells[ci].c=null; }

}
function startResolve(swapInfo){

  return { firstMatches:matches.map(m=>({cells:m.cells.slice(),colour:m.colour,len:m.len})),

}
function stepResolver(dt){

    else if(cells.some(c=>c.c==null)){

function compactColumns(){

    const nEmpty=col.length-survivors.length;
    for(let k=0;k<col.length;k++){ const ci=col[k];
      if(k<nEmpty){ cells[ci].c=null; cells[ci].fresh=false; cells[ci].oy=0; }
      else { const s=survivors[k-nEmpty]; cells[ci].c=s.c; cells[ci].fresh=s.fresh; cells[ci].oy=(s.fromK-k)*ROW_DY; maxDrop=Math.max(maxDrop,k-s.fromK); } }

function refillEmpties(forge, swapInfo){
  const newSlots=cells.map((c,i)=>c.c==null?i:-1).filter(i=>i>=0);
  let forgedPlaced=0;
  if(forge && forge.count>0 && swapInfo){
    const sx=(cells[swapInfo.a].x+cells[swapInfo.b].x)/2, sy=(cells[swapInfo.a].y+cells[swapInfo.b].y)/2;
    newSlots.sort((i,j)=>((cells[i].x-sx)**2+(cells[i].y-sy)**2)-((cells[j].x-sx)**2+(cells[j].y-sy)**2));
    for(let k=0;k<forge.count && k<newSlots.length;k++){
      cells[newSlots[k]].c=forge.colour; cells[newSlots[k]].fresh=false; cells[newSlots[k]].forgeFx=performance.now(); forgedPlaced++; }

function centroidCells(arr){ let sx=0,sy=0; for(const i of arr){ sx+=cells[i].x; sy+=cells[i].y; }

function nearestEnemy(o){ let best=null,bd=1e9; for(const e of enemies){ if(e.dead) continue;

  for(const ci of m.cells) castGoo.push({x:cells[ci].x,y:cells[ci].y,tx:o.x,ty:o.y,r:ballRad*0.7,col:m.colour,t:0,dur:0.24});

// ================= reactions / status (real system) =================
function reactBanner(txt,col){ banners.push({txt, col, t:performance.now(), life:1.15}); }
function applyReactions(e, amt, el, opts){

  if(e.brittle){ e.brittle=false; amt=Math.max(1,Math.round(amt*BRITTLE_MUL)); e._reactGold=true; }
  const isTrue=!!opts.trueDamage, isFire=(el==='O'||el==='R'), isIce=(el==='B');
  if(isTrue){
    const tot=(e.burn>0?1:0)+(e.poison||0)+(e.freeze>0?1:0)+(e.chill?1:0);
    if(tot>0){ amt+=tot*CONSUME_PER; e.burn=0; e.poison=0; e.freeze=0; e.chill=false; e.psnPreserved=false;
      reactBanner('CONSUME', INK); e._reactGold=true; e._reactBanner=true; }
    return amt;
  }

    if(e.freeze>0 || e.chill){ const trulyFrozen=e.freeze>0; e.freeze=0; e.chill=false;

  }

// the single damage entry point — mirrors the shipping applyDmg (ward · armored · reactions · death)

  if(!opts.quiet) for(let k=0;k<6;k++) puffs.push(mkPuff(e.x,e.y,(el&&HEX[el])||e.col));

// ================= enemies / waves =================
function eliteCadence(w, diff){
  diff = diff || difficulty;

  if(w<8) return false;
  if(w<=16) return (w%4)===0;
  if(w<=24) return (w%3)===0;
  return (w%2)===0;
}
function rollWave(w){

  let count=Math.max(1, Math.min(8, Math.ceil((2+Math.ceil(0.6*w))*D.count*fCount*BAL.count)) - (elite?2:0));
  const wardChance=Math.min(0.75, 0.05+w*0.10);
  const baseDmg=Math.max(1, Math.round((2+Math.ceil(w/4))*D.dmg*fDmg*BAL.dmg));
  const total=count+(elite?1:0);
  const wantHealer=w>=4 && Math.random()<0.35;

    const isElite=elite&&k===0, isHealer=!isElite&&wantHealer&&k===total-1;
    const brute=!isElite&&!isHealer&&w>=2&&Math.random()<0.14+w*0.02;
    let armored=false, leech=false;
    if(!isElite&&!isHealer&&!brute){ const roll=Math.random();

let last=performance.now(), rafRunning=false;

function update(dt){
  const now=performance.now();
  cooldown=Math.max(0,cooldown-dt);
  stepResolver(dt);
  for(const cell of cells){ cell.oy+=(0-cell.oy)*Math.min(1,dt*13); if(Math.abs(cell.oy)<0.3) cell.oy=0; cell.shake=Math.max(0,cell.shake-dt*2.4); }
  for(const g of castGoo){ g.t+=dt; g.x+=(g.tx-g.x)*Math.min(1,dt*15); g.y+=(g.ty-g.y)*Math.min(1,dt*15); g.r+=(ballRad*0.5-g.r)*Math.min(1,dt*10); }
  castGoo=castGoo.filter(g=>g.t<g.dur);
  // spells
  for(const s of spells){ s.t+=dt; s.life-=dt; s.x+=s.vx*dt; s.y+=s.vy*dt;
    s.trail.push({x:s.x,y:s.y}); if(s.trail.length>10) s.trail.shift();
    for(const e of enemies){ if(e.dead) continue;
      if(Math.hypot(e.x-s.x,e.y-s.y)<e.r+s.r*0.7){
        applyHit(e, s.dmg, s.el, {reactable:true}); applyPayload(s, e);

          for(let k=0;k<8;k++){ const p=mkPuff(s.x,s.y,HEX.O); p.r+=2; puffs.push(p); } }
        if(s.pool){ pools.push({x:s.x,y:s.y,r:26,life:3.0,max:3.0,tick:0}); }
        if(!s.pierce){ s.life=0; } else { s.dmg=Math.round(s.dmg*0.72); }
        break;
      }
    }
    if(s.pool && s.life<=0.02 && !s._pooled){ s._pooled=true; pools.push({x:s.x,y:s.y,r:26,life:3.0,max:3.0,tick:0}); }
    if(s.y<-40||s.x<-40||s.x>W+40||s.y>H+40) s.life=0;
  }
  spells=spells.filter(s=>s.life>0);
  for(const pl of pools){ pl.life-=dt; pl.tick-=dt;
    if(pl.tick<=0){ pl.tick=0.5; for(const e of enemies){ if(!e.dead && Math.hypot(e.x-pl.x,e.y-pl.y)<pl.r){ e.poison=Math.min(POISON_CAP,e.poison+1); } } } }
  pools=pools.filter(p=>p.life>0);

  if(started && !over && !paused){
    pumpSpawns(dt);
    for(const e of enemies){ stepEnemyMove(e, dt); if(over) break; }
    enemies=enemies.filter(e=>!e.dead||(e.death+=dt)<0.4);
    beatT+=dt; if(beatT>=beatMax) beatT-=beatMax;
    // wave clear → advance (dt-based countdown so WH.step drives it deterministically)
    if(!over && enemies.length===0 && spawnQueue.length===0){
      if(waveClearT<0){ waveClearT=1.1; stats.waves++; if(!nextWaveSpec) nextWaveSpec=rollWave(wave+1); }  // pre-roll: preview === spawn
      else { waveClearT-=dt; if(waveClearT<=0){ waveClearT=-1; nextWave(); } }
    } else waveClearT=-1;
    // coach: first idle moment
    idleT+=dt; if(stats.swaps===0 && idleT>2.4) coachHit('swap-idle');
  }
  // particles
  for(const p of puffs){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.1,dt); }
  puffs=puffs.filter(p=>p.life>0);
  for(const p of sparks){ p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.2,dt); p.vy*=Math.pow(0.2,dt); }
  sparks=sparks.filter(p=>p.life>0);
  for(const d of dmgPops){ d.life-=dt; d.y-=34*dt; } dmgPops=dmgPops.filter(d=>d.life>0);
  shocks=shocks.filter(s=>now-s.t0<s.dur);
  for(const b of banners){ b.life-=dt; } banners=banners.filter(b=>b.life>0);
  if(remixFx && now-remixFx.t0>=remixFx.dur) remixFx=null;
  if(chainLabel){ chainLabel.life-=dt; if(chainLabel.life<=0) chainLabel=null; }
  if(coach && now-coach.t>4200) coach=null;
}

  ctx.beginPath(); ctx.arc(s.x-s.r*0.3,s.y-s.r*0.3,s.r*0.3,0,6.28); ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill(); } }
function drawPuffs(){ for(const p of puffs){ const a=Math.max(0,p.life/p.max); ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,p.r*a),0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; }
  for(const p of sparks){ const a=Math.max(0,p.life/p.max); ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,p.r*a),0,6.28); ctx.fillStyle=p.col; ctx.globalAlpha=a; ctx.fill(); ctx.globalAlpha=1; } }
function drawDmgPops(){ for(const d of dmgPops){ const a=Math.max(0,d.life/0.9); ctx.save(); ctx.globalAlpha=a; ctx.font='700 18px Fredoka, sans-serif'; ctx.textAlign='center';
  const label=d.val===0?'clank':d.val; ctx.lineWidth=3.5; ctx.strokeStyle=PAPER; ctx.strokeText(label,d.x,d.y); ctx.fillStyle=d.col; ctx.fillText(label,d.x,d.y); ctx.restore(); } }
function drawBanners(now){ let yoff=0; for(const b of banners){ const a=Math.max(0,b.life/1.15); ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
  ctx.font=(b.big?'700 26px':'700 20px')+' Fredoka, sans-serif'; const y=(b.big?H*0.30:wallY-12)-yoff-(1-a)*8;
  ctx.lineWidth=4; ctx.strokeStyle=PAPER; ctx.strokeText(b.txt,W/2,y); ctx.fillStyle=b.col; ctx.fillText(b.txt,W/2,y); ctx.restore(); if(!b.big) yoff+=22; } }
function drawChain(now){ if(!chainLabel) return; const a=Math.max(0,chainLabel.life/1.1); const txt=chainLabel.text||('chain ×'+chainLabel.n);
  ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='700 20px Fredoka, sans-serif'; const y=topY-24-(1-a)*10;
  ctx.lineWidth=4; ctx.strokeStyle=PAPER; ctx.strokeText(txt,W/2,y); ctx.fillStyle=chainLabel.text?HEX.P:ACCENT; ctx.fillText(txt,W/2,y); ctx.restore(); }
function drawCoach(now){ if(!coach) return; const a=Math.min(1,(now-coach.t)/220)*Math.min(1,(4200-(now-coach.t))/500);
  ctx.save(); ctx.globalAlpha=Math.max(0,a); ctx.textAlign='center'; ctx.font='700 14px Nunito, sans-serif';
  const y=topY-2; const w=ctx.measureText(coach.text).width+26;
  roundRect(W/2-w/2, y-19, w, 26, 13); ctx.fillStyle=ACCENT; ctx.strokeStyle=INK; ctx.lineWidth=2.5; ctx.fill(); ctx.stroke();
  ctx.fillStyle=INK; ctx.fillText(coach.text, W/2, y-1); ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function ease(t){ t=Math.max(0,Math.min(1,t)); return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }

// ================= input =================
function getPos(ev){ const rect=canvas.getBoundingClientRect(); let cx,cy;
  if(ev.touches&&ev.touches.length){ cx=ev.touches[0].clientX; cy=ev.touches[0].clientY; }
  else if(ev.changedTouches&&ev.changedTouches.length){ cx=ev.changedTouches[0].clientX; cy=ev.changedTouches[0].clientY; }
  else { cx=ev.clientX; cy=ev.clientY; }
  return {x:cx-rect.left, y:cy-rect.top}; }
function ballAt(x,y){ let best=-1,bd=ballRad*1.25; for(let i=0;i<N;i++){ const b=cells[i]; if(b.c==null) continue;
  const d=Math.hypot(x-b.x,y-b.y); if(d<bd){bd=d;best=i;} } return best; }
let dragStart=-1, downPos={x:0,y:0}, movedFar=false;
function onDown(ev){ if(!started||over) return; const p=getPos(ev);
  if(whorlReady && Math.hypot(p.x-sigilX,p.y-sigilY)<=sigilR+6){ ev.preventDefault(); tapWhorl(); dragStart=-1; return; }
  const i=ballAt(p.x,p.y); if(i<0){ return; } ev.preventDefault(); dragStart=i; downPos=p; movedFar=false; }
function onMove(ev){ if(dragStart<0) return; const p=getPos(ev); ev.preventDefault();
  if(!movedFar && Math.hypot(p.x-downPos.x,p.y-downPos.y)>ballRad*0.5) movedFar=true; }
function onUp(ev){ if(dragStart<0) return; ev.preventDefault(); const p=getPos(ev); const start=dragStart; dragStart=-1;
  if(movedFar){ let best=-1,bd=1e9; for(const ni of NEIGH[start]){ const n=cells[ni]; const d=(n.x-p.x)**2+(n.y-p.y)**2; if(d<bd){bd=d;best=ni;} }
    if(best>=0){ swapCore(start,best); selIdx=-1; return; } }
  if(selIdx<0){ selIdx=start; } else if(selIdx===start){ selIdx=-1; } else if(adjacent(selIdx,start)){ swapCore(selIdx,start); selIdx=-1; } else { selIdx=start; }
}
canvas.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});

// ================= settings / start / gameover wiring =================
const gear=document.getElementById('gear'), drawer=document.getElementById('drawer');
gear.addEventListener('click', ()=> drawer.classList.toggle('open'));
document.getElementById('drawerClose').addEventListener('click', ()=> drawer.classList.remove('open'));
// difficulty pills (settings) + diff buttons (start)
function litDiff(){
  document.querySelectorAll('#drawer .pill[data-diff]').forEach(b=>b.classList.toggle('on', b.getAttribute('data-diff')===difficulty));
  document.querySelectorAll('#diffRow .diffbtn').forEach(b=>b.classList.toggle('accent', b.getAttribute('data-diff')===difficulty));
}
function setDiff(d){ if(!DIFF[d]) return; difficulty=d; lsSet('wh_diff',d); litDiff(); beep(520,.05,'sine',.03); }
document.querySelectorAll('#drawer .pill[data-diff]').forEach(b=> b.addEventListener('click', ()=> setDiff(b.getAttribute('data-diff'))));
document.querySelectorAll('#diffRow .diffbtn').forEach(b=> b.addEventListener('click', ()=> setDiff(b.getAttribute('data-diff'))));
// min-match pills
const pM3=document.getElementById('pM3'), pM4=document.getElementById('pM4');
function setMinMatch(n){ MIN_MATCH=(n===4||n==='4')?4:3; lsSet('wh_minmatch',MIN_MATCH); pM3.classList.toggle('on',MIN_MATCH===3); pM4.classList.toggle('on',MIN_MATCH===4); }
pM3.addEventListener('click', ()=>setMinMatch(3)); pM4.addEventListener('click', ()=>setMinMatch(4));
// sound pills
const pSndOn=document.getElementById('pSndOn'), pSndOff=document.getElementById('pSndOff');
function setMuted(m){ MUTED=m; lsSet('wh_mute', m?'1':'0'); pSndOn.classList.toggle('on',!MUTED); pSndOff.classList.toggle('on',MUTED); }
pSndOn.addEventListener('click', ()=>setMuted(false)); pSndOff.addEventListener('click', ()=>setMuted(true));
// cooldown slider
const sCd=document.getElementById('sCd'), vCd=document.getElementById('vCd');
sCd.addEventListener('input', ()=>{ CD_DUR=parseFloat(sCd.value); vCd.textContent=CD_DUR.toFixed(1); lsSet('wh_cd',CD_DUR); });
function syncSettingUI(){ pM3.classList.toggle('on',MIN_MATCH===3); pM4.classList.toggle('on',MIN_MATCH===4);
  pSndOn.classList.toggle('on',!MUTED); pSndOff.classList.toggle('on',MUTED); sCd.value=CD_DUR; vCd.textContent=CD_DUR.toFixed(1); litDiff(); }
document.getElementById('btnBegin').addEventListener('click', ()=> startGame());
document.getElementById('btnRetry').addEventListener('click', ()=> startGame());

// ================= debug handle =================
window.WH = {
  // board
  get board(){ return cells.map((b,i)=>({i,q:b.q,r:b.r,c:b.c,x:b.x,y:b.y})); },
  get cells(){ return this.board; },
  colours(){ return cells.map(c=>c.c); },
  neighbors(i){ return NEIGH[i]?NEIGH[i].slice():[]; },
  setBall(i,colour){ if(cells[i]){ cells[i].c=colour; cells[i].oy=0; cells[i].fresh=false; } },
  swap(a,b){ return swapCore(a,b); },
  findMatches(){ return findMatches().map(m=>({cells:m.cells.slice(),colour:m.colour,len:m.len})); },
  hasMatchingMove(){ return hasMatchingMove(); },
  hasInstantMatch(){ return hasInstantMatch(); },
  remix(){ return remix(true); },
  rerollBoard(){ rerollBoard(); },
  get resolving(){ return !!resolver; },
  get resolverState(){ return resolver?{phase:resolver.phase,t:resolver.t,depth:resolver.depth}:null; },
  get lastResolve(){ return lastResolve?Object.assign({},lastResolve):null; },
  get minMatch(){ return MIN_MATCH; },
  setMinMatch(n){ setMinMatch(n); },
  // meters / whorl
  get meters(){ return {O:meters.O,G:meters.G,P:meters.P}; },
  get whorlReady(){ return whorlReady; },
  tapWhorl(){ return tapWhorl(); },
  fillBars(){ fillBars(); },
  sigil(){ return {x:sigilX,y:sigilY,r:sigilR}; },
  // cooldown
  get cooldown(){ return cooldown; },
  get cooldownDur(){ return CD_DUR; },
  setCooldown(s){ cooldown=Math.max(0,s); },
  clearCooldown(){ cooldown=0; },
  // enemies / waves
  get enemies(){ return enemies.map(e=>({x:e.x,y:e.y,hp:e.hp,maxhp:e.maxhp,dead:e.dead,ward:e.ward,elite:e.elite,brute:e.brute,armored:e.armored,healer:e.healer,leech:e.leech,burn:e.burn,chill:e.chill,freeze:e.freeze,poison:e.poison,atWall:e.atWall})); },
  get rawEnemies(){ return enemies; },
  get pending(){ return spawnQueue.length; },
  spawnEnemyAt(x,y,hp){ return spawnEnemyAt(x,y,hp); },
  clearEnemies(){ enemies=[]; spawnQueue=[]; },
  rollWave(w){ return rollWave(w); },
  spawnWave(w){ spawnWave(rollWave(w)); },
  nextWave(){ nextWave(); },
  eliteCadence(w,diff){ return eliteCadence(w,diff); },
  get nextWaveSpec(){ return nextWaveSpec?{wave:nextWaveSpec.wave,elite:nextWaveSpec.elite,enemies:nextWaveSpec.enemies.map(e=>Object.assign({},e))}:null; },
  // reactions test harness
  mkFoe(over){ const es={hp:9999,maxhp:9999,ward:null,brute:false,elite:false,armored:false,healer:false,leech:false,dmg:5,seed:0};
    const e=makeEnemy(es, sigilX, fieldTop+30); e.arrived=true; if(over) for(const k in over) e[k]=over[k]; enemies.push(e); return e; },
  applyHit(e,amt,el,opts){ return applyHit(e,amt,el,opts); },
  applyPayload(sp,e){ return applyPayload(sp,e); },
  // lifecycle / state
  startGame(diff){ return startGame(diff); },
  newGame(){ return newGame(); },
  get hp(){ return hp; }, get maxhp(){ return maxhp; },
  set hp(v){ hp=v; updateHud(); },
  get wave(){ return wave; },
  get over(){ return over; },
  get started(){ return started; },
  get difficulty(){ return difficulty; },
  setDifficulty(d){ setDiff(d); },
  gameOver(){ gameOver(); },
  get beatT(){ return +beatT.toFixed(3); }, get beatMax(){ return beatMax; },
  get stats(){ return Object.assign({}, stats); },
  // coach
  get coach(){ return coach?{idx:coach.idx,text:coach.text}:null; },
  get coachSeen(){ return [...coachSeen]; },
  resetCoach(){ coachSeen=new Set(); coach=null; lsSet('wh_coach',''); },
  // geometry
  geo(){ return {W,H,fieldTop,wallY,topY,latCY,sigilX,sigilY,sigilR,ballRad}; },
  // control
  pause(){ paused=true; }, resume(){ paused=false; }, get paused(){ return paused; },
  step(ms){ let t=ms||16; while(t>0){ update(Math.min(16,t)/1000); t-=16; } },
  settle(maxMs){ let t=maxMs||10000; while(resolver && t>0){ update(0.016); t-=16; } return !resolver; }
};

// ================= boot =================
layout(); genNoMatch(); ensurePlayable();
syncSettingUI();
requestAnimationFrame(tick);
})();
</script>
