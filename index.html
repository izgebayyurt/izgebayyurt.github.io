<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>İzge Bayyurt · Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ece9e1;
      color: #2a2730;
      font-family: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    /* Make sections sit above the wireframe canvas */
    main, header, footer, section { position: relative; z-index: 1; }
    /* Clear the sticky header (≈59px) when jumping to an anchor */
    section[id] { scroll-margin-top: 76px; }
    /* selection */
    ::selection { background: rgba(184,92,60,0.25); }
  </style>

  <script src="https://unpkg.com/d3-array@3.2.4/dist/d3-array.min.js"></script>
  <script src="https://unpkg.com/d3-geo@3.1.1/dist/d3-geo.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="v3/wireframe.js"></script>
  <script src="v3/image-slot.js"></script>
  <script src="v3/portrait-data.js"></script>
  <script src="v3/img-data.js"></script>
  <script type="text/babel" src="directions/asteroidz.jsx"></script>
  <script type="text/babel" src="v3/geodesic.jsx"></script>
  <script type="text/babel" src="v3/places-globe.jsx"></script>
  <script type="text/babel" src="v3/rubiks.jsx"></script>
  <script type="text/babel" src="v3/lichess.jsx"></script>
  <script type="text/babel" src="v3/v3-shell.jsx"></script>
  <script type="text/babel" src="v3/v3-sections.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Look locked to the design's default: dusk palette · Newsreader display · wireframe background on.
    function App() {
      const c = V3.usePalette('dusk');
      const fonts = V3.useFonts('newsreader');

      // Apply background to <body> so it flows
      React.useEffect(() => {
        document.body.style.background = c.bg;
        document.body.style.color = c.ink;
        document.body.style.fontFamily = fonts.body;
      }, []);

      // Mount the wireframe 3D background
      React.useEffect(() => {
        const inst = MountWireframe({
          stroke: c.ink.replace('rgb', 'rgba').replace(')', ', 0.3)') ||
                  'rgba(31,28,24,0.3)',
          accent: c.accent + '88',
        });
        return () => inst.destroy();
      }, []);

      return (
        <>
          <V3.Nav c={c} fonts={fonts} />
          <main>
            <V3.Hero c={c} fonts={fonts} />
            <V3.Featured c={c} fonts={fonts} />
            <V3.Research c={c} fonts={fonts} />
            <V3.Interactive c={c} fonts={fonts} />
            <V3.Writing c={c} fonts={fonts} />
            <V3.SideProjects c={c} fonts={fonts} />
            <V3.About c={c} fonts={fonts} />
            <V3.Footer c={c} fonts={fonts} />
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
