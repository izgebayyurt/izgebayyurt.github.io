<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Goop — slide &amp; mix</title>
<style>
  :root{color-scheme:light;}
  html,body{margin:0;height:100%;overflow:hidden;color:#3a2f24;
    background:radial-gradient(120% 120% at 50% 18%, #f6efdd 0%, #efe4cb 62%, #e6d8b9 100%);
    font:14px/1.4 ui-rounded,"Segoe UI",system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;}
  #c{position:fixed;inset:0;display:block;}
  #top{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px;align-items:stretch;}
  .chip{background:#fbf5e6;border:2.5px solid #3a2f24;border-radius:13px;box-shadow:2px 3px 0 #3a2f24;
    font:800 13px ui-rounded,system-ui;color:#3a2f24;padding:8px 12px;display:flex;align-items:center;gap:7px;}
  button.chip{cursor:pointer;transition:transform .06s,box-shadow .06s;}
  button.chip:active{transform:translate(1px,2px);box-shadow:1px 1px 0 #3a2f24;}
  #lvlname{min-width:104px;justify-content:center;text-align:center;}
  .gdot{width:17px;height:17px;border-radius:6px;border:2.5px solid #3a2f24;position:relative;box-shadow:1px 1px 0 rgba(58,47,36,.35);}
  .gdot.done::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font:900 12px system-ui;color:#3a2f24;}
  #hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:5;font-size:12.5px;color:#6a5f4c;
    background:#fbf5e6;border:2px solid #3a2f24;border-radius:12px;padding:7px 14px;box-shadow:2px 2px 0 #3a2f24;max-width:88vw;text-align:center;}
  #hint b{color:#3a2f24;}
  #win{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
  #win .card{background:#fbf5e6;border:3px solid #3a2f24;border-radius:20px;box-shadow:4px 6px 0 #3a2f24;
    padding:26px 34px;display:flex;flex-direction:column;align-items:center;gap:14px;}
  #win h2{margin:0;font:900 30px ui-rounded,system-ui;color:#3a2f24;}
  #win .chip{font-size:16px;padding:11px 20px;}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="top">
    <button class="chip" id="prev" title="Previous level">◀</button>
    <div class="chip" id="lvlname">—</div>
    <button class="chip" id="next" title="Next level">▶</button>
    <button class="chip" id="reset" title="Restart level">↺</button>
    <div class="chip" id="goalrow"></div>
  </div>
  <div id="hint">Swipe / arrow keys to slide. <b>Tap the goop</b> to rinse it clean.</div>
  <div id="win"><div class="card"><h2>Solved! 🎉</h2><button class="chip" id="wnext">Next level ▶</button></div></div>

<script>
(function(){
  'use strict';
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');

  // ---- colour model --------------------------------------------------------
  const NEUTRAL=0,RED=1,YEL=2,BLU=3,ORG=4,GRN=5,PUR=6;
  const HEX={0:'#d8cdb6',1:'#e8564a',2:'#f2b638',3:'#3f92d2',4:'#ee8b34',5:'#56a75c',6:'#8e60c4'};
  const NAME={0:'clear',1:'red',2:'yellow',3:'blue',4:'orange',5:'green',6:'purple'};
  const INK='#3a2f24';
  const SECOND={1:{2:ORG,3:PUR},2:{1:ORG,3:GRN},3:{1:PUR,2:GRN}};
  const isPrimary=x=>x>=1&&x<=3, isSecondary=x=>x>=4;
  function mixContact(cur,p){ if(cur===NEUTRAL)return p; if(cur===p)return cur;
    if(isPrimary(cur))return SECOND[cur][p]; return cur; }  // secondary + primary → reject

  // ---- levels (colours now live IN the walls) ------------------------------
  // '#'plain wall  r/y/b coloured wall  '.'/' 'floor  '@'start
  // R Y B O G P goal(need colour)   1..6 gate(pass only if your colour == index)
  const GCHAR={R:RED,Y:YEL,B:BLU,O:ORG,G:GRN,P:PUR};
  const LEVELS=[
    {name:"First Dip", hint:"Slide into a <b>coloured wall</b> to pick up its paint, then carry it into the matching goal.",
     map:["######","#....#","#....#","#R.@.r","######"]},
    {name:"Fetch", hint:"Pick up the colour, then deliver it.",
     map:["######","#...R#","#@...#","#....r","######"]},
    {name:"The Corner", hint:"Pick up the colour, then deliver it.",
     map:["######","#.R@.#","#....#","r....#","######"]},
    {name:"Long Way", hint:"Pick up the colour, then deliver it.",
     map:["######","#.R..#","#@...#","#....#","###r##"]},
    {name:"Two to Purple", hint:"<b>Red + Blue = Purple.</b> Grab one colour, carry it into the other wall.",
     map:["######","#....#","#...@#","#P...#","b....#","####r#"]},
    {name:"Blend", hint:"Mix two primaries into the colour you need.",
     map:["####r#","#....#","#.@..#","#....#","#.P..b","######"]},
    {name:"Crossing", hint:"Mix two primaries into the colour you need.",
     map:["####b#","#P...#","#..@.#","#....#","r....#","######"]},
    {name:"Mixer", hint:"Mix two primaries into the colour you need.",
     map:["###r##","#....#","#@...#","#....#","#.P..#","###b##"]},
    {name:"The Long Blend", hint:"Mix two primaries into the colour you need.",
     map:["###r##","#....#","#.@..#","b....#","#...P#","######"]},
    {name:"Rinse & Repeat", hint:"Two secondaries can’t coexist — a colour is <b>locked</b> until you <b>tap the goop</b> to rinse it clean.",
     map:["###r###","#G....#","#...P.#","#.....#","y..@..#","###b###"]},
    {name:"Wash Cycle", hint:"Locked on a secondary? Tap the goop to rinse.",
     map:["#####b#","#.....y","#...@.r","#P....#","#.G...#","#######"]},
    {name:"Two Tones", hint:"Locked on a secondary? Tap the goop to rinse.",
     map:["#######","#G@...#","y.....b","#.....#","#.P...r","#######"]},
    {name:"Swap", hint:"Locked on a secondary? Tap the goop to rinse.",
     map:["#######","#.....y","#...P.#","#G@...#","r.....#","#####b#"]},
    {name:"Clean Slate", hint:"Locked on a secondary? Tap the goop to rinse.",
     map:["#####b#","#.....#","#...P.#","#.@...#","r..G..#","##y####"]},
    {name:"Keyhole", hint:"A <b>gate</b> only opens for its own colour. Become it, slide through, deliver.",
     map:["#######","#...B.#","#3..###","#....##","#....@#","#####b#"]},
    {name:"Locked Room", hint:"Match the gate’s colour to pass.",
     map:["#######","b.....#","#...###","#.@..##","#...3B#","#######"]},
    {name:"Passcode", hint:"Match the gate’s colour to pass.",
     map:["#######","#.#.#.b","#...B.#","#...3@#","#..#..#","#######"]},
    {name:"Gatekeeper", hint:"Match the gate’s colour to pass.",
     map:["#######","##3.@.#","#.B.#.#","##....#","#.....#","#b#####"]},
    {name:"The Long Gate", hint:"Match the gate’s colour to pass.",
     map:["#######","#B..@##","#...3.b","#.....#","#..##.#","#######"]},
    {name:"Triptych", hint:"Everything at once — mix, rinse, and deliver every goal.",
     map:["#####y#","#G....#","#.O...#","#P..@.b","##....#","#....##","##r####"]},
    {name:"Three Wishes", hint:"Fill every goal.",
     map:["###y###","##@.O.#","#..P#.#","#.....#","#.....#","r..G..#","##b####"]},
    {name:"Palette", hint:"Fill every goal.",
     map:["#r#####","#..PG.#","#...@.y","#....O#","#.#...#","##....#","####b##"]},
    {name:"Spectrum", hint:"Fill every goal.",
     map:["#######","y....@#","#..##.#","#P....#","#.G...#","#..O..#","####br#"]},
    {name:"Masterpiece", hint:"Fill every goal.",
     map:["#r#####","y....##","#.O...#","b..#..#","#G.@..#","#.P...#","#######"]},
    {name:"Grand Finale", hint:"Fill every goal.",
     map:["###b###","#.O...r","#...G.#","#...#.#","##@...#","#..P..y","#######"]},
  ];

  // ---- board state ---------------------------------------------------------
  let gw,gh,cells,start,goals,player,moves,levelIdx,won;
  function parse(lv){
    const m=lv.map; gh=m.length; gw=Math.max(...m.map(s=>s.length));
    cells=[]; goals=[]; start={r:1,c:1}; let gid=0;
    for(let r=0;r<gh;r++){ const row=[]; const line=m[r];
      for(let c=0;c<gw;c++){ const ch=line[c]||'#'; let cell={type:'floor'};
        if(ch==='#') cell={type:'wall',color:0};
        else if(ch==='@'){ start={r,c}; }
        else if(ch==='r') cell={type:'wall',color:RED};
        else if(ch==='y') cell={type:'wall',color:YEL};
        else if(ch==='b') cell={type:'wall',color:BLU};
        else if('RYBOGP'.includes(ch)){ cell={type:'goal',color:GCHAR[ch],id:gid++,done:false,pop:0}; goals.push(cell); }
        else if('123456'.includes(ch)) cell={type:'gate',color:+ch};
        row.push(cell);
      } cells.push(row);
    }
  }
  const inb=(r,c)=>r>=0&&c>=0&&r<gh&&c<gw;
  const at=(r,c)=>inb(r,c)?cells[r][c]:null;

  // ---- shared resolution (engine + oracle) ---------------------------------
  const DIRS={up:[-1,0],down:[1,0],left:[0,-1],right:[0,1]};
  function passable(r,c,color){ const t=at(r,c); if(!t)return false;
    if(t.type==='floor')return true; if(t.type==='gate')return t.color===color; return false; }
  function resolve(r,c,color,doneSet,act){
    if(act==='clear') return {r,c,color:NEUTRAL,done:doneSet,changed:color!==NEUTRAL,effect:'clear'};
    const [dr,dc]=DIRS[act]; let nr=r,nc=c;
    while(passable(nr+dr,nc+dc,color)){ nr+=dr; nc+=dc; }
    const br=nr+dr, bc=nc+dc, blk=at(br,bc);
    let ncolor=color, ndone=doneSet, effect=null, reject=false;
    if(blk){
      if(blk.type==='wall'&&blk.color){ const mx=mixContact(color,blk.color);
        if(mx===color&&isSecondary(color)) reject=true; ncolor=mx; effect=reject?null:'paint'; }
      else if(blk.type==='goal'){ if(color===blk.color&&!doneSet.has(blk.id)){ ndone=new Set(doneSet); ndone.add(blk.id); effect='goal'; }
        else if(color!==blk.color) reject=true; }
    }
    const moved=(nr!==r||nc!==c);
    return {r:nr,c:nc,color:ncolor,done:ndone,effect,reject,moved,changed:moved||ncolor!==color||ndone!==doneSet,br,bc};
  }
  function doneSet(){ const s=new Set(); goals.forEach(g=>{ if(g.done)s.add(g.id); }); return s; }

  // ---- BFS oracle (clear included) -----------------------------------------
  const ACTS=['up','down','left','right','clear'];
  function solve(){
    const ids=goals.map(g=>g.id); const key=s=>s.r+','+s.c+','+s.color+','+[...s.done].sort().join('|');
    const s0={r:start.r,c:start.c,color:NEUTRAL,done:new Set()}; const q=[{s:s0,path:[]}]; const seen=new Set([key(s0)]);
    while(q.length){ const {s,path}=q.shift(); if(ids.every(id=>s.done.has(id)))return path; if(path.length>60)continue;
      for(const a of ACTS){ const nx=resolve(s.r,s.c,s.color,s.done,a); if(!nx.changed)continue;
        const ns={r:nx.r,c:nx.c,color:nx.color,done:nx.done}; const k=key(ns); if(seen.has(k))continue; seen.add(k); q.push({s:ns,path:path.concat(a)}); } }
    return null;
  }

  // ---- particles -----------------------------------------------------------
  let parts=[];
  function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=i/n*6.283+(x%1);
    parts.push({x,y,vx:Math.cos(a)*spd*(.5+(i%3)*.3),vy:Math.sin(a)*spd*(.5+(i%3)*.3)-spd*.3,
      life:1,color,size:S*(.06+.05*((i*7)%3)/2),g:.12}); } if(parts.length>240)parts=parts.slice(-240); }

  // ---- juice + player ------------------------------------------------------
  let px=0,py=0,tx=0,ty=0,vx=0,vy=0, jelly=0,jvel=0, lastDir=[0,1], rejectShake=0, winT=0, look=[0,0];
  function loadLevel(i){
    levelIdx=(i+LEVELS.length)%LEVELS.length; won=false; winT=0; moves=0; parts=[];
    parse(LEVELS[levelIdx]);
    player={r:start.r,c:start.c,color:NEUTRAL,rcolor:NEUTRAL,moving:false,pending:null};
    layout(); const ctr=cellCentre(player.r,player.c); px=tx=ctr.x; py=ty=ctr.y; vx=vy=0; jelly=0;jvel=0;
    document.getElementById('lvlname').textContent=LEVELS[levelIdx].name;
    document.getElementById('hint').innerHTML=LEVELS[levelIdx].hint;
    document.getElementById('win').style.display='none';
    buildGoalRow();
    if(!solve()) console.warn('[goop] not solvable:',LEVELS[levelIdx].name);
  }
  function buildGoalRow(){ const gr=document.getElementById('goalrow'); gr.innerHTML='';
    goals.forEach(g=>{ const d=document.createElement('div'); d.className='gdot'+(g.done?' done':'');
      d.style.background=HEX[g.color]; d.dataset.id=g.id; gr.appendChild(d); }); }
  function refreshGoalRow(){ [...document.querySelectorAll('.gdot')].forEach(d=>d.classList.toggle('done',!!goals[+d.dataset.id].done)); }

  function tryMove(dir,instant){
    if(player.moving||won) return;
    const nx=resolve(player.r,player.c,player.color,doneSet(),dir);
    if(!nx.changed){ if(nx.reject){ rejectShake=1; } return; }
    moves++; lastDir=DIRS[dir]; look=[DIRS[dir][1],DIRS[dir][0]];
    player.pending={color:nx.color,effect:nx.effect,reject:nx.reject,goalCell:nx.effect==='goal'?at(nx.br,nx.bc):null,br:nx.br,bc:nx.bc};
    player.r=nx.r; player.c=nx.c; player.moving=true;
    const ctr=cellCentre(nx.r,nx.c); tx=ctr.x; ty=ctr.y;
    if(instant) arrive(true);
  }
  function clearColor(){ if(player.moving||won||player.color===NEUTRAL) return;
    moves++; player.color=player.rcolor=NEUTRAL; jvel-=1.0; rejectShake=.35;
    burst(px,py,'#cfe6f2',14,S*.10); burst(px,py+S*.1,HEX[0],6,S*.06); }
  function arrive(instant){
    const p=player.pending; if(!p){ player.moving=false; return; }
    const changedColor=p.color!==player.color;
    player.rcolor=player.color=p.color;
    player.moving=false; player.pending=null;
    jvel-=(Math.abs(lastDir[0])+Math.abs(lastDir[1]))?1.0:.5;
    if(p.reject){ rejectShake=1; }
    else if(p.effect==='paint'||changedColor){ burst(px,py,HEX[player.color],16,S*.13); }
    if(p.goalCell){ p.goalCell.done=true; p.goalCell.pop=1; burst(cellX(p.bc),cellY(p.br),HEX[p.goalCell.color],22,S*.16); refreshGoalRow(); }
    if(goals.length&&goals.every(g=>g.done)){ won=true; winT=0; setTimeout(()=>document.getElementById('win').style.display='flex',420); }
    if(instant){ px=tx;py=ty;vx=vy=0; }
  }

  // ---- input ---------------------------------------------------------------
  addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
    const map={arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'};
    if(map[k]){ e.preventDefault(); tryMove(map[k]); }
    else if(k===' '||k==='c'||k==='x'){ e.preventDefault(); clearColor(); }
    else if(k==='enter'&&won){ loadLevel(levelIdx+1); } });
  function nearGoop(x,y){ return Math.hypot(x-px,y-py) < S*1.15; }
  let ps=null;
  const down=(x,y)=>{ ps={x,y}; };
  const up=(x,y)=>{ if(!ps)return; const dx=x-ps.x, dy=y-ps.y, d=Math.hypot(dx,dy); const q=ps; ps=null;
    if(won) return;
    if(d<14){ if(nearGoop(q.x,q.y)) clearColor(); return; }
    if(d<24) return;
    if(Math.abs(dx)>Math.abs(dy)) tryMove(dx>0?'right':'left'); else tryMove(dy>0?'down':'up'); };
  cv.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; down(t.clientX,t.clientY); },{passive:true});
  cv.addEventListener('touchend',e=>{ const t=e.changedTouches[0]; up(t.clientX,t.clientY); },{passive:true});
  cv.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
  addEventListener('mouseup',e=>up(e.clientX,e.clientY));

  document.getElementById('prev').onclick=()=>loadLevel(levelIdx-1);
  document.getElementById('next').onclick=()=>loadLevel(levelIdx+1);
  document.getElementById('reset').onclick=()=>loadLevel(levelIdx);
  document.getElementById('wnext').onclick=()=>loadLevel(levelIdx+1);

  // ---- layout --------------------------------------------------------------
  let S=44, ox=0, oy=0, dpr=1, TRAY=14;
  const cellX=c=>ox+c*S+S/2, cellY=r=>oy+r*S+S/2, cellCentre=(r,c)=>({x:cellX(c),y:cellY(r)});
  function layout(){
    dpr=Math.min(2,devicePixelRatio||1); const w=innerWidth,h=innerHeight;
    cv.width=w*dpr; cv.height=h*dpr; cv.style.width=w+'px'; cv.style.height=h+'px'; ctx.setTransform(dpr,0,0,dpr,0,0);
    const padTop=72, padBot=72, padX=20;
    S=Math.floor(Math.min((w-padX*2-2*TRAY)/gw,(h-padTop-padBot-2*TRAY)/gh)); S=Math.max(30,Math.min(S,94));
    ox=Math.round((w-gw*S)/2); oy=Math.round(padTop+((h-padTop-padBot)-gh*S)/2);
    if(player&&!player.moving){ const ctr=cellCentre(player.r,player.c); px=tx=ctr.x; py=ty=ctr.y; }
  }
  addEventListener('resize',()=>{ layout(); });

  // ---- draw helpers --------------------------------------------------------
  function rr(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function shade(hex,f){ const n=parseInt(hex.slice(1),16); let R=n>>16,G=(n>>8)&255,B=n&255;
    R=Math.round(f>0?R+(255-R)*f:R*(1+f)); G=Math.round(f>0?G+(255-G)*f:G*(1+f)); B=Math.round(f>0?B+(255-B)*f:B*(1+f));
    return 'rgb('+R+','+G+','+B+')'; }
  // 3D extruded block
  function block(x,y,S,col,gloss){
    const m=Math.round(S*0.055), rad=Math.round(S*0.28), d=Math.round(S*0.085);
    ctx.fillStyle='rgba(58,47,36,.16)'; rr(x+m,y+m+d*1.3,S-2*m,S-2*m,rad); ctx.fill();       // soft shadow
    ctx.fillStyle=shade(col,-.30); rr(x+m,y+m+d,S-2*m,S-2*m,rad); ctx.fill();                  // extruded edge
    ctx.fillStyle=col; rr(x+m,y+m,S-2*m,S-2*m,rad); ctx.fill();                                // top face
    ctx.strokeStyle=INK; ctx.lineWidth=Math.max(2.2,S*.045); rr(x+m,y+m,S-2*m,S-2*m,rad); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,'+(gloss?.42:.28)+')'; rr(x+m+S*.11,y+m+S*.09,S*.42,S*.16,rad*.5); ctx.fill();
  }
  function drawCell(r,c){
    const cell=cells[r][c], x=ox+c*S, y=oy+r*S;
    if(cell.type==='wall'){ block(x,y,S, cell.color?HEX[cell.color]:'#cbb996', !!cell.color); return; }
    // floor
    ctx.fillStyle=((r+c)&1)?'#ece2ca':'#f1e8d2'; const fm=Math.round(S*.02); rr(x+fm,y+fm,S-2*fm,S-2*fm,S*.16); ctx.fill();
    if(cell.type==='gate'){ const col=HEX[cell.color], m=Math.round(S*.08), rad=Math.round(S*.24);
      ctx.fillStyle=shade(col,.62); rr(x+m,y+m,S-2*m,S-2*m,rad); ctx.fill();
      ctx.setLineDash([S*.13,S*.10]); ctx.lineWidth=Math.max(2.5,S*.06); ctx.strokeStyle=col; rr(x+m,y+m,S-2*m,S-2*m,rad); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x+S/2,y+S*.45,S*.10,0,7); ctx.fill(); ctx.fillRect(x+S/2-S*.035,y+S*.45,S*.07,S*.17);
    } else if(cell.type==='goal'){ const col=HEX[cell.color], cx=x+S/2, cy=y+S/2;
      if(cell.done){ const s=1+(cell.pop||0)*.18; ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s); ctx.translate(-cx,-cy);
        block(x,y,S,col,true); ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(3,S*.09); ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.beginPath(); ctx.moveTo(cx-S*.16,cy+S*.02); ctx.lineTo(cx-S*.03,cy+S*.15); ctx.lineTo(cx+S*.18,cy-S*.14); ctx.stroke(); ctx.lineCap='butt'; ctx.restore();
      } else {
        block(x,y,S, shade(col,.60), false);                       // an actual tile, pale-tinted toward its colour
        const m=Math.round(S*.17), rad=Math.round(S*.19);
        ctx.setLineDash([S*.14,S*.10]); ctx.lineWidth=Math.max(2.5,S*.065); ctx.strokeStyle=col;   // keep the dashed border
        rr(x+m,y+m,S-2*m,S-2*m,rad); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cx,cy,S*.11,0,7); ctx.fill();
      }
    }
  }

  function drawPlayer(){
    const col=HEX[player.rcolor];
    let sx=1+Math.abs(vx)*.010-Math.abs(vy)*.010, sy=1+Math.abs(vy)*.010-Math.abs(vx)*.010;
    sx+=jelly*.30*(Math.abs(lastDir[1])?1:-1); sy+=jelly*.30*(Math.abs(lastDir[0])?1:-1);
    sx=Math.max(.6,Math.min(1.42,sx)); sy=Math.max(.6,Math.min(1.42,sy));
    const jx=rejectShake>0?Math.sin(rejectShake*42)*rejectShake*7:0;
    const w=S*.72*sx, h=S*.72*sy, x=px-w/2+jx, y=py-h/2, rad=Math.min(w,h)*.42;
    ctx.fillStyle='rgba(58,47,36,.18)'; rr(px-w*.46,py+h*.30,w*.92,h*.22,h*.11); ctx.fill();     // contact shadow
    ctx.fillStyle=shade(col,-.26); rr(x,y+h*.07,w,h,rad); ctx.fill();
    ctx.fillStyle=col; rr(x,y,w,h,rad); ctx.fill();
    ctx.strokeStyle=INK; ctx.lineWidth=Math.max(2.5,S*.05); rr(x,y,w,h,rad); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.55)'; rr(x+w*.15,y+h*.13,w*.36,h*.21,rad*.5); ctx.fill();
    // face
    const eo=w*.17, ey=py-h*.02, er=Math.max(2.2,S*.058), lx=Math.max(-1,Math.min(1,look[0]))*er*.5, ly=Math.max(-1,Math.min(1,look[1]))*er*.5;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px-eo+jx,ey,er,0,7); ctx.arc(px+eo+jx,ey,er,0,7); ctx.fill();
    ctx.fillStyle=INK; ctx.beginPath(); ctx.arc(px-eo+jx+lx,ey+ly,er*.55,0,7); ctx.arc(px+eo+jx+lx,ey+ly,er*.55,0,7); ctx.fill();
    ctx.strokeStyle=INK; ctx.lineWidth=Math.max(2,S*.04); ctx.lineCap='round'; ctx.beginPath();
    const my=py+h*.20;
    if(won||goals.some(g=>g.done)) ctx.arc(px+jx,my-S*.02,S*.08,.12*Math.PI,.88*Math.PI);
    else if(player.rcolor===NEUTRAL) ctx.arc(px+jx,my+S*.04,S*.055,1.15*Math.PI,1.85*Math.PI);
    else { ctx.moveTo(px+jx-S*.05,my); ctx.lineTo(px+jx+S*.05,my); }
    ctx.stroke(); ctx.lineCap='butt';
  }

  function frame(){
    const k=.36, damp=.70; vx+=(tx-px)*k; vy+=(ty-py)*k; vx*=damp; vy*=damp; px+=vx; py+=vy;
    jvel+=(0-jelly)*.26; jvel*=.82; jelly+=jvel;
    if(rejectShake>0) rejectShake=Math.max(0,rejectShake-.05);
    goals.forEach(g=>{ if(g.pop>0) g.pop=Math.max(0,g.pop-.06); });
    look[0]*=.86; look[1]*=.86;
    if(player.moving && Math.abs(tx-px)<.6 && Math.abs(ty-py)<.6 && Math.hypot(vx,vy)<.6) arrive(false);
    for(const p of parts){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.life-=.028; }
    parts=parts.filter(p=>p.life>0);

    ctx.clearRect(0,0,cv.width,cv.height);
    // tray
    ctx.fillStyle='rgba(58,47,36,.13)'; rr(ox-TRAY, oy-TRAY+6, gw*S+2*TRAY, gh*S+2*TRAY, 22); ctx.fill();
    ctx.fillStyle='#f7f0de'; rr(ox-TRAY, oy-TRAY, gw*S+2*TRAY, gh*S+2*TRAY, 22); ctx.fill();
    ctx.strokeStyle=INK; ctx.lineWidth=3; rr(ox-TRAY, oy-TRAY, gw*S+2*TRAY, gh*S+2*TRAY, 22); ctx.stroke();
    for(let r=0;r<gh;r++)for(let c=0;c<gw;c++) drawCell(r,c);
    drawPlayer();
    for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life+1,0,7); ctx.fill(); } ctx.globalAlpha=1;
    if(won){ winT=Math.min(1,winT+.03); ctx.save(); ctx.globalAlpha=winT; ctx.translate(px,py);
      for(let i=0;i<12;i++){ const a=i/12*6.283+winT*3, rd=S*(.6+winT*1.5);
        ctx.fillStyle=HEX[1+(i%6)]; ctx.beginPath(); ctx.arc(Math.cos(a)*rd,Math.sin(a)*rd,S*.09*(1-winT*.4),0,7); ctx.fill(); } ctx.restore(); }
    requestAnimationFrame(frame);
  }

  // ---- oracle / test hook --------------------------------------------------
  window.__goop={
    state:()=>({level:LEVELS[levelIdx].name,idx:levelIdx,color:player.color,colorName:NAME[player.color],
      pos:[player.r,player.c],moves,goals:goals.map(g=>({need:NAME[g.color],done:g.done})),won}),
    move:d=>{ if(d==='clear') clearColor(); else tryMove(d,true); }, clear:()=>clearColor(), solve:()=>solve(), load:i=>loadLevel(i), count:()=>LEVELS.length };

  loadLevel(0); requestAnimationFrame(frame);
})();
</script>
</body>
