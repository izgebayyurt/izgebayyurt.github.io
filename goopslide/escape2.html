<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Goop — escape II (wall gaps)</title>
<style>
  :root{color-scheme:dark;
    --ink:#0d0b14; --face:#5f5880; --band:#454060; --floor:#221e2e;
    --text:#e8e3f5; --dim:#9a92b5; --mint:#3fd6ac; --mintglow:rgba(63,214,172,.45);}
  html,body{margin:0;height:100%;overflow:hidden;color:var(--text);
    background:radial-gradient(120% 120% at 50% 12%, #2b2737 0%, #201c2b 55%, #151220 100%);
    font:14px/1.4 ui-rounded,"Segoe UI",system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;}
  #c{position:fixed;inset:0;display:block;}
  #top{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:5;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:96vw;}
  .chip{border:2px solid var(--ink);border-radius:12px;font:800 13px ui-rounded,system-ui;color:var(--text);
    padding:8px 13px;display:flex;align-items:center;gap:6px;}
  div.chip{background:var(--floor);box-shadow:inset 0 3px 7px rgba(0,0,0,.55);color:#cfc8e8;}
  button.chip{background:var(--face);box-shadow:0 4px 0 var(--band),0 6px 0 var(--ink);cursor:pointer;
    transition:transform .06s,box-shadow .06s;}
  button.chip:active{transform:translateY(3px);box-shadow:0 1px 0 var(--band),0 3px 0 var(--ink);}
  #mute.off{opacity:.45;text-decoration:line-through;}
  #lvlname{min-width:70px;justify-content:center;text-align:center;}
  #moves{color:var(--mint);text-shadow:0 0 9px var(--mintglow);min-width:16px;text-align:center;}
  #moves.tickA{animation:tickpop .22s ease-out;}
  @keyframes tickpop{from{transform:scale(1.3);}}
  #hint{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:5;
    font-size:12.5px;color:var(--dim);background:var(--floor);border:2px solid var(--ink);border-radius:12px;
    padding:7px 14px;box-shadow:inset 0 3px 7px rgba(0,0,0,.5);max-width:88vw;text-align:center;}
  #hint b{color:var(--text);} #hint i{color:#7d75a0;}
  .modal{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;background:rgba(15,12,22,.65);}
  .modal .card{background:#38324c;border:2px solid var(--ink);border-radius:20px;
    box-shadow:0 7px 0 #262133,0 10px 0 var(--ink),0 22px 60px rgba(0,0,0,.55);
    padding:24px 32px;display:flex;flex-direction:column;align-items:center;gap:12px;max-width:86vw;
    animation:cardpop .18s ease-out;}
  @keyframes cardpop{from{transform:scale(.92);opacity:.5;}}
  .modal h2{margin:0;font:900 26px ui-rounded,system-ui;color:var(--text);text-shadow:0 0 14px rgba(63,214,172,.25);}
  .modal .sub{color:var(--dim);font-size:13.5px;text-align:center;}
  #pgrid{display:grid;grid-template-columns:repeat(5,52px);gap:9px;max-height:56vh;overflow-y:auto;padding:6px;}
  .lvbtn{width:52px;height:52px;border-radius:12px;border:2px solid var(--ink);background:var(--face);
    box-shadow:0 3px 0 var(--band),0 5px 0 var(--ink);font:800 15px ui-rounded,system-ui;color:var(--text);
    cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;}
  .lvbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--band),0 3px 0 var(--ink);}
  .lvbtn.locked{background:var(--floor);box-shadow:inset 0 3px 6px rgba(0,0,0,.5);color:#5a5375;cursor:default;}
  .lvbtn.done{background:#37806b;box-shadow:0 3px 0 #235c4c,0 5px 0 var(--ink);}
  .lvbtn.cur{outline:2px solid var(--mint);outline-offset:1px;box-shadow:0 3px 0 var(--band),0 5px 0 var(--ink),0 0 12px var(--mintglow);}
  .lvbtn .st{position:absolute;top:-5px;right:-5px;width:11px;height:11px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #8ceccf, var(--mint));border:1.5px solid var(--ink);
    box-shadow:0 0 8px var(--mintglow);}
  #buildid{font-size:10.5px;color:#6a6288;}
  @media(max-width:430px){ .chip{padding:7px 10px;font-size:12px;border-radius:11px;} #lvlname{min-width:58px;}
    #hint{font-size:11.5px;padding:6px 10px;} }
</style>
</head>

  <canvas id="c"></canvas>

    <div class="chip" id="lvlname">—</div>

    <button class="chip" id="grid" title="Levels">▦</button>

    <div class="chip" title="Moves"><span id="moves">0</span></div>

    if(f1&&f1!==f0) o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime((vol||1)*.5,t+.012); g.gain.exponentialRampToValueAtTime(.0001,t+dur);

          ctx.fillStyle='#8b84a8'; ctx.strokeStyle=INK; ctx.lineWidth=Math.max(1.4,S*.028);
          for(let i=0;i<8;i++){ const a=i/8*Math.PI*2; const tx=cx+Math.cos(a)*S*.34, ty=cy+Math.sin(a)*S*.34;
            const px=Math.cos(a+Math.PI/2)*R*.42, py=Math.sin(a+Math.PI/2)*R*.42;
            ctx.beginPath(); ctx.moveTo(cx+px,cy+py); ctx.lineTo(cx-px,cy-py); ctx.lineTo(tx,ty); ctx.closePath(); ctx.fill(); ctx.stroke(); }
          ctx.fillStyle='#3a3450'; ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.fill();
          ctx.strokeStyle=INK; ctx.lineWidth=Math.max(1.8,S*.036); ctx.stroke(); }
        { const tv=triMapG[r+','+c]; if(tv!==undefined){ const m2=Math.round(S*.05), rc2=S*.13;
          const X0=x+m2, X1=x+S-m2, Y0=y+m2, Y1=y+S-m2;
          const CORNERS=[[[X0,Y0],[X1,Y0],[X1,Y1]],[[X1,Y0],[X1,Y1],[X0,Y1]],[[X0,Y0],[X1,Y1],[X0,Y1]],[[X0,Y0],[X1,Y0],[X0,Y1]]];
          const pts=CORNERS[tv];
          const tri3=(dy)=>{ ctx.beginPath();
            ctx.moveTo((pts[2][0]+pts[0][0])/2,(pts[2][1]+pts[0][1])/2+dy);
            for(let i3=0;i3<3;i3++){ const v=pts[i3], nx2=pts[(i3+1)%3]; ctx.arcTo(v[0],v[1]+dy,nx2[0],nx2[1]+dy,rc2); }
            ctx.closePath(); };
          ctx.fillStyle='#7c3b38'; tri3(S*.07); ctx.fill();
          ctx.fillStyle='#a85550'; tri3(0); ctx.fill();
          ctx.strokeStyle=INK; ctx.lineWidth=Math.max(2.2,S*.045); tri3(0); ctx.stroke(); }
        if(bumpSetG.has(r+','+c)){ const cx=x+S/2, cy=y+S/2, R=S*.30;
          ctx.fillStyle='#7c3b38'; ctx.beginPath(); ctx.arc(cx,cy+S*.055,R,0,7); ctx.fill();
          ctx.fillStyle='#a85550'; ctx.beginPath(); ctx.arc(cx,cy-S*.015,R*.93,0,7); ctx.fill();
          ctx.strokeStyle=INK; ctx.lineWidth=Math.max(2.2,S*.045); ctx.beginPath(); ctx.arc(cx,cy+S*.01,R,0,7); ctx.stroke(); } }
        if(stickyG.has(r+','+c)){ const cx=x+S/2,cy=y+S/2;
          ctx.fillStyle='rgba(168,201,106,.14)'; rr(x+S*.16,y+S*.16,S*.68,S*.68,S*.24); ctx.fill();
          ctx.strokeStyle='#a8c96a'; ctx.lineWidth=Math.max(2,S*.045); rr(x+S*.16,y+S*.16,S*.68,S*.68,S*.24); ctx.stroke();
          ctx.fillStyle='rgba(168,201,106,.6)';
          [[-.13,-.09],[.12,.01],[-.03,.14]].forEach(o2=>{ ctx.beginPath(); ctx.arc(cx+o2[0]*S,cy+o2[1]*S,S*.05,0,7); ctx.fill(); }); }
        if(platesG.includes(r+','+c)){ const lit=state.drops.some(d=>d.r===r&&d.c===c);
          ctx.fillStyle=lit?'rgba(255,210,122,.22)':'rgba(120,112,150,.14)'; ctx.beginPath(); ctx.arc(x+S/2,y+S/2,S*.27,0,7); ctx.fill();
          ctx.strokeStyle=lit?'#ffd27a':'#6f6890'; ctx.lineWidth=Math.max(2,S*.05); ctx.beginPath(); ctx.arc(x+S/2,y+S/2,S*.27,0,7); ctx.stroke();
          ctx.beginPath(); ctx.arc(x+S/2,y+S/2,S*.08,0,7); ctx.fillStyle=lit?'#ffd27a':'#6f6890'; ctx.fill(); }
        if((r+','+c)===doorCellG){ const o=doorAnim;
          ctx.strokeStyle='#ffd27a'; ctx.lineWidth=Math.max(2,S*.045); rr(x+S*.08,y+S*.08,S*.84,S*.84,S*.14); ctx.stroke();
          ctx.fillStyle='#7d7599';
          for(let i2=0;i2<4;i2++){ const bx=x+S*(.2+.2*i2); const h=(S*.68)*(1-o)+S*.10;
            rr(bx-S*.045, y+S*.16, S*.09, h, S*.04); ctx.fill(); } } } }
    state.molds.forEach(drawMold);
    for(const t of trails){ ctx.globalAlpha=t.life*JUICE.trail; ctx.fillStyle=COLORS[t.ci].main;
      ctx.beginPath(); ctx.arc(t.x,t.y,t.r*t.life,0,7); ctx.fill(); } ctx.globalAlpha=1;
    for(const rg of rings){ ctx.globalAlpha=rg.life; ctx.strokeStyle=COLORS[rg.ci].main;
      ctx.lineWidth=Math.max(1.5,3.2*rg.life); ctx.beginPath();
      ctx.arc(rg.x,rg.y,S*(.25+(1-rg.life)*1.1),0,7); ctx.stroke(); } ctx.globalAlpha=1;
    for(const g of ghosts){ ctx.globalAlpha=g.life; const C=COLORS[g.ci||0];
      if(g.drain){ const dx=g.tx-g.px, dy=g.ty-g.py, rot=Math.atan2(dy,dx);
        ctx.fillStyle=C.main; ctx.beginPath();
        ctx.ellipse(g.px,g.py, g.rr*(0.9+(1-g.life)*0.9), Math.max(1,g.rr*g.life*.75), rot, 0, 7); ctx.fill(); }
      else if(g.splat){ ctx.fillStyle=C.dark; ctx.beginPath(); ctx.ellipse(g.px,g.py,g.rr*(1.5-.5*g.life),g.rr*g.life*.55,0,0,7); ctx.fill(); }
      else { ctx.fillStyle=C.main; ctx.beginPath(); ctx.arc(g.px,g.py,g.rr*g.life,0,7); ctx.fill(); }
      ctx.globalAlpha=1; }
    // draw locked first (sit under), then movers
    state.drops.filter(d=>d.locked).forEach(d=>{ const e=renderById[d.id]; if(e) drawBlob(e,d); });
    state.drops.filter(d=>!d.locked).forEach(d=>{ const e=renderById[d.id]; if(e) drawBlob(e,d); });
    for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life+1,0,7); ctx.fill(); } ctx.globalAlpha=1;
    ctx.restore();
    requestAnimationFrame(frame);
  }

  window.__goop={ state:()=>({level:'L'+(levelIdx+1),idx:levelIdx,moves,won,
      drops:state.drops.map(d=>({r:d.r,c:d.c,size:d.size,color:d.color,locked:d.locked})), molds:state.molds.map(m=>({size:m.size,filled:m.filled}))}),
    move:d=>applyMove(d,true), undo:()=>undo(), solve:()=>solve(), load:i=>loadLevel(i), count:()=>LEVELS.length,
    anim:()=>{ let m=0; for(const id in renderById){ const d=state.drops.find(x=>x.id==id);
      if(d){ m=Math.max(m,Math.abs(renderById[id].px-cellX(d.c)),Math.abs(renderById[id].py-cellY(d.r))); } } return m; } };
  { let hsh=2166136261; const str=JSON.stringify(LEVELS.map(l=>l.map));
    for(let i=0;i<str.length;i++){ hsh^=str.charCodeAt(i); hsh=Math.imul(hsh,16777619); }
    document.getElementById('buildid').textContent='build '+(hsh>>>0).toString(36); }
  let start0=0; while(start0<LEVELS.length-1&&prog.best[start0]!==undefined) start0++;
  loadLevel(start0); requestAnimationFrame(frame);
})();
</script>
